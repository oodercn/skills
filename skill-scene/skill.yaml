apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-scene
  name: 场景管理
  version: 2.3.1
  description: 场景管理技能 - 场景定义、会话管理、能力验证、场景技能分类、LLM集成、知识库管理
  author: ooder Team
  license: Apache-2.0

spec:
  skillForm: SCENE
  
  sceneSkill: true
  mainFirst: true
  businessSemanticsScore: 9
  
  mainFirstConfig:
    triggerType: schedule
    interval: "0 0 9 * * ?"
    
  driverConditions:
    - type: time
      expression: "cron:0 0 9 * * ?"
      
  participants:
    roles:
      - admin
      - member
    users: []
    
  visibility: public
  
  businessTags:
    - 场景管理
    - 能力编排
    - 协作流程
    - LLM集成
    - 知识管理
  
  capabilities:
    - id: scene-definition
      name: 场景定义
      description: 创建、更新、删除场景定义
      type: SERVICE
      hasSelfDrive: true
      businessSemanticsScore: 9
      
    - id: scene-session
      name: 会话管理
      description: 启动、结束场景会话
      type: SERVICE
      hasSelfDrive: true
      businessSemanticsScore: 8
      
    - id: scene-validation
      name: 能力验证
      description: 验证场景所需能力是否可用
      type: SERVICE
      hasSelfDrive: true
      businessSemanticsScore: 7
      
    - id: scene-role
      name: 角色管理
      description: 管理场景角色和权限
      type: SERVICE
      hasSelfDrive: true
      businessSemanticsScore: 7
            
    - id: scene-skill-classification
      name: 场景技能分类
      description: 检测场景技能分类和业务语义评分
      type: SERVICE
      hasSelfDrive: true
      businessSemanticsScore: 9
          
    - id: llm-provider-manage
      name: LLM提供者管理
      description: 管理LLM提供者配置
      type: SERVICE
      hasSelfDrive: true
      businessSemanticsScore: 8
          
    - id: llm-call-monitor
      name: LLM调用监控
      description: 监控LLM调用情况、Token消耗、成本统计
      type: SERVICE
      hasSelfDrive: true
      businessSemanticsScore: 7
          
    - id: knowledge-layer-config
      name: 知识分层配置
      description: 配置三层知识架构
      type: SERVICE
      hasSelfDrive: true
      businessSemanticsScore: 8
          
    - id: decision-engine-config
      name: 决策引擎配置
      description: 配置决策引擎模式和规则
      type: SERVICE
      hasSelfDrive: true
      businessSemanticsScore: 8
