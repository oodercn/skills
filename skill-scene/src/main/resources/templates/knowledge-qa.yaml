apiVersion: scene.ooder.net/v1
kind: SceneTemplate

metadata:
  id: knowledge-qa
  name: 知识问答场景
  description: 基于知识库的智能问答场景，支持文档管理、语义检索、智能问答
  category: knowledge
  icon: ri-book-3-line
  version: 1.0.0
  author: ooder Team

spec:
  skills:
    - id: skill-knowledge-base
      version: ">=1.0.0"
      required: true
      description: "知识库核心服务"
      
    - id: skill-knowledge-ui
      version: ">=1.0.0"
      required: true
      description: "知识库管理界面"
      
    - id: skill-rag
      version: ">=1.0.0"
      required: false
      description: "RAG检索增强（可选）"
      
    - id: skill-llm-assistant-ui
      version: ">=1.0.0"
      required: false
      description: "LLM智能助手（可选）"
      
  capabilities:
    - id: kb-management
      name: 知识库管理
      description: 创建、更新、删除知识库
      category: service
      
    - id: document-management
      name: 文档管理
      description: 上传、管理知识库文档
      category: service
      
    - id: kb-search
      name: 知识检索
      description: BM25语义检索
      category: ai
      
    - id: rag-retrieval
      name: RAG检索
      description: 检索增强生成
      category: ai
      
  scene:
    type: knowledge
    name: 知识问答
    description: 知识库智能问答场景
    
    config:
      knowledgeBase:
        autoCreate: true
        defaultName: "默认知识库"
        storageType: "local"
        
      search:
        defaultStrategy: "hybrid"
        maxResults: 10
        
      llm:
        provider: "mock"
        model: "mock-gpt-4"
        temperature: 0.7
        
  installOrder:
    - skill-knowledge-base
    - skill-rag
    - skill-knowledge-ui
    - skill-llm-assistant-ui
    
  estimatedResources:
    cpu: "500m"
    memory: "512Mi"
    storage: "1Gi"
    
  estimatedDuration: "5-10分钟"
