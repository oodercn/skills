apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-scene
  name: 场景管理
  version: 2.3.1
  description: 场景管理技能 - 场景定义、会话管理、能力验证、场景技能分类、LLM集成、知识库管理
  author: ooder Team
  license: Apache-2.0

spec:
  skillForm: SCENE
  
  dependencies:
    - id: skill-llm-chat
      version: ">=2.3.0"
      required: false
      autoInstall: false
      description: "LLM智能对话场景能力"
      capabilities:
        - llm-chat
        - session-manage
        - history-record
        
    - id: skill-llm-conversation
      version: ">=1.0.0"
      required: false
      autoInstall: false
      description: "LLM对话服务"
      capabilities:
        - llm-chat
        - session-manage
        
    - id: skill-knowledge-qa
      version: ">=2.3.0"
      required: false
      autoInstall: false
      description: "知识问答场景能力"
      capabilities:
        - kb-management
        - document-management
        - kb-search
        - rag-retrieval
        
    - id: skill-knowledge-base
      version: ">=1.0.0"
      required: false
      autoInstall: false
      description: "知识库核心服务"
      capabilities:
        - kb-management
        - document-management
        
    - id: skill-rag
      version: ">=1.0.0"
      required: false
      autoInstall: false
      description: "RAG检索增强服务"
      capabilities:
        - rag-retrieval
        - semantic-search
        
    - id: skill-monitor
      version: ">=1.0.0"
      required: false
      autoInstall: false
      description: "监控服务"
      capabilities:
        - metrics-collection
        - log-query
        
    - id: skill-audit
      version: ">=1.0.0"
      required: false
      autoInstall: false
      description: "审计服务"
      capabilities:
        - audit-log
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.scene.SceneSkillApplication
  
  sceneSkill: true
  mainFirst: true
  
  mainFirstConfig:
    triggerType: schedule
    interval: "0 0 9 * * ?"
    
  driverConditions:
    - type: time
      expression: "cron:0 0 9 * * ?"
      
  participants:
    roles:
      - admin
      - member
    users: []
    
  visibility: public
  
  businessTags:
    - 场景管理
    - 能力编排
    - 协作流程
    - LLM集成
    - 知识管理
  
  capabilities:
    - id: scene-definition
      name: 场景定义
      description: 创建、更新、删除场景定义
      type: SERVICE
      hasSelfDrive: true
      businessSemanticsScore: 9
            
    - id: scene-session
      name: 会话管理
      description: 启动、结束场景会话
      type: SERVICE
      hasSelfDrive: true
      businessSemanticsScore: 8
            
    - id: scene-validation
      name: 能力验证
      description: 验证场景所需能力是否可用
      type: SERVICE
      hasSelfDrive: true
      businessSemanticsScore: 7
            
    - id: scene-role
      name: 角色管理
      description: 管理场景角色和权限
      type: SERVICE
      hasSelfDrive: true
      businessSemanticsScore: 7
                
    - id: scene-skill-classification
      name: 场景技能分类
      description: 检测场景技能分类和业务语义评分
      type: SERVICE
      hasSelfDrive: true
      businessSemanticsScore: 9
          
    - id: llm-provider-manage
      name: LLM提供者管理
      description: 管理LLM提供者配置
      type: SERVICE
      hasSelfDrive: true
      businessSemanticsScore: 8
          
    - id: llm-call-monitor
      name: LLM调用监控
      description: 监控LLM调用情况、Token消耗、成本统计
      type: SERVICE
      hasSelfDrive: true
      businessSemanticsScore: 7
          
    - id: knowledge-layer-config
      name: 知识分层配置
      description: 配置三层知识架构
      type: SERVICE
      hasSelfDrive: true
      businessSemanticsScore: 8
          
    - id: decision-engine-config
      name: 决策引擎配置
      description: 配置决策引擎模式和规则
      type: SERVICE
      hasSelfDrive: true
      businessSemanticsScore: 8
  
  scenes:
    - name: scene-management
      description: 场景管理主场景
      capabilities:
        - scene-definition
        - scene-session
        - scene-validation
        - scene-role
        - scene-skill-classification
        
    - name: llm-integration
      description: LLM集成场景
      capabilities:
        - llm-provider-manage
        - llm-call-monitor
        
    - name: knowledge-management
      description: 知识管理场景
      capabilities:
        - knowledge-layer-config
        
    - name: decision-management
      description: 决策管理场景
      capabilities:
        - decision-engine-config
  
  config:
    optional:
      - name: SCENE_MAX_PARTICIPANTS
        type: integer
        default: 100
        description: 最大参与者数量
        
      - name: SCENE_DEFAULT_TIMEOUT
        type: integer
        default: 30000
        description: 默认超时时间(毫秒)
        
      - name: BUSINESS_SEMANTICS_THRESHOLD
        type: integer
        default: 8
        description: 高业务语义评分阈值
        
      - name: LLM_DEFAULT_PROVIDER
        type: string
        default: "deepseek"
        description: 默认LLM提供者
        
      - name: LLM_DEFAULT_MODEL
        type: string
        default: "deepseek-chat"
        description: 默认LLM模型
        
      - name: LLM_TIMEOUT
        type: integer
        default: 60000
        description: LLM调用超时时间(毫秒)
        
      - name: DECISION_MODE
        type: string
        default: "ONLINE_FIRST"
        description: 决策引擎模式
        
      - name: KNOWLEDGE_SEARCH_TOP_K
        type: integer
        default: 5
        description: 知识检索返回数量
        
      - name: KNOWLEDGE_SEARCH_THRESHOLD
        type: number
        default: 0.7
        description: 知识检索相似度阈值
  
  endpoints:
    - path: /api/v1/scenes
      method: GET
      description: 获取场景列表
      capability: scene-definition
      
    - path: /api/v1/scenes
      method: POST
      description: 创建场景
      capability: scene-definition
      
    - path: /api/v1/scenes/{sceneId}
      method: GET
      description: 获取场景详情
      capability: scene-definition
      
    - path: /api/v1/scenes/{sceneId}/start
      method: POST
      description: 启动场景会话
      capability: scene-session
      
    - path: /api/v1/scenes/{sceneId}/validate
      method: POST
      description: 验证能力
      capability: scene-validation
      
    - path: /api/v1/scene-capabilities/{id}/classify
      method: GET
      description: 获取场景技能分类
      capability: scene-skill-classification
      
    - path: /api/v1/scene-capabilities/{id}/state
      method: GET
      description: 获取场景生命周期状态
      capability: scene-session
      
    - path: /api/v1/scene-capabilities/{id}/activate
      method: POST
      description: 激活场景
      capability: scene-session
      
    - path: /api/v1/scene-capabilities/{id}/pause
      method: POST
      description: 暂停场景
      capability: scene-session
      
    - path: /api/v1/scene-capabilities/{id}/trigger
      method: POST
      description: 触发场景
      capability: scene-session
      
    - path: /api/v1/llm/providers
      method: GET
      description: 获取LLM提供者列表
      capability: llm-provider-manage
      
    - path: /api/v1/llm/providers
      method: POST
      description: 创建LLM提供者
      capability: llm-provider-manage
      
    - path: /api/v1/llm/providers/{providerId}
      method: PUT
      description: 更新LLM提供者
      capability: llm-provider-manage
      
    - path: /api/v1/llm/providers/{providerId}
      method: DELETE
      description: 删除LLM提供者
      capability: llm-provider-manage
      
    - path: /api/v1/llm/providers/{providerId}/test
      method: POST
      description: 测试LLM提供者连接
      capability: llm-provider-manage
      
    - path: /api/v1/llm/monitor/stats
      method: GET
      description: 获取LLM调用统计
      capability: llm-call-monitor
      
    - path: /api/v1/llm/monitor/logs
      method: GET
      description: 获取LLM调用日志
      capability: llm-call-monitor
      
    - path: /api/v1/knowledge-bases
      method: GET
      description: 获取知识库列表
      capability: knowledge-layer-config
      
    - path: /api/v1/knowledge-bases
      method: POST
      description: 创建知识库
      capability: knowledge-layer-config
      
    - path: /api/v1/knowledge-bases/{kbId}
      method: GET
      description: 获取知识库详情
      capability: knowledge-layer-config
      
    - path: /api/v1/knowledge-bases/{kbId}
      method: PUT
      description: 更新知识库
      capability: knowledge-layer-config
      
    - path: /api/v1/knowledge-bases/{kbId}
      method: DELETE
      description: 删除知识库
      capability: knowledge-layer-config
      
    - path: /api/v1/knowledge-bases/layer/{layer}
      method: GET
      description: 获取指定层的知识库
      capability: knowledge-layer-config
      
    - path: /api/v1/decision/config
      method: GET
      description: 获取决策引擎配置
      capability: decision-engine-config
      
    - path: /api/v1/decision/config
      method: PUT
      description: 更新决策引擎配置
      capability: decision-engine-config
      
    - path: /api/v1/decision/mode
      method: PUT
      description: 切换决策模式
      capability: decision-engine-config
  
  resources:
    cpu: "200m"
    memory: "256Mi"
