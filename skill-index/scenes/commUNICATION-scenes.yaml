apiVersion: ooder.io/v1
kind: Scenes
metadata:
  name: commUNICATION-scenes
  category: commUNICATION
  count: 5

scenes:

    - sceneId: mqtt-messaging
      name: MQTT Messaging
      description: MQTT消息场景，提供MQTT Broker和消息服务能力
      version: "1.0.0"
      capabilityCategory: commUNICATION
      requiredCapabilities:
        - mqtt-broker
        - mqtt-publish
        - mqtt-subscribe
      maxMembers: 1000
      

    - sceneId: p2p
      name: P2P Communication
      description: 点对点通讯场景，提供消息、文件、能力共享等点对点通讯能力
      version: "1.0.0"
      capabilityCategory: commUNICATION
      requiredCapabilities:
        - message-send
        - message-receive
        - file-upload
        - file-download
      maxMembers: 2
      

    - sceneId: group
      name: Group Communication
      description: 群组通讯场景，提供群组消息、群组文件、群组协作能力
      version: "1.0.0"
      capabilityCategory: commUNICATION
      requiredCapabilities:
        - message-broadcast
        - group-members
        - file-share
      maxMembers: 500
      

    - sceneId: broadcast
      name: Broadcast Communication
      description: 广播通讯场景，提供一对多消息广播能力
      version: "1.0.0"
      capabilityCategory: commUNICATION
      requiredCapabilities:
        - message-broadcast
        - message-subscribe
      maxMembers: 10000
      

    - sceneId: messaging
      name: Messaging
      description: 消息场景，提供消息发送、广播、群组消息能力
      version: "1.0.0"
      capabilityCategory: commUNICATION
      requiredCapabilities:
        - message-sending
        - message-management
        - group-messaging
      maxMembers: 1000
      
