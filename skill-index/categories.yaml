apiVersion: ooder.io/v1
kind: Categories

metadata:
  name: ooder-skill-categories
  version: "2.3.1"
  description: Ooder Skills 分类定义
  author: Ooder Team

categories:
  - id: org
    name: 组织服务
    nameEn: Organization
    description: 企业组织架构、用户认证相关服务
    icon: users
    order: 1
    sceneDriver: org
    
  - id: vfs
    name: 存储服务
    nameEn: Storage
    description: 文件存储、对象存储相关服务
    icon: database
    order: 2
    sceneDriver: vfs
    
  - id: ui
    name: UI生成
    nameEn: UI Generation
    description: 界面生成、设计转代码服务
    icon: palette
    order: 3
    sceneDriver: null
    
  - id: msg
    name: 消息通讯
    nameEn: Messaging
    description: 消息队列、通讯协议服务
    icon: message
    order: 4
    sceneDriver: msg
    
  - id: sys
    name: 系统管理
    nameEn: System
    description: 系统监控、网络管理、安全审计
    icon: settings
    order: 5
    sceneDriver: sys
    
  - id: payment
    name: 支付服务
    nameEn: Payment
    description: 支付渠道、退款管理、交易处理
    icon: credit-card
    order: 6
    sceneDriver: payment
    
  - id: media
    name: 媒体发布
    nameEn: Media Publishing
    description: 自媒体文章发布、内容管理、数据分析
    icon: edit
    order: 7
    sceneDriver: media
    
  - id: util
    name: 工具服务
    nameEn: Utility
    description: 通用工具、辅助功能
    icon: tool
    order: 8
    sceneDriver: null
    
  - id: nexus-ui
    name: Nexus界面
    nameEn: Nexus UI
    description: Nexus管理界面、仪表盘、监控页面
    icon: layout
    order: 9
    sceneDriver: null
    
  - id: llm
    name: LLM服务
    nameEn: LLM Service
    description: 大语言模型服务、对话、上下文管理
    icon: robot
    order: 10
    sceneDriver: null
    
  - id: knowledge
    name: 知识服务
    nameEn: Knowledge Service
    description: 知识库、RAG、向量存储服务
    icon: book
    order: 11
    sceneDriver: null
    
  - id: iot
    name: 物联网服务
    nameEn: IoT Service
    description: 设备管理、边缘计算、数据采集
    icon: cpu
    order: 12
    sceneDriver: null
    
  - id: collaboration
    name: 协作服务
    nameEn: Collaboration Service
    description: 会议协作、文档协作、任务协作
    icon: users
    order: 13
    sceneDriver: null
    
  - id: business
    name: 业务服务
    nameEn: Business Service
    description: 业务场景、流程管理、审批服务
    icon: briefcase
    order: 14
    sceneDriver: null
    
  - id: infrastructure
    name: 基础设施
    nameEn: Infrastructure
    description: Kubernetes、容器编排、基础设施管理
    icon: server
    order: 15
    sceneDriver: null
    
  - id: scheduler
    name: 调度服务
    nameEn: Scheduler Service
    description: 任务调度、定时任务、执行管理
    icon: clock
    order: 16
    sceneDriver: null
    
  - id: messaging
    name: 消息服务
    nameEn: Messaging Service
    description: 消息发送、广播、群组消息
    icon: send
    order: 17
    sceneDriver: msg
