apiVersion: ooder.io/v1
kind: Categories

metadata:
  name: ooder-skill-categories
  version: "2.3.1"
  description: Ooder Skills 分类定义
  author: Ooder Team

categories:
  - id: org
    name: 组织服务
    nameEn: Organization
    description: 企业组织架构、用户认证相关服务
    icon: users
    order: 1
    sceneDriver: org
    
  - id: vfs
    name: 存储服务
    nameEn: Storage
    description: 文件存储、对象存储相关服务
    icon: database
    order: 2
    sceneDriver: vfs
    
  - id: llm
    name: LLM服务
    nameEn: LLM Service
    description: 大语言模型服务、对话、上下文管理
    icon: brain
    order: 3
    sceneDriver: null
    
  - id: knowledge
    name: 知识服务
    nameEn: Knowledge Service
    description: 知识库、RAG、向量存储服务
    icon: book
    order: 4
    sceneDriver: null
    
  - id: sys
    name: 系统管理
    nameEn: System
    description: 系统监控、网络管理、安全审计
    icon: settings
    order: 5
    sceneDriver: sys
    
  - id: msg
    name: 消息通讯
    nameEn: Messaging
    description: 消息队列、通讯协议服务
    icon: message
    order: 6
    sceneDriver: msg
    
  - id: ui
    name: UI生成
    nameEn: UI Generation
    description: 界面生成、设计转代码服务
    icon: palette
    order: 7
    sceneDriver: null
    
  - id: payment
    name: 支付服务
    nameEn: Payment
    description: 支付渠道、退款管理、交易处理
    icon: credit-card
    order: 8
    sceneDriver: payment
    
  - id: media
    name: 媒体发布
    nameEn: Media Publishing
    description: 自媒体文章发布、内容管理、数据分析
    icon: edit
    order: 9
    sceneDriver: media
    
  - id: util
    name: 工具服务
    nameEn: Utility
    description: 通用工具、辅助功能、业务场景
    icon: tool
    order: 10
    sceneDriver: null
    
  - id: nexus-ui
    name: Nexus界面
    nameEn: Nexus UI
    description: Nexus管理界面、仪表盘、监控页面
    icon: layout
    order: 11
    sceneDriver: null
