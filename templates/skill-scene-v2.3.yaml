apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-scene-example
  name: 场景技能示例
  version: 2.3.3
  description: 场景技能模板 - 自驱业务场景(ABS)示例
  author: Ooder Team
  type: scene-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN
  repository: https://gitee.com/ooderCN/ooder-skills
  keywords:
    - scene
    - example
    - template

  category: abs
  sceneCategory: abs

spec:
  type: scene-skill
  category: abs
  
  classification:
    category: abs
    categoryName: 自驱业务场景
    mainFirst: true
    businessSemanticsScore: 9
    detectedAt: "2026-03-06T00:00:00Z"
    detectionVersion: "2.3.3"
    autoDetect: true

  dependencies:
    # 独立能力依赖示例
    # 独立能力定义在独立的 skill 包中，通过 dependencies 引用
    - id: skill-mqtt
      version: ">=0.7.0"
      required: true
      autoInstall: true
      description: "MQTT服务技能 - 独立能力示例"
      capabilities:
        - mqtt-push
        - mqtt-subscribe
      # 独立能力场景类型配置 (可选，由独立能力自身定义)
      # supportedSceneTypes 由独立能力的 skill.yaml 定义
      # 此处仅声明需要使用的能力

    - id: skill-pdf-converter
      version: ">=1.0.0"
      required: false
      autoInstall: false
      description: "PDF转换技能 - 独立能力示例"
      capabilities:
        - pdf-to-text
        - pdf-to-image

  sceneCapabilities:
    - id: scene-example
      name: 示例场景能力
      type: SCENE
      mainFirst: true
      
      mainFirstConfig:
        selfCheck:
          - checkCapabilities: [capability-1, capability-2]
          - checkDriverCapabilities: [intent-receiver]
          - checkDependencies: [skill-mqtt]
          - onCheckFailed:
              action: degrade
              degradedCapabilities: []
              retry:
                maxAttempts: 3
                delay: 5s
          
        selfStart:
          - installDependencies: auto
          - initDriverCapabilities: [intent-receiver]
          - initCapabilities: [capability-1, capability-2]
          - bindAddresses: auto
          
        startCollaboration:
          - startScene: scene-collaborative
            optional: true
            timeout: 10s
            bindInterface: collaborative-service
          
        selfDrive:
          eventRules:
            - event: user.action
              action: example-flow
              
          capabilityChains:
            example-flow:
              - capability: capability-1
                input:
                  action: process
              - capability: capability-2
                input:
                  context: "${previous.result}"

      capabilities:
        - capability-1
        - capability-2
        
      collaborativeCapabilities:
        - capabilityId: scene-collaborative
          role: PROVIDER
          interface: collaborative-service
          autoStart: false
          optional: true

  capabilities:
    # ============================================================
    # 能力归属说明 (v2.3.3)
    # ============================================================
    # 定义在 capabilities 列表中的能力 = 场景内部能力 (SIC)
    # - 可见性: 仅场景内可见
    # - 生命周期: 绑定场景
    # - 调用方式: 场景命令 + 内部路由
    # - 数据: 场景内共享
    # ============================================================
    
    - id: capability-1
      name: 能力1
      description: 场景内部能力示例 - 仅在本场景内可用
      category: service
      type: ATOMIC
      # 隐式属性:
      # - ownership: SCENE_INTERNAL (场景内部能力)
      # - visibility: 仅场景内可见
      # - parentSkill: skill-scene-example
      # - parentScene: scene-example
      
    - id: capability-2
      name: 能力2
      description: 场景内部能力示例 - 仅在本场景内可用
      category: service
      type: ATOMIC
      
    - id: intent-receiver
      name: 意图接收
      description: 驱动能力 - 接收用户意图
      category: driver
      type: DRIVER
      driverType: INTENT_RECEIVER

  capabilityBindings:
    - sceneCapabilityType: example
      autoBind: true
      capabilities:
        - capability-1
        - capability-2
        # 独立能力绑定 (来自 dependencies)
        # - mqtt-push (来自 skill-mqtt)

  endpoints:
    - path: /api/example/action
      method: POST
      description: 执行动作
      capability: capability-1

  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.example.SceneExampleSkillApplication

  config:
    required: []
    optional:
      - name: EXAMPLE_CONFIG
        type: string
        default: "default"
        description: 示例配置

  resources:
    cpu: "200m"
    memory: "256Mi"
    storage: "100Mi"

  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true
