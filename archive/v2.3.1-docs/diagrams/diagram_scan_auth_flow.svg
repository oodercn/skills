<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" width="700px" height="340px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; fill: #334155; }
        .text-title { font-size: 13px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 14px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>
<rect class="title-box" x="20" y="15" width="660" height="35" rx="4"/>
<text class="text-header" x="350" y="38" text-anchor="middle">扫码授权流程</text>

<rect class="box" x="50" y="70" width="130" height="60" rx="6"/>
<text class="text-title" x="115" y="95" text-anchor="middle">生成二维码</text>
<text class="text-small" x="115" y="115" text-anchor="middle">PENDING</text>

<rect class="box" x="200" y="70" width="130" height="60" rx="6"/>
<text class="text-title" x="265" y="95" text-anchor="middle">用户扫码</text>
<text class="text-small" x="265" y="115" text-anchor="middle">SCANNED</text>

<rect class="box" x="350" y="70" width="130" height="60" rx="6"/>
<text class="text-title" x="415" y="95" text-anchor="middle">确认授权</text>
<text class="text-small" x="415" y="115" text-anchor="middle">CONFIRMED</text>

<rect class="box-highlight" x="500" y="70" width="130" height="60" rx="6"/>
<text class="text-title" x="565" y="95" text-anchor="middle">绑定成功</text>
<text class="text-small" x="565" y="115" text-anchor="middle">BOUND</text>

<line class="arrow" x1="180" y1="100" x2="200" y2="100"/>
<line class="arrow" x1="330" y1="100" x2="350" y2="100"/>
<line class="arrow" x1="480" y1="100" x2="500" y2="100"/>

<rect class="box-alt" x="50" y="160" width="580" height="80" rx="6"/>
<text class="text-title" x="340" y="185" text-anchor="middle">API 端点</text>
<text class="text" x="80" y="210">POST /api/v1/bind/{platform}/qrcode</text>
<text class="text" x="280" y="210">GET /api/v1/bind/{platform}/status</text>
<text class="text" x="480" y="210">GET /api/v1/bind/callback</text>

<rect class="box" x="50" y="260" width="580" height="60" rx="6"/>
<text class="text-title" x="340" y="285" text-anchor="middle">支持的绑定状态</text>
<text class="text" x="80" y="305">PENDING: 待扫码</text>
<text class="text" x="200" y="305">SCANNED: 已扫码</text>
<text class="text" x="320" y="305">CONFIRMED: 已确认</text>
<text class="text" x="450" y="305">BOUND: 已绑定</text>
<text class="text" x="570" y="305">EXPIRED: 已过期</text>
</svg>
