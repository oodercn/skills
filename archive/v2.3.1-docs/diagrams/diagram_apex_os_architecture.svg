<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 490" width="800px" height="490px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-cli { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; fill: #334155; }
        .text-title { font-size: 13px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 14px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>
<rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
<text class="text-header" x="400" y="38" text-anchor="middle">Apex OS 架构</text>

<rect class="box-cli" x="50" y="70" width="200" height="50" rx="6"/>
<text class="text-title" x="150" y="100" text-anchor="middle">钉钉 CLI</text>

<rect class="box-cli" x="300" y="70" width="200" height="50" rx="6"/>
<text class="text-title" x="400" y="100" text-anchor="middle">飞书 CLI</text>

<rect class="box-cli" x="550" y="70" width="200" height="50" rx="6"/>
<text class="text-title" x="650" y="100" text-anchor="middle">企业微信 CLI</text>

<line class="arrow" x1="150" y1="120" x2="400" y2="150"/>
<line class="arrow" x1="400" y1="120" x2="400" y2="150"/>
<line class="arrow" x1="650" y1="120" x2="400" y2="150"/>

<rect class="box-alt" x="100" y="150" width="600" height="80" rx="6"/>
<text class="text-title" x="400" y="175" text-anchor="middle">OoderAgent Skill SDK</text>
<text class="text" x="130" y="200">IM服务</text>
<text class="text" x="230" y="200">组织服务</text>
<text class="text" x="340" y="200">消息推送</text>
<text class="text" x="450" y="200">AI Agent</text>
<text class="text" x="550" y="200">日程管理</text>
<text class="text" x="650" y="200">待办同步</text>

<line class="arrow" x1="400" y1="230" x2="400" y2="260"/>

<rect class="box" x="100" y="260" width="600" height="80" rx="6"/>
<text class="text-title" x="400" y="285" text-anchor="middle">Apex OS Core</text>
<text class="text" x="130" y="310">用户管理</text>
<text class="text" x="230" y="310">权限控制</text>
<text class="text" x="340" y="310">场景引擎</text>
<text class="text" x="450" y="310">数据中心</text>
<text class="text" x="550" y="310">消息路由</text>
<text class="text" x="650" y="310">任务调度</text>

<rect class="box" x="100" y="360" width="600" height="60" rx="6"/>
<text class="text-title" x="400" y="385" text-anchor="middle">数据存储层</text>
<text class="text" x="150" y="405">MySQL</text>
<text class="text" x="270" y="405">Redis</text>
<text class="text" x="370" y="405">MongoDB</text>
<text class="text" x="490" y="405">Elasticsearch</text>
<text class="text" x="620" y="405">MinIO</text>

<rect class="box" x="100" y="440" width="600" height="40" rx="6"/>
<text class="text-small" x="400" y="465" text-anchor="middle">企业基础设施 - Kubernetes / Docker / Nginx</text>
</svg>
