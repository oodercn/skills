name: Build and Release

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Build with Maven
        run: mvn clean package -DskipTests
      
      - name: Run Tests
        run: mvn test
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: nexus-products
          path: |
            products/nexus-lite/target/*.jar
            products/nexus-enterprise/target/*.jar
            products/skillcenter/target/*.jar

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Build Release
        run: mvn clean package -DskipTests
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            products/nexus-lite/target/*.jar
            products/nexus-enterprise/target/*.jar
            products/skillcenter/target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Sync to Gitee
        run: |
          git remote add gitee https://gitee.com/ooderCN/ooder-nexus-dev.git
          git push gitee --all --force
          git push gitee --tags --force
