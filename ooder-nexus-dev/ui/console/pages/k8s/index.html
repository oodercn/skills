<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K8s托管管理 - Nexus</title>
    <link rel="stylesheet" href="/console/css/theme.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="k8s.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar" id="sidebar">
            <div class="nx-sidebar-header">
                <div class="nx-sidebar-logo">
                    <i class="ri-kubernetes-line"></i>
                    <span>K8s托管</span>
                </div>
                <button class="nx-sidebar-toggle" data-nx-sidebar-toggle>
                    <i class="ri-menu-fold-line"></i>
                </button>
            </div>
            <nav class="nx-sidebar-content">
                <ul class="nav-menu" id="nav-menu"></ul>
            </nav>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-page__header-left">
                    <button class="nx-sidebar-toggle" data-nx-sidebar-toggle>
                        <i class="ri-menu-line"></i>
                    </button>
                    <h1 class="nx-page__title">
                        <i class="ri-kubernetes-line"></i>
                        Kubernetes 托管管理
                    </h1>
                </div>
                <div class="nx-page__header-right">
                    <button class="nx-btn nx-btn--primary" onclick="K8sManager.showConnectModal()">
                        <i class="ri-add-line"></i> 连接集群
                    </button>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="nx-grid nx-grid--4" id="stats-grid">
                        <div class="nx-card">
                            <div class="nx-stat-card">
                                <div class="nx-stat-card__icon nx-stat-card__icon--primary">
                                    <i class="ri-cluster-line"></i>
                                </div>
                                <div class="nx-stat-card__info">
                                    <div class="nx-stat-card__value" id="cluster-count">0</div>
                                    <div class="nx-stat-card__label">集群数量</div>
                                </div>
                            </div>
                        </div>
                        <div class="nx-card">
                            <div class="nx-stat-card">
                                <div class="nx-stat-card__icon nx-stat-card__icon--success">
                                    <i class="ri-server-line"></i>
                                </div>
                                <div class="nx-stat-card__info">
                                    <div class="nx-stat-card__value" id="node-count">0</div>
                                    <div class="nx-stat-card__label">节点数量</div>
                                </div>
                            </div>
                        </div>
                        <div class="nx-card">
                            <div class="nx-stat-card">
                                <div class="nx-stat-card__icon nx-stat-card__icon--warning">
                                    <i class="ri-apps-line"></i>
                                </div>
                                <div class="nx-stat-card__info">
                                    <div class="nx-stat-card__value" id="pod-count">0</div>
                                    <div class="nx-stat-card__label">Pod数量</div>
                                </div>
                            </div>
                        </div>
                        <div class="nx-card">
                            <div class="nx-stat-card">
                                <div class="nx-stat-card__icon nx-stat-card__icon--info">
                                    <i class="ri-folder-line"></i>
                                </div>
                                <div class="nx-stat-card__info">
                                    <div class="nx-stat-card__value" id="namespace-count">0</div>
                                    <div class="nx-stat-card__label">命名空间</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="nx-card nx-mt-6">
                        <div class="nx-card__header">
                            <h3 class="nx-card__title">
                                <i class="ri-list-check"></i> 集群列表
                            </h3>
                            <div class="nx-card__actions">
                                <button class="nx-btn nx-btn--sm" onclick="K8sManager.refresh()">
                                    <i class="ri-refresh-line"></i> 刷新
                                </button>
                            </div>
                        </div>
                        <div class="nx-card__body">
                            <table class="nx-table" id="cluster-table">
                                <thead>
                                    <tr>
                                        <th>集群名称</th>
                                        <th>状态</th>
                                        <th>节点数</th>
                                        <th>版本</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="cluster-list"></tbody>
                            </table>
                        </div>
                    </div>
                    
                    <div class="nx-card nx-mt-6">
                        <div class="nx-card__header">
                            <h3 class="nx-card__title">
                                <i class="ri-apps-line"></i> Pod 列表
                            </h3>
                            <div class="nx-card__actions">
                                <select class="nx-select" id="namespace-filter" onchange="K8sManager.loadPods()">
                                    <option value="">全部命名空间</option>
                                </select>
                            </div>
                        </div>
                        <div class="nx-card__body">
                            <table class="nx-table" id="pod-table">
                                <thead>
                                    <tr>
                                        <th>Pod名称</th>
                                        <th>命名空间</th>
                                        <th>状态</th>
                                        <th>节点</th>
                                        <th>重启次数</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="pod-list"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="nx-modal" id="connect-modal">
        <div class="nx-modal__content">
            <div class="nx-modal__header">
                <h3 class="nx-modal__title">连接Kubernetes集群</h3>
                <button class="nx-modal__close" onclick="K8sManager.closeModal('connect-modal')">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="nx-modal__body">
                <div class="nx-form-group">
                    <label class="nx-form-label">集群名称</label>
                    <input type="text" class="nx-input" id="cluster-name" placeholder="输入集群名称">
                </div>
                <div class="nx-form-group">
                    <label class="nx-form-label">API Server URL</label>
                    <input type="text" class="nx-input" id="api-server" placeholder="https://kubernetes.default.svc">
                </div>
                <div class="nx-form-group">
                    <label class="nx-form-label">Token (可选)</label>
                    <textarea class="nx-textarea" id="cluster-token" rows="4" placeholder="输入访问Token"></textarea>
                </div>
            </div>
            <div class="nx-modal__footer">
                <button class="nx-btn" onclick="K8sManager.closeModal('connect-modal')">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="K8sManager.connectCluster()">连接</button>
            </div>
        </div>
    </div>
    
    <div class="nx-modal" id="logs-modal">
        <div class="nx-modal__content" style="max-width: 800px;">
            <div class="nx-modal__header">
                <h3 class="nx-modal__title">Pod日志</h3>
                <button class="nx-modal__close" onclick="K8sManager.closeModal('logs-modal')">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="nx-modal__body">
                <pre id="pod-logs" class="nx-code-block"></pre>
            </div>
        </div>
    </div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/api.js"></script>
    <script src="k8s.js"></script>
</body>
</html>
