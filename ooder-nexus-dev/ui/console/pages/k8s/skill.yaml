apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-k8s-nexus-ui
  name: K8s托管管理
  version: 1.0.0
  description: Kubernetes集群托管管理界面
  author: ooder Team
  type: nexus-ui

spec:
  type: nexus-ui
  
  nexusUi:
    entry:
      page: index.html
      title: K8s托管管理
      icon: ri-kubernetes-line
      
    menu:
      position: sidebar
      category: infrastructure
      order: 10
      permission: k8s:view
      
    layout:
      type: default
      sidebar: true
      header: true
      
  capabilities:
    - id: k8s-cluster-view
      name: 查看集群
      description: 查看Kubernetes集群状态
      category: infrastructure
      
    - id: k8s-node-view
      name: 查看节点
      description: 查看集群节点状态
      category: infrastructure
      
    - id: k8s-pod-view
      name: 查看Pod
      description: 查看Pod状态和日志
      category: infrastructure
      
    - id: k8s-namespace-manage
      name: 管理命名空间
      description: 创建和删除命名空间
      category: infrastructure
      
  apis:
    - path: /api/k8s/clusters
      method: GET
      description: 获取集群列表
      
    - path: /api/k8s/nodes
      method: GET
      description: 获取节点列表
      
    - path: /api/k8s/pods
      method: GET
      description: 获取Pod列表
      
    - path: /api/k8s/pods/{namespace}/{podName}/logs
      method: GET
      description: 获取Pod日志
      
  dependencies:
    skills:
      - skill-k8s: ">=0.7.3"
