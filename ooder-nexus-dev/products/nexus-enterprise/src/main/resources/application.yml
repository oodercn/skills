server:
  port: 8082

spring:
  application:
    name: nexus-enterprise
  resources:
    static-locations: classpath:/static/,file:./ui/

nexus:
  product:
    id: nexus-enterprise
    name: Nexus Enterprise
    version: 2.3.0
  p2p:
    enabled: true
  push:
    enabled: true
  llm:
    enabled: true
  skill:
    dynamic: true
    k8s:
      enabled: false
    hosting:
      enabled: false
  features:
    enterprise: true
    push: true
    llm: true
    audit: true

nexus.skills:
  path: ./skills
  source:
    path: ../skills

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    net.ooder: DEBUG
    org.springframework: INFO
