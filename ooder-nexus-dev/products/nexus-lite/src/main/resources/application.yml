server:
  port: 8081

spring:
  application:
    name: nexus-lite
  resources:
    static-locations: classpath:/static/,file:./ui/

nexus:
  product:
    id: nexus-lite
    name: Nexus Lite
    version: 2.3.0
  p2p:
    enabled: true
  push:
    enabled: false
  llm:
    enabled: false
  skill:
    dynamic: false
    k8s:
      enabled: false
    hosting:
      enabled: false
  features:
    personal: true
    home: true
    lan: true

nexus.skills:
  path: ./skills
  source:
    path: ../skills

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    net.ooder: DEBUG
    org.springframework: INFO
