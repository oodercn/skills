<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sceneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="businessGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="toolsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sysGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="driverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fcb69f;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#bgGrad)" rx="12"/>
  
  <text x="400" y="35" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="22" font-weight="bold">OoderAgent 平台架构</text>
  
  <g filter="url(#shadow)">
    <rect x="50" y="60" width="220" height="70" rx="8" fill="url(#sceneGrad)"/>
    <text x="160" y="88" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">场景层</text>
    <text x="160" y="110" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif" font-size="12">(Scenes)</text>
  </g>
  
  <g filter="url(#shadow)">
    <rect x="290" y="60" width="220" height="70" rx="8" fill="url(#businessGrad)"/>
    <text x="400" y="88" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">业务层</text>
    <text x="400" y="110" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif" font-size="12">(Business)</text>
  </g>
  
  <g filter="url(#shadow)">
    <rect x="530" y="60" width="220" height="70" rx="8" fill="url(#toolsGrad)"/>
    <text x="640" y="88" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">工具层</text>
    <text x="640" y="110" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif" font-size="12">(Tools)</text>
  </g>
  
  <line x1="270" y1="95" x2="290" y2="95" stroke="#fff" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="510" y1="95" x2="530" y2="95" stroke="#fff" stroke-width="2" stroke-dasharray="5,3"/>
  
  <path d="M160 130 L160 145 L400 145 L400 130" stroke="#fff" stroke-width="2" fill="none"/>
  <path d="M640 130 L640 145 L400 145" stroke="#fff" stroke-width="2" fill="none"/>
  <polygon points="400,145 395,155 405,155" fill="#fff"/>
  
  <g filter="url(#shadow)">
    <rect x="100" y="165" width="600" height="70" rx="8" fill="url(#capGrad)"/>
    <text x="400" y="193" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="16" font-weight="bold">能力层 (Capabilities)</text>
    <text x="400" y="218" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="13">通信 · 监控 · 基础设施 · 调度 · 搜索 · 认证</text>
  </g>
  
  <polygon points="400,235 395,245 405,245" fill="#fff"/>
  
  <g filter="url(#shadow)">
    <rect x="100" y="255" width="600" height="70" rx="8" fill="url(#sysGrad)"/>
    <text x="400" y="283" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="16" font-weight="bold">系统层 (_system)</text>
    <text x="400" y="308" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="13">认证 · 配置 · 工作流 · RAG · 知识管理 · 消息服务</text>
  </g>
  
  <polygon points="400,325 395,335 405,335" fill="#fff"/>
  
  <g filter="url(#shadow)">
    <rect x="100" y="345" width="600" height="70" rx="8" fill="url(#driverGrad)"/>
    <text x="400" y="373" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="16" font-weight="bold">驱动层 (_drivers)</text>
    <text x="400" y="398" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="13">LLM · IM · 媒体 · 支付 · 组织架构 · 文件系统 · BPM</text>
  </g>
  
  <polygon points="400,415 395,425 405,425" fill="#fff"/>
  
  <g filter="url(#shadow)">
    <rect x="100" y="435" width="600" height="70" rx="8" fill="url(#baseGrad)"/>
    <text x="400" y="463" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="16" font-weight="bold">SPI 基础层 (_base)</text>
    <text x="400" y="488" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="13">统一接口定义 · 服务发现 · 插件机制</text>
  </g>
  
  <rect x="50" y="530" width="700" height="50" rx="6" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="400" y="560" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" font-size="12">Skills-as-a-Service · 声明式组装 · 零部署 · 开箱即用</text>
  
  <circle cx="70" cy="550" r="8" fill="#667eea"/>
  <circle cx="95" cy="550" r="8" fill="#43e97b"/>
  <circle cx="120" cy="550" r="8" fill="#fa709a"/>
  <circle cx="145" cy="550" r="8" fill="#a8edea"/>
  <circle cx="170" cy="550" r="8" fill="#ffecd2"/>
</svg>