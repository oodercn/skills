name: Build and Release Skills

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Build with Maven
        run: mvn clean package -DskipTests
      
      - name: Get Version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Create Release Directory
        run: mkdir -p releases/v${{ steps.version.outputs.VERSION }}
      
      - name: Pack Skills
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          
          find skills -name "skill.yaml" | while read yaml; do
            SKILL_DIR=$(dirname "$yaml")
            SKILL_ID=$(basename "$SKILL_DIR")
            
            TEMP_DIR=$(mktemp -d)
            
            cp "$yaml" "$TEMP_DIR/"
            
            if [ -d "$SKILL_DIR/target" ]; then
              mkdir -p "$TEMP_DIR/lib"
              cp "$SKILL_DIR/target"/*.jar "$TEMP_DIR/lib/" 2>/dev/null || true
            fi
            
            if [ -f "$SKILL_DIR/README.md" ]; then
              cp "$SKILL_DIR/README.md" "$TEMP_DIR/"
            fi
            
            if [ -d "$SKILL_DIR/config" ]; then
              cp -r "$SKILL_DIR/config" "$TEMP_DIR/"
            fi
            
            cd "$TEMP_DIR"
            zip -r "$GITHUB_WORKSPACE/releases/v$VERSION/$SKILL_ID-$VERSION.zip" .
            cd "$GITHUB_WORKSPACE"
            
            rm -rf "$TEMP_DIR"
            
            echo "Packed: $SKILL_ID-$VERSION.zip"
          done
          
          echo "{\"version\":\"$VERSION\",\"createdAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"totalSkills\":$(ls releases/v$VERSION/*.zip 2>/dev/null | wc -l)}" > releases/v$VERSION/manifest.json
      
      - name: Generate Release Notes
        id: notes
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          SKILL_COUNT=$(ls releases/v$VERSION/*.zip 2>/dev/null | wc -l)
          
          cat > release_notes.md << EOF
          ## Ooder Skills v$VERSION
          
          ### 下载说明
          
          - **GitHub Releases**: 本页面下方 Assets 中下载单个技能包
          - **Gitee 镜像**: https://gitee.com/ooderCN/skills/releases/tag/v$VERSION
          
          ### 包含技能 ($SKILL_COUNT 个)
          
          | 技能包 | 说明 |
          |--------|------|
          EOF
          
          ls releases/v$VERSION/*.zip | while read zip; do
            NAME=$(basename "$zip")
            echo "| $NAME | 单技能安装包 |" >> release_notes.md
          done
          
          echo "FILE=release_notes.md" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          files: |
            releases/v${{ steps.version.outputs.VERSION }}/*.zip
            releases/v${{ steps.version.outputs.VERSION }}/manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Sync to Gitee
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git remote add gitee https://${{ secrets.GITEE_TOKEN }}@gitee.com/ooderCN/skills.git
          git push gitee --tags --force
        if: ${{ secrets.GITEE_TOKEN != '' }}
