apiVersion: skill.ooder.net/v1
kind: Skill
metadata:
  name: skill-network
  version: 0.1.0
  description: Network Management Module - P2P networking, topology management, and device discovery
  author: Ooder Team
  category: infrastructure
  tags:
    - network
    - p2p
    - topology
    - discovery
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skill-network
  repository: https://gitee.com/ooderCN/skill-network.git

spec:
  type: infrastructure-skill
  capabilities:
    - p2p-networking
    - node-discovery
    - topology-management
    - device-monitoring
    - skill-sharing
  
  scenes:
    - network-management
    - distributed-computing
  
  endpoints:
    - path: /api/network/status
      method: GET
      description: Get network status
    - path: /api/network/nodes
      method: GET
      description: List all nodes
    - path: /api/network/topology
      method: GET
      description: Get network topology
    - path: /api/network/devices
      method: GET
      description: List network devices
    - path: /api/network/stats
      method: GET
      description: Get network statistics
    - path: /api/network/start
      method: POST
      description: Start P2P service
    - path: /api/network/stop
      method: POST
      description: Stop P2P service
    - path: /api/network/share/{skillId}
      method: POST
      description: Share skill to network

  configSchema:
    type: object
    properties:
      discoveryPort:
        type: integer
        default: 8888
        description: UDP port for node discovery
      heartbeatInterval:
        type: integer
        default: 30000
        description: Heartbeat interval in milliseconds
      nodeTimeout:
        type: integer
        default: 60000
        description: Node timeout in milliseconds

  ui:
    pages:
      - path: /console/pages/network/index.html
        name: Network Management
        icon: ri-global-line
        menu:
          parent: Infrastructure
          order: 1
