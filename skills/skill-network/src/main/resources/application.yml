server:
  port: 8087

spring:
  application:
    name: skill-network

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    net.ooder.skill.network: DEBUG
    org.springframework: INFO

network:
  discovery:
    port: 8888
    enabled: true
  heartbeat:
    interval: 30000
    timeout: 60000
  p2p:
    enabled: true
    auto-start: true
