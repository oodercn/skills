<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 490" width="800px" height="490px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; fill: #334155; }
        .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 10px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<!-- Title -->
<rect class="title-box" x="20" y="15" width="760" height="40" rx="4"/>
<text class="text-header" x="400" y="42" text-anchor="middle">SPI 核心架构设计</text>

<!-- ooder-spi-core -->
<rect class="box-highlight" x="30" y="75" width="230" height="120"/>
<text class="text-title" x="145" y="100" text-anchor="middle">ooder-spi-core</text>
<text class="text" x="45" y="125">• ImDeliveryDriver</text>
<text class="text" x="45" y="145">• RagEnhanceDriver</text>
<text class="text" x="45" y="165">• WorkflowDriver</text>
<text class="text" x="45" y="185">• SpiServices (Facade)</text>

<!-- skill-spi-core -->
<rect class="box" x="285" y="75" width="230" height="120"/>
<text class="text-title" x="400" y="100" text-anchor="middle">skill-spi-core</text>
<text class="text" x="300" y="125">• ImService</text>
<text class="text" x="300" y="145">• MessageContent</text>
<text class="text" x="300" y="165">• SendResult</text>
<text class="text" x="300" y="185">• 基础消息模型</text>

<!-- skill-spi-llm -->
<rect class="box-alt" x="540" y="75" width="230" height="120"/>
<text class="text-title" x="655" y="100" text-anchor="middle">skill-spi-llm</text>
<text class="text" x="555" y="125">• LlmProvider</text>
<text class="text" x="555" y="145">• ChatService</text>
<text class="text" x="555" y="165">• EmbeddingService</text>
<text class="text" x="555" y="185">• FunctionCalling</text>

<!-- Arrows -->
<line class="arrow" x1="260" y1="135" x2="285" y2="135"/>
<line class="arrow" x1="515" y1="135" x2="540" y2="135"/>

<!-- skill-spi-messaging -->
<rect class="box" x="30" y="220" width="740" height="130"/>
<text class="text-title" x="400" y="245" text-anchor="middle">skill-spi-messaging (统一消息服务)</text>
<text class="text" x="50" y="275">UnifiedMessagingService</text>
<text class="text" x="50" y="295">• send() - 发送消息</text>
<text class="text" x="50" y="315">• stream() - 流式消息</text>
<text class="text" x="50" y="335">• react() - 消息反应</text>

<text class="text" x="280" y="275">UnifiedSessionService</text>
<text class="text" x="280" y="295">• create() - 创建会话</text>
<text class="text" x="280" y="315">• get() - 获取会话</text>
<text class="text" x="280" y="335">• close() - 关闭会话</text>

<text class="text" x="510" y="275">UnifiedWebSocketService</text>
<text class="text" x="510" y="295">• generateToken() - 生成令牌</text>
<text class="text" x="510" y="315">• broadcast() - 广播消息</text>
<text class="text" x="510" y="335">• WsToken - WebSocket令牌</text>

<!-- Service Discovery -->
<rect class="box-alt" x="30" y="370" width="740" height="100"/>
<text class="text-title" x="400" y="395" text-anchor="middle">META-INF/services 服务发现机制</text>
<text class="text" x="50" y="420">net.ooder.spi.im.ImDeliveryDriver → net.ooder.skill.im.dingding.DingtalkImDriver</text>
<text class="text" x="50" y="440">net.ooder.spi.rag.RagEnhanceDriver → net.ooder.skill.rag.RagEnhanceDriverImpl</text>
<text class="text" x="50" y="460">net.ooder.scene.skill.LlmProvider → DeepSeekProvider, OpenAiProvider, QianwenProvider</text>

</svg>
