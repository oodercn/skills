apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-a2ui
  name: A2UI Skill
  version: 0.7.3
  description: A2UI图转代码技能，支持将设计图转换为前端代码
  author: Ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills/tree/main/skills/skill-a2ui
  repository: https://gitee.com/ooderCN/skills.git
  keywords:
    - a2ui
    - ui
    - code-generation
    - frontend

spec:
  type: tool-skill
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.a2ui.A2UISkillApplication
  
  capabilities:
    - id: generate-ui
      name: Generate UI
      description: 从设计图生成前端代码
      category: code-generation
    - id: preview-ui
      name: Preview UI
      description: 预览生成的UI
      category: preview
    - id: create-view
      name: Create View
      description: 创建新的视图组件
      category: development
  
  scenes:
    - name: ui-generation
      description: UI生成场景
      capabilities:
        - generate-ui
        - preview-ui
        - create-view
  
  dependencies:
    - id: skill-vfs
      version: ">=0.7.0"
      required: false
      description: 文件存储服务
  
  config:
    optional:
      - name: A2UI_PORT
        type: number
        default: 8081
        description: 服务端口
      - name: A2UI_OUTPUT_DIR
        type: string
        default: ./output
        description: 输出目录
  
  endpoints:
    - path: /api/info
      method: GET
      description: 获取技能信息
      capability: generate-ui
    - path: /api/generate
      method: POST
      description: 生成UI代码
      capability: generate-ui
    - path: /api/preview
      method: POST
      description: 预览UI
      capability: preview-ui
    - path: /api/health
      method: GET
      description: 健康检查
  
  resources:
    cpu: "500m"
    memory: "512Mi"
    storage: "1Gi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: false
