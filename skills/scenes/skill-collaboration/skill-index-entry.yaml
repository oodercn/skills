apiVersion: skill.ooder.net/v1
kind: SkillIndexEntry

metadata:
  id: skill-collaboration
  name: 协作场景服务
  version: "0.7.3"
  description: "协作场景服务，提供团队协作、任务分配、进度跟踪能力"

spec:
  skillForm: SCENE
  sceneType: TRIGGER
  visibility: public
  businessCategory: OFFICE_COLLABORATION
  subCategory: collaboration
  category: WORKFLOW
  capabilityCategory: util
  
  capabilityAddresses:
    required:
      - address: 0xF0
        name: UTIL_BASE
        description: "工具基础服务"
      - address: 0x50
        name: COMM_BASE
        description: "通讯基础服务"
    optional: []
  
  tags:
    - collaboration
    - teamwork
    - workflow
    - scene
  
  dependencies:
    - skill-msg
    - skill-notify
  
  roles:
    - name: MANAGER
      displayName: 场景管理员
      minCount: 1
      maxCount: 1
      permissions: [READ, WRITE, CONFIG, DELETE]
    - name: MEMBER
      displayName: 场景成员
      minCount: 0
      maxCount: 100
      permissions: [READ, WRITE]
