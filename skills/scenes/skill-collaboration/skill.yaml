apiVersion: skill.ooder.net/v1
kind: SkillPackage

metadata:
  id: skill-collaboration
  name: 协作场景
  version: "3.0.1"
  description: 协作场景服务，提供场景创建、成员管理、密钥管理能力
  author: Ooder Team
  icon: ri-team-line

spec:
  capability:
    category: biz
  capabilities:
    - id: scene-management
      name: 场景管理
      description: 创建、配置、管理协作场�?      category: service
      autoBind: true
      
    - id: member-management
      name: 成员管理
      description: 添加、移除、管理场景成�?      category: service
      autoBind: true
      
    - id: key-management
      name: 密钥管理
      description: 管理场景访问密钥和权�?      category: service
      autoBind: true
      
    - id: collaboration
      name: 团队协作
      description: 支持团队协作和任务分�?      category: service
      autoBind: false
      
  dependencies:
    - skillId: skill-msg
      version: ">=3.0.1"
      required: true
      description: 消息服务依赖
    - skillId: skill-notify
      version: ">=3.0.1"
      required: true
      description: 通知服务依赖
      
  skillForm: SCENE
  
  scene:
    type: INTERACTIVE
    visibility: public
    name: 协作管理
    description: 团队协作场景管理
    
  roles:
    - id: manager
      name: 场景管理�?      description: 场景管理员，负责场景配置和成员管�?      required: true
      minCount: 1
      maxCount: 1
      permissions:
        - manage-scene
        - manage-members
        - manage-keys
        - view-all
        - configure
    - id: member
      name: 场景成员
      description: 场景成员，参与协作活�?      required: false
      minCount: 0
      maxCount: 100
      permissions:
        - view
        - participate
        - collaborate
        
  activationSteps:
    manager:
      - stepId: configure-scene
        step: 1
        action: configure-scene
        title: 配置场景
        description: 设置场景基本信息和参�?        required: true
        skippable: false
        autoExecute: false
      - stepId: generate-keys
        step: 2
        action: generate-keys
        title: 生成密钥
        description: 生成场景访问密钥
        required: true
        skippable: false
        autoExecute: true
      - stepId: invite-members
        step: 3
        action: invite-members
        title: 邀请成�?        description: 邀请团队成员加�?        required: false
        skippable: true
        autoExecute: false
    member:
      - stepId: accept-invitation
        step: 1
        action: accept-invitation
        title: 接受邀�?        description: 加入协作场景
        required: true
        skippable: false
        autoExecute: false
        
  menus:
    manager:
      - id: overview
        name: 场景概览
        icon: ri-dashboard-line
        path: /collaboration/overview
        order: 1
        visible: true
      - id: members
        name: 成员管理
        icon: ri-user-settings-line
        path: /collaboration/members
        order: 2
        visible: true
      - id: keys
        name: 密钥管理
        icon: ri-key-line
        path: /collaboration/keys
        order: 3
        visible: true
      - id: settings
        name: 场景设置
        icon: ri-settings-line
        path: /collaboration/settings
        order: 4
        visible: true
    member:
      - id: overview
        name: 场景概览
        icon: ri-dashboard-line
        path: /collaboration/overview
        order: 1
        visible: true
      - id: my-tasks
        name: 我的任务
        icon: ri-task-line
        path: /collaboration/my-tasks
        order: 2
        visible: true
        
  configSchema:
    type: object
    properties:
      maxMembers:
        type: integer
        default: 100
        title: 最大成员数
      keyExpiryDays:
        type: integer
        default: 365
        title: 密钥有效�?�?
      enableNotification:
        type: boolean
        default: true
        title: 启用通知
      autoAcceptInvitation:
        type: boolean
        default: false
        title: 自动接受邀�?        
  installOrder:
    - skill-msg
    - skill-notify
    - skill-collaboration
    
  estimatedResources:
    cpu: "100m"
    memory: "256Mi"
    storage: "100Mi"
    
  estimatedDuration: "2-3分钟"
