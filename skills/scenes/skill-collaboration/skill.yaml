apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-collaboration
  name: 协作场景服务
  version: 0.7.3
  description: 协作场景服务，提供团队协作、任务分配、进度跟踪能力
  author: ooder Team
  type: scene-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - collaboration
    - teamwork
    - workflow
    - scene

spec:
  type: scene-skill
  
  ownership: independent
  
  capability:
    address: 0xF0
    category: UTIL
    code: UTIL_BASE
    operations: [collaborate, assign, track]
  
  sceneType: TRIGGER
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
  
  mainFirst: false
  
  dependencies:
    - id: skill-msg
      version: ">=0.7.0"
      required: true
      description: "消息服务依赖"
    - id: skill-notify
      version: ">=0.7.0"
      required: true
      description: "通知服务依赖"
  
  sceneCapabilities:
    mainFirst: false
    capabilities:
      - skill-msg
      - skill-notify
  
  roles:
    - name: MANAGER
      displayName: 场景管理员
      minCount: 1
      maxCount: 1
      permissions: [READ, WRITE, CONFIG, DELETE]
    - name: MEMBER
      displayName: 场景成员
      minCount: 0
      maxCount: 100
      permissions: [READ, WRITE]
  
  capabilities:
    - id: collaborate
      name: 团队协作
      description: 支持团队协作
      category: service
    - id: assign
      name: 任务分配
      description: 分配任务给成员
      category: service
    - id: track
      name: 进度跟踪
      description: 跟踪任务进度
      category: service
  
  endpoints:
    - path: /api/collaboration/teams
      method: POST
      description: 创建团队
      capability: collaborate
    - path: /api/collaboration/tasks/{id}/assign
      method: POST
      description: 分配任务
      capability: assign
    - path: /api/collaboration/tasks/{id}/progress
      method: GET
      description: 获取进度
      capability: track
  
  config:
    optional:
      - name: MAX_TEAM_SIZE
        type: integer
        default: 50
        description: 最大团队人数
      - name: NOTIFICATION_ENABLED
        type: boolean
        default: true
        description: 启用通知
  
  resources:
    cpu: "100m"
    memory: "256Mi"
    storage: "100Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true
