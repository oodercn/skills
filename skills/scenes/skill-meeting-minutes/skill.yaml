apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-meeting-minutes
  name: 会议纪要整理
  version: 1.0.0
  description: 会议内容智能整理场景能力，自动提取关键决策、行动项，并归档到知识库
  author: Ooder Team
  type: scene-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN
  repository: https://gitee.com/ooderCN/ooder-skills
  keywords:
    - meeting
    - minutes
    - summary
    - action-items
    - knowledge
  category: tbs
  sceneCategory: tbs

spec:
  type: scene-skill
  # category 已废弃，请在 skill-index 中定义
  
  classification:
    # category 已废弃
    categoryName: 触发业务场景
    mainFirst: false
    businessSemanticsScore: 8
    detectedAt: "2026-03-06T00:00:00Z"
    detectionVersion: "2.3.0"
    autoDetect: true

  dependencies:
    - id: skill-llm-conversation
      version: ">=1.0.0"
      required: true
      autoInstall: true
      description: "LLM对话服务"
      capabilities:
        - llm-chat
        - text-generation
        
    - id: skill-knowledge-base
      version: ">=1.0.0"
      required: false
      autoInstall: false
      description: "知识库服务（可选，用于归档）"
      capabilities:
        - knowledge-base
        - document-management

  sceneCapabilities:
    - id: scene-meeting-minutes
      name: 会议纪要整理场景能力
      type: SCENE
      mainFirst: false
      
      capabilities:
        - organize-meeting
        - extract-action-items
        - archive-to-kb
        
      participants:
        - role: ORGANIZER
          permissions: [READ, WRITE]
        - role: ATTENDEE
          permissions: [READ]
          
      visibility: TEAM

  capabilities:
    - id: organize-meeting
      name: 整理会议内容
      description: 将会议内容整理成结构化的会议纪要
      category: service
      type: ATOMIC
      inputSchema:
        type: object
        properties:
          meetingContent:
            type: string
            description: 会议内容文本
          projectId:
            type: string
            description: 关联项目ID（可选）
          participants:
            type: array
            items:
              type: string
            description: 参与人列表
      outputSchema:
        type: object
        properties:
          title:
            type: string
            description: 会议主题
          summary:
            type: string
            description: 会议摘要
          decisions:
            type: array
            description: 关键决策列表
          actionItems:
            type: array
            description: 行动项列表
            
    - id: extract-action-items
      name: 提取行动项
      description: 从会议内容中提取行动项（任务、责任人、截止时间）
      category: service
      type: ATOMIC
      inputSchema:
        type: object
        properties:
          meetingContent:
            type: string
            description: 会议内容文本
      outputSchema:
        type: array
        items:
          type: object
          properties:
            task:
              type: string
            assignee:
              type: string
            deadline:
              type: string
            status:
              type: string
              
    - id: archive-to-kb
      name: 归档到知识库
      description: 将会议纪要归档到项目知识库
      category: service
      type: ATOMIC
      inputSchema:
        type: object
        properties:
          minutes:
            type: object
            description: 会议纪要对象
          projectId:
            type: string
            description: 项目ID
          kbId:
            type: string
            description: 知识库ID
      outputSchema:
        type: object
        properties:
          docId:
            type: string
          status:
            type: string

  capabilityBindings:
    - sceneCapabilityType: meeting-minutes
      autoBind: true
      capabilities:
        - organize-meeting
        - extract-action-items
        - archive-to-kb

  endpoints:
    - path: /api/v1/meeting-minutes
      method: GET
      description: 查询纪要列表
      capability: organize-meeting
      
    - path: /api/v1/meeting-minutes/{minutesId}
      method: GET
      description: 查询纪要详情
      capability: organize-meeting
      
    - path: /api/v1/meeting-minutes/organize
      method: POST
      description: 整理会议内容
      capability: organize-meeting
      
    - path: /api/v1/meeting-minutes/{minutesId}
      method: PUT
      description: 更新纪要
      capability: organize-meeting
      
    - path: /api/v1/meeting-minutes/{minutesId}/status
      method: PUT
      description: 更新纪要状态
      capability: organize-meeting
      
    - path: /api/v1/meeting-minutes/{minutesId}
      method: DELETE
      description: 删除纪要
      capability: organize-meeting
      
    - path: /api/v1/meeting-minutes/action-items
      method: POST
      description: 提取行动项
      capability: extract-action-items
      
    - path: /api/v1/meeting-minutes/my-actions
      method: GET
      description: 查询我的待办行动项
      capability: extract-action-items
      
    - path: /api/v1/meeting-minutes/actions/{actionId}/status
      method: PUT
      description: 更新行动项状态
      capability: extract-action-items
      
    - path: /api/v1/meeting-minutes/archive
      method: POST
      description: 归档到知识库
      capability: archive-to-kb
      
    - path: /api/v1/meeting-minutes/export/{format}
      method: POST
      description: 导出会议纪要（markdown/html/json/docx）
      capability: organize-meeting

  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.meeting.minutes.MeetingMinutesApplication

  llmConfig:
    required: false
    defaultProvider: "deepseek"
    defaultModel: "deepseek-chat"
    capabilities:
      - chat
      - streaming
      - function-calling
    modelSelection:
      allowUserOverride: true
      availableProviders:
        - deepseek
        - openai
        - qianwen
        - volcengine
        - ollama
    functionCalling:
      enabled: true
      tools:
        - name: query_skill_capability
          description: "查询当前技能的能力和使用方法"
          parameters:
            type: object
            properties:
              capability:
                type: string
                description: "能力名称"
              detail:
                type: string
                enum: [brief, detailed, examples]
                default: "brief"
        - name: execute_mvel_action
          description: "通过MVEL表达式执行后台操作"
          parameters:
            type: object
            properties:
              expression:
                type: string
                description: "MVEL表达式"
              context:
                type: object
        - name: generate_ui_form
          description: "生成UI表单供用户填写"
          parameters:
            type: object
            properties:
              formType:
                type: string
              fields:
                type: array
                items:
                  type: object
        - name: execute_batch_operation
          description: "执行批量操作"
          parameters:
            type: object
            properties:
              operation:
                type: string
              items:
                type: array
                items:
                  type: object
        - name: convert_to_javascript
          description: "转换为JavaScript代码供用户使用"
          parameters:
            type: object
            properties:
              action:
                type: string
              parameters:
                type: object
      toolChoice: auto
    rateLimits:
      requestsPerMinute: 60
      tokensPerMinute: 100000


  config:
    required:
      - name: LLM_PROVIDER
        type: string
        description: LLM服务提供者
    optional:
      - name: LLM_MODEL
        type: string
        default: "gpt-4"
        description: 使用的LLM模型
      - name: TEMPERATURE
        type: number
        default: 0.3
        description: 生成温度
      - name: MAX_TOKENS
        type: integer
        default: 2000
        description: 最大Token数

  resources:
    cpu: "100m"
    memory: "256Mi"
    storage: "100Mi"

  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true

  knowledge:
    documents:
      - id: overview
        name: 功能概述
        path: README.md
        type: guide
        language: zh
        priority: high
    ragConfig:
      enabled: true
      indexName: "skill-meeting-minutes-knowledge"
      embeddingModel: text-embedding-3-small
      chunkSize: 1000
      chunkOverlap: 200
      searchStrategy: hybrid
      topK: 5
      threshold: 0.7
