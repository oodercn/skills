apiVersion: skill.ooder.net/v1
kind: SkillPackage

metadata:
  id: skill-meeting-minutes
  name: 会议纪要整理
  version: "2.3.1"
  category: biz
  subCategory: collaboration
  description: 会议内容智能整理场景能力，自动提取关键决策、行动项，并归档到知识库
  author: Ooder Team
  icon: ri-file-text-line

spec:
  capabilities:
    - id: organize-meeting
      name: 整理会议内容
      description: 将会议内容整理成结构化的会议纪要
      category: service
      autoBind: true
      
    - id: extract-action-items
      name: 提取行动项
      description: 从会议内容中提取行动项（任务、责任人、截止时间）
      category: service
      autoBind: true
      
    - id: archive-to-kb
      name: 归档到知识库
      description: 将会议纪要归档到项目知识库
      category: service
      autoBind: false
      
  dependencies:
    - skillId: skill-llm-conversation
      version: ">=2.3.1"
      required: true
      description: LLM对话服务
    - skillId: skill-knowledge-base
      version: ">=2.3.1"
      required: false
      description: 知识库服务（可选，用于归档）
      
  skillForm: SCENE
  
  scene:
    type: TRIGGER
    visibility: public
    name: 会议纪要
    description: 会议内容智能整理
    
  roles:
    - id: organizer
      name: 会议组织者
      description: 会议组织者，负责创建会议和管理纪要
      required: true
      minCount: 1
      maxCount: 1
      permissions:
        - create-meeting
        - manage-minutes
        - assign-actions
        - archive
    - id: attendee
      name: 参会人
      description: 参与会议的成员
      required: false
      minCount: 0
      maxCount: 100
      permissions:
        - view-minutes
        - view-actions
        - update-own-actions
    - id: action-owner
      name: 行动项负责人
      description: 负责执行会议行动项
      required: false
      minCount: 0
      maxCount: 50
      permissions:
        - view-assigned-actions
        - update-action-status
        
  activationSteps:
    organizer:
      - stepId: configure-llm
        step: 1
        action: configure-llm
        title: 配置LLM
        description: 配置会议整理使用的LLM服务
        required: true
        skippable: false
        autoExecute: false
      - stepId: configure-templates
        step: 2
        action: configure-templates
        title: 配置模板
        description: 设置会议纪要模板
        required: false
        skippable: true
        autoExecute: false
      - stepId: link-kb
        step: 3
        action: link-kb
        title: 关联知识库
        description: 关联知识库用于归档
        required: false
        skippable: true
        autoExecute: false
    attendee:
      - stepId: accept-invitation
        step: 1
        action: accept-invitation
        title: 接受邀请
        description: 加入会议
        required: true
        skippable: false
        autoExecute: false
    action-owner:
      - stepId: accept-assignment
        step: 1
        action: accept-assignment
        title: 接受任务
        description: 确认接受行动项
        required: true
        skippable: false
        autoExecute: false
        
  menus:
    organizer:
      - id: overview
        name: 会议概览
        icon: ri-dashboard-line
        path: /meeting/overview
        order: 1
        visible: true
      - id: create-meeting
        name: 创建会议
        icon: ri-add-line
        path: /meeting/create
        order: 2
        visible: true
      - id: minutes
        name: 会议纪要
        icon: ri-file-text-line
        path: /meeting/minutes
        order: 3
        visible: true
      - id: action-items
        name: 行动项管理
        icon: ri-task-line
        path: /meeting/actions
        order: 4
        visible: true
      - id: templates
        name: 纪要模板
        icon: ri-file-copy-line
        path: /meeting/templates
        order: 5
        visible: true
    attendee:
      - id: my-meetings
        name: 我的会议
        icon: ri-calendar-line
        path: /meeting/my-meetings
        order: 1
        visible: true
      - id: my-minutes
        name: 会议纪要
        icon: ri-file-text-line
        path: /meeting/my-minutes
        order: 2
        visible: true
    action-owner:
      - id: my-actions
        name: 我的行动项
        icon: ri-task-line
        path: /meeting/my-actions
        order: 1
        visible: true
      - id: update-status
        name: 更新状态
        icon: ri-edit-line
        path: /meeting/update-status
        order: 2
        visible: true
        
  configSchema:
    type: object
    properties:
      llmProvider:
        type: string
        default: deepseek
        title: LLM服务提供者
      llmModel:
        type: string
        default: deepseek-chat
        title: 使用的LLM模型
      temperature:
        type: number
        default: 0.3
        title: 生成温度
      maxTokens:
        type: integer
        default: 2000
        title: 最大Token数
      autoArchive:
        type: boolean
        default: true
        title: 自动归档到知识库
        
  installOrder:
    - skill-llm-conversation
    - skill-knowledge-base
    - skill-meeting-minutes
    
  estimatedResources:
    cpu: "100m"
    memory: "256Mi"
    storage: "100Mi"
    
  estimatedDuration: "3-5分钟"
