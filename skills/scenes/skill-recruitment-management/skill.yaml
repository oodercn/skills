apiVersion: skill.ooder.net/v1
kind: SkillPackage

metadata:
  id: skill-recruitment-management
  name: 招聘管理系统
  version: "2.3.1"
  category: biz
  subCategory: hr
  description: 企业招聘全流程管理系统，支持职位发布、简历收集、面试安排、录用审批
  author: Ooder Team
  icon: ri-team-line

spec:
  capabilities:
    - id: job-management
      name: 职位管理
      description: 创建、发布、管理招聘职位
      category: service
      autoBind: true
      
    - id: resume-management
      name: 简历管理
      description: 收集、筛选、管理候选人简历
      category: service
      autoBind: true
      
    - id: interview-scheduling
      name: 面试安排
      description: 安排面试时间、地点、面试官
      category: service
      autoBind: true
      
    - id: offer-management
      name: 录用管理
      description: 发放录用通知、跟踪录用状态
      category: service
      autoBind: true
      
    - id: recruitment-analytics
      name: 招聘分析
      description: 招聘数据统计和分析报告
      category: ai
      autoBind: false
      
  dependencies:
    - skillId: skill-vfs-base
      version: ">=2.3.1"
      required: true
      description: 文件存储服务（简历存储）
      
    - skillId: skill-approval-form
      version: ">=2.3.1"
      required: true
      description: 审批流程服务（录用审批）
      
    - skillId: skill-msg
      version: ">=2.3.1"
      required: false
      description: 消息通知服务（面试提醒）
      
  skillForm: SCENE
  
  scene:
    type: INTERACTIVE
    visibility: public
    name: 招聘管理
    description: 企业招聘全流程管理
    
  roles:
    - id: hr-manager
      name: HR管理员
      description: 管理招聘流程和职位
      required: true
      minCount: 1
      maxCount: 5
      permissions:
        - manage-jobs
        - view-all-resumes
        - schedule-interviews
        - approve-offers
        - view-analytics
    - id: hiring-manager
      name: 招聘经理
      description: 管理本部门招聘
      required: false
      minCount: 0
      maxCount: 50
      permissions:
        - view-department-jobs
        - view-department-resumes
        - submit-interview-feedback
        - approve-department-offers
    - id: interviewer
      name: 面试官
      description: 参与面试评估
      required: false
      minCount: 0
      maxCount: 100
      permissions:
        - view-assigned-resumes
        - submit-feedback
    - id: candidate
      name: 候选人
      description: 查看职位和提交简历
      required: false
      minCount: 0
      maxCount: 10000
      permissions:
        - view-public-jobs
        - submit-resume
        - view-application-status
        
  activationSteps:
    hr-manager:
      - stepId: configure-departments
        step: 1
        action: configure-departments
        title: 配置部门
        description: 设置招聘部门和团队
        required: true
        skippable: false
        autoExecute: false
      - stepId: configure-workflow
        step: 2
        action: configure-workflow
        title: 配置审批流程
        description: 设置录用审批流程
        required: true
        skippable: false
        autoExecute: false
      - stepId: configure-notification
        step: 3
        action: configure-notification
        title: 配置通知
        description: 设置面试提醒方式
        required: false
        skippable: true
        autoExecute: false
      - stepId: invite-team
        step: 4
        action: invite-team
        title: 邀请团队成员
        description: 添加招聘经理和面试官
        required: false
        skippable: true
        autoExecute: false
    hiring-manager:
      - stepId: accept-invitation
        step: 1
        action: accept-invitation
        title: 接受邀请
        description: 加入招聘团队
        required: true
        skippable: false
        autoExecute: false
    interviewer:
      - stepId: accept-invitation
        step: 1
        action: accept-invitation
        title: 接受邀请
        description: 加入面试团队
        required: true
        skippable: false
        autoExecute: false
    candidate:
      - stepId: register
        step: 1
        action: register
        title: 注册账号
        description: 创建候选人账号
        required: true
        skippable: false
        autoExecute: false
        
  menus:
    hr-manager:
      - id: dashboard
        name: 招聘概览
        icon: ri-dashboard-line
        path: /recruitment/dashboard
        order: 1
      - id: jobs
        name: 职位管理
        icon: ri-briefcase-line
        path: /recruitment/jobs
        order: 2
      - id: resumes
        name: 简历管理
        icon: ri-file-user-line
        path: /recruitment/resumes
        order: 3
      - id: interviews
        name: 面试安排
        icon: ri-calendar-line
        path: /recruitment/interviews
        order: 4
      - id: offers
        name: 录用管理
        icon: ri-user-follow-line
        path: /recruitment/offers
        order: 5
      - id: analytics
        name: 招聘分析
        icon: ri-bar-chart-line
        path: /recruitment/analytics
        order: 6
    hiring-manager:
      - id: my-jobs
        name: 我的职位
        icon: ri-briefcase-line
        path: /recruitment/my-jobs
        order: 1
      - id: my-resumes
        name: 部门简历
        icon: ri-file-user-line
        path: /recruitment/my-resumes
        order: 2
      - id: my-interviews
        name: 待面试
        icon: ri-calendar-check-line
        path: /recruitment/my-interviews
        order: 3
    interviewer:
      - id: my-interviews
        name: 我的面试
        icon: ri-calendar-check-line
        path: /recruitment/my-interviews
        order: 1
      - id: feedback
        name: 面试反馈
        icon: ri-chat-check-line
        path: /recruitment/feedback
        order: 2
    candidate:
      - id: jobs
        name: 浏览职位
        icon: ri-search-line
        path: /recruitment/jobs
        order: 1
      - id: my-application
        name: 我的申请
        icon: ri-file-list-line
        path: /recruitment/my-application
        order: 2
        
  configSchema:
    type: object
    properties:
      resumeStorage:
        type: string
        enum: [local, database, oss]
        default: database
        title: 简历存储位置
      maxResumeSize:
        type: integer
        default: 10
        title: 最大简历大小(MB)
      allowedFileTypes:
        type: array
        default: [pdf, doc, docx]
        title: 允许的简历格式
      interviewReminder:
        type: boolean
        default: true
        title: 面试提醒
      reminderAdvance:
        type: integer
        default: 24
        title: 提醒提前时间(小时)
      approvalWorkflow:
        type: string
        default: default
        title: 录用审批流程
        
  installOrder:
    - skill-vfs-base
    - skill-approval-form
    - skill-msg
    - skill-recruitment-management
    
  estimatedResources:
    cpu: "500m"
    memory: "512Mi"
    storage: "1Gi"
    
  estimatedDuration: "5-10分钟"
