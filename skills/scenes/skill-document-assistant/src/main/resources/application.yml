server:
  port: 8091

spring:
  application:
    name: skill-document-assistant
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

skill:
  document-assistant:
    chunk-size: 500
    chunk-overlap: 50
    max-history-length: 20
    default-top-k: 5
    default-threshold: 0.7

logging:
  level:
    net.ooder: DEBUG
    org.springframework: INFO
