apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-project-knowledge
  name: 项目知识沉淀
  version: 1.0.0
  description: 项目知识自动沉淀场景能力，将项目文档自动分类整理，形成可复用知识资产
  author: Ooder Team
  type: scene-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN
  repository: https://gitee.com/ooderCN/ooder-skills
  keywords:
    - project
    - knowledge
    - extraction
    - classification
    - archive
  category: tbs
  sceneCategory: tbs

spec:
  type: scene-skill
  category: tbs
  
  classification:
    category: tbs
    categoryName: 触发业务场景
    mainFirst: false
    businessSemanticsScore: 8
    detectedAt: "2026-03-06T00:00:00Z"
    detectionVersion: "2.3.0"
    autoDetect: true

  dependencies:
    - id: skill-knowledge-base
      version: ">=1.0.0"
      required: true
      autoInstall: true
      description: "知识库核心服务"
      capabilities:
        - knowledge-base
        
    - id: skill-document-processor
      version: ">=1.0.0"
      required: true
      autoInstall: true
      description: "文档处理服务"
      capabilities:
        - document-parse
        - document-chunk
        
    - id: skill-llm-conversation
      version: ">=1.0.0"
      required: false
      autoInstall: false
      description: "LLM对话服务（用于分类）"
      capabilities:
        - text-classification

  sceneCapabilities:
    - id: scene-project-knowledge
      name: 项目知识沉淀场景能力
      type: SCENE
      mainFirst: false
      
      capabilities:
        - import-project-docs
        - classify-document
        - discover-similar
        - generate-graph
        
      participants:
        - role: PROJECT_MANAGER
          permissions: [READ, WRITE, DELETE]
        - role: TEAM_MEMBER
          permissions: [READ, WRITE]
        - role: STAKEHOLDER
          permissions: [READ]
          
      visibility: TEAM

  capabilities:
    - id: import-project-docs
      name: 导入项目文档
      description: 批量导入项目文档并自动处理
      category: service
      type: ATOMIC
      inputSchema:
        type: object
        properties:
          projectId:
            type: string
          archiveFile:
            type: file
          autoClassify:
            type: boolean
            default: true
      outputSchema:
        type: object
        properties:
          taskId:
            type: string
          totalFiles:
            type: integer
          processedFiles:
            type: integer
          status:
            type: string
            
    - id: classify-document
      name: 文档分类
      description: 自动识别文档类型并打标签
      category: service
      type: ATOMIC
      inputSchema:
        type: object
        properties:
          docId:
            type: string
          content:
            type: string
      outputSchema:
        type: object
        properties:
          docType:
            type: string
            enum: [requirement, design, test, summary, other]
          tags:
            type: array
          confidence:
            type: number
            
    - id: discover-similar
      name: 发现相似项目
      description: 基于项目特征推荐相似项目
      category: service
      type: ATOMIC
      inputSchema:
        type: object
        properties:
          projectId:
            type: string
          topK:
            type: integer
            default: 5
      outputSchema:
        type: array
        items:
          type: object
          properties:
            projectId:
              type: string
            projectName:
              type: string
            similarityScore:
              type: number
            
    - id: generate-graph
      name: 生成知识图谱
      description: 提取实体和关系生成知识图谱
      category: service
      type: ATOMIC
      inputSchema:
        type: object
        properties:
          projectId:
            type: string
      outputSchema:
        type: object
        properties:
          nodes:
            type: array
          edges:
            type: array

  capabilityBindings:
    - sceneCapabilityType: project-knowledge
      autoBind: true
      capabilities:
        - import-project-docs
        - classify-document
        - discover-similar
        - generate-graph

  endpoints:
    - path: /api/v1/project-knowledge/import
      method: POST
      description: 导入项目文档
      capability: import-project-docs
      
    - path: /api/v1/project-knowledge/classify
      method: POST
      description: 文档分类
      capability: classify-document
      
    - path: /api/v1/project-knowledge/similar/{projectId}
      method: GET
      description: 发现相似项目
      capability: discover-similar
      
    - path: /api/v1/project-knowledge/graph/{projectId}
      method: GET
      description: 生成知识图谱
      capability: generate-graph
      
    - path: /api/v1/project-knowledge/task/{taskId}
      method: GET
      description: 查询导入任务状态
      capability: import-project-docs

  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.project.knowledge.ProjectKnowledgeApplication

  config:
    optional:
      - name: CLASSIFICATION_CONFIDENCE_THRESHOLD
        type: number
        default: 0.8
        description: 分类置信度阈值
      - name: MAX_IMPORT_FILES
        type: integer
        default: 100
        description: 单次最大导入文件数
      - name: SIMILARITY_THRESHOLD
        type: number
        default: 0.7
        description: 相似度阈值

  resources:
    cpu: "200m"
    memory: "512Mi"
    storage: "1Gi"

  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true
