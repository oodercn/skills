apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-real-estate-form
  name: 房产中介房源表单
  version: 1.0.0
  description: 房产中介房源信息采集表单场景能力，支持房源录入、图片上传、地图定位、智能估价等功能
  author: ooder Team
  type: scene-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN
  repository: https://gitee.com/ooderCN/ooder-skills
  keywords:
    - real-estate
    - property
    - form
    - listing
    - house
    - scene-capability

spec:
  skillForm: SCENE
  type: scene-skill
  
  dependencies:
    - id: skill-form-builder
      version: ">=1.0.0"
      required: true
      autoInstall: true
      description: "表单构建服务"
      capabilities:
        - form-render
        - form-validate
        - form-submit
        
    - id: skill-storage-management-nexus-ui
      version: ">=1.0.0"
      required: true
      autoInstall: true
      description: "文件存储服务"
      capabilities:
        - file-upload
        - image-process
        
    - id: skill-llm-chat
      version: ">=1.0.0"
      required: false
      autoInstall: false
      description: "LLM智能对话（用于智能估价）"
      capabilities:
        - llm-chat
        - text-analysis

  capabilities:
    - id: property-form
      name: 房源表单
      description: 房源信息采集表单
      category: form
      type: ATOMIC
      
    - id: property-listing
      name: 房源录入
      description: 新建房源信息录入
      category: business
      type: COMPOSITE
      
    - id: property-edit
      name: 房源编辑
      description: 编辑已有房源信息
      category: business
      type: COMPOSITE
      
    - id: image-upload
      name: 图片上传
      description: 房源图片批量上传
      category: storage
      type: ATOMIC
      
    - id: map-location
      name: 地图定位
      description: 房源地理位置选择
      category: location
      type: ATOMIC
      
    - id: smart-valuation
      name: 智能估价
      description: AI辅助房源估价
      category: ai
      type: ATOMIC
      
    - id: property-search
      name: 房源查询
      description: 多条件房源搜索
      category: search
      type: ATOMIC

  capabilityChains:
    - name: listing-flow
      description: 房源录入完整流程
      capabilities:
        - property-form
        - image-upload
        - map-location
        - smart-valuation
        - property-listing
        
    - name: edit-flow
      description: 房源编辑流程
      capabilities:
        - property-search
        - property-form
        - property-edit

  endpoints:
    - path: /api/real-estate/properties
      method: GET
      description: 获取房源列表
      capability: property-search
      
    - path: /api/real-estate/properties
      method: POST
      description: 创建新房源
      capability: property-listing
      
    - path: /api/real-estate/properties/{id}
      method: GET
      description: 获取房源详情
      capability: property-search
      
    - path: /api/real-estate/properties/{id}
      method: PUT
      description: 更新房源信息
      capability: property-edit
      
    - path: /api/real-estate/properties/{id}
      method: DELETE
      description: 删除房源
      capability: property-listing
      
    - path: /api/real-estate/properties/{id}/images
      method: POST
      description: 上传房源图片
      capability: image-upload
      
    - path: /api/real-estate/valuation
      method: POST
      description: 智能估价
      capability: smart-valuation
      
    - path: /api/real-estate/districts
      method: GET
      description: 获取区域列表
      capability: property-search

  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.ui.SkillUiTestApplication

  config:
    required: []
    
    optional:
      - name: MAX_IMAGES
        type: integer
        default: 20
        description: 最大图片数量
      - name: MAX_IMAGE_SIZE
        type: integer
        default: 10485760
        description: 单张图片最大大小(字节)
      - name: SUPPORTED_IMAGE_TYPES
        type: string
        default: "jpg,jpeg,png,webp"
        description: 支持的图片格式
      - name: VALUATION_ENABLED
        type: boolean
        default: true
        description: 启用智能估价功能
      - name: MAP_PROVIDER
        type: string
        default: "amap"
        description: 地图服务商(amap/baidu/tencent)

  resources:
    cpu: "100m"
    memory: "256Mi"
    storage: "100Mi"

  offline:
    enabled: true
    cacheStrategy: localStorage

  ui:
    nexusUi:
      entry:
        page: index.html
        title: 房源表单
        icon: ri-home-4-line
      menu:
        position: sidebar
        category: business
        order: 1
      layout:
        type: default
        sidebar: true
        header: true
