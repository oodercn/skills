apiVersion: skill.ooder.net/v1
kind: SkillPackage

metadata:
  id: skill-approval-form
  name: 审批表单系统
  version: "2.3.1"
  category: biz
  subCategory: approval
  description: 通用审批表单系统，支持自定义审批流程、多级审批、审批模板
  author: Ooder Team
  icon: ri-file-list-3-line

spec:
  capabilities:
    - id: approval-form
      name: 审批表单
      description: 通用审批表单创建与管理
      category: service
      autoBind: true
      
    - id: approval-template
      name: 审批模板
      description: 审批流程模板管理
      category: service
      autoBind: true
      
    - id: approval-process
      name: 审批流程
      description: 审批流程设计与执行
      category: service
      autoBind: true
      
    - id: approval-record
      name: 审批记录
      description: 审批历史记录查询
      category: service
      autoBind: false
      
    - id: approval-dashboard
      name: 审批看板
      description: 审批统计与监控
      category: service
      autoBind: false
      
  dependencies:
    - skillId: skill-form-builder
      version: ">=2.3.1"
      required: true
      description: 表单构建服务
    - skillId: skill-workflow-engine
      version: ">=2.3.1"
      required: true
      description: 工作流引擎
      
  skillForm: SCENE
  
  scene:
    type: INTERACTIVE
    visibility: public
    name: 审批管理
    description: 通用审批流程管理
    
  roles:
    - id: admin
      name: 管理员
      description: 审批流程管理员，负责流程配置和模板管理
      required: true
      minCount: 1
      maxCount: 5
      permissions:
        - manage-templates
        - manage-processes
        - view-all
        - configure
    - id: approver
      name: 审批人
      description: 审批人，参与审批决策
      required: true
      minCount: 1
      maxCount: 100
      permissions:
        - approve
        - reject
        - transfer
        - view-assigned
    - id: applicant
      name: 申请人
      description: 发起审批申请的用户
      required: true
      minCount: 1
      maxCount: 1000
      permissions:
        - submit
        - view-own
        - withdraw
        
  activationSteps:
    admin:
      - stepId: configure-categories
        step: 1
        action: configure-categories
        title: 配置审批分类
        description: 设置审批类型和分类
        required: true
        skippable: false
        autoExecute: false
      - stepId: configure-templates
        step: 2
        action: configure-templates
        title: 配置审批模板
        description: 创建审批流程模板
        required: true
        skippable: false
        autoExecute: false
      - stepId: invite-approvers
        step: 3
        action: invite-approvers
        title: 邀请审批人
        description: 添加审批人员
        required: false
        skippable: true
        autoExecute: false
    approver:
      - stepId: accept-invitation
        step: 1
        action: accept-invitation
        title: 接受邀请
        description: 加入审批团队
        required: true
        skippable: false
        autoExecute: false
    applicant:
      - stepId: register
        step: 1
        action: register
        title: 注册账号
        description: 创建用户账号
        required: true
        skippable: false
        autoExecute: false
        
  menus:
    admin:
      - id: dashboard
        name: 审批概览
        icon: ri-dashboard-line
        path: /approval/dashboard
        order: 1
        visible: true
      - id: templates
        name: 模板管理
        icon: ri-file-copy-line
        path: /approval/templates
        order: 2
        visible: true
      - id: processes
        name: 流程管理
        icon: ri-flow-chart
        path: /approval/processes
        order: 3
        visible: true
      - id: records
        name: 审批记录
        icon: ri-history-line
        path: /approval/records
        order: 4
        visible: true
      - id: statistics
        name: 统计分析
        icon: ri-bar-chart-line
        path: /approval/statistics
        order: 5
        visible: true
    approver:
      - id: pending
        name: 待审批
        icon: ri-inbox-line
        path: /approval/pending
        order: 1
        visible: true
      - id: approved
        name: 已审批
        icon: ri-check-line
        path: /approval/approved
        order: 2
        visible: true
    applicant:
      - id: submit
        name: 发起申请
        icon: ri-add-line
        path: /approval/submit
        order: 1
        visible: true
      - id: my-applications
        name: 我的申请
        icon: ri-file-list-line
        path: /approval/my-applications
        order: 2
        visible: true
        
  configSchema:
    type: object
    properties:
      maxApprovalLevels:
        type: integer
        default: 10
        title: 最大审批层级
      autoApprovalTimeout:
        type: integer
        default: 72
        title: 自动审批超时(小时)
      enableParallelApproval:
        type: boolean
        default: true
        title: 启用并行审批
      notifyChannels:
        type: array
        default: [email, sms]
        title: 通知渠道
        
  installOrder:
    - skill-form-builder
    - skill-workflow-engine
    - skill-approval-form
    
  estimatedResources:
    cpu: "100m"
    memory: "256Mi"
    storage: "100Mi"
    
  estimatedDuration: "3-5分钟"
