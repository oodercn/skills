id: skill-recording-qa
name: 录音质检系统
description: 录音上传、人工审核、质检分析的完整解决方案
category: business
version: 1.0.0
author: ooder
dependencies: []

# 技能配置
config:
  # 录音文件存储路径
  storage:
    path: ./recordings
    maxFileSize: 100MB
    allowedFormats:
      - mp3
      - wav
      - m4a
      - ogg
  
  # 质检评分标准
  scoring:
    items:
      - id: greeting
        name: 开场白
        weight: 10
        maxScore: 10
      - id: communication
        name: 沟通技巧
        weight: 30
        maxScore: 30
      - id: professionalism
        name: 专业度
        weight: 25
        maxScore: 25
      - id: problemSolving
        name: 问题解决
        weight: 25
        maxScore: 25
      - id: closing
        name: 结束语
        weight: 10
        maxScore: 10

# 菜单配置
menu:
  - id: recording-upload
    name: 录音上传
    icon: ri-upload-cloud-line
    url: /console/skills/skill-recording-qa/ui/pages/upload.html
    order: 1
  
  - id: recording-review
    name: 人工审核
    icon: ri-file-search-line
    url: /console/skills/skill-recording-qa/ui/pages/review.html
    order: 2
  
  - id: recording-statistics
    name: 质检统计
    icon: ri-bar-chart-line
    url: /console/skills/skill-recording-qa/ui/pages/statistics.html
    order: 3

# 权限配置
permissions:
  - id: recording.upload
    name: 上传录音
    description: 允许上传录音文件
  
  - id: recording.review
    name: 审核录音
    description: 允许审核录音并评分
  
  - id: recording.view.all
    name: 查看所有录音
    description: 允许查看所有录音记录
  
  - id: recording.statistics
    name: 查看统计报表
    description: 允许查看质检统计报表
