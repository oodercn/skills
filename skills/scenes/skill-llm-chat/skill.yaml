apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-llm-chat
  name: LLM智能对话
  version: 2.3.0
  description: LLM智能对话场景能力，支持多轮对话、上下文感知、流式输出
  author: ooder Team
  type: scene-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN
  repository: https://gitee.com/ooderCN/ooder-skills
  keywords:
    - llm
    - chat
    - ai
    - conversation
    - scene-capability

spec:
  type: scene-skill
  
  dependencies:
    - id: skill-llm-conversation
      version: ">=1.0.0"
      required: true
      autoInstall: true
      installSource: https://gitee.com/ooderCN/ooder-skills/releases
      fallback: embedded
      timeout: 30s
      description: "LLM对话服务"
      capabilities:
        - llm-chat
        - session-manage
        - history-record
        
    - id: skill-llm-context-builder
      version: ">=1.0.0"
      required: true
      autoInstall: true
      description: "上下文构建服务"
      capabilities:
        - context-extraction
        - context-merging
        
    - id: skill-llm-config-manager
      version: ">=1.0.0"
      required: false
      autoInstall: false
      description: "LLM配置管理（可选）"

  sceneCapabilities:
    - id: scene-llm-chat
      name: LLM智能对话场景能力
      type: SCENE
      mainFirst: true
      
      mainFirstConfig:
        selfCheck:
          - checkCapabilities: [llm-chat, session-manage, context-extraction]
          - checkDriverCapabilities: [intent-receiver]
          - checkDependencies: [skill-llm-conversation, skill-llm-context-builder]
          - onCheckFailed:
              action: degrade
              degradedCapabilities: []
              retry:
                maxAttempts: 3
                delay: 5s
          
        selfStart:
          - installDependencies: auto
          - initDriverCapabilities: [intent-receiver]
          - initCapabilities: [llm-chat, session-manage, context-extraction]
          - bindAddresses: auto
          
        startCollaboration:
          - startScene: scene-knowledge-qa
            optional: true
            timeout: 10s
            bindInterface: knowledge-service
          
        selfDrive:
          eventRules:
            - event: user.message
              action: chat-flow
            - event: context.update
              action: context-flow
              
          capabilityChains:
            chat-flow:
              - capability: context-extraction
                input:
                  action: extract
              - capability: llm-chat
                input:
                  context: "${previous.context}"
                  stream: true
                  
            context-flow:
              - capability: context-extraction
                input:
                  action: update

      capabilities:
        - llm-chat
        - session-manage
        - history-record
        - context-extraction
        - context-merging
        
      collaborativeCapabilities:
        - capabilityId: scene-knowledge-qa
          role: PROVIDER
          interface: knowledge-service
          autoStart: false
          optional: true

  capabilities:
    - id: llm-chat
      name: 智能对话
      description: 与LLM进行智能对话
      category: ai
      type: ATOMIC
      
    - id: session-manage
      name: 会话管理
      description: 管理对话会话
      category: service
      type: ATOMIC
      
    - id: history-record
      name: 历史记录
      description: 对话历史记录管理
      category: data
      type: ATOMIC
      
    - id: context-extraction
      name: 上下文提取
      description: 自动提取页面上下文
      category: ai
      type: ATOMIC
      
    - id: context-merging
      name: 上下文合并
      description: 合并多源上下文
      category: ai
      type: ATOMIC
      
    - id: intent-receiver
      name: 意图接收
      description: 接收用户对话意图
      category: driver
      type: DRIVER
      driverType: INTENT_RECEIVER

  capabilityBindings:
    - sceneCapabilityType: llm
      autoBind: true
      capabilities:
        - llm-chat
        - session-manage
        - history-record
        - context-extraction
        - context-merging

  endpoints:
    - path: /api/llm/chat
      method: POST
      description: 发送对话消息
      capability: llm-chat
      
    - path: /api/llm/chat/stream
      method: POST
      description: 流式对话
      capability: llm-chat
      
    - path: /api/llm/sessions
      method: GET
      description: 获取会话列表
      capability: session-manage
      
    - path: /api/llm/sessions/{sessionId}
      method: DELETE
      description: 删除会话
      capability: session-manage
      
    - path: /api/llm/sessions/{sessionId}/history
      method: GET
      description: 获取对话历史
      capability: history-record
      
    - path: /api/llm/providers
      method: GET
      description: 获取Provider列表
      capability: llm-chat
      
    - path: /api/llm/models
      method: GET
      description: 获取可用模型
      capability: llm-chat
      
    - path: /api/v1/llm/context/build
      method: POST
      description: 构建上下文
      capability: context-extraction

  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.llm.LlmChatSkillApplication

  config:
    required: []
    
    optional:
      - name: DEFAULT_PROVIDER
        type: string
        default: "baidu"
        description: 默认LLM Provider
      - name: DEFAULT_MODEL
        type: string
        default: "ernie-bot-4"
        description: 默认模型
      - name: MAX_TOKENS
        type: integer
        default: 4096
        description: 最大Token数
      - name: TEMPERATURE
        type: number
        default: 0.7
        description: 温度参数
      - name: STREAM_ENABLED
        type: boolean
        default: true
        description: 启用流式输出

  resources:
    cpu: "100m"
    memory: "128Mi"
    storage: "50Mi"

  offline:
    enabled: false

  knowledge:
    documents:
      - id: overview
        name: 功能概述
        path: README.md
        type: guide
        language: zh
        priority: high
        
      - id: quick-start
        name: 快速开始
        path: docs/quick-start.md
        type: guide
        language: zh
        priority: high
        
      - id: api-reference
        name: API参考
        path: docs/api-reference.md
        type: reference
        language: zh
        priority: medium
        
      - id: configuration
        name: 配置指南
        path: docs/configuration.md
        type: guide
        language: zh
        priority: medium
        
      - id: troubleshooting
        name: 故障排查
        path: docs/troubleshooting.md
        type: guide
        language: zh
        priority: low
        
      - id: faq
        name: 常见问题
        path: docs/faq.md
        type: faq
        language: zh
        priority: low
    
    ragConfig:
      enabled: true
      indexName: "skill-llm-chat-knowledge"
      embeddingModel: text-embedding-3-small
      chunkSize: 1000
      chunkOverlap: 200
      searchStrategy: hybrid
      topK: 5
      threshold: 0.7
      rerankEnabled: false

  persona:
    enabled: true
    name: 智能对话助手
    description: 专业的AI对话助手，帮助用户完成各种对话任务
    expertise:
      - 自然语言理解
      - 多轮对话
      - 上下文感知
      - 任务规划
    boundaries:
      - 不处理涉及个人隐私的敏感信息
      - 不提供医疗、法律等专业建议
      - 超出知识范围时主动说明
    tone: professional, friendly, concise
    examples:
      - question: "如何开始使用？"
        answer: "您可以通过发送消息开始对话，我会根据您的需求提供帮助。"
      - question: "支持哪些模型？"
        answer: "支持百度文心一言、OpenAI、阿里千问、DeepSeek等多种LLM模型。"

  llmAssistant:
    enabled: true
    welcomeMessage: "您好，我是智能对话助手，有什么可以帮助您的？"
    suggestedQuestions:
      - "如何配置LLM Provider？"
      - "支持哪些对话功能？"
      - "如何启用流式输出？"
    contextWindow: 10
    maxTokens: 2000
