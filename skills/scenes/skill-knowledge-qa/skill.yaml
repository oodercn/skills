apiVersion: skill.ooder.net/v1
kind: SkillPackage

metadata:
  id: skill-knowledge-qa
  name: 知识问答服务
  version: "3.0.1"
  description: 知识问答服务，提供基于知识库的智能问答能力
  author: Ooder Team
  icon: ri-question-line

spec:
  skillForm: SCENE
  
  capability:
    category: knowledge
  
  capabilities:
    - id: kb-management
      name: 知识库管理
      description: 创建、更新、删除知识库
      category: service
      autoBind: true
      
    - id: document-management
      name: 文档管理
      description: 上传、管理知识库文档
      category: service
      autoBind: true
      
    - id: kb-search
      name: 知识检索
      description: BM25语义检索
      category: ai
      autoBind: true
      
    - id: rag-retrieval
      name: RAG检索
      description: 检索增强生成
      category: ai
      autoBind: false
      
  dependencies:
    - skillId: skill-knowledge-base
      version: ">=3.0.1"
      required: true
      description: 知识库核心服务
    - skillId: skill-indexing
      version: ">=3.0.1"
      required: true
      description: 文档索引服务
    - skillId: skill-rag
      version: ">=3.0.1"
      required: false
      description: RAG检索增强（可选）
      
  scene:
    type: INTERACTIVE
    visibility: public
    name: 知识问答
    description: 知识库智能问答场景
    
  roles:
    - id: admin
      name: 知识库管理员
      description: 知识库管理员，负责知识库配置和文档管理
      required: true
      minCount: 1
      maxCount: 5
      permissions:
        - manage-kb
        - manage-documents
        - configure-search
        - view-all
    - id: editor
      name: 内容编辑
      description: 文档编辑和上传
      required: false
      minCount: 0
      maxCount: 50
      permissions:
        - upload-documents
        - edit-documents
        - view-assigned
    - id: user
      name: 知识用户
      description: 使用知识库进行检索和问答
      required: true
      minCount: 1
      maxCount: 1000
      permissions:
        - search
        - query
        - view-public
        
  activationSteps:
    admin:
      - stepId: create-kb
        step: 1
        action: create-kb
        title: 创建知识库
        description: 创建第一个知识库
        required: true
        skippable: false
        autoExecute: false
      - stepId: configure-storage
        step: 2
        action: configure-storage
        title: 配置存储
        description: 设置文档存储位置
        required: true
        skippable: false
        autoExecute: false
      - stepId: configure-llm
        step: 3
        action: configure-llm
        title: 配置LLM
        description: 配置问答使用的LLM服务
        required: false
        skippable: true
        autoExecute: false
      - stepId: invite-users
        step: 4
        action: invite-users
        title: 邀请用户
        description: 添加知识库用户
        required: false
        skippable: true
        autoExecute: false
    editor:
      - stepId: accept-invitation
        step: 1
        action: accept-invitation
        title: 接受邀请
        description: 加入知识库团队
        required: true
        skippable: false
        autoExecute: false
    user:
      - stepId: accept-invitation
        step: 1
        action: accept-invitation
        title: 接受邀请
        description: 加入知识库
        required: true
        skippable: false
        autoExecute: false
        
  menus:
    admin:
      - id: dashboard
        name: 知识概览
        icon: ri-dashboard-line
        path: /knowledge/dashboard
        order: 1
        visible: true
      - id: knowledge-bases
        name: 知识库管理
        icon: ri-database-2-line
        path: /knowledge/bases
        order: 2
        visible: true
      - id: documents
        name: 文档管理
        icon: ri-folder-line
        path: /knowledge/documents
        order: 3
        visible: true
      - id: search-config
        name: 检索配置
        icon: ri-search-line
        path: /knowledge/search-config
        order: 4
        visible: true
      - id: settings
        name: 场景设置
        icon: ri-settings-line
        path: /knowledge/settings
        order: 5
        visible: true
    editor:
      - id: my-documents
        name: 我的文档
        icon: ri-folder-line
        path: /knowledge/my-documents
        order: 1
        visible: true
      - id: upload
        name: 上传文档
        icon: ri-upload-line
        path: /knowledge/upload
        order: 2
        visible: true
    user:
      - id: search
        name: 知识检索
        icon: ri-search-line
        path: /knowledge/search
        order: 1
        visible: true
      - id: qa
        name: 智能问答
        icon: ri-question-line
        path: /knowledge/qa
        order: 2
        visible: true
        
  configSchema:
    type: object
    properties:
      storageType:
        type: string
        enum: [local, database, oss]
        default: database
        title: 存储类型
      maxDocumentSize:
        type: integer
        default: 10485760
        title: 最大文档大小(字节)
      searchTopK:
        type: integer
        default: 10
        title: 检索返回数量
      embeddingModel:
        type: string
        default: text-embedding-3-small
        title: 嵌入模型
      enableRAG:
        type: boolean
        default: true
        title: 启用RAG
        
  installOrder:
    - skill-knowledge-base
    - skill-indexing
    - skill-rag
    - skill-knowledge-qa
    
  estimatedResources:
    cpu: "500m"
    memory: "512Mi"
    storage: "1Gi"
    
  estimatedDuration: "5-10分钟"
