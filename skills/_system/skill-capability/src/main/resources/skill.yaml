apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-capability
  name: 能力管理
  version: 2.3.1
  description: 能力管理技能 - 能力注册、发现、验证、安装、激活、统计
  author: ooder Team
  license: Apache-2.0
  type: service-skill

spec:
  type: service-skill
  
  ownership: platform
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
  
  dependencies:
    - skill-common
    
  capabilities:
    - id: capability-register
      name: 能力注册
      description: 注册新能力定义
      category: orchestration
      
    - id: capability-discover
      name: 能力发现
      description: 发现和搜索能力
      category: orchestration
      
    - id: capability-install
      name: 能力安装
      description: 安装能力包
      category: orchestration
      
    - id: capability-activate
      name: 能力激活
      description: 激活能力配置
      category: orchestration
      
    - id: capability-bind
      name: 能力绑定
      description: 绑定能力到场景
      category: orchestration
      
    - id: capability-stats
      name: 能力统计
      description: 能力使用统计
      category: monitoring
      
    - id: key-management
      name: 密钥管理
      description: API密钥管理
      category: security
  
  routes:
    # Discovery APIs
    - path: /api/v1/discovery/local
      method: POST
      controller: net.ooder.skill.capability.controller.DiscoveryController
      methodName: discoverLocal
      produces: application/json
      
    - path: /api/v1/discovery/github
      method: POST
      controller: net.ooder.skill.capability.controller.DiscoveryController
      methodName: discoverFromGitHub
      produces: application/json
      
    - path: /api/v1/discovery/gitee
      method: POST
      controller: net.ooder.skill.capability.controller.DiscoveryController
      methodName: discoverFromGitee
      produces: application/json
      
    - path: /api/v1/discovery/install
      method: POST
      controller: net.ooder.skill.capability.controller.DiscoveryController
      methodName: installCapability
      produces: application/json
      
    - path: /api/v1/discovery/statistics
      method: GET
      controller: net.ooder.skill.capability.controller.DiscoveryController
      methodName: getStatistics
      produces: application/json
    
    # Capability APIs
    - path: /api/v1/capabilities
      method: GET
      controller: net.ooder.skill.capability.controller.CapabilityController
      methodName: listCapabilities
      produces: application/json
      
    - path: /api/v1/capabilities/types
      method: GET
      controller: net.ooder.skill.capability.controller.CapabilityController
      methodName: listCapabilityTypes
      produces: application/json
      
    - path: /api/v1/capabilities/{capabilityId}
      method: GET
      controller: net.ooder.skill.capability.controller.CapabilityController
      methodName: getCapability
      produces: application/json
      
    - path: /api/v1/capabilities
      method: POST
      controller: net.ooder.skill.capability.controller.CapabilityController
      methodName: createCapability
      produces: application/json
      
    - path: /api/v1/capabilities/{capabilityId}
      method: PUT
      controller: net.ooder.skill.capability.controller.CapabilityController
      methodName: updateCapability
      produces: application/json
      
    - path: /api/v1/capabilities/{capabilityId}
      method: DELETE
      controller: net.ooder.skill.capability.controller.CapabilityController
      methodName: deleteCapability
      produces: application/json
      
    - path: /api/v1/capabilities/{capabilityId}/status
      method: POST
      controller: net.ooder.skill.capability.controller.CapabilityController
      methodName: updateStatus
      produces: application/json
      
    - path: /api/v1/capabilities/{capabilityId}/bindings
      method: GET
      controller: net.ooder.skill.capability.controller.CapabilityController
      methodName: getCapabilityBindings
      produces: application/json
      
    - path: /api/v1/capabilities/bindings
      method: POST
      controller: net.ooder.skill.capability.controller.CapabilityController
      methodName: createBinding
      produces: application/json
      
    - path: /api/v1/capabilities/bindings/{bindingId}
      method: DELETE
      controller: net.ooder.skill.capability.controller.CapabilityController
      methodName: deleteBinding
      produces: application/json
      
    - path: /api/v1/capabilities/bindings/by-agent/{agentId}
      method: GET
      controller: net.ooder.skill.capability.controller.CapabilityController
      methodName: listBindingsByAgent
      produces: application/json
  
  services:
    - name: capabilityService
      interface: net.ooder.skill.capability.service.CapabilityService
      implementation: net.ooder.skill.capability.service.CapabilityServiceImpl
      singleton: true
      
    - name: capabilityBindingService
      interface: net.ooder.skill.capability.service.CapabilityBindingService
      implementation: net.ooder.skill.capability.service.CapabilityBindingServiceImpl
      singleton: true
  
  resources:
    cpu: "200m"
    memory: "256Mi"
