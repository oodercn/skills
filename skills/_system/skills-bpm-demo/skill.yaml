apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skills-bpm-demo
  name: BPM工作流示例
  version: "3.0.5"
  description: BPM工作流示例实现，演示skill-bpm的工作流操作用法
  author: ooder Team
  type: system-service
  license: MIT

spec:
  skillForm: INTERNAL
  skillCategory: SERVICE
  sceneType: AUTO
  purposes:
    - SYSTEM_TOOLS

  ownership: platform
  visibility: developer

  capability:
    address: 0x47
    category: WORKFLOW
    code: DRV_BPM_DEMO
    operations: [workflow_demo, process_operations, worklist_management, mobile_workflow]

  runtime:
    language: java
    javaVersion: "21"
    framework: spring-boot

  dependencies:
    - skill-common
    - skill-bpm
    - ooder-bpm-web

  capabilities:
    - id: workflow_demo
      name: 工作流示例
      description: 工作流操作示例
      category: demo
    - id: process_operations
      name: 流程操作
      description: 流程执行操作示例
      category: demo
    - id: worklist_management
      name: 工作列表管理
      description: 待办工作列表示例
      category: demo
    - id: mobile_workflow
      name: 移动端工作流
      description: 移动端工作流支持示例
      category: demo

  providedInterfaces:
    - id: bpm-demo
      version: "1.0"
      description: "BPM示例接口"

  config:
    optional:
      - name: AUTO_CONFIGURE
        type: boolean
        default: false
        description: 是否自动配置

  resources:
    cpu: "50m"
    memory: "128Mi"
    storage: "20Mi"
