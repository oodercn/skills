apiVersion: skill.ooder.net/v1
kind: SkillPackage

metadata:
  id: skill-protocol
  name: 协议管理技能
  version: "2.3.1"
  description: 协议管理技能，提供协议处理器注册、命令分发能力
  author: Ooder Team
  icon: ri-plug-line

spec:
  skillForm: PROVIDER

  capability:
    category: util
    code: UTIL_PROTOCOL
    operations: [parse, adapt, convert, register, dispatch]

  capabilities:
    - id: protocol-parse
      name: 协议解析
      description: 解析各种协议格式(JSON/XML/YAML/Protobuf)
      category: service
      autoBind: true
      
    - id: protocol-adapt
      name: 协议适配
      description: 适配不同协议版本和格式
      category: service
      autoBind: true
      
    - id: protocol-convert
      name: 协议转换
      description: 协议格式转换
      category: service
      autoBind: true
      
    - id: handler-registration
      name: 处理器注册
      description: 注册协议处理器
      category: service
      autoBind: false
      
    - id: command-dispatch
      name: 命令分发
      description: 分发命令到处理器
      category: service
      autoBind: false
      
  dependencies: []
  
  configSchema:
    type: object
    properties:
      defaultProtocol:
        type: string
        default: "JSON"
        title: 默认协议格式
      strictMode:
        type: boolean
        default: false
        title: 严格模式
      prettyPrint:
        type: boolean
        default: true
        title: 美化输出
        
  endpoints:
    - path: /api/protocol/parse
      method: POST
      description: 解析协议数据
      capability: protocol-parse
    - path: /api/protocol/convert
      method: POST
      description: 转换协议格式
      capability: protocol-convert
    - path: /api/protocol/adapt
      method: POST
      description: 适配协议版本
      capability: protocol-adapt
    - path: /api/protocol/serialize
      method: POST
      description: 序列化数据
      capability: protocol-parse
      
  estimatedResources:
    cpu: "50m"
    memory: "64Mi"
