apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-common
  name: 通用工具库
  version: 1.0.0
  description: 通用工具库 - 提供基础工具类、存储服务、上下文管理
  author: ooder Team
  type: system-service
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - common
    - utility
    - storage
    - context

spec:
  type: service-skill
  
  ownership: platform
  
  capability:
    address: 0x01
    category: SYS
    code: SYS_COMMON
    operations: [storage, context, utility]
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
  
  supportedSceneTypes:
    - all
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 1s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 100
  
  dependencies: []
  
  providedInterfaces:
    - id: storage-service
      version: "1.0"
      description: "存储服务接口"
    - id: context-manager
      version: "1.0"
      description: "上下文管理接口"
    - id: utility-service
      version: "1.0"
      description: "工具服务接口"
  
  capabilities:
    - id: storage
      name: 存储服务
      description: 提供键值存储、缓存管理
      category: service
    - id: context
      name: 上下文管理
      description: 提供上下文存储和检索
      category: service
    - id: utility
      name: 工具服务
      description: 提供通用工具方法
      category: service
  
  endpoints:
    - path: /api/common/storage/{key}
      method: GET
      description: 获取存储值
      capability: storage
    - path: /api/common/storage/{key}
      method: PUT
      description: 设置存储值
      capability: storage
    - path: /api/common/storage/{key}
      method: DELETE
      description: 删除存储值
      capability: storage
    - path: /api/common/context
      method: GET
      description: 获取当前上下文
      capability: context
    - path: /api/common/context
      method: PUT
      description: 更新上下文
      capability: context
  
  config:
    optional:
      - name: STORAGE_TYPE
        type: string
        default: "memory"
        description: 存储类型 (memory/file/redis)
      - name: CACHE_TTL
        type: integer
        default: 3600
        description: 缓存过期时间(秒)
      - name: MAX_CACHE_SIZE
        type: integer
        default: 10000
        description: 最大缓存条目数
  
  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "10Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: false

  knowledge:
    documents:
      - id: overview
        name: 功能概述
        path: README.md
        type: guide
        language: zh
        priority: high
    ragConfig:
      enabled: true
      indexName: "skill-common-knowledge"
      embeddingModel: text-embedding-3-small
      chunkSize: 1000
      chunkOverlap: 200
      searchStrategy: hybrid
      topK: 5
      threshold: 0.7
