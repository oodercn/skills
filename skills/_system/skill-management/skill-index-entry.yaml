apiVersion: skill.ooder.net/v1
kind: SkillIndexEntry

metadata:
  id: skill-management
  name: 技能管理服务
  version: "1.0.0"
  description: "技能管理服务 - 提供技能生命周期管理、市场管理、依赖管理能力"

spec:
  skillForm: SCENE
  sceneType: AUTO
  visibility: internal
  businessCategory: INFRASTRUCTURE
  subCategory: management
  category: SERVICE
  capabilityCategory: sys
  
  capabilityAddresses:
    required:
      - address: 0x00
        name: SYS_REGISTRY
        description: "系统注册中心"
    optional: []
  
  tags:
    - management
    - lifecycle
    - market
    - dependency
  
  dependencies:
    - skill-capability
  
  roles:
    - name: MANAGER
      displayName: 场景管理员
      minCount: 1
      maxCount: 1
      permissions: [READ, WRITE, CONFIG, DELETE]
    - name: MEMBER
      displayName: 场景成员
      minCount: 0
      maxCount: 100
      permissions: [READ, WRITE]
