server:
  port: 8086

spring:
  application:
    name: skill-management

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    net.ooder.skill.management: DEBUG
    org.springframework: INFO

skill:
  management:
    max-concurrent-executions: 10
    default-timeout: 30000
    enable-marketplace: true
