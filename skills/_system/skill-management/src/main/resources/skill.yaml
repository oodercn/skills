apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-management
  name: Skill Management
  version: 0.1.0
  description: Skill Management Module - Unified skill registration, lifecycle, and marketplace management
  author: Ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - skill
    - management
    - lifecycle
    - marketplace

spec:
  type: service-skill
  
  ownership: platform
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
  
  capabilities:
    - id: skill-registration
      name: Skill Registration
      description: 技能注册管理
      category: management
    - id: skill-lifecycle
      name: Skill Lifecycle
      description: 技能生命周期管理
      category: management
    - id: skill-marketplace
      name: Skill Marketplace
      description: 技能市场
      category: management
    - id: skill-execution
      name: Skill Execution
      description: 技能执行
      category: management
    - id: skill-rating
      name: Skill Rating
      description: 技能评分
      category: management
  
  scenes:
    - name: skill-management
      description: 技能管理场景
      capabilities:
        - skill-registration
        - skill-lifecycle
        - skill-marketplace
        - skill-execution
        - skill-rating
  
  endpoints:
    - path: /api/skill/list
      method: GET
      description: List all skills
      capability: skill-registration
    - path: /api/skill/{skillId}
      method: GET
      description: Get skill details
      capability: skill-registration
    - path: /api/skill/add
      method: POST
      description: Add a new skill
      capability: skill-registration
    - path: /api/skill/update
      method: PUT
      description: Update skill
      capability: skill-lifecycle
    - path: /api/skill/{skillId}
      method: DELETE
      description: Delete skill
      capability: skill-lifecycle
    - path: /api/skill/{skillId}/start
      method: POST
      description: Start skill
      capability: skill-execution
    - path: /api/skill/{skillId}/stop
      method: POST
      description: Stop skill
      capability: skill-execution
    - path: /api/skill/{skillId}/execute
      method: POST
      description: Execute skill
      capability: skill-execution
    - path: /api/skill/market/list
      method: GET
      description: List market skills
      capability: skill-marketplace
    - path: /api/skill/market/{skillId}/rate
      method: POST
      description: Rate skill
      capability: skill-rating
  
  config:
    optional:
      - name: MAX_CONCURRENT_EXECUTIONS
        type: integer
        default: 10
        description: Maximum concurrent skill executions
      - name: DEFAULT_TIMEOUT
        type: integer
        default: 30000
        description: Default execution timeout in milliseconds
      - name: ENABLE_MARKETPLACE
        type: boolean
        default: true
        description: Enable skill marketplace features
  
  resources:
    cpu: "200m"
    memory: "256Mi"
    storage: "100Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true
