apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-llm
  name: LLM集成
  version: 2.3.1
  description: LLM集成技能 - 大语言模型配置、监控、调用
  author: ooder Team
  license: Apache-2.0
  type: service-skill

spec:
  type: service-skill
  
  ownership: platform
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
  
  dependencies:
    - skill-common
    
  capabilities:
    - id: llm-chat
      name: LLM对话
      description: 与大语言模型进行对话
      category: ai
      
    - id: llm-stream
      name: 流式对话
      description: 流式输出对话响应
      category: ai
      
    - id: llm-config
      name: LLM配置
      description: 配置LLM提供者
      category: config
      
    - id: llm-monitor
      name: LLM监控
      description: 监控LLM调用状态
      category: monitoring
  
  scenes:
    - name: llm-workspace
      description: LLM工作区
      capabilities:
        - llm-chat
        - llm-stream
        - llm-config
        - llm-monitor
  
  routes:
    - path: /api/v1/llm/chat
      method: POST
      controller: net.ooder.skill.llm.controller.LlmController
      methodName: chat
      produces: application/json
      
    - path: /api/v1/llm/stream
      method: POST
      controller: net.ooder.skill.llm.controller.LlmController
      methodName: streamChat
      produces: text/event-stream
      
    - path: /api/v1/llm/providers
      method: GET
      controller: net.ooder.skill.llm.controller.LlmController
      methodName: listProviders
      produces: application/json
      
    - path: /api/v1/llm/providers/{providerId}
      method: GET
      controller: net.ooder.skill.llm.controller.LlmController
      methodName: getProvider
      produces: application/json
      
    - path: /api/v1/llm/providers
      method: POST
      controller: net.ooder.skill.llm.controller.LlmController
      methodName: createProvider
      produces: application/json
      
    - path: /api/v1/llm/providers/{providerId}
      method: PUT
      controller: net.ooder.skill.llm.controller.LlmController
      methodName: updateProvider
      produces: application/json
      
    - path: /api/v1/llm/providers/{providerId}
      method: DELETE
      controller: net.ooder.skill.llm.controller.LlmController
      methodName: deleteProvider
      produces: application/json
      
    - path: /api/v1/llm/providers/{providerId}/test
      method: POST
      controller: net.ooder.skill.llm.controller.LlmController
      methodName: testProvider
      produces: application/json
      
    - path: /api/v1/llm/providers/{providerId}/configure
      method: POST
      controller: net.ooder.skill.llm.controller.LlmController
      methodName: configureProvider
      produces: application/json
      
    - path: /api/v1/llm/models
      method: GET
      controller: net.ooder.skill.llm.controller.LlmController
      methodName: listModels
      produces: application/json
  
  services:
    - name: llmService
      interface: net.ooder.skill.llm.service.LlmService
      implementation: net.ooder.skill.llm.service.LlmServiceImpl
      singleton: true
      
    - name: llmProviderService
      interface: net.ooder.skill.llm.service.LlmProviderService
      implementation: net.ooder.skill.llm.service.LlmProviderServiceImpl
      singleton: true
  
  resources:
    cpu: "200m"
    memory: "256Mi"
