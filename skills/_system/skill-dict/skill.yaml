apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-dict
  name: 字典管理服务
  version: "3.0.1"
  description: 提供系统字典、枚举管理、字典缓存、字典项查询等核心能力，支持前端字典缓存预加载
  author: ooder Team
  type: system-service
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - dict
    - dictionary
    - enum
    - cache
    - metadata

spec:
  skillForm: PROVIDER
  type: system-skill

  ownership: platform

  capability:
    address: 0x05
    category: SYS
    code: SYS_DICT
    operations: [get, list, items, refresh, sync]

  runtime:
    language: java
    javaVersion: "21"
    framework: spring-boot

  supportedSceneTypes:
    - all

  dynamicSceneTypes: true

  autoStart:
    enabled: true
    delay: 0s

  autoJoin:
    enabled: true
    matchSceneTypes: true

  dependencies: []

  providedInterfaces:
    - id: dict-service
      version: "1.0"
      description: "字典管理服务接口"

  capabilities:
    - id: get
      name: 获取字典
      description: 根据字典代码获取字典详情
      category: dict
    - id: list
      name: 字典列表
      description: 获取所有字典列表
      category: dict
    - id: items
      name: 字典项列表
      description: 获取字典下的所有字典项
      category: dict
    - id: refresh
      name: 刷新缓存
      description: 刷新字典缓存
      category: dict
    - id: sync
      name: 同步字典
      description: 同步枚举类到字典
      category: dict

  endpoints:
    - path: /api/v1/dicts
      method: GET
      controllerClass: net.ooder.skill.dict.controller.DictController
      methodName: getAllDicts
      description: 获取所有字典
      capability: list
    - path: /api/v1/dicts/{code}
      method: GET
      controllerClass: net.ooder.skill.dict.controller.DictController
      methodName: getDict
      parameterTypes:
        - java.lang.String
      description: 获取字典详情
      capability: get
    - path: /api/v1/dicts/{code}/items
      method: GET
      controllerClass: net.ooder.skill.dict.controller.DictController
      methodName: getDictItems
      parameterTypes:
        - java.lang.String
      description: 获取字典项列表
      capability: items
    - path: /api/v1/dicts/{code}/items/{itemCode}
      method: GET
      controllerClass: net.ooder.skill.dict.controller.DictController
      methodName: getDictItem
      parameterTypes:
        - java.lang.String
        - java.lang.String
      description: 获取单个字典项
      capability: items
    - path: /api/v1/dicts/{code}/items/{itemCode}/name
      method: GET
      controllerClass: net.ooder.skill.dict.controller.DictController
      methodName: getDictItemName
      parameterTypes:
        - java.lang.String
        - java.lang.String
      description: 获取字典项名称
      capability: items
    - path: /api/v1/dicts/refresh
      method: POST
      controllerClass: net.ooder.skill.dict.controller.DictController
      methodName: refreshCache
      description: 刷新字典缓存
      capability: refresh

  config:
    optional:
      - name: DICT_CACHE_ENABLED
        type: boolean
        default: "true"
        description: 是否启用字典缓存
      - name: DICT_CACHE_TTL
        type: integer
        default: "3600"
        description: 字典缓存过期时间(秒)

  resources:
    cpu: "50m"
    memory: "128Mi"
    storage: "10Mi"
