apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-dict
  name: 字典管理服务
  version: 1.0.0
  description: 提供数据字典管理、字典项查询等功能
  author: ooder Team
  type: system-service
  license: Apache-2.0

spec:
  skillForm: PROVIDER
  type: system-skill
  
  ownership: platform
  
  capability:
    address: 0x2E
    category: SYS
    code: SYS_DICT
    operations: [read, refresh]
  
  runtime:
    language: java
    javaVersion: "21"
    framework: spring-boot
  
  supportedSceneTypes:
    - all
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 0s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    
  dependencies: []
  
  providedInterfaces:
    - id: dict-service
      version: "1.0"
      description: "字典服务接口"
  
  capabilities:
    - id: dict-query
      name: 字典查询
      description: 字典和字典项查询
      category: dict
  
  endpoints:
    - path: /api/v1/dicts
      method: GET
      controllerClass: net.ooder.skill.dict.controller.DictController
      methodName: getAllDicts
      description: 获取所有字典
      capability: dict-query
    - path: /api/v1/dicts/{code}
      method: GET
      controllerClass: net.ooder.skill.dict.controller.DictController
      methodName: getDict
      description: 获取字典详情
      capability: dict-query
    - path: /api/v1/dicts/{code}/items
      method: GET
      controllerClass: net.ooder.skill.dict.controller.DictController
      methodName: getDictItems
      description: 获取字典项列表
      capability: dict-query
    - path: /api/v1/dicts/{code}/items/{itemCode}
      method: GET
      controllerClass: net.ooder.skill.dict.controller.DictController
      methodName: getDictItem
      description: 获取字典项详情
      capability: dict-query
    - path: /api/v1/dicts/{code}/items/{itemCode}/name
      method: GET
      controllerClass: net.ooder.skill.dict.controller.DictController
      methodName: getDictItemName
      description: 获取字典项名称
      capability: dict-query
    - path: /api/v1/dicts/refresh
      method: POST
      controllerClass: net.ooder.skill.dict.controller.DictController
      methodName: refreshCache
      description: 刷新字典缓存
      capability: dict-query
  
  config:
    optional:
      - name: DICT_CACHE_TTL
        type: integer
        default: 3600
        description: 字典缓存时间(秒)
  
  resources:
    cpu: "30m"
    memory: "64Mi"
    storage: "10Mi"
