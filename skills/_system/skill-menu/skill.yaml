apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-menu
  name: 鑿滃崟鏉冮檺鏈嶅姟
  version: 3.0.5
  description: 鎻愪緵鑿滃崟閰嶇疆銆佽鑹茶彍鍗曘€佺敤鎴疯彍鍗曠瓑鍔熻兘 - 鍖呭惈JPA瀛樺偍椹卞姩
  author: ooder Team
  type: system-service
  license: Apache-2.0

spec:
  skillForm: PROVIDER
  type: system-skill

  ownership: platform

  storage:
    driver: jpa
    type: sqlite
    persistenceUnit: menu
    autoCreate: true
    config:
      hibernate:
        ddl-auto: update
      datasource:
        url: jdbc:sqlite:./data/menu.db
    description: JPA + SQLite 瀛樺偍椹卞姩锛岀敤浜庢寔涔呭寲鑿滃崟鏁版嵁

  drivers:
    - id: jpa
      name: JPA瀛樺偍椹卞姩
      type: storage
      description: 鍩轰簬Spring Data JPA + Hibernate鐨凷QLite瀛樺偍椹卞姩
      required: true
      version: ">=3.0.0"
      dependencies:
        - spring-boot-starter-data-jpa
        - sqlite-jdbc
        - hibernate-community-dialect
    - id: json
      name: JSON鏂囦欢瀛樺偍椹卞姩
      type: storage
      description: 鍩轰簬JSON鏂囦欢鐨勮交閲忕骇瀛樺偍椹卞姩锛堝紑鍙戜腑锛?      required: false
      version: ">=3.0.0"

  capability:
    address: 0x31
    category: SYS
    code: SYS_MENU
    operations: [create, update, delete, query, assign]

  runtime:
    language: java
    javaVersion: "21"
    framework: spring-boot

  dependencies:
    - skillId: skill-common
      version: ">=3.0.0"
      required: true
    - skillId: skills-framework
      version: ">=3.0.0"
      required: true

  endpoints:
    - path: /api/v1/menus
      method: GET
      description: 鑾峰彇鑿滃崟鍒楄〃
      capability: query
    - path: /api/v1/menus/tree
      method: GET
      description: 鑾峰彇鑿滃崟鏍?      capability: query
    - path: /api/v1/menus/{menuId}
      method: GET
      description: 鑾峰彇鑿滃崟璇︽儏
      capability: query
    - path: /api/v1/menus
      method: POST
      description: 鍒涘缓鑿滃崟
      capability: create
    - path: /api/v1/menus/{menuId}
      method: PUT
      description: 鏇存柊鑿滃崟
      capability: update
    - path: /api/v1/menus/{menuId}
      method: DELETE
      description: 鍒犻櫎鑿滃崟
      capability: delete

  config:
    optional:
      - name: MENU_CACHE_ENABLED
        type: boolean
        default: true
        description: 鏄惁鍚敤鑿滃崟缂撳瓨

  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "10Mi"
