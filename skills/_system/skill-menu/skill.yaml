apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-menu
  name: 菜单权限服务
  version: 1.0.0
  description: 提供菜单配置、角色菜单、用户菜单等功能
  author: ooder Team
  type: system-service
  license: Apache-2.0

spec:
  skillForm: PROVIDER
  type: system-skill

  ownership: platform

  capability:
    address: 0x31
    category: SYS
    code: SYS_MENU
    operations: [create, update, delete, query, assign]

  runtime:
    language: java
    javaVersion: "21"
    framework: spring-boot

  dependencies:
    - skillId: skill-role
      version: ">=1.0.0"
      required: false

  endpoints:
    # MenuController 端点
    - path: /api/v1/menus
      method: GET
      controllerClass: net.ooder.skill.menu.controller.MenuController
      methodName: listMenus
      description: 获取菜单列表
      capability: query
    - path: /api/v1/menus/tree
      method: GET
      controllerClass: net.ooder.skill.menu.controller.MenuController
      methodName: getMenuTree
      description: 获取菜单树
      capability: query
    - path: /api/v1/menus/{menuId}
      method: GET
      controllerClass: net.ooder.skill.menu.controller.MenuController
      methodName: getMenu
      parameterTypes:
        - java.lang.String
      description: 获取菜单详情
      capability: query
    - path: /api/v1/menus
      method: POST
      controllerClass: net.ooder.skill.menu.controller.MenuController
      methodName: createMenu
      parameterTypes:
        - net.ooder.skill.menu.dto.MenuItemDTO
      description: 创建菜单
      capability: create
    - path: /api/v1/menus/{menuId}
      method: PUT
      controllerClass: net.ooder.skill.menu.controller.MenuController
      methodName: updateMenu
      parameterTypes:
        - java.lang.String
        - net.ooder.skill.menu.dto.MenuItemDTO
      description: 更新菜单
      capability: update
    - path: /api/v1/menus/{menuId}
      method: DELETE
      controllerClass: net.ooder.skill.menu.controller.MenuController
      methodName: deleteMenu
      parameterTypes:
        - java.lang.String
      description: 删除菜单
      capability: delete
    - path: /api/v1/menus/{menuId}/move
      method: POST
      controllerClass: net.ooder.skill.menu.controller.MenuController
      methodName: moveMenu
      parameterTypes:
        - java.lang.String
        - java.lang.String
        - int
      description: 移动菜单
      capability: update
    - path: /api/v1/roles/{roleId}/menus
      method: GET
      controllerClass: net.ooder.skill.menu.controller.MenuController
      methodName: getRoleMenus
      parameterTypes:
        - java.lang.String
      description: 获取角色菜单
      capability: query
    - path: /api/v1/roles/{roleId}/menus
      method: PUT
      controllerClass: net.ooder.skill.menu.controller.MenuController
      methodName: setRoleMenus
      parameterTypes:
        - java.lang.String
        - java.util.List
      description: 设置角色菜单
      capability: assign
    - path: /api/v1/users/{userId}/menus
      method: GET
      controllerClass: net.ooder.skill.menu.controller.MenuController
      methodName: getUserMenus
      parameterTypes:
        - java.lang.String
      description: 获取用户菜单
      capability: query
    # SceneMenuController 端点
    - path: /api/v1/scene-menu/config
      method: GET
      controllerClass: net.ooder.skill.menu.controller.SceneMenuController
      methodName: getMenuConfig
      description: 获取场景菜单配置
      capability: query
    - path: /api/v1/scene-menu/library
      method: GET
      controllerClass: net.ooder.skill.menu.controller.SceneMenuController
      methodName: getMenuLibrary
      description: 获取场景菜单库
      capability: query
    - path: /api/v1/scene-menu/roles/{roleId}/menu-tree
      method: GET
      controllerClass: net.ooder.skill.menu.controller.SceneMenuController
      methodName: getRoleMenuTree
      parameterTypes:
        - java.lang.String
      description: 获取角色菜单树
      capability: query
    - path: /api/v1/scene-menu/roles/{roleId}/menus
      method: GET
      controllerClass: net.ooder.skill.menu.controller.SceneMenuController
      methodName: getRoleMenus
      parameterTypes:
        - java.lang.String
      description: 获取角色菜单列表
      capability: query
    - path: /api/v1/scene-menu/roles/{roleId}/menus
      method: PUT
      controllerClass: net.ooder.skill.menu.controller.SceneMenuController
      methodName: setRoleMenus
      parameterTypes:
        - java.lang.String
        - java.util.List
      description: 设置角色菜单
      capability: assign
    - path: /api/v1/scene-menu/roles/{roleId}/menus/{parentId}/children
      method: POST
      controllerClass: net.ooder.skill.menu.controller.SceneMenuController
      methodName: addChildMenu
      parameterTypes:
        - java.lang.String
        - java.lang.String
        - net.ooder.skill.menu.dto.MenuItemDTO
      description: 添加子菜单
      capability: create
    - path: /api/v1/scene-menu/roles/{roleId}/menus/{menuId}
      method: PUT
      controllerClass: net.ooder.skill.menu.controller.SceneMenuController
      methodName: updateMenu
      parameterTypes:
        - java.lang.String
        - java.lang.String
        - net.ooder.skill.menu.dto.MenuItemDTO
      description: 更新菜单
      capability: update
    - path: /api/v1/scene-menu/roles/{roleId}/menus/{menuId}/tree
      method: DELETE
      controllerClass: net.ooder.skill.menu.controller.SceneMenuController
      methodName: deleteMenuTree
      parameterTypes:
        - java.lang.String
        - java.lang.String
      description: 删除菜单树
      capability: delete
    - path: /api/v1/scene-menu/roles/{roleId}/menus/{menuId}/move
      method: PUT
      controllerClass: net.ooder.skill.menu.controller.SceneMenuController
      methodName: moveMenu
      parameterTypes:
        - java.lang.String
        - java.lang.String
        - java.lang.String
        - int
      description: 移动菜单
      capability: update
    - path: /api/v1/scene-menu/users/{userId}/menus
      method: GET
      controllerClass: net.ooder.skill.menu.controller.SceneMenuController
      methodName: getUserMenus
      parameterTypes:
        - java.lang.String
      description: 获取用户菜单
      capability: query
    - path: /api/v1/scene-menu/users/{userId}/menus
      method: PUT
      controllerClass: net.ooder.skill.menu.controller.SceneMenuController
      methodName: setUserMenus
      parameterTypes:
        - java.lang.String
        - java.util.List
      description: 设置用户菜单
      capability: assign
    - path: /api/v1/scene-menu/export
      method: GET
      controllerClass: net.ooder.skill.menu.controller.SceneMenuController
      methodName: exportConfig
      description: 导出配置
      capability: query
    - path: /api/v1/scene-menu/import
      method: POST
      controllerClass: net.ooder.skill.menu.controller.SceneMenuController
      methodName: importConfig
      parameterTypes:
        - java.lang.String
      description: 导入配置
      capability: create

  config:
    optional:
      - name: MENU_CACHE_ENABLED
        type: boolean
        default: true
        description: 是否启用菜单缓存

  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "10Mi"
