apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-llm-chat
  name: LLM鑱婂ぉ鍔╂墜
  version: 3.0.5
  description: LLM鑱婂ぉ鍔╂墜 - 鍐呯疆鐭ヨ瘑璧勬枡搴撳姛鑳斤紝鏀寔澶氳疆瀵硅瘽鍜岀煡璇嗘绱?
  author: ooder Team
  license: Apache-2.0
  type: service-skill

spec:
  skillForm: PROVIDER
  type: service-skill
  
  ownership: platform
  
  capability:
    category: llm
    code: LLM_CHAT
    operations: [chat, stream, function-calling, knowledge-base]

  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
  
  dependencies:
    - skillId: skill-common
      version: ">=1.0.0"
      required: false
    - skillId: skill-llm-base
      version: ">=1.0.0"
      required: false

  llmConfig:
    required: true
    defaultProvider: "deepseek"
    defaultModel: "deepseek-chat"
    capabilities:
      - chat
      - streaming
      - function-calling
    modelSelection:
      allowUserOverride: true
      availableProviders:
        - deepseek
        - openai
        - qianwen
        - volcengine
        - ollama
    functionCalling:
      enabled: true
      tools:
        - name: query_skill_capability
          description: "鏌ヨ褰撳墠鎶€鑳界殑鑳藉姏鍜屼娇鐢ㄦ柟娉?
          parameters:
            type: object
            properties:
              capability:
                type: string
                description: "鑳藉姏鍚嶇О"
              detail:
                type: string
                enum: [brief, detailed, examples]
                default: "brief"
        - name: execute_mvel_action
          description: "閫氳繃MVEL琛ㄨ揪寮忔墽琛屽悗鍙版搷浣?
          parameters:
            type: object
            properties:
              expression:
                type: string
                description: "MVEL琛ㄨ揪寮?
              context:
                type: object
                description: "鎵ц涓婁笅鏂?
        - name: generate_ui_form
          description: "鐢熸垚UI琛ㄥ崟渚涚敤鎴峰～鍐?
          parameters:
            type: object
            properties:
              formType:
                type: string
                description: "琛ㄥ崟绫诲瀷"
              fields:
                type: array
                items:
                  type: object
                description: "琛ㄥ崟瀛楁瀹氫箟"
        - name: execute_batch_operation
          description: "鎵ц鎵归噺鎿嶄綔"
          parameters:
            type: object
            properties:
              operation:
                type: string
                description: "鎿嶄綔绫诲瀷"
              items:
                type: array
                items:
                  type: object
                description: "鎿嶄綔椤瑰垪琛?
        - name: convert_to_javascript
          description: "杞崲涓篔avaScript浠ｇ爜渚涚敤鎴蜂娇鐢?
          parameters:
            type: object
            properties:
              action:
                type: string
                description: "瑕佹墽琛岀殑鍔ㄤ綔"
              parameters:
                type: object
                description: "鍔ㄤ綔鍙傛暟"
      toolChoice: auto
    embedding:
      required: true
      defaultModel: "text-embedding-3-small"
      dimension: 1536
    rateLimits:
      requestsPerMinute: 60
      tokensPerMinute: 100000

  capabilities:
    - id: llm-chat
      name: LLM鑱婂ぉ
      description: 鏀寔澶氳疆瀵硅瘽鐨凩LM鑱婂ぉ鍔熻兘
      category: ai
      
    - id: knowledge-base
      name: 鐭ヨ瘑璧勬枡搴?
      description: 鍐呯疆鐭ヨ瘑璧勬枡搴擄紝鏀寔鏂囨。涓婁紶鍜岀煡璇嗘绱?
      category: knowledge
      
    - id: rag-retrieval
      name: RAG妫€绱?
      description: 鍩轰簬鐭ヨ瘑搴撶殑妫€绱㈠寮虹敓鎴?
      category: ai
  
  routes:
    - path: /api/v1/chat/sessions
      method: GET
      controller: net.ooder.skill.chat.controller.ChatController
      methodName: listSessions
      produces: application/json
      
    - path: /api/v1/chat/sessions
      method: POST
      controller: net.ooder.skill.chat.controller.ChatController
      methodName: createSession
      produces: application/json
      
    - path: /api/v1/chat/sessions/{sessionId}
      method: GET
      controller: net.ooder.skill.chat.controller.ChatController
      methodName: getSession
      produces: application/json
      
    - path: /api/v1/chat/sessions/{sessionId}
      method: DELETE
      controller: net.ooder.skill.chat.controller.ChatController
      methodName: deleteSession
      produces: application/json
      
    - path: /api/v1/chat/sessions/{sessionId}/messages
      method: GET
      controller: net.ooder.skill.chat.controller.ChatController
      methodName: getMessages
      produces: application/json
      
    - path: /api/v1/chat/sessions/{sessionId}/messages
      method: POST
      controller: net.ooder.skill.chat.controller.ChatController
      methodName: sendMessage
      produces: application/json
      
    - path: /api/v1/knowledge/documents
      method: GET
      controller: net.ooder.skill.chat.controller.KnowledgeController
      methodName: listDocuments
      produces: application/json
      
    - path: /api/v1/knowledge/documents
      method: POST
      controller: net.ooder.skill.chat.controller.KnowledgeController
      methodName: uploadDocument
      produces: application/json
      
    - path: /api/v1/knowledge/documents/{docId}
      method: DELETE
      controller: net.ooder.skill.chat.controller.KnowledgeController
      methodName: deleteDocument
      produces: application/json
      
    - path: /api/v1/knowledge/search
      method: POST
      controller: net.ooder.skill.chat.controller.KnowledgeController
      methodName: searchKnowledge
      produces: application/json
      
    - path: /api/v1/chat/sessions/{sessionId}/messages/stream
      method: POST
      controller: net.ooder.skill.chat.controller.ChatController
      methodName: sendMessageStream
      produces: text/event-stream
      
    # Context APIs
    - path: /api/v1/context/initialize
      method: POST
      controller: net.ooder.skill.chat.controller.SkillsContextController
      methodName: initializeContext
      produces: application/json
      
    - path: /api/v1/context/identity/{userId}
      method: GET
      controller: net.ooder.skill.chat.controller.SkillsContextController
      methodName: getUserIdentity
      produces: application/json
      
    - path: /api/v1/context/module/{skillId}
      method: GET
      controller: net.ooder.skill.chat.controller.SkillsContextController
      methodName: getModuleInfo
      produces: application/json
      
    - path: /api/v1/context/current/{sessionId}
      method: GET
      controller: net.ooder.skill.chat.controller.SkillsContextController
      methodName: getCurrentModuleContext
      produces: application/json
      
    - path: /api/v1/context/register
      method: POST
      controller: net.ooder.skill.chat.controller.SkillsContextController
      methodName: registerSkillContext
      produces: application/json
      
    - path: /api/v1/context/page-state
      method: POST
      controller: net.ooder.skill.chat.controller.SkillsContextController
      methodName: updatePageState
      produces: application/json
      
    - path: /api/v1/context/page-state/{sessionId}/{module}
      method: GET
      controller: net.ooder.skill.chat.controller.SkillsContextController
      methodName: getPageState
      produces: application/json
      
    - path: /api/v1/context/knowledge
      method: POST
      controller: net.ooder.skill.chat.controller.SkillsContextController
      methodName: getKnowledgeContext
      produces: application/json
      
    - path: /api/v1/context/system-prompt
      method: POST
      controller: net.ooder.skill.chat.controller.SkillsContextController
      methodName: buildSystemPrompt
      produces: application/json

    - path: /api/v1/llm/chat
      method: POST
      controller: net.ooder.skill.llm.chat.controller.LlmChatController
      methodName: chat
      produces: application/json

    - path: /api/v1/llm/chat/stream
      method: GET
      controller: net.ooder.skill.llm.chat.controller.LlmChatController
      methodName: chatStream
      produces: text/event-stream

    - path: /api/v1/llm/chat/stream
      method: POST
      controller: net.ooder.skill.llm.chat.controller.LlmChatController
      methodName: chatStreamPost
      produces: text/event-stream

    - path: /api/v1/llm/chat/providers
      method: GET
      controller: net.ooder.skill.llm.chat.controller.LlmChatController
      methodName: getProviders
      produces: application/json

    - path: /api/v1/llm/chat/models
      method: GET
      controller: net.ooder.skill.llm.chat.controller.LlmChatController
      methodName: getModels
      produces: application/json

    - path: /api/v1/llm/chat/models/set
      method: POST
      controller: net.ooder.skill.llm.chat.controller.LlmChatController
      methodName: setModel
      produces: application/json

    - path: /api/v1/llm/chat/sessions
      method: GET
      controller: net.ooder.skill.llm.chat.controller.LlmChatController
      methodName: getSessions
      produces: application/json

    - path: /api/v1/llm/chat/sessions/{sessionId}
      method: DELETE
      controller: net.ooder.skill.llm.chat.controller.LlmChatController
      methodName: deleteSession
      produces: application/json

    - path: /api/v1/llm/chat/sessions/{sessionId}/history
      method: GET
      controller: net.ooder.skill.llm.chat.controller.LlmChatController
      methodName: getSessionHistory
      produces: application/json

    - path: /api/v1/llm/chat/health
      method: GET
      controller: net.ooder.skill.llm.chat.controller.LlmChatController
      methodName: health
      produces: application/json

    - path: /api/v1/llm/chat/model/{providerId}/{modelId}
      method: GET
      controller: net.ooder.skill.llm.chat.controller.LlmChatController
      methodName: getModelDetail
      produces: application/json

  services:
    - name: llmServiceProvider
      interface: net.ooder.skill.llm.chat.service.LLMServiceProvider
      implementation: net.ooder.skill.llm.chat.service.LLMService
      singleton: true

    - name: chatService
      interface: net.ooder.skill.chat.service.ChatService
      implementation: net.ooder.skill.chat.service.impl.ChatServiceImpl
      singleton: true
      
    - name: knowledgeService
      interface: net.ooder.skill.chat.service.KnowledgeService
      implementation: net.ooder.skill.chat.service.impl.KnowledgeServiceImpl
      singleton: true
  
  resources:
    cpu: "200m"
    memory: "512Mi"
