<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - ooderAgent</title>
    <link rel="stylesheet" href="../css/remixicon/remixicon.css">
    <link rel="stylesheet" href="../css/nexus.css">
    <link rel="stylesheet" href="../css/pages/agent-pages.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-page__sidebar-header">
                <div class="nx-page__sidebar-brand">
                    <h1><i class="ri-hexagon-fill"></i> ooderAgent</h1>
                </div>
            </div>
            <nav class="nav-menu" id="nav-menu">
            </nav>
        </aside>

        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle aria-label="切换侧边栏">
                        <i class="ri-menu-line"></i>
                    </button>
                    <div class="nx-page__title">
                        <h1><i class="ri-dashboard-line" aria-hidden="true"></i> 仪表盘</h1>
                        <p>系统概览与数据统计</p>
                    </div>
                </div>
                <div class="nx-page__actions">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" id="refreshBtn" title="刷新">
                        <i class="ri-refresh-line"></i>
                    </button>
                    <div class="nx-relative">
                        <div class="nx-page__user-menu" id="user-menu">
                            <div class="nx-page__user-avatar" id="user-avatar">U</div>
                            <span class="nx-page__user-name" id="user-name">加载中...</span>
                            <i class="ri-arrow-down-s-line"></i>
                        </div>
                    </div>
                </div>
            </header>

            <div class="nx-page__main">
                <div class="dashboard-container">
                    <div class="dashboard-header">
                        <div class="welcome-section">
                            <h2>欢迎回来</h2>
                            <p class="timestamp" id="timestamp"></p>
                        </div>
                    </div>

                    <div class="dashboard-stats" id="dashboard-stats">
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--primary">
                                <i class="ri-stack-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">已安装技能</div>
                                <div class="nx-stat-card__value" id="skill-count">-</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--success">
                                <i class="ri-folder-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">活跃场景</div>
                                <div class="nx-stat-card__value" id="scene-count">-</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--warning">
                                <i class="ri-task-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">待处理任务</div>
                                <div class="nx-stat-card__value" id="todo-count">-</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--info">
                                <i class="ri-percent-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">执行成功率</div>
                                <div class="nx-stat-card__value" id="execution-success-rate">-</div>
                            </div>
                        </div>
                    </div>

                    <div class="dashboard-grid">
                        <section class="nx-card">
                            <div class="nx-card__header">
                                <h3><i class="ri-history-line"></i> 最近活动</h3>
                            </div>
                            <div class="nx-card__body">
                                <div class="activity-list" id="recent-activities">
                                    <div class="loading-placeholder">加载中...</div>
                                </div>
                            </div>
                        </section>

                        <section class="nx-card">
                            <div class="nx-card__header nx-flex nx-justify-between nx-items-center">
                                <h3><i class="ri-folder-line"></i> 我的场景</h3>
                                <a href="./my-scenes.html" class="nx-link">查看全部</a>
                            </div>
                            <div class="nx-card__body">
                                <div class="scene-list" id="my-scenes">
                                    <div class="loading-placeholder">加载中...</div>
                                </div>
                            </div>
                        </section>

                        <section class="nx-card">
                            <div class="nx-card__header nx-flex nx-justify-between nx-items-center">
                                <h3><i class="ri-task-line"></i> 待办事项</h3>
                                <a href="./my-todos.html" class="nx-link">查看全部</a>
                            </div>
                            <div class="nx-card__body">
                                <div class="todo-list" id="pending-todos">
                                    <div class="loading-placeholder">加载中...</div>
                                </div>
                            </div>
                        </section>

                        <section class="nx-card">
                            <div class="nx-card__header">
                                <h3><i class="ri-bar-chart-line"></i> 系统状态</h3>
                            </div>
                            <div class="nx-card__body">
                                <div class="system-status" id="system-status">
                                    <div class="status-item">
                                        <span class="status-label">CPU 使用率</span>
                                        <div class="nx-progress">
                                            <div class="nx-progress__bar" id="cpu-usage" style="width: 0%"></div>
                                        </div>
                                        <span class="status-value" id="cpu-value">0%</span>
                                    </div>
                                    <div class="status-item">
                                        <span class="status-label">内存使用率</span>
                                        <div class="nx-progress">
                                            <div class="nx-progress__bar" id="memory-usage" style="width: 0%"></div>
                                        </div>
                                        <span class="status-value" id="memory-value">0%</span>
                                    </div>
                                    <div class="status-item">
                                        <span class="status-label">磁盘使用率</span>
                                        <div class="nx-progress">
                                            <div class="nx-progress__bar" id="disk-usage" style="width: 0%"></div>
                                        </div>
                                        <span class="status-value" id="disk-value">0%</span>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/nexus.js?v=4"></script>
    <script src="../js/menu.js?v=4"></script>
    <script src="../js/api-client.js?v=4"></script>
    <script src="../js/page-init.js?v=4" data-auto-init></script>
    <script src="../js/pages/dashboard.js?v=4"></script>
    <style>
    .dashboard-container {
        padding: 0;
        max-width: 1400px;
        margin: 0 auto;
    }

    .dashboard-header {
        margin-bottom: 24px;
    }

    .welcome-section h2 {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 4px;
    }

    .timestamp {
        color: var(--nx-text-secondary);
        font-size: 14px;
    }

    .dashboard-stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 24px;
    }

    .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
    }

    .activity-list, .scene-list, .todo-list {
        max-height: 300px;
        overflow-y: auto;
    }

    .activity-item {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid var(--nx-border);
    }

    .activity-item:last-child {
        border-bottom: none;
    }

    .activity-icon {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--nx-bg-elevated);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
    }

    .activity-content {
        flex: 1;
    }

    .activity-text {
        font-size: 14px;
        margin-bottom: 2px;
    }

    .activity-time {
        font-size: 12px;
        color: var(--nx-text-secondary);
    }

    .scene-item, .todo-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        background: var(--nx-bg-elevated);
        border-radius: 8px;
        margin-bottom: 8px;
        border: 1px solid var(--nx-border);
    }

    .scene-item:hover, .todo-item:hover {
        border-color: var(--nx-primary);
    }

    .system-status {
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .status-item {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .status-label {
        width: 100px;
        font-size: 14px;
        color: var(--nx-text-secondary);
    }

    .status-value {
        width: 50px;
        text-align: right;
        font-size: 14px;
        font-weight: 500;
    }

    .loading-placeholder {
        text-align: center;
        padding: 40px;
        color: var(--nx-text-secondary);
    }

    @media (max-width: 1200px) {
        .dashboard-stats {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (max-width: 900px) {
        .dashboard-grid {
            grid-template-columns: 1fr;
        }
    }

    @media (max-width: 600px) {
        .dashboard-stats {
            grid-template-columns: 1fr;
        }
    }
    </style>
</body>
</html>
