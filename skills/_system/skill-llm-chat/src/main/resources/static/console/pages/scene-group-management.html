<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>场景组管理 - Apex OS</title>
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <link rel="stylesheet" href="/console/css/nx-page.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold">
                    <i class="ri-server-line"></i> Apex OS
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle aria-label="切换侧边栏">
                        <i class="ri-menu-line"></i>
                    </button>
                    <div class="nx-page__title">
                        <h1><i class="ri-folder-line" aria-hidden="true"></i> 场景组管理</h1>
                        <p>管理场景组，配置分发策略</p>
                    </div>
                </div>
                <div class="nx-page__actions">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle aria-label="切换主题">
                        <i class="ri-sun-line"></i>
                    </button>
                    <div class="nx-relative">
                        <div class="nx-page__user-menu" id="user-menu">
                            <div class="nx-page__user-avatar" id="user-avatar">U</div>
                            <span class="nx-page__user-name" id="user-name">加载中...</span>
                            <i class="ri-arrow-down-s-line"></i>
                        </div>
                        <div class="nx-page__dropdown-menu" id="user-dropdown">
                            <div class="nx-page__dropdown-item" onclick="window.location.href='my-profile.html'">
                                <i class="ri-user-line"></i> 个人中心
                            </div>
                            <div class="nx-page__dropdown-item" onclick="window.location.href='my-capabilities.html'">
                                <i class="ri-puzzle-line"></i> 我的能力
                            </div>
                            <div class="nx-page__dropdown-item nx-page__dropdown-item--danger" onclick="NX.userMenu.logout()">
                                <i class="ri-logout-box-line"></i> 退出登录
                            </div>
                        </div>
                    </div>
                    <button class="nx-btn nx-btn--primary" onclick="createSceneGroup()">
                        <i class="ri-add-line"></i> 创建场景组
                    </button>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="nx-grid nx-grid-cols-4 nx-mb-4">
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon"><i class="ri-folder-line"></i></div>
                            <div class="nx-stat-card__content">
                                <h4>场景组总数</h4>
                                <p class="nx-stat-card__value" id="total-groups">0</p>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon" style="background: var(--nx-success-light); color: var(--nx-success);"><i class="ri-play-circle-line"></i></div>
                            <div class="nx-stat-card__content">
                                <h4>活跃场景组</h4>
                                <p class="nx-stat-card__value" id="active-groups">0</p>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon" style="background: var(--nx-info-light); color: var(--nx-info);"><i class="ri-user-line"></i></div>
                            <div class="nx-stat-card__content">
                                <h4>总成员数</h4>
                                <p class="nx-stat-card__value" id="total-members">0</p>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon" style="background: var(--nx-warning-light); color: var(--nx-warning);"><i class="ri-link"></i></div>
                            <div class="nx-stat-card__content">
                                <h4>能力绑定数</h4>
                                <p class="nx-stat-card__value" id="total-bindings">0</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="nx-card">
                        <div class="nx-card__header nx-flex nx-items-center nx-justify-between">
                            <h3>场景组列表</h3>
                            <div class="nx-flex nx-gap-2">
                                <select class="nx-select" id="template-filter" onchange="filterByTemplate()">
                                    <option value="">全部模板</option>
                                </select>
                                <select class="nx-select" id="status-filter" onchange="filterByStatus()">
                                    <option value="">全部状态</option>
                                    <option value="ACTIVE">活跃</option>
                                    <option value="SUSPENDED">已暂停</option>
                                    <option value="CREATING">创建中</option>
                                </select>
                                <button class="nx-btn nx-btn--secondary" onclick="refreshSceneGroups()">
                                    <i class="ri-refresh-line"></i> 刷新
                                </button>
                            </div>
                        </div>
                        <div class="nx-card__body">
                            <div id="scene-group-list">
                                <div class="nx-flex nx-items-center nx-justify-center nx-p-8">
                                    <i class="ri-loader-4-line ri-spin" style="font-size: 24px;"></i>
                                    <span class="nx-ml-2">加载中...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="nx-modal" id="scene-group-modal">
        <div class="nx-modal__overlay" onclick="closeModal()"></div>
        <div class="nx-modal__content" style="max-width: 600px;">
            <div class="nx-modal__header">
                <h3 id="modal-title">创建场景组</h3>
                <button class="nx-btn nx-btn--ghost nx-btn--icon" onclick="closeModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="nx-modal__body">
                <form id="scene-group-form">
                    <input type="hidden" id="group-id">
                    <div class="nx-form-group">
                        <label class="nx-form-label">场景组名称 <span class="nx-text-danger">*</span></label>
                        <input type="text" class="nx-input" id="group-name" required>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">选择模板 <span class="nx-text-danger">*</span></label>
                        <select class="nx-select" id="group-template" required>
                            <option value="">请选择模板</option>
                        </select>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">描述</label>
                        <textarea class="nx-textarea" id="group-description" rows="3"></textarea>
                    </div>
                    <div class="nx-grid nx-grid-cols-2 nx-gap-4">
                        <div class="nx-form-group">
                            <label class="nx-form-label">最小成员数</label>
                            <input type="number" class="nx-input" id="min-members" value="1" min="1">
                        </div>
                        <div class="nx-form-group">
                            <label class="nx-form-label">最大成员数</label>
                            <input type="number" class="nx-input" id="max-members" value="100" min="1">
                        </div>
                    </div>
                </form>
            </div>
            <div class="nx-modal__footer">
                <button class="nx-btn nx-btn--secondary" onclick="closeModal()">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="saveSceneGroup()">保存</button>
            </div>
        </div>
    </div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/api.js"></script>
    <script src="/console/js/pages/scene-group-management.js"></script>
</body>
</html>
