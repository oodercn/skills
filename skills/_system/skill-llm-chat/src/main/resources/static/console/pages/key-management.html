<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密钥管理 - Skill Scene</title>
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <link rel="stylesheet" href="/console/css/pages/key-management.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold" style="display: flex; align-items: center; gap: 8px;">
                    <i class="ri-apps-line"></i> Skill Scene
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle aria-label="切换侧边栏">
                        <i class="ri-menu-line"></i>
                    </button>
                    <div class="nx-page__title">
                        <h1><i class="ri-key-2-line" aria-hidden="true"></i> 密钥管理</h1>
                        <p>管理系统密钥和访问凭证</p>
                    </div>
                </div>
                <div class="nx-page__actions">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle aria-label="切换主题">
                        <i class="ri-sun-line"></i>
                    </button>
                    <div class="nx-relative">
                        <div class="nx-page__user-menu" id="user-menu">
                            <div class="nx-page__user-avatar" id="user-avatar">U</div>
                            <span class="nx-page__user-name" id="user-name">加载中...</span>
                            <i class="ri-arrow-down-s-line"></i>
                        </div>
                        <div class="nx-page__dropdown-menu" id="user-dropdown">
                            <div class="nx-page__dropdown-item" onclick="window.location.href='my-profile.html'">
                                <i class="ri-user-line"></i> 个人中心
                            </div>
                            <div class="nx-page__dropdown-item" onclick="window.location.href='my-capabilities.html'">
                                <i class="ri-puzzle-line"></i> 我的能力
                            </div>
                            <div class="nx-page__dropdown-item nx-page__dropdown-item--danger" onclick="NX.userMenu.logout()">
                                <i class="ri-logout-box-line"></i> 退出登录
                            </div>
                        </div>
                    </div>
                    <button class="nx-btn nx-btn--primary" onclick="showCreateModal()">
                        <i class="ri-add-line"></i> 创建密钥
                    </button>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="stats-cards">
                        <div class="stat-card">
                            <h4>总密钥数</h4>
                            <div class="value" id="totalKeys">0</div>
                        </div>
                        <div class="stat-card">
                            <h4>激活密钥</h4>
                            <div class="value" id="activeKeys">0</div>
                        </div>
                        <div class="stat-card">
                            <h4>今日使用</h4>
                            <div class="value" id="todayUsage">0</div>
                        </div>
                        <div class="stat-card">
                            <h4>即将过期</h4>
                            <div class="value" id="expiringKeys">0</div>
                        </div>
                    </div>

                    <div class="filter-bar">
                        <select id="typeFilter" onchange="loadKeys()">
                            <option value="">所有类型</option>
                        </select>
                        <select id="statusFilter" onchange="loadKeys()">
                            <option value="">所有状态</option>
                            <option value="ACTIVE">激活</option>
                            <option value="INACTIVE">未激活</option>
                            <option value="EXPIRED">已过期</option>
                            <option value="REVOKED">已撤销</option>
                        </select>
                        <input type="text" id="searchInput" placeholder="搜索密钥名称..." onkeyup="loadKeys()">
                    </div>

                    <div id="keyList"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="createModal" class="nx-modal">
        <div class="nx-modal__content" style="width: 500px;">
            <div class="nx-modal__header">
                <h3>创建密钥</h3>
                <button class="nx-btn nx-btn--ghost nx-btn--icon" onclick="hideCreateModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <form id="createForm" onsubmit="createKey(event)">
                <div class="nx-modal__body">
                    <div class="form-group">
                        <label>密钥名称</label>
                        <input type="text" id="keyName" required placeholder="例如: OpenAI API Key">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>密钥类型</label>
                            <select id="keyType" required>
                                <option value="">请选择类型</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>服务提供商</label>
                            <input type="text" id="provider" placeholder="例如: OpenAI, Aliyun">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>密钥值</label>
                        <input type="password" id="rawValue" required placeholder="输入密钥值">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>过期时间</label>
                            <input type="datetime-local" id="expiresAt">
                        </div>
                        <div class="form-group">
                            <label>最大使用次数</label>
                            <input type="number" id="maxUseCount" placeholder="-1表示无限制">
                        </div>
                    </div>
                </div>
                <div class="nx-modal__footer">
                    <button type="button" class="nx-btn nx-btn--secondary" onclick="hideCreateModal()">取消</button>
                    <button type="submit" class="nx-btn nx-btn--primary">创建</button>
                </div>
            </form>
        </div>
    </div>

    <div id="detailModal" class="nx-modal">
        <div class="nx-modal__content" style="width: 600px;">
            <div class="nx-modal__header">
                <h3>密钥详情</h3>
                <button class="nx-btn nx-btn--ghost nx-btn--icon" onclick="hideDetailModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="nx-modal__body" id="detailContent"></div>
            <div class="nx-modal__footer">
                <button type="button" class="nx-btn nx-btn--secondary" onclick="hideDetailModal()">关闭</button>
            </div>
        </div>
    </div>

    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/api-client.js"></script>
    <script src="/console/js/menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/api.js"></script>
    <script src="/console/js/utils/dict-cache.js"></script>
    <script src="/console/js/pages/key-management.js"></script>
</body>
</html>
