<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作台 - ooderAgent</title>
    <link rel="stylesheet" href="../css/remixicon/remixicon.css">
    <link rel="stylesheet" href="../css/nexus.css">
    <link rel="stylesheet" href="../css/pages/workbench.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-page__sidebar-header">
                <div class="nx-page__sidebar-brand">
                    <h1><i class="ri-hexagon-fill"></i> ooderAgent</h1>
                </div>
            </div>
            <nav class="nav-menu" id="nav-menu">
            </nav>
        </aside>

        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle aria-label="切换侧边栏">
                        <i class="ri-menu-line"></i>
                    </button>
                    <div class="nx-page__title">
                        <h1><i class="ri-dashboard-line" aria-hidden="true"></i> 工作台</h1>
                        <p>场景与待办总览</p>
                    </div>
                </div>
                <div class="nx-page__actions">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" id="refreshBtn" title="刷新">
                        <i class="ri-refresh-line"></i>
                    </button>
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" id="notificationBtn" title="通知">
                        <i class="ri-notification-3-line"></i>
                        <span class="nx-badge nx-badge--danger" id="notificationBadge" style="display:none;">0</span>
                    </button>
                    <div class="nx-relative">
                        <div class="nx-page__user-menu" id="user-menu">
                            <div class="nx-page__user-avatar" id="user-avatar">U</div>
                            <span class="nx-page__user-name" id="user-name">加载中...</span>
                            <i class="ri-arrow-down-s-line"></i>
                        </div>
                    </div>
                </div>
            </header>

            <div class="nx-page__main">
                <div class="workbench-container">
                    <section class="stats-section">
                        <div class="stats-grid">
                            <div class="stat-card active-scenes">
                                <div class="stat-icon">
                                    <i class="ri-folder-line"></i>
                                </div>
                                <div class="stat-content">
                                    <div class="stat-value" id="activeSceneCount">-</div>
                                    <div class="stat-label">进行中场景</div>
                                </div>
                            </div>
                            <div class="stat-card pending-todos">
                                <div class="stat-icon">
                                    <i class="ri-task-line"></i>
                                </div>
                                <div class="stat-content">
                                    <div class="stat-value" id="pendingTodoCount">-</div>
                                    <div class="stat-label">待处理待办</div>
                                </div>
                            </div>
                            <div class="stat-card high-priority">
                                <div class="stat-icon">
                                    <i class="ri-fire-line"></i>
                                </div>
                                <div class="stat-content">
                                    <div class="stat-value" id="highPriorityCount">-</div>
                                    <div class="stat-label">高优先级</div>
                                </div>
                            </div>
                            <div class="stat-card due-today">
                                <div class="stat-icon">
                                    <i class="ri-time-line"></i>
                                </div>
                                <div class="stat-content">
                                    <div class="stat-value" id="dueTodayCount">-</div>
                                    <div class="stat-label">今日到期</div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <div class="workbench-main">
                        <section class="scene-todo-section">
                            <div class="section-header">
                                <h2>
                                    <i class="ri-folders-line"></i>
                                    场景待办
                                </h2>
                                <div class="section-actions">
                                    <select class="nx-select" id="sceneStatusFilter">
                                        <option value="">全部状态</option>
                                        <option value="ACTIVE">进行中</option>
                                        <option value="PENDING">待激活</option>
                                        <option value="ARCHIVED">已归档</option>
                                    </select>
                                    <button class="nx-btn nx-btn--primary" id="createSceneBtn">
                                        <i class="ri-add-line"></i>
                                        新建场景
                                    </button>
                                </div>
                            </div>
                            <div class="scene-todo-list" id="sceneTodoList">
                                <div class="loading-state">
                                    <i class="ri-loader-4-line spin"></i>
                                    <span>加载中...</span>
                                </div>
                            </div>
                        </section>

                        <aside class="workbench-sidebar">
                            <section class="quick-actions-section">
                                <h3>
                                    <i class="ri-flashlight-line"></i>
                                    快捷操作
                                </h3>
                                <div class="quick-actions" id="quickActions">
                                </div>
                            </section>

                            <section class="global-todo-section">
                                <div class="section-header">
                                    <h3>
                                        <i class="ri-list-check"></i>
                                        我的待办
                                    </h3>
                                    <a href="./my-todos.html" class="view-all">查看全部</a>
                                </div>
                                <div class="global-todo-list" id="globalTodoList">
                                </div>
                            </section>

                            <section class="recent-activity-section">
                                <h3>
                                    <i class="ri-history-line"></i>
                                    最近动态
                                </h3>
                                <div class="activity-list" id="activityList">
                                </div>
                            </section>
                        </aside>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="nx-modal" id="todoModal" style="display:none;">
        <div class="nx-modal__backdrop"></div>
        <div class="nx-modal__content">
            <div class="nx-modal__header">
                <h3>处理待办</h3>
                <button class="nx-modal__close" id="modalClose">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="nx-modal__body" id="todoDetail">
            </div>
            <div class="nx-modal__footer">
                <button class="nx-btn nx-btn--secondary" id="todoRejectBtn">拒绝</button>
                <button class="nx-btn nx-btn--primary" id="todoAcceptBtn">接受</button>
            </div>
        </div>
    </div>

    <script src="../js/nexus.js?v=4"></script>
    <script src="../js/menu.js?v=4"></script>
    <script src="../js/api-service.js?v=4"></script>
    <script src="../js/page-init.js?v=4" data-auto-init></script>
    <script src="../js/workbench.js?v=4"></script>
</body>
</html>
