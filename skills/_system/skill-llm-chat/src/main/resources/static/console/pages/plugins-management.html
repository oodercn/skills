<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>插件管理 - Apex OS</title>
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <link rel="stylesheet" href="/console/css/pages/plugins-management.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar" id="sidebar">
            <!-- 侧边栏将通过JavaScript动态生成 -->
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle>
                        <i class="ri-menu-line"></i>
                    </button>
                    <div>
                        <h2 class="page-title">
                            <i class="ri-plug-line"></i>
                            插件管理
                        </h2>
                        <p class="page-subtitle">管理和监控已安装的插件</p>
                    </div>
                </div>
            </header>
            
            <div class="tabs-container">
                <div class="tabs">
                    <button class="tab active" data-tab="installed" onclick="PluginManagement.switchTab('installed')">
                        <i class="ri-install-line"></i> 已安装
                    </button>
                    <button class="tab" data-tab="market" onclick="PluginManagement.switchTab('market')">
                        <i class="ri-store-line"></i> 插件市场
                    </button>
                    <button class="tab" data-tab="config" onclick="PluginManagement.switchTab('config')">
                        <i class="ri-settings-3-line"></i> 配置
                    </button>
                </div>
                
                <div class="tab-content active" id="installed-tab">
                    <div class="stats-row">
                        <div class="stat-card">
                            <div class="stat-icon running"><i class="ri-play-circle-line"></i></div>
                            <div class="stat-value" id="statRunning">0</div>
                            <div class="stat-label">运行中</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon stopped"><i class="ri-stop-circle-line"></i></div>
                            <div class="stat-value" id="statStopped">0</div>
                            <div class="stat-label">已停止</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon total"><i class="ri-plug-line"></i></div>
                            <div class="stat-value" id="statTotal">0</div>
                            <div class="stat-label">总计</div>
                        </div>
                    </div>
                    
                    <div class="toolbar">
                        <div class="toolbar-left">
                            <div class="search-box">
                                <i class="ri-search-line"></i>
                                <input type="text" placeholder="搜索插件名称..." id="searchInput">
                            </div>
                        </div>
                        <div class="toolbar-right">
                            <button class="nx-btn nx-btn--secondary" onclick="PluginManagement.installFromFile()">
                                <i class="ri-upload-line"></i> 从文件安装
                            </button>
                            <button class="nx-btn nx-btn--primary" onclick="PluginManagement.refresh()">
                                <i class="ri-refresh-line"></i> 刷新
                            </button>
                        </div>
                    </div>
                    
                    <div class="plugin-list" id="pluginList">
                        <div class="empty-state">
                            <i class="ri-plug-line"></i>
                            <p>暂无已安装的插件</p>
                            <button class="nx-btn nx-btn--primary" onclick="PluginManagement.installFromFile()">
                                <i class="ri-upload-line"></i> 安装第一个插件
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="tab-content" id="market-tab">
                    <div class="market-container">
                        <div class="market-header">
                            <h3>插件市场</h3>
                            <p>浏览和安装来自社区的插件</p>
                        </div>
                        <div class="market-list" id="marketList">
                            <div class="empty-state">
                                <i class="ri-store-line"></i>
                                <p>插件市场功能开发中...</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="tab-content" id="config-tab">
                    <div class="config-container">
                        <div class="config-header">
                            <h3>插件配置</h3>
                            <p>管理插件的全局配置</p>
                        </div>
                        <div class="config-content" id="configContent">
                            <div class="empty-state">
                                <i class="ri-settings-3-line"></i>
                                <p>选择一个插件进行配置</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="detail-panel" id="detailPanel">
        <div class="detail-panel-header">
            <h3>插件详情</h3>
            <button class="nx-btn nx-btn--ghost nx-btn--icon" onclick="closeDetailPanel()">
                <i class="ri-close-line"></i>
            </button>
        </div>
        <div class="detail-panel-content" id="detailPanelContent">
            <!-- 详情内容将通过JavaScript动态生成 -->
        </div>
    </div>
    
    <script src="/console/js/navigation.js"></script>
    <script src="/console/js/pages/plugins-management.js"></script>
</body>
</html>
