<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地能力 - Apex OS</title>
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <link rel="stylesheet" href="/console/css/components/stat-cards.css">
    <link rel="stylesheet" href="/console/css/pages/local-capabilities.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar" id="sidebar">
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle>
                        <i class="ri-menu-line"></i>
                    </button>
                    <div>
                        <h2 class="page-title">
                            <i class="ri-folder-line"></i>
                            本地能力
                        </h2>
                        <p class="page-subtitle">管理已下载和已安装的能力</p>
                    </div>
                </div>
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--secondary" onclick="LocalCapabilities.scanLocal()">
                        <i class="ri-search-eye-line"></i> 扫描本地
                    </button>
                    <button class="nx-btn nx-btn--secondary" onclick="LocalCapabilities.importCapability()">
                        <i class="ri-download-line"></i> 导入能力
                    </button>
                    <button class="nx-btn nx-btn--primary" onclick="LocalCapabilities.refresh()">
                        <i class="ri-refresh-line"></i> 刷新
                    </button>
                </div>
            </header>
            
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-icon installed"><i class="ri-install-line"></i></div>
                    <div class="stat-value" id="statInstalled">0</div>
                    <div class="stat-label">已安装</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon downloaded"><i class="ri-download-cloud-2-line"></i></div>
                    <div class="stat-value" id="statDownloaded">0</div>
                    <div class="stat-label">已下载</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon activated"><i class="ri-flashlight-line"></i></div>
                    <div class="stat-value" id="statActivated">0</div>
                    <div class="stat-label">已激活</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon jar"><i class="ri-file-zip-line"></i></div>
                    <div class="stat-value" id="statJar">0</div>
                    <div class="stat-label">JAR包</div>
                </div>
            </div>
            
            <div class="toolbar">
                <div class="toolbar-left">
                    <div class="search-box">
                        <i class="ri-search-line"></i>
                        <input type="text" placeholder="搜索能力名称或ID..." id="searchInput">
                    </div>
                </div>
                <div class="toolbar-right">
                    <select id="sourceFilter" class="nx-select">
                        <option value="all">全部来源</option>
                        <option value="installed">已安装</option>
                        <option value="downloaded">已下载</option>
                        <option value="activated">已激活</option>
                    </select>
                    <select id="typeFilter" class="nx-select">
                        <option value="all">全部类型</option>
                        <option value="folder">文件夹</option>
                        <option value="jar">JAR包</option>
                    </select>
                </div>
            </div>
            
            <div class="capability-list" id="capabilityList">
                <div class="empty-state">
                    <i class="ri-folder-open-line"></i>
                    <p>暂无本地能力</p>
                    <button class="nx-btn nx-btn--primary" onclick="LocalCapabilities.scanLocal()">
                        <i class="ri-search-eye-line"></i> 扫描本地能力
                    </button>
                </div>
            </div>
        </main>
    </div>
    
    <div class="detail-panel" id="detailPanel">
        <div class="detail-panel-header">
            <h3>能力详情</h3>
            <button class="nx-btn nx-btn--ghost nx-btn--icon" onclick="closeDetailPanel()">
                <i class="ri-close-line"></i>
            </button>
        </div>
        <div class="detail-panel-content" id="detailPanelContent">
        </div>
    </div>
    
    <script src="/console/js/navigation.js"></script>
    <script src="/console/js/pages/local-capabilities.js"></script>
</body>
</html>
