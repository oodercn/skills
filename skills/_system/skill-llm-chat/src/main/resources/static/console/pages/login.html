<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Apex OS</title>
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <link rel="stylesheet" href="/console/css/pages/login.css">
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo">
                    <i class="ri-server-line"></i>
                </div>
                <h1 class="login-title">Apex OS</h1>
                <p class="login-subtitle">场景技能管理平台</p>
            </div>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="username" placeholder="请输入用户名" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">登录角色</label>
                    <select class="form-select" id="role">
                        <option value="installer">系统安装者</option>
                        <option value="admin">系统管理员</option>
                        <option value="leader">主导者</option>
                        <option value="collaborator">协作者</option>
                    </select>
                </div>
                
                <div class="login-error" id="loginError"></div>
                
                <button type="submit" class="login-btn" id="loginBtn">登录</button>
            </form>
            
            <div class="demo-accounts">
                <div class="demo-title">快速登录（演示账号）</div>
                <div class="demo-list">
                    <button class="demo-btn" onclick="quickLogin('installer', 'installer123', 'installer')">安装者</button>
                    <button class="demo-btn" onclick="quickLogin('admin', 'admin123', 'admin')">管理员</button>
                    <button class="demo-btn" onclick="quickLogin('leader', 'leader123', 'leader')">主导者</button>
                    <button class="demo-btn" onclick="quickLogin('user', 'user123', 'collaborator')">协作者</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/console/js/pages/login.js"></script>
</body>
</html>
