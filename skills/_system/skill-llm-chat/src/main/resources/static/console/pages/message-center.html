<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息中心 - ooderAgent</title>
    <link rel="stylesheet" href="../css/nexus.css">
    <link rel="stylesheet" href="../css/pages/notification-center.css">
    <link rel="stylesheet" href="../css/remixicon/remixicon.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="ri-hexagon-fill"></i>
                    <span>ooderAgent</span>
                </div>
            </div>
            <nav class="nav-menu" id="nav-menu">
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle">
                        <i class="ri-menu-line"></i>
                    </button>
                    <h1 class="page-title">
                        <i class="ri-message-3-line"></i>
                        消息中心
                    </h1>
                </div>
                <div class="header-right">
                    <div class="header-actions">
                        <button class="action-btn" id="markAllReadBtn" title="全部已读">
                            <i class="ri-check-double-line"></i>
                        </button>
                        <button class="action-btn" id="settingsBtn" title="设置">
                            <i class="ri-settings-3-line"></i>
                        </button>
                    </div>
                    <div class="user-info" id="userInfo">
                        <span class="user-name">加载中...</span>
                        <i class="ri-arrow-down-s-line"></i>
                    </div>
                </div>
            </header>

            <div class="message-center-container">
                <div class="message-tabs">
                    <div class="message-tab active" data-type="all">
                        <i class="ri-inbox-line"></i>
                        <span>全部</span>
                        <span class="tab-count" id="allCount">0</span>
                    </div>
                    <div class="message-tab" data-type="scene">
                        <i class="ri-folder-line"></i>
                        <span>场景</span>
                        <span class="tab-count" id="sceneCount">0</span>
                    </div>
                    <div class="message-tab" data-type="todo">
                        <i class="ri-task-line"></i>
                        <span>待办</span>
                        <span class="tab-count" id="todoCount">0</span>
                    </div>
                    <div class="message-tab" data-type="system">
                        <i class="ri-settings-2-line"></i>
                        <span>系统</span>
                        <span class="tab-count" id="systemCount">0</span>
                    </div>
                </div>

                <div class="message-list-container">
                    <div class="message-filter">
                        <input type="text" class="search-input" id="searchInput" placeholder="搜索消息...">
                        <select class="filter-select" id="timeFilter">
                            <option value="">全部时间</option>
                            <option value="today">今天</option>
                            <option value="week">本周</option>
                            <option value="month">本月</option>
                        </select>
                    </div>

                    <div class="message-list" id="messageList">
                        <div class="loading-state">
                            <i class="ri-loader-4-line spin"></i>
                            <span>加载中...</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="messageModal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">消息详情</h3>
                <button class="modal-close" id="modalClose">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
            <div class="modal-footer" id="modalFooter">
                <button class="btn btn-secondary" id="modalCloseBtn">关闭</button>
            </div>
        </div>
    </div>

    <script src="../js/nexus.js?v=3"></script>
    <script src="../js/menu.js?v=3"></script>
    <script src="../js/api-service.js?v=3"></script>
    <script src="../js/page-init.js?v=3" data-auto-init></script>
    <script>
    (function() {
        let currentType = 'all';
        let messages = [];

        function init() {
            loadMessages();
            bindEvents();
        }

        function loadMessages() {
            const container = document.getElementById('messageList');
            container.innerHTML = '<div class="loading-state"><i class="ri-loader-4-line spin"></i><span>加载中...</span></div>';

            if (window.ApiService && window.ApiService.message) {
                window.ApiService.message.getMessages({ type: currentType })
                    .then(function(response) {
                        if (response.code === 200) {
                            messages = response.data || [];
                            renderMessages(messages);
                            updateCounts();
                        } else {
                            container.innerHTML = '<div class="empty-state"><i class="ri-error-warning-line"></i><span>加载失败</span></div>';
                        }
                    })
                    .catch(function() {
                        renderMockMessages();
                    });
            } else {
                renderMockMessages();
            }
        }

        function renderMockMessages() {
            messages = [
                { id: 1, type: 'scene', title: '场景审批通过', content: '您的场景"招聘流程"已通过审批', time: '10分钟前', read: false },
                { id: 2, type: 'todo', title: '新待办任务', content: '您有一个新的审批任务待处理', time: '30分钟前', read: false },
                { id: 3, type: 'system', title: '系统维护通知', content: '系统将于今晚22:00进行维护', time: '1小时前', read: true },
                { id: 4, type: 'scene', title: '场景激活成功', content: '技能"简历解析"已成功激活', time: '2小时前', read: true },
                { id: 5, type: 'todo', title: '待办即将到期', content: '您有一个待办将于明天到期', time: '3小时前', read: false }
            ];
            renderMessages(messages);
            updateCounts();
        }

        function renderMessages(list) {
            const container = document.getElementById('messageList');
            if (!list || list.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="ri-inbox-line"></i><span>暂无消息</span></div>';
                return;
            }

            container.innerHTML = list.map(function(msg) {
                return '<div class="message-item ' + (msg.read ? 'read' : 'unread') + '" data-id="' + msg.id + '">' +
                    '<div class="message-icon ' + msg.type + '">' +
                        '<i class="ri-' + getTypeIcon(msg.type) + '"></i>' +
                    '</div>' +
                    '<div class="message-content">' +
                        '<div class="message-title">' + msg.title + '</div>' +
                        '<div class="message-text">' + msg.content + '</div>' +
                        '<div class="message-time">' + msg.time + '</div>' +
                    '</div>' +
                    '<div class="message-actions">' +
                        '<button class="action-btn small" title="标记已读" onclick="markAsRead(' + msg.id + ')">' +
                            '<i class="ri-check-line"></i>' +
                        '</button>' +
                        '<button class="action-btn small" title="删除" onclick="deleteMessage(' + msg.id + ')">' +
                            '<i class="ri-delete-bin-line"></i>' +
                        '</button>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function getTypeIcon(type) {
            const icons = {
                'scene': 'folder-line',
                'todo': 'task-line',
                'system': 'settings-2-line'
            };
            return icons[type] || 'message-3-line';
        }

        function updateCounts() {
            const counts = { all: 0, scene: 0, todo: 0, system: 0 };
            messages.forEach(function(msg) {
                counts.all++;
                if (counts[msg.type] !== undefined) {
                    counts[msg.type]++;
                }
            });

            document.getElementById('allCount').textContent = counts.all;
            document.getElementById('sceneCount').textContent = counts.scene;
            document.getElementById('todoCount').textContent = counts.todo;
            document.getElementById('systemCount').textContent = counts.system;
        }

        function bindEvents() {
            document.querySelectorAll('.message-tab').forEach(function(tab) {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.message-tab').forEach(function(t) { t.classList.remove('active'); });
                    this.classList.add('active');
                    currentType = this.dataset.type;
                    loadMessages();
                });
            });

            document.getElementById('searchInput').addEventListener('input', function() {
                const keyword = this.value.toLowerCase();
                const filtered = messages.filter(function(msg) {
                    return msg.title.toLowerCase().includes(keyword) || msg.content.toLowerCase().includes(keyword);
                });
                renderMessages(filtered);
            });

            document.getElementById('markAllReadBtn').addEventListener('click', function() {
                messages.forEach(function(msg) { msg.read = true; });
                renderMessages(messages);
            });

            document.getElementById('modalClose').addEventListener('click', function() {
                document.getElementById('messageModal').style.display = 'none';
            });

            document.getElementById('modalCloseBtn').addEventListener('click', function() {
                document.getElementById('messageModal').style.display = 'none';
            });
        }

        window.markAsRead = function(id) {
            const msg = messages.find(function(m) { return m.id === id; });
            if (msg) {
                msg.read = true;
                renderMessages(messages);
            }
        };

        window.deleteMessage = function(id) {
            messages = messages.filter(function(m) { return m.id !== id; });
            renderMessages(messages);
            updateCounts();
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
    <style>
    .message-center-container {
        padding: 24px;
        max-width: 1000px;
        margin: 0 auto;
    }

    .message-tabs {
        display: flex;
        gap: 0;
        margin-bottom: 20px;
        border-bottom: 1px solid var(--nx-border-color);
    }

    .message-tab {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 20px;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        color: var(--nx-text-secondary);
        transition: all 0.2s ease;
    }

    .message-tab:hover {
        color: var(--nx-text-primary);
    }

    .message-tab.active {
        color: var(--nx-primary);
        border-bottom-color: var(--nx-primary);
    }

    .tab-count {
        background: var(--nx-bg-secondary);
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 12px;
    }

    .message-tab.active .tab-count {
        background: var(--nx-primary);
        color: white;
    }

    .message-filter {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
    }

    .search-input {
        flex: 1;
        padding: 10px 16px;
        border: 1px solid var(--nx-border-color);
        border-radius: 8px;
        background: var(--nx-bg-primary);
        color: var(--nx-text-primary);
        font-size: 14px;
    }

    .filter-select {
        padding: 10px 16px;
        border: 1px solid var(--nx-border-color);
        border-radius: 8px;
        background: var(--nx-bg-primary);
        color: var(--nx-text-primary);
        font-size: 14px;
    }

    .message-list {
        background: var(--nx-bg-elevated);
        border-radius: 12px;
        border: 1px solid var(--nx-border-color);
        overflow: hidden;
    }

    .message-item {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        padding: 16px;
        border-bottom: 1px solid var(--nx-border-color);
        transition: background 0.2s ease;
    }

    .message-item:last-child {
        border-bottom: none;
    }

    .message-item:hover {
        background: var(--nx-bg-hover);
    }

    .message-item.unread {
        background: rgba(59, 130, 246, 0.05);
    }

    .message-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
    }

    .message-icon.scene {
        background: rgba(59, 130, 246, 0.1);
        color: #3b82f6;
    }

    .message-icon.todo {
        background: rgba(245, 158, 11, 0.1);
        color: #f59e0b;
    }

    .message-icon.system {
        background: rgba(107, 114, 128, 0.1);
        color: #6b7280;
    }

    .message-content {
        flex: 1;
        min-width: 0;
    }

    .message-title {
        font-weight: 600;
        margin-bottom: 4px;
    }

    .message-text {
        font-size: 14px;
        color: var(--nx-text-secondary);
        margin-bottom: 4px;
    }

    .message-time {
        font-size: 12px;
        color: var(--nx-text-secondary);
    }

    .message-actions {
        display: flex;
        gap: 8px;
    }

    .action-btn.small {
        width: 28px;
        height: 28px;
        padding: 0;
        font-size: 14px;
    }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--nx-text-secondary);
    }

    .empty-state i {
        font-size: 48px;
        margin-bottom: 16px;
        opacity: 0.5;
    }

    .loading-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px;
        color: var(--nx-text-secondary);
    }

    .loading-state i {
        font-size: 32px;
        margin-bottom: 12px;
    }

    .spin {
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
    </style>
</body>
</html>
