<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>场景知识库配置 - Apex OS</title>
    
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <link rel="stylesheet" href="/console/css/nx-page.css">
    <link rel="stylesheet" href="/console/css/pages/scene-knowledge.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold" style="display: flex; align-items: center; gap: 8px;">
                    <i class="ri-server-line"></i> Apex OS
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <div class="scene-knowledge-page">
                <header class="nx-page__header" style="border-bottom: none;">
                    <div class="nx-flex nx-items-center nx-gap-3">
                        <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle aria-label="切换侧边栏">
                            <i class="ri-menu-line"></i>
                        </button>
                        <div>
                            <h2 class="page-title">
                                <i class="ri-book-2-line"></i>
                                场景知识库配置
                            </h2>
                            <p class="page-subtitle" id="sceneGroupInfo">加载中...</p>
                        </div>
                    </div>
                    <div class="nx-flex nx-items-center nx-gap-3">
                        <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle aria-label="切换主题">
                            <i class="ri-sun-line"></i>
                        </button>
                        <button class="nx-btn nx-btn--secondary" onclick="goBack()">
                            <i class="ri-arrow-left-line"></i> 返回
                        </button>
                    </div>
                </header>

                <div class="info-tip" style="margin-bottom: 24px;">
                    <i class="ri-information-line"></i>
                    <div class="info-tip-content">
                        <div class="info-tip-title">知识库绑定说明</div>
                        <div class="info-tip-desc">知识库支持分层配置：通用层（所有场景共享）、专业层（特定领域）、场景层（当前场景独有）。检索时按场景→专业→通用优先级查找。</div>
                    </div>
                </div>

                <div class="section-card">
                    <div class="section-header">
                        <h3><i class="ri-link"></i> 已绑定知识库</h3>
                        <span class="badge" id="boundCount">0</span>
                    </div>
                    <div id="boundList" class="knowledge-list">
                        <div class="empty-state"><i class="ri-loader-4-line ri-spin"></i><span>加载中...</span></div>
                    </div>
                </div>

                <div class="section-card">
                    <div class="section-header">
                        <h3><i class="ri-database-2-line"></i> 可用知识库</h3>
                        <button class="nx-btn nx-btn--primary nx-btn--sm" onclick="refreshAvailable()">
                            <i class="ri-refresh-line"></i> 刷新
                        </button>
                    </div>
                    <div id="availableList" class="knowledge-list">
                        <div class="empty-state"><i class="ri-loader-4-line ri-spin"></i><span>加载中...</span></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="bindModal">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="ri-book-2-line"></i> 绑定知识库</h3>
                <button class="nx-btn nx-btn--ghost nx-btn--icon" onclick="closeBindModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>知识库</label>
                    <div id="selectedKb" class="selected-kb-info">-</div>
                </div>
                <div class="form-group">
                    <label>知识层级</label>
                    <select id="layerSelect" class="nx-input">
                        <option value="SCENE">场景层（当前场景独有）</option>
                        <option value="PROFESSIONAL">专业层（特定领域）</option>
                        <option value="GENERAL">通用层（所有场景共享）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>TopK（返回结果数量）</label>
                    <input type="number" id="topKInput" class="nx-input" value="5" min="1" max="20">
                </div>
                <div class="form-group">
                    <label>相似度阈值</label>
                    <input type="number" id="thresholdInput" class="nx-input" value="0.7" min="0" max="1" step="0.1">
                </div>
            </div>
            <div class="modal-footer">
                <button class="nx-btn nx-btn--secondary" onclick="closeBindModal()">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="confirmBind()">
                    <i class="ri-link"></i> 确认绑定
                </button>
            </div>
        </div>
    </div>

    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/api-client.js"></script>
    <script src="/console/js/menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/pages/scene-knowledge.js"></script>
</body>
</html>
