apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-auth
  name: 认证服务
  version: 1.0.0
  description: 系统级认证服务 - 提供用户登录、登出、会话管理
  author: ooder Team
  type: system-service
  license: Apache-2.0

spec:
  skillForm: PROVIDER
  type: system-skill
  
  ownership: platform
  
  capability:
    address: 0x01
    category: SYS
    code: SYS_AUTH
    operations: [login, logout, session, permission]
  
  runtime:
    language: java
    javaVersion: "21"
    framework: spring-boot
  
  supportedSceneTypes:
    - all
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 0s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    
  dependencies: []
  
  providedInterfaces:
    - id: auth-service
      version: "1.0"
      description: "认证服务接口"
    - id: permission-service
      version: "1.0"
      description: "权限服务接口"
  
  capabilities:
    - id: login
      name: 用户登录
      description: 用户登录认证
      category: auth
    - id: logout
      name: 用户登出
      description: 用户登出
      category: auth
    - id: session
      name: 会话管理
      description: 会话创建、查询、销毁
      category: auth
    - id: permission
      name: 权限检查
      description: 权限验证
      category: auth
  
  endpoints:
    - path: /api/v1/auth/login
      method: POST
      description: 用户登录
      capability: login
    - path: /api/v1/auth/logout
      method: POST
      description: 用户登出
      capability: logout
    - path: /api/v1/auth/session
      method: GET
      description: 获取会话信息
      capability: session
    - path: /api/v1/auth/current-user
      method: GET
      description: 获取当前用户
      capability: session
    - path: /api/v1/auth/check-permission
      method: GET
      description: 检查权限
      capability: permission
  
  config:
    optional:
      - name: SESSION_TIMEOUT
        type: integer
        default: 3600
        description: 会话超时时间(秒)
      - name: MAX_LOGIN_ATTEMPTS
        type: integer
        default: 5
        description: 最大登录尝试次数
  
  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "10Mi"
