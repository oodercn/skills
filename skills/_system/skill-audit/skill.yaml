apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-audit
  name: 日志审计服务
  version: 1.0.0
  description: 提供审计日志记录、查询、统计和导出功能
  author: ooder Team
  type: system-service
  license: Apache-2.0

spec:
  skillForm: PROVIDER
  type: system-skill
  
  ownership: platform
  
  capability:
    address: 0x2D
    category: SYS
    code: SYS_AUDIT
    operations: [log, query, stats, export]
  
  runtime:
    language: java
    javaVersion: "21"
    framework: spring-boot
  
  supportedSceneTypes:
    - all
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 0s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    
  dependencies: []
  
  providedInterfaces:
    - id: audit-service
      version: "1.0"
      description: "日志审计服务接口"
  
  capabilities:
    - id: log
      name: 日志记录
      description: 记录审计日志
      category: audit
    - id: query
      name: 日志查询
      description: 查询审计日志
      category: audit
    - id: stats
      name: 统计分析
      description: 审计统计分析
      category: audit
    - id: export
      name: 日志导出
      description: 导出审计日志
      category: audit
  
  endpoints:
    - path: /api/v1/audit/logs
      method: GET
      controllerClass: net.ooder.skill.audit.controller.AuditController
      methodName: listLogs
      description: 查询审计日志列表
      capability: query
    - path: /api/v1/audit/logs
      method: POST
      controllerClass: net.ooder.skill.audit.controller.AuditController
      methodName: createLog
      description: 创建审计日志
      capability: log
    - path: /api/v1/audit/logs/{recordId}
      method: GET
      controllerClass: net.ooder.skill.audit.controller.AuditController
      methodName: getLogById
      description: 获取审计日志详情
      capability: query
    - path: /api/v1/audit/stats
      method: GET
      controllerClass: net.ooder.skill.audit.controller.AuditController
      methodName: getStats
      description: 获取审计统计
      capability: stats
    - path: /api/v1/audit/export
      method: GET
      controllerClass: net.ooder.skill.audit.controller.AuditController
      methodName: exportLogs
      description: 导出审计日志
      capability: export
  
  config:
    optional:
      - name: RETENTION_DAYS
        type: integer
        default: 90
        description: 日志保留天数
      - name: MAX_EXPORT_ROWS
        type: integer
        default: 10000
        description: 最大导出行数
  
  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "10Mi"
