<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="900px" height="580px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 17px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 10px; fill: #64748b; }
        .text-num { font-size: 22px; font-weight: bold; fill: #1e40af; }
    </style>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="title-box" x="20" y="10" width="860" height="38" rx="4"/>
