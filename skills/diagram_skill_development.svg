<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800px" height="520px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; fill: #334155; }
        .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-step { font-size: 13px; font-weight: bold; fill: #059669; }
        .text-code { font-family: "Consolas", monospace; font-size: 10px; fill: #475569; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<!-- Title -->
<rect class="title-box" x="20" y="15" width="760" height="40" rx="4"/>
<text class="text-header" x="400" y="42" text-anchor="middle">自定义技能开发流程</text>

<!-- Step 1: Create Project -->
<rect class="box" x="30" y="70" width="350" height="90"/>
<text class="text-step" x="50" y="95">步骤 1</text>
<text class="text-title" x="205" y="95" text-anchor="middle">创建项目</text>
<text class="text-code" x="50" y="120">mvn archetype:generate</text>
<text class="text-code" x="50" y="138">-DarchetypeGroupId=net.ooder</text>
<text class="text-code" x="50" y="156">-DarchetypeArtifactId=skill-archetype</text>

<!-- Step 2: Implement Interface -->
<rect class="box-alt" x="420" y="70" width="350" height="90"/>
<text class="text-step" x="440" y="95">步骤 2</text>
<text class="text-title" x="595" y="95" text-anchor="middle">实现接口</text>
<text class="text-code" x="440" y="120">public class MySkill</text>
<text class="text-code" x="460" y="138">implements SkillProvider {</text>
<text class="text-code" x="480" y="156">// 业务逻辑</text>

<!-- Arrow -->
<line class="arrow" x1="380" y1="115" x2="420" y2="115"/>

<!-- Step 3: Configure -->
<rect class="box" x="30" y="180" width="350" height="90"/>
<text class="text-step" x="50" y="205">步骤 3</text>
<text class="text-title" x="205" y="205" text-anchor="middle">配置 skill.yaml</text>
<text class="text-code" x="50" y="230">metadata:</text>
<text class="text-code" x="70" y="248">id: my-skill</text>
<text class="text-code" x="70" y="266">version: "1.0.0"</text>

<!-- Step 4: Package -->
<rect class="box-alt" x="420" y="180" width="350" height="90"/>
<text class="text-step" x="440" y="205">步骤 4</text>
<text class="text-title" x="595" y="205" text-anchor="middle">打包部署</text>
<text class="text" x="440" y="230">mvn package</text>
<text class="text" x="440" y="250">复制到 skills/ 目录</text>
<text class="text" x="440" y="270">自动加载</text>

<!-- Arrow -->
<line class="arrow" x1="380" y1="225" x2="420" y2="225"/>

<!-- Development Tools -->
<rect class="box-highlight" x="30" y="290" width="740" height="100"/>
<text class="text-title" x="400" y="315" text-anchor="middle">开发工具链</text>
<text class="text" x="50" y="345">IDE 插件: IntelliJ IDEA / VS Code 插件支持</text>
<text class="text" x="50" y="365">调试工具: 本地调试、热加载、日志追踪</text>
<text class="text" x="50" y="385">测试框架: JUnit 5 + 技能测试套件</text>

<!-- Best Practices -->
<rect class="box" x="30" y="410" width="740" height="95"/>
<text class="text-title" x="400" y="435" text-anchor="middle">最佳实践</text>
<text class="text" x="50" y="460">✓ 遵循 SPI 接口规范，确保兼容性</text>
<text class="text" x="50" y="480">✓ 使用语义化版本控制 (SemVer)</text>
<text class="text" x="50" y="500">✓ 编写完善的 skill.yaml 配置文档</text>

</svg>
