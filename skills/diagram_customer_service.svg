<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800px" height="580px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

    <!-- Title -->
    <rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
    <text class="text-header" x="400" y="38" text-anchor="middle">智能客服场景组合</text>

    <!-- User -->
    <rect class="box-highlight" x="30" y="70" width="100" height="50" rx="6"/>
    <text class="text" x="80" y="100" text-anchor="middle" font-weight="bold">用户</text>

    <!-- Arrow -->
    <line class="arrow" x1="130" y1="95" x2="180" y2="95"/>

    <!-- IM Gateway -->
    <rect class="box" x="180" y="70" width="120" height="50"/>
    <text class="text-title" x="240" y="95" text-anchor="middle">IM Gateway</text>
    <text class="text-small" x="240" y="110" text-anchor="middle">消息路由</text>

    <!-- Arrow -->
    <line class="arrow" x1="300" y1="95" x2="350" y2="95"/>

    <!-- Knowledge Platform -->
    <rect class="box-alt" x="350" y="70" width="140" height="50"/>
    <text class="text-title" x="420" y="95" text-anchor="middle">Knowledge Platform</text>
    <text class="text-small" x="420" y="110" text-anchor="middle">RAG增强</text>

    <!-- Arrow -->
    <line class="arrow" x1="490" y1="95" x2="540" y2="95"/>

    <!-- LLM -->
    <rect class="box-highlight" x="540" y="70" width="100" height="50" rx="6"/>
    <text class="text" x="590" y="100" text-anchor="middle" font-weight="bold">LLM</text>

    <!-- Arrow back -->
    <line class="arrow" x1="590" y1="120" x2="590" y2="150"/>
    <line class="arrow" x1="590" y1="150" x2="240" y2="150"/>
    <line class="arrow" x1="240" y1="150" x2="240" y2="120"/>

    <!-- WeChat -->
    <rect class="box" x="180" y="170" width="120" height="50"/>
    <text class="text-title" x="240" y="195" text-anchor="middle">微信</text>
    <text class="text-small" x="240" y="210" text-anchor="middle">skill-im-weixin</text>

    <!-- DingTalk -->
    <rect class="box" x="320" y="170" width="120" height="50"/>
    <text class="text-title" x="380" y="195" text-anchor="middle">钉钉</text>
    <text class="text-small" x="380" y="210" text-anchor="middle">skill-im-dingding</text>

    <!-- Feishu -->
    <rect class="box" x="460" y="170" width="120" height="50"/>
    <text class="text-title" x="520" y="195" text-anchor="middle">飞书</text>
    <text class="text-small" x="520" y="210" text-anchor="middle">skill-im-feishu</text>

    <!-- Arrow down -->
    <line class="arrow" x1="240" y1="220" x2="240" y2="250"/>

    <!-- Notification -->
    <rect class="box-alt" x="180" y="250" width="120" height="50"/>
    <text class="text-title" x="240" y="275" text-anchor="middle">Notification</text>
    <text class="text-small" x="240" y="290" text-anchor="middle">通知推送</text>

    <!-- Description -->
    <rect class="box" x="30" y="330" width="740" height="80"/>
    <text class="text-title" x="50" y="355">场景说明</text>
    <text class="text" x="50" y="380">用户通过微信/钉钉/飞书发起咨询 → IM Gateway 路由消息 → Knowledge Platform RAG增强 → LLM 智能回复 → Notification 推送结果</text>

</svg>