apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-report
  name: 报表服务
  version: 0.7.3
  category: biz
  description: 报表服务，提供报表生成、导出、定时推�?
  author: ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - report
    - export
    - schedule
    - pdf

spec:
  skillForm: PROVIDER
  
  ownership: independent
  
  capability:
    address: 0xF1
    category: UTIL
    code: UTIL_REPORT
    operations: [generate, export, schedule]
  
  providerType: tool
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot

  llmConfig:
    required: false
    defaultProvider: "deepseek"
    defaultModel: "deepseek-chat"
    capabilities:
      - chat
      - streaming
      - function-calling
    modelSelection:
      allowUserOverride: true
      availableProviders:
        - deepseek
        - openai
        - qianwen
        - volcengine
        - ollama
    functionCalling:
      enabled: true
      tools:
        - name: query_skill_capability
          description: "查询当前技能的能力和使用方�?
          parameters:
            type: object
            properties:
              capability:
                type: string
                description: "能力名称"
              detail:
                type: string
                enum: [brief, detailed, examples]
                default: "brief"
        - name: execute_mvel_action
          description: "通过MVEL表达式执行后台操�?
          parameters:
            type: object
            properties:
              expression:
                type: string
                description: "MVEL表达�?
              context:
                type: object
        - name: generate_ui_form
          description: "生成UI表单供用户填�?
          parameters:
            type: object
            properties:
              formType:
                type: string
              fields:
                type: array
                items:
                  type: object
        - name: execute_batch_operation
          description: "执行批量操作"
          parameters:
            type: object
            properties:
              operation:
                type: string
              items:
                type: array
                items:
                  type: object
        - name: convert_to_javascript
          description: "转换为JavaScript代码供用户使�?
          parameters:
            type: object
            properties:
              action:
                type: string
              parameters:
                type: object
      toolChoice: auto
    rateLimits:
      requestsPerMinute: 60
      tokensPerMinute: 100000

  
  supportedSceneTypes:
    - reporting
    - analytics
    - dashboard
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 2s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 20
  
  dependencies: []
  
  providedInterfaces:
    - id: report-service
      version: "1.0"
      description: "报表服务接口"
  
  capabilities:
    - id: generate
      name: 报表生成
      description: 生成报表
      category: service
    - id: export
      name: 报表导出
      description: 导出报表
      category: service
    - id: schedule
      name: 定时推�?
      description: 定时推送报�?
      category: service
  
  endpoints:
    - path: /api/reports
      method: POST
      description: 生成报表
      capability: generate
    - path: /api/reports/{id}/export
      method: GET
      description: 导出报表
      capability: export
    - path: /api/reports/schedules
      method: POST
      description: 创建定时任务
      capability: schedule
  
  config:
    optional:
      - name: EXPORT_FORMATS
        type: string
        default: "pdf,excel,csv"
        description: 导出格式
      - name: MAX_REPORT_SIZE
        type: integer
        default: 10485760
        description: 最大报表大�?
      - name: SCHEDULE_ENABLED
        type: boolean
        default: true
        description: 启用定时
  
  resources:
    cpu: "100m"
    memory: "256Mi"
    storage: "200Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: false

  knowledge:
    documents:
      - id: overview
        name: 功能概述
        path: README.md
        type: guide
        language: zh
        priority: high
    ragConfig:
      enabled: true
      indexName: "skill-report-knowledge"
      embeddingModel: text-embedding-3-small
      chunkSize: 1000
      chunkOverlap: 200
      searchStrategy: hybrid
      topK: 5
      threshold: 0.7
