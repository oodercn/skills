apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-share
  name: 分享服务
  version: 0.7.3
  category: biz
  description: 分享服务，提供内容分享、链接管理、权限控制
  author: ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - share
    - link
    - permission
    - content

spec:
  skillForm: PROVIDER
  
  ownership: independent
  
  capability:
    address: 0xF2
    category: UTIL
    code: UTIL_SHARE
    operations: [share, manage, control]
  
  providerType: tool
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot

  llmConfig:
    required: false
    defaultProvider: "deepseek"
    defaultModel: "deepseek-chat"
    capabilities:
      - chat
      - streaming
      - function-calling
    modelSelection:
      allowUserOverride: true
      availableProviders:
        - deepseek
        - openai
        - qianwen
        - volcengine
        - ollama
    functionCalling:
      enabled: true
      tools:
        - name: query_skill_capability
          description: "查询当前技能的能力和使用方�?
          parameters:
            type: object
            properties:
              capability:
                type: string
                description: "能力名称"
              detail:
                type: string
                enum: [brief, detailed, examples]
                default: "brief"
        - name: execute_mvel_action
          description: "通过MVEL表达式执行后台操�?
          parameters:
            type: object
            properties:
              expression:
                type: string
                description: "MVEL表达�?
              context:
                type: object
        - name: generate_ui_form
          description: "生成UI表单供用户填�?
          parameters:
            type: object
            properties:
              formType:
                type: string
              fields:
                type: array
                items:
                  type: object
        - name: execute_batch_operation
          description: "执行批量操作"
          parameters:
            type: object
            properties:
              operation:
                type: string
              items:
                type: array
                items:
                  type: object
        - name: convert_to_javascript
          description: "转换为JavaScript代码供用户使�?
          parameters:
            type: object
            properties:
              action:
                type: string
              parameters:
                type: object
      toolChoice: auto
    rateLimits:
      requestsPerMinute: 60
      tokensPerMinute: 100000

  
  supportedSceneTypes:
    - content-management
    - collaboration
    - social
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 2s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 20
  
  dependencies: []
  
  providedInterfaces:
    - id: share-service
      version: "1.0"
      description: "分享服务接口"
  
  capabilities:
    - id: share
      name: 内容分享
      description: 分享内容
      category: service
    - id: manage
      name: 链接管理
      description: 管理分享链接
      category: service
    - id: control
      name: 权限控制
      description: 控制访问权限
      category: service
  
  endpoints:
    - path: /api/share
      method: POST
      description: 创建分享
      capability: share
    - path: /api/share/{id}
      method: GET
      description: 获取分享
      capability: manage
    - path: /api/share/{id}/permissions
      method: PUT
      description: 设置权限
      capability: control
  
  config:
    optional:
      - name: LINK_EXPIRY
        type: integer
        default: 604800
        description: 链接有效�?�?
      - name: MAX_SHARE_SIZE
        type: integer
        default: 104857600
        description: 最大分享大�?
      - name: PASSWORD_REQUIRED
        type: boolean
        default: false
        description: 需要密�?
  
  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "100Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: false

  knowledge:
    documents:
      - id: overview
        name: 功能概述
        path: README.md
        type: guide
        language: zh
        priority: high
    ragConfig:
      enabled: true
      indexName: "skill-share-knowledge"
      embeddingModel: text-embedding-3-small
      chunkSize: 1000
      chunkOverlap: 200
      searchStrategy: hybrid
      topK: 5
      threshold: 0.7
