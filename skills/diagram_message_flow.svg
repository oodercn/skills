<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 490" width="800px" height="490px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

    <!-- Title -->
    <rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
    <text class="text-header" x="400" y="38" text-anchor="middle">消息处理流程</text>

    <!-- User Request -->
    <rect class="box-highlight" x="30" y="70" width="150" height="60" rx="6"/>
    <text class="text" x="105" y="105" text-anchor="middle" font-weight="bold">用户请求</text>

    <!-- Arrow -->
    <line class="arrow" x1="180" y1="100" x2="230" y2="100"/>

    <!-- MessageGateway -->
    <rect class="box" x="230" y="70" width="150" height="60"/>
    <text class="text-title" x="305" y="95" text-anchor="middle">MessageGateway</text>
    <text class="text-small" x="305" y="110" text-anchor="middle">消息网关</text>

    <!-- Arrow -->
    <line class="arrow" x1="380" y1="100" x2="430" y2="100"/>

    <!-- ChannelAdapter -->
    <rect class="box" x="430" y="70" width="150" height="60"/>
    <text class="text-title" x="505" y="95" text-anchor="middle">ChannelAdapter</text>
    <text class="text-small" x="505" y="110" text-anchor="middle">通道适配</text>

    <!-- Arrow -->
    <line class="arrow" x1="580" y1="100" x2="630" y2="100"/>

    <!-- IM Platform -->
    <rect class="box-alt" x="630" y="70" width="140" height="60"/>
    <text class="text-title" x="700" y="95" text-anchor="middle">IM平台</text>
    <text class="text-small" x="700" y="110" text-anchor="middle">钉钉/飞书/微信</text>

    <!-- Arrow down -->
    <line class="arrow" x1="700" y1="130" x2="700" y2="160"/>

    <!-- Callback -->
    <rect class="box" x="630" y="160" width="140" height="60"/>
    <text class="text-title" x="700" y="185" text-anchor="middle">回调处理</text>
    <text class="text-small" x="700" y="200" text-anchor="middle">状态更新</text>

    <!-- Arrow left -->
    <line class="arrow" x1="630" y1="190" x2="580" y2="190"/>

    <!-- Statistics -->
    <rect class="box-alt" x="430" y="160" width="150" height="60"/>
    <text class="text-title" x="505" y="185" text-anchor="middle">统计分析</text>
    <text class="text-small" x="505" y="200" text-anchor="middle">消息统计</text>

    <!-- Arrow left -->
    <line class="arrow" x1="430" y1="190" x2="380" y2="190"/>

    <!-- Monitoring -->
    <rect class="box" x="230" y="160" width="150" height="60"/>
    <text class="text-title" x="305" y="185" text-anchor="middle">监控日志</text>
    <text class="text-small" x="305" y="200" text-anchor="middle">性能监控</text>

    <!-- Arrow left -->
    <line class="arrow" x1="230" y1="190" x2="180" y2="190"/>

    <!-- Logging -->
    <rect class="box-alt" x="30" y="160" width="150" height="60"/>
    <text class="text-title" x="105" y="185" text-anchor="middle">日志记录</text>
    <text class="text-small" x="105" y="200" text-anchor="middle">审计追踪</text>

    <!-- Description -->
    <rect class="box-highlight" x="30" y="260" width="740" height="80"/>
    <text class="text-title" x="50" y="285">流程说明</text>
    <text class="text" x="50" y="310">用户请求 → MessageGateway路由 → ChannelAdapter转换 → IM平台投递 → 回调处理 → 统计分析 → 监控日志 → 日志记录</text>

</svg>