server:
  port: 8085

spring:
  application:
    name: skill-local-knowledge

knowledge:
  local:
    enabled: true
    docPath: ./docs
    
  index:
    type: memory
    algorithm: bm25
    
  term:
    builtin: true
    userDefined: true
    userTermPath: ./data/user-terms.json

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    net.ooder.skill.knowledge: DEBUG
