apiVersion: ooder.io/v1
kind: SkillPackage

metadata:
  name: skill-mqtt
  version: 0.7.3
  description: MQTTжңҚеҠЎжҠҖиғ?- жҸҗдҫӣиҪ»йҮҸзә§MQTT BrokerиғҪеҠӣе’ҢеӨҡжҸҗдҫӣе•Ҷж”ҜжҢ?
  author: Ooder Team
  license: Apache-2.0
  homepage: https://github.com/ooderCN/ooder-skills/tree/main/skills/skill-mqtt
  repository: https://github.com/ooderCN/ooder-skills.git
  giteeMirror: https://gitee.com/ooderCN/ooder-skills.git
  keywords:
    - mqtt
    - broker
    - iot
    - messaging
    - lightweight

spec:
  type: service-skill
  
  capabilities:
    - mqtt-broker
    - mqtt-publish
    - mqtt-subscribe
    - mqtt-p2p
    - mqtt-topic
    - mqtt-command

  scenes:
    - mqtt-messaging
    - iot-device

  parameters:
    - name: MQTT_PORT
      type: number
      required: false
      default: 1883
      description: MQTTжңҚеҠЎз«ҜеҸЈ
    - name: MQTT_WS_PORT
      type: number
      required: false
      default: 8083
      description: WebSocketз«ҜеҸЈ
    - name: MQTT_MAX_CONNECTIONS
      type: number
      required: false
      default: 10000
      description: жңҖеӨ§иҝһжҺҘж•°
    - name: MQTT_ALLOW_ANONYMOUS
      type: boolean
      required: false
      default: false
      description: жҳҜеҗҰе…Ғи®ёеҢҝеҗҚиҝһжҺҘ

  execution:
    timeout: 30000
    memoryLimit: 256M
    cpuLimit: 1

  distribution:
    format: jar
    entrypoint: net.ooder.skill.mqtt.MqttSkillApplication
    assets:
      - name: skill-mqtt-0.7.3.jar
        platform: all
        url: https://github.com/ooderCN/ooder-skills/releases/download/v0.7.3/skill-mqtt-0.7.3.jar
        giteeUrl: https://gitee.com/ooderCN/ooder-skills/releases/download/v0.7.3/skill-mqtt-0.7.3.jar

  compatibility:
    sdkVersion: ">=0.7.0"
    javaVersion: ">=8"
