apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-health
  name: 健康检查服务
  version: 2.3.0
  description: 系统健康检查、服务状态监控、报告生成
  author: ooder Team
  type: system-service
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN
  repository: https://gitee.com/ooderCN/ooder-skills
  keywords:
    - health
    - check
    - monitor
    - service
    - report

spec:
  type: system-service
  
  dependencies: []
  
  capabilities:
    - id: health-check
      name: 健康检查
      description: 执行系统健康检查
      category: monitoring
      type: ATOMIC
      
    - id: service-check
      name: 服务检查
      description: 检查各服务状态
      category: monitoring
      type: ATOMIC
      
    - id: health-report
      name: 报告生成
      description: 生成健康报告
      category: monitoring
      type: ATOMIC
      
    - id: health-schedule
      name: 健康调度
      description: 调度健康检查任务
      category: monitoring
      type: ATOMIC
      
    - id: health-status
      name: 状态获取
      description: 获取系统健康状态
      category: monitoring
      type: ATOMIC
  
  endpoints:
    - path: /api/health/check
      method: POST
      description: 执行健康检查
      capability: health-check
      
    - path: /api/health/services
      method: GET
      description: 获取服务列表
      capability: service-check
      
    - path: /api/health/services/{serviceName}/check
      method: POST
      description: 检查指定服务
      capability: service-check
      
    - path: /api/health/report
      method: POST
      description: 生成健康报告
      capability: health-report
      
    - path: /api/health/schedule
      method: POST
      description: 调度健康检查
      capability: health-schedule
      
    - path: /api/health/status
      method: GET
      description: 获取健康状态
      capability: health-status
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.health.HealthSkillApplication
  
  config:
    optional:
      - name: CHECK_INTERVAL
        type: integer
        default: 60000
        description: 检查间隔（毫秒）
      - name: TIMEOUT
        type: integer
        default: 5000
        description: 超时时间（毫秒）
      - name: REPORT_FORMAT
        type: string
        default: "json"
        description: 报告格式
  
  resources:
    cpu: "100m"
    memory: "128Mi"
    storage: "50Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true
