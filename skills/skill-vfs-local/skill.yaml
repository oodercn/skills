apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-vfs-local
  name: Local File Storage
  version: 0.7.3
  description: 本地文件存储服务 - 提供本地文件系统存储能力
  author: Ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills/tree/main/skills/skill-vfs-local
  repository: https://gitee.com/ooderCN/skills.git
  keywords:
    - vfs
    - local
    - storage
    - file

spec:
  type: service-skill
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.vfs.local.LocalVfsApplication
  
  capabilities:
    - id: vfs-storage
      name: VFS Storage
      description: 虚拟文件系统存储
      category: storage
    - id: file-read
      name: File Read
      description: 文件读取
      category: storage
    - id: file-write
      name: File Write
      description: 文件写入
      category: storage
    - id: file-delete
      name: File Delete
      description: 文件删除
      category: storage
  
  scenes:
    - name: vfs-local
      description: 本地存储场景
      capabilities:
        - vfs-storage
        - file-read
        - file-write
        - file-delete
  
  dependencies: []
  
  config:
    optional:
      - name: VFS_LOCAL_ROOT
        type: string
        default: ./data
        description: 本地存储根目录
      - name: VFS_MAX_FILE_SIZE
        type: string
        default: 100MB
        description: 最大文件大小
  
  endpoints:
    - path: /api/vfs/upload
      method: POST
      description: 上传文件
      capability: file-write
    - path: /api/vfs/download/{fileId}
      method: GET
      description: 下载文件
      capability: file-read
    - path: /api/vfs/files
      method: GET
      description: 获取文件列表
      capability: vfs-storage
    - path: /api/vfs/files/{fileId}
      method: DELETE
      description: 删除文件
      capability: file-delete
    - path: /api/health
      method: GET
      description: 健康检查
  
  resources:
    cpu: "100m"
    memory: "256Mi"
    storage: "10Gi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: false
