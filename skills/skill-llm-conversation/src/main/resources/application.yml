server:
  port: 8087

spring:
  application:
    name: skill-llm-conversation
  
  datasource:
    url: jdbc:h2:file:./data/conversation;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    net.ooder: DEBUG
    org.springframework.web: INFO
