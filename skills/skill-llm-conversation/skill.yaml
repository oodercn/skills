apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-llm-conversation
  name: LLM对话服务
  version: 1.0.0
  description: LLM对话服务，提供智能对话、会话管理、历史记录功能
  author: ooder Team
  type: llm-service
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - llm
    - conversation
    - chat
    - ai

spec:
  type: llm-service
  
  dependencies:
    - id: skill-llm-context-builder
      version: ">=1.0.0"
      required: true
      description: "上下文构建服务"
  
  providedInterfaces:
    - id: llm-chat
      version: "1.0"
      description: "LLM对话接口"
    - id: conversation-history
      version: "1.0"
      description: "对话历史接口"
  
  capabilities:
    - id: llm-chat
      name: 智能对话
      description: 与LLM进行智能对话
      category: ai
    - id: session-manage
      name: 会话管理
      description: 管理对话会话
      category: service
    - id: history-record
      name: 历史记录
      description: 记录对话历史
      category: service
  
  endpoints:
    - path: /api/llm/chat
      method: POST
      description: 发送对话消息
      capability: llm-chat
    - path: /api/llm/chat/stream
      method: POST
      description: 流式对话
      capability: llm-chat
    - path: /api/llm/sessions
      method: GET
      description: 获取会话列表
      capability: session-manage
    - path: /api/llm/sessions/{sessionId}
      method: DELETE
      description: 删除会话
      capability: session-manage
    - path: /api/llm/sessions/{sessionId}/history
      method: GET
      description: 获取对话历史
      capability: history-record
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
  
  config:
    optional:
      - name: MAX_HISTORY
        type: integer
        default: 100
        description: 最大历史记录数
      - name: SESSION_TIMEOUT
        type: integer
        default: 3600
        description: 会话超时时间（秒）
  
  resources:
    cpu: "200m"
    memory: "256Mi"
    storage: "100Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true
