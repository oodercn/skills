<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800px" height="500px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .p2p-line { fill: none; stroke: #059669; stroke-width: 2; stroke-dasharray: 5,5; }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; fill: #334155; }
        .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-p2p { font-size: 13px; font-weight: bold; fill: #059669; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<!-- Title -->
<rect class="title-box" x="20" y="15" width="760" height="40" rx="4"/>
<text class="text-header" x="400" y="42" text-anchor="middle">技能 P2P 分享网络</text>

<!-- Enterprise A -->
<rect class="box" x="30" y="75" width="220" height="140"/>
<text class="text-title" x="140" y="100" text-anchor="middle">企业 A</text>
<rect class="box-alt" x="50" y="115" width="180" height="40"/>
<text class="text" x="140" y="135" text-anchor="middle">技能市场</text>
<text class="text" x="140" y="150" text-anchor="middle">10个技能</text>
<rect class="box-highlight" x="50" y="165" width="180" height="40"/>
<text class="text" x="140" y="185" text-anchor="middle">自主技能</text>
<text class="text" x="140" y="200" text-anchor="middle">5个私有</text>

<!-- Enterprise B -->
<rect class="box" x="290" y="75" width="220" height="140"/>
<text class="text-title" x="400" y="100" text-anchor="middle">企业 B</text>
<rect class="box-alt" x="310" y="115" width="180" height="40"/>
<text class="text" x="400" y="135" text-anchor="middle">技能市场</text>
<text class="text" x="400" y="150" text-anchor="middle">15个技能</text>
<rect class="box-highlight" x="310" y="165" width="180" height="40"/>
<text class="text" x="400" y="185" text-anchor="middle">自主技能</text>
<text class="text" x="400" y="200" text-anchor="middle">8个私有</text>

<!-- Enterprise C -->
<rect class="box" x="550" y="75" width="220" height="140"/>
<text class="text-title" x="660" y="100" text-anchor="middle">企业 C</text>
<rect class="box-alt" x="570" y="115" width="180" height="40"/>
<text class="text" x="660" y="135" text-anchor="middle">技能市场</text>
<text class="text" x="660" y="150" text-anchor="middle">8个技能</text>
<rect class="box-highlight" x="570" y="165" width="180" height="40"/>
<text class="text" x="660" y="185" text-anchor="middle">自主技能</text>
<text class="text" x="660" y="200" text-anchor="middle">3个私有</text>

<!-- P2P Network Lines -->
<line class="p2p-line" x1="250" y1="135" x2="290" y2="135"/>
<line class="p2p-line" x1="510" y1="135" x2="550" y2="135"/>
<text class="text-p2p" x="270" y="125" text-anchor="middle">P2P</text>
<text class="text-p2p" x="530" y="125" text-anchor="middle">P2P</text>

<!-- Sharing Mechanism -->
<rect class="box-highlight" x="30" y="235" width="740" height="120"/>
<text class="text-title" x="400" y="260" text-anchor="middle">分享机制</text>
<text class="text" x="50" y="290">• 企业可选择将技能发布到 P2P 网络，设置访问权限（公开/授权/付费）</text>
<text class="text" x="50" y="315">• 其他企业可搜索、订阅、使用共享技能，支持版本管理和依赖解析</text>
<text class="text" x="50" y="340">• 支持技能评分、评论、贡献者认证，构建可信的技能生态</text>

<!-- Security -->
<rect class="box" x="30" y="370" width="740" height="110"/>
<text class="text-title" x="400" y="395" text-anchor="middle">安全与隐私</text>
<text class="text" x="50" y="425">🔒 私有技能：完全企业内网隔离，数据不出域，源码加密保护</text>
<text class="text" x="50" y="450">🌐 共享技能：可选择性开放接口定义，实现逻辑保持封闭</text>
<text class="text" x="50" y="475">✅ 审计追踪：完整的技能使用日志，支持合规审计</text>

</svg>
