server:
  port: 8084

spring:
  application:
    name: skill-scene
  autoconfigure:
    exclude: net.ooder.scene.config.SceneEngineAutoConfiguration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    net.ooder: DEBUG

ooder:
  jds:
    enabled: false
    server:
      home: ./
    config:
      name: scene
  sdk:
    enabled: true
  skills:
    path: E:/github/ooder-skills/skills
    auto-sync: true
  gitee:
    token: 4bb9dd63de689f07ed7cbad19248af3d
    owner: ooderCN
    skills-repo: skills
  github:
    token: 
    owner: oodercn
    skills-repo: skills
  mock:
    enabled: false
  llm:
    provider: deepseek
    model: deepseek-chat
    deepseek:
      api-key: sk-0bcb80730d544cc99a2c8ad3863f71ed
    baidu:
      api-key: ALTAK-I9uJAzQtIwq0gPhdKKgap
      secret-key: c92980b6fcee33cc8e19da2e8347395e2ef9ec43

scene:
  decision:
    mode: ONLINE_FIRST
    cache:
      enabled: true
      ttl: 300000
    timeout: 30000
  
  rule:
    engine:
      cache-size: 1000
      sandbox:
        enabled: true
      timeout: 5000
    sandbox:
      allowed-packages:
        - java.lang
        - java.util
        - java.text
      denied-methods:
        - exit
        - exec
        - getRuntime
  
  knowledge:
    layer:
      general:
        enabled: true
      professional:
        enabled: true
      scene:
        enabled: true
    search:
      default-top-k: 5
      default-threshold: 0.7
      cross-layer:
        enabled: true
  
  llm:
    provider:
      default-model: deepseek-chat
      timeout: 60000
      max-retries: 3
    function-calling:
      enabled: true
      max-iterations: 5
  
  vector:
    dimension: 1536
    store:
      type: memory
