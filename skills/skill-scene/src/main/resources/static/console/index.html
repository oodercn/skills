<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SkillCenter Console - 技能中心管理控制台">
    <meta name="theme-color" content="#3b82f6">
    <title>SkillCenter Console - Ooder</title>
    <link rel="stylesheet" href="/console/css/theme.css">
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <link rel="stylesheet" href="/console/css/index.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold">
                    <i class="ri-bolt-line"></i> Nexus Console
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-page__title">
                    <h1><i class="ri-dashboard-3-line"></i> SkillCenter 控制台</h1>
                    <p class="nx-page__subtitle">请选择您要使用的功能模块</p>
                </div>
                <div class="nx-page__actions">
                    <button class="theme-toggle-btn btn btn-secondary" id="theme-toggle">
                        <i class="ri-sun-line"></i> 浅色模式
                    </button>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="page-type-selection">
                        <div class="page-type-card" onclick="selectPageType('dashboard')">
                            <div class="icon"><i class="ri-dashboard-line"></i></div>
                            <h3>仪表盘</h3>
                            <p>查看系统概览、统计数据和最近活动</p>
                            <button class="btn btn-primary">进入仪表盘</button>
                        </div>
                        
                        <div class="page-type-card" onclick="selectPageType('personal')">
                            <div class="icon"><i class="ri-user-line"></i></div>
                            <h3>个人中心</h3>
                            <p>管理个人技能、执行历史和群组设置</p>
                            <button class="btn btn-primary">进入个人中心</button>
                        </div>
                        
                        <div class="page-type-card" onclick="selectPageType('market')">
                            <div class="icon"><i class="ri-store-2-line"></i></div>
                            <h3>技能市场</h3>
                            <p>浏览、搜索和安装各类技能组件</p>
                            <button class="btn btn-primary">进入技能市场</button>
                        </div>
                        
                        <div class="page-type-card" onclick="selectPageType('admin')">
                            <div class="icon"><i class="ri-admin-line"></i></div>
                            <h3>管理中心</h3>
                            <p>系统管理、技能认证和用户群组管理</p>
                            <button class="btn btn-primary">进入管理中心</button>
                        </div>
                    </div>
                    
                    <div class="recent-section">
                        <h3><i class="ri-history-line"></i> 最近访问</h3>
                        <div id="recent-access"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/api.js"></script>
    <script src="/console/js/theme-manager.js"></script>
    <script src="/console/js/index.js"></script>
</body>
</html>
