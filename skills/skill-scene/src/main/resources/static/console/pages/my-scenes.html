<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的场景 - Skill Scene</title>
    
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <style>
        .scene-section { margin-bottom: 24px; }
        .scene-section-header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--nx-border-color);
        }
        .scene-section-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .scene-section-count {
            background: var(--nx-primary);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }
        .scene-card {
            background: var(--nx-bg-elevated);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--nx-border-color);
            transition: all 0.2s ease;
        }
        .scene-card:hover {
            border-color: var(--nx-primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .scene-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .scene-card-title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .scene-card-meta {
            display: flex;
            gap: 16px;
            color: var(--nx-text-secondary);
            font-size: 13px;
            margin-bottom: 12px;
        }
        .scene-card-actions {
            display: flex;
            gap: 8px;
        }
        .workflow-progress {
            background: var(--nx-bg-secondary);
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
            margin-top: 8px;
        }
        .workflow-progress-bar {
            height: 100%;
            background: var(--nx-primary);
            transition: width 0.3s ease;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--nx-text-secondary);
        }
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold" style="display: flex; align-items: center; gap: 8px;">
                    <i class="ri-apps-line"></i> Skill Scene
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle>
                        <i class="ri-menu-line"></i>
                    </button>
                    <h2 class="nx-text-lg nx-font-semibold">我的场景</h2>
                </div>
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle>
                        <i class="ri-sun-line"></i>
                    </button>
                    <button class="nx-btn nx-btn--primary" onclick="createScene()">
                        <i class="ri-add-line"></i> 创建场景
                    </button>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="nx-grid nx-grid-cols-4 nx-mb-6">
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--primary">
                                <i class="ri-artboard-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">我创建的</div>
                                <div class="nx-stat-card__value" id="createdCount">0</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--success">
                                <i class="ri-play-circle-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">运行中</div>
                                <div class="nx-stat-card__value" id="runningCount">0</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--info">
                                <i class="ri-user-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">我参与的</div>
                                <div class="nx-stat-card__value" id="participatedCount">0</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--warning">
                                <i class="ri-time-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">待处理</div>
                                <div class="nx-stat-card__value" id="pendingCount">0</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="scene-section">
                        <div class="scene-section-header">
                            <div class="scene-section-title">
                                <i class="ri-add-circle-line"></i>
                                我创建的场景
                                <span class="scene-section-count" id="createdCountBadge">0</span>
                            </div>
                            <button class="nx-btn nx-btn--ghost nx-btn--sm" onclick="refreshCreated()">
                                <i class="ri-refresh-line"></i>
                            </button>
                        </div>
                        <div id="createdScenes">
                            <div class="empty-state">
                                <i class="ri-folder-open-line"></i>
                                <p>暂无创建的场景</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="scene-section">
                        <div class="scene-section-header">
                            <div class="scene-section-title">
                                <i class="ri-play-circle-line"></i>
                                我启动的场景
                                <span class="scene-section-count" id="startedCountBadge">0</span>
                            </div>
                            <button class="nx-btn nx-btn--ghost nx-btn--sm" onclick="refreshStarted()">
                                <i class="ri-refresh-line"></i>
                            </button>
                        </div>
                        <div id="startedScenes">
                            <div class="empty-state">
                                <i class="ri-folder-open-line"></i>
                                <p>暂无启动的场景</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="scene-section">
                        <div class="scene-section-header">
                            <div class="scene-section-title">
                                <i class="ri-user-star-line"></i>
                                我参与的场景
                                <span class="scene-section-count" id="participatedCountBadge">0</span>
                            </div>
                            <button class="nx-btn nx-btn--ghost nx-btn--sm" onclick="refreshParticipated()">
                                <i class="ri-refresh-line"></i>
                            </button>
                        </div>
                        <div id="participatedScenes">
                            <div class="empty-state">
                                <i class="ri-folder-open-line"></i>
                                <p>暂无参与的场景</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/nexus-menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/utils/dict-cache.js"></script>
    <script src="/console/js/pages/my-scenes.js"></script>
</body>
</html>
