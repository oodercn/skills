<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的能力 - Nexus Console</title>
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <style>
        .my-cap-page { padding: 20px; }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .page-title {
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .page-title i { color: var(--nx-primary); }
        
        .page-subtitle {
            color: var(--nx-text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: var(--nx-bg-elevated);
            border: 1px solid var(--nx-border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 12px;
        }
        
        .stat-icon.total { background: #dbeafe; color: #2563eb; }
        .stat-icon.active { background: #d1fae5; color: #059669; }
        .stat-icon.inactive { background: #fef3c7; color: #d97706; }
        .stat-icon.error { background: #fee2e2; color: #dc2626; }
        .stat-icon.calls { background: #f3e8ff; color: #7c3aed; }
        
        .stat-value {
            font-size: 32px;
            font-weight: 600;
            color: var(--nx-text);
        }
        
        .stat-label {
            font-size: 13px;
            color: var(--nx-text-secondary);
            margin-top: 4px;
        }
        
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .toolbar-left {
            display: flex;
            gap: 12px;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--nx-bg-elevated);
            border: 1px solid var(--nx-border);
            border-radius: 8px;
            padding: 8px 12px;
            min-width: 280px;
        }
        
        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            flex: 1;
            font-size: 14px;
        }
        
        .search-box i { color: var(--nx-text-secondary); }
        
        .filter-chips {
            display: flex;
            gap: 8px;
        }
        
        .filter-chip {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            background: var(--nx-bg-elevated);
            border: 1px solid var(--nx-border);
            transition: all 0.2s;
        }
        
        .filter-chip:hover { border-color: var(--nx-primary); }
        .filter-chip.active { background: var(--nx-primary); color: white; border-color: var(--nx-primary); }
        
        .cap-table {
            background: var(--nx-bg-elevated);
            border: 1px solid var(--nx-border);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .cap-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .cap-table th {
            background: var(--nx-bg);
            padding: 14px 16px;
            text-align: left;
            font-weight: 500;
            font-size: 13px;
            color: var(--nx-text-secondary);
            border-bottom: 1px solid var(--nx-border);
        }
        
        .cap-table td {
            padding: 16px;
            border-bottom: 1px solid var(--nx-border);
            vertical-align: middle;
        }
        
        .cap-table tr:last-child td { border-bottom: none; }
        .cap-table tr:hover td { background: var(--nx-bg-hover); }
        
        .cap-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .cap-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .cap-icon.type-SERVICE { background: #dbeafe; color: #2563eb; }
        .cap-icon.type-AI { background: #fce7f3; color: #db2777; }
        .cap-icon.type-COMMUNICATION { background: #d1fae5; color: #059669; }
        .cap-icon.type-STORAGE { background: #fef3c7; color: #d97706; }
        .cap-icon.type-SKILL { background: #cffafe; color: #0891b2; }
        .cap-icon.type-CUSTOM { background: #f1f5f9; color: #64748b; }
        
        .cap-name { font-weight: 500; }
        .cap-id { font-size: 12px; color: var(--nx-text-secondary); font-family: monospace; }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-badge.enabled { background: #d1fae5; color: #059669; }
        .status-badge.disabled { background: #fef3c7; color: #d97706; }
        .status-badge.error { background: #fee2e2; color: #dc2626; }
        .status-badge.pending { background: #e0e7ff; color: #4f46e5; }
        .status-badge.inactive { background: #f1f5f9; color: #64748b; }
        
        .activation-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 8px;
        }
        
        .activation-badge.activated { background: #d1fae5; color: #059669; }
        .activation-badge.pending { background: #fef3c7; color: #d97706; }
        .activation-badge.inactive { background: #f1f5f9; color: #64748b; }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }
        
        .status-badge.enabled .status-dot { animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .action-btns {
            display: flex;
            gap: 8px;
        }
        
        .detail-panel {
            position: fixed;
            top: 0;
            right: -480px;
            width: 480px;
            height: 100%;
            background: var(--nx-bg-elevated);
            border-left: 1px solid var(--nx-border);
            box-shadow: -4px 0 20px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: right 0.3s;
            display: flex;
            flex-direction: column;
        }
        
        .detail-panel.open { right: 0; }
        
        .detail-header {
            padding: 20px;
            border-bottom: 1px solid var(--nx-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .detail-title { font-size: 18px; font-weight: 600; }
        
        .detail-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .detail-section { margin-bottom: 24px; }
        .detail-section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--nx-text-secondary);
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--nx-border);
        }
        
        .detail-row:last-child { border-bottom: none; }
        .detail-row-label { color: var(--nx-text-secondary); }
        .detail-row-value { font-weight: 500; }
        
        .config-form {
            background: var(--nx-bg);
            border-radius: 8px;
            padding: 16px;
        }
        
        .config-field {
            margin-bottom: 16px;
        }
        
        .config-field:last-child { margin-bottom: 0; }
        
        .config-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        
        .config-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--nx-border);
            border-radius: 6px;
            background: var(--nx-bg-elevated);
            font-size: 14px;
        }
        
        .config-input:focus {
            outline: none;
            border-color: var(--nx-primary);
        }
        
        .config-hint {
            font-size: 12px;
            color: var(--nx-text-secondary);
            margin-top: 4px;
        }
        
        .binding-list {
            background: var(--nx-bg);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .binding-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid var(--nx-border);
        }
        
        .binding-item:last-child { border-bottom: none; }
        
        .binding-info { display: flex; align-items: center; gap: 12px; }
        .binding-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--nx-primary-light); display: flex; align-items: center; justify-content: center; color: var(--nx-primary); }
        .binding-name { font-weight: 500; font-size: 14px; }
        .binding-scene { font-size: 12px; color: var(--nx-text-secondary); }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .overlay.open { opacity: 1; visibility: visible; }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--nx-text-secondary);
        }
        
        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state-title { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
        .empty-state-desc { font-size: 14px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold" style="display: flex; align-items: center; gap: 8px;">
                    <i class="ri-server-line"></i> Nexus Console
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <div class="my-cap-page">
                <header class="nx-page__header" style="border-bottom: none;">
                    <div class="nx-flex nx-items-center nx-gap-3">
                        <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle>
                            <i class="ri-menu-line"></i>
                        </button>
                        <div>
                            <h2 class="page-title">
                                <i class="ri-user-star-line"></i>
                                我的能力
                            </h2>
                            <p class="page-subtitle">查看和管理已安装的能力</p>
                        </div>
                    </div>
                    <div class="nx-flex nx-items-center nx-gap-3">
                        <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle>
                            <i class="ri-sun-line"></i>
                        </button>
                        <a href="/console/pages/capability-discovery.html" class="nx-btn nx-btn--secondary">
                            <i class="ri-compass-discover-line"></i> 发现能力
                        </a>
                        <a href="/console/pages/capability-create.html" class="nx-btn nx-btn--primary">
                            <i class="ri-add-line"></i> 新建能力
                        </a>
                    </div>
                </header>
                
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-icon total"><i class="ri-flashlight-line"></i></div>
                        <div class="stat-value" id="statTotal">0</div>
                        <div class="stat-label">总能力数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon active"><i class="ri-checkbox-circle-line"></i></div>
                        <div class="stat-value" id="statActive">0</div>
                        <div class="stat-label">已启用</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon inactive"><i class="ri-pause-circle-line"></i></div>
                        <div class="stat-value" id="statInactive">0</div>
                        <div class="stat-label">已停用</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon error"><i class="ri-error-warning-line"></i></div>
                        <div class="stat-value" id="statError">0</div>
                        <div class="stat-label">异常</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon calls"><i class="ri-line-chart-line"></i></div>
                        <div class="stat-value" id="statCalls">0</div>
                        <div class="stat-label">今日调用</div>
                    </div>
                </div>
                
                <div class="toolbar">
                    <div class="toolbar-left">
                        <div class="search-box">
                            <i class="ri-search-line"></i>
                            <input type="text" placeholder="搜索能力名称或ID..." id="searchInput" oninput="filterCapabilities()">
                        </div>
                        <div class="filter-chips">
                            <span class="filter-chip active" data-status="all" onclick="filterByStatus('all')">全部</span>
                            <span class="filter-chip" data-status="ENABLED" onclick="filterByStatus('ENABLED')">已启用</span>
                            <span class="filter-chip" data-status="DISABLED" onclick="filterByStatus('DISABLED')">已停用</span>
                            <span class="filter-chip" data-status="ERROR" onclick="filterByStatus('ERROR')">异常</span>
                        </div>
                    </div>
                    <div class="toolbar-right">
                        <button class="nx-btn nx-btn--secondary" onclick="refreshCapabilities()">
                            <i class="ri-refresh-line"></i> 刷新
                        </button>
                    </div>
                </div>
                
                <div class="cap-table">
                    <table>
                        <thead>
                            <tr>
                                <th>能力</th>
                                <th>类型</th>
                                <th>状态</th>
                                <th>激活状态</th>
                                <th>版本</th>
                                <th>绑定场景</th>
                                <th>最后调用</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="capabilityTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <div class="overlay" id="overlay" onclick="closeDetailPanel()"></div>
    
    <div class="detail-panel" id="detailPanel">
        <div class="detail-header">
            <span class="detail-title" id="detailTitle">能力详情</span>
            <button class="nx-btn nx-btn--ghost nx-btn--icon" onclick="closeDetailPanel()">
                <i class="ri-close-line"></i>
            </button>
        </div>
        <div class="detail-body" id="detailBody">
        </div>
    </div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/api-client.js"></script>
    <script src="/console/js/nexus-menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/llm-assistant.js"></script>
    <script src="/console/js/pages/my-capabilities.js"></script>
</body>
</html>
