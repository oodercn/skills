<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>已完成场景 - Skill Scene</title>
    
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <style>
        .filter-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            padding: 16px;
            background: var(--nx-bg-elevated);
            border-radius: 8px;
            border: 1px solid var(--nx-border-color);
        }
        .filter-bar .form-group {
            margin-bottom: 0;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--nx-bg-elevated);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid var(--nx-border-color);
            text-align: center;
        }
        .stat-card-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--nx-primary);
            margin-bottom: 4px;
        }
        .stat-card-label {
            font-size: 13px;
            color: var(--nx-text-secondary);
        }
        .history-card {
            background: var(--nx-bg-elevated);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--nx-border-color);
            transition: all 0.2s ease;
        }
        .history-card:hover {
            border-color: var(--nx-primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .history-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .history-card-title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .history-card-meta {
            display: flex;
            gap: 16px;
            color: var(--nx-text-secondary);
            font-size: 13px;
            margin-bottom: 12px;
        }
        .history-card-actions {
            display: flex;
            gap: 8px;
        }
        .status-success {
            color: var(--nx-success);
        }
        .status-failed {
            color: var(--nx-error);
        }
        .status-partial {
            color: var(--nx-warning);
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--nx-text-secondary);
        }
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold" style="display: flex; align-items: center; gap: 8px;">
                    <i class="ri-apps-line"></i> Skill Scene
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle>
                        <i class="ri-menu-line"></i>
                    </button>
                    <h2 class="nx-text-lg nx-font-semibold">已完成场景</h2>
                </div>
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle>
                        <i class="ri-sun-line"></i>
                    </button>
                    <button class="nx-btn nx-btn--secondary" onclick="exportHistory()">
                        <i class="ri-download-line"></i> 导出报表
                    </button>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-card-value" id="totalScenes">0</div>
                            <div class="stat-card-label">完成场景</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-card-value" id="participateCount">0</div>
                            <div class="stat-card-label">参与次数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-card-value" id="successRate">0%</div>
                            <div class="stat-card-label">成功率</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-card-value" id="avgDuration">0分钟</div>
                            <div class="stat-card-label">平均耗时</div>
                        </div>
                    </div>
                    
                    <div class="filter-bar">
                        <div class="form-group">
                            <label class="nx-text-sm nx-text-secondary">时间范围</label>
                            <select class="nx-select" id="timeRange" onchange="refreshHistory()">
                                <option value="7">最近7天</option>
                                <option value="30" selected>最近30天</option>
                                <option value="90">最近3个月</option>
                                <option value="365">最近1年</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="nx-text-sm nx-text-secondary">场景类型</label>
                            <select class="nx-select" id="sceneType" onchange="refreshHistory()">
                                <option value="">全部类型</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="nx-text-sm nx-text-secondary">执行状态</label>
                            <select class="nx-select" id="execStatus" onchange="refreshHistory()">
                                <option value="">全部状态</option>
                                <option value="success">成功</option>
                                <option value="failed">失败</option>
                                <option value="partial">部分成功</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label class="nx-text-sm nx-text-secondary">搜索</label>
                            <input type="text" class="nx-input" id="searchKeyword" placeholder="搜索场景名称..." onkeyup="handleSearch(event)">
                        </div>
                        <div class="form-group" style="align-self: flex-end;">
                            <button class="nx-btn nx-btn--secondary" onclick="refreshHistory()">
                                <i class="ri-refresh-line"></i> 刷新
                            </button>
                        </div>
                    </div>
                    
                    <div id="historyList"></div>
                    
                    <div class="nx-flex nx-justify-center nx-mt-6" id="pagination" style="display: none;">
                        <button class="nx-btn nx-btn--ghost" onclick="loadMore()">加载更多</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/api-client.js"></script>
    <script src="/console/js/nexus-menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/utils/dict-cache.js"></script>
    <script src="/console/js/pages/my-history.js"></script>
</body>
</html>
