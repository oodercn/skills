<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>场景组详情 - Skill Scene</title>
    
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .participant-card { border: 1px solid var(--nx-border); border-radius: 8px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
        .participant-card:hover { border-color: var(--nx-primary); }
        .participant-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .binding-card { border: 1px solid var(--nx-border); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .status-indicator { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .status-indicator.active { background: var(--nx-success-light); color: var(--nx-success); }
        .status-indicator.inactive { background: var(--nx-warning-light); color: var(--nx-warning); }
        .status-indicator.error { background: var(--nx-danger-light); color: var(--nx-danger); }
        
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--nx-bg-card); border-radius: 12px; width: 90%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--nx-border); }
        .modal-header h3 { margin: 0; font-size: 18px; color: var(--nx-text-primary); }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--nx-text-secondary); padding: 0; line-height: 1; }
        .modal-close:hover { color: var(--nx-text-primary); }
        .modal-body { padding: 20px; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 12px; padding: 16px 20px; border-top: 1px solid var(--nx-border); }
        
        .nx-w-100 { width: 100%; }
        .nx-text-error { color: var(--nx-danger); }
        
        .org-tree { border: 1px solid var(--nx-border); border-radius: 8px; max-height: 300px; overflow-y: auto; background: var(--nx-bg-input); }
        .org-tree-node { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid var(--nx-border); }
        .org-tree-node:last-child { border-bottom: none; }
        .org-tree-node:hover { background: var(--nx-bg-hover); }
        .org-tree-node.selected { background: var(--nx-primary-light); color: var(--nx-primary); }
        .org-tree-node.dept { font-weight: var(--nx-font-semibold); background: var(--nx-bg-elevated); }
        .org-tree-node.dept i { margin-right: 8px; color: var(--nx-primary); }
        .org-tree-node.user { padding-left: 32px; }
        .org-tree-node.user i { margin-right: 8px; color: var(--nx-text-secondary); }
        .org-tree-children { display: none; }
        .org-tree-children.expanded { display: block; }
        
        .capability-category { display: flex; gap: 16px; }
        .capability-category-list { width: 200px; border: 1px solid var(--nx-border); border-radius: 8px; max-height: 300px; overflow-y: auto; }
        .capability-category-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--nx-border); display: flex; align-items: center; gap: 8px; }
        .capability-category-item:last-child { border-bottom: none; }
        .capability-category-item:hover { background: var(--nx-bg-hover); }
        .capability-category-item.selected { background: var(--nx-primary-light); color: var(--nx-primary); }
        .capability-list { flex: 1; border: 1px solid var(--nx-border); border-radius: 8px; max-height: 300px; overflow-y: auto; }
        .capability-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--nx-border); }
        .capability-item:last-child { border-bottom: none; }
        .capability-item:hover { background: var(--nx-bg-hover); }
        .capability-item.selected { background: var(--nx-primary-light); color: var(--nx-primary); }
        .capability-item .cap-name { font-weight: var(--nx-font-medium); }
        .capability-item .cap-desc { font-size: var(--nx-text-xs); color: var(--nx-text-secondary); margin-top: 4px; }
    </style>
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold" style="display: flex; align-items: center; gap: 8px;">
                    <i class="ri-apps-line"></i> Skill Scene
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle>
                        <i class="ri-menu-line"></i>
                    </button>
                    <a href="scene-group-management.html" class="nx-btn nx-btn--ghost nx-btn--icon">
                        <i class="ri-arrow-left-line"></i>
                    </a>
                    <h2 class="nx-text-lg nx-font-semibold" id="pageTitle">场景组详情</h2>
                </div>
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle>
                        <i class="ri-sun-line"></i>
                    </button>
                    <button class="nx-btn nx-btn--secondary" id="toggleStatusBtn" onclick="toggleStatus()">
                        <i class="ri-pause-line"></i> <span>暂停</span>
                    </button>
                    <button class="nx-btn nx-btn--primary" onclick="startWorkflow()">
                        <i class="ri-play-line"></i> 启动工作流
                    </button>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="nx-card nx-mb-6">
                        <div class="nx-card__body">
                            <div class="nx-flex nx-items-center nx-justify-between">
                                <div class="nx-flex nx-items-center nx-gap-4">
                                    <div class="nx-flex nx-items-center nx-justify-center" style="width: 64px; height: 64px; background: var(--nx-primary-light); border-radius: 12px;">
                                        <i class="ri-group-line" style="font-size: 32px; color: var(--nx-primary);"></i>
                                    </div>
                                    <div>
                                        <h3 class="nx-text-xl nx-font-semibold" id="groupName">加载中...</h3>
                                        <div class="nx-flex nx-items-center nx-gap-3 nx-mt-1">
                                            <span class="nx-badge nx-badge--secondary" id="groupTemplate">-</span>
                                            <span class="status-indicator" id="groupStatus">-</span>
                                            <span class="nx-text-sm nx-text-secondary"><code id="sceneGroupId">-</code></span>
                                        </div>
                                    </div>
                                </div>
                                <div class="nx-flex nx-gap-6">
                                    <div class="nx-text-center">
                                        <div class="nx-text-2xl nx-font-bold" id="memberCount">0</div>
                                        <div class="nx-text-sm nx-text-secondary">成员数</div>
                                    </div>
                                    <div class="nx-text-center">
                                        <div class="nx-text-2xl nx-font-bold" id="bindingCount">0</div>
                                        <div class="nx-text-sm nx-text-secondary">能力绑定</div>
                                    </div>
                                    <div class="nx-text-center">
                                        <div class="nx-text-2xl nx-font-bold" id="workflowCount">0</div>
                                        <div class="nx-text-sm nx-text-secondary">工作流执行</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="nx-tabs nx-mb-4">
                        <div class="nx-tabs__list">
                            <button class="nx-tabs__tab active" data-tab="overview">概览</button>
                            <button class="nx-tabs__tab" data-tab="participants">参与者</button>
                            <button class="nx-tabs__tab" data-tab="capabilities">能力绑定</button>
                            <button class="nx-tabs__tab" data-tab="workflows">工作流</button>
                            <button class="nx-tabs__tab" data-tab="snapshots">快照</button>
                            <button class="nx-tabs__tab" data-tab="logs">日志</button>
                        </div>
                    </div>
                    
                    <div id="tab-overview" class="tab-content active">
                        <div class="nx-grid nx-grid-cols-2 nx-gap-6">
                            <div class="nx-card">
                                <div class="nx-card__header">
                                    <h4 class="nx-card__title">基本信息</h4>
                                </div>
                                <div class="nx-card__body">
                                    <div class="nx-form-group nx-mb-3">
                                        <label class="nx-form-label">描述</label>
                                        <p id="groupDescription" class="nx-text-secondary">-</p>
                                    </div>
                                    <div class="nx-form-group nx-mb-3">
                                        <label class="nx-form-label">创建者</label>
                                        <p id="groupCreator">-</p>
                                    </div>
                                    <div class="nx-form-group nx-mb-3">
                                        <label class="nx-form-label">创建时间</label>
                                        <p id="groupCreateTime">-</p>
                                    </div>
                                    <div class="nx-form-group">
                                        <label class="nx-form-label">配置</label>
                                        <div id="groupConfig" class="nx-text-secondary">-</div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="nx-card">
                                <div class="nx-card__header">
                                    <h4 class="nx-card__title">参与者概览</h4>
                                </div>
                                <div class="nx-card__body" id="participantOverview">
                                    <p class="nx-text-secondary">暂无参与者</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div id="tab-participants" class="tab-content">
                        <div class="nx-flex nx-justify-end nx-mb-4">
                            <button class="nx-btn nx-btn--primary" onclick="inviteParticipant()">
                                <i class="ri-user-add-line"></i> 邀请参与者
                            </button>
                        </div>
                        <div id="participantList">
                            <p class="nx-text-secondary">暂无参与者</p>
                        </div>
                    </div>
                    
                    <div id="tab-capabilities" class="tab-content">
                        <div class="nx-flex nx-justify-end nx-mb-4">
                            <button class="nx-btn nx-btn--primary" onclick="bindCapability()">
                                <i class="ri-link"></i> 绑定能力
                            </button>
                        </div>
                        <div id="bindingList">
                            <p class="nx-text-secondary">暂无能力绑定</p>
                        </div>
                    </div>
                    
                    <div id="tab-workflows" class="tab-content">
                        <div class="nx-flex nx-justify-end nx-mb-4">
                            <button class="nx-btn nx-btn--primary" onclick="startWorkflow()">
                                <i class="ri-play-line"></i> 启动工作流
                            </button>
                        </div>
                        <div id="workflowList">
                            <p class="nx-text-secondary">暂无工作流执行记录</p>
                        </div>
                    </div>
                    
                    <div id="tab-snapshots" class="tab-content">
                        <div class="nx-flex nx-justify-end nx-mb-4">
                            <button class="nx-btn nx-btn--primary" onclick="createSnapshot()">
                                <i class="ri-camera-line"></i> 创建快照
                            </button>
                        </div>
                        <div id="snapshotList">
                            <p class="nx-text-secondary">暂无快照</p>
                        </div>
                    </div>
                    
                    <div id="tab-logs" class="tab-content">
                        <div class="nx-flex nx-items-center nx-gap-3 nx-mb-4">
                            <select class="nx-input" id="logLevelFilter" onchange="filterLogs()" style="width: 150px;">
                                <option value="">全部级别</option>
                                <option value="INFO">INFO</option>
                                <option value="WARN">WARN</option>
                                <option value="ERROR">ERROR</option>
                                <option value="DEBUG">DEBUG</option>
                            </select>
                            <button class="nx-btn nx-btn--secondary" onclick="refreshLogs()">
                                <i class="ri-refresh-line"></i> 刷新
                            </button>
                        </div>
                        <div class="nx-card">
                            <div class="nx-card__body" id="logList">
                                <p class="nx-text-secondary">暂无日志</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="modal" id="participantModal" style="display: none;">
        <div class="modal-content" style="max-width: 650px;">
            <div class="modal-header">
                <h3>邀请参与者</h3>
                <button class="modal-close" onclick="closeParticipantModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="participantForm">
                    <div class="nx-form-group nx-mb-3">
                        <label class="nx-form-label">参与者类型 <span class="nx-text-error">*</span></label>
                        <select class="nx-input nx-w-100" id="participantType" onchange="onParticipantTypeChange()" required>
                            <option value="">请选择类型</option>
                            <option value="USER">用户参与者</option>
                            <option value="AGENT">Agent参与者</option>
                            <option value="SUPER_AGENT">SuperAgent参与者</option>
                        </select>
                    </div>
                    <div class="nx-form-group nx-mb-3">
                        <label class="nx-form-label">选择参与者 <span class="nx-text-error">*</span></label>
                        <div id="participantSelectorContainer">
                            <div class="nx-text-secondary nx-p-3">请先选择参与者类型</div>
                        </div>
                        <input type="hidden" id="participantIdSelect">
                        <input type="hidden" id="participantName">
                    </div>
                    <div class="nx-form-group nx-mb-3">
                        <label class="nx-form-label">已选择</label>
                        <div id="selectedParticipantDisplay" class="nx-text-secondary">-</div>
                    </div>
                    <div class="nx-form-group nx-mb-3">
                        <label class="nx-form-label">角色 <span class="nx-text-error">*</span></label>
                        <select class="nx-input nx-w-100" id="participantRole" required>
                            <option value="">请选择角色</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="nx-btn nx-btn--secondary" onclick="closeParticipantModal()">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="saveParticipant()">邀请</button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="capabilityModal" style="display: none;">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h3>绑定能力</h3>
                <button class="modal-close" onclick="closeCapabilityModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="capabilityForm">
                    <div class="nx-form-group nx-mb-3">
                        <label class="nx-form-label">选择能力 <span class="nx-text-error">*</span></label>
                        <div class="capability-category">
                            <div class="capability-category-list" id="capCategoryList">
                                <div class="nx-text-secondary nx-p-3">加载中...</div>
                            </div>
                            <div class="capability-list" id="capList">
                                <div class="nx-text-secondary nx-p-3">请先选择能力类型</div>
                            </div>
                        </div>
                        <input type="hidden" id="capId">
                        <input type="hidden" id="capNameDisplay">
                    </div>
                    <div class="nx-form-group nx-mb-3">
                        <label class="nx-form-label">已选择能力</label>
                        <div id="selectedCapabilityDisplay" class="nx-text-secondary">-</div>
                    </div>
                    <div class="nx-form-group nx-mb-3">
                        <label class="nx-form-label">能力提供者类型</label>
                        <select class="nx-input nx-w-100" id="providerType">
                            <option value="SKILL">Skill</option>
                            <option value="AGENT">Agent</option>
                            <option value="SUPER_AGENT">SuperAgent</option>
                            <option value="DEVICE">设备</option>
                        </select>
                    </div>
                    <div class="nx-form-group nx-mb-3">
                        <label class="nx-form-label">提供者</label>
                        <div class="nx-input-group" style="display: flex; gap: 8px;">
                            <input type="text" class="nx-input" id="providerName" readonly placeholder="点击选择提供者" style="flex: 1; cursor: pointer; background: var(--nx-bg-elevated);" onclick="selectProvider()">
                            <input type="hidden" id="providerId">
                            <button type="button" class="nx-btn nx-btn--secondary" onclick="selectProvider()">
                                <i class="ri-search-line"></i>
                            </button>
                        </div>
                    </div>
                    <div class="nx-form-group nx-mb-3">
                        <label class="nx-form-label">连接器类型</label>
                        <select class="nx-input nx-w-100" id="connectorType">
                            <option value="HTTP">HTTP</option>
                            <option value="GRPC">gRPC</option>
                            <option value="WEBSOCKET">WebSocket</option>
                            <option value="INTERNAL">内部调用</option>
                        </select>
                    </div>
                    <div class="nx-form-group nx-mb-3">
                        <label class="nx-form-label">优先级</label>
                        <input type="number" class="nx-input nx-w-100" id="priority" value="1" min="1" max="10">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="nx-btn nx-btn--secondary" onclick="closeCapabilityModal()">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="saveCapabilityBinding()">绑定</button>
            </div>
        </div>
    </div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/api-client.js"></script>
    <script src="/console/js/nexus-menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/nx-selectors.js"></script>
    <script src="/console/js/llm-assistant.js"></script>
    <script src="/console/js/pages/scene-group-detail.js"></script>
</body>
</html>
