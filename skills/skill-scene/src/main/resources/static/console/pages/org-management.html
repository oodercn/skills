<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>组织管理 - Nexus Console</title>
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold">
                    <i class="ri-server-line"></i> Nexus Console
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle aria-label="切换侧边栏">
                        <i class="ri-menu-line"></i>
                    </button>
                    <div class="nx-page__title">
                        <h1><i class="ri-organization-chart" aria-hidden="true"></i> 组织管理</h1>
                        <p>管理组织架构、部门、用户和角色</p>
                    </div>
                </div>
                <div class="nx-page__actions">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle aria-label="切换主题">
                        <i class="ri-sun-line"></i>
                    </button>
                    <div class="nx-relative">
                        <div class="nx-page__user-menu" id="user-menu">
                            <div class="nx-page__user-avatar" id="user-avatar">U</div>
                            <span class="nx-page__user-name" id="user-name">加载中...</span>
                            <i class="ri-arrow-down-s-line"></i>
                        </div>
                        <div class="nx-page__dropdown-menu" id="user-dropdown">
                            <div class="nx-page__dropdown-item" onclick="window.location.href='my-profile.html'">
                                <i class="ri-user-line"></i> 个人中心
                            </div>
                            <div class="nx-page__dropdown-item" onclick="window.location.href='my-capabilities.html'">
                                <i class="ri-puzzle-line"></i> 我的能力
                            </div>
                            <div class="nx-page__dropdown-item nx-page__dropdown-item--danger" onclick="NX.userMenu.logout()">
                                <i class="ri-logout-box-line"></i> 退出登录
                            </div>
                        </div>
                    </div>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="nx-grid nx-grid-cols-4 nx-mb-4">
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon"><i class="ri-building-line"></i></div>
                            <div class="nx-stat-card__content">
                                <h4>部门数量</h4>
                                <p class="nx-stat-card__value" id="dept-count">0</p>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon" style="background: var(--nx-success-light); color: var(--nx-success);"><i class="ri-user-line"></i></div>
                            <div class="nx-stat-card__content">
                                <h4>用户总数</h4>
                                <p class="nx-stat-card__value" id="user-count">0</p>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon" style="background: var(--nx-info-light); color: var(--nx-info);"><i class="ri-user-star-line"></i></div>
                            <div class="nx-stat-card__content">
                                <h4>管理者</h4>
                                <p class="nx-stat-card__value" id="manager-count">0</p>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon" style="background: var(--nx-warning-light); color: var(--nx-warning);"><i class="ri-robot-line"></i></div>
                            <div class="nx-stat-card__content">
                                <h4>Agent数量</h4>
                                <p class="nx-stat-card__value" id="agent-count">0</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="nx-tabs nx-mb-4">
                        <div class="nx-tabs__list">
                            <button class="nx-tabs__tab" onclick="switchTab(event, 'departments')">部门管理</button>
                            <button class="nx-tabs__tab" onclick="switchTab(event, 'users')">用户管理</button>
                            <button class="nx-tabs__tab" onclick="switchTab(event, 'roles')">角色管理</button>
                            <button class="nx-tabs__tab nx-tabs__tab--active" onclick="switchTab(event, 'tree')">组织架构</button>
                        </div>
                    </div>
                    
                    <div id="tab-departments" class="tab-content">
                        <div class="nx-card">
                            <div class="nx-card__header nx-flex nx-items-center nx-justify-between">
                                <h3><i class="ri-building-line"></i> 部门列表</h3>
                                <button class="nx-btn nx-btn--primary nx-btn--sm" onclick="showDeptModal()">
                                    <i class="ri-add-line"></i> 新增部门
                                </button>
                            </div>
                            <div class="nx-card__body">
                                <div id="department-list"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div id="tab-users" class="tab-content">
                        <div class="nx-card">
                            <div class="nx-card__header nx-flex nx-items-center nx-justify-between">
                                <h3><i class="ri-user-line"></i> 用户列表</h3>
                                <div class="nx-flex nx-gap-2">
                                    <select class="nx-select" id="dept-filter" onchange="filterUsers()" style="width: 150px;">
                                        <option value="">全部部门</option>
                                    </select>
                                    <select class="nx-select" id="role-filter" onchange="filterUsers()" style="width: 120px;">
                                        <option value="">全部角色</option>
                                    </select>
                                    <button class="nx-btn nx-btn--primary nx-btn--sm" onclick="showUserModal()">
                                        <i class="ri-add-line"></i> 新增用户
                                    </button>
                                </div>
                            </div>
                            <div class="nx-card__body">
                                <div id="user-list"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div id="tab-roles" class="tab-content">
                        <div class="nx-card">
                            <div class="nx-card__header">
                                <h3><i class="ri-shield-user-line"></i> 角色列表</h3>
                            </div>
                            <div class="nx-card__body">
                                <div id="role-list"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div id="tab-tree" class="tab-content active">
                        <div class="nx-card">
                            <div class="nx-card__header">
                                <h3><i class="ri-organization-chart"></i> 组织架构</h3>
                            </div>
                            <div class="nx-card__body">
                                <div id="org-tree"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="nx-modal" id="user-modal">
        <div class="nx-modal__overlay" onclick="closeUserModal()"></div>
        <div class="nx-modal__content" style="max-width: 500px;">
            <div class="nx-modal__header">
                <h3 id="user-modal-title">新增用户</h3>
                <button class="nx-btn nx-btn--ghost nx-btn--icon" onclick="closeUserModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="nx-modal__body">
                <form id="user-form">
                    <input type="hidden" id="user-id">
                    <div class="nx-form-group">
                        <label class="nx-form-label">姓名 <span class="nx-text-danger">*</span></label>
                        <input type="text" class="nx-input" id="user-name-input" required>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">邮箱</label>
                        <input type="email" class="nx-input" id="user-email">
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">部门</label>
                        <select class="nx-select" id="user-department"></select>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">角色 <span class="nx-text-danger">*</span></label>
                        <select class="nx-select" id="user-role" required></select>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">职位</label>
                        <input type="text" class="nx-input" id="user-title">
                    </div>
                </form>
            </div>
            <div class="nx-modal__footer">
                <button class="nx-btn nx-btn--secondary" onclick="closeUserModal()">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="saveUser()">保存</button>
            </div>
        </div>
    </div>
    
    <div class="nx-modal" id="dept-modal">
        <div class="nx-modal__overlay" onclick="closeDeptModal()"></div>
        <div class="nx-modal__content" style="max-width: 500px;">
            <div class="nx-modal__header">
                <h3 id="dept-modal-title">新增部门</h3>
                <button class="nx-btn nx-btn--ghost nx-btn--icon" onclick="closeDeptModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="nx-modal__body">
                <form id="dept-form">
                    <input type="hidden" id="dept-id">
                    <div class="nx-form-group">
                        <label class="nx-form-label">部门名称 <span class="nx-text-danger">*</span></label>
                        <input type="text" class="nx-input" id="dept-name" required>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">描述</label>
                        <textarea class="nx-input" id="dept-desc" rows="3"></textarea>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">上级部门</label>
                        <select class="nx-select" id="dept-parent"></select>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">部门负责人</label>
                        <select class="nx-select" id="dept-manager"></select>
                    </div>
                </form>
            </div>
            <div class="nx-modal__footer">
                <button class="nx-btn nx-btn--secondary" onclick="closeDeptModal()">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="saveDept()">保存</button>
            </div>
        </div>
    </div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/api.js"></script>
    <script>
        let currentUser = null;
        let allUsers = [];
        let allDepartments = [];
        let allRoles = [];
        let currentTab = 'tree';
        
        async function checkLogin() {
            try {
                const response = await fetch('/api/v1/auth/session');
                const result = await response.json();
                if (result.status === 'success' && result.data) {
                    currentUser = result.data;
                    document.getElementById('user-name').textContent = currentUser.name;
                    await loadRoles();
                    await loadDepartments();
                    await loadUsers();
                    await loadOrgTree();
                } else {
                    window.location.href = '/console/pages/login.html';
                }
            } catch (e) {
                console.error('Session check failed:', e);
                window.location.href = '/console/pages/login.html';
            }
        }
        
        function switchTab(evt, tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nx-tabs__tab').forEach(el => el.classList.remove('nx-tabs__tab--active'));
            
            document.getElementById('tab-' + tab).classList.add('active');
            evt.target.classList.add('nx-tabs__tab--active');
            
            if (tab === 'tree') {
                loadOrgTree();
            }
        }
        
        async function loadRoles() {
            try {
                const response = await fetch('/api/v1/org/roles');
                const result = await response.json();
                if (result.status === 'success' && result.data) {
                    allRoles = result.data;
                    renderRoleList();
                    renderRoleOptions();
                }
            } catch (e) {
                console.error('Failed to load roles:', e);
            }
        }
        
        function renderRoleList() {
            const container = document.getElementById('role-list');
            
            let html = '<div class="nx-table-container"><table class="nx-table">';
            html += '<thead><tr><th>角色ID</th><th>角色名称</th><th>描述</th><th>操作</th></tr></thead><tbody>';
            
            allRoles.forEach(role => {
                html += `
                    <tr>
                        <td><code>${role.id}</code></td>
                        <td><span class="nx-badge nx-badge--primary">${role.name}</span></td>
                        <td>${role.description || '-'}</td>
                        <td>
                            <button class="nx-btn nx-btn--secondary nx-btn--sm" onclick="showMenuAuth('${role.id}')">菜单授权</button>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }
        
        function renderRoleOptions() {
            const selects = ['role-filter', 'user-role'];
            selects.forEach(id => {
                const select = document.getElementById(id);
                if (select) {
                    select.innerHTML = '<option value="">请选择角色</option>';
                    allRoles.forEach(role => {
                        const option = document.createElement('option');
                        option.value = role.id;
                        option.textContent = role.name;
                        select.appendChild(option);
                    });
                }
            });
        }
        
        async function loadDepartments() {
            try {
                const response = await fetch('/api/v1/org/departments');
                const result = await response.json();
                if (result.status === 'success' && result.data) {
                    allDepartments = result.data;
                    document.getElementById('dept-count').textContent = allDepartments.length;
                    renderDepartments();
                    renderDeptOptions();
                }
            } catch (e) {
                console.error('Failed to load departments:', e);
            }
        }
        
        function renderDepartments() {
            const container = document.getElementById('department-list');
            
            if (allDepartments.length === 0) {
                container.innerHTML = '<p class="nx-text-secondary nx-text-center nx-p-4">暂无部门</p>';
                return;
            }
            
            let html = '<div class="nx-table-container"><table class="nx-table">';
            html += '<thead><tr><th>部门名称</th><th>描述</th><th>负责人</th><th>成员数</th><th>操作</th></tr></thead><tbody>';
            
            allDepartments.forEach(dept => {
                const manager = allUsers.find(u => u.userId === dept.managerId);
                const memberCount = dept.memberIds ? dept.memberIds.length : 0;
                
                html += `
                    <tr>
                        <td><div class="nx-flex nx-items-center nx-gap-2"><i class="ri-building-line" style="color: var(--nx-primary);"></i><span class="nx-font-medium">${dept.name}</span></div></td>
                        <td>${dept.description || '-'}</td>
                        <td>${manager ? manager.name : '-'}</td>
                        <td><span class="nx-badge nx-badge--secondary">${memberCount}人</span></td>
                        <td>
                            <button class="nx-btn nx-btn--secondary nx-btn--sm" onclick="editDept('${dept.departmentId}')">编辑</button>
                            <button class="nx-btn nx-btn--danger nx-btn--sm" onclick="deleteDept('${dept.departmentId}')">删除</button>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }
        
        function renderDeptOptions() {
            const selects = ['dept-filter', 'user-department', 'dept-parent'];
            selects.forEach(id => {
                const select = document.getElementById(id);
                if (select) {
                    select.innerHTML = '<option value="">请选择部门</option>';
                    allDepartments.forEach(dept => {
                        const option = document.createElement('option');
                        option.value = dept.departmentId;
                        option.textContent = dept.name;
                        select.appendChild(option);
                    });
                }
            });
        }
        
        async function loadUsers() {
            try {
                const response = await fetch('/api/v1/org/users');
                const result = await response.json();
                if (result.status === 'success' && result.data) {
                    allUsers = result.data;
                    updateStats();
                    renderUsers(allUsers);
                    renderManagerOptions();
                }
            } catch (e) {
                console.error('Failed to load users:', e);
            }
        }
        
        function updateStats() {
            document.getElementById('user-count').textContent = allUsers.length;
            
            const managers = allUsers.filter(u => u.role === 'manager' || u.role === 'admin');
            document.getElementById('manager-count').textContent = managers.length;
            
            const agents = allUsers.filter(u => u.role === 'llm-assistant' || u.role === 'coordinator');
            document.getElementById('agent-count').textContent = agents.length;
        }
        
        function renderUsers(users) {
            const container = document.getElementById('user-list');
            
            if (users.length === 0) {
                container.innerHTML = '<p class="nx-text-secondary nx-text-center nx-p-4">暂无用户</p>';
                return;
            }
            
            let html = '<div class="nx-table-container"><table class="nx-table">';
            html += '<thead><tr><th>用户</th><th>部门</th><th>角色</th><th>邮箱</th><th>操作</th></tr></thead><tbody>';
            
            users.forEach(user => {
                const roleInfo = allRoles.find(r => r.id === user.role);
                const deptInfo = allDepartments.find(d => d.departmentId === user.departmentId);
                const roleClass = getRoleClass(user.role);
                
                html += `
                    <tr>
                        <td>
                            <div class="nx-flex nx-items-center nx-gap-2">
                                <div class="nx-w-8 nx-h-8 nx-rounded-full nx-bg-primary nx-flex nx-items-center nx-justify-center nx-text-white nx-text-sm">
                                    ${(user.name || 'U').charAt(0).toUpperCase()}
                                </div>
                                <div>
                                    <div class="nx-font-medium">${user.name || user.userId}</div>
                                    <div class="nx-text-sm nx-text-secondary">${user.title || ''}</div>
                                </div>
                            </div>
                        </td>
                        <td>${deptInfo ? deptInfo.name : '-'}</td>
                        <td><span class="nx-badge ${roleClass}">${roleInfo ? roleInfo.name : user.role}</span></td>
                        <td>${user.email || '-'}</td>
                        <td>
                            <button class="nx-btn nx-btn--secondary nx-btn--sm" onclick="editUser('${user.userId}')">编辑</button>
                            <button class="nx-btn nx-btn--danger nx-btn--sm" onclick="deleteUser('${user.userId}')">删除</button>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }
        
        function getRoleClass(role) {
            const classes = {
                'admin': 'nx-badge--danger',
                'manager': 'nx-badge--primary',
                'hr': 'nx-badge--info',
                'employee': 'nx-badge--secondary',
                'llm-assistant': 'nx-badge--warning',
                'coordinator': 'nx-badge--warning',
                'installer': 'nx-badge--success',
                'leader': 'nx-badge--primary',
                'collaborator': 'nx-badge--secondary'
            };
            return classes[role] || 'nx-badge--secondary';
        }
        
        function renderManagerOptions() {
            const select = document.getElementById('dept-manager');
            if (select) {
                select.innerHTML = '<option value="">请选择负责人</option>';
                allUsers.forEach(user => {
                    const option = document.createElement('option');
                    option.value = user.userId;
                    option.textContent = user.name + ' (' + (user.title || user.role) + ')';
                    select.appendChild(option);
                });
            }
        }
        
        function filterUsers() {
            const deptId = document.getElementById('dept-filter').value;
            const roleId = document.getElementById('role-filter').value;
            
            let filtered = allUsers;
            
            if (deptId) {
                filtered = filtered.filter(u => u.departmentId === deptId);
            }
            
            if (roleId) {
                filtered = filtered.filter(u => u.role === roleId);
            }
            
            renderUsers(filtered);
        }
        
        function showUserModal(userId = null) {
            document.getElementById('user-modal-title').textContent = userId ? '编辑用户' : '新增用户';
            document.getElementById('user-id').value = userId || '';
            
            if (userId) {
                const user = allUsers.find(u => u.userId === userId);
                if (user) {
                    document.getElementById('user-name-input').value = user.name || '';
                    document.getElementById('user-email').value = user.email || '';
                    document.getElementById('user-department').value = user.departmentId || '';
                    document.getElementById('user-role').value = user.role || '';
                    document.getElementById('user-title').value = user.title || '';
                }
            } else {
                document.getElementById('user-form').reset();
            }
            
            document.getElementById('user-modal').classList.add('nx-modal--open');
        }
        
        function closeUserModal() {
            document.getElementById('user-modal').classList.remove('nx-modal--open');
        }
        
        async function saveUser() {
            const userId = document.getElementById('user-id').value;
            const name = document.getElementById('user-name-input').value;
            const email = document.getElementById('user-email').value;
            const departmentId = document.getElementById('user-department').value;
            const role = document.getElementById('user-role').value;
            const title = document.getElementById('user-title').value;
            
            if (!name || !role) {
                alert('请填写必填项');
                return;
            }
            
            const userData = {
                name,
                email,
                departmentId,
                role,
                title
            };
            
            try {
                let response;
                if (userId) {
                    response = await fetch('/api/v1/org/users/' + userId, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(userData)
                    });
                } else {
                    response = await fetch('/api/v1/org/users', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(userData)
                    });
                }
                
                const result = await response.json();
                if (result.status === 'success') {
                    closeUserModal();
                    await loadUsers();
                    await loadDepartments();
                } else {
                    alert('保存失败: ' + (result.message || '未知错误'));
                }
            } catch (e) {
                alert('保存失败: ' + e.message);
            }
        }
        
        function editUser(userId) {
            showUserModal(userId);
        }
        
        async function deleteUser(userId) {
            if (!confirm('确定要删除此用户吗？')) return;
            
            try {
                const response = await fetch('/api/v1/org/users/' + userId, {
                    method: 'DELETE'
                });
                const result = await response.json();
                
                if (result.status === 'success') {
                    await loadUsers();
                    await loadDepartments();
                } else {
                    alert('删除失败: ' + (result.message || '未知错误'));
                }
            } catch (e) {
                alert('删除失败: ' + e.message);
            }
        }
        
        function showDeptModal(deptId = null) {
            document.getElementById('dept-modal-title').textContent = deptId ? '编辑部门' : '新增部门';
            document.getElementById('dept-id').value = deptId || '';
            
            if (deptId) {
                const dept = allDepartments.find(d => d.departmentId === deptId);
                if (dept) {
                    document.getElementById('dept-name').value = dept.name || '';
                    document.getElementById('dept-desc').value = dept.description || '';
                    document.getElementById('dept-parent').value = dept.parentId || '';
                    document.getElementById('dept-manager').value = dept.managerId || '';
                }
            } else {
                document.getElementById('dept-form').reset();
            }
            
            document.getElementById('dept-modal').classList.add('nx-modal--open');
        }
        
        function closeDeptModal() {
            document.getElementById('dept-modal').classList.remove('nx-modal--open');
        }
        
        async function saveDept() {
            const deptId = document.getElementById('dept-id').value;
            const name = document.getElementById('dept-name').value;
            const description = document.getElementById('dept-desc').value;
            const parentId = document.getElementById('dept-parent').value;
            const managerId = document.getElementById('dept-manager').value;
            
            if (!name) {
                alert('请填写部门名称');
                return;
            }
            
            const deptData = {
                name,
                description,
                parentId: parentId || null,
                managerId: managerId || null
            };
            
            try {
                let response;
                if (deptId) {
                    response = await fetch('/api/v1/org/departments/' + deptId, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(deptData)
                    });
                } else {
                    response = await fetch('/api/v1/org/departments', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(deptData)
                    });
                }
                
                const result = await response.json();
                if (result.status === 'success') {
                    closeDeptModal();
                    await loadDepartments();
                } else {
                    alert('保存失败: ' + (result.message || '未知错误'));
                }
            } catch (e) {
                alert('保存失败: ' + e.message);
            }
        }
        
        function editDept(deptId) {
            showDeptModal(deptId);
        }
        
        async function deleteDept(deptId) {
            if (!confirm('确定要删除此部门吗？')) return;
            
            try {
                const response = await fetch('/api/v1/org/departments/' + deptId, {
                    method: 'DELETE'
                });
                const result = await response.json();
                
                if (result.status === 'success') {
                    await loadDepartments();
                    await loadUsers();
                } else {
                    alert('删除失败: ' + (result.message || '未知错误'));
                }
            } catch (e) {
                alert('删除失败: ' + e.message);
            }
        }
        
        async function loadOrgTree() {
            try {
                const response = await fetch('/api/v1/org/tree');
                const result = await response.json();
                if (result.status === 'success' && result.data) {
                    renderOrgTree(result.data);
                }
            } catch (e) {
                console.error('Failed to load org tree:', e);
            }
        }
        
        function renderOrgTree(tree) {
            const container = document.getElementById('org-tree');
            
            if (!tree || tree.length === 0) {
                container.innerHTML = '<p class="nx-text-secondary nx-text-center nx-p-4">暂无组织架构</p>';
                return;
            }
            
            let html = '<div class="org-tree">';
            tree.forEach(node => {
                html += renderTreeNode(node, 0);
            });
            html += '</div>';
            
            container.innerHTML = html;
        }
        
        function renderTreeNode(node, level) {
            const indent = level * 24;
            const icon = node.type === 'department' ? 'ri-building-line' : 'ri-user-line';
            const color = node.type === 'department' ? 'var(--nx-primary)' : 'var(--nx-text-secondary)';
            
            let html = `
                <div class="nx-flex nx-items-center nx-gap-2 nx-py-2 nx-px-3 nx-rounded nx-hover:bg-[var(--nx-bg-hover)]" style="padding-left: ${indent}px;">
                    <i class="${icon}" style="color: ${color};"></i>
                    <span class="nx-font-medium">${node.name}</span>
                    ${node.role ? `<span class="nx-badge nx-badge--secondary nx-text-xs">${node.role}</span>` : ''}
                    ${node.title ? `<span class="nx-text-sm nx-text-secondary nx-ml-2">${node.title}</span>` : ''}
                </div>
            `;
            
            if (node.children && node.children.length > 0) {
                node.children.forEach(child => {
                    html += renderTreeNode(child, level + 1);
                });
            }
            
            return html;
        }
        
        function showMenuAuth(roleId) {
            window.location.href = '/console/pages/menu-auth.html?role=' + roleId;
        }
        
        function handleLogout() {
            fetch('/api/v1/auth/logout', { method: 'POST' }).catch(() => {});
            localStorage.clear();
            window.location.href = '/console/pages/login.html';
        }
        
        document.addEventListener('DOMContentLoaded', checkLogin);
    </script>
</body>
</html>
