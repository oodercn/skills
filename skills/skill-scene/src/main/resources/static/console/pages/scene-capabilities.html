<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>场景能力 - Nexus Console</title>
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <link rel="stylesheet" href="/console/css/nx-page.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold" style="display: flex; align-items: center; gap: 8px;">
                    <i class="ri-server-line"></i> Nexus Console
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle>
                        <i class="ri-menu-line"></i>
                    </button>
                    <h2 class="nx-text-lg nx-font-semibold">场景能力</h2>
                </div>
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle>
                        <i class="ri-sun-line"></i>
                    </button>
                    <div style="position: relative;">
                        <div class="nx-page__user-menu" id="user-menu">
                            <div class="nx-page__user-avatar" id="user-avatar">U</div>
                            <span class="nx-page__user-name" id="user-name">加载中...</span>
                            <i class="ri-arrow-down-s-line"></i>
                        </div>
                        <div class="nx-page__dropdown-menu" id="user-dropdown">
                            <div class="nx-page__dropdown-item" onclick="window.location.href='my-profile.html'">
                                <i class="ri-user-line"></i> 个人中心
                            </div>
                            <div class="nx-page__dropdown-item" onclick="window.location.href='my-capabilities.html'">
                                <i class="ri-puzzle-line"></i> 我的能力
                            </div>
                            <div class="nx-page__dropdown-item" onclick="window.location.href='my-scenes.html'">
                                <i class="ri-folder-line"></i> 我的场景
                            </div>
                            <div class="nx-page__dropdown-item nx-page__dropdown-item--danger" onclick="handleLogout()">
                                <i class="ri-logout-box-line"></i> 退出登录
                            </div>
                        </div>
                    </div>
                    <button class="nx-btn nx-btn--secondary" onclick="refreshCapabilities()">
                        <i class="ri-refresh-line"></i> 刷新
                    </button>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="nx-grid nx-grid-cols-4 nx-mb-4">
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon"><i class="ri-puzzle-line"></i></div>
                            <div class="nx-stat-card__content">
                                <h4>能力总数</h4>
                                <p class="nx-stat-card__value" id="total-count">0</p>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon" style="background: var(--nx-success-light); color: var(--nx-success);"><i class="ri-checkbox-circle-line"></i></div>
                            <div class="nx-stat-card__content">
                                <h4>活跃能力</h4>
                                <p class="nx-stat-card__value" id="active-count">0</p>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon" style="background: var(--nx-info-light); color: var(--nx-info);"><i class="ri-folder-line"></i></div>
                            <div class="nx-stat-card__content">
                                <h4>场景能力</h4>
                                <p class="nx-stat-card__value" id="scene-count">0</p>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon" style="background: var(--nx-warning-light); color: var(--nx-warning);"><i class="ri-tools-line"></i></div>
                            <div class="nx-stat-card__content">
                                <h4>自定义能力</h4>
                                <p class="nx-stat-card__value" id="custom-count">0</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="nx-card">
                        <div class="nx-card__header nx-flex nx-items-center nx-justify-between">
                            <h3>能力列表</h3>
                            <div class="nx-flex nx-gap-2">
                                <input type="text" class="nx-input nx-input--sm" id="search-input" placeholder="搜索能力..." onkeyup="handleFilter()" style="width: 200px;">
                                <select class="nx-select nx-select--sm" id="type-filter" onchange="handleFilter()">
                                    <option value="">全部类型</option>
                                </select>
                                <select class="nx-select nx-select--sm" id="status-filter" onchange="handleFilter()">
                                    <option value="">全部状态</option>
                                    <option value="ACTIVE">活跃</option>
                                    <option value="INACTIVE">停用</option>
                                </select>
                            </div>
                        </div>
                        <div class="nx-card__body">
                            <div id="capability-list">
                                <div class="nx-flex nx-items-center nx-justify-center nx-p-8">
                                    <i class="ri-loader-4-line ri-spin" style="font-size: 24px;"></i>
                                    <span class="nx-ml-2">加载中...</span>
                                </div>
                            </div>
                            <div id="pagination-container" class="nx-flex nx-items-center nx-justify-center nx-mt-4"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="nx-modal" id="detail-modal">
        <div class="nx-modal__overlay" onclick="closeDetailModal()"></div>
        <div class="nx-modal__content" style="max-width: 600px;">
            <div class="nx-modal__header">
                <h3 id="modal-title">能力详情</h3>
                <button class="nx-btn nx-btn--ghost nx-btn--icon" onclick="closeDetailModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="nx-modal__body" id="modal-body"></div>
            <div class="nx-modal__footer">
                <button class="nx-btn nx-btn--secondary" onclick="closeDetailModal()">关闭</button>
            </div>
        </div>
    </div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/pages/scene-capabilities.js"></script>
    <script>
        function handleLogout() {
            fetch('/api/v1/auth/logout', { method: 'POST' }).catch(() => {});
            localStorage.clear();
            window.location.href = '/console/pages/login.html';
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const userMenu = document.getElementById('user-menu');
            const dropdown = document.getElementById('user-dropdown');
            
            if (userMenu && dropdown) {
                userMenu.addEventListener('click', function(e) {
                    e.stopPropagation();
                    dropdown.classList.toggle('nx-page__dropdown-menu--open');
                });
                
                document.addEventListener('click', function() {
                    dropdown.classList.remove('nx-page__dropdown-menu--open');
                });
            }
        });
    </script>
</body>
</html>
