<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能力统计 - Nexus Console</title>
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <style>
        .stats-page { padding: 20px; }
        
        .page-header {
            margin-bottom: 24px;
        }
        
        .page-title {
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .page-title i { color: var(--nx-primary); }
        
        .page-subtitle {
            color: var(--nx-text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }
        
        .time-filter {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        
        .time-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            background: var(--nx-bg-elevated);
            border: 1px solid var(--nx-border);
            transition: all 0.2s;
        }
        
        .time-btn:hover { border-color: var(--nx-primary); }
        .time-btn.active { background: var(--nx-primary); color: white; border-color: var(--nx-primary); }
        
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .overview-card {
            background: var(--nx-bg-elevated);
            border: 1px solid var(--nx-border);
            border-radius: 12px;
            padding: 20px;
        }
        
        .overview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .overview-title {
            font-size: 13px;
            color: var(--nx-text-secondary);
        }
        
        .overview-trend {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
        }
        
        .overview-trend.up { color: var(--nx-success); }
        .overview-trend.down { color: var(--nx-danger); }
        
        .overview-value {
            font-size: 32px;
            font-weight: 600;
        }
        
        .overview-chart {
            height: 40px;
            margin-top: 12px;
            display: flex;
            align-items: flex-end;
            gap: 2px;
        }
        
        .chart-bar {
            flex: 1;
            background: var(--nx-primary-light);
            border-radius: 2px;
            transition: height 0.3s;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }
        
        .chart-panel {
            background: var(--nx-bg-elevated);
            border: 1px solid var(--nx-border);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--nx-border);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .panel-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .panel-title i { color: var(--nx-primary); }
        
        .panel-body { padding: 20px; }
        
        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .bar-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .bar-label {
            width: 120px;
            font-size: 13px;
            flex-shrink: 0;
        }
        
        .bar-track {
            flex: 1;
            height: 24px;
            background: var(--nx-bg);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            font-size: 12px;
            color: white;
            font-weight: 500;
        }
        
        .bar-fill.blue { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .bar-fill.green { background: linear-gradient(90deg, #10b981, #34d399); }
        .bar-fill.yellow { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .bar-fill.red { background: linear-gradient(90deg, #ef4444, #f87171); }
        .bar-fill.purple { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
        
        .rank-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .rank-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--nx-bg);
            border-radius: 8px;
        }
        
        .rank-num {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            background: var(--nx-border);
        }
        
        .rank-num.top1 { background: #fef3c7; color: #d97706; }
        .rank-num.top2 { background: #e5e7eb; color: #6b7280; }
        .rank-num.top3 { background: #fed7aa; color: #ea580c; }
        
        .rank-info { flex: 1; }
        .rank-name { font-weight: 500; font-size: 14px; }
        .rank-type { font-size: 12px; color: var(--nx-text-secondary); }
        
        .rank-value {
            font-weight: 600;
            color: var(--nx-primary);
        }
        
        .error-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .error-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
        }
        
        .error-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: #fee2e2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #dc2626;
        }
        
        .error-info { flex: 1; }
        .error-name { font-weight: 500; font-size: 14px; }
        .error-msg { font-size: 12px; color: #dc2626; }
        
        .error-time {
            font-size: 12px;
            color: var(--nx-text-secondary);
        }
        
        .logs-panel {
            margin-top: 24px;
        }
        
        .log-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .log-table th {
            background: var(--nx-bg);
            padding: 12px 16px;
            text-align: left;
            font-weight: 500;
            font-size: 13px;
            color: var(--nx-text-secondary);
            border-bottom: 1px solid var(--nx-border);
        }
        
        .log-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--nx-border);
            font-size: 13px;
        }
        
        .log-table tr:hover td { background: var(--nx-bg-hover); }
        
        .log-level {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .log-level.info { background: #dbeafe; color: #2563eb; }
        .log-level.warn { background: #fef3c7; color: #d97706; }
        .log-level.error { background: #fee2e2; color: #dc2626; }
        .log-level.success { background: #d1fae5; color: #059669; }
    </style>
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold" style="display: flex; align-items: center; gap: 8px;">
                    <i class="ri-server-line"></i> Nexus Console
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <div class="stats-page">
                <header class="nx-page__header" style="border-bottom: none;">
                    <div class="nx-flex nx-items-center nx-gap-3">
                        <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle>
                            <i class="ri-menu-line"></i>
                        </button>
                        <div class="page-header">
                            <h2 class="page-title">
                                <i class="ri-bar-chart-box-line"></i>
                                能力统计
                            </h2>
                            <p class="page-subtitle">能力调用统计和性能监控</p>
                        </div>
                    </div>
                    <div class="nx-flex nx-items-center nx-gap-3">
                        <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle>
                            <i class="ri-sun-line"></i>
                        </button>
                        <button class="nx-btn nx-btn--secondary" onclick="refreshStats()">
                            <i class="ri-refresh-line"></i> 刷新
                        </button>
                    </div>
                </header>
                
                <div class="time-filter">
                    <button class="time-btn active" onclick="setTimeRange('today')">今日</button>
                    <button class="time-btn" onclick="setTimeRange('week')">本周</button>
                    <button class="time-btn" onclick="setTimeRange('month')">本月</button>
                    <button class="time-btn" onclick="setTimeRange('year')">今年</button>
                </div>
                
                <div class="stats-overview">
                    <div class="overview-card">
                        <div class="overview-header">
                            <span class="overview-title">总调用次数</span>
                            <span class="overview-trend up"><i class="ri-arrow-up-line"></i> 12%</span>
                        </div>
                        <div class="overview-value" id="totalCalls">12,458</div>
                        <div class="overview-chart" id="callsChart"></div>
                    </div>
                    <div class="overview-card">
                        <div class="overview-header">
                            <span class="overview-title">成功率</span>
                            <span class="overview-trend up"><i class="ri-arrow-up-line"></i> 2.3%</span>
                        </div>
                        <div class="overview-value" id="successRate">98.5%</div>
                        <div class="overview-chart" id="successChart"></div>
                    </div>
                    <div class="overview-card">
                        <div class="overview-header">
                            <span class="overview-title">平均响应时间</span>
                            <span class="overview-trend down"><i class="ri-arrow-down-line"></i> 8%</span>
                        </div>
                        <div class="overview-value" id="avgResponse">156ms</div>
                        <div class="overview-chart" id="responseChart"></div>
                    </div>
                    <div class="overview-card">
                        <div class="overview-header">
                            <span class="overview-title">活跃能力数</span>
                            <span class="overview-trend up"><i class="ri-arrow-up-line"></i> 3</span>
                        </div>
                        <div class="overview-value" id="activeCount">24</div>
                        <div class="overview-chart" id="activeChart"></div>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="chart-panel">
                        <div class="panel-header">
                            <div class="panel-title">
                                <i class="ri-bar-chart-line"></i>
                                能力调用排行
                            </div>
                        </div>
                        <div class="panel-body">
                            <div class="bar-chart" id="capabilityRankChart">
                            </div>
                        </div>
                    </div>
                    
                    <div class="chart-panel">
                        <div class="panel-header">
                            <div class="panel-title">
                                <i class="ri-trophy-line"></i>
                                TOP 5 能力
                            </div>
                        </div>
                        <div class="panel-body">
                            <div class="rank-list" id="topCapabilityList">
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="stats-grid" style="margin-top: 24px;">
                    <div class="chart-panel">
                        <div class="panel-header">
                            <div class="panel-title">
                                <i class="ri-alarm-warning-line"></i>
                                最近错误
                            </div>
                        </div>
                        <div class="panel-body">
                            <div class="error-list" id="errorList">
                            </div>
                        </div>
                    </div>
                    
                    <div class="chart-panel">
                        <div class="panel-header">
                            <div class="panel-title">
                                <i class="ri-pie-chart-line"></i>
                                类型分布
                            </div>
                        </div>
                        <div class="panel-body">
                            <div class="bar-chart" id="typeDistChart">
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="chart-panel logs-panel">
                    <div class="panel-header">
                        <div class="panel-title">
                            <i class="ri-file-list-3-line"></i>
                            调用日志
                        </div>
                    </div>
                    <table class="log-table">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>能力</th>
                                <th>级别</th>
                                <th>耗时</th>
                                <th>消息</th>
                            </tr>
                        </thead>
                        <tbody id="logTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/nexus-menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/llm-assistant.js"></script>
    <script src="/console/js/pages/capability-stats.js"></script>
</body>
</html>
