<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>场景组管理 - Skill Scene</title>
    
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold" style="display: flex; align-items: center; gap: 8px;">
                    <i class="ri-apps-line"></i> Skill Scene
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle>
                        <i class="ri-menu-line"></i>
                    </button>
                    <h2 class="nx-text-lg nx-font-semibold">场景组管理</h2>
                </div>
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle>
                        <i class="ri-sun-line"></i>
                    </button>
                    <button class="nx-btn nx-btn--primary" onclick="createSceneGroup()">
                        <i class="ri-add-line"></i> 创建场景组
                    </button>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="nx-grid nx-grid-cols-4 nx-mb-6">
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--primary">
                                <i class="ri-group-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">场景组总数</div>
                                <div class="nx-stat-card__value" id="totalGroups">0</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--success">
                                <i class="ri-play-circle-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">活跃场景组</div>
                                <div class="nx-stat-card__value" id="activeGroups">0</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--info">
                                <i class="ri-user-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">总成员数</div>
                                <div class="nx-stat-card__value" id="totalMembers">0</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--warning">
                                <i class="ri-link"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">能力绑定数</div>
                                <div class="nx-stat-card__value" id="totalBindings">0</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="nx-card">
                        <div class="nx-card__header">
                            <h3 class="nx-card__title">场景组列表</h3>
                            <div class="nx-flex nx-items-center nx-gap-3">
                                <select class="nx-select" id="templateFilter" onchange="filterByTemplate()">
                                    <option value="">全部模板</option>
                                </select>
                                <button class="nx-btn nx-btn--secondary" onclick="refreshSceneGroups()">
                                    <i class="ri-refresh-line"></i> 刷新
                                </button>
                            </div>
                        </div>
                        <div class="nx-card__body">
                            <table class="nx-table">
                                <thead>
                                    <tr>
                                        <th>场景组名称</th>
                                        <th>模板</th>
                                        <th>状态</th>
                                        <th>成员数</th>
                                        <th>创建者</th>
                                        <th>创建时间</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="sceneGroupTableBody">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="modal" id="sceneGroupModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">创建场景组</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="sceneGroupForm">
                    <div class="form-group">
                        <label>场景组名称</label>
                        <input type="text" class="nx-input" id="groupName" required>
                    </div>
                    <div class="form-group">
                        <label>选择模板</label>
                        <select class="nx-select" id="groupTemplate" required>
                            <option value="">请选择模板</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>描述</label>
                        <textarea class="nx-textarea" id="groupDescription" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>最小成员数</label>
                        <input type="number" class="nx-input" id="minMembers" value="1" min="1">
                    </div>
                    <div class="form-group">
                        <label>最大成员数</label>
                        <input type="number" class="nx-input" id="maxMembers" value="100" min="1">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="nx-btn nx-btn--secondary" onclick="closeModal()">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="saveSceneGroup()">保存</button>
            </div>
        </div>
    </div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/api-client.js"></script>
    <script src="/console/js/nexus-menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/llm-assistant.js"></script>
    <script src="/console/js/pages/scene-group-management.js"></script>
</body>
</html>
