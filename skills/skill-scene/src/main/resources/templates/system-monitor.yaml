apiVersion: scene.ooder.net/v1
kind: SceneTemplate

metadata:
  id: system-monitor
  name: 系统监控场景
  description: 系统健康监控、服务状态检查、告警通知
  category: monitoring
  icon: ri-pulse-line
  version: 1.0.0
  author: ooder Team

spec:
  skills:
    - id: skill-health
      version: ">=0.7.0"
      required: true
      description: "健康检查服务"
      
    - id: skill-monitor
      version: ">=1.0.0"
      required: true
      description: "监控服务"
      
    - id: skill-security
      version: ">=1.0.0"
      required: false
      description: "安全服务（可选）"
      
    - id: skill-nexus-dashboard-nexus-ui
      version: ">=1.0.0"
      required: true
      description: "系统仪表盘界面"
      
    - id: skill-nexus-health-check-nexus-ui
      version: ">=1.0.0"
      required: true
      description: "健康检查界面"
      
    - id: skill-nexus-system-status-nexus-ui
      version: ">=1.0.0"
      required: true
      description: "系统状态界面"
      
  capabilities:
    - id: health-check
      name: 健康检查
      description: 执行系统健康检查
      category: monitoring
      
    - id: service-check
      name: 服务检查
      description: 检查各服务状态
      category: monitoring
      
    - id: report-generation
      name: 报告生成
      description: 生成健康报告
      category: monitoring
      
    - id: system-monitor
      name: 系统监控
      description: 监控系统资源使用
      category: monitoring
      
    - id: alert-notification
      name: 告警通知
      description: 发送告警通知
      category: communication
      
  scene:
    type: monitoring
    name: 系统监控
    description: 系统健康监控场景
    
    config:
      healthCheck:
        interval: 60000
        timeout: 5000
        retryCount: 3
        
      monitor:
        metrics:
          - cpu
          - memory
          - disk
          - network
        retention: 7d
        
      alert:
        enabled: true
        channels:
          - email
          - webhook
        thresholds:
          cpu: 80
          memory: 85
          disk: 90
          
  installOrder:
    - skill-health
    - skill-monitor
    - skill-security
    - skill-nexus-dashboard-nexus-ui
    - skill-nexus-health-check-nexus-ui
    - skill-nexus-system-status-nexus-ui
    
  estimatedResources:
    cpu: "200m"
    memory: "256Mi"
    storage: "100Mi"
    
  estimatedDuration: "3-5分钟"
