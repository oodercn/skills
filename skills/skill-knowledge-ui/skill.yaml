apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-knowledge-ui
  name: 知识库管理
  version: 2.3.0
  description: 知识库管理场景能力，支持知识库创建、文档上传、检索测试
  author: ooder Team
  type: scene-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN
  repository: https://gitee.com/ooderCN/ooder-skills
  keywords:
    - knowledge
    - ui
    - management
    - scene-capability

spec:
  type: scene-skill
  
  dependencies:
    - id: skill-knowledge-base
      version: ">=1.0.0"
      required: true
      autoInstall: true
      description: "知识库核心服务"
      capabilities:
        - kb-management
        - document-management
        - kb-search
    
    - id: skill-rag
      version: ">=1.0.0"
      required: false
      autoInstall: false
      description: "RAG检索增强（可选）"
      
    - id: skill-document-processor
      version: ">=1.0.0"
      required: false
      autoInstall: false
      description: "文档处理服务（可选）"

  sceneCapabilities:
    - id: scene-knowledge-management
      name: 知识库管理场景能力
      type: SCENE
      mainFirst: true
      
      mainFirstConfig:
        selfCheck:
          - checkCapabilities: [kb-view, kb-manage, kb-search]
          - checkDriverCapabilities: [intent-receiver, event-listener]
          - checkDependencies: [skill-knowledge-base]
          - onCheckFailed:
              action: degrade
              degradedCapabilities: [kb-search]
              retry:
                maxAttempts: 3
                delay: 5s
          
        selfStart:
          - installDependencies: auto
          - initDriverCapabilities: [intent-receiver, event-listener]
          - initCapabilities: [kb-view, kb-manage, kb-search]
          - bindAddresses: auto
          
        startCollaboration:
          - startScene: scene-rag
            optional: true
            timeout: 10s
            bindInterface: rag-service
          
        selfDrive:
          scheduleRules:
            - trigger: "0 0 * * * ?"
              action: kb-stats-flow
              
          eventRules:
            - event: document.uploaded
              action: document-process-flow
            - event: kb.search.request
              action: search-flow
            - event: kb.created
              action: kb-init-flow
              
          capabilityChains:
            document-process-flow:
              - capability: kb-manage
                input:
                  action: parse
              - capability: kb-manage
                input:
                  action: index
                  
            search-flow:
              - capability: kb-search
                input:
                  topK: 10
              - capability: kb-view
                input:
                  action: display
                  
            kb-stats-flow:
              - capability: kb-view
                input:
                  action: stats
                  
            kb-init-flow:
              - capability: kb-manage
                input:
                  action: init

      capabilities:
        - kb-view
        - kb-manage
        - kb-search
        
      collaborativeCapabilities:
        - capabilityId: scene-rag
          role: PROVIDER
          interface: rag-service
          autoStart: false
          optional: true

  capabilities:
    - id: kb-view
      name: 查看知识库
      description: 查看知识库列表和详情
      category: ui
      type: ATOMIC
      
    - id: kb-manage
      name: 管理知识库
      description: 创建和管理知识库
      category: ui
      type: ATOMIC
      
    - id: kb-search
      name: 检索测试
      description: 测试知识库检索功能
      category: ai
      type: ATOMIC
      
    - id: intent-receiver
      name: 意图接收
      description: 接收用户操作意图
      category: driver
      type: DRIVER
      driverType: INTENT_RECEIVER
      
    - id: event-listener
      name: 事件监听
      description: 监听文档和知识库事件
      category: driver
      type: DRIVER
      driverType: EVENT_LISTENER

  capabilityBindings:
    - sceneCapabilityType: knowledge
      autoBind: true
      capabilities:
        - kb-view
        - kb-manage
        - kb-search

  endpoints:
    - path: /api/v1/kb
      method: GET
      description: 获取知识库列表
      capability: kb-view
      
    - path: /api/v1/kb
      method: POST
      description: 创建知识库
      capability: kb-manage
      
    - path: /api/v1/kb/{id}
      method: PUT
      description: 更新知识库
      capability: kb-manage
      
    - path: /api/v1/kb/{id}
      method: DELETE
      description: 删除知识库
      capability: kb-manage
      
    - path: /api/v1/kb/{kbId}/documents
      method: GET
      description: 获取文档列表
      capability: kb-view
      
    - path: /api/v1/kb/{kbId}/documents
      method: POST
      description: 添加文档
      capability: kb-manage
      
    - path: /api/v1/kb/{kbId}/search
      method: POST
      description: 搜索知识库
      capability: kb-search

  nexusUi:
    entry:
      page: index.html
      title: 知识库
      icon: ri-book-3-line
      
    menu:
      position: sidebar
      category: knowledge
      order: 10
      
    layout:
      type: default
      sidebar: true
      header: true

  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot

  config:
    optional:
      - name: MAX_DOCUMENT_SIZE
        type: integer
        default: 10485760
        description: 最大文档大小（字节）
      - name: SEARCH_TOP_K
        type: integer
        default: 10
        description: 检索返回数量
      - name: AUTO_INDEX
        type: boolean
        default: true
        description: 自动索引上传文档

  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "10Mi"

  offline:
    enabled: false
