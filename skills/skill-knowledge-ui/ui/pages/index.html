<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库管理 - Nexus Console</title>
    
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <link rel="stylesheet" href="/console/css/components/knowledge-ui.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold" style="display: flex; align-items: center; gap: 8px;">
                    <i class="ri-server-line"></i> Nexus Console
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle>
                        <i class="ri-menu-line"></i>
                    </button>
                    <h2 class="nx-text-lg nx-font-semibold">知识库管理</h2>
                </div>
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle>
                        <i class="ri-sun-line"></i>
                    </button>
                    <button class="nx-btn nx-btn--primary" onclick="KnowledgeUI.openCreateKbModal()">
                        <i class="ri-add-line"></i> 新建知识库
                    </button>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="nx-grid nx-grid-cols-4 nx-mb-6">
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--primary">
                                <i class="ri-book-3-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">知识库数</div>
                                <div class="nx-stat-card__value" id="stat-kb-count">0</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--success">
                                <i class="ri-file-text-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">文档总数</div>
                                <div class="nx-stat-card__value" id="stat-doc-count">0</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--warning">
                                <i class="ri-text-wrap"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">分块总数</div>
                                <div class="nx-stat-card__value" id="stat-chunk-count">0</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--info">
                                <i class="ri-search-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">检索次数</div>
                                <div class="nx-stat-card__value" id="stat-search-count">0</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="nx-grid nx-grid-cols-3 nx-gap-6">
                        <div class="nx-col-span-1">
                            <div class="nx-card">
                                <div class="nx-card__header">
                                    <h3 class="nx-card__title">知识库列表</h3>
                                    <button class="nx-btn nx-btn--ghost nx-btn--icon nx-btn--sm" onclick="KnowledgeUI.loadKnowledgeBases()">
                                        <i class="ri-refresh-line"></i>
                                    </button>
                                </div>
                                <div class="nx-card__body nx-p-0">
                                    <ul class="kb-list" id="kb-list">
                                        <li class="kb-list-item kb-list-item--empty">
                                            <i class="ri-inbox-line"></i>
                                            <span>暂无知识库</span>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                        
                        <div class="nx-col-span-2">
                            <div class="nx-card nx-mb-4" id="kb-detail-card" style="display: none;">
                                <div class="nx-card__header">
                                    <div class="nx-flex nx-items-center nx-gap-2">
                                        <i class="ri-book-3-line nx-text-primary"></i>
                                        <h3 class="nx-card__title" id="kb-detail-name">-</h3>
                                    </div>
                                    <div class="nx-flex nx-items-center nx-gap-2">
                                        <button class="nx-btn nx-btn--secondary nx-btn--sm" onclick="KnowledgeUI.openAddDocModal()">
                                            <i class="ri-upload-line"></i> 添加文档
                                        </button>
                                        <button class="nx-btn nx-btn--ghost nx-btn--icon nx-btn--sm" onclick="KnowledgeUI.editKb()">
                                            <i class="ri-edit-line"></i>
                                        </button>
                                        <button class="nx-btn nx-btn--ghost nx-btn--icon nx-btn--sm" onclick="KnowledgeUI.deleteKb()">
                                            <i class="ri-delete-bin-line"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="nx-card__body">
                                    <div class="nx-grid nx-grid-cols-4 nx-gap-4 nx-mb-4">
                                        <div class="kb-stat">
                                            <div class="kb-stat__value" id="kb-doc-count">0</div>
                                            <div class="kb-stat__label">文档数</div>
                                        </div>
                                        <div class="kb-stat">
                                            <div class="kb-stat__value" id="kb-chunk-count">0</div>
                                            <div class="kb-stat__label">分块数</div>
                                        </div>
                                        <div class="kb-stat">
                                            <div class="kb-stat__value" id="kb-type">-</div>
                                            <div class="kb-stat__label">类型</div>
                                        </div>
                                        <div class="kb-stat">
                                            <div class="kb-stat__value" id="kb-status">-</div>
                                            <div class="kb-stat__label">状态</div>
                                        </div>
                                    </div>
                                    
                                    <div class="nx-mb-4">
                                        <label class="nx-label">描述</label>
                                        <p class="nx-text-secondary" id="kb-description">-</p>
                                    </div>
                                    
                                    <div class="search-box nx-mb-4">
                                        <input type="text" class="nx-input" id="search-input" placeholder="输入搜索内容..." onkeydown="KnowledgeUI.handleSearchKeydown(event)">
                                        <button class="nx-btn nx-btn--primary" onclick="KnowledgeUI.search()">
                                            <i class="ri-search-line"></i> 搜索
                                        </button>
                                    </div>
                                    
                                    <div id="search-results" style="display: none;">
                                        <h4 class="nx-text-sm nx-font-semibold nx-mb-3">搜索结果</h4>
                                        <div id="search-results-list"></div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="nx-card" id="kb-documents-card" style="display: none;">
                                <div class="nx-card__header">
                                    <h3 class="nx-card__title">文档列表</h3>
                                </div>
                                <div class="nx-card__body nx-p-0">
                                    <table class="nx-table">
                                        <thead>
                                            <tr>
                                                <th>文档名称</th>
                                                <th>分块数</th>
                                                <th>状态</th>
                                                <th>创建时间</th>
                                                <th>操作</th>
                                            </tr>
                                        </thead>
                                        <tbody id="documents-table-body">
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            
                            <div class="nx-card" id="kb-empty-card">
                                <div class="nx-card__body nx-text-center nx-py-12">
                                    <i class="ri-book-3-line" style="font-size: 48px; color: var(--ns-secondary);"></i>
                                    <p class="nx-text-secondary nx-mt-4">请选择或创建知识库</p>
                                    <button class="nx-btn nx-btn--primary nx-mt-4" onclick="KnowledgeUI.openCreateKbModal()">
                                        <i class="ri-add-line"></i> 新建知识库
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="nx-modal" id="kb-modal">
        <div class="nx-modal__content">
            <div class="nx-modal__header">
                <h3 class="nx-modal__title" id="kb-modal-title">新建知识库</h3>
                <button class="nx-btn nx-btn--ghost nx-btn--icon nx-btn--sm" onclick="KnowledgeUI.closeKbModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="nx-modal__body">
                <form id="kb-form">
                    <input type="hidden" id="kb-id">
                    
                    <div class="nx-form-group">
                        <label class="nx-label">名称 <span class="nx-text-danger">*</span></label>
                        <input type="text" class="nx-input" id="kb-name" placeholder="输入知识库名称" required>
                    </div>
                    
                    <div class="nx-form-group">
                        <label class="nx-label">类型</label>
                        <select class="nx-select" id="kb-type-input">
                            <option value="GENERAL">通用知识库</option>
                            <option value="PRODUCT">产品文档</option>
                            <option value="TECHNICAL">技术文档</option>
                            <option value="FAQ">FAQ</option>
                        </select>
                    </div>
                    
                    <div class="nx-form-group">
                        <label class="nx-label">描述</label>
                        <textarea class="nx-textarea" id="kb-desc" rows="3" placeholder="输入知识库描述"></textarea>
                    </div>
                    
                    <div class="nx-form-group">
                        <label class="nx-label">所有者ID</label>
                        <input type="text" class="nx-input" id="kb-owner-id" placeholder="输入所有者ID">
                    </div>
                    
                    <div class="nx-form-group">
                        <label class="nx-checkbox">
                            <input type="checkbox" id="kb-public">
                            <span class="nx-checkbox__label">公开知识库</span>
                        </label>
                    </div>
                </form>
            </div>
            <div class="nx-modal__footer">
                <button class="nx-btn nx-btn--secondary" onclick="KnowledgeUI.closeKbModal()">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="KnowledgeUI.saveKb()">保存</button>
            </div>
        </div>
    </div>
    
    <div class="nx-modal" id="doc-modal">
        <div class="nx-modal__content">
            <div class="nx-modal__header">
                <h3 class="nx-modal__title">添加文档</h3>
                <button class="nx-btn nx-btn--ghost nx-btn--icon nx-btn--sm" onclick="KnowledgeUI.closeDocModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="nx-modal__body">
                <div class="nx-form-group">
                    <label class="nx-label">文档标题 <span class="nx-text-danger">*</span></label>
                    <input type="text" class="nx-input" id="doc-title" placeholder="输入文档标题">
                </div>
                
                <div class="nx-form-group">
                    <label class="nx-label">文档内容 <span class="nx-text-danger">*</span></label>
                    <textarea class="nx-textarea" id="doc-content" rows="10" placeholder="输入或粘贴文档内容"></textarea>
                </div>
                
                <div class="nx-form-group">
                    <label class="nx-label">来源URL</label>
                    <input type="text" class="nx-input" id="doc-source" placeholder="文档来源URL（可选）">
                </div>
            </div>
            <div class="nx-modal__footer">
                <button class="nx-btn nx-btn--secondary" onclick="KnowledgeUI.closeDocModal()">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="KnowledgeUI.addDocument()">添加</button>
            </div>
        </div>
    </div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/api.js"></script>
    <script src="/console/js/components/knowledge-ui.js"></script>
    <script src="/console/js/pages/knowledge-ui-init.js"></script>
</body>
</html>
