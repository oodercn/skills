<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800px" height="580px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

    <!-- Title -->
    <rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
    <text class="text-header" x="400" y="38" text-anchor="middle">高级功能矩阵</text>

    <!-- Multi-tenant -->
    <rect class="box" x="30" y="70" width="180" height="80"/>
    <text class="text-title" x="50" y="95">多租户支持</text>
    <text class="text" x="50" y="115">租户隔离</text>
    <text class="text" x="50" y="135">数据安全</text>

    <!-- Internationalization -->
    <rect class="box" x="230" y="70" width="180" height="80"/>
    <text class="text-title" x="250" y="95">国际化</text>
    <text class="text" x="250" y="115">多语言支持</text>
    <text class="text" x="250" y="135">本地化配置</text>

    <!-- Monitoring -->
    <rect class="box" x="430" y="70" width="180" height="80"/>
    <text class="text-title" x="450" y="95">监控告警</text>
    <text class="text" x="450" y="115">实时监控</text>
    <text class="text" x="450" y="135">智能告警</text>

    <!-- Plugin System -->
    <rect class="box" x="630" y="70" width="140" height="80"/>
    <text class="text-title" x="650" y="95">插件系统</text>
    <text class="text" x="650" y="115">开放扩展</text>
    <text class="text" x="650" y="135">生态建设</text>

    <!-- Low-code Platform -->
    <rect class="box-alt" x="30" y="180" width="240" height="80"/>
    <text class="text-title" x="50" y="205">低代码平台</text>
    <text class="text" x="50" y="225">可视化配置</text>
    <text class="text" x="50" y="245">拖拽式开发</text>

    <!-- AI Enhancement -->
    <rect class="box-alt" x="290" y="180" width="240" height="80"/>
    <text class="text-title" x="310" y="205">AI能力增强</text>
    <text class="text" x="310" y="225">多模型支持</text>
    <text class="text" x="310" y="245">智能优化</text>

    <!-- Security Framework -->
    <rect class="box-alt" x="550" y="180" width="220" height="80"/>
    <text class="text-title" x="570" y="205">安全框架</text>
    <text class="text" x="570" y="225">RBAC权限控制</text>
    <text class="text" x="570" y="245">安全审计</text>

    <!-- Description -->
    <rect class="box-highlight" x="30" y="290" width="740" height="100"/>
    <text class="text-title" x="50" y="315">技术亮点</text>
    <text class="text" x="50" y="340">1. 完整的企业级架构：从SPI到业务层的完整解决方案</text>
    <text class="text" x="50" y="360">2. 灵活的组合能力：通过模块组合快速构建业务系统</text>
    <text class="text" x="50" y="380">3. 强大的扩展性：插件机制支持无限扩展</text>

</svg>