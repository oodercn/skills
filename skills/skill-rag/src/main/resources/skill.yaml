apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-rag
  name: RAG检索增强
  version: 1.0.0
  description: RAG检索增强生成服务，支持关键词检索、语义检索、混合检索策略
  author: ooder Team
  type: system-service
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - rag
    - retrieval
    - semantic
    - search

spec:
  type: system-service
  
  dependencies:
    - id: skill-knowledge-base
      version: ">=1.0.0"
      required: false
      description: "知识库服务（可选，用于知识库注册）"
  
  providedInterfaces:
    - id: rag-retrieval
      version: "1.0"
      description: "RAG检索接口"
    - id: prompt-building
      version: "1.0"
      description: "Prompt构建接口"
  
  capabilities:
    - id: retrieval
      name: 文档检索
      description: 关键词、语义、混合检索
      category: ai
    - id: prompt-building
      name: Prompt构建
      description: 构建带检索上下文的Prompt
      category: ai
    - id: kb-registration
      name: 知识库注册
      description: 注册外部知识库
      category: service
  
  endpoints:
    - path: /api/v1/rag/retrieve
      method: POST
      description: 执行检索
      capability: retrieval
    - path: /api/v1/rag/prompt
      method: POST
      description: 构建Prompt
      capability: prompt-building
    - path: /api/v1/rag/prompt/custom
      method: POST
      description: 自定义Prompt构建
      capability: prompt-building
    - path: /api/v1/rag/kb/{kbId}/register
      method: POST
      description: 注册知识库
      capability: kb-registration
    - path: /api/v1/rag/kb/{kbId}
      method: DELETE
      description: 注销知识库
      capability: kb-registration
  
  strategies:
    - KEYWORD
    - SEMANTIC
    - HYBRID
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
  
  config:
    optional:
      - name: DEFAULT_STRATEGY
        type: string
        default: "HYBRID"
        description: 默认检索策略
      - name: MAX_RESULTS
        type: integer
        default: 10
        description: 最大返回结果数
      - name: EMBEDDING_MODEL
        type: string
        default: "text-embedding-ada-002"
        description: 语义检索嵌入模型
  
  resources:
    cpu: "200m"
    memory: "256Mi"
    storage: "500Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true
