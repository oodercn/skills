<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800px" height="480px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; fill: #334155; }
        .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-step { font-size: 13px; font-weight: bold; fill: #059669; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<!-- Title -->
<rect class="title-box" x="20" y="15" width="760" height="40" rx="4"/>
<text class="text-header" x="400" y="42" text-anchor="middle">ApexOS 零部署架构</text>

<!-- Skill Package -->
<rect class="box" x="30" y="75" width="220" height="120"/>
<text class="text-title" x="140" y="100" text-anchor="middle">技能包 (Skill)</text>
<rect class="box-alt" x="50" y="115" width="180" height="30" fill="#f8fafc"/>
<text class="text" x="140" y="135" text-anchor="middle">skill.yaml</text>
<rect class="box-alt" x="50" y="150" width="180" height="30" fill="#f8fafc"/>
<text class="text" x="140" y="170" text-anchor="middle">*.jar</text>

<!-- Runtime -->
<rect class="box-highlight" x="290" y="75" width="220" height="120"/>
<text class="text-title" x="400" y="100" text-anchor="middle">运行时 (Runtime)</text>
<text class="text" x="310" y="125">• Java 21</text>
<text class="text" x="310" y="145">• Spring Boot 3.4</text>
<text class="text" x="310" y="165">• 自动扫描</text>
<text class="text" x="310" y="185">• 热加载</text>

<!-- Service Discovery -->
<rect class="box" x="550" y="75" width="220" height="120"/>
<text class="text-title" x="660" y="100" text-anchor="middle">服务发现</text>
<text class="text" x="570" y="125">• SPI 机制</text>
<text class="text" x="570" y="145">• 自动注册</text>
<text class="text" x="570" y="165">• 依赖注入</text>
<text class="text" x="570" y="185">• API 暴露</text>

<!-- Arrows -->
<line class="arrow" x1="250" y1="135" x2="290" y2="135"/>
<line class="arrow" x1="510" y1="135" x2="550" y2="135"/>

<!-- Deployment Steps -->
<rect class="box-alt" x="30" y="220" width="740" height="180"/>
<text class="text-title" x="400" y="245" text-anchor="middle">部署流程（只需4步）</text>

<text class="text-step" x="50" y="275">步骤 1</text>
<text class="text" x="110" y="275">下载 ApexOS: wget https://github.com/ooderCN/apexos/releases/latest/apexos.jar</text>

<text class="text-step" x="50" y="305">步骤 2</text>
<text class="text" x="110" y="305">启动服务: java -jar apexos.jar</text>

<text class="text-step" x="50" y="335">步骤 3</text>
<text class="text" x="110" y="335">自动扫描 skills/ 目录，加载所有技能模块</text>

<text class="text-step" x="50" y="365">步骤 4</text>
<text class="text" x="110" y="365">服务自动注册，API 立即可用: http://localhost:8080</text>

<!-- No Need Section -->
<rect class="box-highlight" x="30" y="415" width="740" height="50"/>
<text class="text-title" x="400" y="435" text-anchor="middle">无需：Docker · Kubernetes · 配置文件 · 手动安装 · 数据库初始化</text>
<text class="text" x="400" y="455" text-anchor="middle" style="font-size: 11px; fill: #64748b;">开箱即用，零配置，秒级启动</text>

</svg>
