<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800px" height="520px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; fill: #334155; }
        .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-security { font-size: 13px; font-weight: bold; fill: #dc2626; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<!-- Title -->
<rect class="title-box" x="20" y="15" width="760" height="40" rx="4"/>
<text class="text-header" x="400" y="42" text-anchor="middle">企业私有 AI 能力库架构</text>

<!-- Enterprise Network Boundary -->
<rect class="box-alt" x="30" y="70" width="740" height="320" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="10,5"/>
<text class="text-title" x="400" y="95" text-anchor="middle" fill="#0369a1">🏢 企业内网环境（完全隔离）</text>

<!-- ApexOS Core -->
<rect class="box-highlight" x="50" y="110" width="200" height="100"/>
<text class="text-title" x="150" y="140" text-anchor="middle">ApexOS</text>
<text class="text" x="150" y="165" text-anchor="middle">核心引擎</text>
<text class="text" x="150" y="185" text-anchor="middle">零部署 · 自动发现</text>

<!-- Skills Repository -->
<rect class="box" x="280" y="110" width="200" height="100"/>
<text class="text-title" x="380" y="140" text-anchor="middle">技能仓库</text>
<text class="text" x="380" y="165" text-anchor="middle">137+ 标准技能</text>
<text class="text" x="380" y="185" text-anchor="middle">+ 企业自定义技能</text>

<!-- Enterprise Skills -->
<rect class="box" x="510" y="110" width="240" height="100"/>
<text class="text-title" x="630" y="140" text-anchor="middle">企业自主技能层</text>
<text class="text" x="530" y="165">• 业务系统对接技能</text>
<text class="text" x="530" y="185">• 行业专属知识技能</text>

<!-- Connection Arrows -->
<line class="arrow" x1="250" y1="160" x2="280" y2="160"/>
<line class="arrow" x1="480" y1="160" x2="510" y2="160"/>

<!-- Data Storage -->
<rect class="box" x="50" y="230" width="350" height="70"/>
<text class="text-title" x="225" y="255" text-anchor="middle">数据存储层</text>
<text class="text" x="70" y="280">MySQL · Redis · Elasticsearch · MinIO（全部内网部署）</text>

<!-- Security Layer -->
<rect class="box-highlight" x="430" y="230" width="320" height="70"/>
<text class="text-title" x="590" y="255" text-anchor="middle">安全与合规</text>
<text class="text" x="450" y="280">RBAC · 审计日志 · 数据加密 · 访问控制</text>

<!-- Applications -->
<rect class="box" x="50" y="320" width="700" height="55"/>
<text class="text-title" x="400" y="345" text-anchor="middle">企业应用层</text>
<text class="text" x="70" y="370">OA系统 · ERP · CRM · 智能客服 · 知识库 · 业务流程自动化</text>

<!-- Security Notice -->
<rect class="box-highlight" x="30" y="410" width="740" height="45"/>
<text class="text-security" x="400" y="430" text-anchor="middle">🔒 数据安全：完全企业内网隔离，数据不出域，符合等保2.0/3.0要求</text>
<text class="text" x="400" y="450" text-anchor="middle" style="font-size: 11px; fill: #64748b;">可选：通过 VPN/专线与 Ooder 技能市场同步，获取最新技能更新</text>

<!-- Deployment Modes -->
<rect class="box" x="30" y="470" width="740" height="40"/>
<text class="text-title" x="400" y="490" text-anchor="middle">部署模式：单机版 · 集群版 · 容器版（支持 Kubernetes）</text>

</svg>
