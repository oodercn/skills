apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-knowledge-base
  name: 知识库核心服务
  version: 1.0.0
  description: 知识库核心服务，提供知识库管理、文档管理、BM25检索能力
  author: ooder Team
  type: system-service
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - knowledge
    - search
    - bm25
    - document

spec:
  type: system-service
  
  dependencies: []
  
  providedInterfaces:
    - id: knowledge-storage
      version: "1.0"
      description: "知识库存储接口"
    - id: knowledge-search
      version: "1.0"
      description: "知识库检索接口"
  
  capabilities:
    - id: kb-management
      name: 知识库管理
      description: 创建、更新、删除知识库
      category: service
    - id: document-management
      name: 文档管理
      description: 管理知识库中的文档
      category: service
    - id: search
      name: 知识检索
      description: BM25语义检索
      category: ai
  
  endpoints:
    - path: /api/v1/kb
      method: POST
      description: 创建知识库
      capability: kb-management
    - path: /api/v1/kb/{id}
      method: GET
      description: 获取知识库
      capability: kb-management
    - path: /api/v1/kb/{id}
      method: PUT
      description: 更新知识库
      capability: kb-management
    - path: /api/v1/kb/{id}
      method: DELETE
      description: 删除知识库
      capability: kb-management
    - path: /api/v1/kb/{kbId}/documents
      method: POST
      description: 添加文档
      capability: document-management
    - path: /api/v1/kb/{kbId}/documents
      method: GET
      description: 获取文档列表
      capability: document-management
    - path: /api/v1/kb/{kbId}/documents/{docId}
      method: DELETE
      description: 删除文档
      capability: document-management
    - path: /api/v1/kb/{kbId}/search
      method: POST
      description: 搜索知识库
      capability: search
    - path: /api/v1/kb/search/multi
      method: POST
      description: 多知识库搜索
      capability: search
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    
  config:
    optional:
      - name: STORAGE_PATH
        type: string
        default: "./data/kb"
        description: 知识库存储路径
      - name: MAX_DOCUMENT_SIZE
        type: integer
        default: 10485760
        description: 最大文档大小（字节）
      - name: SEARCH_LIMIT
        type: integer
        default: 10
        description: 搜索结果限制
  
  resources:
    cpu: "200m"
    memory: "256Mi"
    storage: "1Gi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true
