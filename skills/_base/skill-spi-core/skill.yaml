apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-spi-core
  name: Skill SPI Core
  version: "3.0.1"
  description: Skill SPI核心服务模块，提供Skill相关的SPI接口定义和基础实现
  author: Ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills/tree/main/skills/_base/skill-spi-core
  repository: https://gitee.com/ooderCN/skills.git
  keywords:
    - spi
    - skill
    - core
    - interface

spec:
  skillForm: PROVIDER
  skillCategory: INFRASTRUCTURE
  sceneType: AUTO
  purposes:
    - INFRASTRUCTURE
    - INTEGRATION
  
  ownership: platform
  
  capability:
    category: spi
    code: SKILL_SPI_CORE
    operations: [im-service, message-handling]
  
  runtime:
    language: java
    javaVersion: "21"
    framework: none
    mainClass: N/A

  providedInterfaces:
    - id: net.ooder.spi.im.ImService
      version: "1.0"
      description: "IM服务基础接口"

  capabilities:
    - id: im-service
      name: IM服务
      description: IM服务基础接口，提供消息发送和结果处理
      category: messaging
    - id: message-handling
      name: 消息处理
      description: 消息内容模型和发送结果处理
      category: messaging

  exports:
    packages:
      - net.ooder.spi.im
      - net.ooder.spi.im.model

  dependencies:
    - id: ooder-spi-core
      version: ">=3.0.1"

  notes: |
    Skill SPI核心服务模块，提供IM服务基础接口。
    依赖 ooder-spi-core 作为基础接口定义。
