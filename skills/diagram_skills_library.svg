<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800px" height="520px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
        .text-percent { font-size: 12px; font-weight: bold; fill: #059669; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<!-- Title -->
<rect class="title-box" x="20" y="15" width="760" height="40" rx="4"/>
<text class="text-header" x="400" y="42" text-anchor="middle">OoderAgent Skills 库七层架构 (134个模块)</text>

<!-- Layer 1: tools -->
<rect class="box" x="30" y="70" width="740" height="55"/>
<text class="text-title" x="50" y="95">tools 工具层</text>
<text class="text" x="50" y="115">10个模块 (7.46%) - 辅助工具：日历、文档处理、技能市场、消息推送等</text>

<!-- Layer 2: scenes -->
<rect class="box-alt" x="30" y="135" width="740" height="55"/>
<text class="text-title" x="50" y="160">scenes 场景层</text>
<text class="text" x="50" y="180">16个模块 (11.94%) - 业务场景：日报、审批、知识问答、会议纪要等</text>

<!-- Layer 3: capabilities -->
<rect class="box" x="30" y="200" width="740" height="55"/>
<text class="text-title" x="50" y="225">capabilities 能力层</text>
<text class="text" x="50" y="245">24个模块 (17.91%) - 核心能力：通信、监控、基础设施、调度、搜索</text>

<!-- Layer 4: _system -->
<rect class="box-alt" x="30" y="265" width="740" height="55"/>
<text class="text-title" x="50" y="290">_system 系统层</text>
<text class="text" x="50" y="310">32个模块 (23.88%) - 系统服务：认证、配置、工作流、RAG、知识管理等</text>

<!-- Layer 5: _drivers -->
<rect class="box-highlight" x="30" y="330" width="740" height="55"/>
<text class="text-title" x="50" y="355">_drivers 驱动层</text>
<text class="text" x="50" y="375">37个模块 (27.61%) - 外部集成：LLM驱动、IM驱动、支付驱动、媒体驱动等</text>

<!-- Layer 6: _business -->
<rect class="box" x="30" y="395" width="740" height="55"/>
<text class="text-title" x="50" y="420">_business 业务层</text>
<text class="text" x="50" y="440">11个模块 (8.21%) - 业务逻辑：待办、流程、安全、场景管理等</text>

<!-- Layer 7: _base -->
<rect class="box-alt" x="30" y="460" width="740" height="45"/>
<text class="text-title" x="50" y="488">_base 基础层</text>
<text class="text" x="200" y="488">4个模块 (2.99%) - SPI核心：ooder-spi-core, skill-spi-messaging等</text>

</svg>
