apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-media-toutiao
  name: 头条发布服务
  version: 0.7.3
  category: biz
  description: 头条内容发布服务，支持文章发布、更新、删除、统计
  author: ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - media
    - toutiao
    - publish
    - article

spec:
  skillForm: DRIVER
  skillCategory: SERVICE
  sceneType: TRIGGER
  purposes:
    - CONTENT_PUBLISHING
    - MARKETING
  
  ownership: independent
  
  capability:
    address: 0x4C
    category: MEDIA
    code: MEDIA_TOUTIAO
    operations: [publish, update, delete, stats]
  
  driverType: media
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot

  llmConfig:
    required: false
    defaultProvider: "deepseek"
    defaultModel: "deepseek-chat"
    capabilities:
      - chat
      - streaming
      - function-calling
    modelSelection:
      allowUserOverride: true
      availableProviders:
        - deepseek
        - openai
        - qianwen
        - volcengine
        - ollama
    functionCalling:
      enabled: true
      tools:
        - name: query_skill_capability
          description: "查询当前技能的能力和使用方法"
          parameters:
            type: object
            properties:
              capability:
                type: string
                description: "能力名称"
              detail:
                type: string
                enum: [brief, detailed, examples]
                default: "brief"
        - name: execute_mvel_action
          description: "通过MVEL表达式执行后台操作"
          parameters:
            type: object
            properties:
              expression:
                type: string
                description: "MVEL表达式"
              context:
                type: object
        - name: generate_ui_form
          description: "生成UI表单供用户填写"
          parameters:
            type: object
            properties:
              formType:
                type: string
              fields:
                type: array
                items:
                  type: object
        - name: execute_batch_operation
          description: "执行批量操作"
          parameters:
            type: object
            properties:
              operation:
                type: string
              items:
                type: array
                items:
                  type: object
        - name: convert_to_javascript
          description: "转换为JavaScript代码供用户使用"
          parameters:
            type: object
            properties:
              action:
                type: string
              parameters:
                type: object
      toolChoice: auto
    rateLimits:
      requestsPerMinute: 60
      tokensPerMinute: 100000

  
  supportedSceneTypes:
    - content-publish
    - marketing-automation
    - social-media-management
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: false
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 10
  
  dependencies:
    - id: skill-common
      version: ">=1.0.0"
      required: true
      description: "通用工具类"
    - id: skill-user-auth
      version: ">=0.7.0"
      required: false
      description: "用户认证服务(间接)"
    - id: skill-vfs-base
      version: ">=1.0.0"
      required: false
      description: "文件存储服务(间接)"
  
  providedInterfaces:
    - id: media-publish
      version: "1.0"
      description: "媒体发布接口"
  
  capabilities:
    - id: article-publish
      name: 文章发布
      description: 发布文章到头条
      category: service
    - id: article-update
      name: 文章更新
      description: 更新已发布文章
      category: service
    - id: article-delete
      name: 文章删除
      description: 删除已发布文章
      category: service
    - id: article-stats
      name: 文章统计
      description: 获取文章统计数据
      category: service
  
  endpoints:
    - path: /api/media/toutiao/articles
      method: POST
      description: 发布文章
      capability: article-publish
    - path: /api/media/toutiao/articles/{id}
      method: PUT
      description: 更新文章
      capability: article-update
    - path: /api/media/toutiao/articles/{id}
      method: DELETE
      description: 删除文章
      capability: article-delete
    - path: /api/media/toutiao/articles/{id}/stats
      method: GET
      description: 获取统计
      capability: article-stats
  
  config:
    required:
      - name: TOUTIAO_APP_ID
        type: string
        description: 头条应用ID
      - name: TOUTIAO_APP_SECRET
        type: string
        description: 头条应用密钥
    optional:
      - name: TOUTIAO_API_URL
        type: string
        default: "https://api.toutiao.com"
        description: API地址
  
  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "10Mi"
  
  offline:
    enabled: false

  knowledge:
    documents:
      - id: overview
        name: 功能概述
        path: README.md
        type: guide
        language: zh
        priority: high
    ragConfig:
      enabled: true
      indexName: "skill-media-toutiao-knowledge"
      embeddingModel: text-embedding-3-small
      chunkSize: 1000
      chunkOverlap: 200
      searchStrategy: hybrid
      topK: 5
      threshold: 0.7
