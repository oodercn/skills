apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-task
  name: 任务管理服务
  version: 0.7.3
  category: sys
  description: 任务管理服务，提供任务创建、执行、状态管理
  author: ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - task
    - job
    - scheduler
    - execution

spec:
  skillForm: PROVIDER
  
  ownership: platform
  
  capability:
    address: 0x70
    category: SCHED
    code: SCHED_BASE
    operations: [create, execute, status]
  
  providerType: scheduler
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot

  llmConfig:
    required: false
    defaultProvider: "deepseek"
    defaultModel: "deepseek-chat"
    capabilities:
      - chat
      - streaming
      - function-calling
    modelSelection:
      allowUserOverride: true
      availableProviders:
        - deepseek
        - openai
        - qianwen
        - volcengine
        - ollama
    functionCalling:
      enabled: true
      tools:
        - name: query_skill_capability
          description: "查询当前技能的能力和使用方法"
          parameters:
            type: object
            properties:
              capability:
                type: string
                description: "能力名称"
              detail:
                type: string
                enum: [brief, detailed, examples]
                default: "brief"
        - name: execute_mvel_action
          description: "通过MVEL表达式执行后台操作"
          parameters:
            type: object
            properties:
              expression:
                type: string
                description: "MVEL表达式"
              context:
                type: object
        - name: generate_ui_form
          description: "生成UI表单供用户填写"
          parameters:
            type: object
            properties:
              formType:
                type: string
              fields:
                type: array
                items:
                  type: object
        - name: execute_batch_operation
          description: "执行批量操作"
          parameters:
            type: object
            properties:
              operation:
                type: string
              items:
                type: array
                items:
                  type: object
        - name: convert_to_javascript
          description: "转换为JavaScript代码供用户使用"
          parameters:
            type: object
            properties:
              action:
                type: string
              parameters:
                type: object
      toolChoice: auto
    rateLimits:
      requestsPerMinute: 60
      tokensPerMinute: 100000

  
  supportedSceneTypes:
    - workflow
    - automation
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 2s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 20
  
  dependencies:
    - id: skill-scheduler-quartz
      version: ">=0.7.0"
      required: true
      description: "Quartz调度服务依赖"
  
  providedInterfaces:
    - id: task-service
      version: "1.0"
      description: "任务服务接口"
  
  capabilities:
    - id: create
      name: 任务创建
      description: 创建任务
      category: service
    - id: execute
      name: 任务执行
      description: 执行任务
      category: service
    - id: status
      name: 状态管理
      description: 管理任务状态
      category: service
  
  endpoints:
    - path: /api/tasks
      method: POST
      description: 创建任务
      capability: create
    - path: /api/tasks/{id}/execute
      method: POST
      description: 执行任务
      capability: execute
    - path: /api/tasks/{id}/status
      method: GET
      description: 获取状态
      capability: status
  
  config:
    optional:
      - name: MAX_TASKS
        type: integer
        default: 1000
        description: 最大任务数
      - name: TASK_TIMEOUT
        type: integer
        default: 3600
        description: 任务超时(秒)
  
  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "50Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true

  knowledge:
    documents:
      - id: overview
        name: 功能概述
        path: README.md
        type: guide
        language: zh
        priority: high
    ragConfig:
      enabled: true
      indexName: "skill-task-knowledge"
      embeddingModel: text-embedding-3-small
      chunkSize: 1000
      chunkOverlap: 200
      searchStrategy: hybrid
      topK: 5
      threshold: 0.7
