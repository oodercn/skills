apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-management
  name: Skill Management
  version: 0.1.0
  description: Skill Management Module - Unified skill registration, lifecycle, and marketplace management
  author: Ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - skill
    - management
    - lifecycle
    - marketplace

spec:
  skillForm: PROVIDER
  type: service-skill
  
  ownership: platform
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot

  llmConfig:
    required: false
    defaultProvider: "deepseek"
    defaultModel: "deepseek-chat"
    capabilities:
      - chat
      - streaming
      - function-calling
    modelSelection:
      allowUserOverride: true
      availableProviders:
        - deepseek
        - openai
        - qianwen
        - volcengine
        - ollama
    functionCalling:
      enabled: true
      tools:
        - name: query_skill_capability
          description: "жҹҘиҜўеҪ“еүҚжҠҖиғҪзҡ„иғҪеҠӣе’ҢдҪҝз”Ёж–№жі?
          parameters:
            type: object
            properties:
              capability:
                type: string
                description: "иғҪеҠӣеҗҚз§°"
              detail:
                type: string
                enum: [brief, detailed, examples]
                default: "brief"
        - name: execute_mvel_action
          description: "йҖҡиҝҮMVELиЎЁиҫҫејҸжү§иЎҢеҗҺеҸ°ж“ҚдҪ?
          parameters:
            type: object
            properties:
              expression:
                type: string
                description: "MVELиЎЁиҫҫеј?
              context:
                type: object
        - name: generate_ui_form
          description: "з”ҹжҲҗUIиЎЁеҚ•дҫӣз”ЁжҲ·еЎ«еҶ?
          parameters:
            type: object
            properties:
              formType:
                type: string
              fields:
                type: array
                items:
                  type: object
        - name: execute_batch_operation
          description: "жү§иЎҢжү№йҮҸж“ҚдҪң"
          parameters:
            type: object
            properties:
              operation:
                type: string
              items:
                type: array
                items:
                  type: object
        - name: convert_to_javascript
          description: "иҪ¬жҚўдёәJavaScriptд»Јз Ғдҫӣз”ЁжҲ·дҪҝз”?
          parameters:
            type: object
            properties:
              action:
                type: string
              parameters:
                type: object
      toolChoice: auto
    rateLimits:
      requestsPerMinute: 60
      tokensPerMinute: 100000

  
  capabilities:
    - id: skill-registration
      name: Skill Registration
      description: жҠҖиғҪжіЁеҶҢз®Ўзҗ?
      category: management
    - id: skill-lifecycle
      name: Skill Lifecycle
      description: жҠҖиғҪз”ҹе‘Ҫе‘Ёжңҹз®Ўзҗ?
      category: management
    - id: skill-marketplace
      name: Skill Marketplace
      description: жҠҖиғҪеёӮең?
      category: management
    - id: skill-execution
      name: Skill Execution
      description: жҠҖиғҪжү§иЎ?
      category: management
    - id: skill-rating
      name: Skill Rating
      description: жҠҖиғҪиҜ„еҲ?
      category: management
  
  scenes:
    - name: skill-management
      description: жҠҖиғҪз®ЎзҗҶеңәжҷ?
      capabilities:
        - skill-registration
        - skill-lifecycle
        - skill-marketplace
        - skill-execution
        - skill-rating
  
  endpoints:
    - path: /api/skill/list
      method: GET
      description: List all skills
      capability: skill-registration
    - path: /api/skill/{skillId}
      method: GET
      description: Get skill details
      capability: skill-registration
    - path: /api/skill/add
      method: POST
      description: Add a new skill
      capability: skill-registration
    - path: /api/skill/update
      method: PUT
      description: Update skill
      capability: skill-lifecycle
    - path: /api/skill/{skillId}
      method: DELETE
      description: Delete skill
      capability: skill-lifecycle
    - path: /api/skill/{skillId}/start
      method: POST
      description: Start skill
      capability: skill-execution
    - path: /api/skill/{skillId}/stop
      method: POST
      description: Stop skill
      capability: skill-execution
    - path: /api/skill/{skillId}/execute
      method: POST
      description: Execute skill
      capability: skill-execution
    - path: /api/skill/market/list
      method: GET
      description: List market skills
      capability: skill-marketplace
    - path: /api/skill/market/{skillId}/rate
      method: POST
      description: Rate skill
      capability: skill-rating
  
  config:
    optional:
      - name: MAX_CONCURRENT_EXECUTIONS
        type: integer
        default: 10
        description: Maximum concurrent skill executions
      - name: DEFAULT_TIMEOUT
        type: integer
        default: 30000
        description: Default execution timeout in milliseconds
      - name: ENABLE_MARKETPLACE
        type: boolean
        default: true
        description: Enable skill marketplace features
  
  resources:
    cpu: "200m"
    memory: "256Mi"
    storage: "100Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true

  knowledge:
    documents:
      - id: overview
        name: еҠҹиғҪжҰӮиҝ°
        path: README.md
        type: guide
        language: zh
        priority: high
    ragConfig:
      enabled: true
      indexName: "skill-management-knowledge"
      embeddingModel: text-embedding-3-small
      chunkSize: 1000
      chunkOverlap: 200
      searchStrategy: hybrid
      topK: 5
      threshold: 0.7
