apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-openwrt
  name: OpenWrt Router Driver
  version: 0.7.3
  description: OpenWrt路由器驱动，提供路由器连接、配置管理和命令执行功能
  author: Ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills/tree/main/skills/skill-openwrt
  repository: https://gitee.com/ooderCN/skills.git
  keywords:
    - openwrt
    - router
    - uci
    - network
    - driver

spec:
  type: tool-skill
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.openwrt.OpenWrtSkillApplication
  
  capabilities:
    - id: router-connection
      name: Router Connection
      description: 通过SSH/HTTP连接OpenWrt路由器
      category: connection
    - id: uci-config
      name: UCI Configuration
      description: 管理UCI配置
      category: configuration
    - id: command-execution
      name: Command Execution
      description: 在路由器上执行命令
      category: execution
    - id: wifi-management
      name: WiFi Management
      description: 管理WiFi设置
      category: network
    - id: dhcp-management
      name: DHCP Management
      description: 管理DHCP设置
      category: network
  
  scenes:
    - name: openwrt
      description: OpenWrt管理场景
      capabilities:
        - router-connection
        - uci-config
        - command-execution
        - wifi-management
        - dhcp-management
  
  dependencies: []
  
  config:
    optional:
      - name: CONNECTION_TIMEOUT
        type: number
        default: 30000
        description: 连接超时时间（毫秒）
      - name: SSH_PORT
        type: number
        default: 22
        description: SSH端口
      - name: HTTP_PORT
        type: number
        default: 80
        description: HTTP端口
  
  endpoints:
    - path: /api/openwrt/connect
      method: POST
      description: 连接路由器
      capability: router-connection
    - path: /api/openwrt/disconnect
      method: POST
      description: 断开路由器连接
      capability: router-connection
    - path: /api/openwrt/status
      method: GET
      description: 获取连接状态
      capability: router-connection
    - path: /api/openwrt/info
      method: GET
      description: 获取路由器信息
      capability: router-connection
    - path: /api/openwrt/uci/get
      method: GET
      description: 获取UCI配置
      capability: uci-config
    - path: /api/openwrt/uci/set
      method: POST
      description: 设置UCI配置
      capability: uci-config
    - path: /api/openwrt/uci/commit
      method: POST
      description: 提交UCI更改
      capability: uci-config
    - path: /api/openwrt/command
      method: POST
      description: 执行命令
      capability: command-execution
    - path: /api/openwrt/wifi/list
      method: GET
      description: 列出WiFi网络
      capability: wifi-management
    - path: /api/openwrt/wifi/update
      method: POST
      description: 更新WiFi配置
      capability: wifi-management
    - path: /api/openwrt/wifi/scan
      method: POST
      description: 扫描WiFi网络
      capability: wifi-management
    - path: /api/openwrt/dhcp/leases
      method: GET
      description: 获取DHCP租约
      capability: dhcp-management
    - path: /api/openwrt/packages
      method: GET
      description: 列出软件包
      capability: command-execution
    - path: /api/openwrt/reboot
      method: POST
      description: 重启路由器
      capability: command-execution
    - path: /api/health
      method: GET
      description: 健康检查
  
  resources:
    cpu: "200m"
    memory: "256Mi"
    storage: "100Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true
