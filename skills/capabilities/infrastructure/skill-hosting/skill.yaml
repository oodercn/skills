apiVersion: skill.ooder.net/v1
kind: SkillPackage

metadata:
  id: skill-hosting
  name: Hosting Service
  version: "3.0.1"
  description: Hosting Service Skill for Ooder Agent Platform
  author: Ooder Team
  icon: ri-server-line

spec:
  skillForm: PROVIDER
  skillCategory: SERVICE
  sceneType: AUTO
  purposes:
    - TEAM
    - PERSISTENT
  
  capability:
    category: sys
  
  capabilities:
    - id: service-hosting
      name: Service Hosting
      description: 鏈嶅姟鎵樼
      category: infrastructure
      autoBind: true
    - id: process-management
      name: Process Management
      description: 杩涚▼绠＄悊
      category: infrastructure
      autoBind: true
    - id: auto-restart
      name: Auto Restart
      description: 鑷姩閲嶅惎
      category: infrastructure
      autoBind: false
      
  dependencies:
    - skillId: skill-common
      version: ">=3.0.0"
      required: true
      
  configSchema:
    type: object
    properties:
      autoStart:
        type: boolean
        default: true
        title: 鑷姩鍚姩
      restartPolicy:
        type: string
        default: "on-failure"
        title: 閲嶅惎绛栫暐
        
  estimatedResources:
