apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-openwrt
  name: OpenWrt Router Driver
  version: "3.0.1"
  description: OpenWrt璺敱鍣ㄩ┍鍔紝鎻愪緵璺敱鍣ㄨ繛鎺ャ€侀厤缃鐞嗗拰鍛戒护鎵ц鍔熻兘
  author: Ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills/tree/main/skills/skill-openwrt
  repository: https://gitee.com/ooderCN/skills.git
  keywords:
    - openwrt
    - router
    - uci
    - network
    - driver

spec:
  skillForm: STANDALONE
  type: tool-skill
  
  capability:
    category: sys
  
  ownership: tool
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.openwrt.OpenWrtSkillApplication

  llmConfig:
    required: false
    defaultProvider: "deepseek"
    defaultModel: "deepseek-chat"
    capabilities:
      - chat
      - streaming
      - function-calling
    modelSelection:
      allowUserOverride: true
      availableProviders:
        - deepseek
        - openai
        - qianwen
        - volcengine
        - ollama
    functionCalling:
      enabled: true
      tools:
        - name: query_skill_capability
          description: "鏌ヨ褰撳墠鎶€鑳界殑鑳藉姏鍜屼娇鐢ㄦ柟锟?
          parameters:
            type: object
            properties:
              capability:
                type: string
                description: "鑳藉姏鍚嶇О"
              detail:
                type: string
                enum: [brief, detailed, examples]
                default: "brief"
        - name: execute_mvel_action
          description: "閫氳繃MVEL琛ㄨ揪寮忔墽琛屽悗鍙版搷锟?
          parameters:
            type: object
            properties:
              expression:
                type: string
                description: "MVEL琛ㄨ揪锟?
              context:
                type: object
        - name: generate_ui_form
          description: "鐢熸垚UI琛ㄥ崟渚涚敤鎴峰～锟?
          parameters:
            type: object
            properties:
              formType:
                type: string
              fields:
                type: array
                items:
                  type: object
        - name: execute_batch_operation
          description: "鎵ц鎵归噺鎿嶄綔"
          parameters:
            type: object
            properties:
              operation:
                type: string
              items:
                type: array
                items:
                  type: object
        - name: convert_to_javascript
          description: "杞崲涓篔avaScript浠ｇ爜渚涚敤鎴蜂娇锟?
          parameters:
            type: object
            properties:
              action:
                type: string
              parameters:
                type: object
      toolChoice: auto
    rateLimits:
      requestsPerMinute: 60
      tokensPerMinute: 100000

  
  capabilities:
    - id: router-connection
      name: Router Connection
      description: 閫氳繃SSH/HTTP杩炴帴OpenWrt璺敱锟?
      category: connection
    - id: uci-config
      name: UCI Configuration
      description: 绠＄悊UCI閰嶇疆
      category: configuration
    - id: command-execution
      name: Command Execution
      description: 鍦ㄨ矾鐢卞櫒涓婃墽琛屽懡锟?
      category: execution
    - id: wifi-management
      name: WiFi Management
      description: 绠＄悊WiFi璁剧疆
      category: network
    - id: dhcp-management
      name: DHCP Management
      description: 绠＄悊DHCP璁剧疆
      category: network
  
  scenes:
    - name: openwrt
      description: OpenWrt绠＄悊鍦烘櫙
      capabilities:
        - router-connection
        - uci-config
        - command-execution
        - wifi-management
        - dhcp-management
  
  dependencies: []
  
  config:
    optional:
      - name: CONNECTION_TIMEOUT
        type: number
        default: 30000
        description: 杩炴帴瓒呮椂鏃堕棿锛堟绉掞級
      - name: SSH_PORT
        type: number
        default: 22
        description: SSH绔彛
      - name: HTTP_PORT
        type: number
        default: 80
        description: HTTP绔彛
  
  endpoints:
    - path: /api/openwrt/connect
      method: POST
      description: 杩炴帴璺敱锟?
      capability: router-connection
    - path: /api/openwrt/disconnect
      method: POST
      description: 鏂紑璺敱鍣ㄨ繛锟?
      capability: router-connection
    - path: /api/openwrt/status
      method: GET
      description: 鑾峰彇杩炴帴鐘讹拷?
      capability: router-connection
    - path: /api/openwrt/info
      method: GET
      description: 鑾峰彇璺敱鍣ㄤ俊锟?
      capability: router-connection
    - path: /api/openwrt/uci/get
      method: GET
      description: 鑾峰彇UCI閰嶇疆
      capability: uci-config
    - path: /api/openwrt/uci/set
      method: POST
      description: 璁剧疆UCI閰嶇疆
      capability: uci-config
    - path: /api/openwrt/uci/commit
      method: POST
      description: 鎻愪氦UCI鏇存敼
      capability: uci-config
    - path: /api/openwrt/command
      method: POST
      description: 鎵ц鍛戒护
      capability: command-execution
    - path: /api/openwrt/wifi/list
      method: GET
      description: 鍒楀嚭WiFi缃戠粶
      capability: wifi-management
    - path: /api/openwrt/wifi/update
      method: POST
      description: 鏇存柊WiFi閰嶇疆
      capability: wifi-management
    - path: /api/openwrt/wifi/scan
      method: POST
      description: 鎵弿WiFi缃戠粶
      capability: wifi-management
    - path: /api/openwrt/dhcp/leases
      method: GET
      description: 鑾峰彇DHCP绉熺害
      capability: dhcp-management
    - path: /api/openwrt/packages
      method: GET
      description: 鍒楀嚭杞欢锟?
      capability: command-execution
    - path: /api/openwrt/reboot
      method: POST
      description: 閲嶅惎璺敱锟?
      capability: command-execution
    - path: /api/health
      method: GET
      description: 鍋ュ悍妫€锟?
  
  resources:
    cpu: "200m"
    memory: "256Mi"
    storage: "100Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true
