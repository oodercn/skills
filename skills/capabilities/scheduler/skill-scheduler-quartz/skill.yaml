apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-scheduler-quartz
  name: Quartz调度服务
  version: 0.7.3
  category: sys
  description: Quartz调度服务，提供定时任务调度、执行管理
  author: ooder Team
  type: provider-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - scheduler
    - quartz
    - job
    - cron

spec:
  skillForm: PROVIDER
  type: provider-skill
  
  ownership: platform
  
  capability:
    address: 0x71
    category: SCHED
    code: SCHED_QUARTZ
    operations: [schedule, execute, manage]
  
  providerType: scheduler
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot

  llmConfig:
    required: false
    defaultProvider: "deepseek"
    defaultModel: "deepseek-chat"
    capabilities:
      - chat
      - streaming
      - function-calling
    modelSelection:
      allowUserOverride: true
      availableProviders:
        - deepseek
        - openai
        - qianwen
        - volcengine
        - ollama
    functionCalling:
      enabled: true
      tools:
        - name: query_skill_capability
          description: "查询当前技能的能力和使用方法"
          parameters:
            type: object
            properties:
              capability:
                type: string
                description: "能力名称"
              detail:
                type: string
                enum: [brief, detailed, examples]
                default: "brief"
        - name: execute_mvel_action
          description: "通过MVEL表达式执行后台操作"
          parameters:
            type: object
            properties:
              expression:
                type: string
                description: "MVEL表达式"
              context:
                type: object
        - name: generate_ui_form
          description: "生成UI表单供用户填写"
          parameters:
            type: object
            properties:
              formType:
                type: string
              fields:
                type: array
                items:
                  type: object
        - name: execute_batch_operation
          description: "执行批量操作"
          parameters:
            type: object
            properties:
              operation:
                type: string
              items:
                type: array
                items:
                  type: object
        - name: convert_to_javascript
          description: "转换为JavaScript代码供用户使用"
          parameters:
            type: object
            properties:
              action:
                type: string
              parameters:
                type: object
      toolChoice: auto
    rateLimits:
      requestsPerMinute: 60
      tokensPerMinute: 100000

  
  supportedSceneTypes:
    - workflow
    - automation
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 2s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 20
  
  dependencies: []
  
  providedInterfaces:
    - id: scheduler-service
      version: "1.0"
      description: "调度服务接口"
  
  capabilities:
    - id: schedule
      name: 任务调度
      description: 调度定时任务
      category: service
    - id: execute
      name: 任务执行
      description: 执行任务
      category: service
    - id: manage
      name: 任务管理
      description: 管理任务
      category: service
  
  endpoints:
    - path: /api/scheduler/jobs
      method: POST
      description: 创建任务
      capability: schedule
    - path: /api/scheduler/jobs/{name}/trigger
      method: POST
      description: 触发任务
      capability: execute
    - path: /api/scheduler/jobs
      method: GET
      description: 获取任务列表
      capability: manage
  
  config:
    optional:
      - name: THREAD_POOL_SIZE
        type: integer
        default: 10
        description: 线程池大小
      - name: JOB_STORE
        type: string
        default: "memory"
        description: 任务存储类型
  
  resources:
    cpu: "100m"
    memory: "128Mi"
    storage: "50Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true

  knowledge:
    documents:
      - id: overview
        name: 功能概述
        path: README.md
        type: guide
        language: zh
        priority: high
    ragConfig:
      enabled: true
      indexName: "skill-scheduler-quartz-knowledge"
      embeddingModel: text-embedding-3-small
      chunkSize: 1000
      chunkOverlap: 200
      searchStrategy: hybrid
      topK: 5
      threshold: 0.7
