apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-task
  name: Task Scheduler Service
  version: "3.0.1"
  description: 任务调度服务，支持定时任务、异步任务、任务编排等功能
  author: Ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills/tree/main/skills/capabilities/scheduler/skill-task
  repository: https://gitee.com/ooderCN/skills.git
  keywords:
    - task
    - scheduler
    - job
    - async
    - cron

spec:
  skillForm: PROVIDER
  skillCategory: SERVICE
  sceneType: AUTO
  purposes:
    - INFRASTRUCTURE
    - SCHEDULING

  ownership: platform

  capability:
    category: scheduler
    code: TASK_SCHEDULER
    operations: [schedule, execute, monitor]

  runtime:
    language: java
    javaVersion: "21"
    framework: spring-boot
    mainClass: net.ooder.skill.task.TaskProvider

  providedInterfaces:
    - id: net.ooder.skill.task.TaskProvider
      version: "1.0"
      description: "任务调度提供商接口"

  capabilities:
    - id: schedule
      name: 任务调度
      description: 创建和管理定时任务
      category: scheduler
    - id: execute
      name: 任务执行
      description: 执行异步任务
      category: scheduler
    - id: monitor
      name: 任务监控
      description: 监控任务执行状态
      category: scheduler

  config:
    optional:
      - name: TASK_THREAD_POOL_SIZE
        type: integer
        default: 10
        description: 任务线程池大小
      - name: TASK_RETRY_COUNT
        type: integer
        default: 3
        description: 任务重试次数
