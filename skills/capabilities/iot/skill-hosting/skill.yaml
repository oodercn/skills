apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-hosting
  name: 托管服务
  version: 0.7.3
  description: 托管服务，提供应用托管、资源管理、自动扩缩容
  author: ooder Team
  type: provider-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - hosting
    - deploy
    - scale
    - container

spec:
  type: provider-skill
  
  ownership: platform
  
  capability:
    address: 0x62
    category: IOT
    code: IOT_HOSTING
    operations: [deploy, scale, manage]
  
  providerType: infrastructure
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
  
  supportedSceneTypes:
    - devops
    - infrastructure
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 3s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 10
  
  dependencies: []
  
  providedInterfaces:
    - id: hosting-service
      version: "1.0"
      description: "托管服务接口"
  
  capabilities:
    - id: deploy
      name: 应用部署
      description: 部署应用
      category: service
    - id: scale
      name: 自动扩缩容
      description: 自动扩缩容
      category: service
    - id: manage
      name: 资源管理
      description: 管理资源
      category: service
  
  endpoints:
    - path: /api/hosting/apps
      method: POST
      description: 部署应用
      capability: deploy
    - path: /api/hosting/apps/{id}/scale
      method: PUT
      description: 扩缩容
      capability: scale
    - path: /api/hosting/apps/{id}
      method: GET
      description: 获取应用
      capability: manage
  
  config:
    optional:
      - name: MAX_INSTANCES
        type: integer
        default: 10
        description: 最大实例数
      - name: AUTO_SCALE
        type: boolean
        default: true
        description: 自动扩缩容
  
  resources:
    cpu: "100m"
    memory: "128Mi"
    storage: "100Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true
