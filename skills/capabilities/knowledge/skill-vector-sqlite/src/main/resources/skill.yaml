apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-vector-sqlite
  name: SQLite向量存储
  version: 2.3
  description: 基于SQLite的轻量级向量存储服务，支持向量索引、相似度检索、向量持久化
  author: ooder Team
  type: infra-service
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - vector
    - sqlite
    - embedding
    - semantic-search
    - rag

spec:
  type: service-skill
  
  ownership: independent
  
  supportedSceneTypes:
    - knowledge-qa
    - document-assistant
    - semantic-search
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 2s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 10
  
  dependencies: []
  
  providedInterfaces:
    - id: vector-storage
      version: "1.0"
      description: "向量存储接口"
    - id: vector-search
      version: "1.0"
      description: "向量检索接口"
  
  capabilities:
    - id: vector-index
      name: 向量索引
      description: 创建和管理向量索引
      category: ai
    - id: vector-search
      name: 向量检索
      description: 基于余弦相似度的向量检索
      category: ai
    - id: vector-persist
      name: 向量持久化
      description: 向量数据持久化存储
      category: storage
  
  endpoints:
    - path: /api/v1/vector/insert
      method: POST
      description: 插入向量
      capability: vector-index
    - path: /api/v1/vector/batch-insert
      method: POST
      description: 批量插入向量
      capability: vector-index
    - path: /api/v1/vector/search
      method: POST
      description: 向量相似度检索
      capability: vector-search
    - path: /api/v1/vector/{id}
      method: DELETE
      description: 删除向量
      capability: vector-index
    - path: /api/v1/vector/stats
      method: GET
      description: 获取存储统计
      capability: vector-persist
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    
  config:
    optional:
      - name: VECTOR_DB_PATH
        type: string
        default: "./data/vectors.db"
        description: 向量数据库存储路径
      - name: VECTOR_DIMENSION
        type: integer
        default: 1536
        description: 向量维度（默认OpenAI embedding维度）
      - name: CACHE_ENABLED
        type: boolean
        default: true
        description: 是否启用向量缓存
      - name: CACHE_MAX_SIZE
        type: integer
        default: 10000
        description: 缓存最大容量
      - name: SEARCH_DEFAULT_TOPK
        type: integer
        default: 10
        description: 默认返回结果数
  
  resources:
    cpu: "100m"
    memory: "256Mi"
    storage: "500Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true

  knowledge:
    documents:
      - id: overview
        name: 功能概述
        path: README.md
        type: guide
        language: zh
        priority: high
    ragConfig:
      enabled: true
      indexName: "skill-vector-sqlite-knowledge"
      embeddingModel: text-embedding-3-small
      chunkSize: 1000
      chunkOverlap: 200
      searchStrategy: hybrid
      topK: 5
      threshold: 0.7
