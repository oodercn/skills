apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-local-knowledge
  name: 本地知识服务
  version: 2.3
  description: 本地知识存储和检索服务 - 支持本地文档索引、BM25检索、NLP分类、术语映射、表单辅助、查询构建
  author: ooder Team
  type: system-service
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - knowledge
    - local
    - storage
    - index
    - nlp
    - rag

spec:
  type: service-skill
  
  ownership: independent
  
  supportedSceneTypes:
    - llm-assistant
    - llm-chat
    - knowledge-qa
    - onboarding-assistant
    - document-assistant
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 2s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 15
  
  dependencies: []
  
  providedInterfaces:
    - id: local-knowledge-storage
      version: "1.0"
      description: "本地知识存储接口"
    - id: local-knowledge-index
      version: "1.0"
      description: "本地知识索引接口"
    - id: nlp-classification
      version: "1.0"
      description: "NLP分类接口"
    - id: term-mapping
      version: "1.0"
      description: "术语映射接口"
  
  capabilities:
    - id: local-storage
      name: 本地存储
      description: 本地知识存储，支持JSON/文件存储
      category: storage
    - id: local-index
      name: 本地索引
      description: 本地文档索引，支持BM25/Lucene
      category: ai
    - id: local-search
      name: 本地检索
      description: 本地知识检索，支持关键词/语义检索
      category: ai
    - id: nlp-classification
      name: NLP分类
      description: 自然语言意图分类(DATA_QUERY/CREATE_ACTION/FORM_ASSIST/DOC_SEARCH/SYSTEM_HELP)
      category: ai
    - id: term-mapping
      name: 术语映射
      description: 业务术语与系统概念映射
      category: ai
    - id: form-assist
      name: 表单辅助
      description: 自然语言表单填写辅助
      category: ai
    - id: query-building
      name: 查询构建
      description: 自然语言查询条件构建
      category: ai
  
  endpoints:
    - path: /api/v1/local-kb
      method: POST
      description: 创建本地知识库
      capability: local-storage
    - path: /api/v1/local-kb/{id}
      method: GET
      description: 获取本地知识库
      capability: local-storage
    - path: /api/v1/local-kb/{id}/index
      method: POST
      description: 构建索引
      capability: local-index
    - path: /api/v1/local-kb/{id}/search
      method: POST
      description: 检索本地知识
      capability: local-search
    - path: /api/v1/nlp/classify
      method: POST
      description: NLP意图分类
      capability: nlp-classification
    - path: /api/v1/term/resolve
      method: POST
      description: 术语解析
      capability: term-mapping
    - path: /api/v1/form/assist
      method: POST
      description: 表单辅助
      capability: form-assist
    - path: /api/v1/query/build
      method: POST
      description: 查询构建
      capability: query-building
  
  intentTypes:
    - DATA_QUERY
    - CREATE_ACTION
    - FORM_ASSIST
    - DOC_SEARCH
    - SYSTEM_HELP
    - UNKNOWN
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    
  config:
    optional:
      - name: STORAGE_PATH
        type: string
        default: "./data/local-kb"
        description: 本地存储路径
      - name: INDEX_TYPE
        type: string
        default: "bm25"
        description: 索引类型(bm25/lucene)
      - name: MAX_INDEX_SIZE
        type: integer
        default: 104857600
        description: 最大索引大小(字节)
      - name: TERM_DICT_PATH
        type: string
        default: "./data/terms"
        description: 术语字典路径
      - name: ENABLE_NLP_CACHE
        type: boolean
        default: true
        description: 是否启用NLP结果缓存
  
  resources:
    cpu: "100m"
    memory: "256Mi"
    storage: "500Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: false

  knowledge:
    documents:
      - id: overview
        name: 功能概述
        path: README.md
        type: guide
        language: zh
        priority: high
    ragConfig:
      enabled: true
      indexName: "skill-local-knowledge-knowledge"
      embeddingModel: text-embedding-3-small
      chunkSize: 1000
      chunkOverlap: 200
      searchStrategy: hybrid
      topK: 5
      threshold: 0.7
