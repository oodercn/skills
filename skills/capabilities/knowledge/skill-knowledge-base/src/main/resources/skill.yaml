apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-knowledge-base
  name: 知识库核心服务
  version: 2.3
  description: 知识库核心服务 - 提供知识库管理、文档管理、BM25检索、向量存储、语义检索能力
  author: ooder Team
  type: system-service
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - knowledge
    - search
    - bm25
    - document
    - vector
    - rag

spec:
  type: service-skill
  
  ownership: independent
  
  capability:
    address: 0x30
    category: KNOW
    code: KNOW_VECTOR
    operations: [create, read, update, delete, search, semantic-search]
  
  supportedSceneTypes:
    - knowledge-qa
    - document-assistant
    - meeting-minutes
    - project-knowledge
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 3s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 15
  
  dependencies:
    - id: skill-vector-sqlite
      version: ">=2.3"
      required: false
      description: "向量存储服务（可选，用于语义检索）"
    - id: skill-document-processor
      version: ">=2.3"
      required: false
      description: "文档处理服务（可选，用于文档解析）"
  
  providedInterfaces:
    - id: knowledge-storage
      version: "1.0"
      description: "知识库存储接口"
    - id: knowledge-search
      version: "1.0"
      description: "知识库检索接口"
    - id: vector-knowledge
      version: "1.0"
      description: "向量知识库接口"
  
  capabilities:
    - id: kb-management
      name: 知识库管理
      description: 创建、更新、删除知识库
      category: service
    - id: document-management
      name: 文档管理
      description: 管理知识库中的文档，支持上传、解析、索引
      category: service
    - id: search
      name: 知识检索
      description: BM25关键词检索
      category: ai
    - id: semantic-search
      name: 语义检索
      description: 基于向量的语义相似度检索
      category: ai
    - id: hybrid-search
      name: 混合检索
      description: 关键词+语义混合检索
      category: ai
    - id: vector-storage
      name: 向量存储
      description: 文档向量嵌入与存储
      category: ai
  
  knowledgeCapability:
    layers:
      - level: GENERAL
        description: 通用知识层
        scope: global
      - level: PROFESSIONAL
        description: 专业领域知识层
        scope: domain
      - level: SCENE
        description: 场景专属知识层
        scope: scene
  
  endpoints:
    - path: /api/v1/kb
      method: POST
      description: 创建知识库
      capability: kb-management
    - path: /api/v1/kb
      method: GET
      description: 列出知识库
      capability: kb-management
    - path: /api/v1/kb/{id}
      method: GET
      description: 获取知识库
      capability: kb-management
    - path: /api/v1/kb/{id}
      method: PUT
      description: 更新知识库
      capability: kb-management
    - path: /api/v1/kb/{id}
      method: DELETE
      description: 删除知识库
      capability: kb-management
    - path: /api/v1/kb/{kbId}/documents
      method: POST
      description: 上传文档
      capability: document-management
    - path: /api/v1/kb/{kbId}/documents
      method: GET
      description: 获取文档列表
      capability: document-management
    - path: /api/v1/kb/{kbId}/documents/{docId}
      method: DELETE
      description: 删除文档
      capability: document-management
    - path: /api/v1/kb/{kbId}/documents/{docId}/status
      method: GET
      description: 文档处理状态
      capability: document-management
    - path: /api/v1/kb/{kbId}/search
      method: POST
      description: 搜索知识库
      capability: search
    - path: /api/v1/kb/{kbId}/search/semantic
      method: POST
      description: 语义检索
      capability: semantic-search
    - path: /api/v1/kb/{kbId}/search/hybrid
      method: POST
      description: 混合检索
      capability: hybrid-search
    - path: /api/v1/kb/search/cross
      method: POST
      description: 跨知识库检索
      capability: search
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    
  config:
    optional:
      - name: STORAGE_PATH
        type: string
        default: "./data/kb"
        description: 知识库存储路径
      - name: MAX_DOCUMENT_SIZE
        type: integer
        default: 10485760
        description: 最大文档大小（字节）
      - name: SEARCH_LIMIT
        type: integer
        default: 10
        description: 搜索结果限制
      - name: ENABLE_VECTOR_SEARCH
        type: boolean
        default: true
        description: 是否启用向量检索
      - name: EMBEDDING_MODEL
        type: string
        default: "text-embedding-3-small"
        description: 嵌入模型
      - name: CHUNK_SIZE
        type: integer
        default: 500
        description: 文档分块大小
      - name: CHUNK_OVERLAP
        type: integer
        default: 50
        description: 分块重叠大小
  
  resources:
    cpu: "200m"
    memory: "512Mi"
    storage: "2Gi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true

  knowledge:
    documents:
      - id: overview
        name: 功能概述
        path: README.md
        type: guide
        language: zh
        priority: high
        
      - id: quick-start
        name: 快速开始
        path: docs/quick-start.md
        type: guide
        language: zh
        priority: high
        
      - id: api-reference
        name: API参考
        path: docs/api-reference.md
        type: reference
        language: zh
        priority: medium
        
      - id: configuration
        name: 配置指南
        path: docs/configuration.md
        type: guide
        language: zh
        priority: medium
        
      - id: kb-management
        name: 知识库管理
        path: docs/kb-management.md
        type: guide
        language: zh
        priority: medium
        
      - id: search-guide
        name: 检索指南
        path: docs/search-guide.md
        type: guide
        language: zh
        priority: medium
    
    ragConfig:
      enabled: true
      indexName: "skill-knowledge-base-knowledge"
      embeddingModel: text-embedding-3-small
      chunkSize: 1000
      chunkOverlap: 200
      searchStrategy: hybrid
      topK: 5
      threshold: 0.7
      rerankEnabled: false

  persona:
    enabled: true
    name: 知识库服务助手
    description: 专业的知识库服务助手，帮助用户管理知识库和进行知识检索
    expertise:
      - 知识库管理
      - 文档处理
      - BM25检索
      - 向量检索
      - 语义检索
    boundaries:
      - 只回答知识库相关的问题
      - 不处理具体业务数据
      - 提供技术支持和使用指导
    tone: professional, technical, helpful
    examples:
      - question: "如何创建知识库？"
        answer: "通过POST /api/v1/kb接口创建知识库，需要提供name和description参数。"
      - question: "支持哪些检索方式？"
        answer: "支持三种检索方式：BM25关键词检索、向量语义检索、混合检索。"
