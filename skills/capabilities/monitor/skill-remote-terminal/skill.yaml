apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-remote-terminal
  name: 远程终端服务
  version: 0.7.3
  category: sys
  description: 远程终端服务，提供SSH连接、命令执行、文件传输
  author: ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - terminal
    - ssh
    - remote
    - shell

spec:
  skillForm: PROVIDER
  
  ownership: platform
  
  capability:
    address: 0x58
    category: MON
    code: MON_BASE
    operations: [connect, execute, transfer]
  
  providerType: monitoring
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot

  llmConfig:
    required: false
    defaultProvider: "deepseek"
    defaultModel: "deepseek-chat"
    capabilities:
      - chat
      - streaming
      - function-calling
    modelSelection:
      allowUserOverride: true
      availableProviders:
        - deepseek
        - openai
        - qianwen
        - volcengine
        - ollama
    functionCalling:
      enabled: true
      tools:
        - name: query_skill_capability
          description: "查询当前技能的能力和使用方法"
          parameters:
            type: object
            properties:
              capability:
                type: string
                description: "能力名称"
              detail:
                type: string
                enum: [brief, detailed, examples]
                default: "brief"
        - name: execute_mvel_action
          description: "通过MVEL表达式执行后台操作"
          parameters:
            type: object
            properties:
              expression:
                type: string
                description: "MVEL表达式"
              context:
                type: object
        - name: generate_ui_form
          description: "生成UI表单供用户填写"
          parameters:
            type: object
            properties:
              formType:
                type: string
              fields:
                type: array
                items:
                  type: object
        - name: execute_batch_operation
          description: "执行批量操作"
          parameters:
            type: object
            properties:
              operation:
                type: string
              items:
                type: array
                items:
                  type: object
        - name: convert_to_javascript
          description: "转换为JavaScript代码供用户使用"
          parameters:
            type: object
            properties:
              action:
                type: string
              parameters:
                type: object
      toolChoice: auto
    rateLimits:
      requestsPerMinute: 60
      tokensPerMinute: 100000

  
  supportedSceneTypes:
    - monitoring
    - infrastructure
    - devops
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: false
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 10
  
  dependencies:
    - id: skill-monitor
      version: ">=0.7.0"
      required: true
      description: "监控服务依赖"
  
  providedInterfaces:
    - id: terminal-service
      version: "1.0"
      description: "终端服务接口"
  
  capabilities:
    - id: connect
      name: SSH连接
      description: 建立SSH连接
      category: service
    - id: execute
      name: 命令执行
      description: 执行远程命令
      category: service
    - id: transfer
      name: 文件传输
      description: 传输文件
      category: service
  
  endpoints:
    - path: /api/terminal/connect
      method: POST
      description: 建立连接
      capability: connect
    - path: /api/terminal/execute
      method: POST
      description: 执行命令
      capability: execute
    - path: /api/terminal/transfer
      method: POST
      description: 传输文件
      capability: transfer
  
  config:
    required:
      - name: SSH_HOST
        type: string
        description: SSH主机
      - name: SSH_PORT
        type: integer
        description: SSH端口
      - name: SSH_USER
        type: string
        description: SSH用户�?
    optional:
      - name: SSH_KEY
        type: string
        description: SSH私钥
      - name: SSH_PASSWORD
        type: string
        description: SSH密码
  
  resources:
    cpu: "100m"
    memory: "128Mi"
    storage: "50Mi"
  
  offline:
    enabled: false
