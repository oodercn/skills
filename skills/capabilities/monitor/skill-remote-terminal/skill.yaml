apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-remote-terminal
  name: 远程终端服务
  version: 0.7.3
  description: 远程终端服务，提供SSH连接、命令执行、文件传输
  author: ooder Team
  type: provider-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - terminal
    - ssh
    - remote
    - shell

spec:
  type: provider-skill
  
  ownership: platform
  
  capability:
    address: 0x58
    category: MON
    code: MON_BASE
    operations: [connect, execute, transfer]
  
  providerType: monitoring
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
  
  supportedSceneTypes:
    - monitoring
    - infrastructure
    - devops
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: false
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 10
  
  dependencies:
    - id: skill-monitor
      version: ">=0.7.0"
      required: true
      description: "监控服务依赖"
  
  providedInterfaces:
    - id: terminal-service
      version: "1.0"
      description: "终端服务接口"
  
  capabilities:
    - id: connect
      name: SSH连接
      description: 建立SSH连接
      category: service
    - id: execute
      name: 命令执行
      description: 执行远程命令
      category: service
    - id: transfer
      name: 文件传输
      description: 传输文件
      category: service
  
  endpoints:
    - path: /api/terminal/connect
      method: POST
      description: 建立连接
      capability: connect
    - path: /api/terminal/execute
      method: POST
      description: 执行命令
      capability: execute
    - path: /api/terminal/transfer
      method: POST
      description: 传输文件
      capability: transfer
  
  config:
    required:
      - name: SSH_HOST
        type: string
        description: SSH主机
      - name: SSH_PORT
        type: integer
        description: SSH端口
      - name: SSH_USER
        type: string
        description: SSH用户名
    optional:
      - name: SSH_KEY
        type: string
        description: SSH私钥
      - name: SSH_PASSWORD
        type: string
        description: SSH密码
  
  resources:
    cpu: "100m"
    memory: "128Mi"
    storage: "50Mi"
  
  offline:
    enabled: false
