apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-res-service
  name: 璧勬簮绠＄悊鏈嶅姟
  version: "3.0.1"
  description: 璧勬簮绠＄悊鏈嶅姟锛屾彁渚汣PU銆佸唴瀛樸€佺鐩樼洃鎺?  author: ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - resource
    - cpu
    - memory
    - disk
    - monitor

spec:
  skillForm: PROVIDER
  
  ownership: platform
  
  capability:
    address: 0x58
    category: sys
    code: MON_BASE
    operations: [cpu, memory, disk, network]
  
  providerType: monitoring
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot

  llmConfig:
    required: false
    defaultProvider: "deepseek"
    defaultModel: "deepseek-chat"
    capabilities:
      - chat
      - streaming
      - function-calling
    modelSelection:
      allowUserOverride: true
      availableProviders:
        - deepseek
        - openai
        - qianwen
        - volcengine
        - ollama
    functionCalling:
      enabled: true
      tools:
        - name: query_skill_capability
          description: "鏌ヨ褰撳墠鎶€鑳界殑鑳藉姏鍜屼娇鐢ㄦ柟娉?
          parameters:
            type: object
            properties:
              capability:
                type: string
                description: "鑳藉姏鍚嶇О"
              detail:
                type: string
                enum: [brief, detailed, examples]
                default: "brief"
        - name: execute_mvel_action
          description: "閫氳繃MVEL琛ㄨ揪寮忔墽琛屽悗鍙版搷浣?
          parameters:
            type: object
            properties:
              expression:
                type: string
                description: "MVEL琛ㄨ揪寮?
              context:
                type: object
        - name: generate_ui_form
          description: "鐢熸垚UI琛ㄥ崟渚涚敤鎴峰～鍐?
          parameters:
            type: object
            properties:
              formType:
                type: string
              fields:
                type: array
                items:
                  type: object
        - name: execute_batch_operation
          description: "鎵ц鎵归噺鎿嶄綔"
          parameters:
            type: object
            properties:
              operation:
                type: string
              items:
                type: array
                items:
                  type: object
        - name: convert_to_javascript
          description: "杞崲涓篔avaScript浠ｇ爜渚涚敤鎴蜂娇鐢?
          parameters:
            type: object
            properties:
              action:
                type: string
              parameters:
                type: object
      toolChoice: auto
    rateLimits:
      requestsPerMinute: 60
      tokensPerMinute: 100000

  
  supportedSceneTypes:
    - monitoring
    - infrastructure
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 2s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 10
  
  dependencies:
    - id: skill-monitor
      version: ">=0.7.0"
      required: true
      description: "鐩戞帶鏈嶅姟渚濊禆"
  
  providedInterfaces:
    - id: resource-service
      version: "1.0"
      description: "璧勬簮鏈嶅姟鎺ュ彛"
  
  capabilities:
    - id: cpu
      name: CPU鐩戞帶
      description: CPU浣跨敤鐜囩洃鎺?      category: service
    - id: memory
      name: 鍐呭瓨鐩戞帶
      description: 鍐呭瓨浣跨敤鐩戞帶
      category: service
    - id: disk
      name: 纾佺洏鐩戞帶
      description: 纾佺洏浣跨敤鐩戞帶
      category: service
    - id: network
      name: 缃戠粶鐩戞帶
      description: 缃戠粶娴侀噺鐩戞帶
      category: service
  
  endpoints:
    - path: /api/resources/cpu
      method: GET
      description: CPU浣跨敤鐜?      capability: cpu
    - path: /api/resources/memory
