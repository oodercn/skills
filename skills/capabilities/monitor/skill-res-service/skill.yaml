apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-res-service
  name: 资源管理服务
  version: 0.7.3
  description: 资源管理服务，提供CPU、内存、磁盘监控
  author: ooder Team
  type: provider-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - resource
    - cpu
    - memory
    - disk
    - monitor

spec:
  type: provider-skill
  
  ownership: platform
  
  capability:
    address: 0x58
    category: MON
    code: MON_BASE
    operations: [cpu, memory, disk, network]
  
  providerType: monitoring
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
  
  supportedSceneTypes:
    - monitoring
    - infrastructure
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 2s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 10
  
  dependencies:
    - id: skill-monitor
      version: ">=0.7.0"
      required: true
      description: "监控服务依赖"
  
  providedInterfaces:
    - id: resource-service
      version: "1.0"
      description: "资源服务接口"
  
  capabilities:
    - id: cpu
      name: CPU监控
      description: CPU使用率监控
      category: service
    - id: memory
      name: 内存监控
      description: 内存使用监控
      category: service
    - id: disk
      name: 磁盘监控
      description: 磁盘使用监控
      category: service
    - id: network
      name: 网络监控
      description: 网络流量监控
      category: service
  
  endpoints:
    - path: /api/resources/cpu
      method: GET
      description: CPU使用率
      capability: cpu
    - path: /api/resources/memory
      method: GET
      description: 内存使用
      capability: memory
    - path: /api/resources/disk
      method: GET
      description: 磁盘使用
      capability: disk
    - path: /api/resources/network
      method: GET
      description: 网络流量
      capability: network
  
  config:
    optional:
      - name: COLLECT_INTERVAL
        type: integer
        default: 10
        description: 采集间隔(秒)
      - name: HISTORY_DAYS
        type: integer
        default: 7
        description: 历史保留天数
  
  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "100Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true
