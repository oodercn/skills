  config:
    optional:
      - name: COLLECT_INTERVAL
        type: integer
        default: 10
        description: 閲囬泦闂撮殧(绉?
      - name: HISTORY_DAYS
        type: integer
        default: 7
        description: 鍘嗗彶淇濈暀澶╂暟
  
  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "100Mi"
  
  offline:
