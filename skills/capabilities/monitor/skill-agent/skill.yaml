apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-agent
  name: 代理管理服务
  version: 0.7.3
  description: 代理管理服务，提供代理注册、心跳、状态管理
  author: ooder Team
  type: provider-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - agent
    - monitor
    - heartbeat
    - registration

spec:
  type: provider-skill
  
  ownership: platform
  
  capability:
    address: 0x5A
    category: MON
    code: MON_AGENT
    operations: [register, heartbeat, status]
  
  providerType: monitoring
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
  
  supportedSceneTypes:
    - monitoring
    - infrastructure
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 1s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 10
  
  dependencies: []
  
  providedInterfaces:
    - id: agent-service
      version: "1.0"
      description: "代理服务接口"
  
  capabilities:
    - id: register
      name: 代理注册
      description: 注册新代理
      category: service
    - id: heartbeat
      name: 心跳检测
      description: 代理心跳检测
      category: service
    - id: status
      name: 状态管理
      description: 代理状态管理
      category: service
  
  endpoints:
    - path: /api/agents
      method: POST
      description: 注册代理
      capability: register
    - path: /api/agents/{id}/heartbeat
      method: POST
      description: 心跳
      capability: heartbeat
    - path: /api/agents/{id}/status
      method: GET
      description: 获取状态
      capability: status
  
  config:
    optional:
      - name: HEARTBEAT_INTERVAL
        type: integer
        default: 30
        description: 心跳间隔(秒)
      - name: HEARTBEAT_TIMEOUT
        type: integer
        default: 90
        description: 心跳超时(秒)
  
  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "10Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: false
