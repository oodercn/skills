apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-monitor
  name: 监控服务
  version: 2.3.0
  description: 系统监控、指标采集、告警管理、日志查询
  author: ooder Team
  type: system-service
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN
  repository: https://gitee.com/ooderCN/ooder-skills
  keywords:
    - monitor
    - metrics
    - alert
    - observation
    - logging

spec:
  type: system-service
  
  ownership: platform
  
  capability:
    address: 0x50
    category: MON
    code: MON_METRICS
    operations: [metrics-collect, alert-manage, log-query, observation]
  
  dependencies: []
  
  capabilities:
    - id: metrics-collect
      name: 指标采集
      description: 采集系统指标数据
      category: monitoring
      type: ATOMIC
      
    - id: alert-manage
      name: 告警管理
      description: 创建、确认告警规则
      category: monitoring
      type: ATOMIC
      
    - id: log-query
      name: 日志查询
      description: 查询系统日志
      category: monitoring
      type: ATOMIC
      
    - id: observation
      name: 观测能力
      description: 目标观测和历史数据获取
      category: monitoring
      type: ATOMIC
      
    - id: metrics-query
      name: 指标查询
      description: 查询指定指标数据
      category: monitoring
      type: ATOMIC
  
  endpoints:
    - path: /api/monitor/metrics
      method: GET
      description: 获取所有指标
      capability: metrics-collect
      
    - path: /api/monitor/metrics/{name}
      method: GET
      description: 获取指定指标
      capability: metrics-query
      
    - path: /api/monitor/alerts
      method: GET
      description: 获取告警列表
      capability: alert-manage
      
    - path: /api/monitor/alerts
      method: POST
      description: 创建告警规则
      capability: alert-manage
      
    - path: /api/monitor/alerts/{alertId}/acknowledge
      method: POST
      description: 确认告警
      capability: alert-manage
      
    - path: /api/monitor/logs
      method: GET
      description: 查询日志
      capability: log-query
      
    - path: /api/monitor/observe/{targetId}
      method: GET
      description: 观测目标
      capability: observation
      
    - path: /api/monitor/observe/{targetId}/history
      method: GET
      description: 获取观测历史
      capability: observation
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.monitor.MonitorSkillApplication
  
  config:
    optional:
      - name: METRICS_INTERVAL
        type: integer
        default: 30000
        description: 指标采集间隔（毫秒）
      - name: LOG_RETENTION_DAYS
        type: integer
        default: 7
        description: 日志保留天数
      - name: ALERT_ENABLED
        type: boolean
        default: true
        description: 启用告警功能
      - name: OBSERVATION_WINDOW
        type: integer
        default: 3600000
        description: 观测时间窗口（毫秒）
  
  resources:
    cpu: "200m"
    memory: "256Mi"
    storage: "100Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true
