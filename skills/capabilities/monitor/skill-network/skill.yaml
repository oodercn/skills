apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-network
  name: Network Management Skill
  version: "3.0.1"
  description: 缃戠粶绠＄悊鎶€鑳斤紝鎻愪緵缃戠粶閰嶇疆銆両P绠＄悊銆佽澶囨壂鎻忕瓑鍔熻兘
  author: Ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills/tree/main/skills/skill-network
  repository: https://gitee.com/ooderCN/skills.git
  keywords:
    - network
    - ip
    - dhcp
    - dns
    - wifi
    - device

spec:
  skillForm: PROVIDER
  type: service-skill
  
  ownership: platform
  
  capability:
    category: sys
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.network.NetworkSkillApplication

  llmConfig:
    required: false
    defaultProvider: "deepseek"
    defaultModel: "deepseek-chat"
    capabilities:
      - chat
      - streaming
      - function-calling
    modelSelection:
      allowUserOverride: true
      availableProviders:
        - deepseek
        - openai
        - qianwen
        - volcengine
        - ollama
    functionCalling:
      enabled: true
      tools:
        - name: query_skill_capability
          description: "鏌ヨ褰撳墠鎶€鑳界殑鑳藉姏鍜屼娇鐢ㄦ柟锟?
          parameters:
            type: object
            properties:
              capability:
                type: string
                description: "鑳藉姏鍚嶇О"
              detail:
                type: string
                enum: [brief, detailed, examples]
                default: "brief"
        - name: execute_mvel_action
          description: "閫氳繃MVEL琛ㄨ揪寮忔墽琛屽悗鍙版搷锟?
          parameters:
            type: object
            properties:
              expression:
                type: string
                description: "MVEL琛ㄨ揪锟?
              context:
                type: object
        - name: generate_ui_form
          description: "鐢熸垚UI琛ㄥ崟渚涚敤鎴峰～锟?
          parameters:
            type: object
            properties:
              formType:
                type: string
              fields:
                type: array
                items:
                  type: object
        - name: execute_batch_operation
          description: "鎵ц鎵归噺鎿嶄綔"
          parameters:
            type: object
            properties:
              operation:
                type: string
              items:
                type: array
                items:
                  type: object
        - name: convert_to_javascript
          description: "杞崲涓篔avaScript浠ｇ爜渚涚敤鎴蜂娇锟?
          parameters:
            type: object
            properties:
              action:
                type: string
              parameters:
                type: object
      toolChoice: auto
    rateLimits:
      requestsPerMinute: 60
      tokensPerMinute: 100000

  
  capabilities:
    - id: network-config
      name: Network Configuration
      description: 绠＄悊缃戠粶璁剧疆锛屽寘鎷珼NS銆丏HCP銆乄iFi
      category: network
    - id: ip-management
      name: IP Address Management
      description: 绠＄悊IP鍦板潃鍜岄粦鍚嶅崟
      category: network
    - id: device-scanning
      name: Network Device Scanning
      description: 鎵弿鍜屽彂鐜扮綉缁滆锟?
      category: network
  
  scenes:
    - name: network
      description: 缃戠粶绠＄悊鍦烘櫙
      capabilities:
        - network-config
        - ip-management
        - device-scanning
  
  dependencies: []
  
  config:
    optional:
      - name: NETWORK_SCAN_INTERVAL
        type: number
        default: 300000
        description: 缃戠粶鎵弿闂撮殧锛堟绉掞級
      - name: DHCP_LEASE_FILE
        type: string
        default: /var/lib/dhcp/dhcpd.leases
        description: DHCP绉熺害鏂囦欢璺緞
      - name: ARP_CACHE_FILE
        type: string
        default: /proc/net/arp
        description: ARP缂撳瓨鏂囦欢璺緞
  
  endpoints:
    - path: /api/network/settings
      method: GET
      description: 鑾峰彇鎵€鏈夌綉缁滆锟?
      capability: network-config
    - path: /api/network/settings/{type}
      method: GET
      description: 鎸夌被鍨嬭幏鍙栫綉缁滆锟?
      capability: network-config
    - path: /api/network/settings/{type}
      method: PUT
      description: 鏇存柊缃戠粶璁剧疆
      capability: network-config
    - path: /api/network/ips
      method: GET
      description: 鑾峰彇IP鍦板潃鍒楄〃
      capability: ip-management
    - path: /api/network/ips
      method: POST
      description: 娣诲姞闈欐€両P鍦板潃
      capability: ip-management
    - path: /api/network/ips/{id}
      method: DELETE
      description: 鍒犻櫎IP鍦板潃
      capability: ip-management
    - path: /api/network/blacklist
      method: GET
      description: 鑾峰彇IP榛戝悕锟?
      capability: ip-management
    - path: /api/network/blacklist
      method: POST
      description: 娣诲姞IP鍒伴粦鍚嶅崟
      capability: ip-management
    - path: /api/network/blacklist/{id}
      method: DELETE
      description: 浠庨粦鍚嶅崟绉婚櫎IP
      capability: ip-management
    - path: /api/network/devices
      method: GET
      description: 鑾峰彇缃戠粶璁惧
      capability: device-scanning
    - path: /api/health
      method: GET
      description: 鍋ュ悍妫€锟?
  
  resources:
    cpu: "200m"
    memory: "256Mi"
    storage: "100Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true
