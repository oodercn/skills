apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-access-control
  name: 访问控制服务
  version: 0.7.3
  description: 访问控制服务，提供权限管理、角色管理、访问策略
  author: ooder Team
  type: provider-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - access
    - control
    - permission
    - role
    - rbac

spec:
  type: provider-skill
  
  ownership: platform
  
  capability:
    address: 0x79
    category: SEC
    code: SEC_ACCESS
    operations: [permission, role, policy]
  
  providerType: security
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
  
  supportedSceneTypes:
    - security
    - compliance
    - admin
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 2s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 10
  
  dependencies:
    - id: skill-security
      version: ">=0.7.0"
      required: true
      description: "安全服务依赖"
  
  providedInterfaces:
    - id: access-control-service
      version: "1.0"
      description: "访问控制接口"
  
  capabilities:
    - id: permission
      name: 权限管理
      description: 管理权限
      category: service
    - id: role
      name: 角色管理
      description: 管理角色
      category: service
    - id: policy
      name: 访问策略
      description: 管理访问策略
      category: service
  
  endpoints:
    - path: /api/access/permissions
      method: GET
      description: 获取权限
      capability: permission
    - path: /api/access/roles
      method: GET
      description: 获取角色
      capability: role
    - path: /api/access/policies
      method: POST
      description: 创建策略
      capability: policy
  
  config:
    optional:
      - name: DEFAULT_ROLE
        type: string
        default: "user"
        description: 默认角色
      - name: SUPER_ADMIN
        type: string
        default: "admin"
        description: 超级管理员角色
  
  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "10Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true
