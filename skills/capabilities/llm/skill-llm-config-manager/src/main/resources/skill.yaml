apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-llm-config-manager
  name: LLM配置管理器
  version: 2.3
  description: LLM配置管理服务 - 支持多级配置(企业/个人/场景)、加密存储、配置解析与优先级管理
  author: ooder Team
  type: system-service
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - llm
    - config
    - security
    - encryption
    - multi-tenant

spec:
  type: service-skill
  
  ownership: independent
  
  supportedSceneTypes:
    - llm-chat
    - knowledge-qa
    - onboarding-assistant
    - document-assistant
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 2s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 20
  
  dependencies: []
  
  providedInterfaces:
    - id: llm-config-management
      version: "1.0"
      description: "LLM配置管理接口"
    - id: config-resolution
      version: "1.0"
      description: "配置解析接口"
  
  capabilities:
    - id: multi-level-config
      name: 多级配置
      description: 支持SYSTEM/ENTERPRISE/PERSONAL/SCENE_GROUP/SCENE/SCENE_STEP六级配置
      category: config
    - id: config-resolution
      name: 配置解析
      description: 按优先级自动解析最终配置，支持配置继承与覆盖
      category: config
    - id: key-encryption
      name: 密钥加密
      description: API Key AES-256-GCM加密存储
      category: security
    - id: provider-management
      name: Provider管理
      description: 管理多个LLM Provider配置
      category: management
  
  endpoints:
    - path: /api/llm/config/enterprise
      method: GET
      description: 获取企业级配置
      capability: multi-level-config
    - path: /api/llm/config/enterprise
      method: PUT
      description: 设置企业级配置
      capability: multi-level-config
    - path: /api/llm/config/personal
      method: GET
      description: 获取个人配置
      capability: multi-level-config
    - path: /api/llm/config/personal
      method: PUT
      description: 设置个人配置
      capability: multi-level-config
    - path: /api/llm/config/scene/{sceneId}
      method: GET
      description: 获取场景配置
      capability: multi-level-config
    - path: /api/llm/config/scene/{sceneId}
      method: PUT
      description: 设置场景配置
      capability: multi-level-config
    - path: /api/llm/config/resolve
      method: POST
      description: 解析最终生效配置
      capability: config-resolution
    - path: /api/llm/config/providers
      method: GET
      description: 获取可用Provider列表
      capability: provider-management
    - path: /api/llm/config/models
      method: GET
      description: 获取可用模型列表
      capability: provider-management
  
  configLevels:
    - level: SYSTEM
      priority: 0
      description: 系统默认配置
    - level: ENTERPRISE
      priority: 20
      description: 企业级配置
    - level: PERSONAL
      priority: 40
      description: 个人配置
    - level: SCENE_GROUP
      priority: 60
      description: 场景组配置
    - level: SCENE
      priority: 80
      description: 场景配置
    - level: SCENE_STEP
      priority: 100
      description: 场景步骤配置
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    
  config:
    optional:
      - name: ENCRYPTION_ALGORITHM
        type: string
        default: "AES-256-GCM"
        description: 加密算法
      - name: DEFAULT_PROVIDER
        type: string
        default: "qianwen"
        description: 默认LLM提供商
      - name: CONFIG_CACHE_TTL
        type: integer
        default: 300
        description: 配置缓存时间(秒)
      - name: KEY_DERIVATION_ITERATIONS
        type: integer
        default: 65536
        description: 密钥派生迭代次数
  
  resources:
    cpu: "100m"
    memory: "128Mi"
    storage: "50Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true
