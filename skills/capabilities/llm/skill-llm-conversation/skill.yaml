apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-llm-conversation
  name: LLM对话服务
  version: 2.3
  description: LLM对话服务 - 提供智能对话、会话管理、历史记录、流式输出、Function Calling支持
  author: ooder Team
  type: llm-service
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - llm
    - conversation
    - chat
    - ai
    - streaming
    - function-calling

spec:
  type: service-skill
  
  ownership: independent
  
  capability:
    address: 0x2D
    category: LLM
    code: LLM_CONVERSATION
    operations: [chat, session-manage, history, streaming, function-calling]
  
  supportedSceneTypes:
    - llm-chat
    - knowledge-qa
    - onboarding-assistant
    - document-assistant
    - meeting-minutes
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 2s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 20
  
  dependencies:
    - id: skill-llm-context-builder
      version: ">=2.3"
      required: true
      description: "上下文构建服务"
    - id: skill-llm-config-manager
      version: ">=2.3"
      required: false
      description: "LLM配置管理服务（可选）"
  
  providedInterfaces:
    - id: llm-chat
      version: "1.0"
      description: "LLM对话接口"
    - id: conversation-history
      version: "1.0"
      description: "对话历史接口"
    - id: function-calling
      version: "1.0"
      description: "函数调用接口"
  
  capabilities:
    - id: llm-chat
      name: 智能对话
      description: 与LLM进行智能对话
      category: ai
    - id: session-manage
      name: 会话管理
      description: 管理对话会话
      category: service
    - id: history-record
      name: 历史记录
      description: 记录对话历史
      category: service
    - id: streaming
      name: 流式输出
      description: 支持SSE流式输出
      category: ai
    - id: function-calling
      name: 函数调用
      description: 支持LLM Function Calling
      category: ai
  
  endpoints:
    - path: /api/llm/chat
      method: POST
      description: 发送对话消息
      capability: llm-chat
    - path: /api/llm/chat/stream
      method: POST
      description: 流式对话
      capability: streaming
    - path: /api/llm/chat/function
      method: POST
      description: 带函数调用的对话
      capability: function-calling
    - path: /api/llm/sessions
      method: GET
      description: 获取会话列表
      capability: session-manage
    - path: /api/llm/sessions/{sessionId}
      method: DELETE
      description: 删除会话
      capability: session-manage
    - path: /api/llm/sessions/{sessionId}/history
      method: GET
      description: 获取对话历史
      capability: history-record
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
  
  config:
    optional:
      - name: MAX_HISTORY
        type: integer
        default: 100
        description: 最大历史记录数
      - name: SESSION_TIMEOUT
        type: integer
        default: 3600
        description: 会话超时时间（秒）
      - name: ENABLE_STREAMING
        type: boolean
        default: true
        description: 是否启用流式输出
      - name: MAX_TOKENS
        type: integer
        default: 4096
        description: 最大Token数
  
  resources:
    cpu: "200m"
    memory: "256Mi"
    storage: "100Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true

  knowledge:
    documents:
      - id: overview
        name: 功能概述
        path: README.md
        type: guide
        language: zh
        priority: high
        
      - id: quick-start
        name: 快速开始
        path: docs/quick-start.md
        type: guide
        language: zh
        priority: high
        
      - id: api-reference
        name: API参考
        path: docs/api-reference.md
        type: reference
        language: zh
        priority: medium
        
      - id: configuration
        name: 配置指南
        path: docs/configuration.md
        type: guide
        language: zh
        priority: medium
        
      - id: session-management
        name: 会话管理
        path: docs/session-management.md
        type: guide
        language: zh
        priority: medium
        
      - id: streaming
        name: 流式输出
        path: docs/streaming.md
        type: guide
        language: zh
        priority: medium
    
    ragConfig:
      enabled: true
      indexName: "skill-llm-conversation-knowledge"
      embeddingModel: text-embedding-3-small
      chunkSize: 1000
      chunkOverlap: 200
      searchStrategy: hybrid
      topK: 5
      threshold: 0.7
      rerankEnabled: false

  persona:
    enabled: true
    name: LLM对话服务助手
    description: 专业的LLM对话服务助手，帮助用户理解和使用对话功能
    expertise:
      - 智能对话
      - 会话管理
      - 流式输出
      - Function Calling
    boundaries:
      - 只回答对话服务相关的问题
      - 不处理具体的对话内容
      - 提供技术支持和使用指导
    tone: professional, technical, helpful
    examples:
      - question: "如何启用流式输出？"
        answer: "您可以通过设置ENABLE_STREAMING=true或在请求中使用stream参数启用流式输出。"
      - question: "会话超时如何配置？"
        answer: "通过SESSION_TIMEOUT参数配置，默认3600秒(1小时)。"
