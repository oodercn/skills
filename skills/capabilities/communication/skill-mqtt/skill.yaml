apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-mqtt
  name: MQTT Service
  version: 0.7.3
  description: MQTT服务技能 - 提供轻量级MQTT Broker能力和多提供商支持
  author: Ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills/tree/main/skills/skill-mqtt
  repository: https://gitee.com/ooderCN/skills.git
  keywords:
    - mqtt
    - broker
    - iot
    - messaging
    - lightweight

spec:
  type: service-skill
  
  ownership: independent
  
  capability:
    address: 0x48
    category: COMM
    code: COMM_MSG
    operations: [publish, subscribe, command]
  
  supportedSceneTypes:
    - iot-device
    - smart-home
    - industrial-monitor
    - recruitment
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 5s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 10
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.mqtt.MqttSkillApplication
  
  capabilities:
    - id: mqtt-broker
      name: MQTT Broker
      description: MQTT代理服务
      category: messaging
    - id: mqtt-publish
      name: MQTT Publish
      description: 消息发布
      category: messaging
    - id: mqtt-subscribe
      name: MQTT Subscribe
      description: 消息订阅
      category: messaging
    - id: mqtt-p2p
      name: MQTT P2P
      description: 点对点消息
      category: messaging
    - id: mqtt-topic
      name: MQTT Topic
      description: 主题管理
      category: messaging
    - id: mqtt-command
      name: MQTT Command
      description: 命令执行
      category: messaging
  
  scenes:
    - name: mqtt-messaging
      description: MQTT消息场景
      capabilities:
        - mqtt-broker
        - mqtt-publish
        - mqtt-subscribe
    - name: iot-device
      description: IoT设备场景
      capabilities:
        - mqtt-p2p
        - mqtt-topic
        - mqtt-command
  
  dependencies: []
  
  config:
    optional:
      - name: MQTT_PORT
        type: number
        default: 1883
        description: MQTT服务端口
      - name: MQTT_WS_PORT
        type: number
        default: 8083
        description: WebSocket端口
      - name: MQTT_MAX_CONNECTIONS
        type: number
        default: 10000
        description: 最大连接数
      - name: MQTT_ALLOW_ANONYMOUS
        type: boolean
        default: false
        description: 是否允许匿名连接
  
  endpoints:
    - path: /api/mqtt/publish
      method: POST
      description: 发布消息
      capability: mqtt-publish
    - path: /api/mqtt/subscribe
      method: POST
      description: 订阅主题
      capability: mqtt-subscribe
    - path: /api/mqtt/topics
      method: GET
      description: 获取主题列表
      capability: mqtt-topic
    - path: /api/mqtt/command
      method: POST
      description: 执行命令
      capability: mqtt-command
    - path: /api/health
      method: GET
      description: 健康检查
  
  resources:
    cpu: "200m"
    memory: "256Mi"
    storage: "100Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true
