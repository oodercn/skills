apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-notification
  name: 通知服务
  version: 1.0.0
  description: 通知服务 - 提供站内通知、消息推送、通知管理能力
  author: ooder Team
  type: provider-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - notification
    - message
    - push
    - alert

spec:
  skillForm: PROVIDER
  type: provider-skill
  
  ownership: independent
  
  capability:
    address: 0x51
    category: msg
    code: MSG_NOTIFICATION
    operations: [send, list, read, delete]
  
  providerType: service
  
  runtime:
    language: java
    javaVersion: "11"
    framework: spring-boot
  
  llmConfig:
    required: false
    defaultProvider: "deepseek"
    defaultModel: "deepseek-chat"
    capabilities:
      - chat
      - streaming
      - function-calling
    modelSelection:
      allowUserOverride: true
      availableProviders:
        - deepseek
        - openai
        - qianwen
        - volcengine
        - ollama
    functionCalling:
      enabled: true
      tools:
        - name: query_skill_capability
          description: "查询当前技能的能力和使用方法"
          parameters:
            type: object
            properties:
              capability:
                type: string
                description: "能力名称"
              detail:
                type: string
                enum: [brief, detailed, examples]
                default: "brief"
                description: "详情级别"
        - name: execute_mvel_action
          description: "通过MVEL表达式执行后台操作"
          parameters:
            type: object
            properties:
              expression:
                type: string
                description: "MVEL表达式"
              context:
                type: object
                description: "执行上下文"
        - name: generate_ui_form
          description: "生成UI表单供用户填写"
          parameters:
            type: object
            properties:
              formType:
                type: string
                description: "表单类型"
              fields:
                type: array
                items:
                  type: object
                description: "表单字段定义"
              defaults:
                type: object
                description: "默认值"
        - name: execute_batch_operation
          description: "执行批量操作"
          parameters:
            type: object
            properties:
              operation:
                type: string
                description: "操作类型"
              items:
                type: array
                items:
                  type: object
                description: "操作项列表"
        - name: convert_to_javascript
          description: "转换为JavaScript代码供用户使用"
          parameters:
            type: object
            properties:
              action:
                type: string
                description: "要执行的动作"
              parameters:
                type: object
                description: "动作参数"
      toolChoice: auto
    rateLimits:
      requestsPerMinute: 60
      tokensPerMinute: 100000
  
  supportedSceneTypes:
    - all
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 2s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 50
  
  dependencies:
    - skill-common
  
  providedInterfaces:
    - id: notification-service
      version: "1.0"
      description: "通知服务接口"
  
  capabilities:
    - id: send-notification
      name: 发送通知
      description: 发送站内通知
      category: service
    - id: list-notification
      name: 通知列表
      description: 获取通知列表
      category: service
    - id: mark-read
      name: 标记已读
      description: 标记通知为已读
      category: service
    - id: delete-notification
      name: 删除通知
      description: 删除通知
      category: service
  
  endpoints:
    - path: /api/notification/send
      method: POST
      description: 发送通知
      capability: send-notification
    - path: /api/notification/list
      method: GET
      description: 获取通知列表
      capability: list-notification
    - path: /api/notification/read/{notificationId}
      method: PUT
      description: 标记已读
      capability: mark-read
    - path: /api/notification/read-all
      method: PUT
      description: 全部标记已读
      capability: mark-read
    - path: /api/notification/unread-count
      method: GET
      description: 获取未读数量
      capability: list-notification
    - path: /api/notification/{notificationId}
      method: DELETE
      description: 删除通知
      capability: delete-notification
  
  config:
    optional:
      - name: MAX_NOTIFICATIONS
        type: integer
        default: 1000
        description: 最大通知数量
      - name: RETENTION_DAYS
        type: integer
        default: 30
        description: 通知保留天数
  
  resources:
    cpu: "50m"
    memory: "128Mi"
    storage: "100Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true
