apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-notify
  name: 通知服务
  version: 0.7.3
  category: msg
  description: 通知服务，支持多渠道通知推送
  author: ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - notify
    - notification
    - push
    - alert

spec:
  skillForm: PROVIDER
  
  ownership: independent
  
  capability:
    address: 0x53
    category: COMM
    code: COMM_NOTIFY
    operations: [push, broadcast, schedule]
  
  providerType: communication
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot

  llmConfig:
    required: false
    defaultProvider: "deepseek"
    defaultModel: "deepseek-chat"
    capabilities:
      - chat
      - streaming
      - function-calling
    modelSelection:
      allowUserOverride: true
      availableProviders:
        - deepseek
        - openai
        - qianwen
        - volcengine
        - ollama
    functionCalling:
      enabled: true
      tools:
        - name: query_skill_capability
          description: "查询当前技能的能力和使用方法"
          parameters:
            type: object
            properties:
              capability:
                type: string
                description: "能力名称"
              detail:
                type: string
                enum: [brief, detailed, examples]
                default: "brief"
        - name: execute_mvel_action
          description: "通过MVEL表达式执行后台操作"
          parameters:
            type: object
            properties:
              expression:
                type: string
                description: "MVEL表达式"
              context:
                type: object
        - name: generate_ui_form
          description: "生成UI表单供用户填写"
          parameters:
            type: object
            properties:
              formType:
                type: string
              fields:
                type: array
                items:
                  type: object
        - name: execute_batch_operation
          description: "执行批量操作"
          parameters:
            type: object
            properties:
              operation:
                type: string
              items:
                type: array
                items:
                  type: object
        - name: convert_to_javascript
          description: "转换为JavaScript代码供用户使用"
          parameters:
            type: object
            properties:
              action:
                type: string
              parameters:
                type: object
      toolChoice: auto
    rateLimits:
      requestsPerMinute: 60
      tokensPerMinute: 100000

  
  supportedSceneTypes:
    - notification
    - alert
    - workflow
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 2s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 30
  
  dependencies:
    - id: skill-msg
      version: ">=0.7.0"
      required: true
      description: "消息服务依赖"
  
  providedInterfaces:
    - id: notify-service
      version: "1.0"
      description: "通知服务接口"
  
  capabilities:
    - id: push
      name: 推送通知
      description: 推送通知到用户
      category: service
    - id: broadcast
      name: 广播通知
      description: 广播通知到所有用户
      category: service
    - id: schedule
      name: 定时通知
      description: 定时发送通知
      category: service
  
  endpoints:
    - path: /api/notify/push
      method: POST
      description: 推送通知
      capability: push
    - path: /api/notify/broadcast
      method: POST
      description: 广播通知
      capability: broadcast
    - path: /api/notify/schedule
      method: POST
      description: 定时通知
      capability: schedule
  
  config:
    optional:
      - name: CHANNELS
        type: string
        default: "email,sms,push"
        description: 支持的通知渠道
      - name: RETRY_COUNT
        type: integer
        default: 3
        description: 重试次数
      - name: RETRY_DELAY
        type: integer
        default: 60
        description: 重试延迟(秒)
  
  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "10Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: false

  knowledge:
    documents:
      - id: overview
        name: 功能概述
        path: README.md
        type: guide
        language: zh
        priority: high
    ragConfig:
      enabled: true
      indexName: "skill-notify-knowledge"
      embeddingModel: text-embedding-3-small
      chunkSize: 1000
      chunkOverlap: 200
      searchStrategy: hybrid
      topK: 5
      threshold: 0.7
