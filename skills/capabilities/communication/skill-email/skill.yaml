apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-email
  name: 邮件服务
  version: 0.7.3
  category: msg
  description: 邮件服务，支持邮件发送、接收、模板管理
  author: ooder Team
  type: provider-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - email
    - mail
    - notification
    - smtp

spec:
  skillForm: PROVIDER
  type: provider-skill
  
  ownership: independent
  
  capability:
    address: 0x52
    category: COMM
    code: COMM_EMAIL
    operations: [send, receive, template]
  
  providerType: communication
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot

  llmConfig:
    required: false
    defaultProvider: "deepseek"
    defaultModel: "deepseek-chat"
    capabilities:
      - chat
      - streaming
      - function-calling
    modelSelection:
      allowUserOverride: true
      availableProviders:
        - deepseek
        - openai
        - qianwen
        - volcengine
        - ollama
    functionCalling:
      enabled: true
      tools:
        - name: query_skill_capability
          description: "查询当前技能的能力和使用方法"
          parameters:
            type: object
            properties:
              capability:
                type: string
                description: "能力名称"
              detail:
                type: string
                enum: [brief, detailed, examples]
                default: "brief"
        - name: execute_mvel_action
          description: "通过MVEL表达式执行后台操作"
          parameters:
            type: object
            properties:
              expression:
                type: string
                description: "MVEL表达式"
              context:
                type: object
        - name: generate_ui_form
          description: "生成UI表单供用户填写"
          parameters:
            type: object
            properties:
              formType:
                type: string
              fields:
                type: array
                items:
                  type: object
        - name: execute_batch_operation
          description: "执行批量操作"
          parameters:
            type: object
            properties:
              operation:
                type: string
              items:
                type: array
                items:
                  type: object
        - name: convert_to_javascript
          description: "转换为JavaScript代码供用户使用"
          parameters:
            type: object
            properties:
              action:
                type: string
              parameters:
                type: object
      toolChoice: auto
    rateLimits:
      requestsPerMinute: 60
      tokensPerMinute: 100000

  
  supportedSceneTypes:
    - notification
    - marketing
    - workflow
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 2s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 20
  
  dependencies: []
  
  providedInterfaces:
    - id: email-service
      version: "1.0"
      description: "邮件服务接口"
  
  capabilities:
    - id: send
      name: 邮件发送
      description: 发送邮件
      category: service
    - id: receive
      name: 邮件接收
      description: 接收邮件
      category: service
    - id: template
      name: 模板管理
      description: 邮件模板管理
      category: service
  
  endpoints:
    - path: /api/email/send
      method: POST
      description: 发送邮件
      capability: send
    - path: /api/email/templates
      method: GET
      description: 获取模板列表
      capability: template
    - path: /api/email/templates
      method: POST
      description: 创建模板
      capability: template
  
  config:
    required:
      - name: SMTP_HOST
        type: string
        description: SMTP服务器地址
      - name: SMTP_PORT
        type: integer
        description: SMTP端口
      - name: SMTP_USERNAME
        type: string
        description: SMTP用户名
      - name: SMTP_PASSWORD
        type: string
        description: SMTP密码
    optional:
      - name: SMTP_AUTH
        type: boolean
        default: true
        description: 启用认证
      - name: SMTP_TLS
        type: boolean
        default: true
        description: 启用TLS
  
  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "10Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: false

  knowledge:
    documents:
      - id: overview
        name: 功能概述
        path: README.md
        type: guide
        language: zh
        priority: high
    ragConfig:
      enabled: true
      indexName: "skill-email-knowledge"
      embeddingModel: text-embedding-3-small
      chunkSize: 1000
      chunkOverlap: 200
      searchStrategy: hybrid
      topK: 5
      threshold: 0.7
