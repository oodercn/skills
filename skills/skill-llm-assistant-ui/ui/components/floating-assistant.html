<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM悬浮助手</title>
    
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <link rel="stylesheet" href="/console/css/components/llm-assistant.css">
    <link rel="stylesheet" href="/console/css/components/llm-floating.css">
</head>
<body>
    <div class="llm-floating-trigger" id="llm-trigger" onclick="FloatingAssistant.toggle()">
        <i class="ri-robot-line"></i>
        <span class="llm-trigger-badge" id="llm-badge" style="display: none;">1</span>
    </div>
    
    <div class="llm-floating-panel" id="llm-panel">
        <div class="llm-floating-header">
            <div class="llm-floating-title">
                <i class="ri-robot-line"></i>
                <span>智能助手</span>
            </div>
            <div class="llm-floating-actions">
                <button class="llm-floating-btn" onclick="FloatingAssistant.minimize()" title="最小化">
                    <i class="ri-subtract-line"></i>
                </button>
                <button class="llm-floating-btn" onclick="FloatingAssistant.toggle()" title="关闭">
                    <i class="ri-close-line"></i>
                </button>
            </div>
        </div>
        
        <div class="llm-floating-body" id="llm-body">
            <div class="llm-floating-messages" id="llm-messages">
                <div class="llm-welcome llm-welcome--compact">
                    <div class="llm-welcome__icon llm-welcome__icon--sm">
                        <i class="ri-robot-2-line"></i>
                    </div>
                    <h4>您好！我是智能助手</h4>
                    <p>有什么可以帮您的？</p>
                </div>
            </div>
            
            <div class="llm-floating-quick" id="llm-quick">
                <button class="llm-quick-btn llm-quick-btn--sm" onclick="FloatingAssistant.sendQuick('分析当前页面')">
                    <i class="ri-bar-chart-line"></i>
                </button>
                <button class="llm-quick-btn llm-quick-btn--sm" onclick="FloatingAssistant.sendQuick('配置建议')">
                    <i class="ri-settings-4-line"></i>
                </button>
                <button class="llm-quick-btn llm-quick-btn--sm" onclick="FloatingAssistant.sendQuick('使用帮助')">
                    <i class="ri-question-line"></i>
                </button>
            </div>
        </div>
        
        <div class="llm-floating-footer">
            <div class="llm-floating-input">
                <input type="text" 
                    id="llm-input" 
                    placeholder="输入问题..." 
                    onkeydown="FloatingAssistant.handleKeydown(event)"
                >
                <button class="llm-floating-send" onclick="FloatingAssistant.send()" id="llm-send">
                    <i class="ri-send-plane-line"></i>
                </button>
            </div>
            <div class="llm-floating-context" id="llm-context-status">
                <i class="ri-context-line"></i>
                <span>已获取上下文</span>
            </div>
        </div>
    </div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/api.js"></script>
    <script src="/console/js/components/context-collector.js"></script>
    <script src="/console/js/components/floating-assistant.js"></script>
    <script src="/console/js/pages/floating-assistant-init.js"></script>
</body>
</html>
