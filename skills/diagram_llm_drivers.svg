<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800px" height="400px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; fill: #334155; }
        .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<!-- Title -->
<rect class="title-box" x="20" y="15" width="760" height="40" rx="4"/>
<text class="text-header" x="400" y="42" text-anchor="middle">LLM 驱动矩阵 (8个)</text>

<!-- LLM Providers -->
<rect class="box-highlight" x="30" y="75" width="175" height="80"/>
<text class="text-title" x="117" y="100" text-anchor="middle">DeepSeek</text>
<text class="text" x="45" y="125">国产领先</text>
<text class="text" x="45" y="145">性价比高</text>

<rect class="box" x="220" y="75" width="175" height="80"/>
<text class="text-title" x="307" y="100" text-anchor="middle">OpenAI</text>
<text class="text" x="235" y="125">GPT系列</text>
<text class="text" x="235" y="145">国际标准</text>

<rect class="box-alt" x="410" y="75" width="175" height="80"/>
<text class="text-title" x="497" y="100" text-anchor="middle">通义千问</text>
<text class="text" x="425" y="125">阿里云</text>
<text class="text" x="425" y="145">中文优化</text>

<rect class="box" x="600" y="75" width="170" height="80"/>
<text class="text-title" x="685" y="100" text-anchor="middle">文心一言</text>
<text class="text" x="615" y="125">百度</text>
<text class="text" x="615" y="145">企业级</text>

<rect class="box-alt" x="30" y="175" width="175" height="80"/>
<text class="text-title" x="117" y="200" text-anchor="middle">火山引擎</text>
<text class="text" x="45" y="225">豆包系列</text>
<text class="text" x="45" y="245">字节跳动</text>

<rect class="box" x="220" y="175" width="175" height="80"/>
<text class="text-title" x="307" y="200" text-anchor="middle">Ollama</text>
<text class="text" x="235" y="225">本地部署</text>
<text class="text" x="235" y="245">私有化</text>

<rect class="box-alt" x="410" y="175" width="175" height="80"/>
<text class="text-title" x="497" y="200" text-anchor="middle">LLM Base</text>
<text class="text" x="425" y="225">基础抽象层</text>
<text class="text" x="425" y="245">统一接口</text>

<rect class="box" x="600" y="175" width="170" height="80"/>
<text class="text-title" x="685" y="200" text-anchor="middle">LLM Monitor</text>
<text class="text" x="615" y="225">监控服务</text>
<text class="text" x="615" y="245">指标采集</text>

<!-- Unified Interface -->
<rect class="box-highlight" x="30" y="280" width="740" height="100"/>
<text class="text-title" x="400" y="305" text-anchor="middle">统一 LLM Provider 接口</text>
<text class="text" x="50" y="335">chat(messages) → String</text>
<text class="text" x="250" y="335">stream(messages) → Flux&lt;String&gt;</text>
<text class="text" x="480" y="335">embed(text) → float[]</text>
<text class="text" x="50" y="365">functionCalling(prompt, functions) → FunctionResult</text>
<text class="text" x="350" y="365">tokenCount(text) → int</text>

</svg>
