<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>存储管理 - Nexus Console</title>

    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold" style="display: flex; align-items: center; gap: 8px;">
                    <i class="ri-server-line"></i> Nexus Console
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>

        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle>
                        <i class="ri-menu-line"></i>
                    </button>
                    <h2 class="nx-text-lg nx-font-semibold">存储管理</h2>
                </div>
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle>
                        <i class="ri-sun-line"></i>
                    </button>
                    <button class="nx-btn nx-btn--secondary" onclick="cleanupStorage()">
                        <i class="ri-delete-bin-line"></i> 清理缓存
                    </button>
                    <button class="nx-btn nx-btn--primary" onclick="refreshStorage()">
                        <i class="ri-refresh-line"></i> 刷新
                    </button>
                </div>
            </header>

            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="nx-grid nx-grid-cols-3 nx-mb-6">
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--primary">
                                <i class="ri-database-2-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">总空间</div>
                                <div class="nx-stat-card__value" id="total-space">0 GB</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--warning">
                                <i class="ri-hard-drive-2-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">已用空间</div>
                                <div class="nx-stat-card__value" id="used-space">0 GB</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--success">
                                <i class="ri-cloud-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">可用空间</div>
                                <div class="nx-stat-card__value" id="free-space">0 GB</div>
                            </div>
                        </div>
                    </div>

                    <div class="nx-card nx-mb-6">
                        <div class="nx-card__header">
                            <h3 class="nx-card__title">文件浏览器</h3>
                            <div class="nx-flex nx-gap-2">
                                <button class="nx-btn nx-btn--primary nx-btn--sm" onclick="showUploadModal()">
                                    <i class="ri-upload-line"></i> 上传文件
                                </button>
                                <button class="nx-btn nx-btn--secondary nx-btn--sm" onclick="showCreateFolderModal()">
                                    <i class="ri-folder-add-line"></i> 新建文件夹
                                </button>
                            </div>
                        </div>
                        <div class="nx-card__body">
                            <div id="file-browser-content">
                                <div class="nx-text-center nx-py-8 nx-text-secondary">加载中...</div>
                            </div>
                        </div>
                    </div>

                    <div class="nx-card nx-mb-6">
                        <div class="nx-card__header">
                            <h3 class="nx-card__title">我的分享</h3>
                        </div>
                        <div class="nx-card__body">
                            <div id="shared-files-list">
                                <div class="nx-text-center nx-py-8 nx-text-secondary">加载中...</div>
                            </div>
                        </div>
                    </div>

                    <div class="nx-card">
                        <div class="nx-card__header">
                            <h3 class="nx-card__title">收到的分享</h3>
                        </div>
                        <div class="nx-card__body">
                            <div id="received-files-list">
                                <div class="nx-text-center nx-py-8 nx-text-secondary">加载中...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="nx-modal" id="upload-modal">
        <div class="nx-modal__content">
            <div class="nx-modal__header">
                <h3 class="nx-modal__title">上传文件</h3>
                <button class="nx-btn nx-btn--ghost nx-btn--icon" onclick="closeModal('upload-modal')">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="nx-modal__body">
                <form id="upload-form">
                    <div class="nx-form-group">
                        <label class="nx-form-label">选择文件夹</label>
                        <select id="upload-folder" name="folderId" class="nx-form-select">
                            <option value="">根目录</option>
                        </select>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">文件</label>
                        <input type="file" id="upload-file" name="file" class="nx-form-input" required>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">描述</label>
                        <input type="text" id="upload-description" name="description" class="nx-form-input" placeholder="文件描述">
                    </div>
                </form>
            </div>
            <div class="nx-modal__footer">
                <button class="nx-btn nx-btn--secondary" onclick="closeModal('upload-modal')">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="uploadFile()">上传</button>
            </div>
        </div>
    </div>

    <div class="nx-modal" id="create-folder-modal">
        <div class="nx-modal__content">
            <div class="nx-modal__header">
                <h3 class="nx-modal__title">新建文件夹</h3>
                <button class="nx-btn nx-btn--ghost nx-btn--icon" onclick="closeModal('create-folder-modal')">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="nx-modal__body">
                <form id="create-folder-form">
                    <div class="nx-form-group">
                        <label class="nx-form-label">父文件夹</label>
                        <select id="parent-folder" name="parentFolderId" class="nx-form-select">
                            <option value="">根目录</option>
                        </select>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">文件夹名称</label>
                        <input type="text" id="folder-name" name="folderName" class="nx-form-input" required>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">描述</label>
                        <textarea id="folder-description" name="description" class="nx-form-textarea" placeholder="文件夹描述"></textarea>
                    </div>
                </form>
            </div>
            <div class="nx-modal__footer">
                <button class="nx-btn nx-btn--secondary" onclick="closeModal('create-folder-modal')">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="saveFolder()">保存</button>
            </div>
        </div>
    </div>

    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/nexus-menu.js"></script>
    <script src="/console/common/button-manager.js"></script>
    <script src="/console/common/modal-manager.js"></script>
    <script src="/console/js/storage-api.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/storage-management.js"></script>
</body>
</html>
