apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-org-wecom
  name: WeCom Organization Service
  version: 2.3.1
  category: org
  description: 企业微信组织数据集成服务，包括组织架构同步、用户认证、扫码登录
  author: Ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills/tree/main/skills/_drivers/org/skill-org-wecom
  repository: https://gitee.com/ooderCN/skills.git
  keywords:
    - wecom
    - enterprise-wechat
    - organization
    - authentication
    - qrcode-auth

spec:
  skillForm: DRIVER
  type: enterprise-skill
  
  ownership: platform
  
  capability:
    category: ORG
    code: ORG_WECOM
    operations: [auth, org-sync, user-query, qrcode-login]
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.org.wecom.WeComOrgApplication

  llmConfig:
    required: false
    defaultProvider: "deepseek"
    defaultModel: "deepseek-chat"
    capabilities:
      - chat
      - streaming
      - function-calling
    modelSelection:
      allowUserOverride: true
      availableProviders:
        - deepseek
        - openai
        - qianwen
        - volcengine
        - ollama
    functionCalling:
      enabled: true
      tools:
        - name: query_skill_capability
          description: "查询当前技能的能力和使用方法"
          parameters:
            type: object
            properties:
              capability:
                type: string
                description: "能力名称"
              detail:
                type: string
                enum: [brief, detailed, examples]
                default: "brief"
        - name: sync_organization
          description: "从企业微信同步组织架构"
          parameters:
            type: object
            properties:
              syncType:
                type: string
                enum: [full, users, departments]
                default: "full"
        - name: search_user
          description: "搜索企业微信用户"
          parameters:
            type: object
            properties:
              keyword:
                type: string
                description: "搜索关键词（姓名/邮箱/手机号）"
              departmentId:
                type: string
                description: "部门ID（可选）"
  
  capabilities:
    - id: org-data-read
      name: Org Data Read
      description: 组织数据读取
      category: organization
    - id: user-auth
      name: User Authentication
      description: 用户认证
      category: authentication
    - id: qrcode-login
      name: QR Code Login
      description: 扫码登录
      category: authentication
    - id: org-sync
      name: Organization Sync
      description: 组织架构同步
      category: organization
    - id: user-search
      name: User Search
      description: 用户搜索
      category: organization
  
  scenes:
    - name: auth
      description: 认证场景
      capabilities:
        - user-auth
        - qrcode-login
    - name: org-sync
      description: 组织同步场景
      capabilities:
        - org-data-read
        - org-sync

  dependencies:
    - id: skill-org-base
      version: ">=2.3.0"
      required: true
      description: "组织基础服务"
    - id: skill-user-auth
      version: ">=2.3.0"
      required: false
      description: "用户认证服务(间接)"
    - id: skill-common
      version: ">=2.3.0"
      required: false
      description: "通用工具库(间接)"
  
  config:
    required:
      - name: WECOM_CORP_ID
        type: string
        description: 企业微信CorpId
      - name: WECOM_AGENT_ID
        type: string
        description: 企业微信AgentId
      - name: WECOM_SECRET
        type: string
        secret: true
        description: 企业微信Secret
    optional:
      - name: WECOM_API_BASE_URL
        type: string
        default: https://qyapi.weixin.qq.com
        description: 企业微信API基础URL
      - name: WECOM_AUTH_REDIRECT_URI
        type: string
        default: http://localhost:8084/api/v1/org/wecom/auth/callback
        description: 扫码登录回调地址
  
  endpoints:
    - path: /api/v1/org/wecom/auth/qrcode
      method: POST
      description: 生成扫码登录二维码
      capability: qrcode-login
    - path: /api/v1/org/wecom/auth/callback
      method: GET
      description: 扫码登录回调
      capability: qrcode-login
    - path: /api/v1/org/wecom/sync/all
      method: POST
      description: 全量同步组织架构
      capability: org-sync
    - path: /api/v1/org/wecom/sync/users
      method: POST
      description: 同步用户
      capability: org-sync
    - path: /api/v1/org/wecom/sync/departments
      method: POST
      description: 同步部门
      capability: org-sync
    - path: /api/v1/org/wecom/users
      method: GET
      description: 获取用户列表
      capability: org-data-read
    - path: /api/v1/org/wecom/departments
      method: GET
      description: 获取部门列表
      capability: org-data-read
    - path: /api/v1/org/wecom/tree
      method: GET
      description: 获取组织树
      capability: org-data-read
