apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-org-dingding
  name: DingTalk Organization
  version: 0.7.3
  description: 钉钉组织数据集成服务，包括组织架构同步和用户认证
  author: Ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills/tree/main/skills/skill-org-dingding
  repository: https://gitee.com/ooderCN/skills.git
  keywords:
    - dingding
    - dingtalk
    - organization
    - enterprise
    - authentication

spec:
  skillForm: PROVIDER
  type: enterprise-skill
  
  ownership: platform
  
  capability:
    address: 0x09
    category: ORG
    code: ORG_DINGDING
    operations: [auth, org-sync, user-query]
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.org.dingding.DingTalkOrgSkillApplication

  llmConfig:
    required: false
    defaultProvider: "deepseek"
    defaultModel: "deepseek-chat"
    capabilities:
      - chat
      - streaming
      - function-calling
    modelSelection:
      allowUserOverride: true
      availableProviders:
        - deepseek
        - openai
        - qianwen
        - volcengine
        - ollama
    functionCalling:
      enabled: true
      tools:
        - name: query_skill_capability
          description: "查询当前技能的能力和使用方法"
          parameters:
            type: object
            properties:
              capability:
                type: string
                description: "能力名称"
              detail:
                type: string
                enum: [brief, detailed, examples]
                default: "brief"
        - name: execute_mvel_action
          description: "通过MVEL表达式执行后台操作"
          parameters:
            type: object
            properties:
              expression:
                type: string
                description: "MVEL表达式"
              context:
                type: object
        - name: generate_ui_form
          description: "生成UI表单供用户填写"
          parameters:
            type: object
            properties:
              formType:
                type: string
              fields:
                type: array
                items:
                  type: object
        - name: execute_batch_operation
          description: "执行批量操作"
          parameters:
            type: object
            properties:
              operation:
                type: string
              items:
                type: array
                items:
                  type: object
        - name: convert_to_javascript
          description: "转换为JavaScript代码供用户使用"
          parameters:
            type: object
            properties:
              action:
                type: string
              parameters:
                type: object
      toolChoice: auto
    rateLimits:
      requestsPerMinute: 60
      tokensPerMinute: 100000

  
  capabilities:
    - id: org-data-read
      name: Org Data Read
      description: 组织数据读取
      category: organization
    - id: user-auth
      name: User Authentication
      description: 用户认证
      category: authentication
  
  scenes:
    - name: auth
      description: 认证场景
      capabilities:
        - org-data-read
        - user-auth
  
  dependencies:
    - id: skill-org-base
      version: ">=1.0.0"
      required: true
      description: "组织基础服务"
    - id: skill-user-auth
      version: ">=0.7.0"
      required: false
      description: "用户认证服务(间接)"
    - id: skill-common
      version: ">=1.0.0"
      required: false
      description: "通用工具库(间接)"
  
  config:
    required:
      - name: DINGTALK_APP_KEY
        type: string
        description: 钉钉应用Key
      - name: DINGTALK_APP_SECRET
        type: string
        secret: true
        description: 钉钉应用Secret
    optional:
      - name: DINGTALK_API_BASE_URL
        type: string
        default: https://oapi.dingtalk.com
        description: 钉钉API基础URL
  
  endpoints:
    - path: /api/org/departments
      method: GET
      description: 获取部门列表
      capability: org-data-read
    - path: /api/org/users
      method: GET
      description: 获取用户列表
      capability: org-data-read
    - path: /api/auth/login
      method: POST
      description: 用户登录
      capability: user-auth
    - path: /api/health
      method: GET
      description: 健康检查
  
  resources:
    cpu: "200m"
    memory: "512Mi"
    storage: "100Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true

  knowledge:
    documents:
      - id: overview
        name: 功能概述
        path: README.md
        type: guide
        language: zh
        priority: high
    ragConfig:
      enabled: true
      indexName: "skill-org-dingding-knowledge"
      embeddingModel: text-embedding-3-small
      chunkSize: 1000
      chunkOverlap: 200
      searchStrategy: hybrid
      topK: 5
      threshold: 0.7
