apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-llm-volcengine
  name: 火山引擎 LLM Provider
  version: 2.3
  description: 火山引擎(Volcengine) LLM Provider - 支持豆包系列模型，提供对话、补全、嵌入能力
  author: ooder Team
  type: provider-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - llm
    - volcengine
    - doubao
    - bytedance
    - embedding

spec:
  type: provider-skill
  
  ownership: independent
  
  capability:
    address: 0x2C
    category: LLM
    code: LLM_VOLCENGINE
    operations: [chat, completion, embedding, streaming, function-calling]
  
  providerType: llm
  
  supportedSceneTypes:
    - llm-chat
    - knowledge-qa
    - document-assistant
    - onboarding-assistant
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: false
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 20
  
  dependencies:
    - id: llm-sdk
      version: ">=2.3"
      required: true
      description: "LLM SDK"
  
  providedInterfaces:
    - id: llm-provider
      version: "1.0"
      description: "LLM Provider接口"
  
  supportedModels:
    - id: doubao-pro-32k
      name: 豆包Pro 32K
      type: chat
      maxTokens: 32768
      supportsFunctionCalling: true
      supportsStreaming: true
    - id: doubao-pro-128k
      name: 豆包Pro 128K
      type: chat
      maxTokens: 131072
      supportsFunctionCalling: true
      supportsStreaming: true
    - id: doubao-lite-32k
      name: 豆包Lite 32K
      type: chat
      maxTokens: 32768
      supportsFunctionCalling: true
      supportsStreaming: true
  
  capabilities:
    - id: chat-completion
      name: 对话补全
      description: 支持多轮对话补全
      category: ai
    - id: text-completion
      name: 文本补全
      description: 文本生成补全
      category: ai
    - id: embedding
      name: 向量嵌入
      description: 文本向量嵌入
      category: ai
    - id: function-calling
      name: 函数调用
      description: 支持Function Calling
      category: ai
    - id: streaming
      name: 流式输出
      description: 支持SSE流式输出
      category: ai
  
  endpoints:
    - path: /api/llm/chat
      method: POST
      description: 对话补全
      capability: chat-completion
    - path: /api/llm/chat/stream
      method: POST
      description: 流式对话
      capability: streaming
    - path: /api/llm/embed
      method: POST
      description: 向量嵌入
      capability: embedding
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    
  config:
    required:
      - name: VOLCENGINE_API_KEY
        type: string
        description: 火山引擎 API Key
        secret: true
      - name: VOLCENGINE_ENDPOINT_ID
        type: string
        description: 火山引擎推理接入点ID
    optional:
      - name: VOLCENGINE_BASE_URL
        type: string
        default: "https://ark.cn-beijing.volces.com/api/v3"
        description: API基础URL
      - name: DEFAULT_MODEL
        type: string
        default: "doubao-pro-32k"
        description: 默认模型
      - name: TIMEOUT
        type: integer
        default: 60000
        description: 请求超时(毫秒)
      - name: MAX_RETRIES
        type: integer
        default: 3
        description: 最大重试次数
  
  resources:
    cpu: "50m"
    memory: "128Mi"
    storage: "10Mi"
  
  offline:
    enabled: false

  knowledge:
    documents:
      - id: overview
        name: 功能概述
        path: README.md
        type: guide
        language: zh
        priority: high
    ragConfig:
      enabled: true
      indexName: "skill-llm-volcengine-knowledge"
      embeddingModel: text-embedding-3-small
      chunkSize: 1000
      chunkOverlap: 200
      searchStrategy: hybrid
      topK: 5
      threshold: 0.7
