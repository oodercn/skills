apiVersion: skill.ooder.net/v1
kind: SkillPackage

metadata:
  id: skill-llm-ollama
  name: Ollama LLM Provider
  version: "3.0.1"
  category: llm
  subCategory: provider
  description: Ollama本地LLM Provider，支持运行本地开源大模型
  author: Ooder Team
  icon: ri-robot-line

spec:
  skillForm: PROVIDER
  
  capabilities:
    - id: chat-completion
      name: 对话补全
      description: 本地模型对话补全
      category: ai
      autoBind: true
    - id: embedding
      name: 文本嵌入
      description: 本地Embedding模型
      category: ai
      autoBind: false
      
  dependencies: []
      
  configSchema:
    type: object
    properties:
      baseUrl:
        type: string
        default: "http://localhost:11434"
        title: Ollama服务地址
      model:
        type: string
        default: "llama3"
        title: 默认模型
        
  estimatedResources:
    cpu: "500m"
    memory: "1Gi"
