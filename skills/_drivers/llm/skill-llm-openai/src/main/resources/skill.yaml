apiVersion: skill.ooder.net/v1
kind: SkillPackage

metadata:
  id: skill-llm-openai
  name: OpenAI LLM Provider
  version: "2.3.1"
  category: llm
  subCategory: provider
  description: OpenAI LLM Provider，支持GPT-4、GPT-4o、GPT-3.5-turbo等模型
  author: Ooder Team
  icon: ri-robot-line

spec:
  skillForm: PROVIDER
  
  capabilities:
    - id: chat-completion
      name: 对话补全
      description: GPT模型对话补全
      category: ai
      autoBind: true
    - id: embedding
      name: 文本嵌入
      description: Text Embedding模型
      category: ai
      autoBind: false
    - id: function-calling
      name: 函数调用
      description: 支持Function Calling
      category: ai
      autoBind: false
    - id: streaming
      name: 流式输出
      description: 支持SSE流式输出
      category: ai
      autoBind: false
      
  dependencies:
    - skillId: llm-sdk
      version: ">=2.3.1"
      required: true
      
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        title: API Key
        required: true
        secret: true
      baseUrl:
        type: string
        default: "https://api.openai.com/v1"
        title: API基础URL
      model:
        type: string
        default: "gpt-4o"
        title: 默认模型
        
  estimatedResources:
    cpu: "50m"
    memory: "128Mi"
