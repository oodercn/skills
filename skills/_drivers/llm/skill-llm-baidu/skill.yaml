apiVersion: skill.ooder.net/v1
kind: SkillPackage

metadata:
  id: skill-llm-baidu
  name: 百度千帆LLM Provider
  version: "3.0.1"
  description: 百度千帆大模型Provider，提供ERNIE系列模型对话、嵌入能力
  author: Ooder Team
  icon: ri-robot-line

spec:
  skillForm: PROVIDER
  skillCategory: LLM
  sceneType: AUTO
  purposes:
    - AI_INTEGRATION
    - TEAM
  
  capability:
    category: llm
  
  capabilities:
    - id: llm-chat
      name: 智能对话
      description: 调用百度千帆ERNIE模型进行对话
      category: ai
      autoBind: true
      
    - id: llm-embed
      name: 文本嵌入
      description: 调用百度千帆Embedding模型生成向量
      category: ai
      autoBind: true
      
    - id: llm-complete
      name: 文本补全
      description: 调用百度千帆模型进行文本补全
      category: ai
      autoBind: false
      
  dependencies: []
  
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        title: API Key
        required: true
        secret: true
      baseUrl:
        type: string
        default: "https://qianfan.baidubce.com/v2"
        title: API基础URL
      model:
        type: string
        default: "ernie-4.0-8k"
        title: 默认模型
      embeddingModel:
        type: string
        default: "embedding-v1"
        title: 嵌入模型
      maxTokens:
        type: integer
        default: 4096
        title: 最大Token数
      temperature:
        type: number
        default: 0.7
        title: 温度参数
      timeout:
        type: integer
        default: 60000
        title: 超时时间(ms)
        
  endpoints:
    - path: /api/llm/baidu/chat
      method: POST
      description: 发送对话消息
      capability: llm-chat
    - path: /api/llm/baidu/embed
      method: POST
      description: 生成文本嵌入向量
      capability: llm-embed
    - path: /api/llm/baidu/complete
      method: POST
      description: 文本补全
      capability: llm-complete
    - path: /api/llm/baidu/models
      method: GET
      description: 获取可用模型列表
      capability: llm-chat
    - path: /api/llm/baidu/health
      method: GET
      description: 健康检查
      capability: llm-chat
      
  healthCheck:
    enabled: true
    endpoint: /api/llm/baidu/health
    interval: 30s
    timeout: 5s
    
  estimatedResources:
    cpu: "50m"
    memory: "128Mi"
