apiVersion: skill.ooder.net/v1
kind: SkillPackage

metadata:
  id: skill-llm-deepseek
  name: DeepSeek LLM Provider
  version: "3.0.1"
  description: DeepSeek LLM Provider，支持deepseek-chat、deepseek-coder、deepseek-reasoner等模型
  author: Ooder Team
  icon: ri-robot-line

spec:
  skillForm: PROVIDER
  skillCategory: LLM
  sceneType: AUTO
  purposes:
    - AI_INTEGRATION
    - TEAM
  
  capability:
    category: llm
  
  capabilities:
    - id: chat-completion
      name: 对话补全
      description: 支持多轮对话补全
      category: ai
      autoBind: true
    - id: code-generation
      name: 代码生成
      description: 代码生成与补全
      category: ai
      autoBind: true
    - id: reasoning
      name: 推理能力
      description: 复杂推理任务
      category: ai
      autoBind: false
    - id: function-calling
      name: 函数调用
      description: 支持Function Calling
      category: ai
      autoBind: false
    - id: streaming
      name: 流式输出
      description: 支持SSE流式输出
      category: ai
      autoBind: false
      
  dependencies:
    - skillId: llm-sdk
      version: ">=3.0.1"
      required: true
      
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        title: API Key
        required: true
        secret: true
      baseUrl:
        type: string
        default: "https://api.deepseek.com/v1"
        title: API基础URL
      model:
        type: string
        default: "deepseek-chat"
        title: 默认模型
      maxTokens:
        type: integer
        default: 64000
        title: 最大Token数
      temperature:
        type: number
        default: 0.7
        title: 温度参数
        
  estimatedResources:
    cpu: "50m"
    memory: "128Mi"
