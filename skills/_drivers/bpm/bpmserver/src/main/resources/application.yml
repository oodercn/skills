spring:
  application:
    name: bpmserver
  
  datasource:
    url: jdbc:sqlite:${user.home}/.ooder/bpm/bpm.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

server:
  port: 9004
  servlet:
    context-path: /bpm

logging:
  level:
    net.ooder.bpm: DEBUG
    org.springframework.jdbc: DEBUG

bpm:
  database:
    init-mode: never

ooder:
  jds:
    home: ${user.home}/.ooder/bpm
    config-name: bpmserver
    
  server:
    port: 8083
    url: http://127.0.0.1:8083/bpm
    admin:
      enabled: false
      
  cluster:
    enabled: false
    
  session:
    enabled: false
    
  cache:
    enabled: false
    
  user:
    server-url: http://127.0.0.1:8083/bpm
    system-code: bpm
    offline: true
