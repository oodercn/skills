<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 580" width="700px" height="580px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="title-box" x="20" y="15" width="660" height="35" rx="4"/>
<text class="text-header" x="350" y="38" text-anchor="middle">流程自动生成流程</text>

<rect class="box-highlight" x="30" y="70" width="640" height="60" rx="6"/>
<text class="text-title" x="50" y="95">1. 场景模板加载</text>
<text class="text" x="50" y="115">获取场景模板详情 | 解析工作流定义 | 提取能力列表</text>

<line class="arrow" x1="350" y1="130" x2="350" y2="160"/>

<rect class="box" x="30" y="160" width="640" height="60" rx="6"/>
<text class="text-title" x="50" y="185">2. 活动节点生成</text>
<text class="text" x="50" y="205">根据工作流步骤创建活动 | 设置活动类型和属性 | 绑定能力实现</text>

<line class="arrow" x1="350" y1="220" x2="350" y2="250"/>

<rect class="box" x="30" y="250" width="640" height="60" rx="6"/>
<text class="text-title" x="50" y="275">3. 路由连接构建</text>
<text class="text" x="50" y="295">根据工作流类型创建路由 | 设置流转条件 | 配置网关节点</text>

<line class="arrow" x1="350" y1="310" x2="350" y2="340"/>

<rect class="box-alt" x="30" y="340" width="640" height="60" rx="6"/>
<text class="text-title" x="50" y="365">4. 属性智能配置</text>
<text class="text" x="50" y="385">办理人推导 | 表单匹配 | 时限设置</text>

<line class="arrow" x1="350" y1="400" x2="350" y2="430"/>

<rect class="box-highlight" x="30" y="430" width="640" height="60" rx="6"/>
<text class="text-title" x="50" y="455">5. 流程验证与优化</text>
<text class="text" x="50" y="475">结构完整性检查 | 属性完整性检查 | 最佳实践建议</text>

</svg>
