<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 490" width="700px" height="490px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="title-box" x="20" y="15" width="660" height="35" rx="4"/>
<text class="text-header" x="350" y="38" text-anchor="middle">双模式架构</text>

<rect class="box-highlight" x="30" y="70" width="640" height="60" rx="6"/>
<text class="text-title" x="350" y="100" text-anchor="middle">场景匹配请求入口</text>

<line class="arrow" x1="350" y1="130" x2="350" y2="160"/>

<rect class="box" x="250" y="160" width="200" height="50" rx="6"/>
<text class="text" x="350" y="190" text-anchor="middle">LLM服务可用？</text>

<line class="arrow" x1="250" y1="185" x2="180" y2="185"/>
<text class="text" x="215" y="180" text-anchor="middle">是</text>

<line class="arrow" x1="450" y1="185" x2="520" y2="185"/>
<text class="text" x="485" y="180" text-anchor="middle">否</text>

<rect class="box-alt" x="30" y="240" width="300" height="80" rx="6"/>
<text class="text-title" x="180" y="270" text-anchor="middle">LLM匹配模式</text>
<text class="text-small" x="180" y="300" text-anchor="middle">语义理解 + 智能推理</text>

<rect class="box-alt" x="370" y="240" width="300" height="80" rx="6"/>
<text class="text-title" x="520" y="270" text-anchor="middle">规则匹配模式</text>
<text class="text-small" x="520" y="300" text-anchor="middle">关键词匹配 + 规则推导</text>

<line class="arrow" x1="180" y1="320" x2="180" y2="350"/>
<line class="arrow" x1="520" y1="320" x2="520" y2="350"/>
<line class="arrow" x1="180" y1="350" x2="350" y2="350"/>
<line class="arrow" x1="520" y1="350" x2="350" y2="350"/>

<rect class="box" x="250" y="350" width="200" height="50" rx="6"/>
<text class="text" x="350" y="380" text-anchor="middle">结果缓存</text>

<line class="arrow" x1="350" y1="400" x2="350" y2="430"/>

<rect class="box-highlight" x="250" y="430" width="200" height="50" rx="6"/>
<text class="text" x="350" y="460" text-anchor="middle">返回结果</text>

</svg>
