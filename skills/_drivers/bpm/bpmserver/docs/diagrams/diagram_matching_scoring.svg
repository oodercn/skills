<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800px" height="340px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
<text class="text-header" x="400" y="38" text-anchor="middle">场景匹配评分模型</text>

<rect class="box" x="30" y="70" width="740" height="70"/>
<text class="text-title" x="50" y="95">维度1: 语义相似度 (Semantic Similarity)</text>
<text class="text" x="50" y="115">活动描述与场景模板描述的语义匹配程度 | 权重: 40% | 计算方法: Word2Vec + Cosine Similarity</text>

<rect class="box-alt" x="30" y="150" width="740" height="70"/>
<text class="text-title" x="50" y="175">维度2: 能力匹配度 (Capability Match)</text>
<text class="text" x="50" y="195">活动所需能力与场景模板能力的匹配程度 | 权重: 35% | 计算方法: 能力集合交集 / 能力集合并集</text>

<rect class="box-highlight" x="30" y="230" width="740" height="70"/>
<text class="text-title" x="50" y="255">维度3: 参与者匹配度 (Participant Match)</text>
<text class="text" x="50" y="275">活动执行者与场景模板参与者的匹配程度 | 权重: 25% | 计算方法: 角色匹配度 + 组织匹配度</text>

</svg>
