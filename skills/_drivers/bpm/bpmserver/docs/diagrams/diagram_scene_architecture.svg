<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 510" width="800px" height="510px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
<text class="text-header" x="400" y="38" text-anchor="middle">场景驱动的三层架构</text>

<rect class="box-alt" x="30" y="70" width="740" height="120"/>
<text class="text-title" x="50" y="95">场景描述层 (Scene Description)</text>
<rect class="box" x="50" y="110" width="200" height="60" rx="6"/>
<text class="text" x="150" y="135" text-anchor="middle">场景模板库</text>
<text class="text-small" x="150" y="155" text-anchor="middle">预定义业务场景</text>
<rect class="box" x="280" y="110" width="200" height="60" rx="6"/>
<text class="text" x="380" y="135" text-anchor="middle">场景定义文档</text>
<text class="text-small" x="380" y="155" text-anchor="middle">README配置</text>
<rect class="box" x="510" y="110" width="200" height="60" rx="6"/>
<text class="text" x="610" y="135" text-anchor="middle">场景配置面板</text>
<text class="text-small" x="610" y="155" text-anchor="middle">可视化配置</text>

<line class="arrow" x1="400" y1="190" x2="400" y2="220"/>

<rect class="box-alt" x="30" y="220" width="740" height="120"/>
<text class="text-title" x="50" y="245">智能匹配层 (Intelligent Matching)</text>
<rect class="box" x="50" y="260" width="200" height="60" rx="6"/>
<text class="text" x="150" y="285" text-anchor="middle">NLP解析引擎</text>
<text class="text-small" x="150" y="305" text-anchor="middle">语义理解</text>
<rect class="box" x="280" y="260" width="200" height="60" rx="6"/>
<text class="text" x="380" y="285" text-anchor="middle">语义匹配引擎</text>
<text class="text-small" x="380" y="305" text-anchor="middle">相似度计算</text>
<rect class="box" x="510" y="260" width="200" height="60" rx="6"/>
<text class="text" x="610" y="285" text-anchor="middle">LLM推理引擎</text>
<text class="text-small" x="610" y="305" text-anchor="middle">智能推荐</text>

<line class="arrow" x1="400" y1="340" x2="400" y2="370"/>

<rect class="box-alt" x="30" y="370" width="740" height="120"/>
<text class="text-title" x="50" y="395">流程生成层 (Process Generation)</text>
<rect class="box" x="50" y="410" width="200" height="60" rx="6"/>
<text class="text" x="150" y="435" text-anchor="middle">活动生成引擎</text>
<text class="text-small" x="150" y="455" text-anchor="middle">节点创建</text>
<rect class="box" x="280" y="410" width="200" height="60" rx="6"/>
<text class="text" x="380" y="435" text-anchor="middle">路由连接引擎</text>
<text class="text-small" x="380" y="455" text-anchor="middle">流程构建</text>
<rect class="box" x="510" y="410" width="200" height="60" rx="6"/>
<text class="text" x="610" y="435" text-anchor="middle">属性配置引擎</text>
<text class="text-small" x="610" y="455" text-anchor="middle">智能推导</text>

</svg>
