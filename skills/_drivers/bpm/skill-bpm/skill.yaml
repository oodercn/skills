id: skill-bpm
name: BPM Workflow Server
version: 3.0.1
description: BPM workflow server implementation for Ooder Skills - depends on ooder-bpm-web client library
category: _drivers
subcategory: bpm
author: ooder
license: MIT

capabilities:
  - process_definition
  - process_instance
  - activity_management
  - workflow_execution
  - task_assignment

dependencies:
  - skill-common
  - ooder-bpm-web

exports:
  - net.ooder.bpm.client.service.*
  - net.ooder.bpm.client.*
  - net.ooder.bpm.engine.*

configuration:
  auto_configure: false

notes: |
  This module provides BPM server implementation.
  It depends on ooder-bpm-web (net.ooder:ooder-bpm-web:3.0.1) which contains:
  - IDSClientService interface
  - ProcessDefService interface
  - ProcessInstService interface
  - ProcessHistoryService interface
  - RightService interface
  - FDTService interface
  - All model classes (ProcessDef, ProcessInst, ActivityDef, ActivityInst, etc.)
  - All enum classes
