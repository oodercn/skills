<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800px" height="520px">
  <defs>
    <style>
      .bg { fill: #fafafa; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
      .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
      .box-green { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .box-purple { fill: #f3e8ff; stroke: #9333ea; stroke-width: 2; rx: 8; }
      .title-box { fill: #2563eb; stroke: none; rx: 4; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
      .arrow-down { fill: none; stroke: #2563eb; stroke-width: 2; marker-end: url(#arrowhead2); }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
      .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
      .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
      .text-small { font-size: 11px; fill: #64748b; }
      .text-center { font-size: 12px; fill: #475569; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
  <rect class="bg" width="100%" height="100%"/>

  <rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
  <text class="text-header" x="400" y="38" text-anchor="middle">递进式配置层级</text>

  <rect class="box-alt" x="40" y="70" width="340" height="90" rx="8"/>
  <text class="text-title" x="210" y="95" text-anchor="middle">层级一：基础配置（必填）</text>
  <text class="text-small" x="210" y="115" text-anchor="middle">• Skill 选择/创建</text>
  <text class="text-small" x="210" y="133" text-anchor="middle">• 名称、描述</text>
  <text class="text-small" x="210" y="151" text-anchor="middle">• 三维度分类 + 执行者类型</text>

  <line class="arrow-down" x1="210" y1="165" x2="210" y2="185"/>

  <rect class="box-green" x="40" y="195" width="340" height="90" rx="8"/>
  <text class="text-title" x="210" y="220" text-anchor="middle">层级二：核心配置（动态显示）</text>
  <text class="text-small" x="210" y="240" text-anchor="middle">• LLM 类：Provider, Model, Temperature</text>
  <text class="text-small" x="210" y="258" text-anchor="middle">• WORKFLOW 类：WorkflowType, ContextIsolation</text>
  <text class="text-small" x="210" y="276" text-anchor="middle">• 根据分类动态显示专属配置</text>

  <line class="arrow-down" x1="210" y1="290" x2="210" y2="310"/>

  <rect class="box-highlight" x="40" y="320" width="340" height="90" rx="8"/>
  <text class="text-title" x="210" y="345" text-anchor="middle">层级三：高级配置（可折叠）</text>
  <text class="text-small" x="210" y="365" text-anchor="middle">• 输入输出映射</text>
  <text class="text-small" x="210" y="383" text-anchor="middle">• 执行控制（超时、重试、降级）</text>
  <text class="text-small" x="210" y="401" text-anchor="middle">• 依赖管理 | 上下文配置</text>

  <line class="arrow-down" x1="210" y1="415" x2="210" y2="435"/>

  <rect class="box-purple" x="40" y="445" width="340" height="60" rx="8"/>
  <text class="text-title" x="210" y="470" text-anchor="middle">层级四：专家配置（默认隐藏）</text>
  <text class="text-small" x="210" y="490" text-anchor="middle">• 自定义 Schema | 脚本扩展 | 性能调优</text>

  <rect class="box" x="420" y="70" width="340" height="435" rx="8"/>
  <text class="text-title" x="590" y="95" text-anchor="middle">动态显示规则</text>

  <rect class="box-alt" x="440" y="110" width="300" height="80" rx="6"/>
  <text class="text-small" x="590" y="130" text-anchor="middle" font-weight="bold">根据形态显示</text>
  <text class="text-small" x="590" y="150" text-anchor="middle">SCENE → context.isolation, roles, menus</text>
  <text class="text-small" x="590" y="168" text-anchor="middle">STANDALONE → 无额外配置</text>
  <text class="text-small" x="590" y="186" text-anchor="middle">（场景形态显示上下文配置）</text>

  <rect class="box-green" x="440" y="200" width="300" height="100" rx="6"/>
  <text class="text-small" x="590" y="220" text-anchor="middle" font-weight="bold">根据功能分类显示</text>
  <text class="text-small" x="590" y="240" text-anchor="middle">LLM → categoryConfig.llm</text>
  <text class="text-small" x="590" y="258" text-anchor="middle">FORM → categoryConfig.form</text>
  <text class="text-small" x="590" y="276" text-anchor="middle">WORKFLOW → categoryConfig.workflow</text>
  <text class="text-small" x="590" y="294" text-anchor="middle">KNOWLEDGE → categoryConfig.knowledge</text>

  <rect class="box-highlight" x="440" y="310" width="300" height="80" rx="6"/>
  <text class="text-small" x="590" y="330" text-anchor="middle" font-weight="bold">根据执行者类型显示</text>
  <text class="text-small" x="590" y="350" text-anchor="middle">HUMAN → performerConfig.human</text>
  <text class="text-small" x="590" y="368" text-anchor="middle">AGENT → performerConfig.agent</text>
  <text class="text-small" x="590" y="386" text-anchor="middle">SYSTEM → performerConfig.system</text>

  <rect class="box-purple" x="440" y="400" width="300" height="90" rx="6"/>
  <text class="text-small" x="590" y="420" text-anchor="middle" font-weight="bold">配置验证规则</text>
  <text class="text-small" x="590" y="440" text-anchor="middle">• basic.name: 必填, 2-100字符</text>
  <text class="text-small" x="590" y="458" text-anchor="middle">• classification: 三维度必填</text>
  <text class="text-small" x="590" y="476" text-anchor="middle">• LLM.provider: 当 category=LLM 时必填</text>
</svg>
