<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800px" height="380px">
  <defs>
    <style>
      .bg { fill: #fafafa; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
      .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
      .box-green { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .title-box { fill: #2563eb; stroke: none; rx: 4; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 2; marker-end: url(#arrowhead); }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
      .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
      .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
      .text-small { font-size: 11px; fill: #64748b; }
      .text-center { font-size: 12px; fill: #475569; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
  <rect class="bg" width="100%" height="100%"/>

  <rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
  <text class="text-header" x="400" y="38" text-anchor="middle">场景 + Workflow 强绑定关系</text>

  <rect class="box-highlight" x="40" y="70" width="340" height="60" rx="8"/>
  <text class="text-title" x="210" y="95" text-anchor="middle">场景 [SCENE]</text>
  <text class="text-small" x="210" y="115" text-anchor="middle">Form = SCENE 必须绑定 Workflow</text>

  <line class="arrow" x1="210" y1="135" x2="210" y2="165"/>
  <text class="text-small" x="230" y="155" text-anchor="start">必须绑定</text>

  <rect class="box-green" x="40" y="175" width="340" height="180" rx="8"/>
  <text class="text-title" x="210" y="200" text-anchor="middle">Workflow [WORKFLOW]</text>

  <rect class="box" x="60" y="215" width="300" height="130" rx="6"/>
  <text class="text-small" x="210" y="235" text-anchor="middle" font-weight="bold">Workflow 定义包含：</text>
  <text class="text-small" x="210" y="255" text-anchor="middle">├── 流程定义</text>
  <text class="text-small" x="210" y="273" text-anchor="middle">├── 活动定义</text>
  <text class="text-small" x="210" y="291" text-anchor="middle">├── 路由定义</text>
  <text class="text-small" x="210" y="309" text-anchor="middle" fill="#d97706">└── 场景配置 ← 场景多级配置绑定于此</text>
  <text class="text-small" x="210" y="335" text-anchor="middle">(SceneConfig)</text>

  <rect class="box-alt" x="420" y="70" width="340" height="285" rx="8"/>
  <text class="text-title" x="590" y="95" text-anchor="middle">核心规则</text>

  <rect class="box" x="440" y="110" width="300" height="80" rx="6"/>
  <text class="text-small" x="590" y="130" text-anchor="middle">• Form = SCENE 必须绑定</text>
  <text class="text-small" x="590" y="148" text-anchor="middle">  Category = WORKFLOW</text>
  <text class="text-small" x="590" y="166" text-anchor="middle">• Category = WORKFLOW 的 Skill</text>
  <text class="text-small" x="590" y="184" text-anchor="middle">  必须以 SCENE 形态运行</text>

  <rect class="box" x="440" y="200" width="300" height="140" rx="6"/>
  <text class="text-small" x="590" y="220" text-anchor="middle" font-weight="bold">场景配置包含：</text>
  <text class="text-small" x="590" y="240" text-anchor="middle">sceneType: AUTO | TRIGGER | HYBRID</text>
  <text class="text-small" x="590" y="258" text-anchor="middle">lifecycle: { type, activateTime }</text>
  <text class="text-small" x="590" y="276" text-anchor="middle">roles: [ 角色系统 ]</text>
  <text class="text-small" x="590" y="294" text-anchor="middle">menus: [ 菜单系统 ]</text>
  <text class="text-small" x="590" y="312" text-anchor="middle">capabilities: [ 能力配置 ]</text>
  <text class="text-small" x="590" y="330" text-anchor="middle">knowledgeConfig: [ 知识库 ]</text>
</svg>
