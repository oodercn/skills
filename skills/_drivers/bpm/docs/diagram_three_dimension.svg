<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800px" height="580px">
  <defs>
    <style>
      .bg { fill: #fafafa; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .box-form { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 8; }
      .box-category { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .box-provider { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
      .title-box { fill: #2563eb; stroke: none; rx: 4; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
      .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
      .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
      .text-small { font-size: 11px; fill: #64748b; }
      .text-dim { font-size: 10px; fill: #94a3b8; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="bg" width="100%" height="100%"/>

  <rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
  <text class="text-header" x="400" y="38" text-anchor="middle">SkillNode 三维度分类体系</text>

  <rect class="box-form" x="40" y="70" width="220" height="160" rx="8"/>
  <text class="text-title" x="150" y="95" text-anchor="middle">维度一：形态 Form</text>
  <text class="text-dim" x="150" y="115" text-anchor="middle">决定 Skill 的运行形态</text>

  <rect class="box" x="60" y="130" width="180" height="30" rx="6"/>
  <text class="text-small" x="150" y="150" text-anchor="middle" font-weight="bold">SCENE - 场景 Skill</text>

  <rect class="box" x="60" y="165" width="180" height="30" rx="6"/>
  <text class="text-small" x="150" y="185" text-anchor="middle" font-weight="bold">STANDALONE - 独立 Skill</text>

  <text class="text-dim" x="150" y="215" text-anchor="middle">容器型，需激活，有上下文</text>
  <text class="text-dim" x="150" y="228" text-anchor="middle">原子型，可直接调用</text>

  <rect class="box-category" x="290" y="70" width="220" height="160" rx="8"/>
  <text class="text-title" x="400" y="95" text-anchor="middle">维度二：功能 Category</text>
  <text class="text-dim" x="400" y="115" text-anchor="middle">决定 Skill 提供的能力类型</text>

  <rect class="box" x="305" y="130" width="190" height="18" rx="4"/>
  <text class="text-small" x="400" y="144" text-anchor="middle">LLM - 大模型推理</text>
  <rect class="box" x="305" y="151" width="190" height="18" rx="4"/>
  <text class="text-small" x="400" y="165" text-anchor="middle">FORM - 表单交互</text>
  <rect class="box" x="305" y="172" width="190" height="18" rx="4"/>
  <text class="text-small" x="400" y="186" text-anchor="middle">SERVICE - 服务调用</text>
  <rect class="box" x="305" y="193" width="190" height="18" rx="4"/>
  <text class="text-small" x="400" y="207" text-anchor="middle">WORKFLOW - 流程编排</text>

  <rect class="box-provider" x="540" y="70" width="220" height="160" rx="8"/>
  <text class="text-title" x="650" y="95" text-anchor="middle">维度三：提供者 Provider</text>
  <text class="text-dim" x="650" y="115" text-anchor="middle">决定 Skill 的来源和管理方式</text>

  <rect class="box" x="560" y="130" width="180" height="28" rx="6"/>
  <text class="text-small" x="650" y="150" text-anchor="middle" font-weight="bold">SYSTEM - 系统内置</text>
  <text class="text-dim" x="650" y="163" text-anchor="middle">核心能力，不可删除</text>

  <rect class="box" x="560" y="175" width="180" height="28" rx="6"/>
  <text class="text-small" x="650" y="195" text-anchor="middle" font-weight="bold">DRIVER - 驱动适配</text>
  <text class="text-dim" x="650" y="208" text-anchor="middle">第三方平台集成，互斥</text>

  <rect class="box" x="270" y="270" width="260" height="100" rx="8"/>
  <text class="text-title" x="400" y="295" text-anchor="middle">维度约束规则</text>

  <text class="text-small" x="400" y="320" text-anchor="middle">• Form 约束：SCENE + WORKFLOW = 强绑定</text>
  <text class="text-small" x="400" y="340" text-anchor="middle">• Category 约束：各类别必须关联专属配置</text>
  <text class="text-small" x="400" y="360" text-anchor="middle">• Provider 约束：SYSTEM 不可删除，DRIVER 同类互斥</text>

  <rect class="box-form" x="40" y="400" width="720" height="80" rx="8"/>
  <text class="text-title" x="400" y="425" text-anchor="middle">三维度组合示例</text>

  <rect class="box" x="60" y="440" width="165" height="28" rx="6"/>
  <text class="text-small" x="142" y="458" text-anchor="middle">STANDALONE + LLM + DRIVER</text>
  <text class="text-dim" x="142" y="472" text-anchor="middle">DeepSeek 大模型驱动</text>

  <rect class="box" x="235" y="440" width="165" height="28" rx="6"/>
  <text class="text-small" x="317" y="458" text-anchor="middle">SCENE + KNOWLEDGE + BUSINESS</text>
  <text class="text-dim" x="317" y="472" text-anchor="middle">知识问答场景</text>

  <rect class="box" x="410" y="440" width="165" height="28" rx="6"/>
  <text class="text-small" x="492" y="458" text-anchor="middle">STANDALONE + FORM + SYSTEM</text>
  <text class="text-dim" x="492" y="472" text-anchor="middle">默认表单能力</text>

  <rect class="box" x="585" y="440" width="165" height="28" rx="6"/>
  <text class="text-small" x="667" y="458" text-anchor="middle">SCENE + WORKFLOW + SYSTEM</text>
  <text class="text-dim" x="667" y="472" text-anchor="middle">BPM 工作流场景</text>

  <rect class="box-provider" x="40" y="500" width="720" height="60" rx="8"/>
  <text class="text-title" x="400" y="525" text-anchor="middle">关键约束</text>
  <text class="text-small" x="400" y="550" text-anchor="middle">Form = SCENE 必须绑定 Category = WORKFLOW | 场景的多级配置约束到 Workflow 定义中</text>
</svg>
