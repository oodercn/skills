<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800px" height="420px">
  <defs>
    <style>
      .bg { fill: #fafafa; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
      .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
      .box-green { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .box-purple { fill: #f3e8ff; stroke: #9333ea; stroke-width: 2; rx: 8; }
      .title-box { fill: #2563eb; stroke: none; rx: 4; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
      .arrow-down { fill: none; stroke: #2563eb; stroke-width: 2; marker-end: url(#arrowhead2); }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
      .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
      .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
      .text-small { font-size: 11px; fill: #64748b; }
      .text-center { font-size: 12px; fill: #475569; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
  <rect class="bg" width="100%" height="100%"/>

  <rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
  <text class="text-header" x="400" y="38" text-anchor="middle">约束继承规则</text>

  <rect class="box-alt" x="40" y="70" width="340" height="80" rx="8"/>
  <text class="text-title" x="210" y="95" text-anchor="middle">System 级约束</text>
  <text class="text-small" x="210" y="115" text-anchor="middle">全局知识库、全局角色、全局菜单</text>
  <text class="text-small" x="210" y="133" text-anchor="middle">全局生效，系统级权限</text>

  <line class="arrow-down" x1="210" y1="155" x2="210" y2="175"/>
  <text class="text-small" x="230" y="168" text-anchor="start">可被继承</text>

  <rect class="box-green" x="40" y="185" width="340" height="80" rx="8"/>
  <text class="text-title" x="210" y="210" text-anchor="middle">Workflow 级约束</text>
  <text class="text-small" x="210" y="230" text-anchor="middle">组织知识库、流程配置</text>
  <text class="text-small" x="210" y="248" text-anchor="middle">流程级别，可引用 System 配置</text>

  <line class="arrow-down" x1="210" y1="270" x2="210" y2="290"/>
  <text class="text-small" x="230" y="283" text-anchor="start">可被继承</text>

  <rect class="box-highlight" x="40" y="300" width="340" height="80" rx="8"/>
  <text class="text-title" x="210" y="325" text-anchor="middle">SCENE 级约束</text>
  <text class="text-small" x="210" y="345" text-anchor="middle">场景知识库、场景角色、场景菜单</text>
  <text class="text-small" x="210" y="363" text-anchor="middle">场景级别，绑定到 Workflow</text>

  <line class="arrow-down" x1="210" y1="385" x2="210" y2="405"/>
  <text class="text-small" x="230" y="398" text-anchor="start">可被继承</text>

  <rect class="box-purple" x="40" y="415" width="340" height="60" rx="8"/>
  <text class="text-title" x="210" y="440" text-anchor="middle">Activity 级约束</text>
  <text class="text-small" x="210" y="460" text-anchor="middle">活动知识库、活动配置 | 通过上下文注入</text>

  <rect class="box" x="420" y="70" width="340" height="405" rx="8"/>
  <text class="text-title" x="590" y="95" text-anchor="middle">覆盖规则</text>

  <rect class="box" x="440" y="110" width="300" height="100" rx="6"/>
  <text class="text-small" x="590" y="130" text-anchor="middle" font-weight="bold">继承方向：从上到下</text>
  <text class="text-small" x="590" y="150" text-anchor="middle">System → Workflow → SCENE → Activity</text>
  <text class="text-small" x="590" y="170" text-anchor="middle">• 下级可覆盖上级配置（显式声明）</text>
  <text class="text-small" x="590" y="188" text-anchor="middle">• 未覆盖则继承上级配置</text>
  <text class="text-small" x="590" y="206" text-anchor="middle">• 覆盖需要权限验证</text>

  <rect class="box-alt" x="440" y="220" width="300" height="80" rx="6"/>
  <text class="text-small" x="590" y="240" text-anchor="middle" font-weight="bold">引用继承</text>
  <text class="text-small" x="590" y="260" text-anchor="middle">Workflow.sceneConfig 可引用 System 级配置</text>
  <text class="text-small" x="590" y="278" text-anchor="middle">SCENE.sceneConfig 可引用 System 级配置</text>
  <text class="text-small" x="590" y="296" text-anchor="middle">通过 ID 或名称引用</text>

  <rect class="box-green" x="440" y="310" width="300" height="80" rx="6"/>
  <text class="text-small" x="590" y="330" text-anchor="middle" font-weight="bold">绑定继承</text>
  <text class="text-small" x="590" y="350" text-anchor="middle">SCENE.sceneConfig 绑定到 Workflow.sceneConfig</text>
  <text class="text-small" x="590" y="368" text-anchor="middle">场景配置存储在 Workflow 定义中</text>
  <text class="text-small" x="590" y="386" text-anchor="middle">生命周期与 Workflow 同步</text>

  <rect class="box-highlight" x="440" y="400" width="300" height="60" rx="6"/>
  <text class="text-small" x="590" y="420" text-anchor="middle" font-weight="bold">上下文注入</text>
  <text class="text-small" x="590" y="440" text-anchor="middle">Activity.context 注入 SCENE.sceneConfig</text>
  <text class="text-small" x="590" y="458" text-anchor="middle">运行时自动注入场景配置</text>
</svg>
