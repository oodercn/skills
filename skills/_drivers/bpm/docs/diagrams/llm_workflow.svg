<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800px" height="580px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
        .step { font-size: 14px; font-weight: bold; fill: #2563eb; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>
<rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
<text class="text-header" x="400" y="38" text-anchor="middle">LLM 驱动流程设计工作流</text>

<rect class="box" x="30" y="70" width="740" height="50"/>
<text class="step" x="50" y="95">1.</text>
<text class="text-title" x="80" y="95">用户输入需求</text>
<text class="text" x="80" y="110">"帮我设计一个请假审批流程"</text>

<line class="arrow" x1="400" y1="120" x2="400" y2="140"/>

<rect class="box-alt" x="30" y="140" width="740" height="70"/>
<text class="step" x="50" y="165">2.</text>
<text class="text-title" x="80" y="165">LLM 理解与解析</text>
<text class="text" x="80" y="185">├─ 识别流程类型：审批流程</text>
<text class="text" x="80" y="200">└─ 提取关键节点：提交、审批、通知</text>

<line class="arrow" x1="400" y1="210" x2="400" y2="230"/>

<rect class="box" x="30" y="230" width="740" height="70"/>
<text class="step" x="50" y="255">3.</text>
<text class="text-title" x="80" y="255">Agent 配置</text>
<text class="text" x="80" y="275">├─ 创建审批 Agent (LLM类型)</text>
<text class="text" x="80" y="290">└─ 配置能力：EMAIL, NOTIFICATION, APPROVAL</text>

<line class="arrow" x1="400" y1="300" x2="400" y2="320"/>

<rect class="box-alt" x="30" y="320" width="740" height="70"/>
<text class="step" x="50" y="345">4.</text>
<text class="text-title" x="80" y="345">Scene 定义</text>
<text class="text" x="80" y="365">├─ 创建表单场景 (FORM)</text>
<text class="text" x="80" y="380">└─ 配置 PageAgent 和存储策略</text>

<line class="arrow" x1="400" y1="390" x2="400" y2="410"/>

<rect class="box" x="30" y="410" width="740" height="70"/>
<text class="step" x="50" y="435">5.</text>
<text class="text-title" x="80" y="435">流程生成</text>
<text class="text" x="80" y="455">├─ 创建活动节点</text>
<text class="text" x="80" y="470">└─ 连接路由并配置属性面板</text>

<line class="arrow" x1="400" y1="480" x2="400" y2="500"/>

<rect class="box-highlight" x="30" y="500" width="740" height="70"/>
<text class="step" x="50" y="525">6.</text>
<text class="text-title" x="80" y="525">可视化展示与用户确认</text>
<text class="text" x="80" y="545">├─ Canvas 绘制流程图，Panel 显示属性</text>
<text class="text" x="80" y="560">└─ 用户提出修改建议，LLM 迭代优化</text>
</svg>