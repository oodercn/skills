<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800px" height="340px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #10b981; stroke-width: 2; rx: 8; }
        .title-box { fill: #10b981; stroke: none; rx: 4; }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .icon { font-size: 20px; fill: #10b981; }
    </style>
</defs>
<rect class="bg" width="100%" height="100%"/>
<rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
<text class="text-header" x="400" y="38" text-anchor="middle">H5 JS 架构优势</text>

<rect class="box" x="30" y="70" width="740" height="50"/>
<text class="icon" x="50" y="100">✅</text>
<text class="text-title" x="80" y="95">零部署</text>
<text class="text" x="80" y="110">浏览器直接访问，无需安装</text>

<rect class="box" x="30" y="130" width="740" height="50"/>
<text class="icon" x="50" y="160">✅</text>
<text class="text-title" x="80" y="155">跨平台</text>
<text class="text" x="80" y="170">PC、移动端、平板全覆盖</text>

<rect class="box" x="30" y="190" width="740" height="50"/>
<text class="icon" x="50" y="220">✅</text>
<text class="text-title" x="80" y="215">实时协作</text>
<text class="text" x="80" y="230">WebSocket 支持多人协同编辑</text>

<rect class="box" x="30" y="250" width="740" height="50"/>
<text class="icon" x="50" y="280">✅</text>
<text class="text-title" x="80" y="275">插件生态</text>
<text class="text" x="80" y="290">灵活的插件系统，动态加载</text>
</svg>