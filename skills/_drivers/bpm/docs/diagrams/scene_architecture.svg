<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800px" height="580px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>
<rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
<text class="text-header" x="400" y="38" text-anchor="middle">SceneDef 场景架构图</text>

<rect class="box-highlight" x="30" y="70" width="740" height="80"/>
<text class="text-title" x="400" y="95" text-anchor="middle">SceneDef (场景定义)</text>
<text class="text" x="50" y="120">• sceneId: 场景唯一标识</text>
<text class="text" x="50" y="140">• name: 场景名称</text>
<text class="text" x="400" y="120">• sceneType: FORM / LIST / DASHBOARD / CUSTOM</text>

<line class="arrow" x1="145" y1="150" x2="145" y2="180"/>
<line class="arrow" x1="400" y1="150" x2="400" y2="180"/>
<line class="arrow" x1="655" y1="150" x2="655" y2="180"/>

<rect class="box" x="30" y="180" width="230" height="120"/>
<text class="text-title" x="145" y="205" text-anchor="middle">PageAgent Config</text>
<text class="text" x="50" y="230">• agentId</text>
<text class="text" x="50" y="250">• pageId</text>
<text class="text" x="50" y="270">• pageType</text>
<text class="text" x="50" y="290">• template / style / script</text>

<rect class="box" x="285" y="180" width="230" height="120"/>
<text class="text-title" x="400" y="205" text-anchor="middle">Function Calling</text>
<text class="text" x="305" y="230">• tools</text>
<text class="text" x="305" y="250">• params</text>
<text class="text" x="305" y="270">• returns</text>
<text class="text-small" x="400" y="295" text-anchor="middle">函数调用配置</text>

<rect class="box" x="540" y="180" width="230" height="120"/>
<text class="text-title" x="655" y="205" text-anchor="middle">Storage Config</text>
<text class="text" x="560" y="230">• type: VFS / SQL / HYBRID</text>
<text class="text" x="560" y="250">• vfsPath</text>
<text class="text" x="560" y="270">• sqlTable</text>
<text class="text-small" x="655" y="295" text-anchor="middle">存储配置</text>

<rect class="box-alt" x="30" y="320" width="740" height="100"/>
<text class="text-title" x="400" y="345" text-anchor="middle">Interactions (交互定义)</text>
<text class="text" x="50" y="370">• type: A2A (Agent to Agent) / A2U / A2S</text>
<text class="text" x="50" y="390">• from: 源 Agent / Service</text>
<text class="text" x="50" y="410">• to: 目标 Agent / Service</text>
<text class="text" x="400" y="370">• messageType: COMMAND / EVENT / QUERY</text>

<rect class="box" x="30" y="440" width="740" height="100"/>
<text class="text-title" x="400" y="465" text-anchor="middle">ActivityBlocks (活动块)</text>
<text class="text" x="50" y="490">• 可复用的活动组合</text>
<text class="text" x="50" y="510">• 支持嵌套场景</text>
<text class="text" x="50" y="530">• 参数化配置</text>
</svg>