<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 510" width="800px" height="510px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>
<rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
<text class="text-header" x="400" y="38" text-anchor="middle">架构迁移策略</text>

<rect class="box" x="30" y="70" width="740" height="90"/>
<text class="text-title" x="50" y="95">阶段一：数据层迁移</text>
<text class="text" x="50" y="120">├── 保留 XPDL 格式存储</text>
<text class="text" x="50" y="140">├── 新增 JSON Schema 定义</text>
<text class="text" x="50" y="160">└── 实现双向数据转换</text>

<line class="arrow" x1="400" y1="160" x2="400" y2="190"/>

<rect class="box-alt" x="30" y="190" width="740" height="90"/>
<text class="text-title" x="50" y="215">阶段二：业务层重构</text>
<text class="text" x="50" y="240">├── Store 状态管理</text>
<text class="text" x="50" y="260">├── Adapter 数据适配</text>
<text class="text" x="50" y="280">└── Plugin 插件系统</text>

<line class="arrow" x1="400" y1="280" x2="400" y2="310"/>

<rect class="box" x="30" y="310" width="740" height="90"/>
<text class="text-title" x="50" y="335">阶段三：展示层升级</text>
<text class="text" x="50" y="360">├── Canvas 流程图绘制</text>
<text class="text" x="50" y="380">├── Panel 属性面板</text>
<text class="text" x="50" y="400">└── Palette 元素面板</text>

<line class="arrow" x1="400" y1="400" x2="400" y2="430"/>

<rect class="box-highlight" x="30" y="430" width="740" height="90"/>
<text class="text-title" x="50" y="455">阶段四：AI 能力集成</text>
<text class="text" x="50" y="480">├── LLM Agent 配置</text>
<text class="text" x="50" y="500">├── Scene 场景定义</text>
<text class="text" x="50" y="520">└── Chat 智能助手</text>
</svg>