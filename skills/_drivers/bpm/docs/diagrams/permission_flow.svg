<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800px" height="580px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .box-success { fill: #d1fae5; stroke: #10b981; stroke-width: 2; rx: 8; }
        .box-danger { fill: #fee2e2; stroke: #ef4444; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
        .decision { font-size: 14px; font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>
<rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
<text class="text-header" x="400" y="38" text-anchor="middle">权限检查流程图</text>

<rect class="box" x="300" y="70" width="200" height="60"/>
<text class="text-title" x="400" y="95" text-anchor="middle">用户发起流程请求</text>
<text class="text-small" x="400" y="115" text-anchor="middle">访问流程或执行操作</text>

<line class="arrow" x1="400" y1="130" x2="400" y2="160"/>

<rect class="box-alt" x="300" y="160" width="200" height="60"/>
<text class="text-title" x="400" y="185" text-anchor="middle">获取用户信息</text>
<text class="text-small" x="400" y="205" text-anchor="middle">从 Session 获取用户身份</text>

<line class="arrow" x1="400" y1="220" x2="400" y2="250"/>

<rect class="box" x="300" y="250" width="200" height="60"/>
<text class="text-title" x="400" y="275" text-anchor="middle">查询权限组</text>
<text class="text-small" x="400" y="295" text-anchor="middle">获取用户所属权限组</text>

<line class="arrow" x1="400" y1="310" x2="400" y2="340"/>

<rect class="box-highlight" x="300" y="340" width="200" height="60"/>
<text class="decision" x="400" y="365" text-anchor="middle">是否有权限？</text>
<text class="text-small" x="400" y="385" text-anchor="middle">检查操作权限</text>

<line class="arrow" x1="500" y1="370" x2="600" y2="370"/>
<text class="text-small" x="540" y="360">否</text>

<rect class="box-danger" x="600" y="340" width="150" height="60"/>
<text class="text-title" x="675" y="365" text-anchor="middle">拒绝访问</text>
<text class="text-small" x="675" y="385" text-anchor="middle">返回错误信息</text>

<line class="arrow" x1="400" y1="400" x2="400" y2="430"/>
<text class="text-small" x="420" y="415">是</text>

<rect class="box" x="300" y="430" width="200" height="60"/>
<text class="text-title" x="400" y="455" text-anchor="middle">检查操作权限</text>
<text class="text-small" x="400" y="475" text-anchor="middle">VIEW/EDIT/DELETE/EXEC</text>

<line class="arrow" x1="400" y1="490" x2="400" y2="520"/>

<rect class="box-success" x="300" y="520" width="200" height="60"/>
<text class="text-title" x="400" y="545" text-anchor="middle">执行操作</text>
<text class="text-small" x="400" y="565" text-anchor="middle">允许访问并执行</text>

<rect class="box" x="50" y="160" width="200" height="180"/>
<text class="text-title" x="150" y="185" text-anchor="middle">权限类型</text>
<text class="text" x="70" y="210">• VIEW: 查看权限</text>
<text class="text" x="70" y="230">• EDIT: 编辑权限</text>
<text class="text" x="70" y="250">• DELETE: 删除权限</text>
<text class="text" x="70" y="270">• EXEC: 执行权限</text>
<text class="text" x="70" y="290">• ADMIN: 管理权限</text>
<text class="text" x="70" y="310">• APPROVE: 审批权限</text>
</svg>