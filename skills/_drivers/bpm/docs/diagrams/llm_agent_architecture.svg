<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800px" height="400px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>

<!-- Background -->
<rect class="bg" width="800" height="400"/>

<!-- Title -->
<rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
<text class="text-header" x="400" y="38" text-anchor="middle">LLM Agent 架构</text>

<!-- LLM Chat Service -->
<rect class="box-highlight" x="30" y="70" width="200" height="80"/>
<text class="text-title" x="130" y="95" text-anchor="middle">skill-llm-chat</text>
<text class="text" x="130" y="115" text-anchor="middle">LLM 服务</text>
<text class="text-small" x="130" y="135" text-anchor="middle">提供 AI 对话能力</text>

<!-- Arrow -->
<line class="arrow" x1="230" y1="110" x2="270" y2="110"/>

<!-- BPM NLP Plugin -->
<rect class="box" x="280" y="70" width="240" height="120"/>
<text class="text-title" x="400" y="95" text-anchor="middle">BPMNLPPlugin</text>
<text class="text" x="400" y="120" text-anchor="middle">上下文构建器</text>
<text class="text" x="400" y="145" text-anchor="middle">动作执行器</text>
<text class="text" x="400" y="170" text-anchor="middle">自然语言处理</text>

<!-- Arrow -->
<line class="arrow" x1="520" y1="130" x2="560" y2="130"/>

<!-- BPM Designer -->
<rect class="box-alt" x="570" y="70" width="200" height="80"/>
<text class="text-title" x="670" y="95" text-anchor="middle">BPM 设计器</text>
<text class="text" x="670" y="115" text-anchor="middle">Canvas 渲染</text>
<text class="text-small" x="670" y="135" text-anchor="middle">流程可视化编辑</text>

<!-- User -->
<circle cx="130" cy="300" r="40" fill="#2563eb"/>
<text class="text-header" x="130" y="305" text-anchor="middle">用户</text>

<!-- Arrow from user to NLP -->
<line class="arrow" x1="170" y1="280" x2="350" y2="220"/>

<!-- User input -->
<rect class="box" x="280" y="240" width="240" height="60"/>
<text class="text" x="400" y="265" text-anchor="middle">自然语言指令</text>
<text class="text-small" x="400" y="285" text-anchor="middle">"创建一个请假审批流程"</text>

<!-- Arrow from NLP to designer -->
<line class="arrow" x1="400" y1="190" x2="400" y2="230"/>

<!-- Process output -->
<rect class="box-alt" x="570" y="240" width="200" height="60"/>
<text class="text" x="670" y="265" text-anchor="middle">流程图形化显示</text>
<text class="text-small" x="670" y="285" text-anchor="middle">Canvas 渲染</text>

</svg>
