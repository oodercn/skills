<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 680" width="800px" height="680px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>
<rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
<text class="text-header" x="400" y="38" text-anchor="middle">LLM Agent 架构图</text>

<rect class="box-highlight" x="30" y="70" width="740" height="100"/>
<text class="text-title" x="400" y="95" text-anchor="middle">AgentDef (智能体定义)</text>
<text class="text" x="50" y="120">• agentType: LLM / TASK / EVENT / HYBRID</text>
<text class="text" x="50" y="140">• scheduleStrategy: 顺序/并行/条件/轮询/优先级</text>
<text class="text" x="50" y="160">• collaborationMode: 独立/层级/对等/辩论/投票</text>

<line class="arrow" x1="145" y1="170" x2="145" y2="200"/>
<line class="arrow" x1="400" y1="170" x2="400" y2="200"/>
<line class="arrow" x1="655" y1="170" x2="655" y2="200"/>

<rect class="box" x="30" y="200" width="230" height="120"/>
<text class="text-title" x="145" y="225" text-anchor="middle">LLMConfig</text>
<text class="text" x="50" y="250">• model</text>
<text class="text" x="50" y="270">• temperature</text>
<text class="text" x="50" y="290">• maxTokens</text>
<text class="text" x="50" y="310">• functionCalling</text>

<rect class="box" x="285" y="200" width="230" height="120"/>
<text class="text-title" x="400" y="225" text-anchor="middle">Northbound Config</text>
<text class="text" x="305" y="250">• protocol A2UI</text>
<text class="text" x="305" y="270">• endpoints</text>
<text class="text-small" x="400" y="295" text-anchor="middle">向上提供服务</text>

<rect class="box" x="540" y="200" width="230" height="120"/>
<text class="text-title" x="655" y="225" text-anchor="middle">Southbound Config</text>
<text class="text" x="560" y="250">• protocol MCP</text>
<text class="text" x="560" y="270">• endpoints</text>
<text class="text-small" x="655" y="295" text-anchor="middle">向下调用服务</text>

<rect class="box-alt" x="30" y="340" width="740" height="120"/>
<text class="text-title" x="400" y="365" text-anchor="middle">Tools (工具集)</text>
<text class="text" x="50" y="390">• EMAIL: 邮件发送</text>
<text class="text" x="50" y="410">• CALENDAR: 日程管理</text>
<text class="text" x="50" y="430">• DOCUMENT: 文档处理</text>
<text class="text" x="50" y="450">• ANALYSIS: 数据分析</text>
<text class="text" x="400" y="390">• SEARCH: 信息检索</text>
<text class="text" x="400" y="410">• NOTIFICATION: 消息通知</text>
<text class="text" x="400" y="430">• APPROVAL: 审批处理</text>
<text class="text" x="400" y="450">• SCHEDULING: 任务调度</text>

<rect class="box" x="30" y="480" width="740" height="80"/>
<text class="text-title" x="400" y="505" text-anchor="middle">Memory (记忆系统)</text>
<text class="text" x="50" y="530">• enabled: 是否启用</text>
<text class="text" x="50" y="550">• maxTokens: 最大记忆容量</text>
<text class="text" x="400" y="530">• context: 上下文管理</text>
</svg>