<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800px" height="580px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>

<!-- Background -->
<rect class="bg" width="800" height="580"/>

<!-- Title -->
<rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
<text class="text-header" x="400" y="38" text-anchor="middle">ooderAgent 技能架构</text>

<!-- Layer 1: _base -->
<rect class="box" x="30" y="70" width="740" height="60"/>
<text class="text-title" x="50" y="95">_base/</text>
<text class="text" x="150" y="95">基础层</text>
<text class="text-small" x="50" y="115">基础协议、核心接口、工具类</text>

<!-- Arrow -->
<line class="arrow" x1="400" y1="130" x2="400" y2="150"/>

<!-- Layer 2: _system -->
<rect class="box-alt" x="30" y="150" width="740" height="60"/>
<text class="text-title" x="50" y="175">_system/</text>
<text class="text" x="150" y="175">系统层（30+ 技能）</text>
<text class="text-small" x="50" y="195">系统级技能、基础服务、通用能力</text>

<!-- Arrow -->
<line class="arrow" x1="400" y1="210" x2="400" y2="230"/>

<!-- Layer 3: _drivers -->
<rect class="box" x="30" y="230" width="740" height="60"/>
<text class="text-title" x="50" y="255">_drivers/</text>
<text class="text" x="150" y="255">驱动层（BPM、VFS、LLM 等）</text>
<text class="text-small" x="50" y="275">业务驱动技能、流程引擎、文件服务、AI 能力</text>

<!-- Arrow -->
<line class="arrow" x1="400" y1="290" x2="400" y2="310"/>

<!-- Layer 4: _business -->
<rect class="box-alt" x="30" y="310" width="740" height="60"/>
<text class="text-title" x="50" y="335">_business/</text>
<text class="text" x="150" y="335">业务层</text>
<text class="text-small" x="50" y="355">业务场景技能、行业解决方案</text>

<!-- Arrow -->
<line class="arrow" x1="400" y1="370" x2="400" y2="390"/>

<!-- Layer 5: capabilities -->
<rect class="box" x="30" y="390" width="740" height="60"/>
<text class="text-title" x="50" y="415">capabilities/</text>
<text class="text" x="150" y="415">能力层</text>
<text class="text-small" x="50" y="435">可复用能力模块、技能组合</text>

<!-- Arrow -->
<line class="arrow" x1="400" y1="450" x2="400" y2="470"/>

<!-- Layer 6: scenes -->
<rect class="box-highlight" x="30" y="470" width="740" height="60"/>
<text class="text-title" x="50" y="495">scenes/</text>
<text class="text" x="150" y="495">场景层</text>
<text class="text-small" x="50" y="515">最终用户场景、技能编排</text>

</svg>
