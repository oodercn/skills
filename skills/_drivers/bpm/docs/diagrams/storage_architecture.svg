<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800px" height="580px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>
<rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
<text class="text-header" x="400" y="38" text-anchor="middle">存储架构图</text>

<rect class="box" x="30" y="70" width="740" height="100"/>
<text class="text-title" x="400" y="95" text-anchor="middle">前端数据层</text>
<text class="text" x="50" y="120">• Store: 内存状态管理</text>
<text class="text" x="50" y="140">• LocalStorage: 本地缓存</text>
<text class="text" x="400" y="120">• IndexedDB: 离线存储</text>
<text class="text" x="400" y="140">• SessionStorage: 会话存储</text>

<line class="arrow" x1="400" y1="170" x2="400" y2="200"/>

<rect class="box-alt" x="30" y="200" width="740" height="100"/>
<text class="text-title" x="400" y="225" text-anchor="middle">传输层</text>
<text class="text" x="50" y="250">• REST API: 同步操作</text>
<text class="text" x="50" y="270">• WebSocket: 实时同步</text>
<text class="text" x="400" y="250">• DataAdapter: 格式转换</text>
<text class="text" x="400" y="270">• XPDL Serializer: XPDL序列化</text>

<line class="arrow" x1="400" y1="300" x2="400" y2="330"/>

<rect class="box-highlight" x="30" y="330" width="740" height="100"/>
<text class="text-title" x="400" y="355" text-anchor="middle">后端存储层</text>
<text class="text" x="50" y="380">• 关系数据库: 流程定义、版本、权限</text>
<text class="text" x="50" y="400">• VFS: 模板、配置文件</text>
<text class="text" x="400" y="380">• XPDL: 标准格式存储</text>
<text class="text" x="400" y="400">• File System: 文件存储</text>

<rect class="box" x="30" y="450" width="230" height="100"/>
<text class="text-title" x="145" y="475" text-anchor="middle">数据库存储</text>
<text class="text" x="50" y="500">• ProcessDef: 流程定义</text>
<text class="text" x="50" y="520">• ActivityDef: 活动定义</text>
<text class="text" x="50" y="540">• RouteDef: 路由定义</text>

<rect class="box" x="285" y="450" width="230" height="100"/>
<text class="text-title" x="400" y="475" text-anchor="middle">VFS 存储</text>
<text class="text" x="305" y="500">• 模板文件</text>
<text class="text" x="305" y="520">• 配置文件</text>
<text class="text" x="305" y="540">• 资源文件</text>

<rect class="box" x="540" y="450" width="230" height="100"/>
<text class="text-title" x="655" y="475" text-anchor="middle">XPDL 存储</text>
<text class="text" x="560" y="500">• 流程定义文件</text>
<text class="text" x="560" y="520">• 版本历史</text>
<text class="text" x="560" y="540">• 导入导出</text>
</svg>