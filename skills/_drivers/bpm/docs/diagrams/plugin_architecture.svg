<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800px" height="580px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>
<rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
<text class="text-header" x="400" y="38" text-anchor="middle">插件系统架构图</text>

<rect class="box-highlight" x="30" y="70" width="740" height="60"/>
<text class="text-title" x="400" y="95" text-anchor="middle">PanelPluginManager</text>
<text class="text-small" x="400" y="115" text-anchor="middle">插件管理器 - 负责插件注册、加载、调度</text>

<line class="arrow" x1="145" y1="130" x2="145" y2="160"/>
<line class="arrow" x1="400" y1="130" x2="400" y2="160"/>
<line class="arrow" x1="655" y1="130" x2="655" y2="160"/>

<rect class="box" x="30" y="160" width="230" height="80"/>
<text class="text-title" x="145" y="185" text-anchor="middle">Process Plugin</text>
<text class="text-small" x="145" y="205" text-anchor="middle">流程插件</text>
<text class="text-small" x="145" y="225" text-anchor="middle">管理流程属性</text>

<rect class="box" x="285" y="160" width="230" height="80"/>
<text class="text-title" x="400" y="185" text-anchor="middle">Activity Plugin</text>
<text class="text-small" x="400" y="205" text-anchor="middle">活动插件</text>
<text class="text-small" x="400" y="225" text-anchor="middle">管理活动属性</text>

<rect class="box" x="540" y="160" width="230" height="80"/>
<text class="text-title" x="655" y="185" text-anchor="middle">Route Plugin</text>
<text class="text-small" x="655" y="205" text-anchor="middle">路由插件</text>
<text class="text-small" x="655" y="225" text-anchor="middle">管理路由属性</text>

<rect class="box-alt" x="30" y="260" width="230" height="280"/>
<text class="text-title" x="145" y="285" text-anchor="middle">Process Plugin 子面板</text>
<text class="text" x="50" y="310">├─ ProcessBasicPanel</text>
<text class="text" x="50" y="330">├─ StartNodePanel</text>
<text class="text" x="50" y="350">├─ EndNodesPanel</text>
<text class="text" x="50" y="370">├─ ListenersPanel</text>
<text class="text" x="50" y="390">└─ RightGroupsPanel</text>

<rect class="box-alt" x="285" y="260" width="230" height="280"/>
<text class="text-title" x="400" y="285" text-anchor="middle">Activity Plugin 子面板</text>
<text class="text" x="305" y="310">├─ BasicPanel</text>
<text class="text" x="305" y="330">├─ TimingPanel</text>
<text class="text" x="305" y="350">├─ RightPanel</text>
<text class="text" x="305" y="370">├─ FormPanel</text>
<text class="text" x="305" y="390">├─ ServicePanel</text>
<text class="text" x="305" y="410">├─ AgentPanel</text>
<text class="text" x="305" y="430">└─ ScenePanel</text>

<rect class="box-alt" x="540" y="260" width="230" height="280"/>
<text class="text-title" x="655" y="285" text-anchor="middle">Route Plugin 子面板</text>
<text class="text" x="560" y="310">├─ BasicPanel</text>
<text class="text" x="560" y="330">├─ CondPanel</text>
<text class="text" x="560" y="350">└─ ...</text>
</svg>