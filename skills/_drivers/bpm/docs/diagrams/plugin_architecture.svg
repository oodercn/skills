<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800px" height="450px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>

<!-- Background -->
<rect class="bg" width="800" height="450"/>

<!-- Title -->
<rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
<text class="text-header" x="400" y="38" text-anchor="middle">插件架构与事件总线</text>

<!-- Plugin Registry -->
<rect class="box" x="30" y="70" width="240" height="150"/>
<text class="text-title" x="150" y="95" text-anchor="middle">PluginRegistry</text>
<text class="text" x="50" y="125">插件注册表</text>
<text class="text-small" x="50" y="145">• 插件注册</text>
<text class="text-small" x="50" y="165">• 依赖管理</text>
<text class="text-small" x="50" y="185">• 加载顺序</text>
<text class="text-small" x="50" y="205">• 依赖注入</text>

<!-- Plugin Event Bus -->
<rect class="box-highlight" x="280" y="70" width="240" height="150"/>
<text class="text-title" x="400" y="95" text-anchor="middle">PluginEventBus</text>
<text class="text" x="400" y="125" text-anchor="middle">事件总线</text>
<text class="text-small" x="300" y="145">• 发布/订阅模式</text>
<text class="text-small" x="300" y="165">• NLP 插件 ↔ 传统插件</text>
<text class="text-small" x="300" y="185">• 异步事件处理</text>
<text class="text-small" x="300" y="205">• 插件间通信</text>

<!-- Plugin Instances -->
<rect class="box-alt" x="530" y="70" width="240" height="150"/>
<text class="text-title" x="650" y="95" text-anchor="middle">Plugin Instances</text>
<text class="text" x="550" y="125">插件实例</text>
<text class="text-small" x="550" y="145">• BasicInfoPlugin</text>
<text class="text-small" x="550" y="165">• ServiceIntegration</text>
<text class="text-small" x="550" y="185">• DynamicFieldPlugin</text>
<text class="text-small" x="550" y="205">• BPMNLPPlugin</text>

<!-- Arrows between components -->
<line class="arrow" x1="270" y1="145" x2="280" y2="145"/>
<line class="arrow" x1="520" y1="145" x2="530" y2="145"/>

<!-- NLP Plugin Special -->
<rect class="box-highlight" x="150" y="250" width="500" height="80"/>
<text class="text-title" x="400" y="275" text-anchor="middle">BPMNLPPlugin（特殊插件）</text>
<text class="text" x="400" y="300" text-anchor="middle">基于 llm-chat 构建，独立于 IDE</text>
<text class="text-small" x="400" y="320" text-anchor="middle">通过事件总线与传统插件协同</text>

<!-- Event Flow -->
<line class="arrow" x1="400" y1="220" x2="400" y2="240"/>

<!-- Traditional Plugins -->
<rect class="box" x="30" y="360" width="370" height="70"/>
<text class="text-title" x="215" y="385" text-anchor="middle">传统插件（100+ 个）</text>
<text class="text-small" x="215" y="410" text-anchor="middle">基础插件 | 高级插件 | 动态插件</text>

<!-- Arrow -->
<line class="arrow" x1="215" y1="350" x2="215" y2="360"/>

<!-- Runtime Loading -->
<rect class="box-alt" x="420" y="360" width="350" height="70"/>
<text class="text-title" x="595" y="385" text-anchor="middle">运行时加载</text>
<text class="text-small" x="595" y="410" text-anchor="middle">懒加载 | 虚拟 DOM | 性能优化</text>

<!-- Arrow -->
<line class="arrow" x1="595" y1="350" x2="595" y2="360"/>

<!-- Connection between NLP and traditional -->
<line class="arrow" x1="400" y1="330" x2="400" y2="350"/>

</svg>
