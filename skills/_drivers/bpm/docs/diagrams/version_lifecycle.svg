<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800px" height="580px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .box-success { fill: #d1fae5; stroke: #10b981; stroke-width: 2; rx: 8; }
        .box-danger { fill: #fee2e2; stroke: #ef4444; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>
<rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
<text class="text-header" x="400" y="38" text-anchor="middle">流程版本状态流转图</text>

<rect class="box-alt" x="300" y="80" width="200" height="80"/>
<text class="text-title" x="400" y="105" text-anchor="middle">DRAFT</text>
<text class="text-small" x="400" y="125" text-anchor="middle">(草稿)</text>
<text class="text-small" x="400" y="145" text-anchor="middle">新建流程</text>

<line class="arrow" x1="400" y1="160" x2="400" y2="200"/>
<text class="text-small" x="420" y="180">激活</text>

<rect class="box-success" x="300" y="200" width="200" height="80"/>
<text class="text-title" x="400" y="225" text-anchor="middle">ACTIVE</text>
<text class="text-small" x="400" y="245" text-anchor="middle">(激活)</text>
<text class="text-small" x="400" y="265" text-anchor="middle">运行中</text>

<line class="arrow" x1="400" y1="280" x2="400" y2="320"/>
<text class="text-small" x="420" y="300">冻结</text>

<rect class="box-highlight" x="300" y="320" width="200" height="80"/>
<text class="text-title" x="400" y="345" text-anchor="middle">FROZEN</text>
<text class="text-small" x="400" y="365" text-anchor="middle">(冻结)</text>
<text class="text-small" x="400" y="385" text-anchor="middle">暂停</text>

<line class="arrow" x1="300" y1="360" x2="200" y2="360"/>
<line class="arrow" x1="200" y1="360" x2="200" y2="240"/>
<line class="arrow" x1="200" y1="240" x2="300" y2="240"/>
<text class="text-small" x="180" y="300">解冻</text>

<line class="arrow" x1="400" y1="400" x2="400" y2="440"/>
<text class="text-small" x="420" y="420">归档</text>

<rect class="box-danger" x="300" y="440" width="200" height="80"/>
<text class="text-title" x="400" y="465" text-anchor="middle">ARCHIVED</text>
<text class="text-small" x="400" y="485" text-anchor="middle">(归档)</text>
<text class="text-small" x="400" y="505" text-anchor="middle">已归档</text>

<rect class="box" x="550" y="200" width="200" height="100"/>
<text class="text-title" x="650" y="225" text-anchor="middle">版本管理操作</text>
<text class="text" x="570" y="250">• 激活版本</text>
<text class="text" x="570" y="270">• 冻结版本</text>
<text class="text" x="570" y="290">• 解冻版本</text>

<rect class="box" x="50" y="200" width="200" height="100"/>
<text class="text-title" x="150" y="225" text-anchor="middle">版本状态说明</text>
<text class="text" x="70" y="250">• DRAFT: 草稿</text>
<text class="text" x="70" y="270">• ACTIVE: 激活</text>
<text class="text" x="70" y="290">• FROZEN: 冻结</text>
</svg>