<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800px" height="420px">
  <defs>
    <style>
      .bg { fill: #fafafa; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
      .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
      .box-green { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .title-box { fill: #2563eb; stroke: none; rx: 4; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
      .arrow-down { fill: none; stroke: #2563eb; stroke-width: 2; marker-end: url(#arrowhead2); }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
      .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
      .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
      .text-small { font-size: 11px; fill: #64748b; }
      .text-center { font-size: 12px; fill: #475569; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
  <rect class="bg" width="100%" height="100%"/>

  <rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
  <text class="text-header" x="400" y="38" text-anchor="middle">属性继承关系</text>

  <rect class="box-alt" x="40" y="70" width="340" height="140" rx="8"/>
  <text class="text-title" x="210" y="95" text-anchor="middle">全局 Skill 定义</text>

  <rect class="box" x="60" y="110" width="300" height="85" rx="6"/>
  <text class="text-small" x="210" y="130" text-anchor="middle">basic: { skillId, name, description }</text>
  <text class="text-small" x="210" y="148" text-anchor="middle">classification: { form, category, provider }</text>
  <text class="text-small" x="210" y="166" text-anchor="middle">execution: { performer, io, control }</text>
  <text class="text-small" x="210" y="184" text-anchor="middle">dependencies: { skills, services }</text>

  <line class="arrow-down" x1="210" y1="215" x2="210" y2="245"/>
  <text class="text-small" x="230" y="235" text-anchor="start">继承</text>

  <rect class="box-highlight" x="40" y="255" width="340" height="140" rx="8"/>
  <text class="text-title" x="210" y="280" text-anchor="middle">流程中的 Activity 节点</text>

  <rect class="box" x="60" y="295" width="300" height="90" rx="6"/>
  <text class="text-small" x="210" y="315" text-anchor="middle" font-weight="bold">继承自 Skill:</text>
  <text class="text-small" x="210" y="333" text-anchor="middle">skillId (引用) | classification (只读)</text>
  <text class="text-small" x="210" y="351" text-anchor="middle" font-weight="bold">节点专属:</text>
  <text class="text-small" x="210" y="369" text-anchor="middle">nodeId | name (可覆盖) | position</text>

  <rect class="box-green" x="420" y="70" width="340" height="325" rx="8"/>
  <text class="text-title" x="590" y="95" text-anchor="middle">SkillNode 属性树结构</text>

  <rect class="box" x="440" y="110" width="300" height="25" rx="4"/>
  <text class="text-small" x="590" y="127" text-anchor="middle" font-weight="bold">基础属性 [basic]</text>

  <rect class="box" x="440" y="140" width="300" height="25" rx="4"/>
  <text class="text-small" x="590" y="157" text-anchor="middle" font-weight="bold">分类属性 [classification]</text>

  <rect class="box" x="440" y="170" width="300" height="25" rx="4"/>
  <text class="text-small" x="590" y="187" text-anchor="middle" font-weight="bold">执行属性 [execution]</text>

  <rect class="box" x="440" y="200" width="300" height="25" rx="4"/>
  <text class="text-small" x="590" y="217" text-anchor="middle" font-weight="bold">依赖属性 [dependencies]</text>

  <rect class="box" x="440" y="230" width="300" height="25" rx="4"/>
  <text class="text-small" x="590" y="247" text-anchor="middle" font-weight="bold">上下文属性 [context] (仅 SCENE)</text>

  <rect class="box" x="440" y="260" width="300" height="25" rx="4"/>
  <text class="text-small" x="590" y="277" text-anchor="middle" font-weight="bold">元数据 [metadata]</text>

  <rect class="box-highlight" x="440" y="300" width="300" height="80" rx="6"/>
  <text class="text-small" x="590" y="320" text-anchor="middle" font-weight="bold">运行时覆盖</text>
  <text class="text-small" x="590" y="340" text-anchor="middle">performer: {...} (可覆盖)</text>
  <text class="text-small" x="590" y="358" text-anchor="middle">inputMapping / outputMapping</text>
  <text class="text-small" x="590" y="376" text-anchor="middle">control.config: {...}</text>
</svg>
