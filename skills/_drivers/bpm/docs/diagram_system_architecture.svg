<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800px" height="500px">
  <defs>
    <style>
      .bg { fill: #fafafa; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
      .box-backend { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .box-data { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
      .title-box { fill: #2563eb; stroke: none; rx: 4; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
      .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
      .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
      .text-small { font-size: 11px; fill: #64748b; }
      .text-center { font-size: 12px; fill: #475569; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="bg" width="100%" height="100%"/>

  <rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
  <text class="text-header" x="400" y="38" text-anchor="middle">SkillFlow 系统架构</text>

  <rect class="box" x="40" y="70" width="720" height="100" rx="8"/>
  <text class="text-title" x="400" y="95" text-anchor="middle">前端层 Frontend</text>

  <rect class="box-alt" x="60" y="110" width="130" height="45" rx="6"/>
  <text class="text-center" x="125" y="130" text-anchor="middle">App.js</text>
  <text class="text-small" x="125" y="145" text-anchor="middle">应用入口</text>

  <rect class="box-alt" x="205" y="110" width="130" height="45" rx="6"/>
  <text class="text-center" x="270" y="130" text-anchor="middle">Canvas.js</text>
  <text class="text-small" x="270" y="145" text-anchor="middle">画布引擎</text>

  <rect class="box-alt" x="350" y="110" width="130" height="45" rx="6"/>
  <text class="text-center" x="415" y="130" text-anchor="middle">Panel.js</text>
  <text class="text-small" x="415" y="145" text-anchor="middle">配置面板</text>

  <rect class="box-alt" x="495" y="110" width="130" height="45" rx="6"/>
  <text class="text-center" x="560" y="130" text-anchor="middle">Tree.js</text>
  <text class="text-small" x="560" y="145" text-anchor="middle">流程树</text>

  <rect class="box-alt" x="640" y="110" width="100" height="45" rx="6"/>
  <text class="text-center" x="690" y="130" text-anchor="middle">Store.js</text>
  <text class="text-small" x="690" y="145" text-anchor="middle">状态管理</text>

  <rect class="box" x="200" y="185" width="400" height="35" rx="6"/>
  <text class="text-title" x="400" y="208" text-anchor="middle">SkillNodeManager.js - Skill管理 | 三维度分类 | 动态面板渲染</text>

  <line class="arrow" x1="400" y1="225" x2="400" y2="255"/>

  <rect class="box-backend" x="40" y="270" width="720" height="80" rx="8"/>
  <text class="text-title" x="400" y="295" text-anchor="middle">后端层 Backend</text>

  <rect class="box" x="80" y="315" width="150" height="25" rx="4"/>
  <text class="text-center" x="155" y="332" text-anchor="middle">Controller 层</text>

  <rect class="box" x="325" y="315" width="150" height="25" rx="4"/>
  <text class="text-center" x="400" y="332" text-anchor="middle">Service 层</text>

  <rect class="box" x="570" y="315" width="150" height="25" rx="4"/>
  <text class="text-center" x="645" y="332" text-anchor="middle">Repository 层</text>

  <line class="arrow" x1="400" y1="355" x2="400" y2="375"/>

  <rect class="box-data" x="200" y="385" width="400" height="35" rx="8"/>
  <text class="text-title" x="400" y="407" text-anchor="middle">数据存储层 - SQLite</text>

  <rect class="box-data" x="220" y="430" width="360" height="30" rx="6"/>
  <text class="text-center" x="400" y="449" text-anchor="middle">BPM_SKILL_DEF | BPM_PROCESSDEF | BPM_SCENE_CONFIG</text>

  <text class="text-small" x="400" y="480" text-anchor="middle" font-style="italic">HTTP/JSON API 通信</text>
</svg>
