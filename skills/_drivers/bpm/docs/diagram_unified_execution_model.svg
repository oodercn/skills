<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800px" height="320px">
  <defs>
    <style>
      .bg { fill: #fafafa; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
      .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
      .title-box { fill: #2563eb; stroke: none; rx: 4; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
      .arrow-highlight { fill: none; stroke: #d97706; stroke-width: 2; marker-end: url(#arrowhead2); stroke-dasharray: 5,5; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
      .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
      .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
      .text-small { font-size: 11px; fill: #64748b; }
      .text-center { font-size: 13px; fill: #475569; font-weight: 500; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
  </defs>
  <rect class="bg" width="100%" height="100%"/>

  <rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
  <text class="text-header" x="400" y="38" text-anchor="middle">统一执行模型</text>

  <rect class="box-highlight" x="50" y="80" width="200" height="60" rx="8"/>
  <text class="text-center" x="150" y="105" text-anchor="middle">活动节点</text>
  <text class="text-small" x="150" y="125" text-anchor="middle">= 执行者 + Skill</text>

  <line class="arrow" x1="250" y1="110" x2="310" y2="110"/>

  <rect class="box" x="310" y="70" width="180" height="80" rx="8"/>
  <text class="text-center" x="400" y="95" text-anchor="middle">Skill 统一抽象</text>
  <text class="text-small" x="400" y="115" text-anchor="middle">LLM / FORM / SERVICE</text>
  <text class="text-small" x="400" y="130" text-anchor="middle">WORKFLOW / KNOWLEDGE ...</text>

  <line class="arrow" x1="550" y1="110" x2="580" y2="110"/>

  <rect class="box-alt" x="580" y="70" width="170" height="80" rx="8"/>
  <text class="text-center" x="665" y="95" text-anchor="middle">多种执行形态</text>
  <text class="text-small" x="665" y="115" text-anchor="middle">HUMAN + LLM → AI 辅助任务</text>
  <text class="text-small" x="665" y="130" text-anchor="middle">AGENT + WORKFLOW → 流程编排</text>

  <rect class="box" x="100" y="180" width="600" height="110" rx="8"/>
  <text class="text-title" x="400" y="205" text-anchor="middle">组合示例</text>

  <rect class="box-highlight" x="120" y="220" width="135" height="55" rx="6"/>
  <text class="text-small" x="187" y="240" text-anchor="middle" font-weight="bold">HUMAN + LLM</text>
  <text class="text-small" x="187" y="258" text-anchor="middle">AI 辅助人工任务</text>

  <rect class="box-highlight" x="270" y="220" width="135" height="55" rx="6"/>
  <text class="text-small" x="337" y="240" text-anchor="middle" font-weight="bold">AGENT + FORM</text>
  <text class="text-small" x="337" y="258" text-anchor="middle">Agent 表单交互</text>

  <rect class="box-highlight" x="420" y="220" width="135" height="55" rx="6"/>
  <text class="text-small" x="487" y="240" text-anchor="middle" font-weight="bold">SYSTEM + SERVICE</text>
  <text class="text-small" x="487" y="258" text-anchor="middle">系统自动服务调用</text>

  <rect class="box-highlight" x="570" y="220" width="135" height="55" rx="6"/>
  <text class="text-small" x="637" y="240" text-anchor="middle" font-weight="bold">AGENT + WORKFLOW</text>
  <text class="text-small" x="637" y="258" text-anchor="middle">Agent 流程编排</text>
</svg>
