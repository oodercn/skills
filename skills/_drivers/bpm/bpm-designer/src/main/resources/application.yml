server:
  port: 9008
  servlet:
    context-path: /

spring:
  application:
    name: bpm-designer
  mvc:
    static-path-pattern: /**
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 0
      chain:
        cache: false
  thymeleaf:
    cache: false
    check-template-location: false

bpm:
  server:
    url: http://127.0.0.1:9004/bpm

llm:
  enabled: true
  provider: aliyun
  model: qwen-plus
  prompt-file: prompts/full-derivation.yaml
  api-key: sk-f403a6a32efd4b00b75ee4874eec3b6b
  api-endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
  temperature: 0.7
  max-tokens: 4096
  timeout: 60000
  max-retries: 3
  max-tool-call-rounds: 5
  max-context-messages: 20

datasource:
  bpm:
    use-real-data: false
    bpm-server-url: http://127.0.0.1:9004
    capability-service-url: http://127.0.0.1:8085/capability
    form-service-url: http://127.0.0.1:8086/form
    scene-service-url: http://127.0.0.1:8087/scene
    connection-timeout: 5000
    read-timeout: 30000

cache:
  enabled: true
  default-ttl: 30

logging:
  level:
    net.ooder.bpm.designer: DEBUG
    net.ooder.bpm.designer.llm: DEBUG
    net.ooder.bpm.designer.function: DEBUG
    net.ooder.bpm.designer.datasource: DEBUG
    net.ooder.bpm.designer.chat: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  server:
    port: 8089
