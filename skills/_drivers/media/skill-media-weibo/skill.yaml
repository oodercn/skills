apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-media-weibo
  name: Weibo Media Service
  version: "3.0.1"
  description: 微博内容发布服务，支持微博发布、评论管理、数据分析等功能
  author: Ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills/tree/main/skills/_drivers/media/skill-media-weibo
  repository: https://gitee.com/ooderCN/skills.git
  keywords:
    - weibo
    - media
    - publish
    - social

spec:
  skillForm: DRIVER
  skillCategory: SERVICE
  sceneType: TRIGGER
  purposes:
    - CONTENT_PUBLISH
    - MEDIA

  ownership: platform

  capability:
    category: media
    code: MEDIA_WEIBO
    operations: [publish, comment, analyze]

  runtime:
    language: java
    javaVersion: "21"
    framework: spring-boot
    mainClass: net.ooder.skill.media.weibo.WeiboMediaProvider

  providedInterfaces:
    - id: net.ooder.skill.media.MediaPublishProvider
      version: "1.0"
      description: "媒体发布提供商接口"

  capabilities:
    - id: publish
      name: 微博发布
      description: 发布微博内容
      category: media
    - id: comment
      name: 评论管理
      description: 管理微博评论
      category: media
    - id: analyze
      name: 数据分析
      description: 获取微博数据分析
      category: media

  config:
    required:
      - name: WEIBO_APP_KEY
        type: string
        description: 微博应用Key
      - name: WEIBO_APP_SECRET
        type: string
        secret: true
        description: 微博应用Secret
