apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-openwrt
  name: OpenWrt管理服务
  version: 0.7.3
  description: OpenWrt路由器管理服务，提供路由器配置、监控、管理
  author: ooder Team
  type: driver-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills
  keywords:
    - openwrt
    - router
    - iot
    - network

spec:
  type: driver-skill
  
  ownership: independent
  
  capability:
    address: 0x63
    category: IOT
    code: IOT_OPENWRT
    operations: [config, monitor, manage]
  
  driverType: iot
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
  
  supportedSceneTypes:
    - network-management
    - iot-management
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: false
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 10
  
  dependencies: []
  
  providedInterfaces:
    - id: openwrt-service
      version: "1.0"
      description: "OpenWrt服务接口"
  
  capabilities:
    - id: config
      name: 路由器配置
      description: 配置路由器
      category: service
    - id: monitor
      name: 路由器监控
      description: 监控路由器状态
      category: service
    - id: manage
      name: 路由器管理
      description: 管理路由器
      category: service
  
  endpoints:
    - path: /api/openwrt/config
      method: PUT
      description: 更新配置
      capability: config
    - path: /api/openwrt/status
      method: GET
      description: 获取状态
      capability: monitor
    - path: /api/openwrt/restart
      method: POST
      description: 重启路由器
      capability: manage
  
  config:
    required:
      - name: OPENWRT_HOST
        type: string
        description: OpenWrt主机地址
      - name: OPENWRT_USER
        type: string
        description: 用户名
      - name: OPENWRT_PASSWORD
        type: string
        description: 密码
    optional:
      - name: OPENWRT_PORT
        type: integer
        default: 22
        description: SSH端口
  
  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "10Mi"
  
  offline:
    enabled: false
