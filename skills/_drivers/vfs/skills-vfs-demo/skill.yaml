apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skills-vfs-demo
  name: VFS服务端示例
  version: "3.0.5"
  description: VFS服务端示例实现，演示ooder-vfs-web 3.0.1虚拟文件系统操作
  author: ooder Team
  type: driver-service
  license: MIT

spec:
  skillForm: DRIVER
  skillCategory: DATA
  sceneType: AUTO
  purposes:
    - FILE_MANAGEMENT
    - DEMO

  ownership: platform

  capability:
    address: 0x4A
    category: DATA
    code: DRV_VFS_DEMO
    operations: [vfs_server_demo, file_management, folder_operations, file_versioning, storage_service]

  runtime:
    language: java
    javaVersion: "21"
    framework: spring-boot

  dependencies:
    - skill-common
    - skill-vfs-base
    - ooder-vfs-web

  capabilities:
    - id: vfs_server_demo
      name: VFS服务端示例
      description: VFS服务端操作示例
      category: demo
    - id: file_management
      name: 文件管理
      description: 文件增删改查
      category: vfs
    - id: folder_operations
      name: 文件夹操作
      description: 文件夹创建和管理
      category: vfs
    - id: file_versioning
      name: 文件版本
      description: 文件版本管理
      category: vfs
    - id: storage_service
      name: 存储服务
      description: 存储服务操作
      category: vfs

  providedInterfaces:
    - id: vfs-demo
      version: "1.0"
      description: "VFS示例接口"

  config:
    optional:
      - name: AUTO_CONFIGURE
        type: boolean
        default: false
        description: 是否自动配置

  resources:
    cpu: "50m"
    memory: "128Mi"
    storage: "100Mi"
