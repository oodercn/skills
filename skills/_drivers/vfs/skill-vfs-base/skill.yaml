apiVersion: skill.ooder.net/v1
kind: SkillPackage

metadata:
  id: skill-vfs-base
  name: VFS基础服务
  version: "3.0.1"
  description: VFS基础服务，提供文件系统抽象接口
  author: Ooder Team
  icon: ri-folder-line

spec:
  skillForm: PROVIDER
  skillCategory: DATA
  sceneType: AUTO
  purposes:
    - FILE_MANAGEMENT
    - TEAM
  
  capability:
    category: vfs
  
  capabilities:
    - id: vfs-read
      name: 文件读取
      description: 读取文件内容
      category: service
      autoBind: true
      
    - id: vfs-write
      name: 文件写入
      description: 写入文件内容
      category: service
      autoBind: true
      
    - id: vfs-delete
      name: 文件删除
      description: 删除文件
      category: service
      autoBind: true
      
    - id: vfs-list
      name: 文件列表
      description: 列出目录内容
      category: service
      autoBind: true
      
    - id: vfs-metadata
      name: 元数据管理
      description: 文件元数据操作
      category: service
      autoBind: false
      
  dependencies: []
  
  configSchema:
    type: object
    properties:
      basePath:
        type: string
        default: "./data/vfs"
        title: 基础路径
      maxFileSize:
        type: integer
        default: 104857600
        title: 最大文件大小(字节)
      allowedExtensions:
        type: array
        default: []
        title: 允许的文件扩展名
        
  estimatedResources:
    cpu: "50m"
    memory: "64Mi"
