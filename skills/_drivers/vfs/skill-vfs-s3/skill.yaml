apiVersion: skill.ooder.net/v1
kind: SkillPackage

metadata:
  id: skill-vfs-s3
  name: AWS S3 VFS Service
  version: "2.3.1"
  category: vfs
  subCategory: object-storage
  description: AWS S3存储服务，提供对象存储能力，支持S3数据接口
  author: Ooder Team
  icon: ri-cloud-line

spec:
  skillForm: PROVIDER
  
  capabilities:
    - id: vfs-storage
      name: 对象存储
      description: S3兼容对象存储服务
      category: service
      autoBind: true
    - id: vfs-upload
      name: 文件上传
      description: 上传文件到S3
      category: service
      autoBind: true
    - id: vfs-download
      name: 文件下载
      description: 从S3下载文件
      category: service
      autoBind: true
    - id: vfs-metadata
      name: 元数据管理
      description: 对象元数据操作
      category: service
      autoBind: false
      
  dependencies: []
      
  configSchema:
    type: object
    properties:
      endpoint:
        type: string
        title: S3端点URL
      accessKey:
        type: string
        title: Access Key
        required: true
      secretKey:
        type: string
        title: Secret Key
        required: true
        secret: true
      bucket:
        type: string
        title: 存储桶名称
        required: true
      region:
        type: string
        default: "us-east-1"
        title: 区域
        
  estimatedResources:
    cpu: "50m"
    memory: "64Mi"
