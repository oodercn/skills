apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-vfs-s3
  name: AWS S3 Storage
  version: 0.7.3
  description: AWS S3存储服务 - 提供对象存储能力，支持AWS S3接口
  author: Ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills/tree/main/skills/skill-vfs-s3
  repository: https://gitee.com/ooderCN/skills.git
  keywords:
    - s3
    - aws
    - vfs
    - storage
    - object-storage

spec:
  type: enterprise-skill
  
  ownership: platform
  
  capability:
    address: 0x1C
    category: VFS
    code: VFS_S3
    operations: [upload, download, delete, list]
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.vfs.s3.S3VfsApplication

  llmConfig:
    required: false
    defaultProvider: "deepseek"
    defaultModel: "deepseek-chat"
    capabilities:
      - chat
      - streaming
      - function-calling
    modelSelection:
      allowUserOverride: true
      availableProviders:
        - deepseek
        - openai
        - qianwen
        - volcengine
        - ollama
    functionCalling:
      enabled: true
      tools:
        - name: query_skill_capability
          description: "查询当前技能的能力和使用方法"
          parameters:
            type: object
            properties:
              capability:
                type: string
                description: "能力名称"
              detail:
                type: string
                enum: [brief, detailed, examples]
                default: "brief"
        - name: execute_mvel_action
          description: "通过MVEL表达式执行后台操作"
          parameters:
            type: object
            properties:
              expression:
                type: string
                description: "MVEL表达式"
              context:
                type: object
        - name: generate_ui_form
          description: "生成UI表单供用户填写"
          parameters:
            type: object
            properties:
              formType:
                type: string
              fields:
                type: array
                items:
                  type: object
        - name: execute_batch_operation
          description: "执行批量操作"
          parameters:
            type: object
            properties:
              operation:
                type: string
              items:
                type: array
                items:
                  type: object
        - name: convert_to_javascript
          description: "转换为JavaScript代码供用户使用"
          parameters:
            type: object
            properties:
              action:
                type: string
              parameters:
                type: object
      toolChoice: auto
    rateLimits:
      requestsPerMinute: 60
      tokensPerMinute: 100000

  
  capabilities:
    - id: vfs-storage
      name: VFS Storage
      description: 虚拟文件系统存储
      category: storage
    - id: file-read
      name: File Read
      description: 文件读取
      category: storage
    - id: file-write
      name: File Write
      description: 文件写入
      category: storage
    - id: file-delete
      name: File Delete
      description: 文件删除
      category: storage
    - id: metadata
      name: Metadata Management
      description: 元数据管理
      category: storage
  
  scenes:
    - name: vfs-s3
      description: S3存储场景
      capabilities:
        - vfs-storage
        - file-read
        - file-write
        - file-delete
        - metadata
  
  dependencies:
    - id: skill-vfs-base
      version: ">=1.0.0"
      required: true
      description: "VFS基础服务"
    - id: skill-common
      version: ">=1.0.0"
      required: false
      description: "通用工具库(间接)"
  
  config:
    required:
      - name: S3_ENDPOINT
        type: string
        description: S3服务端点
      - name: S3_ACCESS_KEY
        type: string
        description: S3访问密钥
      - name: S3_SECRET_KEY
        type: string
        secret: true
        description: S3秘密密钥
      - name: S3_BUCKET_NAME
        type: string
        description: S3桶名称
    optional:
      - name: S3_REGION
        type: string
        default: us-east-1
        description: S3区域
  
  endpoints:
    - path: /api/vfs/upload
      method: POST
      description: 上传文件
      capability: file-write
    - path: /api/vfs/download/{fileId}
      method: GET
      description: 下载文件
      capability: file-read
    - path: /api/vfs/files
      method: GET
      description: 获取文件列表
      capability: vfs-storage
    - path: /api/vfs/files/{fileId}
      method: DELETE
      description: 删除文件
      capability: file-delete
    - path: /api/vfs/metadata/{fileId}
      method: GET
      description: 获取文件元数据
      capability: metadata
    - path: /api/health
      method: GET
      description: 健康检查
  
  resources:
    cpu: "200m"
    memory: "512Mi"
    storage: "10Gi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: false
