apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-vfs-oss
  name: Aliyun OSS Storage
  version: 0.7.3
  description: 阿里云OSS存储服务 - 提供对象存储能力，支持阿里云OSS接口
  author: Ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills/tree/main/skills/skill-vfs-oss
  repository: https://gitee.com/ooderCN/skills.git
  keywords:
    - oss
    - aliyun
    - vfs
    - storage
    - object-storage

spec:
  type: enterprise-skill
  
  ownership: platform
  
  capability:
    address: 0x1B
    category: VFS
    code: VFS_OSS
    operations: [upload, download, delete, list]
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.vfs.oss.OssVfsApplication
  
  capabilities:
    - id: vfs-storage
      name: VFS Storage
      description: 虚拟文件系统存储
      category: storage
    - id: file-read
      name: File Read
      description: 文件读取
      category: storage
    - id: file-write
      name: File Write
      description: 文件写入
      category: storage
    - id: file-delete
      name: File Delete
      description: 文件删除
      category: storage
    - id: metadata
      name: Metadata Management
      description: 元数据管理
      category: storage
  
  scenes:
    - name: vfs-oss
      description: OSS存储场景
      capabilities:
        - vfs-storage
        - file-read
        - file-write
        - file-delete
        - metadata
  
  dependencies: []
  
  config:
    required:
      - name: OSS_ENDPOINT
        type: string
        description: OSS服务端点
      - name: OSS_ACCESS_KEY_ID
        type: string
        description: OSS访问密钥ID
      - name: OSS_ACCESS_KEY_SECRET
        type: string
        secret: true
        description: OSS访问密钥Secret
      - name: OSS_BUCKET_NAME
        type: string
        description: OSS桶名称
  
  endpoints:
    - path: /api/vfs/upload
      method: POST
      description: 上传文件
      capability: file-write
    - path: /api/vfs/download/{fileId}
      method: GET
      description: 下载文件
      capability: file-read
    - path: /api/vfs/files
      method: GET
      description: 获取文件列表
      capability: vfs-storage
    - path: /api/vfs/files/{fileId}
      method: DELETE
      description: 删除文件
      capability: file-delete
    - path: /api/vfs/metadata/{fileId}
      method: GET
      description: 获取文件元数据
      capability: metadata
    - path: /api/health
      method: GET
      description: 健康检查
  
  resources:
    cpu: "200m"
    memory: "512Mi"
    storage: "10Gi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: false
