apiVersion: skill.ooder.net/v1
kind: SkillPackage

metadata:
  id: skill-vfs-oss
  name: Aliyun OSS VFS Service
  version: "2.3.1"
  category: vfs
  subCategory: object-storage
  description: 阿里云OSS存储服务，提供对象存储能力，支持阿里云OSS接口
  author: Ooder Team
  icon: ri-cloud-line

spec:
  skillForm: PROVIDER
  
  capabilities:
    - id: vfs-storage
      name: 对象存储
      description: 阿里云OSS对象存储服务
      category: service
      autoBind: true
    - id: vfs-upload
      name: 文件上传
      description: 上传文件到OSS
      category: service
      autoBind: true
    - id: vfs-download
      name: 文件下载
      description: 从OSS下载文件
      category: service
      autoBind: true
    - id: vfs-metadata
      name: 元数据管理
      description: 对象元数据操作
      category: service
      autoBind: false
      
  dependencies: []
      
  configSchema:
    type: object
    properties:
      endpoint:
        type: string
        title: OSS端点URL
        required: true
      accessKeyId:
        type: string
        title: Access Key ID
        required: true
      accessKeySecret:
        type: string
        title: Access Key Secret
        required: true
        secret: true
      bucket:
        type: string
        title: 存储桶名称
        required: true
        
  estimatedResources:
    cpu: "50m"
    memory: "64Mi"
