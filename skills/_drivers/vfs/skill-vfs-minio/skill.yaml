apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-vfs-minio
  name: MinIO Storage
  version: 0.7.3
  description: MinIO存储服务 - 提供对象存储能力，支持S3兼容接口
  author: Ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills/tree/main/skills/skill-vfs-minio
  repository: https://gitee.com/ooderCN/skills.git
  keywords:
    - minio
    - vfs
    - storage
    - s3
    - object-storage

spec:
  type: enterprise-skill
  
  ownership: platform
  
  capability:
    address: 0x1A
    category: VFS
    code: VFS_MINIO
    operations: [upload, download, delete, list]
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.vfs.minio.MinioVfsApplication
  
  capabilities:
    - id: vfs-storage
      name: VFS Storage
      description: 虚拟文件系统存储
      category: storage
    - id: file-read
      name: File Read
      description: 文件读取
      category: storage
    - id: file-write
      name: File Write
      description: 文件写入
      category: storage
    - id: file-delete
      name: File Delete
      description: 文件删除
      category: storage
    - id: metadata
      name: Metadata Management
      description: 元数据管理
      category: storage
  
  scenes:
    - name: vfs-minio
      description: MinIO存储场景
      capabilities:
        - vfs-storage
        - file-read
        - file-write
        - file-delete
        - metadata
  
  dependencies:
    - id: skill-vfs-base
      version: ">=1.0.0"
      required: true
      description: "VFS基础服务"
    - id: skill-common
      version: ">=1.0.0"
      required: false
      description: "通用工具库(间接)"
  
  config:
    required:
      - name: MINIO_ENDPOINT
        type: string
        description: MinIO服务端点
      - name: MINIO_ACCESS_KEY
        type: string
        description: MinIO访问密钥
      - name: MINIO_SECRET_KEY
        type: string
        secret: true
        description: MinIO秘密密钥
      - name: MINIO_BUCKET_NAME
        type: string
        description: MinIO桶名称
  
  endpoints:
    - path: /api/vfs/upload
      method: POST
      description: 上传文件
      capability: file-write
    - path: /api/vfs/download/{fileId}
      method: GET
      description: 下载文件
      capability: file-read
    - path: /api/vfs/files
      method: GET
      description: 获取文件列表
      capability: vfs-storage
    - path: /api/vfs/files/{fileId}
      method: DELETE
      description: 删除文件
      capability: file-delete
    - path: /api/vfs/metadata/{fileId}
      method: GET
      description: 获取文件元数据
      capability: metadata
    - path: /api/health
      method: GET
      description: 健康检查
  
  resources:
    cpu: "200m"
    memory: "512Mi"
    storage: "10Gi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: false
