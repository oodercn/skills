apiVersion: skill.ooder.net/v1
kind: SkillPackage

metadata:
  id: skill-vfs-minio
  name: MinIO VFS Service
  version: "3.0.1"
  description: MinIO存储服务，提供对象存储服务，支持S3数据接口
  author: Ooder Team
  icon: ri-cloud-line

spec:
  skillForm: PROVIDER
  skillCategory: DATA
  sceneType: AUTO
  purposes:
    - FILE_MANAGEMENT
    - CLOUD_STORAGE
  
  capability:
    category: vfs
  
  capabilities:
    - id: vfs-storage
      name: 对象存储
      description: MinIO对象存储服务
      category: service
      autoBind: true
    - id: vfs-upload
      name: 文件上传
      description: 上传文件到MinIO
      category: service
      autoBind: true
    - id: vfs-download
      name: 文件下载
      description: 从MinIO下载文件
      category: service
      autoBind: true
    - id: vfs-metadata
      name: 元数据管理
      description: 对象元数据操作
      category: service
      autoBind: false
      
  dependencies: []
      
  configSchema:
    type: object
    properties:
      endpoint:
        type: string
        title: MinIO端点URL
        required: true
      accessKey:
        type: string
        title: Access Key
        required: true
      secretKey:
        type: string
        title: Secret Key
        required: true
        secret: true
      bucket:
        type: string
        title: 存储桶名称
        required: true
      useSSL:
        type: boolean
        default: false
        title: 使用SSL
        
  estimatedResources:
    cpu: "50m"
    memory: "64Mi"
