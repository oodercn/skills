apiVersion: skill.ooder.net/v1
kind: SkillPackage

metadata:
  id: skill-vfs-database
  name: Database VFS Service
  version: "2.3.1"
  category: vfs
  subCategory: database
  description: 数据库存储服务，将文件存储到数据库中，支持元数据管理
  author: Ooder Team
  icon: ri-database-line

spec:
  skillForm: PROVIDER
  
  capabilities:
    - id: vfs-storage
      name: 数据库存储
      description: 将文件存储到数据库
      category: service
      autoBind: true
    - id: vfs-save
      name: 保存文件
      description: 保存文件到数据库
      category: service
      autoBind: true
    - id: vfs-get
      name: 获取文件
      description: 从数据库获取文件
      category: service
      autoBind: true
    - id: vfs-query
      name: 查询文件
      description: 按条件查询文件
      category: service
      autoBind: true
    - id: vfs-metadata
      name: 元数据管理
      description: 文件元数据管理
      category: service
      autoBind: true
      
  dependencies: []
      
  configSchema:
    type: object
    properties:
      tableName:
        type: string
        default: "vfs_files"
        title: 存储表名
      maxBlobSize:
        type: integer
        default: 10485760
        title: 最大BLOB大小(字节)
      enableCompression:
        type: boolean
        default: true
        title: 启用压缩
        
  estimatedResources:
    cpu: "50m"
    memory: "128Mi"
