apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-vfs-database
  name: 数据库文件存储
  version: 2.3
  description: 数据库文件存储服务 - 将文件存储在数据库中，支持元数据管理、缓存同步、多数据库支持
  author: ooder Team
  type: enterprise-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills/tree/main/skills/skill-vfs-database
  repository: https://gitee.com/ooderCN/skills.git
  keywords:
    - database
    - vfs
    - storage
    - mysql
    - postgresql
    - metadata

spec:
  type: enterprise-skill
  
  ownership: platform
  
  capability:
    address: 0x19
    category: VFS
    code: VFS_DATABASE
    operations: [read, write, delete, list, metadata]
  
  supportedSceneTypes:
    - document-management
    - knowledge-base
    - file-storage
    
  dynamicSceneTypes: true
  
  autoStart:
    enabled: true
    delay: 5s
    
  autoJoin:
    enabled: true
    matchSceneTypes: true
    maxSceneGroups: 10
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.vfs.database.DatabaseVfsApplication
  
  providedInterfaces:
    - id: vfs-storage
      version: "1.0"
      description: "虚拟文件系统存储接口"
    - id: file-metadata
      version: "1.0"
      description: "文件元数据接口"
  
  capabilities:
    - id: vfs-storage
      name: VFS存储
      description: 虚拟文件系统存储
      category: storage
    - id: file-read
      name: 文件读取
      description: 文件读取
      category: storage
    - id: file-write
      name: 文件写入
      description: 文件写入
      category: storage
    - id: file-delete
      name: 文件删除
      description: 文件删除
      category: storage
    - id: metadata
      name: 元数据管理
      description: 元数据管理
      category: storage
    - id: cache-sync
      name: 缓存同步
      description: 多节点缓存同步
      category: storage
  
  scenes:
    - name: vfs-database
      description: 数据库存储场景
      capabilities:
        - vfs-storage
        - file-read
        - file-write
        - file-delete
        - metadata
  
  dependencies:
    - id: skill-vfs-base
      version: ">=1.0.0"
      required: true
      description: "VFS基础服务"
    - id: skill-common
      version: ">=1.0.0"
      required: false
      description: "通用工具库(间接)"
  
  config:
    required:
      - name: DB_URL
        type: string
        description: 数据库连接URL
      - name: DB_USERNAME
        type: string
        description: 数据库用户名
      - name: DB_PASSWORD
        type: string
        secret: true
        description: 数据库密码
    optional:
      - name: DB_POOL_SIZE
        type: integer
        default: 10
        description: 数据库连接池大小
      - name: CACHE_ENABLED
        type: boolean
        default: true
        description: 是否启用缓存
      - name: MAX_FILE_SIZE
        type: integer
        default: 104857600
        description: 最大文件大小(字节)
  
  endpoints:
    - path: /api/vfs/upload
      method: POST
      description: 上传文件
      capability: file-write
    - path: /api/vfs/download/{fileId}
      method: GET
      description: 下载文件
      capability: file-read
    - path: /api/vfs/files
      method: GET
      description: 获取文件列表
      capability: vfs-storage
    - path: /api/vfs/files/{fileId}
      method: DELETE
      description: 删除文件
      capability: file-delete
    - path: /api/vfs/metadata/{fileId}
      method: GET
      description: 获取文件元数据
      capability: metadata
    - path: /api/vfs/metadata/{fileId}
      method: PUT
      description: 更新文件元数据
      capability: metadata
    - path: /api/health
      method: GET
      description: 健康检查
  
  resources:
    cpu: "200m"
    memory: "512Mi"
    storage: "10Gi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: false
