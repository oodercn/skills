apiVersion: skill.ooder.net/v1
kind: SkillPackage

metadata:
  id: skill-vfs-local
  name: Local VFS Service
  version: "3.0.1"
  description: 本地文件系统存储服务，提供本地文件存取和版本管理
  author: Ooder Team
  icon: ri-folder-line

spec:
  skillForm: PROVIDER
  skillCategory: DATA
  sceneType: AUTO
  purposes:
    - FILE_MANAGEMENT
    - LOCAL_STORAGE
  
  capability:
    category: vfs
  
  capabilities:
    - id: vfs-storage
      name: 本地存储
      description: 本地文件系统存储服务
      category: service
      autoBind: true
    - id: vfs-read
      name: 文件读取
      description: 读取本地文件
      category: service
      autoBind: true
    - id: vfs-write
      name: 文件写入
      description: 写入本地文件
      category: service
      autoBind: true
    - id: vfs-list
      name: 文件列表
      description: 列出目录内容
      category: service
      autoBind: true
    - id: vfs-delete
      name: 文件删除
      description: 删除本地文件
      category: service
      autoBind: true
      
  dependencies: []
      
  configSchema:
    type: object
    properties:
      basePath:
        type: string
        default: "./data/vfs/local"
        title: 基础存储路径
      maxFileSize:
        type: integer
        default: 104857600
        title: 最大文件大小(字节)
      enableVersioning:
        type: boolean
        default: false
        title: 启用版本管理
        
  estimatedResources:
    cpu: "50m"
    memory: "64Mi"
