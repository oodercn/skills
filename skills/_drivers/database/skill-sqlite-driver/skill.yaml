apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-sqlite-driver
  name: SQLite数据库驱动
  version: "1.0.0"
  description: 提供SQLite数据库支持，通过SPI接口提供数据源能力
  author: ooder Team
  type: driver-service
  license: Apache-2.0

spec:
  skillForm: DRIVER
  skillCategory: DATABASE
  sceneType: AUTO
  purposes:
    - TEAM

  ownership: platform

  capability:
    address: 0x60
    category: DATABASE
    code: DRV_SQLITE
    operations: [connect, query, execute]

  runtime:
    language: java
    javaVersion: "21"
    framework: spring-boot

  providedInterfaces:
    - id: datasource-provider
      version: "1.0"
      description: "数据源提供者SPI接口"

  capabilities:
    - id: sqlite-datasource
      name: SQLite数据源
      description: SQLite数据库连接和查询
      category: database

  config:
    optional:
      - name: SQLITE_DATA_DIR
        type: string
        default: "${user.home}/.apexos/data"
        description: SQLite数据目录
      - name: SQLITE_DATABASE_NAME
        type: string
        default: "apexos"
        description: 数据库名称
      - name: SQLITE_POOL_MAX_SIZE
        type: integer
        default: 5
        description: 连接池最大连接数
      - name: SQLITE_POOL_MIN_IDLE
        type: integer
        default: 1
        description: 连接池最小空闲连接数

  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "100Mi"
