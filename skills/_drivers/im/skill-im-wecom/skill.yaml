apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-im-wecom
  name: WeCom IM Service
  version: 3.0.5
  description: 浼佷笟寰俊IM鏈嶅姟锛屾彁渚涙秷鎭彂閫併€佸簲鐢ㄦ秷鎭瓑鍔熻兘
  author: Ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills/tree/main/skills/_drivers/im/skill-im-wecom
  repository: https://gitee.com/ooderCN/skills.git
  keywords:
    - wecom
    - enterprise-wechat
    - im
    - messaging

spec:
  skillForm: DRIVER
  skillCategory: SERVICE
  sceneType: TRIGGER
  purposes:
    - TEAM
    - MESSAGING
  type: im-skill
  
  ownership: platform
  
  capability:
    category: msg
    code: IM_WECOM
    operations: [send-message, send-text, send-markdown]
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.im.wecom.WeComImSkillApplication

  llmConfig:
    required: false
    defaultProvider: "deepseek"
    defaultModel: "deepseek-chat"
    capabilities:
      - chat
      - streaming
      - function-calling
    functionCalling:
      enabled: true
      tools:
        - name: send_message
          description: "鍙戦€佷紒涓氬井淇℃秷鎭?
          parameters:
            type: object
            properties:
              receiver:
                type: string
                enum: [user, party]
                description: "鎺ユ敹鑰呯被鍨?
              receiverId:
                type: string
                description: "鎺ユ敹鑰匢D"
              msgType:
                type: string
                enum: [text, markdown, news]
                default: text
                description: "娑堟伅绫诲瀷"
              content:
                type: string
                description: "娑堟伅鍐呭"

  capabilities:
    - id: send-message
      name: Send Message
      description: 鍙戦€佹秷鎭?
      category: messaging
    - id: send-text
      name: Send Text
      description: 鍙戦€佹枃鏈秷鎭?
      category: messaging
    - id: send-markdown
      name: Send Markdown
      description: 鍙戦€丮arkdown娑堟伅
      category: messaging

  config:
    required:
      - name: WECOM_CORP_ID
        type: string
        description: 浼佷笟寰俊CorpId
      - name: WECOM_AGENT_ID
        type: string
        description: 浼佷笟寰俊AgentId
      - name: WECOM_AGENT_SECRET
        type: string
        secret: true
        description: 浼佷笟寰俊AgentSecret
    optional:
      - name: wecom.api.endpoint
        type: string
        default: https://qyapi.weixin.qq.com
        description: 浼佷笟寰俊API绔偣

  endpoints:
    - path: /api/v1/im/wecom/send
      method: POST
      description: 鍙戦€佹秷鎭?
      capability: send-message
    - path: /api/v1/im/wecom/send/user
      method: POST
      description: 鍙戦€佺粰鐢ㄦ埛
      capability: send-text
    - path: /api/v1/im/wecom/send/markdown
      method: POST
      description: 鍙戦€丮arkdown娑堟伅
      capability: send-markdown
