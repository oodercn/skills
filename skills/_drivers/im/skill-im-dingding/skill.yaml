apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-im-dingding
  name: DingTalk IM Service
  version: 3.0.1
  category: msg
  description: й’үй’үIMжңҚеҠЎпјҢжҸҗдҫӣж¶ҲжҒҜеҸ‘йҖҒгҖҒDINGж¶ҲжҒҜгҖҒж—ҘзЁӢз®ЎзҗҶгҖҒеҫ…еҠһеҗҢжӯҘзӯүеҠҹиғҪ
  author: Ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills/tree/main/skills/_drivers/im/skill-im-dingding
  repository: https://gitee.com/ooderCN/skills.git
  keywords:
    - dingtalk
    - dingding
    - im
    - message
    - ding
    - calendar
    - todo

spec:
  skillForm: DRIVER
  type: im-skill
  
  ownership: platform
  
  capability:
    category: IM
    code: IM_DINGDING
    operations: [send-message, send-ding, send-markdown, send-action-card, calendar, todo]
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.im.dingding.DingTalkImSkillApplication

  llmConfig:
    required: false
    defaultProvider: "deepseek"
    defaultModel: "deepseek-chat"
    capabilities:
      - chat
      - streaming
      - function-calling
    functionCalling:
      enabled: true
      tools:
        - name: send_message
          description: "еҸ‘йҖҒй’үй’үж¶ҲжҒ?
          parameters:
            type: object
            properties:
              receiver:
                type: string
                enum: [user, group]
                description: "жҺҘж”¶иҖ…зұ»еһ?
              receiverId:
                type: string
                description: "жҺҘж”¶иҖ…ID"
              msgType:
                type: string
                enum: [text, markdown, action_card]
                default: text
                description: "ж¶ҲжҒҜзұ»еһӢ"
              title:
                type: string
                description: "ж¶ҲжҒҜж Үйўҳ"
              content:
                type: string
                description: "ж¶ҲжҒҜеҶ…е®№"
        - name: send_ding
          description: "еҸ‘йҖҒй’үй’үDINGж¶ҲжҒҜпјҲй«ҳдјҳе…Ҳзә§жҸҗйҶ’пјү"
          parameters:
            type: object
            properties:
              userId:
                type: string
                description: "з”ЁжҲ·ID"
              title:
                type: string
                description: "ж¶ҲжҒҜж Үйўҳ"
              content:
                type: string
                description: "ж¶ҲжҒҜеҶ…е®№"
              reminderType:
                type: integer
                enum: [1, 2]
                default: 1
                description: "жҸҗйҶ’зұ»еһӢпј?-еә”з”ЁеҶ…пјҢ2-зҹӯдҝЎ"

  capabilities:
    - id: send-message
      name: Send Message
      description: еҸ‘йҖҒж¶ҲжҒ?      category: messaging
    - id: send-ding
      name: Send DING
      description: еҸ‘йҖҒDINGж¶ҲжҒҜ
      category: notification
    - id: send-markdown
      name: Send Markdown
      description: еҸ‘йҖҒMarkdownж¶ҲжҒҜ
      category: messaging
    - id: send-action-card
      name: Send Action Card
      description: еҸ‘йҖҒдәӨдә’еҚЎзү?      category: messaging

  config:
    required:
      - name: DINGTALK_APP_KEY
        type: string
        description: й’үй’үеә”з”ЁKey
      - name: DINGTALK_APP_SECRET
        type: string
        secret: true
        description: й’үй’үеә”з”ЁSecret
    optional:
      - name: dingtalk.api.endpoint
        type: string
        default: https://oapi.dingtalk.com
        description: й’үй’үAPIз«ҜзӮ№

  endpoints:
    - path: /api/v1/im/dingding/send
      method: POST
      description: еҸ‘йҖҒж¶ҲжҒ?      capability: send-message
    - path: /api/v1/im/dingding/ding
      method: POST
      description: еҸ‘йҖҒDINGж¶ҲжҒҜ
      capability: send-ding
    - path: /api/v1/im/dingding/send/user
      method: POST
      description: еҸ‘йҖҒж¶ҲжҒҜз»ҷз”ЁжҲ·
      capability: send-message
    - path: /api/v1/im/dingding/send/group
      method: POST
      description: еҸ‘йҖҒж¶ҲжҒҜз»ҷзҫӨз»„
      capability: send-message
    - path: /api/v1/im/dingding/send/markdown
      method: POST
      description: еҸ‘йҖҒMarkdownж¶ҲжҒҜ
      capability: send-markdown
    - path: /api/v1/im/dingding/send/action-card
      method: POST
      description: еҸ‘йҖҒдәӨдә’еҚЎзү?      capability: send-action-card
