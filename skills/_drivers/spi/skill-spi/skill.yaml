apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-spi
  name: Skill SPI接口定义
  version: "1.0.0"
  description: Skill服务提供者接口(SPI)定义，包含LLM服务接口和组织服务接口
  author: Ooder Team
  icon: ri-plug-line

spec:
  skillForm: DRIVER
  
  capabilities:
    - id: llm-service-interface
      name: LLM服务接口
      description: 大语言模型服务接口定义
      category: llm
      autoBind: false
    - id: org-service-interface
      name: 组织服务接口
      description: 组织和用户服务接口定义
      category: org
      autoBind: false
      
  dependencies: []
  
  configSchema:
    type: object
    properties: {}
        
  estimatedResources:
    cpu: "10m"
    memory: "16Mi"
