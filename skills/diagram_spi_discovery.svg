<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800px" height="450px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; fill: #334155; }
        .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-code { font-family: "Consolas", monospace; font-size: 11px; fill: #475569; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<!-- Title -->
<rect class="title-box" x="20" y="15" width="760" height="40" rx="4"/>
<text class="text-header" x="400" y="42" text-anchor="middle">SPI 服务发现机制</text>

<!-- Interface Definition -->
<rect class="box-highlight" x="30" y="70" width="350" height="100"/>
<text class="text-title" x="205" y="95" text-anchor="middle">接口定义层 (Interface)</text>
<text class="text-code" x="50" y="120">public interface ImDeliveryDriver {</text>
<text class="text-code" x="70" y="138">SendResult send(MessageContent c);</text>
<text class="text-code" x="70" y="156">void broadcast(MessageContent c);</text>
<text class="text-code" x="50" y="174">}</text>

<!-- Service Implementation -->
<rect class="box" x="420" y="70" width="350" height="100"/>
<text class="text-title" x="595" y="95" text-anchor="middle">服务实现层 (Implementation)</text>
<text class="text-code" x="440" y="120">public class DingtalkImDriver</text>
<text class="text-code" x="460" y="138">implements ImDeliveryDriver {</text>
<text class="text-code" x="480" y="156">// 钉钉具体实现</text>
<text class="text-code" x="440" y="174">}</text>

<!-- Arrow -->
<line class="arrow" x1="380" y1="120" x2="420" y2="120"/>
<text class="text" x="400" y="110" text-anchor="middle">implements</text>

<!-- META-INF/services -->
<rect class="box-alt" x="30" y="190" width="740" height="140"/>
<text class="text-title" x="400" y="215" text-anchor="middle">META-INF/services 注册文件</text>
<rect class="box" x="50" y="235" width="700" height="35" fill="#f8fafc"/>
<text class="text-code" x="60" y="255">文件: META-INF/services/net.ooder.spi.im.ImDeliveryDriver</text>
<text class="text-code" x="60" y="272">内容: net.ooder.skill.im.dingding.DingtalkImDriver</text>
<rect class="box" x="50" y="280" width="700" height="35" fill="#f8fafc"/>
<text class="text-code" x="60" y="300">文件: META-INF/services/net.ooder.scene.skill.LlmProvider</text>
<text class="text-code" x="60" y="317">内容: DeepSeekProvider, OpenAiProvider, QianwenProvider</text>

<!-- Runtime Discovery -->
<rect class="box-highlight" x="30" y="345" width="740" height="90"/>
<text class="text-title" x="400" y="370" text-anchor="middle">运行时服务发现流程</text>
<text class="text" x="50" y="395">1. 启动时扫描 META-INF/services 目录</text>
<text class="text" x="50" y="415">2. 读取接口与实现类的映射关系</text>
<text class="text" x="50" y="435">3. 通过反射动态加载实现类</text>

</svg>
