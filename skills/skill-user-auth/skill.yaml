apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-user-auth
  name: User Auth Service
  version: 0.7.3
  description: 用户认证服务，支持多种认证方式
  author: Ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills/tree/main/skills/skill-user-auth
  repository: https://gitee.com/ooderCN/skills.git
  keywords:
    - authentication
    - user
    - login
    - token
    - session

spec:
  type: service-skill
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.user.auth.UserAuthSkillApplication
  
  capabilities:
    - id: user-auth
      name: User Authentication
      description: 用户认证登录
      category: authentication
    - id: token-validate
      name: Token Validation
      description: Token验证
      category: authentication
    - id: session-manage
      name: Session Management
      description: 会话管理
      category: session
  
  scenes:
    - name: auth
      description: 认证场景
      capabilities:
        - user-auth
        - token-validate
        - session-manage
  
  dependencies: []
  
  config:
    optional:
      - name: AUTH_TOKEN_EXPIRE
        type: number
        default: 3600
        description: Token过期时间(秒)
      - name: AUTH_REFRESH_ENABLED
        type: boolean
        default: true
        description: 是否启用Token刷新
  
  endpoints:
    - path: /api/auth/login
      method: POST
      description: 用户登录
      capability: user-auth
    - path: /api/auth/logout
      method: POST
      description: 用户登出
      capability: user-auth
    - path: /api/auth/validate
      method: POST
      description: 验证Token
      capability: token-validate
    - path: /api/auth/refresh
      method: POST
      description: 刷新Token
      capability: token-validate
    - path: /api/session/info
      method: GET
      description: 获取会话信息
      capability: session-manage
    - path: /api/health
      method: GET
      description: 健康检查
  
  resources:
    cpu: "200m"
    memory: "256Mi"
    storage: "100Mi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true
