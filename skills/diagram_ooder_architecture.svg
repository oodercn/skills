<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800px" height="580px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; fill: #334155; }
        .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 10px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<!-- Title -->
<rect class="title-box" x="20" y="15" width="760" height="40" rx="4"/>
<text class="text-header" x="400" y="42" text-anchor="middle">OoderAgent 平台架构</text>

<!-- Top Layer: Scenes, Business, Tools -->
<rect class="box" x="30" y="70" width="230" height="80"/>
<text class="text-title" x="145" y="95" text-anchor="middle">场景层 (Scenes)</text>
<text class="text" x="50" y="120">日报 · 审批 · 知识问答</text>
<text class="text" x="50" y="140">会议纪要 · 入职助手</text>

<rect class="box-alt" x="285" y="70" width="230" height="80"/>
<text class="text-title" x="400" y="95" text-anchor="middle">业务层 (Business)</text>
<text class="text" x="305" y="120">待办 · 流程 · 安全</text>
<text class="text" x="305" y="140">场景管理 · 安装器</text>

<rect class="box" x="540" y="70" width="230" height="80"/>
<text class="text-title" x="655" y="95" text-anchor="middle">工具层 (Tools)</text>
<text class="text" x="560" y="120">日历 · 文档处理</text>
<text class="text" x="560" y="140">技能市场 · 消息推送</text>

<!-- Capabilities Layer -->
<rect class="box-highlight" x="30" y="170" width="740" height="70"/>
<text class="text-title" x="400" y="195" text-anchor="middle">能力层 (Capabilities) - 24个模块</text>
<text class="text" x="50" y="220">通信: Email · IM · MQTT · 群组</text>
<text class="text" x="350" y="220">监控: Health · Monitor · 网络 · 远程终端</text>
<text class="text" x="50" y="235">基础设施: K8s · 托管 · 故障转移 · 负载均衡</text>
<text class="text" x="450" y="235">调度: Quartz · Task · 搜索</text>

<!-- System Layer -->
<rect class="box" x="30" y="255" width="740" height="70"/>
<text class="text-title" x="400" y="280" text-anchor="middle">系统层 (_system) - 32个模块</text>
<text class="text" x="50" y="305">认证 · 审计 · 配置 · 工作流 · RAG · 知识管理</text>
<text class="text" x="50" y="320">消息服务 · 通知 · 租户 · Agent管理 · 菜单 · 字典</text>

<!-- Drivers Layer -->
<rect class="box-alt" x="30" y="340" width="740" height="85"/>
<text class="text-title" x="400" y="365" text-anchor="middle">驱动层 (_drivers) - 37个模块</text>
<text class="text" x="50" y="390">LLM: DeepSeek · OpenAI · 通义千问 · 文心一言 · 火山 · Ollama</text>
<text class="text" x="50" y="408">IM: 钉钉 · 飞书 · 企业微信 · 个人微信</text>
<text class="text" x="50" y="426">媒体: 头条 · 公众号 · 微博 · 小红书 · 知乎</text>

<!-- Base Layer -->
<rect class="box-highlight" x="30" y="440" width="740" height="60"/>
<text class="text-title" x="400" y="465" text-anchor="middle">SPI 基础层 (_base) - 4个核心模块</text>
<text class="text" x="50" y="490">ooder-spi-core · skill-spi-core · skill-spi-llm · skill-spi-messaging</text>

<!-- Arrows -->
<line class="arrow" x1="145" y1="150" x2="145" y2="170"/>
<line class="arrow" x1="400" y1="150" x2="400" y2="170"/>
<line class="arrow" x1="655" y1="150" x2="655" y2="170"/>
<line class="arrow" x1="400" y1="240" x2="400" y2="255"/>
<line class="arrow" x1="400" y1="325" x2="400" y2="340"/>
<line class="arrow" x1="400" y1="425" x2="400" y2="440"/>

</svg>
