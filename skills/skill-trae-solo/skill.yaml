apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-trae-solo
  name: Trae Solo
  version: 0.7.3
  description: 连接实用功能，运行结果通过A2UI节点展示，支持A2UI图转代码技术集成
  author: Ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN/skills/tree/main/skills/skill-trae-solo
  repository: https://gitee.com/ooderCN/skills.git
  keywords:
    - utility
    - integration
    - ui
    - a2ui

spec:
  type: tool-skill
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.traesolo.TraeSoloSkillApplication
  
  capabilities:
    - id: execute-task
      name: Execute Task
      description: 执行任务并返回结果
      category: execution
    - id: get-info
      name: Get Info
      description: 获取技能信息
      category: info
    - id: a2ui-integration
      name: A2UI Integration
      description: A2UI图转代码集成
      category: integration
  
  scenes:
    - name: utility
      description: 实用工具场景
      capabilities:
        - execute-task
        - get-info
        - a2ui-integration
  
  dependencies:
    - id: skill-a2ui
      version: ">=0.7.0"
      required: false
      description: A2UI服务（可选）
  
  config:
    optional:
      - name: TRAE_SOLO_PORT
        type: number
        default: 8085
        description: 服务端口
      - name: A2UI_ENDPOINT
        type: string
        default: http://localhost:8081/api
        description: A2UI服务端点
  
  endpoints:
    - path: /api/info
      method: GET
      description: 获取技能信息
      capability: get-info
    - path: /api/execute
      method: POST
      description: 执行任务
      capability: execute-task
    - path: /api/a2ui/render
      method: POST
      description: A2UI渲染
      capability: a2ui-integration
    - path: /api/health
      method: GET
      description: 健康检查
  
  resources:
    cpu: "500m"
    memory: "512Mi"
    storage: "1Gi"
  
  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: false
