apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-nexus-system-status-nexus-ui
  name: 系统状态
  version: 2.3.0
  description: 系统状态场景能力，显示系统版本、运行时间、资源使用情况、服务状态等
  author: ooder Team
  type: scene-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN
  repository: https://gitee.com/ooderCN/ooder-skills
  keywords:
    - system
    - status
    - monitor
    - scene-capability

spec:
  type: scene-skill
  
  dependencies:
    - id: skill-monitor
      version: ">=2.3.0"
      required: true
      autoInstall: true
      description: "监控服务"
      capabilities:
        - metrics-collect
        - metrics-query
        - observation
        - log-query
        
    - id: skill-health
      version: ">=2.3.0"
      required: false
      autoInstall: false
      description: "健康检查服务（可选）"

  sceneCapabilities:
    - id: scene-system-status
      name: 系统状态场景能力
      type: SCENE
      mainFirst: true
      
      mainFirstConfig:
        selfCheck:
          - checkCapabilities: [system-status-view, metrics-view]
          - checkDriverCapabilities: [intent-receiver, scheduler]
          - checkDependencies: [skill-monitor]
          - onCheckFailed:
              action: degrade
              degradedCapabilities: [metrics-view]
              retry:
                maxAttempts: 3
                delay: 5s
          
        selfStart:
          - installDependencies: auto
          - initDriverCapabilities: [intent-receiver, scheduler]
          - initCapabilities: [system-status-view, metrics-view]
          - bindAddresses: auto
          
        startCollaboration:
          - startScene: scene-health-check
            optional: true
            timeout: 10s
            bindInterface: health-service
          
        selfDrive:
          scheduleRules:
            - trigger: "0/30 * * * * ?"
              action: metrics-collect-flow
            - trigger: "0 */5 * * * ?"
              action: observation-flow
              
          eventRules:
            - event: system.status.request
              action: status-display-flow
            - event: metrics.threshold.exceeded
              action: alert-flow
              
          capabilityChains:
            metrics-collect-flow:
              - capability: metrics-view
                input:
                  action: collect
              - capability: system-status-view
                input:
                  action: update
                  
            observation-flow:
              - capability: metrics-view
                input:
                  action: observe
                  
            status-display-flow:
              - capability: system-status-view
                input:
                  action: display
                  
            alert-flow:
              - capability: system-status-view
                input:
                  action: alert

      capabilities:
        - system-status-view
        - metrics-view
        
      collaborativeCapabilities:
        - capabilityId: scene-health-check
          role: CONSUMER
          interface: health-service
          autoStart: false
          optional: true

  capabilities:
    - id: system-status-view
      name: 查看系统状态
      description: 查看系统运行状态
      category: ui
      type: ATOMIC
      
    - id: metrics-view
      name: 查看指标
      description: 查看系统指标数据
      category: monitoring
      type: ATOMIC
      
    - id: intent-receiver
      name: 意图接收
      description: 接收用户操作意图
      category: driver
      type: DRIVER
      driverType: INTENT_RECEIVER
      
    - id: scheduler
      name: 调度器
      description: 定时采集调度
      category: driver
      type: DRIVER
      driverType: SCHEDULER

  capabilityBindings:
    - sceneCapabilityType: system
      autoBind: true
      capabilities:
        - system-status-view
        - metrics-view

  endpoints:
    - path: /api/nexus/system/status
      method: GET
      description: 获取系统状态
      capability: system-status-view
      
    - path: /api/nexus/system/resources
      method: GET
      description: 获取资源使用情况
      capability: metrics-view
      
    - path: /api/nexus/system/services
      method: GET
      description: 获取服务状态
      capability: system-status-view
      
    - path: /api/nexus/system/metrics
      method: GET
      description: 获取系统指标
      capability: metrics-view

  nexusUi:
    entry:
      page: index.html
      title: 系统状态
      icon: ri-computer-line
      
    menu:
      position: sidebar
      category: nexus
      order: 20
      
    layout:
      type: default
      sidebar: true
      header: true

  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot

  config:
    optional:
      - name: COLLECT_INTERVAL
        type: integer
        default: 30000
        description: 采集间隔（毫秒）
      - name: OBSERVATION_WINDOW
        type: integer
        default: 3600000
        description: 观测时间窗口（毫秒）
      - name: ALERT_ENABLED
        type: boolean
        default: true
        description: 启用告警

  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "10Mi"

  offline:
    enabled: false
