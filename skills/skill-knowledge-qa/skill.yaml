apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-knowledge-qa
  name: 知识问答场景能力包
  version: 2.3.0
  description: 知识问答场景能力，支持知识库管理、文档管理、语义检索、RAG智能问答
  author: ooder Team
  type: scene-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN
  repository: https://gitee.com/ooderCN/ooder-skills
  keywords:
    - knowledge
    - qa
    - rag
    - search
    - scene-capability

spec:
  type: scene-skill
  
  dependencies:
    - id: skill-knowledge-base
      version: ">=1.0.0"
      required: true
      description: "知识库核心服务"
      capabilities:
        - kb-management
        - document-management
        - kb-search
        
    - id: skill-rag
      version: ">=1.0.0"
      required: false
      description: "RAG检索增强（可选）"
      
    - id: skill-llm-assistant
      version: ">=1.0.0"
      required: false
      description: "LLM智能助手（可选）"
      
    - id: skill-indexing
      version: ">=1.0.0"
      required: true
      description: "文档索引服务"

  sceneCapabilities:
    - id: scene-knowledge-qa
      name: 知识问答场景能力
      type: SCENE
      mainFirst: true
      
      mainFirstConfig:
        selfCheck:
          - checkCapabilities: [kb-management, document-management, kb-search]
          - checkDriverCapabilities: [intent-receiver, event-listener]
          - checkCollaborative: [scene-indexing]
          
        selfStart:
          - initDriverCapabilities: [intent-receiver, event-listener, capability-invoker]
          - initCapabilities: [kb-management, document-management, kb-search]
          - bindAddresses: auto
          
        startCollaboration:
          - startScene: scene-indexing
          - bindInterface: indexing-service
          
        selfDrive:
          scheduleRules:
            - trigger: "0 0 * * *"
              action: reindex-flow
              
          eventRules:
            - event: document.uploaded
              condition: "status == 'completed'"
              action: index-document-flow
            - event: knowledge.query
              action: query-knowledge-flow
              
          capabilityChains:
            index-document-flow:
              - capability: document-management
                input:
                  action: parse
              - capability: scene-indexing
                input:
                  action: index
                  
            query-knowledge-flow:
              - capability: kb-search
                input:
                  topK: 10
              - capability: rag-retrieval
                input:
                  context: "${previous.results}"
                  
            reindex-flow:
              - capability: kb-management
                input:
                  action: reindex

      capabilities:
        - kb-management
        - document-management
        - kb-search
        - rag-retrieval
        
      collaborativeCapabilities:
        - capabilityId: scene-indexing
          role: PROVIDER
          interface: indexing-service
          autoStart: true
        - capabilityId: scene-llm-assistant
          role: PROVIDER
          interface: llm-service
          autoStart: false

  capabilities:
    - id: kb-management
      name: 知识库管理
      description: 创建、更新、删除知识库
      category: data
      type: ATOMIC
      
    - id: document-management
      name: 文档管理
      description: 上传、管理知识库文档
      category: data
      type: ATOMIC
      
    - id: kb-search
      name: 知识检索
      description: BM25语义检索
      category: ai
      type: ATOMIC
      
    - id: rag-retrieval
      name: RAG检索
      description: 检索增强生成
      category: ai
      type: COMPOSITE
      
    - id: intent-receiver
      name: 意图接收
      description: 接收用户查询意图
      category: driver
      type: DRIVER
      driverType: INTENT_RECEIVER
      
    - id: event-listener
      name: 事件监听
      description: 监听文档和知识库事件
      category: driver
      type: DRIVER
      driverType: EVENT_LISTENER
      
    - id: capability-invoker
      name: 能力调用
      description: 管理能力调用链
      category: driver
      type: DRIVER
      driverType: CAPABILITY_INVOKER

  capabilityBindings:
    - sceneCapabilityType: knowledge
      autoBind: true
      capabilities:
        - kb-management
        - document-management
        - kb-search
        - rag-retrieval

  endpoints:
    - path: /api/knowledge/bases
      method: GET
      description: 获取知识库列表
      capability: kb-management
      
    - path: /api/knowledge/bases
      method: POST
      description: 创建知识库
      capability: kb-management
      
    - path: /api/knowledge/documents
      method: GET
      description: 获取文档列表
      capability: document-management
      
    - path: /api/knowledge/documents
      method: POST
      description: 上传文档
      capability: document-management
      
    - path: /api/knowledge/search
      method: POST
      description: 知识检索
      capability: kb-search
      
    - path: /api/knowledge/rag
      method: POST
      description: RAG检索
      capability: rag-retrieval

  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.knowledge.KnowledgeQaSkillApplication

  config:
    required:
      - name: STORAGE_PATH
        type: string
        description: 知识库存储路径
        
    optional:
      - name: MAX_DOCUMENT_SIZE
        type: integer
        default: 10485760
        description: 最大文档大小（字节）
      - name: SEARCH_TOP_K
        type: integer
        default: 10
        description: 检索返回数量
      - name: EMBEDDING_MODEL
        type: string
        default: "text-embedding-ada-002"
        description: 嵌入模型

  resources:
    cpu: "500m"
    memory: "512Mi"
    storage: "1Gi"

  offline:
    enabled: true
    cacheStrategy: local
    syncOnReconnect: true
