apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-context
  name: Context Management
  version: 1.0.0
  description: Context Management Skill - Multi-level context management for page navigation and skill switching
  author: ooder

spec:
  entryPoint: net.ooder.skill.context.ContextAutoConfiguration
  dependencies:
    - skill-common

  endpoints:
    - path: /api/v1/context/status
      method: GET
      controllerClass: net.ooder.skill.context.controller.ContextEventController
      methodName: getContextStatus
      description: 获取上下文状态
      capability: context
    - path: /api/v1/context/navigate
      method: POST
      controllerClass: net.ooder.skill.context.controller.ContextEventController
      methodName: onPageNavigate
      description: 页面导航
      capability: context
    - path: /api/v1/context/skill-change
      method: POST
      controllerClass: net.ooder.skill.context.controller.ContextEventController
      methodName: onSkillChange
      description: 技能切换
      capability: context
    - path: /api/v1/context/update
      method: POST
      controllerClass: net.ooder.skill.context.controller.ContextEventController
      methodName: pushContextUpdate
      description: 更新上下文
      capability: context

  apis:
    - /api/v1/context/status
    - /api/v1/context/navigate
    - /api/v1/context/skill-change
    - /api/v1/context/update

  config:
    ooder.context.enabled: true
    ooder.llm.menu-kb.enabled: true
    ooder.llm.menu-kb.kb-id: kb-global-menu
