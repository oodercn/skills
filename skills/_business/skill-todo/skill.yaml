apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-todo
  name: Todo Skill
  version: 1.0.0
  description: Todo Skill - Task and todo management service for scene workbench
  author: ooder Team
  type: business-service
  license: Apache-2.0

spec:
  skillForm: PROVIDER
  type: business-skill

  ownership: tenant

  capability:
    address: 0x41
    category: BIZ
    code: BIZ_TODO
    operations: [create, update, delete, query, assign]

  runtime:
    language: java
    javaVersion: "21"
    framework: spring-boot

  dependencies:
    - skillId: skill-common
      version: ">=1.0.0"
      required: false

  endpoints:
    - path: /api/v1/my/todos
      method: GET
      controllerClass: net.ooder.skill.todo.controller.TodoController
      methodName: listMyTodos
      description: 获取我的待办列表
      capability: query
    - path: /api/v1/my/todos/pending
      method: GET
      controllerClass: net.ooder.skill.todo.controller.TodoController
      methodName: listPendingTodos
      description: 获取待处理的待办
      capability: query
    - path: /api/v1/my/todos/count
      method: GET
      controllerClass: net.ooder.skill.todo.controller.TodoController
      methodName: countByType
      description: 获取待办数量
      capability: query
    - path: /api/v1/my/todos/{todoId}
      method: GET
      controllerClass: net.ooder.skill.todo.controller.TodoController
      methodName: getTodo
      description: 获取待办详情
      capability: query
    - path: /api/v1/my/todos
      method: POST
      controllerClass: net.ooder.skill.todo.controller.TodoController
      methodName: createTodo
      description: 创建待办
      capability: create
    - path: /api/v1/my/todos/{todoId}
      method: PUT
      controllerClass: net.ooder.skill.todo.controller.TodoController
      methodName: updateTodo
      description: 更新待办
      capability: update
    - path: /api/v1/my/todos/{todoId}
      method: DELETE
      controllerClass: net.ooder.skill.todo.controller.TodoController
      methodName: deleteTodo
      description: 删除待办
      capability: delete
    - path: /api/v1/my/todos/{todoId}/complete
      method: POST
      controllerClass: net.ooder.skill.todo.controller.TodoController
      methodName: completeTodo
      description: 完成待办
      capability: update
    - path: /api/v1/my/todos/{todoId}/process
      method: POST
      controllerClass: net.ooder.skill.todo.controller.TodoController
      methodName: processTodo
      description: 处理待办
      capability: update
    - path: /api/v1/my/todos/{todoId}/accept
      method: POST
      controllerClass: net.ooder.skill.todo.controller.TodoController
      methodName: acceptTodo
      description: 接受待办
      capability: update
    - path: /api/v1/my/todos/{todoId}/reject
      method: POST
      controllerClass: net.ooder.skill.todo.controller.TodoController
      methodName: rejectTodo
      description: 拒绝待办
      capability: update

  config:
    optional:
      - name: TODO_CACHE_ENABLED
        type: boolean
        default: true
        description: 是否启用待办缓存

  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "10Mi"
