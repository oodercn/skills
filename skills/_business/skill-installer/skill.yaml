apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-installer
  name: Installer
  version: 1.0.0
  description: Installer Skill - Role installer status tracking service
  author: ooder
  type: business-service
  license: Apache-2.0

spec:
  skillForm: PROVIDER
  type: business-skill

  ownership: tenant

  capability:
    address: 0x44
    category: BIZ
    code: BIZ_INSTALLER
    operations: [status, save]

  runtime:
    language: java
    javaVersion: "21"
    framework: spring-boot

  dependencies:
    - skillId: skill-common
      version: ">=1.0.0"
      required: false

  endpoints:
    - path: /api/v1/installer/status
      method: GET
      controllerClass: net.ooder.skill.installer.controller.InstallerController
      methodName: getStatus
      description: 获取安装状态
      capability: status
    - path: /api/v1/installer/status
      method: POST
      controllerClass: net.ooder.skill.installer.controller.InstallerController
      methodName: saveStatus
      description: 保存安装状态
      capability: save
    - path: /api/v1/installer/status/{loop}
      method: GET
      controllerClass: net.ooder.skill.installer.controller.InstallerController
      methodName: getLoopStatus
      description: 获取指定循环状态
      capability: status

  config:
    optional:
      - name: INSTALLER_ENABLED
        type: boolean
        default: true
        description: 是否启用安装器服务

  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "10Mi"
