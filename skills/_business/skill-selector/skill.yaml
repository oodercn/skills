apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-selector
  name: 选择器服务
  version: 1.0.0
  description: 提供统一的UI组件选择器数据服务
  author: ooder Team
  type: business-service
  license: Apache-2.0

spec:
  skillForm: PROVIDER
  type: business-skill
  
  ownership: platform
  
  capability:
    address: 0x2D
    category: BIZ
    code: BIZ_SELECTOR
    operations: [list]
  
  runtime:
    language: java
    javaVersion: "21"
    framework: spring-boot
  
  dependencies:
    - skillId: skill-common
      version: ">=1.0.0"
      required: true
  
  endpoints:
    - path: /api/v1/selectors/capabilities
      method: GET
      controllerClass: net.ooder.skill.selector.controller.SelectorController
      methodName: getCapabilities
      description: 获取能力选择器数据
      capability: list
    - path: /api/v1/selectors/providers
      method: GET
      controllerClass: net.ooder.skill.selector.controller.SelectorController
      methodName: getProviders
      description: 获取提供商选择器数据
      capability: list
    - path: /api/v1/selectors/capability-types
      method: GET
      controllerClass: net.ooder.skill.selector.controller.SelectorController
      methodName: getCapabilityTypes
      description: 获取能力类型选择器数据
      capability: list
    - path: /api/v1/selectors/org-tree
      method: GET
      controllerClass: net.ooder.skill.selector.controller.SelectorController
      methodName: getOrgTree
      description: 获取组织树选择器数据
      capability: list
    - path: /api/v1/selectors/templates
      method: GET
      controllerClass: net.ooder.skill.selector.controller.SelectorController
      methodName: getTemplates
      description: 获取模板选择器数据
      capability: list
  
  config:
    optional:
      - name: SELECTOR_ENABLED
        type: boolean
        default: "true"
        description: 是否启用选择器服务
  
  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "10Mi"
