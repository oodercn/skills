apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-procedure
  name: 企业流程管理服务
  version: 1.0.0
  description: 提供企业流程管理、分类管理、LLM辅助生成等功能
  author: ooder Team
  type: business-service
  license: Apache-2.0

spec:
  skillForm: PROVIDER
  type: business-skill

  ownership: platform

  capability:
    address: 0x45
    category: BIZ
    code: BIZ_PROCEDURE
    operations: [create, read, update, delete, list, llm-preview, llm-assist]

  runtime:
    language: java
    javaVersion: "21"
    framework: spring-boot

  supportedSceneTypes:
    - all

  dynamicSceneTypes: true

  autoStart:
    enabled: true
    delay: 0s

  autoJoin:
    enabled: true
    matchSceneTypes: true

  capabilities:
    - id: procedure-manage
      name: 流程管理
      description: 企业流程的增删改查
      category: procedure
    - id: llm-assist
      name: LLM辅助
      description: LLM辅助生成和预览流程
      category: ai

  endpoints:
    - path: /api/v1/enterprise-procedures
      method: GET
      controllerClass: net.ooder.skill.procedure.controller.EnterpriseProcedureController
      methodName: listProcedures
      description: 获取流程列表
      capability: procedure-manage
    - path: /api/v1/enterprise-procedures/{id}
      method: GET
      controllerClass: net.ooder.skill.procedure.controller.EnterpriseProcedureController
      methodName: getProcedure
      description: 获取流程详情
      capability: procedure-manage
    - path: /api/v1/enterprise-procedures
      method: POST
      controllerClass: net.ooder.skill.procedure.controller.EnterpriseProcedureController
      methodName: createProcedure
      description: 创建流程
      capability: procedure-manage
    - path: /api/v1/enterprise-procedures/{id}
      method: PUT
      controllerClass: net.ooder.skill.procedure.controller.EnterpriseProcedureController
      methodName: updateProcedure
      description: 更新流程
      capability: procedure-manage
    - path: /api/v1/enterprise-procedures/{id}
      method: DELETE
      controllerClass: net.ooder.skill.procedure.controller.EnterpriseProcedureController
      methodName: deleteProcedure
      description: 删除流程
      capability: procedure-manage
    - path: /api/v1/enterprise-procedures/categories
      method: GET
      controllerClass: net.ooder.skill.procedure.controller.EnterpriseProcedureController
      methodName: getCategories
      description: 获取流程分类
      capability: procedure-manage
    - path: /api/v1/enterprise-procedures/sources
      method: GET
      controllerClass: net.ooder.skill.procedure.controller.EnterpriseProcedureController
      methodName: getSources
      description: 获取流程来源
      capability: procedure-manage
    - path: /api/v1/enterprise-procedures/llm-preview
      method: POST
      controllerClass: net.ooder.skill.procedure.controller.EnterpriseProcedureController
      methodName: llmPreview
      description: LLM预览流程
      capability: llm-assist
    - path: /api/v1/enterprise-procedures/llm-assist
      method: POST
      controllerClass: net.ooder.skill.procedure.controller.EnterpriseProcedureController
      methodName: llmAssist
      description: LLM辅助建议
      capability: llm-assist

  config:
    optional:
      - name: MAX_PROCEDURES
        type: integer
        default: 1000
        description: 最大流程数量

  resources:
    cpu: "50m"
    memory: "64Mi"
    storage: "10Mi"
