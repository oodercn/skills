apiVersion: skill.ooder.net/v1
kind: Skill
metadata:
  name: skill-llm-context-builder
  version: "1.0.0"
  description: LLM上下文构建器 - 上下文提取、合并、Token裁剪
  author: ooder Team
  
spec:
  type: SYSTEM_SERVICE
  category: llm
  
  capabilities:
    - id: context-extraction
      name: 上下文提取
      description: 从多种来源提取上下文信息
      category: context
      
    - id: context-merging
      name: 上下文合并
      description: 按优先级合并多个上下文
      category: context
      
    - id: token-management
      name: Token管理
      description: Token计数和裁剪
      category: context

  config:
    context:
      default:
        maxTokens: 4096
      extractors:
        - type: system
          priority: 10
          enabled: true
        - type: user
          priority: 20
          enabled: true
        - type: scene
          priority: 30
          enabled: true
        - type: query
          priority: 100
          enabled: true
