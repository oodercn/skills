<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function Calling - AI 服务 - Nexus Console</title>
    
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <link rel="stylesheet" href="/console/css/pages/llm-functions.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold" style="display: flex; align-items: center; gap: 8px;">
                    <i class="ri-server-line"></i> Nexus Console
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle>
                        <i class="ri-menu-line"></i>
                    </button>
                    <h2 class="nx-text-lg nx-font-semibold">Function Calling</h2>
                </div>
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle>
                        <i class="ri-sun-line"></i>
                    </button>
                    <button class="nx-btn nx-btn--primary" id="execute-btn">
                        <i class="ri-play-line"></i> 执行
                    </button>
                    <button class="nx-btn nx-btn--secondary" id="clear-btn">
                        <i class="ri-delete-bin-line"></i> 清空
                    </button>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="nx-grid nx-grid-cols-2 nx-gap-6">
                        <div class="nx-card">
                            <div class="nx-card__header">
                                <h3 class="nx-card__title"><i class="ri-code-box-line"></i> 函数定义</h3>
                                <button class="nx-btn nx-btn--ghost nx-btn--sm" id="add-function-btn">
                                    <i class="ri-add-line"></i> 添加函数
                                </button>
                            </div>
                            <div class="nx-card__body">
                                <div class="functions-list" id="functions-list">
                                    <div class="function-card nx-mb-3" data-id="1" style="border:1px solid var(--ns-border);border-radius:8px;padding:16px;">
                                        <div class="nx-flex nx-justify-between nx-items-center nx-mb-3">
                                            <span class="nx-font-semibold function-name">get_weather</span>
                                            <button class="nx-btn nx-btn--ghost nx-btn--sm nx-btn--danger function-delete" title="删除">
                                                <i class="ri-close-line"></i>
                                            </button>
                                        </div>
                                        <div class="nx-form-group">
                                            <label class="nx-label">函数名称</label>
                                            <input type="text" class="nx-input function-name-input" value="get_weather" placeholder="函数名称">
                                        </div>
                                        <div class="nx-form-group">
                                            <label class="nx-label">描述</label>
                                            <input type="text" class="nx-input function-desc-input" value="获取指定城市的天气信息" placeholder="函数描述">
                                        </div>
                                        <div class="nx-form-group">
                                            <label class="nx-label">参数 (JSON Schema)</label>
                                            <textarea class="nx-textarea function-params-input" rows="4" placeholder='{"type": "object", "properties": {...}}'>{
  "type": "object",
  "properties": {
    "city": {
      "type": "string",
      "description": "城市名称"
    }
  },
  "required": ["city"]
}</textarea>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="nx-mt-4">
                                    <label class="nx-label"><i class="ri-chat-3-line"></i> 提示词</label>
                                    <textarea class="nx-textarea" id="prompt-input" rows="4" placeholder="输入你的问题，例如：北京今天天气怎么样？"></textarea>
                                </div>
                            </div>
                        </div>
                        
                        <div>
                            <div class="nx-card nx-mb-4">
                                <div class="nx-card__header">
                                    <h3 class="nx-card__title"><i class="ri-terminal-box-line"></i> 执行结果</h3>
                                    <div class="result-status" id="result-status"></div>
                                </div>
                                <div class="nx-card__body">
                                    <div class="result-placeholder" id="result-placeholder" style="text-align:center;padding:40px;color:var(--ns-secondary);">
                                        <i class="ri-flashlight-line" style="font-size:48px;"></i>
                                        <p class="nx-mt-2">定义函数并输入提示词后点击"执行"</p>
                                    </div>
                                    
                                    <div class="result-content" id="result-content" style="display:none;">
                                        <div class="nx-mb-4">
                                            <div class="nx-text-sm nx-font-semibold nx-mb-2"><i class="ri-user-line"></i> 用户输入</div>
                                            <div class="nx-p-3" style="background:var(--ns-card-bg);border-radius:4px;" id="user-input-display"></div>
                                        </div>
                                        
                                        <div class="nx-mb-4" id="function-call-block" style="display:none;">
                                            <div class="nx-text-sm nx-font-semibold nx-mb-2"><i class="ri-code-line"></i> 函数调用</div>
                                            <div class="nx-p-3" style="background:var(--ns-card-bg);border-radius:4px;font-family:monospace;" id="function-call-display"></div>
                                        </div>
                                        
                                        <div class="nx-mb-4" id="function-result-block" style="display:none;">
                                            <div class="nx-text-sm nx-font-semibold nx-mb-2"><i class="ri-database-2-line"></i> 函数返回</div>
                                            <div class="nx-p-3" style="background:var(--ns-card-bg);border-radius:4px;font-family:monospace;" id="function-result-display"></div>
                                        </div>
                                        
                                        <div>
                                            <div class="nx-text-sm nx-font-semibold nx-mb-2"><i class="ri-robot-line"></i> AI 响应</div>
                                            <div class="nx-p-3" style="background:var(--ns-card-bg);border-radius:4px;" id="ai-response"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="nx-card">
                                <div class="nx-card__header">
                                    <h3 class="nx-card__title"><i class="ri-history-line"></i> 执行历史</h3>
                                    <button class="nx-btn nx-btn--ghost nx-btn--sm" id="clear-history-btn">
                                        <i class="ri-delete-bin-line"></i> 清空
                                    </button>
                                </div>
                                <div class="nx-card__body">
                                    <div class="history-list" id="history-list">
                                        <p style="color:var(--ns-secondary);text-align:center;">暂无历史记录</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/nexus-menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/api.js"></script>
    <script src="/console/js/pages/llm-functions.js"></script>
</body>
</html>
