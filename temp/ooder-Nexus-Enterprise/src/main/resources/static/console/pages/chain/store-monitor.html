<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>门店监控 - 连锁运营 - eNexus Enterprise</title>
    <link rel="stylesheet" href="/console/css/common.css">
    <link rel="stylesheet" href="/console/css/dashboard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>eNexus Enterprise</h2>
                <span class="version">SDK 2.3</span>
            </div>
            <nav id="nav-menu"></nav>
        </div>
        <div class="main-content">
            <header class="top-bar">
                <div class="breadcrumb">
                    <span>连锁运营</span>
                    <span class="separator">/</span>
                    <span>门店监控</span>
                </div>
                <div class="user-info">
                    <span class="user-name">管理员</span>
                    <i class="ri-user-line"></i>
                </div>
            </header>
            <div class="content-area">
                <div class="page-header">
                    <h1><i class="ri-store-2-line"></i> 门店监控</h1>
                    <p class="page-description">实时监控各门店运营状态，查看销售数据、客流统计和库存情况</p>
                </div>
                
                <div class="metrics-panel">
                    <div class="metrics-header">
                        <h3>门店概览</h3>
                    </div>
                    <div class="metrics-grid">
                        <div class="metric-item">
                            <div class="metric-icon" style="background-color: rgba(46, 204, 113, 0.1);">
                                <i class="ri-store-line" style="color: #2ecc71;"></i>
                            </div>
                            <div class="metric-info">
                                <span class="metric-value">156</span>
                                <span class="metric-label">营业门店</span>
                            </div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-icon" style="background-color: rgba(52, 152, 219, 0.1);">
                                <i class="ri-money-cny-circle-line" style="color: #3498db;"></i>
                            </div>
                            <div class="metric-info">
                                <span class="metric-value">¥2.8M</span>
                                <span class="metric-label">今日销售额</span>
                            </div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-icon" style="background-color: rgba(241, 196, 15, 0.1);">
                                <i class="ri-user-line" style="color: #f1c40f;"></i>
                            </div>
                            <div class="metric-info">
                                <span class="metric-value">12,450</span>
                                <span class="metric-label">今日客流</span>
                            </div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-icon" style="background-color: rgba(155, 89, 182, 0.1);">
                                <i class="ri-alert-line" style="color: #9b59b6;"></i>
                            </div>
                            <div class="metric-info">
                                <span class="metric-value">3</span>
                                <span class="metric-label">异常门店</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-header">
                        <h3><i class="ri-list-check"></i> 门店列表</h3>
                    </div>
                    <div class="panel-body">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>门店名称</th>
                                    <th>区域</th>
                                    <th>状态</th>
                                    <th>今日销售</th>
                                    <th>客流</th>
                                    <th>库存预警</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>北京朝阳店</td>
                                    <td>华北区</td>
                                    <td><span class="status-badge success">营业中</span></td>
                                    <td>¥128,500</td>
                                    <td>856</td>
                                    <td><span class="status-badge success">正常</span></td>
                                </tr>
                                <tr>
                                    <td>上海浦东店</td>
                                    <td>华东区</td>
                                    <td><span class="status-badge success">营业中</span></td>
                                    <td>¥156,200</td>
                                    <td>1,024</td>
                                    <td><span class="status-badge warning">低库存</span></td>
                                </tr>
                                <tr>
                                    <td>广州天河店</td>
                                    <td>华南区</td>
                                    <td><span class="status-badge danger">异常</span></td>
                                    <td>¥45,600</td>
                                    <td>312</td>
                                    <td><span class="status-badge danger">缺货</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/nexus-menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            await initMenu();
        });
    </script>
</body>
</html>
