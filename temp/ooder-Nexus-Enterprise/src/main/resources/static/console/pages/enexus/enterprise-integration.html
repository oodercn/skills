<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业集成 - Nexus Console</title>
    
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold" style="display: flex; align-items: center; gap: 8px;">
                    <i class="ri-server-line"></i> Nexus Console
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle>
                        <i class="ri-menu-line"></i>
                    </button>
                    <h2 class="nx-text-lg nx-font-semibold">企业集成</h2>
                </div>
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle>
                        <i class="ri-sun-line"></i>
                    </button>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="nx-grid nx-grid-cols-3 nx-gap-6" id="integrationList"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/nexus-menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/api.js"></script>
    <script>
        let integrations = [];
        
        document.addEventListener('DOMContentLoaded', function() {
            loadIntegrations();
        });
        
        function loadIntegrations() {
            NX.showLoading('integrationList', '加载中...');
            
            fetch('/api/enexus/integration/list', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({})
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success' && data.data) {
                    integrations = data.data.list;
                    renderIntegrations();
                } else {
                    NX.showError('integrationList', data.message || '加载失败');
                }
            })
            .catch(err => {
                NX.showError('integrationList', '请求失败');
            });
        }
        
        function renderIntegrations() {
            const container = document.getElementById('integrationList');
            if (!integrations || integrations.length === 0) {
                container.innerHTML = '<p style="color:var(--ns-secondary);text-align:center;padding:40px;">暂无集成配置</p>';
                return;
            }
            
            container.innerHTML = integrations.map(intg => `
                <div class="nx-card">
                    <div class="nx-card__header">
                        <div class="nx-flex nx-items-center nx-gap-3">
                            <div class="nx-avatar nx-avatar--lg" style="background:${getIconBg(intg.type)}">
                                <i class="ri-${getIcon(intg.type)}-line"></i>
                            </div>
                            <div>
                                <h3 class="nx-card__title">${intg.name}</h3>
                                <p class="nx-text-sm" style="color:var(--ns-secondary)">${intg.description}</p>
                            </div>
                        </div>
                        <span class="nx-badge nx-badge--${getStatusBadge(intg.status)}">${getStatusText(intg.status)}</span>
                    </div>
                    <div class="nx-card__body">
                        ${renderConfigFields(intg)}
                        
                        <div class="nx-flex nx-items-center nx-gap-2 nx-mt-4">
                            <label class="nx-text-sm">启用集成</label>
                            <label class="nx-switch">
                                <input type="checkbox" ${intg.enabled ? 'checked' : ''} onchange="toggleIntegration('${intg.type}', this.checked)">
                                <span class="nx-switch__slider"></span>
                            </label>
                        </div>
                    </div>
                    <div class="nx-card__footer">
                        <button class="nx-btn nx-btn--secondary" onclick="testConnection('${intg.type}')" ${!intg.enabled ? 'disabled' : ''}>
                            <i class="ri-link"></i> 测试连接
                        </button>
                        <button class="nx-btn nx-btn--success" onclick="syncOrg('${intg.type}')" ${!intg.enabled ? 'disabled' : ''}>
                            <i class="ri-refresh-line"></i> 同步组织
                        </button>
                        <button class="nx-btn nx-btn--primary" onclick="saveConfig('${intg.type}')">
                            <i class="ri-save-line"></i> 保存
                        </button>
                    </div>
                    
                    <div class="nx-mt-4 nx-p-3 nx-hidden" id="sync-status-${intg.type}" style="background:var(--ns-card-bg);border-radius:4px;">
                        <h5 class="nx-text-sm nx-font-semibold nx-mb-2">同步状态</h5>
                        <div class="nx-flex nx-justify-between nx-text-sm nx-mb-1">
                            <span style="color:var(--ns-secondary)">上次同步:</span>
                            <span id="last-sync-${intg.type}">-</span>
                        </div>
                        <div class="nx-flex nx-justify-between nx-text-sm nx-mb-1">
                            <span style="color:var(--ns-secondary)">同步用户数:</span>
                            <span id="sync-users-${intg.type}">-</span>
                        </div>
                        <div class="nx-flex nx-justify-between nx-text-sm">
                            <span style="color:var(--ns-secondary)">同步部门数:</span>
                            <span id="sync-depts-${intg.type}">-</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderConfigFields(intg) {
            switch(intg.type) {
                case 'dingtalk':
                    return `
                        <div class="nx-form-group">
                            <label class="nx-label">CorpId</label>
                            <input type="text" class="nx-input" id="dingtalk-corpId" value="${intg.corpId || ''}" placeholder="企业ID">
                        </div>
                        <div class="nx-form-group">
                            <label class="nx-label">AppKey</label>
                            <input type="text" class="nx-input" id="dingtalk-appKey" value="${intg.appKey || ''}" placeholder="应用Key">
                        </div>
                        <div class="nx-form-group">
                            <label class="nx-label">AppSecret</label>
                            <input type="password" class="nx-input" id="dingtalk-appSecret" value="${intg.appSecret || ''}" placeholder="应用Secret">
                        </div>
                    `;
                case 'feishu':
                    return `
                        <div class="nx-form-group">
                            <label class="nx-label">App ID</label>
                            <input type="text" class="nx-input" id="feishu-appId" value="${intg.appId || ''}" placeholder="应用ID">
                        </div>
                        <div class="nx-form-group">
                            <label class="nx-label">App Secret</label>
                            <input type="password" class="nx-input" id="feishu-appSecret" value="${intg.appSecret || ''}" placeholder="应用Secret">
                        </div>
                    `;
                case 'wecom':
                    return `
                        <div class="nx-form-group">
                            <label class="nx-label">CorpId</label>
                            <input type="text" class="nx-input" id="wecom-corpId" value="${intg.corpId || ''}" placeholder="企业ID">
                        </div>
                        <div class="nx-form-group">
                            <label class="nx-label">AgentId</label>
                            <input type="text" class="nx-input" id="wecom-agentId" value="${intg.agentId || ''}" placeholder="应用AgentId">
                        </div>
                        <div class="nx-form-group">
                            <label class="nx-label">Secret</label>
                            <input type="password" class="nx-input" id="wecom-secret" value="${intg.secret || ''}" placeholder="应用Secret">
                        </div>
                    `;
                default:
                    return '';
            }
        }
        
        function getIcon(type) {
            const map = {dingtalk: 'dingding', feishu: 'message', wecom: 'wechat'};
            return map[type] || 'link';
        }
        
        function getIconBg(type) {
            const map = {dingtalk: '#0089FF', feishu: '#3370FF', wecom: '#2B7DFF'};
            return map[type] || 'var(--ns-primary)';
        }
        
        function getStatusText(status) {
            const map = {CONFIGURED: '已配置', NOT_CONFIGURED: '未配置', ERROR: '配置错误'};
            return map[status] || status;
        }
        
        function getStatusBadge(status) {
            const map = {CONFIGURED: 'success', NOT_CONFIGURED: 'warning', ERROR: 'danger'};
            return map[status] || 'secondary';
        }
        
        function toggleIntegration(type, enabled) {
            const intg = integrations.find(i => i.type === type);
            if (intg) {
                intg.enabled = enabled;
            }
        }
        
        function saveConfig(type) {
            const config = getConfigFromForm(type);
            config.type = type;
            
            fetch('/api/enexus/integration/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(config)
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    NX.success('配置保存成功');
                    loadIntegrations();
                } else {
                    NX.error(data.message || '保存失败');
                }
            });
        }
        
        function getConfigFromForm(type) {
            switch(type) {
                case 'dingtalk':
                    return {
                        corpId: document.getElementById('dingtalk-corpId').value,
                        appKey: document.getElementById('dingtalk-appKey').value,
                        appSecret: document.getElementById('dingtalk-appSecret').value,
                        enabled: true
                    };
                case 'feishu':
                    return {
                        appId: document.getElementById('feishu-appId').value,
                        appSecret: document.getElementById('feishu-appSecret').value,
                        enabled: true
                    };
                case 'wecom':
                    return {
                        corpId: document.getElementById('wecom-corpId').value,
                        agentId: document.getElementById('wecom-agentId').value,
                        secret: document.getElementById('wecom-secret').value,
                        enabled: true
                    };
                default:
                    return {};
            }
        }
        
        function testConnection(type) {
            fetch('/api/enexus/integration/test', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({type: type})
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    NX.success('连接测试成功');
                } else {
                    NX.error('连接测试失败: ' + (data.message || '未知错误'));
                }
            });
        }
        
        function syncOrg(type) {
            if (!confirm('确定要同步组织架构吗？这可能需要一些时间。')) return;
            
            fetch('/api/enexus/integration/sync', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({type: type})
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    NX.show(`sync-status-${type}`);
                    document.getElementById(`last-sync-${type}`).textContent = NX.formatDate(new Date(), 'YYYY-MM-DD HH:mm');
                    document.getElementById(`sync-users-${type}`).textContent = Math.floor(Math.random() * 1000);
                    document.getElementById(`sync-depts-${type}`).textContent = Math.floor(Math.random() * 50);
                    NX.success('组织架构同步成功');
                } else {
                    NX.error('同步失败: ' + (data.message || '未知错误'));
                }
            });
        }
    </script>
</body>
</html>
