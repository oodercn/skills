<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - Nexus Console</title>
    
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold" style="display: flex; align-items: center; gap: 8px;">
                    <i class="ri-server-line"></i> Nexus Console
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle>
                        <i class="ri-menu-line"></i>
                    </button>
                    <h2 class="nx-text-lg nx-font-semibold">用户管理</h2>
                </div>
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle>
                        <i class="ri-sun-line"></i>
                    </button>
                    <button class="nx-btn nx-btn--primary" onclick="showCreateModal()">
                        <i class="ri-user-add-line"></i> 新建用户
                    </button>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="nx-grid nx-grid-cols-4 nx-mb-6">
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--primary">
                                <i class="ri-user-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">总用户数</div>
                                <div class="nx-stat-card__value" id="totalCount">-</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--success">
                                <i class="ri-user-follow-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">活跃用户</div>
                                <div class="nx-stat-card__value" id="activeCount">-</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--warning">
                                <i class="ri-user-unfollow-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">未激活</div>
                                <div class="nx-stat-card__value" id="inactiveCount">-</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--info">
                                <i class="ri-team-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">部门数</div>
                                <div class="nx-stat-card__value" id="deptCount">-</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="nx-card nx-mb-6">
                        <div class="nx-card__body">
                            <div class="nx-flex nx-gap-3 nx-items-center">
                                <input type="text" class="nx-input" id="searchInput" placeholder="搜索用户名或昵称..." style="flex:1">
                                <select class="nx-select" id="statusFilter">
                                    <option value="">全部状态</option>
                                    <option value="ACTIVE">正常</option>
                                    <option value="INACTIVE">未激活</option>
                                    <option value="DISABLED">已禁用</option>
                                </select>
                                <button class="nx-btn nx-btn--primary" onclick="loadUsers()">
                                    <i class="ri-search-line"></i> 查询
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="nx-card">
                        <div class="nx-card__header">
                            <h3 class="nx-card__title">用户列表</h3>
                        </div>
                        <div class="nx-card__body nx-p-0">
                            <table class="nx-table">
                                <thead>
                                    <tr>
                                        <th>用户名</th>
                                        <th>昵称</th>
                                        <th>邮箱</th>
                                        <th>部门</th>
                                        <th>状态</th>
                                        <th>创建时间</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="userTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="nx-modal" id="userModal">
        <div class="nx-modal__content" style="width: 500px;">
            <div class="nx-modal__header">
                <h3 class="nx-modal__title" id="modalTitle">新建用户</h3>
                <button class="nx-btn nx-btn--ghost nx-btn--icon" onclick="closeModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="nx-modal__body">
                <form id="userForm">
                    <input type="hidden" id="editUserId">
                    <div class="nx-form-group">
                        <label class="nx-label">用户名 *</label>
                        <input type="text" class="nx-input" id="formUsername" required>
                    </div>
                    <div class="nx-form-group" id="passwordGroup">
                        <label class="nx-label">密码 *</label>
                        <input type="password" class="nx-input" id="formPassword">
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-label">昵称</label>
                        <input type="text" class="nx-input" id="formNickname">
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-label">邮箱</label>
                        <input type="email" class="nx-input" id="formEmail">
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-label">手机号</label>
                        <input type="text" class="nx-input" id="formPhone">
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-label">部门</label>
                        <input type="text" class="nx-input" id="formDepartment">
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-label">状态</label>
                        <select class="nx-select" id="formStatus">
                            <option value="ACTIVE">正常</option>
                            <option value="INACTIVE">未激活</option>
                            <option value="DISABLED">已禁用</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="nx-modal__footer">
                <button class="nx-btn nx-btn--secondary" onclick="closeModal()">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="saveUser()">保存</button>
            </div>
        </div>
    </div>
    
    <div class="nx-modal" id="roleModal">
        <div class="nx-modal__content" style="width: 500px;">
            <div class="nx-modal__header">
                <h3 class="nx-modal__title">分配角色</h3>
                <button class="nx-btn nx-btn--ghost nx-btn--icon" onclick="closeRoleModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="nx-modal__body">
                <div id="roleCheckboxGroup"></div>
            </div>
            <div class="nx-modal__footer">
                <button class="nx-btn nx-btn--secondary" onclick="closeRoleModal()">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="saveUserRoles()">保存</button>
            </div>
        </div>
    </div>

    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/nexus-menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/api.js"></script>
    <script>
        let currentUser = null;
        let allRoles = [];
        
        document.addEventListener('DOMContentLoaded', function() {
            loadUsers();
            loadRoles();
        });
        
        function loadUsers() {
            const params = {
                keyword: document.getElementById('searchInput').value,
                status: document.getElementById('statusFilter').value
            };
            
            NX.showLoading('userTableBody', '加载中...');
            
            fetch('/api/enexus/user/list', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(params)
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success' && data.data) {
                    renderUserTable(data.data.list);
                    updateStats(data.data.list);
                } else {
                    NX.showError('userTableBody', data.message || '加载失败');
                }
            })
            .catch(err => {
                NX.showError('userTableBody', '请求失败');
            });
        }
        
        function updateStats(users) {
            const total = users.length;
            const active = users.filter(u => u.status === 'ACTIVE').length;
            const inactive = users.filter(u => u.status === 'INACTIVE').length;
            const depts = [...new Set(users.map(u => u.department).filter(Boolean))].length;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('activeCount').textContent = active;
            document.getElementById('inactiveCount').textContent = inactive;
            document.getElementById('deptCount').textContent = depts;
        }
        
        function renderUserTable(users) {
            const tbody = document.getElementById('userTableBody');
            if (!users || users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="nx-text-center nx-py-8" style="color:var(--ns-secondary)">暂无数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = users.map(user => `
                <tr class="${currentUser && currentUser.userId === user.userId ? 'nx-table__row--selected' : ''}">
                    <td>
                        <div class="nx-flex nx-items-center nx-gap-2">
                            <div class="nx-avatar nx-avatar--sm">${(user.nickname || user.username || 'U').charAt(0).toUpperCase()}</div>
                            ${user.username}
                        </div>
                    </td>
                    <td>${user.nickname || '-'}</td>
                    <td>${user.email || '-'}</td>
                    <td>${user.department || '-'}</td>
                    <td><span class="nx-badge nx-badge--${getStatusBadge(user.status)}">${getStatusText(user.status)}</span></td>
                    <td>${NX.formatDate(user.createdAt, 'YYYY-MM-DD HH:mm')}</td>
                    <td>
                        <div class="nx-flex nx-gap-2">
                            <button class="nx-btn nx-btn--ghost nx-btn--sm" onclick="editUser('${user.userId}')" title="编辑">
                                <i class="ri-edit-line"></i>
                            </button>
                            <button class="nx-btn nx-btn--ghost nx-btn--sm" onclick="showRoleModal('${user.userId}')" title="分配角色">
                                <i class="ri-user-settings-line"></i>
                            </button>
                            <button class="nx-btn nx-btn--ghost nx-btn--sm nx-btn--danger" onclick="deleteUser('${user.userId}')" title="删除">
                                <i class="ri-delete-bin-line"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        
        function loadRoles() {
            fetch('/api/enexus/user/role/list', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({})
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success' && data.data) {
                    allRoles = data.data;
                }
            });
        }
        
        function showCreateModal() {
            document.getElementById('modalTitle').textContent = '新建用户';
            document.getElementById('editUserId').value = '';
            document.getElementById('userForm').reset();
            NX.show('passwordGroup');
            document.getElementById('formPassword').required = true;
            NX.modal.open('userModal');
        }
        
        function editUser(userId) {
            fetch('/api/enexus/user/get', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({userId: userId})
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success' && data.data) {
                    const user = data.data;
                    document.getElementById('modalTitle').textContent = '编辑用户';
                    document.getElementById('editUserId').value = user.userId;
                    document.getElementById('formUsername').value = user.username;
                    document.getElementById('formNickname').value = user.nickname || '';
                    document.getElementById('formEmail').value = user.email || '';
                    document.getElementById('formPhone').value = user.phone || '';
                    document.getElementById('formDepartment').value = user.department || '';
                    document.getElementById('formStatus').value = user.status;
                    NX.hide('passwordGroup');
                    document.getElementById('formPassword').required = false;
                    NX.modal.open('userModal');
                }
            });
        }
        
        function closeModal() {
            NX.modal.close('userModal');
        }
        
        function saveUser() {
            const userId = document.getElementById('editUserId').value;
            const params = {
                username: document.getElementById('formUsername').value,
                nickname: document.getElementById('formNickname').value,
                email: document.getElementById('formEmail').value,
                phone: document.getElementById('formPhone').value,
                department: document.getElementById('formDepartment').value,
                status: document.getElementById('formStatus').value
            };
            
            const url = userId ? '/api/enexus/user/update' : '/api/enexus/user/create';
            if (userId) {
                params.userId = userId;
            } else {
                params.password = document.getElementById('formPassword').value;
            }
            
            fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(params)
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    closeModal();
                    loadUsers();
                    NX.success(userId ? '用户更新成功' : '用户创建成功');
                } else {
                    NX.error(data.message || '操作失败');
                }
            });
        }
        
        function deleteUser(userId) {
            if (!confirm('确定要删除该用户吗？')) return;
            
            fetch('/api/enexus/user/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({userId: userId})
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    loadUsers();
                    NX.success('用户删除成功');
                } else {
                    NX.error(data.message || '删除失败');
                }
            });
        }
        
        function showRoleModal(userId) {
            fetch('/api/enexus/user/get', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({userId: userId})
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success' && data.data) {
                    currentUser = data.data;
                    const userRoleIds = (currentUser.roles || []).map(r => r.roleId);
                    const html = allRoles.map(role => `
                        <label class="nx-checkbox nx-mb-2">
                            <input type="checkbox" value="${role.roleId}" ${userRoleIds.includes(role.roleId) ? 'checked' : ''}>
                            <span>${role.roleName} (${role.roleCode})</span>
                        </label>
                    `).join('');
                    document.getElementById('roleCheckboxGroup').innerHTML = html;
                    NX.modal.open('roleModal');
                }
            });
        }
        
        function closeRoleModal() {
            NX.modal.close('roleModal');
        }
        
        function saveUserRoles() {
            const checkboxes = document.querySelectorAll('#roleCheckboxGroup input[type="checkbox"]:checked');
            const roleIds = Array.from(checkboxes).map(cb => cb.value);
            
            fetch('/api/enexus/user/role/assign', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({userId: currentUser.userId, roleIds: roleIds})
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    closeRoleModal();
                    NX.success('角色分配成功');
                } else {
                    NX.error(data.message || '操作失败');
                }
            });
        }
        
        function getStatusText(status) {
            const map = {ACTIVE: '正常', INACTIVE: '未激活', DISABLED: '已禁用'};
            return map[status] || status;
        }
        
        function getStatusBadge(status) {
            const map = {ACTIVE: 'success', INACTIVE: 'warning', DISABLED: 'danger'};
            return map[status] || 'secondary';
        }
    </script>
</body>
</html>
