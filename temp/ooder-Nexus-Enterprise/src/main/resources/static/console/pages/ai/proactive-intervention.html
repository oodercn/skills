<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主动介入 - AI智能介入 - eNexus Enterprise</title>
    <link rel="stylesheet" href="/console/css/common.css">
    <link rel="stylesheet" href="/console/css/dashboard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>eNexus Enterprise</h2>
                <span class="version">SDK 2.3</span>
            </div>
            <nav id="nav-menu"></nav>
        </div>
        <div class="main-content">
            <header class="top-bar">
                <div class="breadcrumb">
                    <span>AI智能介入</span>
                    <span class="separator">/</span>
                    <span>主动介入</span>
                </div>
                <div class="user-info">
                    <span class="user-name">管理员</span>
                    <i class="ri-user-line"></i>
                </div>
            </header>
            <div class="content-area">
                <div class="page-header">
                    <h1><i class="ri-lightbulb-line"></i> 主动介入</h1>
                    <p class="page-description">AI主动发现异常、预测趋势、提供优化建议</p>
                </div>
                
                <div class="metrics-panel">
                    <div class="metrics-header">
                        <h3>AI介入统计</h3>
                    </div>
                    <div class="metrics-grid">
                        <div class="metric-item">
                            <div class="metric-icon" style="background-color: rgba(231, 76, 60, 0.1);">
                                <i class="ri-error-warning-line" style="color: #e74c3c;"></i>
                            </div>
                            <div class="metric-info">
                                <span class="metric-value">12</span>
                                <span class="metric-label">今日异常检测</span>
                            </div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-icon" style="background-color: rgba(52, 152, 219, 0.1);">
                                <i class="ri-line-chart-line" style="color: #3498db;"></i>
                            </div>
                            <div class="metric-info">
                                <span class="metric-value">8</span>
                                <span class="metric-label">趋势预测</span>
                            </div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-icon" style="background-color: rgba(46, 204, 113, 0.1);">
                                <i class="ri-magic-line" style="color: #2ecc71;"></i>
                            </div>
                            <div class="metric-info">
                                <span class="metric-value">15</span>
                                <span class="metric-label">优化建议</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-header">
                        <h3><i class="ri-robot-line"></i> AI介入记录</h3>
                    </div>
                    <div class="panel-body">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>时间</th>
                                    <th>类型</th>
                                    <th>描述</th>
                                    <th>置信度</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>2024-02-25 14:30</td>
                                    <td><span class="status-badge danger">异常检测</span></td>
                                    <td>检测到生产四部效率异常下降</td>
                                    <td>95%</td>
                                    <td><span class="status-badge warning">处理中</span></td>
                                </tr>
                                <tr>
                                    <td>2024-02-25 12:15</td>
                                    <td><span class="status-badge info">趋势预测</span></td>
                                    <td>预测下周销售将增长15%</td>
                                    <td>88%</td>
                                    <td><span class="status-badge success">已确认</span></td>
                                </tr>
                                <tr>
                                    <td>2024-02-25 10:00</td>
                                    <td><span class="status-badge success">优化建议</span></td>
                                    <td>建议调整生产三部排班计划</td>
                                    <td>92%</td>
                                    <td><span class="status-badge success">已采纳</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/nexus-menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            await initMenu();
        });
    </script>
</body>
</html>
