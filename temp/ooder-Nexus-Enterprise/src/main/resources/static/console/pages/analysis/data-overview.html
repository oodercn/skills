<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据概览 - 数据分析 - eNexus Enterprise</title>
    <link rel="stylesheet" href="/console/css/common.css">
    <link rel="stylesheet" href="/console/css/dashboard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>eNexus Enterprise</h2>
                <span class="version">SDK 2.3</span>
            </div>
            <nav id="nav-menu"></nav>
        </div>
        <div class="main-content">
            <header class="top-bar">
                <div class="breadcrumb">
                    <span>数据分析</span>
                    <span class="separator">/</span>
                    <span>数据概览</span>
                </div>
                <div class="user-info">
                    <span class="user-name">管理员</span>
                    <i class="ri-user-line"></i>
                </div>
            </header>
            <div class="content-area">
                <div class="page-header">
                    <h1><i class="ri-dashboard-2-line"></i> 数据概览</h1>
                    <p class="page-description">全面展示企业运营数据，提供多维度数据分析</p>
                </div>
                
                <div class="metrics-panel">
                    <div class="metrics-header">
                        <h3>核心指标</h3>
                    </div>
                    <div class="metrics-grid">
                        <div class="metric-item">
                            <div class="metric-icon" style="background-color: rgba(46, 204, 113, 0.1);">
                                <i class="ri-money-cny-circle-line" style="color: #2ecc71;"></i>
                            </div>
                            <div class="metric-info">
                                <span class="metric-value">¥12.8M</span>
                                <span class="metric-label">本月营收</span>
                            </div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-icon" style="background-color: rgba(52, 152, 219, 0.1);">
                                <i class="ri-user-line" style="color: #3498db;"></i>
                            </div>
                            <div class="metric-info">
                                <span class="metric-value">156,000</span>
                                <span class="metric-label">活跃用户</span>
                            </div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-icon" style="background-color: rgba(241, 196, 15, 0.1);">
                                <i class="ri-shopping-cart-line" style="color: #f1c40f;"></i>
                            </div>
                            <div class="metric-info">
                                <span class="metric-value">45,200</span>
                                <span class="metric-label">订单数</span>
                            </div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-icon" style="background-color: rgba(155, 89, 182, 0.1);">
                                <i class="ri-percent-line" style="color: #9b59b6;"></i>
                            </div>
                            <div class="metric-info">
                                <span class="metric-value">23.5%</span>
                                <span class="metric-label">转化率</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="content-grid">
                    <div class="panel">
                        <div class="panel-header">
                            <h3><i class="ri-pie-chart-line"></i> 业务分布</h3>
                        </div>
                        <div class="panel-body">
                            <div id="distribution-chart" style="height: 250px;"></div>
                        </div>
                    </div>
                    <div class="panel">
                        <div class="panel-header">
                            <h3><i class="ri-bar-chart-line"></i> 增长趋势</h3>
                        </div>
                        <div class="panel-body">
                            <div id="growth-chart" style="height: 250px;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/nexus-menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            await initMenu();
        });
    </script>
</body>
</html>
