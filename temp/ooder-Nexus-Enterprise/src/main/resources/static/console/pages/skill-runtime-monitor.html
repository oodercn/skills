<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill 运行时监控 - Nexus Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        .skill-card {
            transition: all 0.3s ease;
        }
        .skill-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .status-badge {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .event-item {
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .timeline-line {
            position: absolute;
            left: 15px;
            top: 30px;
            bottom: 0;
            width: 2px;
            background: #e5e7eb;
        }
        .metric-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .metric-card.success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .metric-card.warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .metric-card.info {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 顶部导航 -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <i class="fas fa-heartbeat text-blue-600 text-2xl mr-3"></i>
                    <h1 class="text-xl font-bold text-gray-800">Skill 运行时监控中心</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="connectionStatus" class="flex items-center text-sm">
                        <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
                        实时监控中
                    </span>
                    <button onclick="refreshData()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                        <i class="fas fa-sync-alt mr-2"></i>刷新
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-6">
        <!-- 指标卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
            <div class="metric-card info rounded-xl p-6 text-white">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm opacity-80">监控中的 Skills</p>
                        <p id="totalSkills" class="text-3xl font-bold">0</p>
                    </div>
                    <i class="fas fa-cubes text-4xl opacity-50"></i>
                </div>
            </div>
            <div class="metric-card success rounded-xl p-6 text-white">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm opacity-80">运行中</p>
                        <p id="runningSkills" class="text-3xl font-bold">0</p>
                    </div>
                    <i class="fas fa-play-circle text-4xl opacity-50"></i>
                </div>
            </div>
            <div class="metric-card warning rounded-xl p-6 text-white">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm opacity-80">异常/错误</p>
                        <p id="errorSkills" class="text-3xl font-bold">0</p>
                    </div>
                    <i class="fas fa-exclamation-triangle text-4xl opacity-50"></i>
                </div>
            </div>
            <div class="metric-card rounded-xl p-6 text-white">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm opacity-80">总事件数</p>
                        <p id="totalEvents" class="text-3xl font-bold">0</p>
                    </div>
                    <i class="fas fa-bolt text-4xl opacity-50"></i>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Skill 列表 -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-semibold text-gray-800">
                            <i class="fas fa-list text-blue-600 mr-2"></i>Skill 状态列表
                        </h2>
                        <div class="flex space-x-2">
                            <select id="statusFilter" onchange="filterSkills()" class="border rounded-lg px-3 py-1 text-sm">
                                <option value="">全部状态</option>
                                <option value="STARTED">运行中</option>
                                <option value="STOPPED">已停止</option>
                                <option value="ERROR_OCCURRED">异常</option>
                            </select>
                        </div>
                    </div>
                    <div id="skillList" class="space-y-3">
                        <!-- Skill 卡片将动态插入这里 -->
                    </div>
                </div>
            </div>

            <!-- 实时事件流 -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-semibold text-gray-800">
                            <i class="fas fa-stream text-green-600 mr-2"></i>实时事件流
                        </h2>
                        <button onclick="clearEvents()" class="text-sm text-gray-500 hover:text-red-500">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    <div id="eventStream" class="space-y-2 max-h-96 overflow-y-auto">
                        <!-- 事件将动态插入这里 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
            <!-- 事件类型分布 -->
            <div class="bg-white rounded-xl shadow-lg p-6">
                <h2 class="text-lg font-semibold text-gray-800 mb-4">
                    <i class="fas fa-chart-pie text-purple-600 mr-2"></i>事件类型分布
                </h2>
                <canvas id="eventTypeChart" height="200"></canvas>
            </div>

            <!-- 延迟趋势 -->
            <div class="bg-white rounded-xl shadow-lg p-6">
                <h2 class="text-lg font-semibold text-gray-800 mb-4">
                    <i class="fas fa-chart-line text-orange-600 mr-2"></i>事件延迟趋势 (ms)
                </h2>
                <canvas id="latencyChart" height="200"></canvas>
            </div>
        </div>
    </div>

    <!-- Skill 详情模态框 -->
    <div id="skillDetailModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-screen overflow-y-auto">
                <div class="p-6 border-b">
                    <div class="flex justify-between items-center">
                        <h3 id="modalSkillName" class="text-xl font-bold text-gray-800">Skill 详情</h3>
                        <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700">
                            <i class="fas fa-times text-xl"></i>
                        </button>
                    </div>
                </div>
                <div id="modalContent" class="p-6">
                    <!-- 详情内容将动态插入 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局状态
        let skillsData = [];
        let eventsData = [];
        let eventTypeChart = null;
        let latencyChart = null;

        // 状态颜色映射
        const statusColors = {
            'INSTALLED': 'bg-blue-100 text-blue-800',
            'STARTED': 'bg-green-100 text-green-800',
            'STOPPED': 'bg-gray-100 text-gray-800',
            'UNINSTALLED': 'bg-red-100 text-red-800',
            'ERROR_OCCURRED': 'bg-red-100 text-red-800',
            'HEALTH_CHANGED': 'bg-yellow-100 text-yellow-800'
        };

        const statusIcons = {
            'INSTALLED': 'fa-download',
            'STARTED': 'fa-play',
            'STOPPED': 'fa-stop',
            'UNINSTALLED': 'fa-trash',
            'ERROR_OCCURRED': 'fa-exclamation-circle',
            'HEALTH_CHANGED': 'fa-heartbeat'
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initCharts();
            refreshData();
            setInterval(refreshData, 5000); // 每5秒刷新
        });

        // 初始化图表
        function initCharts() {
            // 事件类型分布图
            const eventTypeCtx = document.getElementById('eventTypeChart').getContext('2d');
            eventTypeChart = new Chart(eventTypeCtx, {
                type: 'doughnut',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        backgroundColor: [
                            '#3B82F6', '#10B981', '#F59E0B', '#EF4444',
                            '#8B5CF6', '#EC4899', '#06B6D4', '#84CC16'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });

            // 延迟趋势图
            const latencyCtx = document.getElementById('latencyChart').getContext('2d');
            latencyChart = new Chart(latencyCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label:
