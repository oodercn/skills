<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nexus Execution History - 执行记录">
    <meta name="theme-color" content="#000000">
    <title>执行记录 - Nexus Console</title>
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold" style="display: flex; align-items: center; gap: 8px;">
                    <i class="ri-server-line"></i> Nexus Console
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle>
                        <i class="ri-menu-line"></i>
                    </button>
                    <h2 class="nx-text-lg nx-font-semibold">执行记录</h2>
                </div>
                <div class="nx-flex nx-items-center nx-gap-2">
                    <button class="nx-btn nx-btn--secondary" onclick="exportHistory()">
                        <i class="ri-download-line"></i> 导出记录
                    </button>
                    <button class="nx-btn nx-btn--secondary" onclick="refreshHistory()">
                        <i class="ri-refresh-line"></i> 刷新
                    </button>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="nx-grid nx-grid--4 nx-mb-6">
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--primary">
                                <i class="ri-play-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__value" id="totalExecutions">-</div>
                                <div class="nx-stat-card__label">总执行次数</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--success">
                                <i class="ri-check-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__value" id="successCount">-</div>
                                <div class="nx-stat-card__label">成功</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--danger">
                                <i class="ri-close-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__value" id="failedCount">-</div>
                                <div class="nx-stat-card__label">失败</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--warning">
                                <i class="ri-time-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__value" id="avgDuration">-</div>
                                <div class="nx-stat-card__label">平均耗时</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="nx-card">
                        <div class="nx-card__header">
                            <h3 class="nx-card__title"><i class="ri-list-check"></i> 执行历史</h3>
                            <div class="nx-card__actions nx-flex nx-gap-2">
                                <select class="nx-select" id="typeFilter" onchange="filterHistory()">
                                    <option value="all">全部类型</option>
                                    <option value="skill">技能执行</option>
                                    <option value="scene">场景执行</option>
                                    <option value="task">任务执行</option>
                                </select>
                                <select class="nx-select" id="statusFilter" onchange="filterHistory()">
                                    <option value="all">全部状态</option>
                                    <option value="success">成功</option>
                                    <option value="failed">失败</option>
                                    <option value="running">运行中</option>
                                </select>
                                <input type="date" class="nx-input" id="dateFilter" onchange="filterHistory()">
                            </div>
                        </div>
                        <div class="nx-card__body nx-p-0">
                            <table class="nx-table">
                                <thead>
                                    <tr>
                                        <th>执行ID</th>
                                        <th>类型</th>
                                        <th>名称</th>
                                        <th>开始时间</th>
                                        <th>耗时</th>
                                        <th>状态</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="historyTableBody">
                                    <tr><td colspan="7" class="nx-loading"><div class="nx-loading__spinner"></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="nx-card__footer nx-flex nx-justify-between nx-items-center">
                            <span id="paginationInfo">共 0 条</span>
                            <div class="nx-flex nx-gap-2 nx-items-center">
                                <button class="nx-btn nx-btn--sm nx-btn--secondary" onclick="prevPage()">上一页</button>
                                <span id="currentPage">1</span>
                                <button class="nx-btn nx-btn--sm nx-btn--secondary" onclick="nextPage()">下一页</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="nx-modal" id="detailModal">
        <div class="nx-modal__content nx-modal__content--lg">
            <div class="nx-modal__header">
                <h3 class="nx-modal__title"><i class="ri-file-list-line"></i> 执行详情</h3>
                <button class="nx-modal__close" onclick="hideDetailModal()">&times;</button>
            </div>
            <div class="nx-modal__body">
                <div class="execution-detail" id="executionDetail">
                    <div class="nx-loading"><div class="nx-loading__spinner"></div></div>
                </div>
            </div>
            <div class="nx-modal__footer">
                <button class="nx-btn nx-btn--secondary" onclick="hideDetailModal()">关闭</button>
                <button class="nx-btn nx-btn--primary" onclick="rerunExecution()">重新执行</button>
            </div>
        </div>
    </div>
    
    <script src="/console/js/nexus.js?v=2.2"></script>
    <script src="/console/js/menu-loader.js?v=2.2"></script>
    <script src="/console/js/nexus-menu.js?v=2.2"></script>
    <script src="/console/js/page-init.js?v=2.2" data-auto-init></script>
    <script>
        let currentPage = 1;
        let pageSize = 10;
        let currentExecutionId = null;
        
        document.addEventListener('pageInitComplete', function() {
            loadStats();
            loadHistory();
        });
        
        function loadStats() {
            fetch('/api/personal/execution/stats')
                .then(response => response.json())
                .then(response => {
                    if (response.status === 'success' && response.data) {
                        document.getElementById('totalExecutions').textContent = response.data.total || 0;
                        document.getElementById('successCount').textContent = response.data.success || 0;
                        document.getElementById('failedCount').textContent = response.data.failed || 0;
                        document.getElementById('avgDuration').textContent = formatDuration(response.data.avgDuration);
                    }
                })
                .catch(error => {
                    console.error('Failed to load stats:', error);
                });
        }
        
        function loadHistory() {
            const type = document.getElementById('typeFilter').value;
            const status = document.getElementById('statusFilter').value;
            const date = document.getElementById('dateFilter').value;
            
            let url = `/api/personal/execution?page=${currentPage}&size=${pageSize}`;
            if (type !== 'all') url += `&type=${type}`;
            if (status !== 'all') url += `&status=${status}`;
            if (date) url += `&date=${date}`;
            
            fetch(url)
                .then(response => response.json())
                .then(response => {
                    const tbody = document.getElementById('historyTableBody');
                    if (response.status === 'success' && response.data && response.data.items && response.data.items.length > 0) {
                        tbody.innerHTML = response.data.items.map(item => `
                            <tr>
                                <td><code>${item.id.substring(0, 8)}...</code></td>
                                <td><span class="nx-badge nx-badge--${getTypeBadge(item.type)}">${getTypeName(item.type)}</span></td>
                                <td>${item.name}</td>
                                <td>${formatDate(item.startTime)}</td>
                                <td>${formatDuration(item.duration)}</td>
                                <td><span class="nx-badge nx-badge--${getStatusBadge(item.status)}">${getStatusName(item.status)}</span></td>
                                <td>
                                    <button class="nx-btn nx-btn--sm nx-btn--ghost" onclick="viewDetail('${item.id}')">
                                        <i class="ri-eye-line"></i> 详情
                                    </button>
                                </td>
                            </tr>
                        `).join('');
                        
                        document.getElementById('paginationInfo').textContent = `共 ${response.data.total} 条`;
                        document.getElementById('currentPage').textContent = currentPage;
                    } else {
                        tbody.innerHTML = '<tr><td colspan="7" class="nx-empty"><div class="nx-empty__title">暂无执行记录</div></td></tr>';
                    }
                })
                .catch(error => {
                    console.error('Failed to load history:', error);
                    document.getElementById('historyTableBody').innerHTML = '<tr><td colspan="7" class="nx-empty"><div class="nx-empty__title">加载失败</div></td></tr>';
                });
        }
        
        function viewDetail(executionId) {
            currentExecutionId = executionId;
            fetch(`/api/personal/execution/${executionId}`)
                .then(response => response.json())
                .then(response => {
                    if (response.status === 'success' && response.data) {
                        const detail = response.data;
                        document.getElementById('executionDetail').innerHTML = `
                            <div class="detail-section">
                                <h4>基本信息</h4>
                                <div class="detail-grid">
                                    <div class="detail-item">
                                        <label>执行ID</label>
                                        <span><code>${detail.id}</code></span>
                                    </div>
                                    <div class="detail-item">
                                        <label>类型</label>
                                        <span>${getTypeName(detail.type)}</span>
                                    </div>
                                    <div class="detail-item">
                                        <label>名称</label>
                                        <span>${detail.name}</span>
                                    </div>
                                    <div class="detail-item">
                                        <label>状态</label>
                                        <span class="nx-badge nx-badge--${getStatusBadge(detail.status)}">${getStatusName(detail.status)}</span>
                                    </div>
                                    <div class="detail-item">
                                        <label>开始时间</label>
                                        <span>${formatDate(detail.startTime)}</span>
                                    </div>
                                    <div class="detail-item">
                                        <label>结束时间</label>
                                        <span>${detail.endTime ? formatDate(detail.endTime) : '-'}</span>
                                    </div>
                                    <div class="detail-item">
                                        <label>耗时</label>
                                        <span>${formatDuration(detail.duration)}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="detail-section">
                                <h4>输入参数</h4>
                                <pre class="code-block">${JSON.stringify(detail.input || {}, null, 2)}</pre>
                            </div>
                            <div class="detail-section">
                                <h4>输出结果</h4>
                                <pre class="code-block">${JSON.stringify(detail.output || {}, null, 2)}</pre>
                            </div>
                            ${detail.error ? `
                            <div class="detail-section error-section">
                                <h4>错误信息</h4>
                                <pre class="code-block error">${detail.error}</pre>
                            </div>
                            ` : ''}
                        `;
                        document.getElementById('detailModal').classList.add('nx-modal--open');
                    }
                })
                .catch(error => {
                    console.error('Failed to load detail:', error);
                    NX.toast.error('加载详情失败');
                });
        }
        
        function hideDetailModal() {
            document.getElementById('detailModal').classList.remove('nx-modal--open');
            currentExecutionId = null;
        }
        
        function rerunExecution() {
            if (currentExecutionId && confirm('确定要重新执行此任务吗？')) {
                fetch(`/api/personal/execution/${currentExecutionId}/rerun`, { method: 'POST' })
                    .then(response => response.json())
                    .then(response => {
                        if (response.status === 'success') {
                            NX.toast.success('任务已重新执行');
                            hideDetailModal();
                            loadHistory();
                        } else {
                            NX.toast.error('操作失败: ' + (response.message || '未知错误'));
                        }
                    })
                    .catch(error => {
                        console.error('Failed to rerun:', error);
                        NX.toast.error('操作失败');
                    });
            }
        }
        
        function exportHistory() {
            window.location.href = '/api/personal/execution/export';
        }
        
        function refreshHistory() {
            loadStats();
            loadHistory();
        }
        
        function filterHistory() {
            currentPage = 1;
            loadHistory();
        }
        
        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                loadHistory();
            }
        }
        
        function nextPage() {
            currentPage++;
            loadHistory();
        }
        
        function getTypeBadge(type) {
            const badges = { 'skill': 'primary', 'scene': 'success', 'task': 'warning' };
            return badges[type] || 'secondary';
        }
        
        function getTypeName(type) {
            const names = { 'skill': '技能', 'scene': '场景', 'task': '任务' };
            return names[type] || type;
        }
        
        function getStatusBadge(status) {
            const badges = { 'success': 'success', 'failed': 'danger', 'running': 'warning' };
            return badges[status] || 'secondary';
        }
        
        function getStatusName(status) {
            const names = { 'success': '成功', 'failed': '失败', 'running': '运行中' };
            return names[status] || status;
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN');
        }
        
        function formatDuration(ms) {
            if (!ms) return '-';
            if (ms < 1000) return ms + 'ms';
            if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
            return (ms / 60000).toFixed(1) + 'm';
        }
    </script>
    
    <style>
        .detail-section {
            margin-bottom: var(--nx-space-6);
        }
        
        .detail-section h4 {
            margin-bottom: var(--nx-space-3);
            padding-bottom: var(--nx-space-2);
            border-bottom: 1px solid var(--nx-border);
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--nx-space-4);
        }
        
        .detail-item {
            display: flex;
            flex-direction: column;
            gap: var(--nx-space-1);
        }
        
        .detail-item label {
            font-size: var(--nx-text-xs);
            color: var(--nx-text-secondary);
        }
        
        .code-block {
            background: var(--nx-bg-hover);
            padding: var(--nx-space-3);
            border-radius: var(--nx-radius);
            font-family: monospace;
            font-size: 13px;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        
        .code-block.error {
            color: var(--nx-danger);
            border: 1px solid var(--nx-danger);
        }
        
        .error-section {
            background: rgba(239, 68, 68, 0.1);
            padding: var(--nx-space-3);
            border-radius: var(--nx-radius);
        }
    </style>
</body>
</html>
