<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nexus Personal Sharing - 我的分享">
    <meta name="theme-color" content="#000000">
    <title>我的分享 - Nexus Console</title>
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold" style="display: flex; align-items: center; gap: 8px;">
                    <i class="ri-server-line"></i> Nexus Console
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle>
                        <i class="ri-menu-line"></i>
                    </button>
                    <h2 class="nx-text-lg nx-font-semibold">我的分享</h2>
                </div>
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--primary" onclick="showShareModal()">
                        <i class="ri-add-line"></i> 新建分享
                    </button>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="nx-card nx-mb-6">
                        <div class="nx-card__header">
                            <h3 class="nx-card__title"><i class="ri-folder-shared-line"></i> 我分享的文件</h3>
                            <div class="nx-card__actions">
                                <select class="nx-select" id="shareTypeFilter" onchange="filterShares()">
                                    <option value="all">全部类型</option>
                                    <option value="file">文件</option>
                                    <option value="skill">技能</option>
                                    <option value="scene">场景</option>
                                </select>
                            </div>
                        </div>
                        <div class="nx-card__body nx-p-0">
                            <table class="nx-table">
                                <thead>
                                    <tr>
                                        <th>名称</th>
                                        <th>类型</th>
                                        <th>分享对象</th>
                                        <th>创建时间</th>
                                        <th>状态</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="sharesTableBody">
                                    <tr><td colspan="6" class="nx-loading"><div class="nx-loading__spinner"></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <div class="nx-card">
                        <div class="nx-card__header">
                            <h3 class="nx-card__title"><i class="ri-user-line"></i> 分享给我的</h3>
                        </div>
                        <div class="nx-card__body nx-p-0">
                            <table class="nx-table">
                                <thead>
                                    <tr>
                                        <th>名称</th>
                                        <th>来源</th>
                                        <th>分享者</th>
                                        <th>接收时间</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="sharedWithMeBody">
                                    <tr><td colspan="5" class="nx-loading"><div class="nx-loading__spinner"></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="nx-modal" id="shareModal">
        <div class="nx-modal__content">
            <div class="nx-modal__header">
                <h3 class="nx-modal__title"><i class="ri-add-line"></i> 新建分享</h3>
                <button class="nx-modal__close" onclick="hideShareModal()">&times;</button>
            </div>
            <div class="nx-modal__body">
                <form id="shareForm">
                    <div class="nx-form-group">
                        <label class="nx-label">分享类型</label>
                        <select class="nx-select" id="shareType" required>
                            <option value="file">文件</option>
                            <option value="skill">技能</option>
                            <option value="scene">场景</option>
                        </select>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-label">选择项目</label>
                        <select class="nx-select" id="shareItem" required>
                            <option value="">请先选择类型</option>
                        </select>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-label">分享对象</label>
                        <select class="nx-select" id="shareTarget" required>
                            <option value="public">公开分享</option>
                            <option value="group">群组分享</option>
                            <option value="user">指定用户</option>
                        </select>
                    </div>
                    <div class="nx-form-group" id="targetUsersGroup" style="display:none;">
                        <label class="nx-label">目标用户</label>
                        <input type="text" class="nx-input" id="targetUsers" placeholder="输入用户ID，多个用逗号分隔">
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-label">权限设置</label>
                        <select class="nx-select" id="sharePermission">
                            <option value="read">只读</option>
                            <option value="write">读写</option>
                            <option value="admin">管理</option>
                        </select>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-label">有效期</label>
                        <select class="nx-select" id="shareExpiry">
                            <option value="permanent">永久</option>
                            <option value="7d">7天</option>
                            <option value="30d">30天</option>
                            <option value="90d">90天</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="nx-modal__footer">
                <button class="nx-btn nx-btn--secondary" onclick="hideShareModal()">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="createShare()">创建分享</button>
            </div>
        </div>
    </div>
    
    <script src="/console/js/nexus.js?v=2.2"></script>
    <script src="/console/js/menu-loader.js?v=2.2"></script>
    <script src="/console/js/nexus-menu.js?v=2.2"></script>
    <script src="/console/js/page-init.js?v=2.2" data-auto-init></script>
    <script>
        document.addEventListener('pageInitComplete', function() {
            loadMyShares();
            loadSharedWithMe();
        });
        
        function loadMyShares() {
            fetch('/api/personal/sharing')
                .then(response => response.json())
                .then(response => {
                    const tbody = document.getElementById('sharesTableBody');
                    if (response.status === 'success' && response.data && response.data.length > 0) {
                        tbody.innerHTML = response.data.map(share => `
                            <tr>
                                <td>${share.name}</td>
                                <td><span class="nx-badge nx-badge--${getTypeBadge(share.type)}">${getTypeName(share.type)}</span></td>
                                <td>${share.target || '公开'}</td>
                                <td>${formatDate(share.createdAt)}</td>
                                <td><span class="nx-badge nx-badge--${share.status === 'active' ? 'success' : 'secondary'}">${share.status === 'active' ? '有效' : '已过期'}</span></td>
                                <td>
                                    <button class="nx-btn nx-btn--sm nx-btn--ghost" onclick="editShare('${share.id}')"><i class="ri-edit-line"></i></button>
                                    <button class="nx-btn nx-btn--sm nx-btn--ghost nx-text-danger" onclick="deleteShare('${share.id}')"><i class="ri-delete-bin-line"></i></button>
                                </td>
                            </tr>
                        `).join('');
                    } else {
                        tbody.innerHTML = '<tr><td colspan="6" class="nx-empty"><div class="nx-empty__title">暂无分享记录</div></td></tr>';
                    }
                })
                .catch(error => {
                    console.error('Failed to load shares:', error);
                    document.getElementById('sharesTableBody').innerHTML = '<tr><td colspan="6" class="nx-empty"><div class="nx-empty__title">加载失败</div></td></tr>';
                });
        }
        
        function loadSharedWithMe() {
            fetch('/api/personal/sharing/received')
                .then(response => response.json())
                .then(response => {
                    const tbody = document.getElementById('sharedWithMeBody');
                    if (response.status === 'success' && response.data && response.data.length > 0) {
                        tbody.innerHTML = response.data.map(share => `
                            <tr>
                                <td>${share.name}</td>
                                <td>${share.source || '-'}</td>
                                <td>${share.sharer || '未知'}</td>
                                <td>${formatDate(share.receivedAt)}</td>
                                <td>
                                    <button class="nx-btn nx-btn--sm nx-btn--primary" onclick="acceptShare('${share.id}')">接受</button>
                                    <button class="nx-btn nx-btn--sm nx-btn--secondary" onclick="rejectShare('${share.id}')">拒绝</button>
                                </td>
                            </tr>
                        `).join('');
                    } else {
                        tbody.innerHTML = '<tr><td colspan="5" class="nx-empty"><div class="nx-empty__title">暂无分享给我的内容</div></td></tr>';
                    }
                })
                .catch(error => {
                    console.error('Failed to load shared with me:', error);
                    document.getElementById('sharedWithMeBody').innerHTML = '<tr><td colspan="5" class="nx-empty"><div class="nx-empty__title">加载失败</div></td></tr>';
                });
        }
        
        function showShareModal() {
            document.getElementById('shareModal').classList.add('nx-modal--open');
        }
        
        function hideShareModal() {
            document.getElementById('shareModal').classList.remove('nx-modal--open');
            document.getElementById('shareForm').reset();
        }
        
        function createShare() {
            const share = {
                type: document.getElementById('shareType').value,
                itemId: document.getElementById('shareItem').value,
                target: document.getElementById('shareTarget').value,
                targetUsers: document.getElementById('targetUsers').value,
                permission: document.getElementById('sharePermission').value,
                expiry: document.getElementById('shareExpiry').value
            };
            
            fetch('/api/personal/sharing', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(share)
            })
            .then(response => response.json())
            .then(response => {
                if (response.status === 'success') {
                    hideShareModal();
                    loadMyShares();
                    NX.toast.success('分享创建成功');
                } else {
                    NX.toast.error('创建失败: ' + (response.message || '未知错误'));
                }
            })
            .catch(error => {
                console.error('Failed to create share:', error);
                NX.toast.error('创建失败');
            });
        }
        
        function editShare(shareId) {
            window.location.href = '/console/pages/personal/sharing-edit.html?id=' + shareId;
        }
        
        function deleteShare(shareId) {
            if (confirm('确定要删除此分享吗？')) {
                fetch('/api/personal/sharing/' + shareId, {
                    method: 'DELETE'
                })
                .then(response => response.json())
                .then(response => {
                    if (response.status === 'success') {
                        loadMyShares();
                        NX.toast.success('删除成功');
                    } else {
                        NX.toast.error('删除失败: ' + (response.message || '未知错误'));
                    }
                })
                .catch(error => {
                    console.error('Failed to delete share:', error);
                    NX.toast.error('删除失败');
                });
            }
        }
        
        function acceptShare(shareId) {
            fetch('/api/personal/sharing/' + shareId + '/accept', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(response => {
                if (response.status === 'success') {
                    loadSharedWithMe();
                    NX.toast.success('已接受分享');
                } else {
                    NX.toast.error('操作失败: ' + (response.message || '未知错误'));
                }
            })
            .catch(error => {
                console.error('Failed to accept share:', error);
                NX.toast.error('操作失败');
            });
        }
        
        function rejectShare(shareId) {
            if (confirm('确定要拒绝此分享吗？')) {
                fetch('/api/personal/sharing/' + shareId + '/reject', {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(response => {
                    if (response.status === 'success') {
                        loadSharedWithMe();
                        NX.toast.success('已拒绝分享');
                    } else {
                        NX.toast.error('操作失败: ' + (response.message || '未知错误'));
                    }
                })
                .catch(error => {
                    console.error('Failed to reject share:', error);
                    NX.toast.error('操作失败');
                });
            }
        }
        
        function filterShares() {
            loadMyShares();
        }
        
        function getTypeBadge(type) {
            const badges = { 'file': 'primary', 'skill': 'success', 'scene': 'warning' };
            return badges[type] || 'secondary';
        }
        
        function getTypeName(type) {
            const names = { 'file': '文件', 'skill': '技能', 'scene': '场景' };
            return names[type] || type;
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN');
        }
        
        document.getElementById('shareTarget').addEventListener('change', function() {
            const targetUsersGroup = document.getElementById('targetUsersGroup');
            if (this.value === 'user') {
                targetUsersGroup.style.display = 'block';
            } else {
                targetUsersGroup.style.display = 'none';
            }
        });
    </script>
</body>
</html>
