<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nexus Identity Management - 身份管理">
    <meta name="theme-color" content="#000000">
    <title>身份管理 - Nexus Console</title>
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
</head>
<body>
    <div class="nx-page" id="appPage">
        <aside class="nx-page__sidebar" id="appSidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold" style="display: flex; align-items: center; gap: 8px;">
                    <i class="ri-server-line"></i> Nexus Console
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle id="sidebarToggle">
                        <i class="ri-menu-line"></i>
                    </button>
                    <h2 class="nx-text-lg nx-font-semibold">身份管理</h2>
                </div>
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle>
                        <i class="ri-sun-line"></i>
                    </button>
                    <button class="nx-btn nx-btn--primary" id="loginBtn" style="display:none;" onclick="goToLogin()">
                        <i class="ri-login-box-line"></i> 登录
                    </button>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="identity-grid">
                        <div class="nx-card">
                            <div class="nx-card__header">
                                <h3 class="nx-card__title"><i class="ri-user-line"></i> 基本信息</h3>
                            </div>
                            <div class="nx-card__body">
                                <div class="profile-section">
                                    <div class="avatar-section">
                                        <div class="avatar" id="userAvatar">
                                            <i class="ri-user-line"></i>
                                        </div>
                                        <button class="nx-btn nx-btn--secondary nx-btn--sm" id="changeAvatarBtn" onclick="changeAvatar()">更换头像</button>
                                    </div>
                                    <div class="info-form">
                                        <div class="nx-form-group">
                                            <label class="nx-label">用户名</label>
                                            <input type="text" class="nx-input" id="username" readonly>
                                        </div>
                                        <div class="nx-form-group">
                                            <label class="nx-label">昵称</label>
                                            <input type="text" class="nx-input" id="nickname" placeholder="设置昵称">
                                        </div>
                                        <div class="nx-form-group">
                                            <label class="nx-label">邮箱</label>
                                            <input type="email" class="nx-input" id="email" readonly>
                                        </div>
                                        <div class="nx-form-group">
                                            <label class="nx-label">手机号</label>
                                            <input type="tel" class="nx-input" id="phone" placeholder="绑定手机号">
                                        </div>
                                        <button class="nx-btn nx-btn--primary" id="saveInfoBtn" onclick="saveBasicInfo()">保存修改</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="nx-card" id="securityCard">
                            <div class="nx-card__header">
                                <h3 class="nx-card__title"><i class="ri-key-2-line"></i> 安全设置</h3>
                            </div>
                            <div class="nx-card__body">
                                <div class="security-item">
                                    <div class="security-info">
                                        <div class="security-title">登录密码</div>
                                        <div class="security-desc">定期更换密码可以提高账号安全性</div>
                                    </div>
                                    <button class="nx-btn nx-btn--secondary" onclick="showChangePasswordModal()">修改密码</button>
                                </div>
                                <div class="security-item">
                                    <div class="security-info">
                                        <div class="security-title">两步验证</div>
                                        <div class="security-desc" id="twoFactorStatus">未启用</div>
                                    </div>
                                    <button class="nx-btn nx-btn--secondary" id="twoFactorBtn" onclick="toggleTwoFactor()">启用</button>
                                </div>
                                <div class="security-item">
                                    <div class="security-info">
                                        <div class="security-title">登录设备</div>
                                        <div class="security-desc">管理已登录的设备</div>
                                    </div>
                                    <button class="nx-btn nx-btn--secondary" onclick="showDevicesModal()">查看设备</button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="nx-card" id="linkedAccountsCard">
                            <div class="nx-card__header">
                                <h3 class="nx-card__title"><i class="ri-links-line"></i> 关联账号</h3>
                            </div>
                            <div class="nx-card__body">
                                <div class="linked-accounts" id="linkedAccounts">
                                    <div class="nx-loading"><div class="nx-loading__spinner"></div></div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="nx-card" id="loginHistoryCard">
                            <div class="nx-card__header">
                                <h3 class="nx-card__title"><i class="ri-history-line"></i> 登录历史</h3>
                            </div>
                            <div class="nx-card__body">
                                <div class="login-history" id="loginHistory">
                                    <div class="nx-loading"><div class="nx-loading__spinner"></div></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="nx-modal" id="changePasswordModal">
        <div class="nx-modal__content">
            <div class="nx-modal__header">
                <h3 class="nx-modal__title"><i class="ri-key-2-line"></i> 修改密码</h3>
                <button class="nx-modal__close" onclick="hideChangePasswordModal()">&times;</button>
            </div>
            <div class="nx-modal__body">
                <form id="changePasswordForm">
                    <div class="nx-form-group">
                        <label class="nx-label">当前密码</label>
                        <input type="password" class="nx-input" id="currentPassword" required>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-label">新密码</label>
                        <input type="password" class="nx-input" id="newPassword" required>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-label">确认新密码</label>
                        <input type="password" class="nx-input" id="confirmPassword" required>
                    </div>
                </form>
            </div>
            <div class="nx-modal__footer">
                <button class="nx-btn nx-btn--secondary" onclick="hideChangePasswordModal()">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="changePassword()">确认修改</button>
            </div>
        </div>
    </div>
    
    <div class="nx-modal" id="devicesModal">
        <div class="nx-modal__content nx-modal__content--lg">
            <div class="nx-modal__header">
                <h3 class="nx-modal__title"><i class="ri-device-line"></i> 登录设备</h3>
                <button class="nx-modal__close" onclick="hideDevicesModal()">&times;</button>
            </div>
            <div class="nx-modal__body">
                <div class="devices-list" id="devicesList">
                    <div class="nx-loading"><div class="nx-loading__spinner"></div></div>
                </div>
            </div>
            <div class="nx-modal__footer">
                <button class="nx-btn nx-btn--danger" onclick="logoutAllDevices()">退出所有设备</button>
                <button class="nx-btn nx-btn--secondary" onclick="hideDevicesModal()">关闭</button>
            </div>
        </div>
    </div>
    
    <script src="/console/js/nexus.js?v=2.2"></script>
    <script src="/console/js/menu-loader.js?v=2.2"></script>
    <script src="/console/js/nexus-menu.js?v=2.2"></script>
    <script src="/console/js/page-init.js?v=2.2" data-auto-init></script>
    <script>
        var isAuthenticated = false;
        var isStandaloneMode = false;
        
        function checkAuthMode() {
            var urlParams = new URLSearchParams(window.location.search);
            isStandaloneMode = urlParams.get('standalone') === 'true' || urlParams.get('mode') === 'public';
            
            if (isStandaloneMode) {
                document.getElementById('appSidebar').style.display = 'none';
                document.getElementById('sidebarToggle').style.display = 'none';
                document.getElementById('appPage').classList.add('nx-page--standalone');
                document.getElementById('loginBtn').style.display = 'inline-flex';
            }
            
            return fetch('/api/personal/identity')
                .then(function(response) { return response.json(); })
                .then(function(response) {
                    if (response.status === 'success' && response.data) {
                        isAuthenticated = true;
                        return response.data;
                    } else {
                        isAuthenticated = false;
                        return null;
                    }
                })
                .catch(function(error) {
                    console.error('Auth check failed:', error);
                    isAuthenticated = false;
                    return null;
                });
        }
        
        function updateUIForAuthState(user) {
            if (user) {
                document.getElementById('username').value = user.username || '';
                document.getElementById('nickname').value = user.nickname || '';
                document.getElementById('email').value = user.email || '';
                document.getElementById('phone').value = user.phone || '';
                
                if (user.twoFactorEnabled) {
                    document.getElementById('twoFactorStatus').textContent = '已启用';
                    document.getElementById('twoFactorBtn').textContent = '禁用';
                }
                
                document.getElementById('changeAvatarBtn').style.display = 'inline-flex';
                document.getElementById('saveInfoBtn').style.display = 'inline-flex';
            } else {
                document.getElementById('username').value = '';
                document.getElementById('nickname').value = '';
                document.getElementById('email').value = '';
                document.getElementById('phone').value = '';
                document.getElementById('changeAvatarBtn').style.display = 'none';
                document.getElementById('saveInfoBtn').style.display = 'none';
                
                if (!isStandaloneMode) {
                    window.location.href = '/console/login.html';
                }
            }
        }
        
        document.addEventListener('pageInitComplete', function() {
            checkAuthMode().then(function(user) {
                updateUIForAuthState(user);
                
                if (isAuthenticated) {
                    loadLinkedAccounts();
                    loadLoginHistory();
                } else {
                    document.getElementById('linkedAccounts').innerHTML = '<div class="nx-empty"><i class="ri-link-unlink nx-empty__icon"></i><div class="nx-empty__title">请登录后查看</div></div>';
                    document.getElementById('loginHistory').innerHTML = '<div class="nx-empty"><i class="ri-history-line nx-empty__icon"></i><div class="nx-empty__title">请登录后查看</div></div>';
                }
            });
        });
        
        function loadUserInfo() {
            fetch('/api/personal/identity')
                .then(function(response) { return response.json(); })
                .then(function(response) {
                    if (response.status === 'success' && response.data) {
                        updateUIForAuthState(response.data);
                    }
                })
                .catch(function(error) {
                    console.error('Failed to load user info:', error);
                });
        }
        
        function loadLinkedAccounts() {
            fetch('/api/personal/identity/linked-accounts')
                .then(function(response) { return response.json(); })
                .then(function(response) {
                    var container = document.getElementById('linkedAccounts');
                    if (response.status === 'success' && response.data && response.data.length > 0) {
                        container.innerHTML = response.data.map(function(account) {
                            return '<div class="linked-account-item">' +
                                '<div class="account-icon"><i class="' + getAccountIcon(account.type) + '"></i></div>' +
                                '<div class="account-info">' +
                                    '<div class="account-name">' + account.name + '</div>' +
                                    '<div class="account-meta">' + (account.username || '未绑定') + '</div>' +
                                '</div>' +
                                '<button class="nx-btn nx-btn--sm ' + (account.linked ? 'nx-btn--danger' : 'nx-btn--primary') + '" ' +
                                        'onclick="' + (account.linked ? 'unlinkAccount(\'' + account.type + '\')' : 'linkAccount(\'' + account.type + '\')') + '">' +
                                    (account.linked ? '解绑' : '绑定') +
                                '</button>' +
                            '</div>';
                        }).join('');
                    } else {
                        container.innerHTML = '<div class="nx-empty"><i class="ri-link-unlink nx-empty__icon"></i><div class="nx-empty__title">暂无关联账号</div></div>';
                    }
                })
                .catch(function(error) {
                    console.error('Failed to load linked accounts:', error);
                    document.getElementById('linkedAccounts').innerHTML = '<div class="nx-empty"><i class="ri-error-warning-line nx-empty__icon"></i><div class="nx-empty__title">加载失败</div></div>';
                });
        }
        
        function loadLoginHistory() {
            fetch('/api/personal/identity/login-history')
                .then(function(response) { return response.json(); })
                .then(function(response) {
                    var container = document.getElementById('loginHistory');
                    if (response.status === 'success' && response.data && response.data.length > 0) {
                        container.innerHTML = response.data.slice(0, 5).map(function(record) {
                            return '<div class="history-item">' +
                                '<div class="history-icon"><i class="ri-login-circle-line"></i></div>' +
                                '<div class="history-info">' +
                                    '<div class="history-title">' + (record.device || '未知设备') + '</div>' +
                                    '<div class="history-meta">' + (record.ip || '-') + ' · ' + (record.location || '-') + '</div>' +
                                '</div>' +
                                '<div class="history-time">' + formatDate(record.time) + '</div>' +
                            '</div>';
                        }).join('');
                    } else {
                        container.innerHTML = '<div class="nx-empty"><i class="ri-history-line nx-empty__icon"></i><div class="nx-empty__title">暂无登录记录</div></div>';
                    }
                })
                .catch(function(error) {
                    console.error('Failed to load login history:', error);
                    container.innerHTML = '<div class="nx-empty"><i class="ri-error-warning-line nx-empty__icon"></i><div class="nx-empty__title">加载失败</div></div>';
                });
        }
        
        function saveBasicInfo() {
            if (!isAuthenticated) {
                NX.toast.warning('请先登录');
                return;
            }
            
            var data = {
                nickname: document.getElementById('nickname').value,
                phone: document.getElementById('phone').value
            };
            
            fetch('/api/personal/identity', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(function(response) { return response.json(); })
            .then(function(response) {
                if (response.status === 'success') {
                    NX.toast.success('保存成功');
                } else {
                    NX.toast.error('保存失败: ' + (response.message || '未知错误'));
                }
            })
            .catch(function(error) {
                console.error('Failed to save:', error);
                NX.toast.error('保存失败');
            });
        }
        
        function showChangePasswordModal() {
            if (!isAuthenticated) {
                NX.toast.warning('请先登录');
                return;
            }
            document.getElementById('changePasswordModal').classList.add('nx-modal--open');
        }
        
        function hideChangePasswordModal() {
            document.getElementById('changePasswordModal').classList.remove('nx-modal--open');
            document.getElementById('changePasswordForm').reset();
        }
        
        function changePassword() {
            var currentPassword = document.getElementById('currentPassword').value;
            var newPassword = document.getElementById('newPassword').value;
            var confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword !== confirmPassword) {
                NX.toast.warning('两次输入的密码不一致');
                return;
            }
            
            fetch('/api/personal/identity/password', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ currentPassword: currentPassword, newPassword: newPassword })
            })
            .then(function(response) { return response.json(); })
            .then(function(response) {
                if (response.status === 'success') {
                    hideChangePasswordModal();
                    NX.toast.success('密码修改成功');
                } else {
                    NX.toast.error('修改失败: ' + (response.message || '未知错误'));
                }
            })
            .catch(function(error) {
                console.error('Failed to change password:', error);
                NX.toast.error('修改失败');
            });
        }
        
        function toggleTwoFactor() {
            if (!isAuthenticated) {
                NX.toast.warning('请先登录');
                return;
            }
            
            fetch('/api/personal/identity/two-factor', {
                method: 'POST'
            })
            .then(function(response) { return response.json(); })
            .then(function(response) {
                if (response.status === 'success') {
                    loadUserInfo();
                    NX.toast.success(response.message || '操作成功');
                } else {
                    NX.toast.error('操作失败: ' + (response.message || '未知错误'));
                }
            })
            .catch(function(error) {
                console.error('Failed to toggle two factor:', error);
                NX.toast.error('操作失败');
            });
        }
        
        function showDevicesModal() {
            if (!isAuthenticated) {
                NX.toast.warning('请先登录');
                return;
            }
            loadDevices();
            document.getElementById('devicesModal').classList.add('nx-modal--open');
        }
        
        function hideDevicesModal() {
            document.getElementById('devicesModal').classList.remove('nx-modal--open');
        }
        
        function loadDevices() {
            fetch('/api/personal/identity/devices')
                .then(function(response) { return response.json(); })
                .then(function(response) {
                    var container = document.getElementById('devicesList');
                    if (response.status === 'success' && response.data && response.data.length > 0) {
                        container.innerHTML = response.data.map(function(device) {
                            return '<div class="device-item">' +
                                '<div class="device-icon"><i class="' + getDeviceIcon(device.type) + '"></i></div>' +
                                '<div class="device-info">' +
                                    '<div class="device-name">' + device.name + '</div>' +
                                    '<div class="device-meta">' + (device.os || '') + ' · ' + (device.browser || '') + '</div>' +
                                    '<div class="device-time">最后活动: ' + formatDate(device.lastActive) + '</div>' +
                                '</div>' +
                                (device.current ? '<span class="nx-badge nx-badge--success">当前设备</span>' : 
                                    '<button class="nx-btn nx-btn--sm nx-btn--danger" onclick="logoutDevice(\'' + device.id + '\')">退出</button>') +
                            '</div>';
                        }).join('');
                    } else {
                        container.innerHTML = '<div class="nx-empty"><i class="ri-device-line nx-empty__icon"></i><div class="nx-empty__title">暂无设备记录</div></div>';
                    }
                })
                .catch(function(error) {
                    console.error('Failed to load devices:', error);
                    container.innerHTML = '<div class="nx-empty"><i class="ri-error-warning-line nx-empty__icon"></i><div class="nx-empty__title">加载失败</div></div>';
                });
        }
        
        function logoutDevice(deviceId) {
            fetch('/api/personal/identity/devices/' + deviceId, { method: 'DELETE' })
                .then(function(response) { return response.json(); })
                .then(function(response) {
                    if (response.status === 'success') {
                        loadDevices();
                        NX.toast.success('设备已退出');
                    } else {
                        NX.toast.error('操作失败: ' + (response.message || '未知错误'));
                    }
                })
                .catch(function(error) {
                    console.error('Failed to logout device:', error);
                    NX.toast.error('操作失败');
                });
        }
        
        function logoutAllDevices() {
            if (confirm('确定要退出所有其他设备吗？')) {
                fetch('/api/personal/identity/devices/all', { method: 'DELETE' })
                    .then(function(response) { return response.json(); })
                    .then(function(response) {
                        if (response.status === 'success') {
                            loadDevices();
                            NX.toast.success('已退出所有其他设备');
                        } else {
                            NX.toast.error('操作失败: ' + (response.message || '未知错误'));
                        }
                    })
                    .catch(function(error) {
                        console.error('Failed to logout all devices:', error);
                        NX.toast.error('操作失败');
                    });
            }
        }
        
        function linkAccount(type) {
            window.location.href = '/api/personal/identity/link/' + type;
        }
        
        function unlinkAccount(type) {
            if (confirm('确定要解绑此账号吗？')) {
                fetch('/api/personal/identity/unlink/' + type, { method: 'POST' })
                    .then(function(response) { return response.json(); })
                    .then(function(response) {
                        if (response.status === 'success') {
                            loadLinkedAccounts();
                            NX.toast.success('已解绑');
                        } else {
                            NX.toast.error('解绑失败: ' + (response.message || '未知错误'));
                        }
                    })
                    .catch(function(error) {
                        console.error('Failed to unlink:', error);
                        NX.toast.error('解绑失败');
                    });
            }
        }
        
        function goToLogin() {
            window.location.href = '/console/login.html?redirect=' + encodeURIComponent(window.location.pathname);
        }
        
        function changeAvatar() {
            NX.toast.info('头像上传功能开发中');
        }
        
        function getAccountIcon(type) {
            var icons = {
                'wechat': 'ri-wechat-fill',
                'github': 'ri-github-fill',
                'google': 'ri-google-fill',
                'dingtalk': 'ri-dingding-fill'
            };
            return icons[type] || 'ri-link';
        }
        
        function getDeviceIcon(type) {
            var icons = {
                'desktop': 'ri-computer-line',
                'mobile': 'ri-smartphone-line',
                'tablet': 'ri-tablet-line'
            };
            return icons[type] || 'ri-device-line';
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            var date = new Date(dateStr);
            return date.toLocaleString('zh-CN');
        }
    </script>
    
    <style>
        .nx-page--standalone {
            grid-template-columns: 1fr;
        }
        
        .nx-page--standalone .nx-page__sidebar {
            display: none;
        }
        
        .identity-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--nx-space-6);
        }
        
        @media (max-width: 1200px) {
            .identity-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .profile-section {
            display: flex;
            gap: var(--nx-space-6);
        }
        
        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--nx-space-3);
        }
        
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--nx-bg-hover);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: var(--nx-text-secondary);
        }
        
        .info-form {
            flex: 1;
        }
        
        .info-form .nx-form-group {
            margin-bottom: var(--nx-space-4);
        }
        
        .security-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--nx-space-4) 0;
            border-bottom: 1px solid var(--nx-border);
        }
        
        .security-item:last-child {
            border-bottom: none;
        }
        
        .security-title {
            font-weight: var(--nx-font-medium);
            margin-bottom: var(--nx-space-1);
        }
        
        .security-desc {
            font-size: var(--nx-text-sm);
            color: var(--nx-text-secondary);
        }
        
        .linked-account-item {
            display: flex;
            align-items: center;
            gap: var(--nx-space-3);
