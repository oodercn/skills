apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-recruitment-management
  name: 招聘管理系统
  version: 1.0.0
  description: 企业招聘全流程管理系统，支持职位发布、简历收集、面试安排、录用审批，含状态看板与数据统计
  author: ooder Team
  type: scene-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN
  repository: https://gitee.com/ooderCN/ooder-skills
  keywords:
    - recruitment
    - hr
    - hiring
    - job-posting
    - resume
    - interview
    - scene-capability

spec:
  type: scene-skill
  
  dependencies:
    - id: skill-form-builder
      version: ">=1.0.0"
      required: true
      autoInstall: true
      description: "表单构建服务"
      capabilities:
        - form-render
        - form-validate
        - form-submit
        
    - id: skill-storage-management-nexus-ui
      version: ">=1.0.0"
      required: true
      autoInstall: true
      description: "文件存储服务"
      capabilities:
        - file-upload
        - document-storage
        
    - id: skill-llm-chat
      version: ">=1.0.0"
      required: false
      autoInstall: false
      description: "LLM智能对话（用于简历智能筛选）"
      capabilities:
        - llm-chat
        - text-analysis

  capabilities:
    - id: job-position-management
      name: 职位管理
      description: 职位发布、编辑、下架管理
      category: business
      type: COMPOSITE
      
    - id: resume-management
      name: 简历管理
      description: 简历收集、筛选、归档
      category: business
      type: COMPOSITE
      
    - id: interview-management
      name: 面试管理
      description: 面试安排、评价、反馈
      category: business
      type: COMPOSITE
      
    - id: offer-approval
      name: 录用审批
      description: 录用申请、审批流程
      category: workflow
      type: COMPOSITE
      
    - id: recruitment-dashboard
      name: 招聘看板
      description: 招聘状态可视化看板
      category: dashboard
      type: ATOMIC
      
    - id: recruitment-statistics
      name: 数据统计
      description: 招聘数据统计分析
      category: analytics
      type: ATOMIC
      
    - id: resume-parser
      name: 简历解析
      description: 智能解析简历信息
      category: ai
      type: ATOMIC

  capabilityChains:
    - name: full-recruitment-flow
      description: 完整招聘流程
      capabilities:
        - job-position-management
        - resume-management
        - interview-management
        - offer-approval
        
    - name: resume-screening-flow
      description: 简历筛选流程
      capabilities:
        - resume-parser
        - resume-management

  endpoints:
    - path: /api/recruitment/jobs
      method: GET
      description: 获取职位列表
      capability: job-position-management
      
    - path: /api/recruitment/jobs
      method: POST
      description: 创建职位
      capability: job-position-management
      
    - path: /api/recruitment/jobs/{id}
      method: PUT
      description: 更新职位
      capability: job-position-management
      
    - path: /api/recruitment/jobs/{id}
      method: DELETE
      description: 删除职位
      capability: job-position-management
      
    - path: /api/recruitment/resumes
      method: GET
      description: 获取简历列表
      capability: resume-management
      
    - path: /api/recruitment/resumes
      method: POST
      description: 上传简历
      capability: resume-management
      
    - path: /api/recruitment/resumes/{id}
      method: PUT
      description: 更新简历状态
      capability: resume-management
      
    - path: /api/recruitment/interviews
      method: GET
      description: 获取面试列表
      capability: interview-management
      
    - path: /api/recruitment/interviews
      method: POST
      description: 安排面试
      capability: interview-management
      
    - path: /api/recruitment/interviews/{id}
      method: PUT
      description: 更新面试信息
      capability: interview-management
      
    - path: /api/recruitment/offers
      method: GET
      description: 获取录用审批列表
      capability: offer-approval
      
    - path: /api/recruitment/offers
      method: POST
      description: 提交录用申请
      capability: offer-approval
      
    - path: /api/recruitment/offers/{id}/approve
      method: POST
      description: 审批录用
      capability: offer-approval
      
    - path: /api/recruitment/dashboard
      method: GET
      description: 获取看板数据
      capability: recruitment-dashboard
      
    - path: /api/recruitment/statistics
      method: GET
      description: 获取统计数据
      capability: recruitment-statistics

  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.ui.SkillUiTestApplication

  config:
    required: []
    
    optional:
      - name: MAX_RESUME_SIZE
        type: integer
        default: 10485760
        description: 简历文件最大大小(字节)
      - name: SUPPORTED_RESUME_TYPES
        type: string
        default: "pdf,doc,docx"
        description: 支持的简历格式
      - name: ENABLE_AI_SCREENING
        type: boolean
        default: true
        description: 启用AI简历筛选
      - name: INTERVIEW_REMINDER_HOURS
        type: integer
        default: 24
        description: 面试提醒提前小时数

  resources:
    cpu: "100m"
    memory: "256Mi"
    storage: "100Mi"

  offline:
    enabled: true
    cacheStrategy: localStorage

  ui:
    nexusUi:
      entry:
        page: index.html
        title: 招聘管理
        icon: ri-briefcase-line
      menu:
        position: sidebar
        category: business
        order: 2
      layout:
        type: default
        sidebar: true
        header: true
