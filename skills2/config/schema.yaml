apiVersion: config.ooder.net/v1
kind: SkillIndexSchema

metadata:
  version: "2.3.1"
  lastUpdated: "2026-03-11"
  description: "Skill Index 配置规范定义 - SE标准 v1.1.0"

spec:
  fields:
    - name: id
      type: string
      required: true
      pattern: "^skill-[a-z0-9-]+$"
      description: "技能唯一标识"
      
    - name: name
      type: string
      required: true
      maxLength: 100
      description: "技能显示名称"
      
    - name: version
      type: string
      required: true
      pattern: "^\\d+\\.\\d+\\.\\d+$"
      description: "语义化版本号"
      
    - name: description
      type: string
      required: true
      maxLength: 500
      description: "技能描述"
    
    - name: skillForm
      type: enum
      required: true
      values: [SCENE, PROVIDER, DRIVER, INTERNAL]
      description: "技能形态"
      
    - name: sceneType
      type: enum
      required: false
      values: [AUTO, TRIGGER]
      condition: "skillForm == SCENE"
      description: "场景类型 (仅SCENE时必需)"
      
    - name: visibility
      type: enum
      required: true
      values: [public, developer, internal]
      description: "可见性"
    
    - name: businessCategory
      type: enum
      required: true
      ref: "categories.yaml#/businessCategories"
      description: "业务分类"
      
    - name: subCategory
      type: string
      required: false
      maxLength: 50
      description: "子分类"
    
    - name: category
      type: enum
      required: true
      ref: "categories.yaml#/skillCategories"
      description: "SE标准技术分类"
      
    - name: capabilityCategory
      type: enum
      required: true
      ref: "categories.yaml#/capabilityCategories"
      description: "能力地址分类"
    
    - name: tags
      type: array
      required: false
      itemType: string
      description: "技能标签"
    
    - name: capabilityAddresses
      type: object
      required: true
      description: "能力地址配置"
      properties:
        required:
          type: array
          itemType: object
          description: "必需的能力地址"
        optional:
          type: array
          itemType: object
          description: "可选的能力地址"
      
    - name: roles
      type: array
      required: false
      condition: "skillForm == SCENE"
      description: "场景角色配置"
      itemType: object
      properties:
        name:
          type: string
          required: true
        displayName:
          type: string
          required: true
        minCount:
          type: integer
          required: true
        maxCount:
          type: integer
          required: true
        permissions:
          type: array
          itemType: string
          required: true
  
  validation:
    - rule: sceneTypeRequired
      condition: "skillForm == 'SCENE' && !sceneType"
      message: "SCENE技能必须指定sceneType (AUTO或TRIGGER)"
      severity: ERROR
      
    - rule: versionFormat
      condition: "!version || !version.matches('^\\d+\\.\\d+\\.\\d+$')"
      message: "版本号格式必须为 x.y.z"
      severity: ERROR
      
    - rule: idFormat
      condition: "!id || !id.matches('^skill-[a-z0-9-]+$')"
      message: "ID格式必须为 skill-{name}"
      severity: ERROR
      
    - rule: capabilityAddressesRequired
      condition: "!capabilityAddresses || !capabilityAddresses.required"
      message: "必须声明必需的能力地址"
      severity: WARNING
      
    - rule: rolesRequiredForScene
      condition: "skillForm == 'SCENE' && (!roles || roles.isEmpty())"
      message: "SCENE技能建议配置角色"
      severity: WARNING
