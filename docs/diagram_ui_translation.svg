<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700px" height="280px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-person { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
        .box-ui { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .box-agent { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-capability { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; rx: 8; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, "Microsoft YaHei", sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="box-person" x="30" y="100" width="100" height="60" rx="6"/>
<text class="text-title" x="80" y="125" text-anchor="middle">P</text>
<text class="text-small" x="80" y="145" text-anchor="middle">人</text>

<line class="arrow" x1="130" y1="130" x2="180" y2="130"/>

<rect class="box-ui" x="180" y="100" width="120" height="60" rx="6"/>
<text class="text-title" x="240" y="125" text-anchor="middle">UI</text>
<text class="text-small" x="240" y="145" text-anchor="middle">翻译层</text>

<line class="arrow" x1="300" y1="130" x2="350" y2="130"/>

<rect class="box-agent" x="350" y="100" width="100" height="60" rx="6"/>
<text class="text-title" x="400" y="125" text-anchor="middle">A</text>
<text class="text-small" x="400" y="145" text-anchor="middle">Agent</text>

<line class="arrow" x1="450" y1="130" x2="500" y2="130"/>

<rect class="box-capability" x="500" y="100" width="120" height="60" rx="6"/>
<text class="text-title" x="560" y="125" text-anchor="middle">能力执行</text>
<text class="text-small" x="560" y="145" text-anchor="middle">Capability</text>

<rect class="box" x="180" y="180" width="120" height="80" rx="6"/>
<text class="text" x="240" y="205" text-anchor="middle">翻译内容</text>
<text class="text-small" x="240" y="230" text-anchor="middle">• 表单翻译</text>
<text class="text-small" x="240" y="248" text-anchor="middle">• 指令翻译</text>

<line class="arrow" x1="240" y1="160" x2="240" y2="180"/>

</svg>