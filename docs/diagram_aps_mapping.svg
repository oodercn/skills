<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900px" height="520px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-primary { fill: #2563eb; stroke: none; rx: 8; }
        .box-secondary { fill: #1e40af; stroke: none; rx: 6; }
        .box-agent { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-person { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
        .box-scene { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, "Microsoft YaHei", sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 18px; font-weight: bold; fill: #ffffff; }
        .text-white { font-size: 13px; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
        .text-light { font-size: 11px; fill: #e2e8f0; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="box-primary" x="30" y="20" width="840" height="45" rx="6"/>
<text class="text-header" x="450" y="48" text-anchor="middle">场景与活动映射：A/P/S 拆分创新</text>

<rect class="box" x="100" y="90" width="700" height="300" rx="8"/>
<text class="text-title" x="450" y="120" text-anchor="middle">场景 (Scene)</text>

<text class="text-small" x="450" y="150" text-anchor="middle">场景对应内部活动块</text>

<rect class="box-agent" x="150" y="180" width="160" height="80" rx="6"/>
<text class="text-title" x="230" y="210" text-anchor="middle">A (Agent)</text>
<text class="text-small" x="230" y="235" text-anchor="middle">自动化执行</text>
<text class="text-small" x="230" y="250" text-anchor="middle">事件处理 · 能力调用</text>

<line class="arrow" x1="310" y1="220" x2="370" y2="220"/>

<rect class="box-person" x="370" y="180" width="160" height="80" rx="6"/>
<text class="text-title" x="450" y="210" text-anchor="middle">P (Person)</text>
<text class="text-small" x="450" y="235" text-anchor="middle">人工干预</text>
<text class="text-small" x="450" y="250" text-anchor="middle">审批决策 · 数据录入</text>

<line class="arrow" x1="530" y1="220" x2="590" y2="220"/>

<rect class="box-scene" x="590" y="180" width="160" height="80" rx="6"/>
<text class="text-title" x="670" y="210" text-anchor="middle">S (Scene)</text>
<text class="text-small" x="670" y="235" text-anchor="middle">子场景嵌套</text>
<text class="text-small" x="670" y="250" text-anchor="middle">场景组合 · 流程复用</text>

<rect class="box-secondary" x="150" y="290" width="600" height="80" rx="6"/>
<text class="text-white" x="450" y="320" text-anchor="middle">活动块动态组合</text>
<text class="text-light" x="450" y="345" text-anchor="middle">A → 自动执行 | P → 人工审批 | S → 子场景嵌套</text>
<text class="text-light" x="450" y="360" text-anchor="middle">灵活组合，支持复杂业务场景</text>

<rect class="box" x="100" y="420" width="700" height="80" rx="8"/>
<text class="text-title" x="450" y="450" text-anchor="middle">设计理念创新</text>
<text class="text" x="450" y="480" text-anchor="middle">传统：固定活动类型 | OoderAgent：A/P/S 动态组合</text>

</svg>