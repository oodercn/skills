<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800px" height="400px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
<text class="text-header" x="400" y="38" text-anchor="middle">Apex 分层架构</text>

<rect class="box" x="50" y="70" width="700" height="55"/>
<text class="text-title" x="400" y="92" text-anchor="middle">Presentation Layer</text>
<text class="text" x="400" y="112" text-anchor="middle">Web Console | REST API | WebSocket API</text>

<line class="arrow" x1="400" y1="125" x2="400" y2="145"/>

<rect class="box" x="50" y="145" width="700" height="55"/>
<text class="text-title" x="400" y="167" text-anchor="middle">Application Layer</text>
<text class="text" x="400" y="187" text-anchor="middle">Scene Engine | Agent Service | Capability Service | LLM Service</text>

<line class="arrow" x1="400" y1="200" x2="400" y2="220"/>

<rect class="box" x="50" y="220" width="700" height="55"/>
<text class="text-title" x="400" y="242" text-anchor="middle">Domain Layer</text>
<text class="text" x="400" y="262" text-anchor="middle">Scene | Capability | Agent | Skill | Organization | Knowledge</text>

<line class="arrow" x1="400" y1="275" x2="400" y2="295"/>

<rect class="box" x="50" y="295" width="700" height="55"/>
<text class="text-title" x="400" y="317" text-anchor="middle">Infrastructure Layer</text>
<text class="text" x="400" y="337" text-anchor="middle">SQLite | File Store | LLM Providers | Vector DB | Cache | Discovery</text>

<text class="text-small" x="400" y="385" text-anchor="middle">基于 ooderAgent SceneEngine 架构</text>
</svg>
