<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700px" height="500px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="title-box" x="20" y="15" width="660" height="35" rx="4"/>
<text class="text-header" x="350" y="38" text-anchor="middle">平台绑定与授权流程</text>

<rect class="box" x="50" y="70" width="600" height="50"/>
<text class="text-title" x="350" y="92" text-anchor="middle">1. 用户选择平台</text>
<text class="text" x="350" y="110" text-anchor="middle">[企业微信] [钉钉] [飞书]</text>

<line class="arrow" x1="350" y1="120" x2="350" y2="140"/>

<rect class="box-alt" x="50" y="140" width="600" height="70"/>
<text class="text-title" x="350" y="162" text-anchor="middle">2. 生成授权二维码</text>
<text class="text" x="350" y="182" text-anchor="middle">OAuth 2.0 授权流程</text>
<text class="text-small" x="350" y="198" text-anchor="middle">生成 state 参数，创建扫码页面</text>

<line class="arrow" x1="350" y1="210" x2="350" y2="230"/>

<rect class="box-highlight" x="50" y="230" width="600" height="70"/>
<text class="text-title" x="350" y="252" text-anchor="middle">3. 扫码授权</text>
<text class="text" x="350" y="272" text-anchor="middle">用户扫码 → 平台授权 → 回调 Apex</text>
<text class="text-small" x="350" y="288" text-anchor="middle">获取 userId, name, avatar, corpId, department</text>

<line class="arrow" x1="350" y1="300" x2="350" y2="320"/>

<rect class="box" x="50" y="320" width="600" height="70"/>
<text class="text-title" x="350" y="342" text-anchor="middle">4. 存储绑定关系</text>
<text class="text" x="350" y="362" text-anchor="middle">用户信息同步 → 组织架构同步 → 平台绑定记录</text>
<text class="text-small" x="350" y="378" text-anchor="middle">调用 skill-org-* 组织服务同步数据</text>

<line class="arrow" x1="350" y1="390" x2="350" y2="410"/>

<rect class="box-alt" x="50" y="410" width="600" height="50"/>
<text class="text-title" x="350" y="432" text-anchor="middle">5. 绑定完成</text>
<text class="text" x="350" y="450" text-anchor="middle">平台绑定成功 | 用户信息已同步 | 组织架构已同步</text>

<text class="text-small" x="350" y="485" text-anchor="middle">skill-platform-bind 场景技能</text>
</svg>
