<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900px" height="480px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-primary { fill: #2563eb; stroke: none; rx: 8; }
        .box-secondary { fill: #1e40af; stroke: none; rx: 6; }
        .box-open { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 8; }
        .box-controlled { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
        .box-workflow { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, "Microsoft YaHei", sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 18px; font-weight: bold; fill: #ffffff; }
        .text-white { font-size: 13px; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
        .text-light { font-size: 11px; fill: #e2e8f0; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="box-primary" x="30" y="20" width="840" height="45" rx="6"/>
<text class="text-header" x="450" y="48" text-anchor="middle">能力驯化过程：从开放到可控</text>

<rect class="box-open" x="80" y="100" width="180" height="120" rx="8"/>
<text class="text-title" x="170" y="130" text-anchor="middle">开放能力</text>
<text class="text-small" x="170" y="155" text-anchor="middle">(不可控)</text>
<text class="text" x="170" y="185" text-anchor="middle">• 来源各异</text>
<text class="text" x="170" y="205" text-anchor="middle">• 接口不同</text>

<line class="arrow" x1="260" y1="160" x2="360" y2="160"/>

<rect class="box-workflow" x="360" y="100" width="180" height="120" rx="8"/>
<text class="text-title" x="450" y="130" text-anchor="middle">Workflow</text>
<text class="text-small" x="450" y="155" text-anchor="middle">适配</text>
<text class="text" x="450" y="185" text-anchor="middle">• 输入约束</text>
<text class="text" x="450" y="205" text-anchor="middle">• 输出规范</text>

<line class="arrow" x1="540" y1="160" x2="640" y2="160"/>

<rect class="box-controlled" x="640" y="100" width="180" height="120" rx="8"/>
<text class="text-title" x="730" y="130" text-anchor="middle">可控能力</text>
<text class="text-small" x="730" y="155" text-anchor="middle">(可控可用)</text>
<text class="text" x="730" y="185" text-anchor="middle">• 行为可预测</text>
<text class="text" x="730" y="205" text-anchor="middle">• 结果可追踪</text>

<rect class="box" x="80" y="260" width="740" height="180" rx="8"/>
<text class="text-title" x="450" y="290" text-anchor="middle">适配内容详解</text>

<rect class="box-secondary" x="110" y="310" width="200" height="110" rx="6"/>
<text class="text-white" x="210" y="340" text-anchor="middle">输入约束</text>
<text class="text-light" x="210" y="365" text-anchor="middle">参数验证</text>
<text class="text-light" x="210" y="385" text-anchor="middle">格式转换</text>
<text class="text-light" x="210" y="405" text-anchor="middle">权限检查</text>

<rect class="box-secondary" x="350" y="310" width="200" height="110" rx="6"/>
<text class="text-white" x="450" y="340" text-anchor="middle">执行控制</text>
<text class="text-light" x="450" y="365" text-anchor="middle">超时管理</text>
<text class="text-light" x="450" y="385" text-anchor="middle">重试策略</text>
<text class="text-light" x="450" y="405" text-anchor="middle">并发控制</text>

<rect class="box-secondary" x="590" y="310" width="200" height="110" rx="6"/>
<text class="text-white" x="690" y="340" text-anchor="middle">输出控制</text>
<text class="text-light" x="690" y="365" text-anchor="middle">结果标准化</text>
<text class="text-light" x="690" y="385" text-anchor="middle">错误处理</text>
<text class="text-light" x="690" y="405" text-anchor="middle">状态同步</text>

</svg>