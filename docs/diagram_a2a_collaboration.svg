<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 320" width="750px" height="320px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-agent { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-workflow { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; rx: 8; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .arrow-bi { fill: none; stroke: #64748b; stroke-width: 2; marker-start: url(#arrowhead-start); marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, "Microsoft YaHei", sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowhead-start" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
        <polygon points="10 0, 0 3.5, 10 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="box-agent" x="50" y="80" width="150" height="100" rx="6"/>
<text class="text-title" x="125" y="110" text-anchor="middle">A (订单Agent)</text>
<text class="text" x="125" y="140" text-anchor="middle">订单创建</text>
<text class="text-small" x="125" y="160" text-anchor="middle">触发事件</text>

<rect class="box-agent" x="300" y="80" width="150" height="100" rx="6"/>
<text class="text-title" x="375" y="110" text-anchor="middle">A (库存Agent)</text>
<text class="text" x="375" y="140" text-anchor="middle">库存检查</text>
<text class="text-small" x="375" y="160" text-anchor="middle">返回结果</text>

<rect class="box-agent" x="550" y="80" width="150" height="100" rx="6"/>
<text class="text-title" x="625" y="110" text-anchor="middle">A (通知Agent)</text>
<text class="text" x="625" y="140" text-anchor="middle">发送通知</text>
<text class="text-small" x="625" y="160" text-anchor="middle">邮件/短信</text>

<line class="arrow" x1="200" y1="130" x2="300" y2="130"/>
<line class="arrow" x1="450" y1="130" x2="550" y2="130"/>

<rect class="box" x="50" y="200" width="150" height="40" rx="4"/>
<text class="text" x="125" y="225" text-anchor="middle">创建订单</text>

<rect class="box" x="300" y="200" width="150" height="40" rx="4"/>
<text class="text" x="375" y="225" text-anchor="middle">检查库存</text>

<rect class="box" x="550" y="200" width="150" height="40" rx="4"/>
<text class="text" x="625" y="225" text-anchor="middle">通知用户</text>

<line class="arrow" x1="125" y1="180" x2="125" y2="200"/>
<line class="arrow" x1="375" y1="180" x2="375" y2="200"/>
<line class="arrow" x1="625" y1="180" x2="625" y2="200"/>

<rect class="box-workflow" x="200" y="270" width="350" height="40" rx="4"/>
<text class="text-title" x="375" y="295" text-anchor="middle">Workflow 编排</text>

<line class="arrow" x1="125" y1="240" x2="125" y2="270"/>
<line class="arrow" x1="125" y1="270" x2="200" y2="290"/>
<line class="arrow" x1="375" y1="240" x2="375" y2="270"/>
<line class="arrow" x1="625" y1="240" x2="625" y2="270"/>
<line class="arrow" x1="625" y1="270" x2="550" y2="290"/>

</svg>