<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800px" height="480px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
<text class="text-header" x="400" y="38" text-anchor="middle">审批流程场景</text>

<rect class="box" x="300" y="70" width="200" height="50" rx="6"/>
<text class="text-title" x="400" y="95" text-anchor="middle">1. 用户发起申请</text>

<line class="arrow" x1="400" y1="120" x2="400" y2="155"/>

<rect class="box" x="300" y="155" width="200" height="50" rx="6"/>
<text class="text-title" x="400" y="180" text-anchor="middle">2. Workflow 启动流程</text>

<line class="arrow" x1="400" y1="205" x2="400" y2="240"/>

<rect class="box" x="300" y="240" width="200" height="50" rx="6"/>
<text class="text-title" x="400" y="265" text-anchor="middle">3. PageAgent 接收事件</text>

<line class="arrow" x1="400" y1="290" x2="400" y2="325"/>

<rect class="box" x="300" y="325" width="200" height="50" rx="6"/>
<text class="text-title" x="400" y="350" text-anchor="middle">4. A2UI 生成表单</text>

<line class="arrow" x1="400" y1="375" x2="400" y2="410"/>

<rect class="box" x="300" y="410" width="200" height="50" rx="6"/>
<text class="text-title" x="400" y="435" text-anchor="middle">5. 渲染审批表单</text>

</svg>