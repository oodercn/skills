<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700px" height="320px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-person { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
        .box-ui { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .box-agent { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .arrow-return { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 5,3; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, "Microsoft YaHei", sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="box-person" x="50" y="100" width="120" height="80" rx="6"/>
<text class="text-title" x="110" y="130" text-anchor="middle">P</text>
<text class="text-small" x="110" y="155" text-anchor="middle">审批人</text>
<text class="text-small" x="110" y="170" text-anchor="middle">Person</text>

<line class="arrow" x1="170" y1="140" x2="250" y2="140"/>
<text class="text-small" x="210" y="130">发起</text>

<rect class="box-ui" x="250" y="100" width="140" height="80" rx="6"/>
<text class="text-title" x="320" y="125" text-anchor="middle">UI</text>
<text class="text-small" x="320" y="145" text-anchor="middle">审批界面</text>
<text class="text" x="320" y="165" text-anchor="middle">翻译</text>

<line class="arrow" x1="390" y1="140" x2="470" y2="140"/>
<text class="text-small" x="430" y="130">翻译</text>

<rect class="box-agent" x="470" y="100" width="140" height="80" rx="6"/>
<text class="text-title" x="540" y="125" text-anchor="middle">A</text>
<text class="text-small" x="540" y="145" text-anchor="middle">审批Agent</text>
<text class="text" x="540" y="165" text-anchor="middle">执行</text>

<rect class="box" x="250" y="200" width="140" height="50" rx="4"/>
<text class="text" x="320" y="220" text-anchor="middle">审批意见</text>
<text class="text-small" x="320" y="240" text-anchor="middle">审批结果</text>

<rect class="box" x="470" y="200" width="140" height="50" rx="4"/>
<text class="text" x="540" y="220" text-anchor="middle">调用审批能力</text>
<text class="text-small" x="540" y="240" text-anchor="middle">更新流程状态</text>

<line class="arrow" x1="320" y1="180" x2="320" y2="200"/>
<line class="arrow" x1="540" y1="180" x2="540" y2="200"/>

<line class="arrow-return" x1="470" y1="225" x2="390" y2="225"/>
<text class="text-small" x="430" y="218">结果返回</text>

</svg>