<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900px" height="480px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-primary { fill: #2563eb; stroke: none; rx: 8; }
        .box-secondary { fill: #1e40af; stroke: none; rx: 6; }
        .box-agent { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-person { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
        .box-ui { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, "Microsoft YaHei", sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 18px; font-weight: bold; fill: #ffffff; }
        .text-white { font-size: 13px; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
        .text-light { font-size: 11px; fill: #e2e8f0; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="box-primary" x="30" y="20" width="840" height="45" rx="6"/>
<text class="text-header" x="450" y="48" text-anchor="middle">三元控制结构</text>

<rect class="box-primary" x="350" y="90" width="200" height="50" rx="6"/>
<text class="text-white" x="450" y="115" text-anchor="middle" font-size="15" font-weight="bold">Workflow 控制中心</text>
<text class="text-light" x="450" y="130" text-anchor="middle">协作规则定义与管理</text>

<line class="arrow" x1="450" y1="140" x2="450" y2="170"/>
<line class="arrow" x1="450" y1="170" x2="200" y2="200"/>
<line class="arrow" x1="450" y1="170" x2="450" y2="200"/>
<line class="arrow" x1="450" y1="170" x2="700" y2="200"/>

<rect class="box-agent" x="100" y="200" width="200" height="100" rx="8"/>
<text class="text-title" x="200" y="230" text-anchor="middle">A (Agent)</text>
<text class="text-small" x="200" y="255" text-anchor="middle">能力执行单元</text>
<text class="text" x="200" y="280" text-anchor="middle">• 能力执行</text>
<text class="text" x="200" y="295" text-anchor="middle">• 自动任务</text>

<rect class="box-ui" x="350" y="200" width="200" height="100" rx="8"/>
<text class="text-title" x="450" y="230" text-anchor="middle">UI (翻译层)</text>
<text class="text-small" x="450" y="255" text-anchor="middle">人机交互翻译</text>
<text class="text" x="450" y="280" text-anchor="middle">• 意图翻译</text>
<text class="text" x="450" y="295" text-anchor="middle">• 结果呈现</text>

<rect class="box-person" x="600" y="200" width="200" height="100" rx="8"/>
<text class="text-title" x="700" y="230" text-anchor="middle">P (Person)</text>
<text class="text-small" x="700" y="255" text-anchor="middle">人工决策</text>
<text class="text" x="700" y="280" text-anchor="middle">• 审批决策</text>
<text class="text" x="700" y="295" text-anchor="middle">• 数据输入</text>

<line class="arrow" x1="200" y1="300" x2="200" y2="340"/>
<line class="arrow" x1="450" y1="300" x2="450" y2="340"/>
<line class="arrow" x1="700" y1="300" x2="700" y2="340"/>

<rect class="box-secondary" x="100" y="340" width="200" height="50" rx="6"/>
<text class="text-white" x="200" y="365" text-anchor="middle">事件处理</text>
<text class="text-light" x="200" y="380" text-anchor="middle">能力调用 · 状态管理</text>

<rect class="box-secondary" x="350" y="340" width="200" height="50" rx="6"/>
<text class="text-white" x="450" y="365" text-anchor="middle">交互引导</text>
<text class="text-light" x="450" y="380" text-anchor="middle">表单翻译 · 结果可视化</text>

<rect class="box-secondary" x="600" y="340" width="200" height="50" rx="6"/>
<text class="text-white" x="700" y="365" text-anchor="middle">异常处理</text>
<text class="text-light" x="700" y="380" text-anchor="middle">人工干预 · 决策确认</text>

<rect class="box" x="100" y="420" width="700" height="40" rx="6"/>
<text class="text-title" x="450" y="445" text-anchor="middle">控制流程：P 发起 → UI 翻译 → A 执行 → Workflow 路由 → 结果返回</text>

</svg>