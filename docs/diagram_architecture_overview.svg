<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900px" height="500px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-primary { fill: #2563eb; stroke: none; rx: 8; }
        .box-secondary { fill: #1e40af; stroke: none; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, "Microsoft YaHei", sans-serif; font-size: 14px; fill: #334155; }
        .text-title { font-size: 16px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 18px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 12px; fill: #64748b; }
        .text-white { font-size: 14px; fill: #ffffff; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="box-primary" x="30" y="20" width="840" height="45" rx="6"/>
<text class="text-header" x="450" y="48" text-anchor="middle">OoderAgent 分层架构</text>

<rect class="box" x="80" y="90" width="740" height="70"/>
<text class="text-title" x="450" y="118" text-anchor="middle">表现层 (Presentation Layer)</text>
<text class="text" x="200" y="145" text-anchor="middle">Web 控制台</text>
<text class="text" x="450" y="145" text-anchor="middle">REST API</text>
<text class="text" x="700" y="145" text-anchor="middle">WebSocket API</text>

<line class="arrow" x1="450" y1="160" x2="450" y2="195"/>

<rect class="box" x="80" y="195" width="740" height="90"/>
<text class="text-title" x="450" y="223" text-anchor="middle">应用层 (Application Layer)</text>
<rect class="box-secondary" x="130" y="235" width="180" height="40" rx="4"/>
<text class="text-white" x="220" y="260" text-anchor="middle">场景引擎</text>
<rect class="box-secondary" x="360" y="235" width="180" height="40" rx="4"/>
<text class="text-white" x="450" y="260" text-anchor="middle">Agent 服务</text>
<rect class="box-secondary" x="590" y="235" width="180" height="40" rx="4"/>
<text class="text-white" x="680" y="260" text-anchor="middle">能力服务</text>

<line class="arrow" x1="450" y1="285" x2="450" y2="320"/>

<rect class="box" x="80" y="320" width="740" height="70"/>
<text class="text-title" x="450" y="348" text-anchor="middle">领域层 (Domain Layer)</text>
<text class="text" x="130" y="375" text-anchor="middle">场景</text>
<text class="text" x="220" y="375" text-anchor="middle">能力</text>
<text class="text" x="310" y="375" text-anchor="middle">Agent</text>
<text class="text" x="400" y="375" text-anchor="middle">技能</text>
<text class="text" x="490" y="375" text-anchor="middle">组织</text>
<text class="text" x="580" y="375" text-anchor="middle">知识</text>
<text class="text" x="670" y="375" text-anchor="middle">权限</text>
<text class="text" x="760" y="375" text-anchor="middle">流程</text>

<line class="arrow" x1="450" y1="390" x2="450" y2="425"/>

<rect class="box" x="80" y="425" width="740" height="60"/>
<text class="text-title" x="450" y="453" text-anchor="middle">基础设施层 (Infrastructure Layer)</text>
<text class="text" x="180" y="475" text-anchor="middle">数据存储</text>
<text class="text" x="320" y="475" text-anchor="middle">文件系统</text>
<text class="text" x="460" y="475" text-anchor="middle">LLM 服务</text>
<text class="text" x="600" y="475" text-anchor="middle">向量数据库</text>
<text class="text" x="740" y="475" text-anchor="middle">缓存服务</text>

</svg>