<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900px" height="600px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-primary { fill: #2563eb; stroke: none; rx: 8; }
        .box-secondary { fill: #1e40af; stroke: none; rx: 6; }
        .box-workflow { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 6; }
        .box-a2ui { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 6; }
        .box-agent { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 6; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .arrow-event { fill: none; stroke: #d97706; stroke-width: 2; stroke-dasharray: 5,3; marker-end: url(#arrowhead-event); }
        .text { font-family: -apple-system, "Microsoft YaHei", sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 18px; font-weight: bold; fill: #ffffff; }
        .text-white { font-size: 13px; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowhead-event" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="box-primary" x="30" y="20" width="840" height="45" rx="6"/>
<text class="text-header" x="450" y="48" text-anchor="middle">Workflow 与 A2UI 深度融合架构</text>

<rect class="box-workflow" x="80" y="90" width="740" height="100"/>
<text class="text-title" x="450" y="115" text-anchor="middle">Workflow 引擎</text>
<rect class="box-secondary" x="120" y="130" width="140" height="45" rx="4"/>
<text class="text-white" x="190" y="157" text-anchor="middle">流程启动</text>
<rect class="box-secondary" x="300" y="130" width="140" height="45" rx="4"/>
<text class="text-white" x="370" y="157" text-anchor="middle">任务分配</text>
<rect class="box-secondary" x="480" y="130" width="140" height="45" rx="4"/>
<text class="text-white" x="550" y="157" text-anchor="middle">路由判断</text>
<rect class="box-secondary" x="660" y="130" width="140" height="45" rx="4"/>
<text class="text-white" x="730" y="157" text-anchor="middle">流程完成</text>

<line class="arrow-event" x1="450" y1="190" x2="450" y2="230"/>
<text class="text-small" x="500" y="215">触发事件</text>

<rect class="box" x="80" y="230" width="740" height="70"/>
<text class="text-title" x="450" y="258" text-anchor="middle">事件总线 (Event Bus)</text>
<rect class="box-secondary" x="150" y="270" width="160" height="22" rx="4"/>
<text class="text-white" x="230" y="286" text-anchor="middle">workflow.started</text>
<rect class="box-secondary" x="370" y="270" width="160" height="22" rx="4"/>
<text class="text-white" x="450" y="286" text-anchor="middle">task.assigned</text>
<rect class="box-secondary" x="590" y="270" width="160" height="22" rx="4"/>
<text class="text-white" x="670" y="286" text-anchor="middle">workflow.completed</text>

<line class="arrow-event" x1="450" y1="300" x2="450" y2="340"/>
<text class="text-small" x="500" y="325">监听事件</text>

<rect class="box-agent" x="80" y="340" width="740" height="120"/>
<text class="text-title" x="450" y="365" text-anchor="middle">PageAgent 智能页面代理</text>
<text class="text" x="150" y="400">1. 接收 Workflow 事件</text>
<text class="text" x="150" y="425">2. 调用 A2UI 生成界面</text>
<text class="text" x="500" y="400">3. 管理页面组件生命周期</text>
<text class="text" x="500" y="425">4. 绑定数据与事件处理</text>
<text class="text" x="300" y="450">5. 渲染输出到前端</text>

<line class="arrow" x1="450" y1="460" x2="450" y2="500"/>
<text class="text-small" x="500" y="485">调用生成</text>

<rect class="box-a2ui" x="80" y="500" width="740" height="80"/>
<text class="text-title" x="450" y="525" text-anchor="middle">A2UI 引擎</text>
<rect class="box-secondary" x="150" y="540" width="140" height="30" rx="4"/>
<text class="text-white" x="220" y="560" text-anchor="middle">表单生成</text>
<rect class="box-secondary" x="380" y="540" width="140" height="30" rx="4"/>
<text class="text-white" x="450" y="560" text-anchor="middle">列表生成</text>
<rect class="box-secondary" x="610" y="540" width="140" height="30" rx="4"/>
<text class="text-white" x="680" y="560" text-anchor="middle">图表生成</text>

</svg>