<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" width="700px" height="340px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .box-success { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
        .decision { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="title-box" x="20" y="15" width="660" height="35" rx="4"/>
<text class="text-header" x="350" y="38" text-anchor="middle">双模式推导架构</text>

<rect class="box" x="250" y="70" width="200" height="50"/>
<text class="text-title" x="350" y="100" text-anchor="middle">推导请求入口</text>

<line class="arrow" x1="350" y1="120" x2="350" y2="150"/>

<polygon class="decision" points="350,150 420,190 350,230 280,190"/>
<text class="text" x="350" y="195" text-anchor="middle">LLM可用?</text>

<line class="arrow" x1="280" y1="190" x2="180" y2="190"/>
<text class="text-small" x="230" y="180">否</text>

<line class="arrow" x1="420" y1="190" x2="520" y2="190"/>
<text class="text-small" x="470" y="180">是</text>

<rect class="box-alt" x="80" y="240" width="180" height="60"/>
<text class="text-title" x="170" y="265" text-anchor="middle">规则推导模式</text>
<text class="text-small" x="170" y="285" text-anchor="middle">关键词匹配 | 降级兜底</text>

<rect class="box-success" x="440" y="240" width="180" height="60"/>
<text class="text-title" x="530" y="265" text-anchor="middle">LLM推导模式</text>
<text class="text-small" x="530" y="285" text-anchor="middle">语义理解 | Function Calling</text>

<line class="arrow" x1="170" y1="300" x2="170" y2="320"/>
<line class="arrow" x1="170" y1="320" x2="350" y2="320"/>
<line class="arrow" x1="530" y1="300" x2="530" y2="320"/>
<line class="arrow" x1="530" y1="320" x2="350" y2="320"/>

<rect class="box-highlight" x="280" y="310" width="140" height="30"/>
<text class="text" x="350" y="330" text-anchor="middle" font-weight="bold">结果缓存</text>
</svg>
