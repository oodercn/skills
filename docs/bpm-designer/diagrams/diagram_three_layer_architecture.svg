<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 490" width="800px" height="490px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .layer-box { fill: #f1f5f9; stroke: #64748b; stroke-width: 1; rx: 6; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
        .text-layer { font-size: 14px; font-weight: bold; fill: #334155; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
<text class="text-header" x="400" y="38" text-anchor="middle">三层六模块技术架构</text>

<rect class="layer-box" x="30" y="60" width="740" height="120"/>
<text class="text-layer" x="50" y="85">表现层 (Presentation)</text>

<rect class="box" x="60" y="100" width="200" height="60"/>
<text class="text-title" x="160" y="125" text-anchor="middle">NLP交互界面</text>
<text class="text-small" x="160" y="145" text-anchor="middle">自然语言输入 | 多轮对话</text>

<rect class="box" x="300" y="100" width="200" height="60"/>
<text class="text-title" x="400" y="125" text-anchor="middle">可视化设计器</text>
<text class="text-small" x="400" y="145" text-anchor="middle">流程图编辑 | 实时预览</text>

<rect class="box" x="540" y="100" width="200" height="60"/>
<text class="text-title" x="640" y="125" text-anchor="middle">面板渲染引擎</text>
<text class="text-small" x="640" y="145" text-anchor="middle">结果渲染 | 交互配置</text>

<line class="arrow" x1="400" y1="180" x2="400" y2="200"/>

<rect class="layer-box" x="30" y="200" width="740" height="120"/>
<text class="text-layer" x="50" y="225">智能层 (Intelligence)</text>

<rect class="box-alt" x="60" y="240" width="200" height="60"/>
<text class="text-title" x="160" y="265" text-anchor="middle">LLM服务集成</text>
<text class="text-small" x="160" y="285" text-anchor="middle">OpenAI | 阿里云百炼</text>

<rect class="box-alt" x="300" y="240" width="200" height="60"/>
<text class="text-title" x="400" y="265" text-anchor="middle">Prompt模板引擎</text>
<text class="text-small" x="400" y="285" text-anchor="middle">变量替换 | 上下文注入</text>

<rect class="box-alt" x="540" y="240" width="200" height="60"/>
<text class="text-title" x="640" y="265" text-anchor="middle">Function Calling</text>
<text class="text-small" x="640" y="285" text-anchor="middle">双向交互 | 实时数据</text>

<line class="arrow" x1="400" y1="320" x2="400" y2="340"/>

<rect class="layer-box" x="30" y="340" width="740" height="140"/>
<text class="text-layer" x="50" y="365">数据层 (Data)</text>

<rect class="box-highlight" x="60" y="380" width="140" height="50"/>
<text class="text" x="130" y="405" text-anchor="middle" font-weight="bold">组织架构数据</text>
<text class="text-small" x="130" y="420" text-anchor="middle">部门 | 人员 | 角色</text>

<rect class="box-highlight" x="220" y="380" width="140" height="50"/>
<text class="text" x="290" y="405" text-anchor="middle" font-weight="bold">能力目录数据</text>
<text class="text-small" x="290" y="420" text-anchor="middle">能力 | 服务 | 接口</text>

<rect class="box-highlight" x="380" y="380" width="140" height="50"/>
<text class="text" x="450" y="405" text-anchor="middle" font-weight="bold">表单模板数据</text>
<text class="text-small" x="450" y="420" text-anchor="middle">结构 | 字段 | 规则</text>

<rect class="box-highlight" x="540" y="380" width="140" height="50"/>
<text class="text" x="610" y="405" text-anchor="middle" font-weight="bold">场景模板数据</text>
<text class="text-small" x="610" y="420" text-anchor="middle">预定义模板</text>

<rect class="box" x="700" y="380" width="60" height="50"/>
<text class="text" x="730" y="405" text-anchor="middle" font-weight="bold">缓存</text>
<text class="text-small" x="730" y="420" text-anchor="middle">Redis</text>

<rect class="box" x="60" y="440" width="140" height="35"/>
<text class="text" x="130" y="462" text-anchor="middle">流程定义存储</text>

<rect class="box" x="220" y="440" width="140" height="35"/>
<text class="text" x="290" y="462" text-anchor="middle">历史记录</text>

<rect class="box" x="380" y="440" width="140" height="35"/>
<text class="text" x="450" y="462" text-anchor="middle">知识库</text>
</svg>
