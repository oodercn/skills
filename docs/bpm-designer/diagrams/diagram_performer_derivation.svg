<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 510" width="700px" height="510px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .box-success { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
        .text-step { font-size: 12px; font-weight: bold; fill: #2563eb; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="title-box" x="20" y="15" width="660" height="35" rx="4"/>
<text class="text-header" x="350" y="38" text-anchor="middle">办理人智能推导流程</text>

<rect class="box" x="250" y="70" width="200" height="50"/>
<circle cx="280" cy="95" r="15" fill="#2563eb"/>
<text class="text-step" x="280" y="100" text-anchor="middle">1</text>
<text class="text-title" x="370" y="100" text-anchor="middle">用户输入</text>

<line class="arrow" x1="350" y1="120" x2="350" y2="150"/>

<rect class="box-alt" x="250" y="150" width="200" height="50"/>
<circle cx="280" cy="175" r="15" fill="#1e40af"/>
<text class="text-step" x="280" y="180" text-anchor="middle" fill="#fff">2</text>
<text class="text-title" x="370" y="180" text-anchor="middle">LLM分析</text>

<line class="arrow" x1="350" y1="200" x2="350" y2="230"/>

<rect class="box-highlight" x="250" y="230" width="200" height="50"/>
<circle cx="280" cy="255" r="15" fill="#d97706"/>
<text class="text-step" x="280" y="260" text-anchor="middle" fill="#fff">3</text>
<text class="text-title" x="370" y="260" text-anchor="middle">Function调用</text>

<line class="arrow" x1="350" y1="280" x2="350" y2="310"/>

<rect class="box" x="250" y="310" width="200" height="50"/>
<circle cx="280" cy="335" r="15" fill="#64748b"/>
<text class="text-step" x="280" y="340" text-anchor="middle" fill="#fff">4</text>
<text class="text-title" x="370" y="340" text-anchor="middle">数据返回</text>

<line class="arrow" x1="350" y1="360" x2="350" y2="390"/>

<rect class="box-alt" x="250" y="390" width="200" height="50"/>
<circle cx="280" cy="415" r="15" fill="#1e40af"/>
<text class="text-step" x="280" y="420" text-anchor="middle" fill="#fff">5</text>
<text class="text-title" x="370" y="420" text-anchor="middle">LLM推理</text>

<line class="arrow" x1="350" y1="440" x2="350" y2="470"/>

<rect class="box-success" x="250" y="470" width="200" height="30"/>
<circle cx="280" cy="485" r="15" fill="#16a34a"/>
<text class="text-step" x="280" y="490" text-anchor="middle" fill="#fff">6</text>
<text class="text-title" x="370" y="490" text-anchor="middle">结果输出</text>

<rect class="box" x="500" y="150" width="160" height="180"/>
<text class="text-title" x="580" y="175" text-anchor="middle">示例输入</text>
<text class="text-small" x="580" y="200" text-anchor="middle">"HR面试候选人"</text>
<line x1="510" y1="210" x2="650" y2="210" stroke="#e2e8f0" stroke-width="1"/>
<text class="text-small" x="580" y="235" text-anchor="middle">识别关键词:</text>
<text class="text-small" x="580" y="255" text-anchor="middle">"HR"、"面试"</text>
<line x1="510" y1="265" x2="650" y2="265" stroke="#e2e8f0" stroke-width="1"/>
<text class="text-small" x="580" y="290" text-anchor="middle">调用函数:</text>
<text class="text-small" x="580" y="310" text-anchor="middle">get_users_by_role</text>

<rect class="box" x="40" y="310" width="160" height="180"/>
<text class="text-title" x="120" y="335" text-anchor="middle">输出结果</text>
<text class="text-small" x="120" y="360" text-anchor="middle">assigneeType: ROLE</text>
<text class="text-small" x="120" y="380" text-anchor="middle">assigneeId: hr_specialist</text>
<text class="text-small" x="120" y="400" text-anchor="middle">assigneeName: HR专员</text>
<line x1="50" y1="410" x2="190" y2="410" stroke="#e2e8f0" stroke-width="1"/>
<text class="text-small" x="120" y="435" text-anchor="middle">reasoning:</text>
<text class="text-small" x="120" y="455" text-anchor="middle">"活动涉及面试环节</text>
<text class="text-small" x="120" y="475" text-anchor="middle">属于HR职能范畴..."</text>
</svg>
