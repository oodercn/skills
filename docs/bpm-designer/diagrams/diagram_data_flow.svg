<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800px" height="340px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .arrow-dashed { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
<text class="text-header" x="400" y="38" text-anchor="middle">数据流转架构</text>

<rect class="box" x="50" y="80" width="120" height="60"/>
<text class="text-title" x="110" y="105" text-anchor="middle">用户输入</text>
<text class="text-small" x="110" y="125" text-anchor="middle">自然语言</text>

<line class="arrow" x1="170" y1="110" x2="220" y2="110"/>

<rect class="box-alt" x="220" y="80" width="120" height="60"/>
<text class="text-title" x="280" y="105" text-anchor="middle">NLP解析</text>
<text class="text-small" x="280" y="125" text-anchor="middle">意图识别</text>

<line class="arrow" x1="340" y1="110" x2="390" y2="110"/>

<rect class="box-alt" x="390" y="80" width="120" height="60"/>
<text class="text-title" x="450" y="105" text-anchor="middle">LLM推理</text>
<text class="text-small" x="450" y="125" text-anchor="middle">语义理解</text>

<line class="arrow" x1="510" y1="110" x2="560" y2="110"/>

<rect class="box-alt" x="560" y="80" width="120" height="60"/>
<text class="text-title" x="620" y="105" text-anchor="middle">Function调用</text>
<text class="text-small" x="620" y="125" text-anchor="middle">数据获取</text>

<line class="arrow" x1="680" y1="110" x2="730" y2="110"/>

<rect class="box" x="730" y="80" width="40" height="60"/>
<text class="text" x="750" y="115" text-anchor="middle">...</text>

<line class="arrow" x1="750" y1="140" x2="750" y2="180"/>
<line class="arrow" x1="750" y1="180" x2="620" y2="180"/>
<line class="arrow" x1="620" y1="180" x2="620" y2="200"/>

<rect class="box-highlight" x="560" y="200" width="120" height="60"/>
<text class="text-title" x="620" y="225" text-anchor="middle">结果聚合</text>
<text class="text-small" x="620" y="245" text-anchor="middle">数据整合</text>

<line class="arrow" x1="560" y1="230" x2="510" y2="230"/>

<rect class="box" x="390" y="200" width="120" height="60"/>
<text class="text-title" x="450" y="225" text-anchor="middle">面板渲染</text>
<text class="text-small" x="450" y="245" text-anchor="middle">可视化展示</text>

<line class="arrow" x1="390" y1="230" x2="340" y2="230"/>

<rect class="box" x="220" y="200" width="120" height="60"/>
<text class="text-title" x="280" y="225" text-anchor="middle">用户确认</text>
<text class="text-small" x="280" y="245" text-anchor="middle">交互反馈</text>

<line class="arrow-dashed" x1="220" y1="230" x2="170" y2="230"/>
<line class="arrow-dashed" x1="170" y1="230" x2="170" y2="140"/>
<line class="arrow-dashed" x1="170" y1="140" x2="110" y2="140"/>

<text class="text-small" x="140" y="290" text-anchor="middle">反馈修正循环</text>

<rect class="box" x="50" y="300" width="700" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0"/>
<text class="text-small" x="400" y="320" text-anchor="middle">缓存层: L1本地内存(5min) → L2 Redis(30min) → L3 数据库持久化</text>
</svg>
