<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900px" height="700px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .box-success { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .layer-box { fill: #f1f5f9; stroke: #64748b; stroke-width: 1; rx: 6; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .arrow-dashed { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; fill: #334155; }
        .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 15px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 10px; fill: #64748b; }
        .text-layer { font-size: 13px; font-weight: bold; fill: #334155; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="title-box" x="20" y="15" width="860" height="35" rx="4"/>
<text class="text-header" x="450" y="38" text-anchor="middle">场景驱动与Workflow完整关系图</text>

<rect class="layer-box" x="30" y="60" width="840" height="100"/>
<text class="text-layer" x="50" y="85">应用层 (Application Layer)</text>

<rect class="box" x="60" y="100" width="150" height="50"/>
<text class="text-title" x="135" y="120" text-anchor="middle">审批场景</text>
<text class="text-small" x="135" y="140" text-anchor="middle">Approval Scene</text>

<rect class="box" x="230" y="100" width="150" height="50"/>
<text class="text-title" x="305" y="120" text-anchor="middle">客服场景</text>
<text class="text-small" x="305" y="140" text-anchor="middle">Service Scene</text>

<rect class="box" x="400" y="100" width="150" height="50"/>
<text class="text-title" x="475" y="120" text-anchor="middle">协作场景</text>
<text class="text-small" x="475" y="140" text-anchor="middle">Collab Scene</text>

<rect class="box" x="570" y="100" width="150" height="50"/>
<text class="text-title" x="645" y="120" text-anchor="middle">分析场景</text>
<text class="text-small" x="645" y="140" text-anchor="middle">Analytics Scene</text>

<rect class="box" x="740" y="100" width="120" height="50"/>
<text class="text-title" x="800" y="120" text-anchor="middle">...</text>

<line class="arrow" x1="450" y1="150" x2="450" y2="175"/>

<rect class="layer-box" x="30" y="175" width="840" height="140"/>
<text class="text-layer" x="50" y="200">场景层 (Scene Layer)</text>

<rect class="box-alt" x="60" y="220" width="180" height="80"/>
<text class="text-title" x="150" y="245" text-anchor="middle">Scene A</text>
<text class="text-small" x="150" y="265" text-anchor="middle">Workflow-1</text>
<text class="text-small" x="150" y="280" text-anchor="middle">Capabilities</text>

<rect class="box-alt" x="260" y="220" width="180" height="80"/>
<text class="text-title" x="350" y="245" text-anchor="middle">Scene B</text>
<text class="text-small" x="350" y="265" text-anchor="middle">Workflow-2</text>
<text class="text-small" x="350" y="280" text-anchor="middle">Capabilities</text>

<rect class="box-alt" x="460" y="220" width="180" height="80"/>
<text class="text-title" x="550" y="245" text-anchor="middle">Scene C</text>
<text class="text-small" x="550" y="265" text-anchor="middle">Workflow-3</text>
<text class="text-small" x="550" y="280" text-anchor="middle">Capabilities</text>

<rect class="box-highlight" x="660" y="220" width="200" height="80"/>
<text class="text-title" x="760" y="240" text-anchor="middle">A2A通讯</text>
<text class="text-small" x="760" y="260" text-anchor="middle">跨场景协调</text>
<text class="text-small" x="760" y="280" text-anchor="middle">CoordinationRules</text>

<line class="arrow-dashed" x1="240" y1="260" x2="260" y2="260"/>
<line class="arrow-dashed" x1="440" y1="260" x2="460" y2="260"/>

<line class="arrow" x1="450" y1="295" x2="450" y2="320"/>

<rect class="layer-box" x="30" y="320" width="840" height="120"/>
<text class="text-layer" x="50" y="345">工作流层 (Workflow Layer)</text>

<rect class="box-success" x="60" y="360" width="120" height="60"/>
<text class="text-title" x="120" y="385" text-anchor="middle">Step 1</text>
<text class="text-small" x="120" y="405" text-anchor="middle">capability: collect</text>
<text class="text-small" x="120" y="420" text-anchor="middle">dependsOn: []</text>

<rect class="box-success" x="200" y="360" width="120" height="60"/>
<text class="text-title" x="260" y="385" text-anchor="middle">Step 2</text>
<text class="text-small" x="260" y="405" text-anchor="middle">capability: validate</text>
<text class="text-small" x="260" y="420" text-anchor="middle">dependsOn: [step1]</text>

<rect class="box-success" x="340" y="360" width="120" height="60"/>
<text class="text-title" x="400" y="385" text-anchor="middle">Step 3</text>
<text class="text-small" x="400" y="405" text-anchor="middle">capability: process</text>
<text class="text-small" x="400" y="420" text-anchor="middle">dependsOn: [step2]</text>

<rect class="box-success" x="480" y="360" width="120" height="60"/>
<text class="text-title" x="540" y="385" text-anchor="middle">Step 4</text>
<text class="text-small" x="540" y="405" text-anchor="middle">capability: notify</text>
<text class="text-small" x="540" y="420" text-anchor="middle">dependsOn: [step3]</text>

<rect class="box-highlight" x="620" y="360" width="240" height="60"/>
<text class="text-title" x="740" y="385" text-anchor="middle">Triggers</text>
<text class="text-small" x="740" y="405" text-anchor="middle">Timer | Event | Manual</text>

<line class="arrow" x1="180" y1="395" x2="200" y2="395"/>
<line class="arrow" x1="320" y1="395" x2="340" y2="395"/>
<line class="arrow" x1="460" y1="395" x2="480" y2="395"/>

<line class="arrow" x1="450" y1="440" x2="450" y2="465"/>

<rect class="layer-box" x="30" y="465" width="840" height="80"/>
<text class="text-layer" x="50" y="490">能力层 (Capability Layer)</text>

<rect class="box" x="60" y="505" width="120" height="30"/>
<text class="text" x="120" y="525" text-anchor="middle">数据采集能力</text>
<rect class="box" x="200" y="505" width="120" height="30"/>
<text class="text" x="260" y="525" text-anchor="middle">数据验证能力</text>
<rect class="box" x="340" y="505" width="120" height="30"/>
<text class="text" x="400" y="525" text-anchor="middle">数据处理能力</text>
<rect class="box" x="480" y="505" width="120" height="30"/>
<text class="text" x="540" y="525" text-anchor="middle">消息通知能力</text>
<rect class="box" x="620" y="505" width="120" height="30"/>
<text class="text" x="680" y="525" text-anchor="middle">流程审批能力</text>
<rect class="box" x="760" y="505" width="100" height="30"/>
<text class="text" x="810" y="525" text-anchor="middle">...</text>

<line class="arrow" x1="450" y1="535" x2="450" y2="560"/>

<rect class="layer-box" x="30" y="560" width="840" height="120"/>
<text class="text-layer" x="50" y="585">通讯层 (Communication Layer)</text>

<rect class="box" x="80" y="600" width="100" height="60"/>
<text class="text-title" x="130" y="625" text-anchor="middle">A2A</text>
<text class="text-small" x="130" y="645" text-anchor="middle">Agent间通讯</text>

<rect class="box" x="200" y="600" width="100" height="60"/>
<text class="text-title" x="250" y="625" text-anchor="middle">A2P</text>
<text class="text-small" x="250" y="645" text-anchor="middle">Agent到流程</text>

<rect class="box" x="320" y="600" width="100" height="60"/>
<text class="text-title" x="370" y="625" text-anchor="middle">P2A</text>
<text class="text-small" x="370" y="645" text-anchor="middle">人到Agent</text>

<rect class="box" x="440" y="600" width="100" height="60"/>
<text class="text-title" x="490" y="625" text-anchor="middle">P2P</text>
<text class="text-small" x="490" y="645" text-anchor="middle">人间协作</text>

<rect class="box-alt" x="560" y="600" width="300" height="60"/>
<text class="text-title" x="710" y="625" text-anchor="middle">UnifiedA2AService</text>
<text class="text-small" x="710" y="645" text-anchor="middle">统一通讯服务</text>
</svg>
