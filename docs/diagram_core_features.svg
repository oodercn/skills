<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" width="900px" height="450px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 10; }
        .box-primary { fill: #2563eb; stroke: none; rx: 8; }
        .box-feature { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, "Microsoft YaHei", sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 16px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 20px; font-weight: bold; fill: #ffffff; }
        .text-number { font-size: 24px; font-weight: bold; fill: #2563eb; }
        .text-desc { font-size: 12px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="box-primary" x="30" y="20" width="840" height="50" rx="6"/>
