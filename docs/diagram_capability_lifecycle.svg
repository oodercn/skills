<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900px" height="400px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-primary { fill: #2563eb; stroke: none; rx: 8; }
        .box-secondary { fill: #1e40af; stroke: none; rx: 6; }
        .box-discover { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .box-install { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-adapt { fill: #e0e7ff; stroke: #4f46e5; stroke-width: 2; rx: 8; }
        .box-usable { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
        .box-run { fill: #cffafe; stroke: #0891b2; stroke-width: 2; rx: 8; }
        .box-monitor { fill: #fce7f3; stroke: #db2777; stroke-width: 2; rx: 8; }
        .box-deprecate { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 8; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, "Microsoft YaHei", sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 18px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="box-primary" x="30" y="20" width="840" height="45" rx="6"/>
<text class="text-header" x="450" y="48" text-anchor="middle">能力生命周期管理</text>

<rect class="box-discover" x="50" y="90" width="100" height="80" rx="6"/>
<text class="text-title" x="100" y="115" text-anchor="middle">发现</text>
<text class="text-small" x="100" y="135" text-anchor="middle">Discover</text>
<text class="text-small" x="100" y="160" text-anchor="middle">扫描元数据</text>

<line class="arrow" x1="150" y1="130" x2="180" y2="130"/>

<rect class="box-install" x="180" y="90" width="100" height="80" rx="6"/>
<text class="text-title" x="230" y="115" text-anchor="middle">安装</text>
<text class="text-small" x="230" y="135" text-anchor="middle">Install</text>
<text class="text-small" x="230" y="160" text-anchor="middle">部署能力包</text>

<line class="arrow" x1="280" y1="130" x2="310" y2="130"/>

<rect class="box-adapt" x="310" y="90" width="100" height="80" rx="6"/>
<text class="text-title" x="360" y="115" text-anchor="middle">适配</text>
<text class="text-small" x="360" y="135" text-anchor="middle">Adapt</text>
<text class="text-small" x="360" y="160" text-anchor="middle">Workflow适配</text>

<line class="arrow" x1="410" y1="130" x2="440" y2="130"/>

<rect class="box-usable" x="440" y="90" width="100" height="80" rx="6"/>
<text class="text-title" x="490" y="115" text-anchor="middle">可用</text>
<text class="text-small" x="490" y="135" text-anchor="middle">Usable</text>
<text class="text-small" x="490" y="160" text-anchor="middle">启用能力</text>

<line class="arrow" x1="540" y1="130" x2="570" y2="130"/>

<rect class="box-run" x="570" y="90" width="100" height="80" rx="6"/>
<text class="text-title" x="620" y="115" text-anchor="middle">运行</text>
<text class="text-small" x="620" y="135" text-anchor="middle">Run</text>
<text class="text-small" x="620" y="160" text-anchor="middle">执行能力</text>

<line class="arrow" x1="670" y1="130" x2="700" y2="130"/>

<rect class="box-monitor" x="700" y="90" width="100" height="80" rx="6"/>
<text class="text-title" x="750" y="115" text-anchor="middle">监控</text>
<text class="text-small" x="750" y="135" text-anchor="middle">Monitor</text>
<text class="text-small" x="750" y="160" text-anchor="middle">收集指标</text>

<line class="arrow" x1="800" y1="130" x2="800" y2="220"/>
<line class="arrow" x1="800" y1="220" x2="750" y2="220"/>

<rect class="box-deprecate" x="650" y="200" width="100" height="80" rx="6"/>
<text class="text-title" x="700" y="225" text-anchor="middle">废弃</text>
<text class="text-small" x="700" y="245" text-anchor="middle">Deprecate</text>
<text class="text-small" x="700" y="270" text-anchor="middle">停止服务</text>

<rect class="box" x="50" y="320" width="800" height="60" rx="8"/>
<text class="text-title" x="450" y="350" text-anchor="middle">核心原则：能力安装时必须进行 Workflow 适配才能变为可控可用</text>
<text class="text-small" x="450" y="370" text-anchor="middle">开放能力 + Workflow 规则 = 可控可用的能力组合</text>

</svg>