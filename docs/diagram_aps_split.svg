<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700px" height="350px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-scene { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; rx: 8; }
        .box-agent { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 6; }
        .box-person { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 6; }
        .box-subscene { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 6; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, "Microsoft YaHei", sans-serif; font-size: 12px; fill: #334155; }
        .text-title { font-size: 14px; font-weight: bold; fill: #1e40af; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="box-scene" x="50" y="30" width="600" height="40" rx="6"/>
<text class="text-title" x="350" y="55" text-anchor="middle">场景 (Scene) ───► 内部活动块</text>

<rect class="box-agent" x="50" y="100" width="180" height="100" rx="6"/>
<text class="text-title" x="140" y="125" text-anchor="middle">A (Agent)</text>
<text class="text-small" x="140" y="150" text-anchor="middle">自动化执行</text>
<text class="text" x="140" y="175" text-anchor="middle">• 事件处理</text>
<text class="text" x="140" y="190" text-anchor="middle">• 自动任务</text>

<rect class="box-person" x="260" y="100" width="180" height="100" rx="6"/>
<text class="text-title" x="350" y="125" text-anchor="middle">P (Person)</text>
<text class="text-small" x="350" y="150" text-anchor="middle">人工干预</text>
<text class="text" x="350" y="175" text-anchor="middle">• 审批决策</text>
<text class="text" x="350" y="190" text-anchor="middle">• 数据录入</text>

<rect class="box-subscene" x="470" y="100" width="180" height="100" rx="6"/>
<text class="text-title" x="560" y="125" text-anchor="middle">S (Scene)</text>
<text class="text-small" x="560" y="150" text-anchor="middle">子场景嵌套</text>
<text class="text" x="560" y="175" text-anchor="middle">• 场景组合</text>
<text class="text" x="560" y="190" text-anchor="middle">• 流程复用</text>

<line class="arrow" x1="140" y1="200" x2="140" y2="240"/>
<line class="arrow" x1="350" y1="200" x2="350" y2="240"/>
<line class="arrow" x1="560" y1="200" x2="560" y2="240"/>

<rect class="box" x="50" y="240" width="180" height="40" rx="4"/>
<text class="text" x="140" y="265" text-anchor="middle">能力调用</text>

<rect class="box" x="260" y="240" width="180" height="40" rx="4"/>
<text class="text" x="350" y="265" text-anchor="middle">异常处理</text>

<rect class="box" x="470" y="240" width="180" height="40" rx="4"/>
<text class="text" x="560" y="265" text-anchor="middle">模块化设计</text>

<rect class="box" x="50" y="300" width="600" height="35" rx="4"/>
<text class="text-title" x="350" y="323" text-anchor="middle">A/P/S 动态组合，支持复杂业务场景</text>

</svg>