<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="900px" height="580px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-primary { fill: #2563eb; stroke: none; rx: 8; }
        .box-secondary { fill: #1e40af; stroke: none; rx: 6; }
        .box-highlight { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 6; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, "Microsoft YaHei", sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 18px; font-weight: bold; fill: #ffffff; }
        .text-white { font-size: 13px; fill: #ffffff; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="box-primary" x="30" y="20" width="840" height="45" rx="6"/>
<text class="text-header" x="450" y="48" text-anchor="middle">Workflow 工作流引擎架构</text>

<rect class="box" x="80" y="90" width="740" height="80"/>
<text class="text-title" x="450" y="115" text-anchor="middle">流程定义层</text>
<rect class="box-secondary" x="110" y="130" width="140" height="30" rx="4"/>
<text class="text-white" x="180" y="150" text-anchor="middle">流程模板</text>
<rect class="box-secondary" x="280" y="130" width="140" height="30" rx="4"/>
<text class="text-white" x="350" y="150" text-anchor="middle">节点定义</text>
<rect class="box-secondary" x="450" y="130" width="140" height="30" rx="4"/>
<text class="text-white" x="520" y="150" text-anchor="middle">路由规则</text>
<rect class="box-secondary" x="620" y="130" width="140" height="30" rx="4"/>
<text class="text-white" x="690" y="150" text-anchor="middle">表单绑定</text>

<line class="arrow" x1="450" y1="170" x2="450" y2="205"/>

<rect class="box" x="80" y="205" width="740" height="180"/>
<text class="text-title" x="450" y="230" text-anchor="middle">流程引擎层</text>
<rect class="box-highlight" x="110" y="250" width="200" height="50" rx="4"/>
<text class="text-title" x="210" y="280" text-anchor="middle">流程启动</text>
<rect class="box-highlight" x="350" y="250" width="200" height="50" rx="4"/>
<text class="text-title" x="450" y="280" text-anchor="middle">节点执行</text>
<rect class="box-highlight" x="590" y="250" width="200" height="50" rx="4"/>
<text class="text-title" x="690" y="280" text-anchor="middle">路由判断</text>
<rect class="box-highlight" x="110" y="320" width="200" height="50" rx="4"/>
<text class="text-title" x="210" y="350" text-anchor="middle">任务分配</text>
<rect class="box-highlight" x="350" y="320" width="200" height="50" rx="4"/>
<text class="text-title" x="450" y="350" text-anchor="middle">超时处理</text>
<rect class="box-highlight" x="590" y="320" width="200" height="50" rx="4"/>
<text class="text-title" x="690" y="350" text-anchor="middle">异常处理</text>

<line class="arrow" x1="450" y1="385" x2="450" y2="420"/>

<rect class="box" x="80" y="420" width="740" height="70"/>
<text class="text-title" x="450" y="448" text-anchor="middle">事件总线</text>
<rect class="box-secondary" x="130" y="460" width="180" height="22" rx="4"/>
<text class="text-white" x="220" y="476" text-anchor="middle">流程启动事件</text>
<rect class="box-secondary" x="360" y="460" width="180" height="22" rx="4"/>
<text class="text-white" x="450" y="476" text-anchor="middle">任务分配事件</text>
<rect class="box-secondary" x="590" y="460" width="180" height="22" rx="4"/>
<text class="text-white" x="680" y="476" text-anchor="middle">流程完成事件</text>

<rect class="box" x="80" y="510" width="740" height="50"/>
<text class="text-title" x="450" y="540" text-anchor="middle">持久化层：流程实例 | 任务数据 | 历史记录 | 审计日志</text>

</svg>