<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900px" height="520px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-primary { fill: #2563eb; stroke: none; rx: 8; }
        .box-secondary { fill: #1e40af; stroke: none; rx: 6; }
        .box-highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 6; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, "Microsoft YaHei", sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 18px; font-weight: bold; fill: #ffffff; }
        .text-white { font-size: 13px; fill: #ffffff; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="box-primary" x="30" y="20" width="840" height="45" rx="6"/>
<text class="text-header" x="450" y="48" text-anchor="middle">A2UI 智能界面生成架构</text>

<rect class="box" x="80" y="90" width="740" height="80"/>
<text class="text-title" x="450" y="115" text-anchor="middle">模型解析层</text>
<rect class="box-secondary" x="110" y="130" width="140" height="30" rx="4"/>
<text class="text-white" x="180" y="150" text-anchor="middle">数据模型</text>
<rect class="box-secondary" x="280" y="130" width="140" height="30" rx="4"/>
<text class="text-white" x="350" y="150" text-anchor="middle">表单模板</text>
<rect class="box-secondary" x="450" y="130" width="140" height="30" rx="4"/>
<text class="text-white" x="520" y="150" text-anchor="middle">验证规则</text>
<rect class="box-secondary" x="620" y="130" width="140" height="30" rx="4"/>
<text class="text-white" x="690" y="150" text-anchor="middle">联动配置</text>

<line class="arrow" x1="450" y1="170" x2="450" y2="205"/>

<rect class="box" x="80" y="205" width="740" height="180"/>
<text class="text-title" x="450" y="230" text-anchor="middle">组件生成层</text>
<rect class="box-highlight" x="110" y="250" width="200" height="50" rx="4"/>
<text class="text-title" x="210" y="280" text-anchor="middle">表单组件</text>
<rect class="box-highlight" x="350" y="250" width="200" height="50" rx="4"/>
<text class="text-title" x="450" y="280" text-anchor="middle">列表组件</text>
<rect class="box-highlight" x="590" y="250" width="200" height="50" rx="4"/>
<text class="text-title" x="690" y="280" text-anchor="middle">图表组件</text>
<rect class="box-highlight" x="110" y="320" width="200" height="50" rx="4"/>
<text class="text-title" x="210" y="350" text-anchor="middle">布局组件</text>
<rect class="box-highlight" x="350" y="320" width="200" height="50" rx="4"/>
<text class="text-title" x="450" y="350" text-anchor="middle">导航组件</text>
<rect class="box-highlight" x="590" y="320" width="200" height="50" rx="4"/>
<text class="text-title" x="690" y="350" text-anchor="middle">交互组件</text>

<line class="arrow" x1="450" y1="385" x2="450" y2="420"/>

<rect class="box" x="80" y="420" width="740" height="80"/>
<text class="text-title" x="450" y="448" text-anchor="middle">渲染输出层</text>
<rect class="box-secondary" x="180" y="460" width="160" height="30" rx="4"/>
<text class="text-white" x="260" y="480" text-anchor="middle">HTML 模板</text>
<rect class="box-secondary" x="370" y="460" width="160" height="30" rx="4"/>
<text class="text-white" x="450" y="480" text-anchor="middle">JavaScript</text>
<rect class="box-secondary" x="560" y="460" width="160" height="30" rx="4"/>
<text class="text-white" x="640" y="480" text-anchor="middle">CSS 样式</text>

</svg>