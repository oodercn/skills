<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800px" height="520px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; rx: 8; }
        .title-box { fill: #2563eb; stroke: none; rx: 4; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 16px; font-weight: bold; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="title-box" x="20" y="15" width="760" height="35" rx="4"/>
<text class="text-header" x="400" y="38" text-anchor="middle">Workflow 与 A2UI 集成架构</text>

<rect class="box" x="100" y="70" width="600" height="90"/>
<text class="text-title" x="400" y="95" text-anchor="middle">Scene Engine</text>
<text class="text" x="400" y="120" text-anchor="middle">Capability Orchestration</text>
<text class="text" x="220" y="145" text-anchor="middle">Workflow Scene</text>
<text class="text" x="400" y="145" text-anchor="middle">A2UI Scene</text>
<text class="text" x="580" y="145" text-anchor="middle">Agent Service</text>

<line class="arrow" x1="220" y1="160" x2="220" y2="190"/>
<line class="arrow" x1="400" y1="160" x2="400" y2="190"/>
<line class="arrow" x1="580" y1="160" x2="580" y2="190"/>

<rect class="box" x="150" y="190" width="500" height="60"/>
<text class="text-title" x="400" y="215" text-anchor="middle">Event Bus</text>
<text class="text" x="400" y="235" text-anchor="middle">workflow.started | task.assigned | ui.generated</text>

<line class="arrow" x1="400" y1="250" x2="400" y2="280"/>

<rect class="box" x="150" y="280" width="500" height="90"/>
<text class="text-title" x="400" y="305" text-anchor="middle">PageAgent</text>
<text class="text" x="280" y="330" text-anchor="middle">接收 Workflow 事件</text>
<text class="text" x="400" y="330" text-anchor="middle">调用 A2UI 生成 UI</text>
<text class="text" x="520" y="330" text-anchor="middle">管理页面生命周期</text>

<line class="arrow" x1="400" y1="370" x2="400" y2="400"/>

<rect class="box" x="150" y="400" width="500" height="90"/>
<text class="text-title" x="400" y="425" text-anchor="middle">Render Output</text>
<text class="text" x="250" y="455" text-anchor="middle">审批表单</text>
<text class="text" x="400" y="455" text-anchor="middle">任务卡片</text>
<text class="text" x="550" y="455" text-anchor="middle">流程监控</text>

</svg>