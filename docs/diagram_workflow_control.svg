<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900px" height="500px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-primary { fill: #2563eb; stroke: none; rx: 8; }
        .box-secondary { fill: #1e40af; stroke: none; rx: 6; }
        .box-person { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
        .box-agent { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-ui { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, "Microsoft YaHei", sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 18px; font-weight: bold; fill: #ffffff; }
        .text-white { font-size: 13px; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="box-primary" x="30" y="20" width="840" height="45" rx="6"/>
<text class="text-header" x="450" y="48" text-anchor="middle">传统模式 vs OoderAgent 创新模式</text>

<text class="text-title" x="250" y="95" text-anchor="middle">传统模式：P2P 数据流转</text>

<rect class="box-person" x="100" y="120" width="100" height="60" rx="6"/>
<text class="text-title" x="150" y="150" text-anchor="middle">P</text>
<text class="text-small" x="150" y="170" text-anchor="middle">人</text>

<rect class="box-person" x="300" y="120" width="100" height="60" rx="6"/>
<text class="text-title" x="350" y="150" text-anchor="middle">P</text>
<text class="text-small" x="350" y="170" text-anchor="middle">人</text>

<rect class="box-person" x="500" y="120" width="100" height="60" rx="6"/>
<text class="text-title" x="550" y="150" text-anchor="middle">P</text>
<text class="text-small" x="550" y="170" text-anchor="middle">人</text>

<line class="arrow" x1="200" y1="150" x2="300" y2="150"/>
<line class="arrow" x1="400" y1="150" x2="500" y2="150"/>
<text class="text-small" x="250" y="140">数据流转</text>
<text class="text-small" x="450" y="140">数据流转</text>

<line class="arrow" x1="450" y1="200" x2="450" y2="250"/>

<text class="text-title" x="450" y="280" text-anchor="middle">OoderAgent 模式：A/UI/P 三元控制</text>

<rect class="box" x="250" y="310" width="400" height="160" rx="8"/>
<text class="text-title" x="450" y="340" text-anchor="middle">Workflow 控制中心</text>

<rect class="box-agent" x="280" y="360" width="80" height="50" rx="6"/>
<text class="text-title" x="320" y="385" text-anchor="middle">A</text>
<text class="text-small" x="320" y="400" text-anchor="middle">Agent</text>

<rect class="box-ui" x="410" y="360" width="80" height="50" rx="6"/>
<text class="text-title" x="450" y="385" text-anchor="middle">UI</text>
<text class="text-small" x="450" y="400" text-anchor="middle">翻译层</text>

<rect class="box-person" x="540" y="360" width="80" height="50" rx="6"/>
<text class="text-title" x="580" y="385" text-anchor="middle">P</text>
<text class="text-small" x="580" y="400" text-anchor="middle">人</text>

<rect class="box-secondary" x="350" y="430" width="200" height="30" rx="4"/>
<text class="text-white" x="450" y="450" text-anchor="middle">能力控制</text>

</svg>