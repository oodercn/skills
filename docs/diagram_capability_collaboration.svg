<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900px" height="550px">
<defs>
    <style>
        .bg { fill: #fafafa; }
        .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-primary { fill: #2563eb; stroke: none; rx: 8; }
        .box-secondary { fill: #1e40af; stroke: none; rx: 6; }
        .box-person { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
        .box-agent { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 8; }
        .box-ui { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
        .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
        .arrow-bi { fill: none; stroke: #64748b; stroke-width: 2; marker-start: url(#arrowhead-start); marker-end: url(#arrowhead); }
        .text { font-family: -apple-system, "Microsoft YaHei", sans-serif; font-size: 13px; fill: #334155; }
        .text-title { font-size: 15px; font-weight: bold; fill: #1e40af; }
        .text-header { font-size: 18px; font-weight: bold; fill: #ffffff; }
        .text-white { font-size: 13px; fill: #ffffff; }
        .text-small { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowhead-start" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
        <polygon points="10 0, 0 3.5, 10 7" fill="#64748b"/>
    </marker>
</defs>
<rect class="bg" width="100%" height="100%"/>

<rect class="box-primary" x="30" y="20" width="840" height="45" rx="6"/>
<text class="text-header" x="450" y="48" text-anchor="middle">能力架构协作模式</text>

<rect class="box-person" x="80" y="90" width="80" height="50" rx="6"/>
<text class="text-title" x="120" y="120" text-anchor="middle">P</text>
<text class="text-small" x="120" y="135" text-anchor="middle">人</text>

<rect class="box-person" x="740" y="90" width="80" height="50" rx="6"/>
<text class="text-title" x="780" y="120" text-anchor="middle">P</text>
<text class="text-small" x="780" y="135" text-anchor="middle">人</text>

<line class="arrow-bi" x1="160" y1="115" x2="740" y2="115"/>
<text class="text-small" x="450" y="105" text-anchor="middle">P2P (人与人协作)</text>

<rect class="box-ui" x="250" y="180" width="100" height="50" rx="6"/>
<text class="text-title" x="300" y="205" text-anchor="middle">UI</text>
<text class="text-small" x="300" y="220" text-anchor="middle">翻译层</text>

<rect class="box-ui" x="550" y="180" width="100" height="50" rx="6"/>
<text class="text-title" x="600" y="205" text-anchor="middle">UI</text>
<text class="text-small" x="600" y="220" text-anchor="middle">翻译层</text>

<line class="arrow-bi" x1="350" y1="205" x2="550" y2="205"/>

<rect class="box-agent" x="250" y="280" width="100" height="50" rx="6"/>
<text class="text-title" x="300" y="305" text-anchor="middle">A</text>
<text class="text-small" x="300" y="320" text-anchor="middle">Agent</text>

<rect class="box-agent" x="550" y="280" width="100" height="50" rx="6"/>
<text class="text-title" x="600" y="305" text-anchor="middle">A</text>
<text class="text-small" x="600" y="320" text-anchor="middle">Agent</text>

<line class="arrow-bi" x1="350" y1="305" x2="550" y2="305"/>
<text class="text-small" x="450" y="295" text-anchor="middle">A2A (Agent协作)</text>

<line class="arrow" x1="300" y1="230" x2="300" y2="280"/>
<line class="arrow" x1="600" y1="230" x2="600" y2="280"/>

<rect class="box" x="350" y="380" width="200" height="50" rx="6"/>
<text class="text-title" x="450" y="405" text-anchor="middle">Process Manager</text>
<text class="text-small" x="450" y="420" text-anchor="middle">流程管理</text>

<line class="arrow" x1="300" y1="330" x2="400" y2="380"/>
<line class="arrow" x1="600" y1="330" x2="500" y2="380"/>
<text class="text-small" x="340" y="360">A2PM</text>
<text class="text-small" x="540" y="360">A2PM</text>

<text class="text" x="200" y="260">P2A</text>
<text class="text-small" x="200" y="275">人→Agent</text>

<text class="text" x="680" y="260">P2A</text>
<text class="text-small" x="680" y="275">人→Agent</text>

<rect class="box" x="80" y="480" width="740" height="50" rx="6"/>
<text class="text" x="450" y="510" text-anchor="middle">核心原则：所有 P2* 协作都需要通过 UI/A2UI 进行翻译</text>

</svg>