server:
  port: 8084

spring:
  application:
    name: mvp-core
  profiles:
    active: micro
  main:
    allow-circular-references: true
  web:
    resources:
      static-locations: classpath:/static/

app:
  storage:
    path: ./data

ooder:
  sdk:
    enabled: true
  skills:
    path: ../skills
    auto-sync: true
  mock:
    enabled: false
  jds:
    config:
      name: mvp
  llm:
    provider: qianwen
    model: qwen-plus
    qianwen:
      api-key: sk-f403a6a32efd4b00b75ee4874eec3b6b
      model: qwen-plus
  skill:
    hotplug:
      enabled: true
      auto-load: true
      plugin-directory: ./plugins
    index-path: ../skill-index.yaml

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    net.ooder: DEBUG
