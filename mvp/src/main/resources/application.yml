server:
  port: 8084

spring:
  application:
    name: mvp-core
  profiles:
    active: micro
  main:
    allow-circular-references: true
  web:
    resources:
      static-locations: classpath:/static/

app:
  storage:
    path: ./data

ooder:
  sdk:
    enabled: true
  skills:
    path: ../skills
    auto-sync: true
    directories:
      downloads: ./.ooder/downloads
      installed: ./.ooder/installed
      activated: ./.ooder/activated
      dev: ./.ooder/dev
      cache: ./.ooder/cache
  mock:
    enabled: false
  discovery:
    use-se-sdk: true
    use-index-first: true
  jds:
    config:
      name: mvp
  llm:
    provider: qianwen
    model: qwen-plus
    qianwen:
      api-key: sk-f403a6a32efd4b00b75ee4874eec3b6b
      model: qwen-plus
  skill:
    hotplug:
      enabled: true
      auto-load: true
      plugin-directory: ./plugins
    index-dir: ../skill-index

scene:
  engine:
    discovery:
      enabled: true
      gitee:
        enabled: true
        token: f0d11903a8e10e3ce09d51bc9552b664
        default-owner: ooderCN
        default-repo: skills
        default-branch: master
        skills-path: "skills"
        cache-ttl-ms: 3600000
      github:
        enabled: false
        token: ${GITHUB_TOKEN:}
        default-owner: oodercn
        default-repo: skills
      cache:
        enabled: true
        ttl-ms: 3600000
        dir: ./.ooder/cache/discovery

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    net.ooder: DEBUG
