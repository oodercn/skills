server:
  port: 8099

spring:
  application:
    name: mvp-core
  profiles:
    active: micro
  main:
    allow-circular-references: true
  web:
    resources:
      static-locations: classpath:/static/

reactor:
  netty:
    resolver:
      transport: jdk

app:
  storage:
    path: ./data

org-web:
  storage-path: org
  auto-init: true

agent:
  session:
    timeout: 86400
  message:
    expire: 86400
    max-queue: 1000
  heartbeat:
    interval: 30000
    timeout: 60000
    offline-threshold: 3
    check-interval: 30000

ooder:
  scene:
    auto-init: true
    default-group-id: sg-default
  sdk:
    enabled: true
    skills:
      path: ../skills
      auto-sync: true
      directories:
        downloads: ./.ooder/downloads
        installed: ./.ooder/installed
        activated: ./.ooder/activated
        dev: ./.ooder/dev
        cache: ./.ooder/cache
  mock:
    enabled: false
  discovery:
    use-se-sdk: true
    use-index-first: true
  jds:
    config:
      name: mvp
  llm:
    provider: qianwen
    model: qwen-plus
    qianwen:
      api-key: ${QIANWEN_API_KEY:}
      model: qwen-plus
  skill:
    hotplug:
      enabled: true
      auto-load: true
      plugin-directory: ./plugins
    index-dir: ../skill-index

scene:
  engine:
    discovery:
      enabled: true
      gitee:
        enabled: true
        token: ${GITEE_TOKEN:}
        default-owner: ooderCN
        default-repo: skills
        default-branch: master
        skills-path: ""
        cache-ttl-ms: 3600000
      github:
        enabled: false
        token: ${GITHUB_TOKEN:}
        default-owner: oodercn
        default-repo: skills
      cache:
        enabled: true
        ttl-ms: 3600000
        dir: ./.ooder/cache/discovery

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    net.ooder: DEBUG
