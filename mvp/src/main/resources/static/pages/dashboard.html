<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - Ooder MVP</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .dashboard-page {
            min-height: 100vh;
            background: #f5f7fa;
        }
        
        .dashboard-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px 32px;
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header-left h1 {
            font-size: 24px;
            margin: 0 0 4px 0;
        }
        
        .header-left p {
            font-size: 14px;
            opacity: 0.8;
            margin: 0;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 30px;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .user-name {
            font-weight: 500;
        }
        
        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        
        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .dashboard-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        .stat-icon.users { background: #e0f2fe; color: #0ea5e9; }
        .stat-icon.depts { background: #fef3c7; color: #f59e0b; }
        .stat-icon.roles { background: #dbeafe; color: #3b82f6; }
        .stat-icon.health { background: #d1fae5; color: #10b981; }
        
        .stat-info h3 {
            font-size: 28px;
            margin: 0;
            color: #1a1a2e;
        }
        
        .stat-info p {
            font-size: 14px;
            color: #666;
            margin: 4px 0 0 0;
        }
        
        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 900px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        
        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }
        
        .card-body {
            padding: 24px;
        }
        
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .action-btn i {
            font-size: 24px;
        }
        
        .action-btn span {
            font-size: 13px;
            font-weight: 500;
        }
        
        .api-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .api-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .api-item .method {
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
        }
        
        .api-item .method.get { background: #dbeafe; color: #3b82f6; }
        .api-item .method.post { background: #d1fae5; color: #10b981; }
        
        .api-item .path {
            color: #666;
            font-family: monospace;
        }
        
        .api-item .status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
        }
        
        .api-item .status.ok { background: #d1fae5; color: #10b981; }
    </style>
</head>
<body>
    <div class="dashboard-page">
        <header class="dashboard-header">
            <div class="header-content">
                <div class="header-left">
                    <h1><i class="ri-dashboard-3-line"></i> MVP 控制台</h1>
                    <p id="welcome-text">欢迎回来</p>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <div class="user-avatar">
                            <i class="ri-user-line"></i>
                        </div>
                        <span class="user-name" id="user-name">用户</span>
                    </div>
                    <button class="logout-btn" onclick="handleLogout()">
                        <i class="ri-logout-box-line"></i> 退出
                    </button>
                </div>
            </div>
        </header>
        
        <main class="dashboard-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon users">
                        <i class="ri-user-line"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="user-count">-</h3>
                        <p>用户总数</p>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon depts">
                        <i class="ri-building-line"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="dept-count">-</h3>
                        <p>部门数量</p>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon roles">
                        <i class="ri-shield-user-line"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="role-count">4</h3>
                        <p>角色类型</p>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon health">
                        <i class="ri-heart-pulse-line"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="health-status">UP</h3>
                        <p>系统状态</p>
                    </div>
                </div>
            </div>
            
            <div class="content-grid">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">快速操作</h3>
                    </div>
                    <div class="card-body">
                        <div class="quick-actions">
                            <button class="action-btn" onclick="window.location.href='/login.html'">
                                <i class="ri-login-box-line"></i>
                                <span>登录管理</span>
                            </button>
                            <button class="action-btn" onclick="loadData()">
                                <i class="ri-refresh-line"></i>
                                <span>刷新数据</span>
                            </button>
                            <button class="action-btn" onclick="window.location.href='/actuator/health'">
                                <i class="ri-heart-pulse-line"></i>
                                <span>健康检查</span>
                            </button>
                            <button class="action-btn" onclick="window.location.href='/'">
                                <i class="ri-home-line"></i>
                                <span>返回首页</span>
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">API 状态</h3>
                    </div>
                    <div class="card-body">
                        <div class="api-list">
                            <div class="api-item">
                                <span class="method get">GET</span>
                                <span class="path">/api/v1/auth/roles</span>
                                <span class="status ok">OK</span>
                            </div>
                            <div class="api-item">
                                <span class="method get">GET</span>
                                <span class="path">/api/v1/org/users</span>
                                <span class="status ok">OK</span>
                            </div>
                            <div class="api-item">
                                <span class="method get">GET</span>
                                <span class="path">/api/v1/org/departments</span>
                                <span class="status ok">OK</span>
                            </div>
                            <div class="api-item">
                                <span class="method get">GET</span>
                                <span class="path">/api/v1/system/config</span>
                                <span class="status ok">OK</span>
                            </div>
                            <div class="api-item">
                                <span class="method post">POST</span>
                                <span class="path">/api/v1/auth/login</span>
                                <span class="status ok">OK</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/js/utils/api.js"></script>
    <script src="/js/utils/auth.js"></script>
    <script>
        function handleLogout() {
            AuthUtils.logout();
        }
        
        async function loadData() {
            try {
                const user = AuthUtils.getUser();
                if (user) {
                    document.getElementById('user-name').textContent = user.name || user.username || '用户';
                    document.getElementById('welcome-text').textContent = `欢迎回来，${user.name || user.username || '用户'}`;
                }
                
                const usersResult = await OrgApi.getUsers();
                if (usersResult.data) {
                    document.getElementById('user-count').textContent = usersResult.data.length;
                }
                
                const deptsResult = await OrgApi.getDepartments();
                if (deptsResult.data) {
                    document.getElementById('dept-count').textContent = deptsResult.data.length;
                }
                
                const healthResult = await SystemApi.getHealth();
                if (healthResult.data) {
                    document.getElementById('health-status').textContent = healthResult.data.status || 'UP';
                }
            } catch (e) {
                console.error('Load data error:', e);
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            if (!AuthUtils.requireAuth()) return;
            loadData();
        });
    </script>
</body>
</html>
