<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Nexus Console</title>
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--nx-bg);
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--nx-bg-elevated);
            border-radius: 16px;
            border: 1px solid var(--nx-border);
            box-shadow: var(--nx-shadow-xl);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-logo {
            width: 64px;
            height: 64px;
            background: var(--nx-primary-light);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        
        .login-logo i {
            font-size: 32px;
            color: var(--nx-primary);
        }
        
        .login-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--nx-text-primary);
            margin: 0 0 8px 0;
        }
        
        .login-subtitle {
            font-size: 14px;
            color: var(--nx-text-secondary);
            margin: 0;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--nx-text-primary);
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            border: 1px solid var(--nx-border);
            border-radius: 8px;
            background: var(--nx-bg);
            color: var(--nx-text-primary);
            transition: all 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--nx-primary);
            box-shadow: 0 0 0 3px var(--nx-primary-light);
        }
        
        .form-select {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            border: 1px solid var(--nx-border);
            border-radius: 8px;
            background: var(--nx-bg);
            color: var(--nx-text-primary);
            cursor: pointer;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            background: var(--nx-primary);
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .login-btn:hover {
            background: var(--nx-primary-hover);
            transform: translateY(-1px);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .login-error {
            padding: 12px 16px;
            background: var(--nx-danger-light);
            border-radius: 8px;
            color: var(--nx-danger);
            font-size: 14px;
            display: none;
        }
        
        .login-error.show {
            display: block;
        }
        
        .demo-accounts {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--nx-border);
        }
        
        .demo-title {
            font-size: 12px;
            color: var(--nx-text-secondary);
            margin-bottom: 12px;
        }
        
        .demo-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .demo-btn {
            padding: 6px 12px;
            font-size: 12px;
            border: 1px solid var(--nx-border);
            border-radius: 6px;
            background: var(--nx-bg);
            color: var(--nx-text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .demo-btn:hover {
            border-color: var(--nx-primary);
            color: var(--nx-primary);
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo">
                    <i class="ri-server-line"></i>
                </div>
                <h1 class="login-title">Nexus Console</h1>
                <p class="login-subtitle">场景技能管理平台</p>
            </div>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="username" placeholder="请输入用户名" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">登录角色</label>
                    <select class="form-select" id="role">
                        <option value="installer">系统安装者</option>
                        <option value="admin">系统管理员</option>
                        <option value="leader">主导者</option>
                        <option value="collaborator">协作者</option>
                    </select>
                </div>
                
                <div class="login-error" id="loginError"></div>
                
                <button type="submit" class="login-btn" id="loginBtn">登录</button>
            </form>
            
            <div class="demo-accounts">
                <div class="demo-title">快速登录（演示账号）</div>
                <div class="demo-list">
                    <button class="demo-btn" onclick="quickLogin('installer', 'installer123', 'installer')">安装者</button>
                    <button class="demo-btn" onclick="quickLogin('admin', 'admin123', 'admin')">管理员</button>
                    <button class="demo-btn" onclick="quickLogin('leader', 'leader123', 'leader')">主导者</button>
                    <button class="demo-btn" onclick="quickLogin('user', 'user123', 'collaborator')">协作者</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');
            
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            loginError.classList.remove('show');
            
            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role })
                });
                
                const result = await response.json();
                
                if (result.status === 'success' && result.data) {
                    localStorage.setItem('token', result.data.token);
                    localStorage.setItem('user', JSON.stringify(result.data.user || result.data));
                    
                    const rolePages = {
                        'installer': '/console/pages/role-installer.html',
                        'admin': '/console/pages/role-admin.html',
                        'leader': '/console/pages/role-leader.html',
                        'collaborator': '/console/pages/role-collaborator.html'
                    };
                    
                    window.location.href = rolePages[role] || '/console/pages/role-installer.html';
                } else {
                    loginError.textContent = result.message || '登录失败，请检查用户名和密码';
                    loginError.classList.add('show');
                }
            } catch (e) {
                console.error('Login error:', e);
                loginError.textContent = '登录请求失败，请稍后重试';
                loginError.classList.add('show');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        }
        
        function quickLogin(username, password, role) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
            document.getElementById('role').value = role;
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }
        
        document.getElementById('loginForm').addEventListener('submit', handleLogin);
    </script>
</body>
</html>
