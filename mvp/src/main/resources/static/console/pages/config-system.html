<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统配置管理 - Ooder Skills</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages/config-system.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="sidebar" id="sidebar"></div>
        
        <main class="main-content">
            <div class="page-header">
                <div class="page-title">
                    <h1><i class="ri-settings-4-line"></i> 系统配置管理</h1>
                    <p class="page-desc">三级配置继承体系： 系统级 → 技能级 → 场景级</p>
                </div>
                <div class="page-actions">
                    <div class="profile-selector">
                        <label>部署规模:</label>
                        <select id="profileSelect" class="form-select" onchange="switchProfile()">
                            <option value="micro">微型 (开发测试)</option>
                            <option value="small">小型 (小团队)</option>
                            <option value="large">大型 (企业生产)</option>
                            <option value="enterprise">企业 (大规模)</option>
                        </select>
                    </div>
                    <button class="nx-btn nx-btn--secondary" onclick="resetToDefault()">
                        <i class="ri-refresh-line"></i> 重置默认
                    </button>
                    <button class="nx-btn nx-btn--primary" onclick="saveConfig()">
                        <i class="ri-save-line"></i> 保存配置
                    </button>
                </div>
            </div>

            <div class="config-container">
                <div class="config-tabs-section">
                    <div class="config-tabs" id="configTabs">
                        <div class="tab active" data-tab="overview" onclick="switchTab('overview')">
                            <i class="ri-dashboard-line"></i>
                            <span>概览</span>
                        </div>
                        <div class="tab" data-tab="capabilities" onclick="switchTab('capabilities')">
                            <i class="ri-grid-line"></i>
                            <span>能力配置</span>
                        </div>
                        <div class="tab" data-tab="inheritance" onclick="switchTab('inheritance')">
                            <i class="ri-git-branch-line"></i>
                            <span>继承链</span>
                        </div>
                        <div class="tab" data-tab="profiles" onclick="switchTab('profiles')">
                            <i class="ri-stack-line"></i>
                            <span>Profile模板</span>
                        </div>
                    </div>
                </div>

                <div class="config-content" id="configContent">
                    <div class="tab-panel active" id="panel-overview">
                        <div class="overview-grid">
                            <div class="overview-card">
                                <div class="card-header">
                                    <i class="ri-server-line"></i>
                                    <h3>系统状态</h3>
                                </div>
                                <div class="card-body" id="systemStatus">
                                    <div class="status-item">
                                        <span class="label">配置版本</span>
                                        <span class="value" id="configVersion">-</span>
                                    </div>
                                    <div class="status-item">
                                        <span class="label">当前Profile</span>
                                        <span class="value" id="currentProfile">-</span>
                                    </div>
                                    <div class="status-item">
                                        <span class="label">创建时间</span>
                                        <span class="value" id="createdAt">-</span>
                                    </div>
                                    <div class="status-item">
                                        <span class="label">更新时间</span>
                                        <span class="value" id="updatedAt">-</span>
                                    </div>
                                </div>
                            </div>

                            <div class="overview-card">
                                <div class="card-header">
                                    <i class="ri-pie-chart-line"></i>
                                    <h3>能力统计</h3>
                                </div>
                                <div class="card-body" id="capabilityStats">
                                    <div class="stat-row">
                                        <div class="stat-item">
                                            <span class="stat-value" id="enabledCount">0</span>
                                            <span class="stat-label">已启用</span>
                                        </div>
                                        <div class="stat-item">
                                            <span class="stat-value" id="disabledCount">0</span>
                                            <span class="stat-label">已禁用</span>
                                        </div>
                                        <div class="stat-item">
                                            <span class="stat-value" id="totalCount">0</span>
                                            <span class="stat-label">总计</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="overview-card">
                                <div class="card-header">
                                    <i class="ri-history-line"></i>
                                    <h3>最近变更</h3>
                                </div>
                                <div class="card-body" id="recentChanges">
                                    <div class="change-list">
                                        <div class="change-item">
                                            <span class="change-time">-</span>
                                            <span class="change-desc">暂无变更记录</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="tab-panel" id="panel-capabilities">
                        <div class="capabilities-toolbar">
                            <div class="search-box">
                                <i class="ri-search-line"></i>
                                <input type="text" id="capabilitySearch" placeholder="搜索能力..." onkeyup="searchCapabilities()">
                            </div>
                            <div class="filter-buttons">
                                <button class="filter-btn active" data-filter="all" onclick="filterCapabilities('all')">全部</button>
                                <button class="filter-btn" data-filter="enabled" onclick="filterCapabilities('enabled')">已启用</button>
                                <button class="filter-btn" data-filter="disabled" onclick="filterCapabilities('disabled')">已禁用</button>
                            </div>
                        </div>
                        <div class="capabilities-grid" id="capabilitiesGrid">
                            <div class="loading-placeholder">
                                <i class="ri-loader-4-line"></i>
                                <span>加载中...</span>
                            </div>
                        </div>
                    </div>

                    <div class="tab-panel" id="panel-inheritance">
                        <div class="inheritance-toolbar">
                            <div class="target-selector">
                                <label>选择目标:</label>
                                <select id="inheritanceTarget" class="form-select" onchange="loadInheritanceChain()">
                                    <option value="">请选择...</option>
                                    <optgroup label="技能" id="skillOptions"></optgroup>
                                    <optgroup label="场景" id="sceneOptions"></optgroup>
                                </select>
                            </div>
                        </div>
                        <div class="inheritance-tree" id="inheritanceTree">
                            <div class="inheritance-placeholder">
                                <i class="ri-git-branch-line"></i>
                                <span>请选择目标查看继承链</span>
                            </div>
                        </div>
                    </div>

                    <div class="tab-panel" id="panel-profiles">
                        <div class="profiles-grid" id="profilesGrid">
                            <div class="profile-card" data-profile="micro">
                                <div class="profile-header">
                                    <i class="ri-cpu-line"></i>
                                    <h3>微型</h3>
                                </div>
                                <div class="profile-body">
                                    <p class="profile-desc">适合开发测试</p>
                                    <div class="profile-resources">
                                        <div class="resource">
                                            <span class="label">CPU</span>
                                            <span class="value">2核</span>
                                        </div>
                                        <div class="resource">
                                            <span class="label">内存</span>
                                            <span class="value">4GB</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="profile-actions">
                                    <button class="nx-btn nx-btn--sm" onclick="applyProfile('micro')">应用</button>
                                </div>
                            </div>

                            <div class="profile-card" data-profile="small">
                                <div class="profile-header">
                                    <i class="ri-server-line"></i>
                                    <h3>小型</h3>
                                </div>
                                <div class="profile-body">
                                    <p class="profile-desc">适合小团队</p>
                                    <div class="profile-resources">
                                        <div class="resource">
                                            <span class="label">CPU</span>
                                            <span class="value">4核</span>
                                        </div>
                                        <div class="resource">
                                            <span class="label">内存</span>
                                            <span class="value">8GB</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="profile-actions">
                                    <button class="nx-btn nx-btn--sm" onclick="applyProfile('small')">应用</button>
                                </div>
                            </div>

                            <div class="profile-card" data-profile="large">
                                <div class="profile-header">
                                    <i class="ri-cloud-line"></i>
                                    <h3>大型</h3>
                                </div>
                                <div class="profile-body">
                                    <p class="profile-desc">适合企业生产</p>
                                    <div class="profile-resources">
                                        <div class="resource">
                                            <span class="label">CPU</span>
                                            <span class="value">8核</span>
                                        </div>
                                        <div class="resource">
                                            <span class="label">内存</span>
                                            <span class="value">16GB</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="profile-actions">
                                    <button class="nx-btn nx-btn--sm" onclick="applyProfile('large')">应用</button>
                                </div>
                            </div>

                            <div class="profile-card" data-profile="enterprise">
                                <div class="profile-header">
                                    <i class="ri-building-line"></i>
                                    <h3>企业</h3>
                                </div>
                                <div class="profile-body">
                                    <p class="profile-desc">适合大规模部署</p>
                                    <div class="profile-resources">
                                        <div class="resource">
                                            <span class="label">CPU</span>
                                            <span class="value">16核+</span>
                                        </div>
                                        <div class="resource">
                                            <span class="label">内存</span>
                                            <span class="value">32GB+</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="profile-actions">
                                    <button class="nx-btn nx-btn--sm" onclick="applyProfile('enterprise')">应用</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="configEditorModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="editorTitle">配置编辑</h3>
                <button class="modal-close" onclick="closeEditorModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="modal-body" id="editorBody">
            </div>
            <div class="modal-footer">
                <button class="nx-btn nx-btn--secondary" onclick="closeEditorModal()">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="saveEditorConfig()">保存</button>
            </div>
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/components/sidebar.js"></script>
    <script src="../js/pages/config-system.js"></script>
</body>
</html>
