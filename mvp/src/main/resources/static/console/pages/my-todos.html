<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的待办 - Skill Scene</title>
    
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <style>
        .todo-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--nx-border-color);
        }
        .todo-tab {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: var(--nx-text-secondary);
            transition: all 0.2s ease;
        }
        .todo-tab:hover {
            color: var(--nx-text-primary);
        }
        .todo-tab.active {
            color: var(--nx-primary);
            border-bottom-color: var(--nx-primary);
        }
        .todo-tab-count {
            background: var(--nx-bg-secondary);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-left: 8px;
        }
        .todo-tab.active .todo-tab-count {
            background: var(--nx-primary);
            color: white;
        }
        .todo-section {
            margin-bottom: 24px;
        }
        .todo-section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            font-weight: 600;
        }
        .todo-card {
            background: var(--nx-bg-elevated);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--nx-border-color);
            border-left: 4px solid var(--nx-primary);
        }
        .todo-card.invitation {
            border-left-color: var(--nx-info);
        }
        .todo-card.delegation {
            border-left-color: var(--nx-warning);
        }
        .todo-card.reminder {
            border-left-color: var(--nx-success);
        }
        .todo-card.approval {
            border-left-color: var(--nx-error);
        }
        .todo-card.activation {
            border-left-color: #8b5cf6;
        }
        .todo-card.scene-notification {
            border-left-color: #06b6d4;
        }
        .todo-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .todo-card-type {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--nx-text-secondary);
        }
        .todo-card-title {
            font-weight: 600;
            margin-bottom: 8px;
        }
        .todo-card-meta {
            display: flex;
            gap: 16px;
            color: var(--nx-text-secondary);
            font-size: 13px;
            margin-bottom: 12px;
        }
        .todo-card-actions {
            display: flex;
            gap: 8px;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--nx-text-secondary);
        }
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .deadline-urgent {
            color: var(--nx-error);
        }
        .deadline-soon {
            color: var(--nx-warning);
        }
    </style>
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold" style="display: flex; align-items: center; gap: 8px;">
                    <i class="ri-apps-line"></i> Skill Scene
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle aria-label="切换侧边栏">
                        <i class="ri-menu-line"></i>
                    </button>
                    <div class="nx-page__title">
                        <h1><i class="ri-notification-3-line" aria-hidden="true"></i> 我的待办</h1>
                        <p>查看和处理待办任务</p>
                    </div>
                </div>
                <div class="nx-page__actions">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle aria-label="切换主题">
                        <i class="ri-sun-line"></i>
                    </button>
                    <div class="nx-relative">
                        <div class="nx-page__user-menu" id="user-menu">
                            <div class="nx-page__user-avatar" id="user-avatar">U</div>
                            <span class="nx-page__user-name" id="user-name">加载中...</span>
                            <i class="ri-arrow-down-s-line"></i>
                        </div>
                        <div class="nx-page__dropdown-menu" id="user-dropdown">
                            <div class="nx-page__dropdown-item" onclick="window.location.href='my-profile.html'">
                                <i class="ri-user-line"></i> 个人中心
                            </div>
                            <div class="nx-page__dropdown-item" onclick="window.location.href='my-capabilities.html'">
                                <i class="ri-puzzle-line"></i> 我的能力
                            </div>
                            <div class="nx-page__dropdown-item nx-page__dropdown-item--danger" onclick="NX.userMenu.logout()">
                                <i class="ri-logout-box-line"></i> 退出登录
                            </div>
                        </div>
                    </div>
                    <button class="nx-btn nx-btn--secondary" onclick="refreshAll()">
                        <i class="ri-refresh-line"></i> 刷新
                    </button>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="nx-grid nx-grid-cols-4 nx-mb-6">
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--primary">
                                <i class="ri-notification-3-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">待处理</div>
                                <div class="nx-stat-card__value" id="pendingCount">0</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--info">
                                <i class="ri-user-add-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">协作邀请</div>
                                <div class="nx-stat-card__value" id="invitationCount">0</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--warning">
                                <i class="ri-user-star-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">领导委派</div>
                                <div class="nx-stat-card__value" id="delegationCount">0</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--success">
                                <i class="ri-checkbox-circle-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">已完成</div>
                                <div class="nx-stat-card__value" id="completedCount">0</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="todo-tabs">
                        <div class="todo-tab active" onclick="switchTab('pending')">
                            <i class="ri-time-line"></i> 待处理
                            <span class="todo-tab-count" id="pendingTabCount">0</span>
                        </div>
                        <div class="todo-tab" onclick="switchTab('completed')">
                            <i class="ri-checkbox-circle-line"></i> 已处理
                            <span class="todo-tab-count" id="completedTabCount">0</span>
                        </div>
                        <div class="todo-tab" onclick="switchTab('all')">
                            <i class="ri-list-check"></i> 全部
                            <span class="todo-tab-count" id="allTabCount">0</span>
                        </div>
                    </div>
                    
                    <div id="todoContent">
                        <div class="todo-section" id="invitationSection">
                            <div class="todo-section-header">
                                <i class="ri-user-add-line" style="color: var(--nx-info);"></i>
                                协作邀请
                            </div>
                            <div id="invitationList"></div>
                        </div>
                        
                        <div class="todo-section" id="delegationSection">
                            <div class="todo-section-header">
                                <i class="ri-user-star-line" style="color: var(--nx-warning);"></i>
                                领导委派
                            </div>
                            <div id="delegationList"></div>
                        </div>
                        
                        <div class="todo-section" id="reminderSection">
                            <div class="todo-section-header">
                                <i class="ri-alarm-line" style="color: var(--nx-success);"></i>
                                待办提醒
                            </div>
                            <div id="reminderList"></div>
                        </div>
                        
                        <div class="todo-section" id="approvalSection">
                            <div class="todo-section-header">
                                <i class="ri-checkbox-circle-line" style="color: var(--nx-error);"></i>
                                审批请求
                            </div>
                            <div id="approvalList"></div>
                        </div>
                        
                        <div class="todo-section" id="activationSection">
                            <div class="todo-section-header">
                                <i class="ri-key-2-line" style="color: #8b5cf6;"></i>
                                待激活能力
                            </div>
                            <div id="activationList"></div>
                        </div>
                        
                        <div class="todo-section" id="sceneNotificationSection">
                            <div class="todo-section-header">
                                <i class="ri-notification-3-line" style="color: #06b6d4;"></i>
                                场景通知
                            </div>
                            <div id="sceneNotificationList"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/api-client.js"></script>
    <script src="/console/js/menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/utils/dict-cache.js"></script>
    <script src="/console/js/pages/my-todos.js"></script>
</body>
</html>
