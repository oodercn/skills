<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM配置 - Nexus Console</title>
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <style>
        .llm-page { padding: 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .page-title { font-size: 24px; font-weight: 600; display: flex; align-items: center; gap: 12px; }
        .page-title i { color: var(--nx-primary); }
        .page-subtitle { color: var(--nx-text-secondary); font-size: 14px; margin-top: 4px; }
        
        .provider-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; }
        
        .provider-card { background: var(--nx-bg-elevated); border: 1px solid var(--nx-border); border-radius: 12px; overflow: hidden; }
        .provider-header { padding: 16px 20px; border-bottom: 1px solid var(--nx-border); display: flex; justify-content: space-between; align-items: center; }
        .provider-info { display: flex; align-items: center; gap: 12px; }
        .provider-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .provider-icon.openai { background: linear-gradient(135deg, #10a37f 0%, #1a7f64 100%); color: white; }
        .provider-icon.deepseek { background: linear-gradient(135deg, #4285f4 0%, #0d47a1 100%); color: white; }
        .provider-icon.baidu { background: linear-gradient(135deg, #2932e1 0%, #1a237e 100%); color: white; }
        .provider-icon.anthropic { background: linear-gradient(135deg, #d4a574 0%, #8b5a2b 100%); color: white; }
        .provider-icon.local { background: linear-gradient(135deg, #6b7280 0%, #374151 100%); color: white; }
        .provider-name { font-size: 16px; font-weight: 600; }
        .provider-type { font-size: 12px; color: var(--nx-text-secondary); }
        .provider-status { display: flex; align-items: center; gap: 6px; font-size: 13px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-dot.active { background: #22c55e; }
        .status-dot.inactive { background: #ef4444; }
        .status-dot.pending { background: #f59e0b; }
        
        .provider-body { padding: 20px; }
        .config-row { display: grid; grid-template-columns: 140px 1fr; gap: 12px; margin-bottom: 16px; align-items: center; }
        .config-row:last-child { margin-bottom: 0; }
        .config-label { font-size: 13px; color: var(--nx-text-secondary); }
        .config-value { font-size: 14px; }
        .config-input { width: 100%; padding: 8px 12px; border: 1px solid var(--nx-border); border-radius: 8px; background: var(--nx-bg); font-size: 14px; }
        .config-input:focus { outline: none; border-color: var(--nx-primary); }
        .config-select { width: 100%; padding: 8px 12px; border: 1px solid var(--nx-border); border-radius: 8px; background: var(--nx-bg); font-size: 14px; }
        
        .provider-footer { padding: 16px 20px; border-top: 1px solid var(--nx-border); display: flex; justify-content: space-between; align-items: center; background: var(--nx-bg); }
        .provider-actions { display: flex; gap: 8px; }
        
        .model-list { margin-top: 16px; }
        .model-item { display: flex; align-items: center; padding: 12px; background: var(--nx-bg); border-radius: 8px; margin-bottom: 8px; }
        .model-item:last-child { margin-bottom: 0; }
        .model-info { flex: 1; }
        .model-name { font-weight: 500; display: flex; align-items: center; gap: 8px; }
        .model-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        .model-badge.default { background: var(--nx-primary-light); color: var(--nx-primary); }
        .model-badge.fc { background: #d1fae5; color: #059669; }
        .model-badge.vision { background: #dbeafe; color: #2563eb; }
        .model-meta { font-size: 12px; color: var(--nx-text-secondary); margin-top: 4px; display: flex; gap: 16px; }
        
        .feature-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
        .feature-tag { font-size: 11px; padding: 4px 8px; border-radius: 4px; background: var(--nx-bg); border: 1px solid var(--nx-border); }
        .feature-tag.enabled { background: #d1fae5; border-color: #059669; color: #059669; }
        
        .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .section-title i { color: var(--nx-primary); }
        
        .settings-card { background: var(--nx-bg-elevated); border: 1px solid var(--nx-border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .settings-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        .setting-item { }
        .setting-label { font-size: 13px; color: var(--nx-text-secondary); margin-bottom: 6px; }
        .setting-value { font-size: 24px; font-weight: 600; color: var(--nx-primary); }
        .setting-unit { font-size: 14px; color: var(--nx-text-secondary); font-weight: normal; }
        
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal.open { display: flex; }
        .modal-content { background: var(--nx-bg-elevated); border-radius: 16px; width: 560px; max-height: 90vh; overflow-y: auto; }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--nx-border); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 18px; font-weight: 600; }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--nx-text-secondary); }
        .modal-body { padding: 20px; }
        .modal-footer { padding: 16px 20px; border-top: 1px solid var(--nx-border); display: flex; justify-content: flex-end; gap: 12px; }
        
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 10px 12px; border: 1px solid var(--nx-border); border-radius: 8px; background: var(--nx-bg); font-size: 14px; }
        .form-hint { font-size: 12px; color: var(--nx-text-secondary); margin-top: 4px; }
        
        .api-key-input { position: relative; }
        .api-key-input input { padding-right: 40px; }
        .api-key-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--nx-text-secondary); }
        
        .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 10000; opacity: 0; transform: translateY(20px); transition: all 0.3s; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: #059669; color: white; }
        .toast.error { background: #dc2626; color: white; }
        
        @media (max-width: 900px) {
            .provider-grid { grid-template-columns: 1fr; }
            .settings-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold" style="display: flex; align-items: center; gap: 8px;">
                    <i class="ri-server-line"></i> Nexus Console
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <div class="llm-page">
                <header class="nx-page__header" style="border-bottom: none;">
                    <div class="nx-flex nx-items-center nx-gap-3">
                        <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle aria-label="切换侧边栏">
                            <i class="ri-menu-line"></i>
                        </button>
                        <div>
                            <h2 class="page-title">
                                <i class="ri-robot-line"></i>
                                LLM 配置
                            </h2>
                            <p class="page-subtitle">管理大语言模型提供者和模型配置</p>
                        </div>
                    </div>
                    <div class="nx-flex nx-items-center nx-gap-3">
                        <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle aria-label="切换主题">
                            <i class="ri-sun-line"></i>
                        </button>
                        <div class="nx-relative">
                            <div class="nx-page__user-menu" id="user-menu">
                                <div class="nx-page__user-avatar" id="user-avatar">U</div>
                                <span class="nx-page__user-name" id="user-name">加载中...</span>
                                <i class="ri-arrow-down-s-line"></i>
                            </div>
                            <div class="nx-page__dropdown-menu" id="user-dropdown">
                                <div class="nx-page__dropdown-item" onclick="window.location.href='my-profile.html'">
                                    <i class="ri-user-line"></i> 个人中心
                                </div>
                                <div class="nx-page__dropdown-item nx-page__dropdown-item--danger" onclick="NX.userMenu.logout()">
                                    <i class="ri-logout-box-line"></i> 退出登录
                                </div>
                            </div>
                        </div>
                        <button class="nx-btn nx-btn--primary" onclick="showAddProviderModal()">
                            <i class="ri-add-line"></i> <span>添加提供者</span>
                        </button>
                    </div>
                </header>
                
                <div class="settings-card">
                    <div class="section-title"><i class="ri-settings-4-line"></i> 全局设置</div>
                    <div class="settings-grid">
                        <div class="setting-item">
                            <div class="setting-label">默认提供者</div>
                            <div class="setting-value">DeepSeek</div>
                        </div>
                        <div class="setting-item">
                            <div class="setting-label">默认模型</div>
                            <div class="setting-value">deepseek-chat</div>
                        </div>
                        <div class="setting-item">
                            <div class="setting-label">请求超时</div>
                            <div class="setting-value">60<span class="setting-unit">s</span></div>
                        </div>
                        <div class="setting-item">
                            <div class="setting-label">最大重试</div>
                            <div class="setting-value">3<span class="setting-unit">次</span></div>
                        </div>
                    </div>
                </div>
                
                <div class="section-title"><i class="ri-cloud-line"></i> LLM 提供者</div>
                <div class="provider-grid" id="providerGrid"></div>
            </div>
        </main>
    </div>
    
    <div class="modal" id="editProviderModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="editModalTitle">编辑提供者</div>
                <button class="modal-close" onclick="closeModal('editProviderModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">提供者名称</label>
                    <input type="text" class="form-input" id="editProviderName" placeholder="输入提供者名称">
                </div>
                <div class="form-group">
                    <label class="form-label">类型</label>
                    <select class="form-input" id="editProviderType">
                        <option value="openai">OpenAI</option>
                        <option value="deepseek">DeepSeek</option>
                        <option value="baidu">百度文心</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="local">本地模型</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">API Key</label>
                    <div class="api-key-input">
                        <input type="password" class="form-input" id="editApiKey" placeholder="输入 API Key">
                        <button class="api-key-toggle" onclick="toggleApiKey()"><i class="ri-eye-line"></i></button>
                    </div>
                    <div class="form-hint">API Key 将被加密存储</div>
                </div>
                <div class="form-group">
                    <label class="form-label">API Endpoint</label>
                    <input type="text" class="form-input" id="editEndpoint" placeholder="自定义 API 端点（可选）">
                </div>
                <div class="form-group">
                    <label class="form-label">默认模型</label>
                    <select class="form-input" id="editDefaultModel">
                        <option value="">选择默认模型</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">超时时间 (ms)</label>
                    <input type="number" class="form-input" id="editTimeout" value="60000">
                </div>
                <div class="form-group">
                    <label class="form-label">最大重试次数</label>
                    <input type="number" class="form-input" id="editMaxRetries" value="3">
                </div>
                <div class="form-group">
                    <label class="form-label">
                        <input type="checkbox" id="editFunctionCalling" checked> 启用函数调用
                    </label>
                </div>
                <div class="form-group">
                    <label class="form-label">
                        <input type="checkbox" id="editEnabled" checked> 启用此提供者
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="nx-btn nx-btn--secondary" onclick="closeModal('editProviderModal')">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="saveProvider()">保存</button>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/api-client.js"></script>
    <script src="/console/js/menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script>
        let providers = [];
        let currentEditProvider = null;
        
        document.addEventListener('DOMContentLoaded', function() {
            loadProviders();
        });
        
        function loadProviders() {
            fetch('/api/v1/llm/providers')
                .then(response => response.json())
                .then(result => {
                    if (result.status === 'success' && result.data) {
                        providers = result.data;
                        renderProviders();
                    } else {
                        loadMockData();
                    }
                })
                .catch(error => {
                    console.error('Failed to load providers:', error);
                    loadMockData();
                });
        }
        
        function loadMockData() {
            providers = [
                {
                    providerId: 'deepseek',
                    name: 'DeepSeek',
                    type: 'deepseek',
                    enabled: true,
                    defaultModel: 'deepseek-chat',
                    timeout: 60000,
                    maxRetries: 3,
                    functionCallingEnabled: true,
                    models: [
                        { modelId: 'deepseek-chat', displayName: 'DeepSeek Chat', maxTokens: 64000, supportsFunctionCalling: true, costPer1kTokens: 0.001 },
                        { modelId: 'deepseek-coder', displayName: 'DeepSeek Coder', maxTokens: 16000, supportsFunctionCalling: true, costPer1kTokens: 0.001 }
                    ]
                },
                {
                    providerId: 'baidu',
                    name: '百度文心',
                    type: 'baidu',
                    enabled: true,
                    defaultModel: 'ernie-bot-4',
                    timeout: 60000,
                    maxRetries: 3,
                    functionCallingEnabled: true,
                    models: [
                        { modelId: 'ernie-bot-4', displayName: 'ERNIE Bot 4.0', maxTokens: 8000, supportsFunctionCalling: true, costPer1kTokens: 0.12 },
                        { modelId: 'ernie-bot-turbo', displayName: 'ERNIE Bot Turbo', maxTokens: 4000, supportsFunctionCalling: false, costPer1kTokens: 0.008 }
                    ]
                },
                {
                    providerId: 'openai',
                    name: 'OpenAI',
                    type: 'openai',
                    enabled: false,
                    defaultModel: 'gpt-4-turbo',
                    timeout: 60000,
                    maxRetries: 3,
                    functionCallingEnabled: true,
                    models: [
                        { modelId: 'gpt-4-turbo', displayName: 'GPT-4 Turbo', maxTokens: 128000, supportsFunctionCalling: true, supportsMultimodal: true, costPer1kTokens: 0.01 },
                        { modelId: 'gpt-3.5-turbo', displayName: 'GPT-3.5 Turbo', maxTokens: 16000, supportsFunctionCalling: true, costPer1kTokens: 0.0005 }
                    ]
                }
            ];
            renderProviders();
        }
        
        function renderProviders() {
            const container = document.getElementById('providerGrid');
            
            container.innerHTML = providers.map(provider => {
                const iconClass = provider.type;
                const statusClass = provider.enabled ? 'active' : 'inactive';
                const statusText = provider.enabled ? '已启用' : '已禁用';
                
                return '<div class="provider-card">' +
                    '<div class="provider-header">' +
                        '<div class="provider-info">' +
                            '<div class="provider-icon ' + iconClass + '"><i class="ri-robot-2-line"></i></div>' +
                            '<div>' +
                                '<div class="provider-name">' + provider.name + '</div>' +
                                '<div class="provider-type">' + provider.type.toUpperCase() + '</div>' +
                            '</div>' +
                        '</div>' +
                        '<div class="provider-status">' +
                            '<span class="status-dot ' + statusClass + '"></span>' +
                            statusText +
                        '</div>' +
                    '</div>' +
                    '<div class="provider-body">' +
                        '<div class="config-row">' +
                            '<div class="config-label">默认模型</div>' +
                            '<div class="config-value">' + provider.defaultModel + '</div>' +
                        '</div>' +
                        '<div class="config-row">' +
                            '<div class="config-label">超时时间</div>' +
                            '<div class="config-value">' + (provider.timeout / 1000) + 's</div>' +
                        '</div>' +
                        '<div class="config-row">' +
                            '<div class="config-label">最大重试</div>' +
                            '<div class="config-value">' + provider.maxRetries + ' 次</div>' +
                        '</div>' +
                        '<div class="feature-tags">' +
                            '<span class="feature-tag ' + (provider.functionCallingEnabled ? 'enabled' : '') + '">' +
                                '<i class="ri-function-line"></i> 函数调用 ' + (provider.functionCallingEnabled ? '已启用' : '已禁用') +
                            '</span>' +
                        '</div>' +
                        '<div class="model-list">' +
                            provider.models.map(model => {
                                const badges = [];
                                if (model.modelId === provider.defaultModel) badges.push('<span class="model-badge default">默认</span>');
                                if (model.supportsFunctionCalling) badges.push('<span class="model-badge fc">FC</span>');
                                if (model.supportsMultimodal) badges.push('<span class="model-badge vision">Vision</span>');
                                return '<div class="model-item">' +
                                    '<div class="model-info">' +
                                        '<div class="model-name">' + model.displayName + badges.join('') + '</div>' +
                                        '<div class="model-meta">' +
                                            '<span><i class="ri-text"></i> ' + model.maxTokens + ' tokens</span>' +
                                            '<span><i class="ri-money-dollar-circle-line"></i> $' + model.costPer1kTokens + '/1K</span>' +
                                        '</div>' +
                                    '</div>' +
                                '</div>';
                            }).join('') +
                        '</div>' +
                    '</div>' +
                    '<div class="provider-footer">' +
                        '<button class="nx-btn nx-btn--secondary" onclick="testProvider(\'' + provider.providerId + '\')">' +
                            '<i class="ri-play-line"></i> 测试连接' +
                        '</button>' +
                        '<div class="provider-actions">' +
                            '<button class="nx-btn nx-btn--secondary" onclick="editProvider(\'' + provider.providerId + '\')">' +
                                '<i class="ri-edit-line"></i> 编辑' +
                            '</button>' +
                            '<button class="nx-btn nx-btn--secondary nx-btn--danger" onclick="deleteProvider(\'' + provider.providerId + '\')">' +
                                '<i class="ri-delete-bin-line"></i>' +
                            '</button>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            }).join('');
        }
        
        function showAddProviderModal() {
            currentEditProvider = null;
            document.getElementById('editModalTitle').textContent = '添加提供者';
            document.getElementById('editProviderName').value = '';
            document.getElementById('editProviderType').value = 'openai';
            document.getElementById('editApiKey').value = '';
            document.getElementById('editEndpoint').value = '';
            document.getElementById('editDefaultModel').value = '';
            document.getElementById('editTimeout').value = '60000';
            document.getElementById('editMaxRetries').value = '3';
            document.getElementById('editFunctionCalling').checked = true;
            document.getElementById('editEnabled').checked = true;
            document.getElementById('editProviderModal').classList.add('open');
        }
        
        function editProvider(providerId) {
            currentEditProvider = providers.find(p => p.providerId === providerId);
            if (!currentEditProvider) return;
            
            document.getElementById('editModalTitle').textContent = '编辑提供者';
            document.getElementById('editProviderName').value = currentEditProvider.name;
            document.getElementById('editProviderType').value = currentEditProvider.type;
            document.getElementById('editApiKey').value = '******';
            document.getElementById('editEndpoint').value = currentEditProvider.endpoint || '';
            document.getElementById('editDefaultModel').value = currentEditProvider.defaultModel;
            document.getElementById('editTimeout').value = currentEditProvider.timeout;
            document.getElementById('editMaxRetries').value = currentEditProvider.maxRetries;
            document.getElementById('editFunctionCalling').checked = currentEditProvider.functionCallingEnabled;
            document.getElementById('editEnabled').checked = currentEditProvider.enabled;
            document.getElementById('editProviderModal').classList.add('open');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('open');
        }
        
        function toggleApiKey() {
            const input = document.getElementById('editApiKey');
            const icon = document.querySelector('.api-key-toggle i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'ri-eye-off-line';
            } else {
                input.type = 'password';
                icon.className = 'ri-eye-line';
            }
        }
        
        function saveProvider() {
            const name = document.getElementById('editProviderName').value;
            const type = document.getElementById('editProviderType').value;
            const apiKey = document.getElementById('editApiKey').value;
            
            if (!name) {
                showToast('请输入提供者名称', 'error');
                return;
            }
            
            const providerData = {
                name: name,
                type: type,
                defaultModel: document.getElementById('editDefaultModel').value,
                timeout: parseInt(document.getElementById('editTimeout').value) || 60000,
                maxRetries: parseInt(document.getElementById('editMaxRetries').value) || 3,
                functionCallingEnabled: document.getElementById('editFunctionCalling').checked,
                enabled: document.getElementById('editEnabled').checked,
                models: []
            };
            
            if (apiKey && apiKey !== '******') {
                providerData.providerConfig = { apiKey: apiKey };
            }
            
            const url = currentEditProvider 
                ? '/api/v1/llm/providers/' + currentEditProvider.providerId
                : '/api/v1/llm/providers';
            const method = currentEditProvider ? 'PUT' : 'POST';
            
            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(providerData)
            })
            .then(response => response.json())
            .then(result => {
                if (result.status === 'success') {
                    loadProviders();
                    closeModal('editProviderModal');
                    showToast('保存成功', 'success');
                } else {
                    showToast('保存失败: ' + (result.message || '未知错误'), 'error');
                }
            })
            .catch(error => {
                console.error('Save provider error:', error);
                showToast('保存失败: ' + error.message, 'error');
            });
        }
        
        function deleteProvider(providerId) {
            if (!confirm('确定要删除此提供者吗？')) {
                return;
            }
            
            fetch('/api/v1/llm/providers/' + providerId, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(result => {
                if (result.status === 'success') {
                    loadProviders();
                    showToast('删除成功', 'success');
                } else {
                    showToast('删除失败: ' + (result.message || '未知错误'), 'error');
                }
            })
            .catch(error => {
                console.error('Delete provider error:', error);
                showToast('删除失败: ' + error.message, 'error');
            });
        }
        
        function testProvider(providerId) {
            showToast('正在测试连接...', 'success');
            
            fetch('/api/v1/llm/providers/' + providerId + '/test', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(result => {
                if (result.status === 'success' && result.data) {
                    var testData = result.data;
                    if (testData.success === true) {
                        var message = testData.message || '连接成功';
                        if (testData.elapsed) {
                            message += ' (耗时: ' + testData.elapsed + 'ms)';
                        }
                        showToast(message, 'success');
                    } else {
                        showToast('连接失败: ' + (testData.message || '未知错误'), 'error');
                    }
                } else {
                    showToast('连接失败: ' + (result.message || '未知错误'), 'error');
                }
            })
            .catch(error => {
                console.error('Test provider error:', error);
                showToast('连接失败: ' + error.message, 'error');
            });
        }
        
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            
            setTimeout(function() {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
