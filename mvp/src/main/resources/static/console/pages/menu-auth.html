<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜单授权 - Nexus Console</title>
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <link rel="stylesheet" href="/console/css/pages/menu-auth.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold">
                    <i class="ri-server-line"></i> Nexus Console
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle aria-label="切换侧边栏">
                        <i class="ri-menu-line"></i>
                    </button>
                    <div class="nx-page__title">
                        <h1><i class="ri-menu-4-line" aria-hidden="true"></i> 菜单授权</h1>
                        <p>配置角色和人员的菜单访问权限（支持多级菜单）</p>
                    </div>
                </div>
                <div class="nx-page__actions">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle aria-label="切换主题">
                        <i class="ri-sun-line"></i>
                    </button>
                    <div class="nx-relative">
                        <div class="nx-page__user-menu" id="user-menu">
                            <div class="nx-page__user-avatar" id="user-avatar">U</div>
                            <span class="nx-page__user-name" id="user-name">加载中...</span>
                            <i class="ri-arrow-down-s-line"></i>
                        </div>
                        <div class="nx-page__dropdown-menu" id="user-dropdown">
                            <div class="nx-page__dropdown-item" onclick="window.location.href='my-profile.html'">
                                <i class="ri-user-line"></i> 个人中心
                            </div>
                            <div class="nx-page__dropdown-item nx-page__dropdown-item--danger" onclick="NX.userMenu.logout()">
                                <i class="ri-logout-box-line"></i> 退出登录
                            </div>
                        </div>
                    </div>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container menu-tree-page">
                    <div class="stats-row">
                        <div class="stat-card">
                            <div class="stat-icon primary"><i class="ri-shield-user-line"></i></div>
                            <div class="stat-content">
                                <h4>角色数量</h4>
                                <div class="stat-value" id="stat-roles">0</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon success"><i class="ri-menu-line"></i></div>
                            <div class="stat-content">
                                <h4>菜单总数</h4>
                                <div class="stat-value" id="stat-menus">0</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon warning"><i class="ri-folder-line"></i></div>
                            <div class="stat-content">
                                <h4>最大层级</h4>
                                <div class="stat-value" id="stat-level">0</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon info"><i class="ri-time-line"></i></div>
                            <div class="stat-content">
                                <h4>最后更新</h4>
                                <div class="stat-value" style="font-size: 14px;" id="stat-update">-</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="main-content">
                        <div class="role-panel">
                            <div class="panel-header">
                                <h3><i class="ri-shield-user-line"></i> 角色列表</h3>
                            </div>
                            <div class="role-list" id="role-list"></div>
                        </div>
                        
                        <div class="menu-panel">
                            <div class="menu-toolbar">
                                <button class="toolbar-btn primary" onclick="addRootMenu()">
                                    <i class="ri-add-line"></i> 添加顶级菜单
                                </button>
                                <button class="toolbar-btn" onclick="expandAll()">
                                    <i class="ri-expand-diagonal-line"></i> 全部展开
                                </button>
                                <button class="toolbar-btn" onclick="collapseAll()">
                                    <i class="ri-contract-left-right-line"></i> 全部折叠
                                </button>
                                <button class="toolbar-btn" onclick="saveMenus()">
                                    <i class="ri-save-line"></i> 保存
                                </button>
                            </div>
                            <div class="menu-tree-container" id="menu-tree-container">
                                <div class="empty-state">
                                    <i class="ri-menu-line"></i>
                                    <h3>请选择角色</h3>
                                    <p>从左侧选择角色查看菜单配置</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="library-panel">
                        <div class="panel-header">
                            <h3><i class="ri-archive-line"></i> 菜单库</h3>
                            <button class="toolbar-btn" onclick="showAddLibraryModal()">
                                <i class="ri-add-line"></i> 添加
                            </button>
                        </div>
                        <div class="library-grid" id="library-grid"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="modal-overlay" id="menu-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">添加菜单</h3>
                <button class="modal-close" onclick="closeModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="menu-form">
                    <input type="hidden" id="menu-id">
                    <input type="hidden" id="menu-parent-id">
                    <input type="hidden" id="menu-level">
                    
                    <div class="form-group">
                        <label>菜单名称 <span style="color: var(--nx-danger);">*</span></label>
                        <input type="text" id="menu-name" required placeholder="请输入菜单名称">
                    </div>
                    
                    <div class="form-group">
                        <label>URL <span style="color: var(--nx-danger);">*</span></label>
                        <input type="text" id="menu-url" required placeholder="/console/pages/xxx.html">
                    </div>
                    
                    <div class="form-group">
                        <label>图标</label>
                        <input type="text" id="menu-icon" placeholder="ri-xxx-line">
                    </div>
                    
                    <div class="form-group">
                        <label>排序</label>
                        <input type="number" id="menu-sort" value="1" min="1">
                    </div>
                    
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="menu-active"> 默认激活
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveMenu()">保存</button>
            </div>
        </div>
    </div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/api.js"></script>
    <script>
        (function() {
            'use strict';
            
            let allRoles = {};
            let selectedRoleId = null;
            let menuTree = [];
            let menuLibrary = [];
            let expandedNodes = new Set();
            let editingMenuId = null;
            
            async function init() {
                await Promise.all([
                    loadRoles(),
                    loadLibrary()
                ]);
            }
            
            async function loadRoles() {
                try {
                    const response = await fetch('/api/v1/menu/config');
                    const result = await response.json();
                    
                    if (result.status === 'success' && result.data) {
                        allRoles = result.data.roles || {};
                        renderRoleList();
                        updateStats();
                        
                        if (result.data.updatedAt) {
                            document.getElementById('stat-update').textContent = formatTime(result.data.updatedAt);
                        }
                    }
                } catch (e) {
                    console.error('Failed to load roles:', e);
                }
            }
            
            async function loadLibrary() {
                try {
                    const response = await fetch('/api/v1/menu/library');
                    const result = await response.json();
                    
                    if (result.status === 'success' && result.data) {
                        menuLibrary = result.data;
                        renderLibrary();
                    }
                } catch (e) {
                    console.error('Failed to load library:', e);
                }
            }
            
            async function loadMenuTree(roleId) {
                try {
                    const response = await fetch(`/api/v1/menu/roles/${roleId}/menu-tree`);
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        menuTree = result.data || [];
                        renderMenuTree();
                        updateStats();
                    }
                } catch (e) {
                    console.error('Failed to load menu tree:', e);
                    menuTree = [];
                    renderMenuTree();
                }
            }
            
            function renderRoleList() {
                const container = document.getElementById('role-list');
                const roleIds = Object.keys(allRoles);
                
                if (roleIds.length === 0) {
                    container.innerHTML = '<div class="empty-state"><i class="ri-shield-user-line"></i><p>暂无角色</p></div>';
                    return;
                }
                
                container.innerHTML = roleIds.map(id => {
                    const role = allRoles[id];
                    const menuCount = countMenus(role.menus || []);
                    const isActive = selectedRoleId === id;
                    
                    return `
                        <div class="role-item ${isActive ? 'active' : ''}" onclick="selectRole('${id}')">
                            <div class="role-icon">
                                <i class="${role.icon || 'ri-user-line'}"></i>
                            </div>
                            <div class="role-info">
                                <h4>${role.name || id}</h4>
                                <span>${menuCount} 个菜单</span>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            function countMenus(menus) {
                let count = menus.length;
                menus.forEach(m => {
                    if (m.children && m.children.length > 0) {
                        count += countMenus(m.children);
                    }
                });
                return count;
            }
            
            function selectRole(roleId) {
                selectedRoleId = roleId;
                renderRoleList();
                loadMenuTree(roleId);
            }
            
            function renderMenuTree() {
                const container = document.getElementById('menu-tree-container');
                
                if (!selectedRoleId) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="ri-menu-line"></i>
                            <h3>请选择角色</h3>
                            <p>从左侧选择角色查看菜单配置</p>
                        </div>
                    `;
                    return;
                }
                
                if (menuTree.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="ri-menu-line"></i>
                            <h3>暂无菜单</h3>
                            <p>点击"添加顶级菜单"开始配置</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = `<div class="menu-tree">${renderTreeNodes(menuTree, 0)}</div>`;
            }
            
            function renderTreeNodes(nodes, level) {
                return nodes.map(node => {
                    const hasChildren = node.children && node.children.length > 0;
                    const isExpanded = expandedNodes.has(node.id);
                    const nodeId = node.id || `node-${Date.now()}-${Math.random()}`;
                    
                    return `
                        <div class="tree-node" data-id="${nodeId}" data-level="${level}" draggable="true">
                            <div class="tree-node-content" 
                                 ondragstart="handleDragStart(event, '${nodeId}')"
                                 ondragend="handleDragEnd(event)"
                                 ondragover="handleDragOver(event)"
                                 ondragleave="handleDragLeave(event)"
                                 ondrop="handleDrop(event, '${nodeId}')">
                                <span class="drag-handle" title="拖拽排序">
                                    <i class="ri-drag-move-line"></i>
                                </span>
                                <span class="tree-toggle ${hasChildren ? (isExpanded ? 'expanded' : '') : 'hidden'}" 
                                      onclick="toggleNode('${nodeId}', event)">
                                    <i class="ri-arrow-right-s-line"></i>
                                </span>
                                <span class="tree-icon">
                                    <i class="${node.icon || 'ri-menu-line'}"></i>
                                </span>
                                <div class="tree-label">
                                    <h5>${node.name}</h5>
                                    <span>${node.url || '-'}</span>
                                </div>
                                <span class="status-badge ${node.active ? 'active' : 'inactive'}">
                                    ${node.active ? '激活' : '未激活'}
                                </span>
                                <div class="tree-actions">
                                    <button class="tree-action-btn" onclick="addChildMenu('${nodeId}', '${node.name}')" title="添加子菜单">
                                        <i class="ri-add-line"></i>
                                    </button>
                                    <button class="tree-action-btn" onclick="editMenu('${nodeId}')" title="编辑">
                                        <i class="ri-edit-line"></i>
                                    </button>
                                    <button class="tree-action-btn danger" onclick="deleteMenu('${nodeId}')" title="删除">
                                        <i class="ri-delete-bin-line"></i>
                                    </button>
                                </div>
                            </div>
                            ${hasChildren ? `
                                <div class="tree-children" style="display: ${isExpanded ? 'block' : 'none'}" id="children-${nodeId}">
                                    ${renderTreeNodes(node.children, level + 1)}
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('');
            }
            
            function toggleNode(nodeId, event) {
                event.stopPropagation();
                
                if (expandedNodes.has(nodeId)) {
                    expandedNodes.delete(nodeId);
                } else {
                    expandedNodes.add(nodeId);
                }
                
                const toggle = event.target.closest('.tree-toggle');
                const children = document.getElementById(`children-${nodeId}`);
                
                if (toggle) {
                    toggle.classList.toggle('expanded');
                }
                if (children) {
                    children.style.display = expandedNodes.has(nodeId) ? 'block' : 'none';
                }
            }
            
            function expandAll() {
                function collectIds(nodes) {
                    nodes.forEach(node => {
                        if (node.children && node.children.length > 0) {
                            expandedNodes.add(node.id);
                            collectIds(node.children);
                        }
                    });
                }
                
                collectIds(menuTree);
                renderMenuTree();
            }
            
            function collapseAll() {
                expandedNodes.clear();
                renderMenuTree();
            }
            
            function addRootMenu() {
                if (!selectedRoleId) {
                    alert('请先选择角色');
                    return;
                }
                
                editingMenuId = null;
                document.getElementById('modal-title').textContent = '添加顶级菜单';
                document.getElementById('menu-form').reset();
                document.getElementById('menu-id').value = '';
                document.getElementById('menu-parent-id').value = '';
                document.getElementById('menu-level').value = '0';
                document.getElementById('menu-sort').value = (menuTree.length + 1);
                document.getElementById('menu-modal').classList.add('active');
            }
            
            function addChildMenu(parentId, parentName) {
                editingMenuId = null;
                document.getElementById('modal-title').textContent = `添加子菜单 - ${parentName}`;
                document.getElementById('menu-form').reset();
                document.getElementById('menu-id').value = '';
                document.getElementById('menu-parent-id').value = parentId;
                document.getElementById('menu-level').value = '1';
                document.getElementById('menu-sort').value = '1';
                document.getElementById('menu-modal').classList.add('active');
            }
            
            function editMenu(menuId) {
                const menu = findMenuById(menuTree, menuId);
                if (!menu) return;
                
                editingMenuId = menuId;
                document.getElementById('modal-title').textContent = '编辑菜单';
                document.getElementById('menu-id').value = menu.id;
                document.getElementById('menu-parent-id').value = menu.parentId || '';
                document.getElementById('menu-level').value = menu.level || 0;
                document.getElementById('menu-name').value = menu.name || '';
                document.getElementById('menu-url').value = menu.url || '';
                document.getElementById('menu-icon').value = menu.icon || '';
                document.getElementById('menu-sort').value = menu.sort || 1;
                document.getElementById('menu-active').checked = menu.active || false;
                document.getElementById('menu-modal').classList.add('active');
            }
            
            function findMenuById(nodes, id) {
                for (const node of nodes) {
                    if (node.id === id) return node;
                    if (node.children) {
                        const found = findMenuById(node.children, id);
                        if (found) return found;
                    }
                }
                return null;
            }
            
            async function deleteMenu(menuId) {
                if (!confirm('确定要删除此菜单吗？子菜单也会被一起删除。')) return;
                
                try {
                    const response = await fetch(`/api/v1/menu/roles/${selectedRoleId}/menus/${menuId}/tree`, {
                        method: 'DELETE'
                    });
                    
                    const result = await response.json();
                    if (result.status === 'success') {
                        await loadMenuTree(selectedRoleId);
                    } else {
                        alert('删除失败: ' + (result.message || '未知错误'));
                    }
                } catch (e) {
                    alert('删除失败: ' + e.message);
                }
            }
            
            async function saveMenu() {
                const id = document.getElementById('menu-id').value;
                const parentId = document.getElementById('menu-parent-id').value;
                const name = document.getElementById('menu-name').value;
                const url = document.getElementById('menu-url').value;
                const icon = document.getElementById('menu-icon').value;
                const sort = parseInt(document.getElementById('menu-sort').value) || 1;
                const active = document.getElementById('menu-active').checked;
                
                if (!name || !url) {
                    alert('请填写菜单名称和URL');
                    return;
                }
                
                const menu = {
                    id: id || `menu-${Date.now()}`,
                    name,
                    url,
                    icon: icon || 'ri-menu-line',
                    sort,
                    active
                };
                
                try {
                    let response;
                    
                    if (editingMenuId) {
                        response = await fetch(`/api/v1/menu/roles/${selectedRoleId}/menus/${editingMenuId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(menu)
                        });
                    } else {
                        const actualParentId = parentId || 'null';
                        response = await fetch(`/api/v1/menu/roles/${selectedRoleId}/menus/${actualParentId}/children`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(menu)
                        });
                    }
                    
                    const result = await response.json();
                    if (result.status === 'success') {
                        closeModal();
                        await loadMenuTree(selectedRoleId);
                    } else {
                        alert('保存失败: ' + (result.message || '未知错误'));
                    }
                } catch (e) {
                    alert('保存失败: ' + e.message);
                }
            }
            
            async function saveMenus() {
                if (!selectedRoleId) {
                    alert('请先选择角色');
                    return;
                }
                
                alert('菜单已自动保存');
            }
            
            function closeModal() {
                document.getElementById('menu-modal').classList.remove('active');
                editingMenuId = null;
            }
            
            function renderLibrary() {
                const container = document.getElementById('library-grid');
                
                if (menuLibrary.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>菜单库为空</p></div>';
                    return;
                }
                
                container.innerHTML = menuLibrary.map((item, index) => {
                    const hasChildren = item.children && item.children.length > 0;
                    return `
                        <div class="library-item" onclick="addFromLibrary(${index})" title="点击添加到当前角色">
                            <i class="${item.icon || 'ri-menu-line'}"></i>
                            <div style="flex: 1;">
                                <h5>${item.name}</h5>
                                <span>${item.url}</span>
                                ${hasChildren ? `<span style="color: var(--nx-primary); font-size: 10px;">包含 ${item.children.length} 个子菜单</span>` : ''}
                            </div>
                            <i class="ri-add-circle-line" style="color: var(--nx-primary);"></i>
                        </div>
                    `;
                }).join('');
            }
            
            function addFromLibrary(index) {
                if (!selectedRoleId) {
                    alert('请先选择角色');
                    return;
                }
                
                const item = menuLibrary[index];
                addMenuWithChildren(item, null);
            }
            
            async function addMenuWithChildren(item, parentId) {
                const menu = {
                    id: `menu-${Date.now()}`,
                    name: item.name,
                    url: item.url,
                    icon: item.icon || 'ri-menu-line',
                    sort: 1,
                    active: false
                };
                
                try {
                    const response = await fetch(`/api/v1/menu/roles/${selectedRoleId}/menus/${parentId || 'null'}/children`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(menu)
                    });
                    
                    const result = await response.json();
                    if (result.status === 'success') {
                        if (item.children && item.children.length > 0) {
                            const newParentId = menu.id;
                            for (let i = 0; i < item.children.length; i++) {
                                await addMenuWithChildren(item.children[i], newParentId);
                            }
                        }
                        await loadMenuTree(selectedRoleId);
                    } else {
                        alert('添加失败: ' + (result.message || '未知错误'));
                    }
                } catch (e) {
                    alert('添加失败: ' + e.message);
                }
            }
            
            function showAddLibraryModal() {
                editingMenuId = null;
                document.getElementById('modal-title').textContent = '添加到菜单库';
                document.getElementById('menu-form').reset();
                document.getElementById('menu-id').value = '';
                document.getElementById('menu-parent-id').value = '';
                document.getElementById('menu-modal').classList.add('active');
            }
            
            function updateStats() {
                document.getElementById('stat-roles').textContent = Object.keys(allRoles).length;
                
                let totalMenus = 0;
                let maxLevel = 0;
                
                function countAll(nodes, level) {
                    nodes.forEach(node => {
                        totalMenus++;
                        maxLevel = Math.max(maxLevel, level);
                        if (node.children) {
                            countAll(node.children, level + 1);
                        }
                    });
                }
                
                countAll(menuTree, 1);
                
                document.getElementById('stat-menus').textContent = totalMenus;
                document.getElementById('stat-level').textContent = maxLevel;
            }
            
            function formatTime(timestamp) {
                if (!timestamp) return '-';
                const date = new Date(timestamp);
                return date.toLocaleString('zh-CN');
            }
            
            let draggedNodeId = null;
            
            function handleDragStart(event, nodeId) {
                draggedNodeId = nodeId;
                event.dataTransfer.effectAllowed = 'move';
                event.dataTransfer.setData('text/plain', nodeId);
                event.target.closest('.tree-node-content').classList.add('dragging');
            }
            
            function handleDragEnd(event) {
                document.querySelectorAll('.tree-node-content').forEach(el => {
                    el.classList.remove('dragging', 'drag-over', 'drag-over-top', 'drag-over-bottom');
                });
                draggedNodeId = null;
            }
            
            function handleDragOver(event) {
                event.preventDefault();
                event.dataTransfer.dropEffect = 'move';
                
                const target = event.target.closest('.tree-node-content');
                if (!target) return;
                
                const rect = target.getBoundingClientRect();
                const y = event.clientY - rect.top;
                const height = rect.height;
                
                target.classList.remove('drag-over', 'drag-over-top', 'drag-over-bottom');
                
                if (y < height * 0.25) {
                    target.classList.add('drag-over-top');
                } else if (y > height * 0.75) {
                    target.classList.add('drag-over-bottom');
                } else {
                    target.classList.add('drag-over');
                }
            }
            
            function handleDragLeave(event) {
                const target = event.target.closest('.tree-node-content');
                if (target) {
                    target.classList.remove('drag-over', 'drag-over-top', 'drag-over-bottom');
                }
            }
            
            function handleDrop(event, targetNodeId) {
                event.preventDefault();
                
                if (!draggedNodeId || draggedNodeId === targetNodeId) return;
                
                const target = event.target.closest('.tree-node-content');
                if (!target) return;
                
                const rect = target.getBoundingClientRect();
                const y = event.clientY - rect.top;
                const height = rect.height;
                
                let dropPosition = 'inside';
                if (y < height * 0.25) {
                    dropPosition = 'before';
                } else if (y > height * 0.75) {
                    dropPosition = 'after';
                }
                
                moveMenuNode(draggedNodeId, targetNodeId, dropPosition);
            }
            
            async function moveMenuNode(sourceId, targetId, position) {
                let newParentId = null;
                let newSort = 1;
                
                if (position === 'inside') {
                    newParentId = targetId;
                    newSort = 1;
                } else {
                    const targetMenu = findMenuById(menuTree, targetId);
                    if (targetMenu) {
                        newParentId = targetMenu.parentId;
                        newSort = position === 'before' ? targetMenu.sort : targetMenu.sort + 1;
                    }
                }
                
                try {
                    const response = await fetch(`/api/v1/menu/roles/${selectedRoleId}/menus/${sourceId}/move?newParentId=${newParentId || ''}&newSort=${newSort}`, {
                        method: 'PUT'
                    });
                    
                    const result = await response.json();
                    if (result.status === 'success') {
                        await loadMenuTree(selectedRoleId);
                    } else {
                        alert('移动失败: ' + (result.message || '未知错误'));
                    }
                } catch (e) {
                    alert('移动失败: ' + e.message);
                }
            }
            
            window.selectRole = selectRole;
            window.toggleNode = toggleNode;
            window.expandAll = expandAll;
            window.collapseAll = collapseAll;
            window.addRootMenu = addRootMenu;
            window.addChildMenu = addChildMenu;
            window.editMenu = editMenu;
            window.deleteMenu = deleteMenu;
            window.saveMenu = saveMenu;
            window.saveMenus = saveMenus;
            window.closeModal = closeModal;
            window.addFromLibrary = addFromLibrary;
            window.showAddLibraryModal = showAddLibraryModal;
            window.handleDragStart = handleDragStart;
            window.handleDragEnd = handleDragEnd;
            window.handleDragOver = handleDragOver;
            window.handleDragLeave = handleDragLeave;
            window.handleDrop = handleDrop;
            
            document.addEventListener('DOMContentLoaded', init);
        })();
    </script>
</body>
</html>
