<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜单授权 - Nexus Console</title>
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <link rel="stylesheet" href="/console/css/pages/menu-auth.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold">
                    <i class="ri-server-line"></i> Nexus Console
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle aria-label="切换侧边栏">
                        <i class="ri-menu-line"></i>
                    </button>
                    <div class="nx-page__title">
                        <h1><i class="ri-menu-4-line" aria-hidden="true"></i> 菜单授权</h1>
                        <p>配置角色和人员的菜单访问权限（支持多级菜单）</p>
                    </div>
                </div>
                <div class="nx-page__actions">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle aria-label="切换主题">
                        <i class="ri-sun-line"></i>
                    </button>
                    <div class="nx-relative">
                        <div class="nx-page__user-menu" id="user-menu">
                            <div class="nx-page__user-avatar" id="user-avatar">U</div>
                            <span class="nx-page__user-name" id="user-name">加载中...</span>
                            <i class="ri-arrow-down-s-line"></i>
                        </div>
                        <div class="nx-page__dropdown-menu" id="user-dropdown">
                            <div class="nx-page__dropdown-item" onclick="window.location.href='my-profile.html'">
                                <i class="ri-user-line"></i> 个人中心
                            </div>
                            <div class="nx-page__dropdown-item nx-page__dropdown-item--danger" onclick="NX.userMenu.logout()">
                                <i class="ri-logout-box-line"></i> 退出登录
                            </div>
                        </div>
                    </div>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container menu-tree-page">
                    <div class="stats-row">
                        <div class="stat-card">
                            <div class="stat-icon primary"><i class="ri-shield-user-line"></i></div>
                            <div class="stat-content">
                                <h4>角色数量</h4>
                                <div class="stat-value" id="stat-roles">0</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon success"><i class="ri-menu-line"></i></div>
                            <div class="stat-content">
                                <h4>菜单总数</h4>
                                <div class="stat-value" id="stat-menus">0</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon warning"><i class="ri-folder-line"></i></div>
                            <div class="stat-content">
                                <h4>最大层级</h4>
                                <div class="stat-value" id="stat-level">0</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon info"><i class="ri-time-line"></i></div>
                            <div class="stat-content">
                                <h4>最后更新</h4>
                                <div class="stat-value" style="font-size: 14px;" id="stat-update">-</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="main-content">
                        <div class="role-panel">
                            <div class="panel-header">
                                <h3><i class="ri-shield-user-line"></i> 角色列表</h3>
                            </div>
                            <div class="role-list" id="role-list"></div>
                        </div>
                        
                        <div class="menu-panel">
                            <div class="menu-toolbar">
                                <button class="toolbar-btn primary" onclick="addRootMenu()">
                                    <i class="ri-add-line"></i> 添加顶级菜单
                                </button>
                                <button class="toolbar-btn" onclick="expandAll()">
                                    <i class="ri-expand-diagonal-line"></i> 全部展开
                                </button>
                                <button class="toolbar-btn" onclick="collapseAll()">
                                    <i class="ri-contract-left-right-line"></i> 全部折叠
                                </button>
                                <button class="toolbar-btn" onclick="saveMenus()">
                                    <i class="ri-save-line"></i> 保存
                                </button>
                            </div>
                            <div class="menu-tree-container" id="menu-tree-container">
                                <div class="empty-state">
                                    <i class="ri-menu-line"></i>
                                    <h3>请选择角色</h3>
                                    <p>从左侧选择角色查看菜单配置</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="library-panel">
                        <div class="panel-header">
                            <h3><i class="ri-archive-line"></i> 菜单库</h3>
                            <button class="toolbar-btn" onclick="showAddLibraryModal()">
                                <i class="ri-add-line"></i> 添加
                            </button>
                        </div>
                        <div class="library-grid" id="library-grid"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="modal-overlay" id="menu-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">添加菜单</h3>
                <button class="modal-close" onclick="closeModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="menu-form">
                    <input type="hidden" id="menu-id">
                    <input type="hidden" id="menu-parent-id">
                    <input type="hidden" id="menu-level">
                    
                    <div class="form-group">
                        <label>菜单名称 <span style="color: var(--nx-danger);">*</span></label>
                        <input type="text" id="menu-name" required placeholder="请输入菜单名称">
                    </div>
                    
                    <div class="form-group">
                        <label>URL <span style="color: var(--nx-danger);">*</span></label>
                        <input type="text" id="menu-url" required placeholder="/console/pages/xxx.html">
                    </div>
                    
                    <div class="form-group">
                        <label>图标</label>
                        <input type="text" id="menu-icon" placeholder="ri-xxx-line">
                    </div>
                    
                    <div class="form-group">
                        <label>排序</label>
                        <input type="number" id="menu-sort" value="1" min="1">
                    </div>
                    
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="menu-active"> 默认激活
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveMenu()">保存</button>
            </div>
        </div>
    </div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/api.js"></script>
    <script src="/console/js/pages/menu-auth.js"></script>
</body>
</html>
