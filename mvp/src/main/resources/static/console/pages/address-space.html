<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能力地址空间 - Ooder Skills</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages/address-space.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="sidebar" id="sidebar"></div>
        
        <main class="main-content">
            <div class="page-header">
                <div class="page-title">
                    <h1><i class="ri-map-2-line"></i> 能力地址空间</h1>
                    <p class="page-desc">128个固定地址空间的可视化管理</p>
                </div>
                <div class="page-actions">
                    <button class="nx-btn nx-btn--secondary" onclick="refreshStatus()">
                        <i class="ri-refresh-line"></i> 刷新状态
                    </button>
                    <button class="nx-btn nx-btn--primary" onclick="openConfigWizard()">
                        <i class="ri-settings-3-line"></i> 配置向导
                    </button>
                </div>
            </div>

            <div class="address-space-container">
                <div class="map-section">
                    <div class="section-header">
                        <h2><i class="ri-grid-line"></i> 地址空间地图</h2>
                        <div class="map-controls">
                            <div class="filter-group">
                                <label>筛选分类:</label>
                                <select id="categoryFilter" class="form-select" onchange="filterByCategory()">
                                    <option value="all">全部分类</option>
                                </select>
                            </div>
                            <div class="filter-group">
                                <label>状态:</label>
                                <select id="statusFilter" class="form-select" onchange="filterByStatus()">
                                    <option value="all">全部状态</option>
                                    <option value="active">已注册</option>
                                    <option value="inactive">空闲</option>
                                    <option value="pending">待分配</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="address-map" id="addressMap">
                        <div class="map-loading">
                            <i class="ri-loader-4-line"></i>
                            <span>加载中...</span>
                        </div>
                    </div>

                    <div class="map-legend">
                        <div class="legend-title">图例</div>
                        <div class="legend-items" id="legendItems"></div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="category-tree-section">
                        <div class="section-header">
                            <h3><i class="ri-folder-tree-line"></i> 分类导航</h3>
                        </div>
                        <div class="category-tree" id="categoryTree"></div>
                    </div>

                    <div class="stats-section">
                        <div class="section-header">
                            <h3><i class="ri-pie-chart-line"></i> 统计概览</h3>
                        </div>
                        <div class="stats-grid" id="statsGrid"></div>
                    </div>

                    <div class="quick-actions-section">
                        <div class="section-header">
                            <h3><i class="ri-flashlight-line"></i> 快捷操作</h3>
                        </div>
                        <div class="quick-actions">
                            <button class="action-btn" onclick="goToCategory('llm')">
                                <i class="ri-robot-line"></i>
                                <span>LLM配置</span>
                            </button>
                            <button class="action-btn" onclick="goToCategory('db')">
                                <i class="ri-database-2-line"></i>
                                <span>数据库配置</span>
                            </button>
                            <button class="action-btn" onclick="goToCategory('vfs')">
                                <i class="ri-folder-line"></i>
                                <span>存储配置</span>
                            </button>
                            <button class="action-btn" onclick="goToCategory('org')">
                                <i class="ri-team-line"></i>
                                <span>组织配置</span>
                            </button>
                            <button class="action-btn" onclick="goToCategory('know')">
                                <i class="ri-book-2-line"></i>
                                <span>知识库配置</span>
                            </button>
                            <button class="action-btn" onclick="goToCategory('comm')">
                                <i class="ri-message-3-line"></i>
                                <span>通讯配置</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="addressDetailModal">
        <div class="modal-content address-detail-modal">
            <div class="modal-header">
                <h3 id="modalTitle">地址详情</h3>
                <button class="modal-close" onclick="closeModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="nx-btn nx-btn--ghost" onclick="closeModal()">关闭</button>
                <button class="nx-btn nx-btn--primary" id="modalActionBtn">配置</button>
            </div>
        </div>
    </div>

    <script src="../js/utils/api-client.js"></script>
    <script src="../js/components/sidebar.js"></script>
    <script src="../js/pages/address-space.js"></script>
</body>
</html>
