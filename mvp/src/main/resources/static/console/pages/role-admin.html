<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色权限管理 - Nexus Console</title>
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold">
                    <i class="ri-server-line"></i> Nexus Console
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle aria-label="切换侧边栏">
                        <i class="ri-menu-line"></i>
                    </button>
                    <div class="nx-page__title">
                        <h1><i class="ri-shield-user-line" aria-hidden="true"></i> 角色权限管理</h1>
                        <p>管理系统角色、权限分配和用户绑定</p>
                    </div>
                </div>
                <div class="nx-page__actions">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle aria-label="切换主题">
                        <i class="ri-sun-line"></i>
                    </button>
                    <div class="nx-relative">
                        <div class="nx-page__user-menu" id="user-menu">
                            <div class="nx-page__user-avatar" id="user-avatar">U</div>
                            <span class="nx-page__user-name" id="user-name">加载中...</span>
                            <i class="ri-arrow-down-s-line"></i>
                        </div>
                        <div class="nx-page__dropdown-menu" id="user-dropdown">
                            <div class="nx-page__dropdown-item" onclick="window.location.href='my-profile.html'">
                                <i class="ri-user-line"></i> 个人中心
                            </div>
                            <div class="nx-page__dropdown-item" onclick="window.location.href='my-capabilities.html'">
                                <i class="ri-puzzle-line"></i> 我的能力
                            </div>
                            <div class="nx-page__dropdown-item nx-page__dropdown-item--danger" onclick="NX.userMenu.logout()">
                                <i class="ri-logout-box-line"></i> 退出登录
                            </div>
                        </div>
                    </div>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="nx-grid nx-grid-cols-4 nx-mb-4">
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon"><i class="ri-shield-user-line"></i></div>
                            <div class="nx-stat-card__content">
                                <h4>角色总数</h4>
                                <p class="nx-stat-card__value" id="role-count">0</p>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon" style="background: var(--nx-success-light); color: var(--nx-success);"><i class="ri-user-line"></i></div>
                            <div class="nx-stat-card__content">
                                <h4>用户总数</h4>
                                <p class="nx-stat-card__value" id="user-count">0</p>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon" style="background: var(--nx-info-light); color: var(--nx-info);"><i class="ri-menu-line"></i></div>
                            <div class="nx-stat-card__content">
                                <h4>菜单权限</h4>
                                <p class="nx-stat-card__value" id="menu-count">0</p>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon" style="background: var(--nx-warning-light); color: var(--nx-warning);"><i class="ri-key-line"></i></div>
                            <div class="nx-stat-card__content">
                                <h4>权限项</h4>
                                <p class="nx-stat-card__value" id="permission-count">0</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="nx-tabs nx-mb-4">
                        <div class="nx-tabs__list">
                            <button class="nx-tabs__tab nx-tabs__tab--active" onclick="switchTab(event, 'roles')">角色管理</button>
                            <button class="nx-tabs__tab" onclick="switchTab(event, 'users')">用户绑定</button>
                            <button class="nx-tabs__tab" onclick="switchTab(event, 'permissions')">权限配置</button>
                        </div>
                    </div>
                    
                    <div id="tab-roles" class="tab-content active">
                        <div class="nx-card">
                            <div class="nx-card__header nx-flex nx-items-center nx-justify-between">
                                <h3><i class="ri-shield-user-line"></i> 角色列表</h3>
                                <button class="nx-btn nx-btn--primary nx-btn--sm" onclick="showRoleModal()">
                                    <i class="ri-add-line"></i> 新增角色
                                </button>
                            </div>
                            <div class="nx-card__body">
                                <div id="role-list"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div id="tab-users" class="tab-content">
                        <div class="nx-card">
                            <div class="nx-card__header nx-flex nx-items-center nx-justify-between">
                                <h3><i class="ri-user-line"></i> 用户角色绑定</h3>
                                <div class="nx-flex nx-gap-2">
                                    <select class="nx-select" id="role-filter" onchange="filterUsersByRole()" style="width: 150px;">
                                        <option value="">全部角色</option>
                                    </select>
                                    <button class="nx-btn nx-btn--primary nx-btn--sm" onclick="showUserModal()">
                                        <i class="ri-add-line"></i> 新增用户
                                    </button>
                                </div>
                            </div>
                            <div class="nx-card__body">
                                <div id="user-list"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div id="tab-permissions" class="tab-content">
                        <div class="nx-card">
                            <div class="nx-card__header nx-flex nx-items-center nx-justify-between">
                                <h3><i class="ri-key-line"></i> 权限配置</h3>
                                <button class="nx-btn nx-btn--secondary nx-btn--sm" onclick="window.location.href='menu-auth.html'">
                                    <i class="ri-menu-line"></i> 菜单权限配置
                                </button>
                            </div>
                            <div class="nx-card__body">
                                <div id="permission-list"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="nx-modal" id="role-modal">
        <div class="nx-modal__overlay" onclick="closeRoleModal()"></div>
        <div class="nx-modal__content" style="max-width: 500px;">
            <div class="nx-modal__header">
                <h3 id="role-modal-title">新增角色</h3>
                <button class="nx-btn nx-btn--ghost nx-btn--icon" onclick="closeRoleModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="nx-modal__body">
                <form id="role-form">
                    <input type="hidden" id="role-id">
                    <div class="nx-form-group">
                        <label class="nx-form-label">角色ID <span class="nx-text-danger">*</span></label>
                        <input type="text" class="nx-input" id="role-id-input" placeholder="如: admin, leader, collaborator" required>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">角色名称 <span class="nx-text-danger">*</span></label>
                        <input type="text" class="nx-input" id="role-name" placeholder="如: 管理员, 主导者, 协作者" required>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">描述</label>
                        <textarea class="nx-input" id="role-description" rows="3" placeholder="角色描述"></textarea>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">图标</label>
                        <input type="text" class="nx-input" id="role-icon" placeholder="如: ri-admin-line">
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">组织角色</label>
                        <select class="nx-select" id="role-org-role">
                            <option value="">请选择</option>
                            <option value="admin">管理员</option>
                            <option value="manager">经理</option>
                            <option value="employee">员工</option>
                        </select>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">默认用户名</label>
                        <input type="text" class="nx-input" id="role-default-username" placeholder="创建用户时的默认用户名">
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">默认密码</label>
                        <input type="password" class="nx-input" id="role-default-password" placeholder="创建用户时的默认密码">
                    </div>
                </form>
            </div>
            <div class="nx-modal__footer">
                <button class="nx-btn nx-btn--secondary" onclick="closeRoleModal()">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="saveRole()">保存</button>
            </div>
        </div>
    </div>
    
    <div class="nx-modal" id="user-modal">
        <div class="nx-modal__overlay" onclick="closeUserModal()"></div>
        <div class="nx-modal__content" style="max-width: 500px;">
            <div class="nx-modal__header">
                <h3 id="user-modal-title">新增用户</h3>
                <button class="nx-btn nx-btn--ghost nx-btn--icon" onclick="closeUserModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="nx-modal__body">
                <form id="user-form">
                    <input type="hidden" id="user-id">
                    <div class="nx-form-group">
                        <label class="nx-form-label">姓名 <span class="nx-text-danger">*</span></label>
                        <input type="text" class="nx-input" id="user-name-input" required>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">邮箱</label>
                        <input type="email" class="nx-input" id="user-email">
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">绑定角色 <span class="nx-text-danger">*</span></label>
                        <select class="nx-select" id="user-role" required></select>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">组织角色</label>
                        <select class="nx-select" id="user-org-role">
                            <option value="">请选择</option>
                            <option value="admin">管理员</option>
                            <option value="manager">经理</option>
                            <option value="employee">员工</option>
                        </select>
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">部门ID</label>
                        <input type="text" class="nx-input" id="user-department" placeholder="如: root">
                    </div>
                    <div class="nx-form-group">
                        <label class="nx-form-label">初始密码</label>
                        <input type="password" class="nx-input" id="user-password" placeholder="留空则使用角色默认密码">
                    </div>
                </form>
            </div>
            <div class="nx-modal__footer">
                <button class="nx-btn nx-btn--secondary" onclick="closeUserModal()">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="saveUser()">保存</button>
            </div>
        </div>
    </div>
    
    <div class="nx-modal" id="bind-role-modal">
        <div class="nx-modal__overlay" onclick="closeBindRoleModal()"></div>
        <div class="nx-modal__content" style="max-width: 400px;">
            <div class="nx-modal__header">
                <h3>绑定角色</h3>
                <button class="nx-btn nx-btn--ghost nx-btn--icon" onclick="closeBindRoleModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="nx-modal__body">
                <input type="hidden" id="bind-user-id">
                <div class="nx-form-group">
                    <label class="nx-form-label">选择角色</label>
                    <select class="nx-select" id="bind-role-select"></select>
                </div>
            </div>
            <div class="nx-modal__footer">
                <button class="nx-btn nx-btn--secondary" onclick="closeBindRoleModal()">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="confirmBindRole()">确认绑定</button>
            </div>
        </div>
    </div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/api.js"></script>
    <script src="/console/js/pages/role-admin.js"></script>
</body>
</html>
