<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ooder MVP - 系统安装</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .status-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .status-item:last-child {
            border-bottom: none;
        }
        
        .status-item .label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #333;
        }
        
        .status-item .label i {
            font-size: 20px;
            color: #667eea;
        }
        
        .status-item .value {
            font-weight: 600;
        }
        
        .status-item .value.success {
            color: #28a745;
        }
        
        .status-item .value.error {
            color: #dc3545;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 5px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 1px solid #ddd;
        }
        
        .btn-secondary:hover {
            background: #e9ecef;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .api-links {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .api-links h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .api-links a {
            display: inline-block;
            background: #f8f9fa;
            color: #667eea;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 13px;
            margin: 4px;
            transition: background 0.2s;
        }
        
        .api-links a:hover {
            background: #e9ecef;
        }
        
        .version {
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading i {
            font-size: 32px;
            color: #667eea;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="ri-rocket-2-line"></i>
        </div>
        <h1>Ooder MVP</h1>
        <p class="subtitle">最小可用产品核心模块 v2.3.1</p>
        
        <div id="status-card" class="status-card">
            <div class="status-item">
                <span class="label"><i class="ri-heart-pulse-line"></i> 系统状态</span>
                <span class="value success" id="system-status">检查中...</span>
            </div>
            <div class="status-item">
                <span class="label"><i class="ri-user-line"></i> 认证服务</span>
                <span class="value" id="auth-status">检查中...</span>
            </div>
            <div class="status-item">
                <span class="label"><i class="ri-team-line"></i> 组织服务</span>
                <span class="value" id="org-status">检查中...</span>
            </div>
            <div class="status-item">
                <span class="label"><i class="ri-settings-3-line"></i> 配置服务</span>
                <span class="value" id="config-status">检查中...</span>
            </div>
            <div class="status-item">
                <span class="label"><i class="ri-shield-check-line"></i> 能力注册</span>
                <span class="value" id="capability-status">检查中...</span>
            </div>
        </div>
        
        <div>
            <button class="btn" onclick="checkHealth()">
                <i class="ri-refresh-line"></i> 刷新状态
            </button>
            <button class="btn btn-secondary" onclick="window.location.href='/actuator/health'">
                <i class="ri-external-link-line"></i> Actuator
            </button>
        </div>
        
        <div class="api-links">
            <h3>API 端点</h3>
            <a href="/api/v1/auth/roles">角色列表</a>
            <a href="/api/v1/org/users">用户列表</a>
            <a href="/api/v1/org/departments">部门列表</a>
            <a href="/api/v1/system/config">系统配置</a>
            <a href="/api/v1/mvp/health">健康检查</a>
            <a href="/api/v1/mvp/info">应用信息</a>
            <a href="/api/v1/mvp/profile">Profile</a>
        </div>
        
        <div class="version">
            Ooder Skills Platform &copy; 2026
        </div>
    </div>
    
    <script>
        async function checkHealth() {
            try {
                const response = await fetch('/api/v1/mvp/health');
                const data = await response.json();
                
                document.getElementById('system-status').textContent = '运行中';
                document.getElementById('system-status').className = 'value success';
            } catch (e) {
                document.getElementById('system-status').textContent = '异常';
                document.getElementById('system-status').className = 'value error';
            }
            
            try {
                const response = await fetch('/api/v1/auth/roles');
                const data = await response.json();
                
                document.getElementById('auth-status').textContent = '正常';
                document.getElementById('auth-status').className = 'value success';
            } catch (e) {
                document.getElementById('auth-status').textContent = '异常';
                document.getElementById('auth-status').className = 'value error';
            }
            
            try {
                const response = await fetch('/api/v1/org/users');
                const data = await response.json();
                
                document.getElementById('org-status').textContent = '正常';
                document.getElementById('org-status').className = 'value success';
            } catch (e) {
                document.getElementById('org-status').textContent = '异常';
                document.getElementById('org-status').className = 'value error';
            }
            
            try {
                const response = await fetch('/api/v1/system/config');
                const data = await response.json();
                
                document.getElementById('config-status').textContent = '正常';
                document.getElementById('config-status').className = 'value success';
            } catch (e) {
                document.getElementById('config-status').textContent = '异常';
                document.getElementById('config-status').className = 'value error';
            }
            
            document.getElementById('capability-status').textContent = '已注册';
            document.getElementById('capability-status').className = 'value success';
        }
        
        checkHealth();
    </script>
</body>
</html>
