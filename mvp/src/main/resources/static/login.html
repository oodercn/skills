<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Ooder MVP</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin: 20px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-logo {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .login-logo i {
            font-size: 36px;
            color: white;
        }
        
        .login-title {
            font-size: 26px;
            font-weight: 700;
            color: #1a1a2e;
            margin: 0 0 8px 0;
        }
        
        .login-subtitle {
            font-size: 14px;
            color: #666;
            margin: 0;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        
        .form-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: #f8f9fa;
            color: #333;
            transition: all 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }
        
        .form-select {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: #f8f9fa;
            color: #333;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .form-select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }
        
        .login-btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .login-error {
            padding: 14px 16px;
            background: #fee2e2;
            border-radius: 10px;
            color: #dc2626;
            font-size: 14px;
            display: none;
            border: 1px solid #fecaca;
        }
        
        .login-error.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .demo-accounts {
            margin-top: 28px;
            padding-top: 28px;
            border-top: 1px solid #eee;
        }
        
        .demo-title {
            font-size: 13px;
            color: #888;
            margin-bottom: 14px;
            text-align: center;
        }
        
        .demo-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .demo-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .demo-btn:hover {
            border-color: #667eea;
            color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }
        
        .back-link {
            text-align: center;
            margin-top: 24px;
        }
        
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo">
                    <i class="ri-rocket-2-line"></i>
                </div>
                <h1 class="login-title">Ooder MVP</h1>
                <p class="login-subtitle">场景技能管理平台 v2.3.1</p>
            </div>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="username" placeholder="请输入用户名" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="password" placeholder="请输入密码" autocomplete="current-password" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">登录角色</label>
                    <select class="form-select" id="role">
                        <option value="installer">系统安装者 - 安装技能包，初始化系统</option>
                        <option value="admin">系统管理员 - 发现场景技能，配置分发</option>
                        <option value="leader">主导者 - 激活场景，获取KEY，执行入网</option>
                        <option value="collaborator">协作者 - 参与业务流转，执行任务</option>
                    </select>
                </div>
                
                <div class="login-error" id="loginError">
                    <i class="ri-error-warning-line"></i>
                    <span id="loginErrorText"></span>
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="ri-login-box-line"></i> 登录
                </button>
            </form>
            
            <div class="demo-accounts">
                <div class="demo-title">快速登录（演示账号）</div>
                <div class="demo-list">
                    <button class="demo-btn" onclick="quickLogin('admin', 'admin', 'admin')">
                        <i class="ri-admin-line"></i> 管理员
                    </button>
                    <button class="demo-btn" onclick="quickLogin('installer', 'installer', 'installer')">
                        <i class="ri-install-line"></i> 安装者
                    </button>
                    <button class="demo-btn" onclick="quickLogin('leader', 'leader', 'leader')">
                        <i class="ri-user-star-line"></i> 主导者
                    </button>
                    <button class="demo-btn" onclick="quickLogin('user', 'user', 'collaborator')">
                        <i class="ri-team-line"></i> 协作者
                    </button>
                </div>
            </div>
            
            <div class="back-link">
                <a href="/"><i class="ri-arrow-left-line"></i> 返回首页</a>
            </div>
        </div>
    </div>
    
    <script src="/js/utils/api.js"></script>
    <script src="/js/utils/auth.js"></script>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');
            const loginErrorText = document.getElementById('loginErrorText');
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="ri-loader-4-line ri-spin"></i> 登录中...';
            loginError.classList.remove('show');
            
            try {
                const result = await AuthApi.login(username, password, role);
                
                if (result.status === 'success' && result.data) {
                    AuthUtils.saveSession(result.data);
                    
                    const rolePages = {
                        'installer': '/pages/role-installer.html',
                        'admin': '/pages/dashboard.html',
                        'leader': '/pages/dashboard.html',
                        'collaborator': '/pages/dashboard.html'
                    };
                    
                    window.location.href = rolePages[role] || '/pages/dashboard.html';
                } else {
                    loginErrorText.textContent = result.message || '登录失败，请检查用户名和密码';
                    loginError.classList.add('show');
                }
            } catch (e) {
                console.error('Login error:', e);
                loginErrorText.textContent = '登录请求失败，请稍后重试';
                loginError.classList.add('show');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="ri-login-box-line"></i> 登录';
            }
        }
        
        function quickLogin(username, password, role) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
            document.getElementById('role').value = role;
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }
        
        document.getElementById('loginForm').addEventListener('submit', handleLogin);
    </script>
</body>
</html>
