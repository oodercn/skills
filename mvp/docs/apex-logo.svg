<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
    <defs>
        <!-- 主渐变 -->
        <linearGradient id="mainGradient" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#3b82f6"/>
            <stop offset="50%" style="stop-color:#8b5cf6"/>
            <stop offset="100%" style="stop-color:#06b6d4"/>
        </linearGradient>
        
        <!-- 光晕渐变 -->
        <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
            <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.6"/>
            <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
        </radialGradient>
        
        <!-- 顶部高光 -->
        <linearGradient id="topHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8"/>
            <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
        </linearGradient>
        
        <!-- 阴影滤镜 -->
        <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3b82f6" flood-opacity="0.3"/>
        </filter>
        
        <!-- 发光滤镜 -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes drawPath {
            from { stroke-dashoffset: 400; }
            to { stroke-dashoffset: 0; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shimmer {
            0% { opacity: 0.3; }
            50% { opacity: 0.8; }
            100% { opacity: 0.3; }
        }
        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .bg-circle { animation: pulse 3s ease-in-out infinite; }
        .rotating-ring { animation: rotate 20s linear infinite; transform-origin: 200px 200px; }
        .floating { animation: float 4s ease-in-out infinite; }
        .draw-line { stroke-dasharray: 400; animation: drawPath 2s ease-out forwards; }
        .text-animate { animation: fadeInUp 1s ease-out 0.5s forwards; opacity: 0; }
        .shimmer { animation: shimmer 2s ease-in-out infinite; }
        .scale-in { animation: scaleIn 0.5s ease-out forwards; }
    </style>
    
    <!-- 背景 -->
    <rect width="100%" height="100%" fill="#0f172a"/>
    
    <!-- 背景光晕 -->
    <circle cx="200" cy="200" r="180" fill="url(#glowGradient)" class="bg-circle"/>
    
    <!-- 外圈装饰 - 旋转 -->
    <g class="rotating-ring" opacity="0.3">
        <circle cx="200" cy="200" r="160" fill="none" stroke="url(#mainGradient)" stroke-width="1" stroke-dasharray="10 5"/>
    </g>
    
    <!-- 内圈装饰 -->
    <circle cx="200" cy="200" r="140" fill="none" stroke="#334155" stroke-width="1" opacity="0.5"/>
    
    <!-- 主图形 - Apex 三角形 -->
    <g filter="url(#shadow)" class="floating">
        <!-- 底部融合带 -->
        <path d="M 200 80 L 280 280 L 120 280 Z" 
              fill="url(#mainGradient)" 
              opacity="0.2"/>
        
        <!-- 左侧三角形 - 传统技术 -->
        <path d="M 200 80 L 120 280 L 160 280 L 200 160 Z" 
              fill="#3b82f6" 
              opacity="0.8">
            <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3s" repeatCount="indefinite"/>
        </path>
        
        <!-- 右侧三角形 - 新技术 -->
        <path d="M 200 80 L 280 280 L 240 280 L 200 160 Z" 
              fill="#8b5cf6" 
              opacity="0.8">
            <animate attributeName="opacity" values="0.9;0.6;0.9" dur="3s" repeatCount="indefinite"/>
        </path>
        
        <!-- 中心线 - 融合点 -->
        <line x1="200" y1="80" x2="200" y2="160" 
              stroke="#06b6d4" 
              stroke-width="3" 
              stroke-linecap="round"
              class="shimmer"/>
        
        <!-- 顶点光点 -->
        <circle cx="200" cy="80" r="8" fill="#ffffff" filter="url(#glow)">
            <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/>
        </circle>
        
        <!-- 顶点光环 -->
        <circle cx="200" cy="80" r="15" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5">
            <animate attributeName="r" values="12;20;12" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2s" repeatCount="indefinite"/>
        </circle>
    </g>
    
    <!-- 数据流粒子 -->
    <g opacity="0.6">
        <!-- 左侧粒子 -->
        <circle cx="140" cy="200" r="3" fill="#3b82f6">
            <animate attributeName="cy" values="240;120;240" dur="4s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="155" cy="220" r="2" fill="#3b82f6">
            <animate attributeName="cy" values="260;140;260" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
            <animate attributeName="opacity" values="0;1;0" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
        </circle>
        
        <!-- 右侧粒子 -->
        <circle cx="260" cy="200" r="3" fill="#8b5cf6">
            <animate attributeName="cy" values="240;120;240" dur="4s" repeatCount="indefinite" begin="1s"/>
            <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" begin="1s"/>
        </circle>
        <circle cx="245" cy="220" r="2" fill="#8b5cf6">
            <animate attributeName="cy" values="260;140;260" dur="3.5s" repeatCount="indefinite" begin="1.5s"/>
            <animate attributeName="opacity" values="0;1;0" dur="3.5s" repeatCount="indefinite" begin="1.5s"/>
        </circle>
        
        <!-- 中心粒子 -->
        <circle cx="200" cy="150" r="2" fill="#06b6d4">
            <animate attributeName="cy" values="200;80;200" dur="3s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
        </circle>
    </g>
    
    <!-- 底部融合带 -->
    <g transform="translate(200, 300)">
        <rect x="-60" y="0" width="120" height="4" rx="2" fill="url(#mainGradient)" opacity="0.5">
            <animate attributeName="width" values="100;120;100" dur="3s" repeatCount="indefinite"/>
            <animate attributeName="x" values="-50;-60;-50" dur="3s" repeatCount="indefinite"/>
        </rect>
    </g>
    
    <!-- 文字 -->
    <g class="text-animate">
        <!-- 主标题 -->
        <text x="200" y="340" text-anchor="middle" 
              font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" 
              font-size="36" 
              font-weight="bold" 
              fill="url(#mainGradient)">APEX</text>
        
        <!-- 副标题 -->
        <text x="200" y="365" text-anchor="middle" 
              font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" 
              font-size="12" 
              fill="#94a3b8" 
              letter-spacing="4">AI AGENT INFRASTRUCTURE</text>
    </g>
    
    <!-- 版本标签 -->
    <g transform="translate(320, 60)">
        <rect x="0" y="0" width="50" height="20" rx="10" fill="#22c55e" opacity="0.2"/>
        <text x="25" y="14" text-anchor="middle" 
              font-family="-apple-system, sans-serif" 
              font-size="10" 
              font-weight="bold"
              fill="#22c55e">v3.0</text>
    </g>
</svg>
