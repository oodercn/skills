<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>质检统计 - 录音质检系统</title>
    <link rel="stylesheet" href="/console/css/nexus.css">
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="../css/recording-qa.css">
</head>
<body>
    <div class="nexus-layout">
        <!-- 侧边栏 -->
        <aside class="nexus-sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="ri-mic-line"></i>
                    <span>录音质检</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a href="upload.html" class="nav-link">
                            <i class="ri-upload-cloud-line"></i>
                            <span>录音上传</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="review.html" class="nav-link">
                            <i class="ri-file-search-line"></i>
                            <span>人工审核</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="statistics.html" class="nav-link active">
                            <i class="ri-bar-chart-line"></i>
                            <span>质检统计</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="nexus-main">
            <!-- 顶部导航 -->
            <header class="nexus-header">
                <button class="menu-toggle" id="menu-toggle">
                    <i class="ri-menu-line"></i>
                </button>
                <h1 class="page-title">质检统计</h1>
                <div class="header-actions">
                    <div class="user-info">
                        <i class="ri-user-line"></i>
                        <span>管理员</span>
                    </div>
                </div>
            </header>

            <!-- 页面内容 -->
            <div class="nexus-content">
                <!-- 统计卡片 -->
                <div class="stats-cards">
                    <div class="stat-card">
                        <div class="stat-icon blue">
                            <i class="ri-mic-line"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-total">0</h3>
                            <p>录音总数</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon orange">
                            <i class="ri-time-line"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-pending">0</h3>
                            <p>待审核</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green">
                            <i class="ri-check-double-line"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-completed">0</h3>
                            <p>已审核</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon purple">
                            <i class="ri-star-line"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-avg-score">0</h3>
                            <p>平均分数</p>
                        </div>
                    </div>
                </div>

                <!-- 图表区域 -->
                <div class="charts-row">
                    <div class="chart-card">
                        <h4>审核结果分布</h4>
                        <div class="chart-container">
                            <canvas id="result-chart"></canvas>
                        </div>
                        <div class="chart-legend" id="result-legend">
                            <!-- 动态加载 -->
                        </div>
                    </div>
                    <div class="chart-card">
                        <h4>部门录音统计</h4>
                        <div class="chart-container">
                            <canvas id="dept-chart"></canvas>
                        </div>
                        <div class="chart-legend" id="dept-legend">
                            <!-- 动态加载 -->
                        </div>
                    </div>
                </div>

                <!-- 评分详情表格 -->
                <div class="detail-section">
                    <h3 class="section-title">质检详情</h3>
                    <div class="table-container">
                        <table class="data-table" id="statistics-table">
                            <thead>
                                <tr>
                                    <th>部门</th>
                                    <th>录音数量</th>
                                    <th>已审核</th>
                                    <th>通过率</th>
                                    <th>平均分数</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- 动态加载 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/api.js"></script>
    <script src="../js/recording-qa.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            RecordingQA.initStatistics();
        });
    </script>
</body>
</html>
