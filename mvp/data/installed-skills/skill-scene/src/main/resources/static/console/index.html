<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ooder 场景技能平台 - 控制台">
    <meta name="theme-color" content="#3b82f6">
    <title>Ooder 场景技能平台</title>
    <link rel="stylesheet" href="/console/css/theme.css">
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <link rel="stylesheet" href="/console/css/index.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold">
                    <i class="ri-bolt-line"></i> Ooder
                </h1>
                <p class="nx-text-xs nx-text-secondary">场景技能平台 v2.3</p>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-page__title">
                    <h1><i class="ri-dashboard-3-line"></i> Ooder 控制台</h1>
                    <p class="nx-page__subtitle">选择您要使用的功能模块</p>
                </div>
                <div class="nx-page__actions">
                    <span class="nx-badge nx-badge--info" id="user-info" style="display: none;">
                        <i class="ri-user-line"></i> <span id="user-name"></span>
                    </span>
                    <button class="theme-toggle-btn btn btn-secondary" id="theme-toggle">
                        <i class="ri-sun-line"></i> 浅色模式
                    </button>
                    <button class="nx-btn nx-btn--secondary" id="logout-btn" onclick="handleLogout()" style="display: none;">
                        <i class="ri-logout-box-line"></i> 退出登录
                    </button>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="page-type-selection">
                        <div class="page-type-card" onclick="selectPageType('role-installer')">
                            <div class="icon"><i class="ri-install-line"></i></div>
                            <h3>系统安装者</h3>
                            <p>闭环一：安装基础技能包，初始化系统环境</p>
                            <button class="btn btn-primary">进入工作台</button>
                        </div>
                        
                        <div class="page-type-card" onclick="selectPageType('role-admin')">
                            <div class="icon"><i class="ri-admin-line"></i></div>
                            <h3>系统管理员</h3>
                            <p>闭环二：发现场景技能 → 配置分发 → 推送给参与者</p>
                            <button class="btn btn-primary">进入工作台</button>
                        </div>
                        
                        <div class="page-type-card" onclick="selectPageType('role-leader')">
                            <div class="icon"><i class="ri-user-star-line"></i></div>
                            <h3>主导者</h3>
                            <p>闭环三：激活场景 → 获取KEY → 场景自驱运行</p>
                            <button class="btn btn-primary">进入工作台</button>
                        </div>
                        
                        <div class="page-type-card" onclick="selectPageType('role-collaborator')">
                            <div class="icon"><i class="ri-team-line"></i></div>
                            <h3>协作者</h3>
                            <p>闭环三：参与业务流转，执行分配的任务</p>
                            <button class="btn btn-primary">进入工作台</button>
                        </div>
                    </div>
                    
                    <div class="recent-section">
                        <h3><i class="ri-history-line"></i> 最近访问</h3>
                        <div id="recent-access"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/api.js"></script>
    <script src="/console/js/theme-manager.js"></script>
    <script>
        function checkLoginStatus() {
            const loggedIn = localStorage.getItem('ooder_logged_in') === 'true';
            const userName = localStorage.getItem('ooder_user_name');
            const userRole = localStorage.getItem('ooder_user_role');
            
            if (loggedIn && userName) {
                document.getElementById('user-info').style.display = 'inline-flex';
                document.getElementById('user-name').textContent = userName;
                document.getElementById('logout-btn').style.display = 'inline-flex';
            } else {
                document.getElementById('user-info').style.display = 'none';
                document.getElementById('logout-btn').style.display = 'none';
            }
        }
        
        function handleLogout() {
            localStorage.removeItem('ooder_logged_in');
            localStorage.removeItem('ooder_user_role');
            localStorage.removeItem('ooder_user_name');
            window.location.href = '/console/pages/login.html';
        }
        
        function selectPageType(type) {
            const rolePages = {
                'role-installer': '/console/pages/role-installer.html',
                'role-admin': '/console/pages/role-admin.html',
                'role-leader': '/console/pages/role-leader.html',
                'role-collaborator': '/console/pages/role-collaborator.html',
                'dashboard': '/console/pages/scene-management.html',
                'personal': '/console/pages/my-todos.html',
                'market': '/console/pages/capability-discovery.html',
                'admin': '/console/pages/capability-management.html'
            };
            
            if (type.startsWith('role-')) {
                window.location.href = '/console/pages/login.html?role=' + type.replace('role-', '');
            } else {
                window.location.href = rolePages[type] || '/console/pages/scene-management.html';
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            checkLoginStatus();
        });
    </script>
</body>
</html>
