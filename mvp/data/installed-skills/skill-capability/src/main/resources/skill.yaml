apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-capability
  name: 能力管理
  version: 2.3.1
  description: 能力管理技能 - 能力注册、发现、验证、安装、激活、统计
  author: ooder Team
  license: Apache-2.0
  type: service-skill

spec:
  type: service-skill
  
  ownership: platform
  
  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
  
  dependencies:
    - skill-common
    
  capabilities:
    - id: capability-register
      name: 能力注册
      description: 注册新能力定义
      category: orchestration
      
    - id: capability-discover
      name: 能力发现
      description: 发现和搜索能力
      category: orchestration
      
    - id: capability-install
      name: 能力安装
      description: 安装能力包
      category: orchestration
      
    - id: capability-activate
      name: 能力激活
      description: 激活能力配置
      category: orchestration
      
    - id: capability-bind
      name: 能力绑定
      description: 绑定能力到场景
      category: orchestration
      
    - id: capability-stats
      name: 能力统计
      description: 能力使用统计
      category: monitoring
      
    - id: key-management
      name: 密钥管理
      description: API密钥管理
      category: security
  
  scenes:
    - name: capability-management
      description: 能力管理主场景
      capabilities:
        - capability-register
        - capability-discover
        - capability-install
        - capability-activate
        - capability-bind
        - capability-stats
        - key-management
  
  endpoints:
    - path: /api/v1/capabilities
      method: GET
      description: 获取能力列表
      capability: capability-discover
      
    - path: /api/v1/capabilities
      method: POST
      description: 注册能力
      capability: capability-register
      
    - path: /api/v1/capabilities/{capabilityId}
      method: GET
      description: 获取能力详情
      capability: capability-discover
      
    - path: /api/v1/capabilities/{capabilityId}
      method: PUT
      description: 更新能力
      capability: capability-register
      
    - path: /api/v1/capabilities/{capabilityId}
      method: DELETE
      description: 删除能力
      capability: capability-register
      
    - path: /api/v1/capabilities/discover
      method: GET
      description: 发现能力
      capability: capability-discover
      
    - path: /api/v1/capabilities/{capabilityId}/install
      method: POST
      description: 安装能力
      capability: capability-install
      
    - path: /api/v1/capabilities/{capabilityId}/activate
      method: POST
      description: 激活能力
      capability: capability-activate
      
    - path: /api/v1/capabilities/{capabilityId}/bind
      method: POST
      description: 绑定能力
      capability: capability-bind
      
    - path: /api/v1/capabilities/stats
      method: GET
      description: 获取能力统计
      capability: capability-stats
      
    - path: /api/v1/keys
      method: GET
      description: 获取密钥列表
      capability: key-management
      
    - path: /api/v1/keys
      method: POST
      description: 创建密钥
      capability: key-management
  
  resources:
    cpu: "200m"
    memory: "256Mi"
