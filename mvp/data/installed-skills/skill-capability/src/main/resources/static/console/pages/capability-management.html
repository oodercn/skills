<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能力管理 - Ooder Skills</title>
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <link rel="stylesheet" href="/console/css/components/stat-cards.css">
</head>
<body>
    <div class="nx-app">
        <aside class="nx-sidebar" id="sidebar"></aside>
        <main class="nx-main">
            <header class="nx-header">
                <div class="nx-header__title">
                    <h1><i class="ri-puzzle-line"></i> 能力管理</h1>
                </div>
                <div class="nx-header__actions">
                    <button class="nx-btn nx-btn-primary" onclick="CapabilityManager.showCreateDialog()">
                        <i class="ri-add-line"></i> 注册能力
                    </button>
                </div>
            </header>
            <div class="nx-content">
                <div class="nx-toolbar">
                    <div class="nx-toolbar__search">
                        <input type="text" id="searchInput" placeholder="搜索能力..." class="nx-input">
                    </div>
                    <div class="nx-toolbar__filters">
                        <select id="typeFilter" class="nx-select">
                            <option value="">全部类型</option>
                            <option value="SCENE">场景能力</option>
                            <option value="SKILL">技能包</option>
                            <option value="TOOL">工具能力</option>
                            <option value="DRIVER">驱动能力</option>
                            <option value="LLM">LLM能力</option>
                        </select>
                        <select id="statusFilter" class="nx-select">
                            <option value="">全部状态</option>
                            <option value="REGISTERED">已注册</option>
                            <option value="INSTALLED">已安装</option>
                            <option value="ACTIVE">已激活</option>
                            <option value="INACTIVE">未激活</option>
                        </select>
                    </div>
                </div>
                
                <div class="stat-cards" id="statCards">
                    <div class="stat-card">
                        <div class="stat-card__icon"><i class="ri-puzzle-line"></i></div>
                        <div class="stat-card__content">
                            <div class="stat-card__value" id="totalCount">0</div>
                            <div class="stat-card__label">总能力数</div>
                        </div>
                    </div>
                    <div class="stat-card stat-card--success">
                        <div class="stat-card__icon"><i class="ri-checkbox-circle-line"></i></div>
                        <div class="stat-card__content">
                            <div class="stat-card__value" id="activeCount">0</div>
                            <div class="stat-card__label">已激活</div>
                        </div>
                    </div>
                    <div class="stat-card stat-card--warning">
                        <div class="stat-card__icon"><i class="ri-download-line"></i></div>
                        <div class="stat-card__content">
                            <div class="stat-card__value" id="installedCount">0</div>
                            <div class="stat-card__label">已安装</div>
                        </div>
                    </div>
                </div>
                
                <div class="nx-card">
                    <div class="nx-card__body">
                        <table class="nx-table" id="capabilityTable">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>名称</th>
                                    <th>类型</th>
                                    <th>版本</th>
                                    <th>状态</th>
                                    <th>提供者</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="capabilityList">
                                <tr>
                                    <td colspan="8" class="nx-empty">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/menu.js"></script>
    <script src="/console/js/page-init.js"></script>
    <script>
    const CapabilityManager = {
        capabilities: [],
        
        async init() {
            await this.loadCapabilities();
            this.bindEvents();
        },
        
        async loadCapabilities() {
            try {
                const response = await fetch('/api/v1/capabilities');
                const result = await response.json();
                
                if (result.code === 200) {
                    this.capabilities = result.data || [];
                    this.renderList();
                    this.updateStats();
                }
            } catch (e) {
                console.error('Failed to load capabilities:', e);
                document.getElementById('capabilityList').innerHTML = 
                    '<tr><td colspan="8" class="nx-empty">加载失败</td></tr>';
            }
        },
        
        renderList() {
            const tbody = document.getElementById('capabilityList');
            
            if (this.capabilities.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="nx-empty">暂无能力数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = this.capabilities.map(cap => `
                <tr>
                    <td><code>${cap.capabilityId}</code></td>
                    <td>${cap.name || '-'}</td>
                    <td><span class="nx-badge">${cap.type || '-'}</span></td>
                    <td>${cap.version || '-'}</td>
                    <td><span class="nx-badge nx-badge--${this.getStatusClass(cap.status)}">${this.getStatusText(cap.status)}</span></td>
                    <td>${cap.provider || '-'}</td>
                    <td>${this.formatDate(cap.createdAt)}</td>
                    <td>
                        <button class="nx-btn nx-btn-sm nx-btn-secondary" onclick="CapabilityManager.viewDetail('${cap.capabilityId}')">
                            <i class="ri-eye-line"></i>
                        </button>
                        <button class="nx-btn nx-btn-sm nx-btn-primary" onclick="CapabilityManager.editCapability('${cap.capabilityId}')">
                            <i class="ri-edit-line"></i>
                        </button>
                        <button class="nx-btn nx-btn-sm nx-btn-danger" onclick="CapabilityManager.deleteCapability('${cap.capabilityId}')">
                            <i class="ri-delete-bin-line"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        },
        
        updateStats() {
            document.getElementById('totalCount').textContent = this.capabilities.length;
            document.getElementById('activeCount').textContent = 
                this.capabilities.filter(c => c.status === 'ACTIVE').length;
            document.getElementById('installedCount').textContent = 
                this.capabilities.filter(c => c.status === 'INSTALLED').length;
        },
        
        getStatusClass(status) {
            const classes = {
                'ACTIVE': 'success',
                'INSTALLED': 'info',
                'REGISTERED': 'warning',
                'INACTIVE': 'secondary',
                'ERROR': 'danger'
            };
            return classes[status] || 'secondary';
        },
        
        getStatusText(status) {
            const texts = {
                'ACTIVE': '已激活',
                'INSTALLED': '已安装',
                'REGISTERED': '已注册',
                'INACTIVE': '未激活',
                'ERROR': '错误'
            };
            return texts[status] || status;
        },
        
        formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN');
        },
        
        bindEvents() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                this.filterCapabilities();
            });
            
            document.getElementById('typeFilter').addEventListener('change', (e) => {
                this.filterCapabilities();
            });
            
            document.getElementById('statusFilter').addEventListener('change', (e) => {
                this.filterCapabilities();
            });
        },
        
        filterCapabilities() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const type = document.getElementById('typeFilter').value;
            const status = document.getElementById('statusFilter').value;
            
            let filtered = this.capabilities;
            
            if (keyword) {
                filtered = filtered.filter(c => 
                    (c.name && c.name.toLowerCase().includes(keyword)) ||
                    (c.capabilityId && c.capabilityId.toLowerCase().includes(keyword))
                );
            }
            
            if (type) {
                filtered = filtered.filter(c => c.type === type);
            }
            
            if (status) {
                filtered = filtered.filter(c => c.status === status);
            }
            
            this.capabilities = filtered;
            this.renderList();
        },
        
        showCreateDialog() {
            alert('创建能力功能开发中...');
        },
        
        viewDetail(id) {
            window.location.href = `/console/pages/capability-detail.html?id=${id}`;
        },
        
        editCapability(id) {
            alert('编辑能力: ' + id);
        },
        
        async deleteCapability(id) {
            if (!confirm('确定要删除此能力吗？')) return;
            
            try {
                const response = await fetch(`/api/v1/capabilities/${id}`, {
                    method: 'DELETE'
                });
                const result = await response.json();
                
                if (result.code === 200) {
                    await this.loadCapabilities();
                } else {
                    alert('删除失败: ' + result.message);
                }
            } catch (e) {
                alert('删除失败: ' + e.message);
            }
        }
    };
    
    document.addEventListener('DOMContentLoaded', () => {
        CapabilityManager.init();
    });
    </script>
</body>
</html>
