apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-approval-form
  name: 审批表单系统
  version: 1.0.0
  description: 通用审批表单系统，支持自定义审批流程、多级审批、审批模板、审批记录追踪等功能
  author: ooder Team
  type: scene-skill
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN
  repository: https://gitee.com/ooderCN/ooder-skills
  keywords:
    - approval
    - workflow
    - form
    - audit
    - process
    - scene-capability

spec:
  type: scene-skill
  
  dependencies:
    - id: skill-form-builder
      version: ">=1.0.0"
      required: true
      autoInstall: true
      description: "表单构建服务"
      capabilities:
        - form-render
        - form-validate
        - form-submit
        
    - id: skill-workflow-engine
      version: ">=1.0.0"
      required: true
      autoInstall: true
      description: "工作流引擎"
      capabilities:
        - workflow-design
        - workflow-execute
        - workflow-monitor

  capabilities:
    - id: approval-form
      name: 审批表单
      description: 通用审批表单创建与管理
      category: form
      type: ATOMIC
      
    - id: approval-template
      name: 审批模板
      description: 审批流程模板管理
      category: template
      type: ATOMIC
      
    - id: approval-process
      name: 审批流程
      description: 审批流程设计与执行
      category: workflow
      type: COMPOSITE
      
    - id: approval-record
      name: 审批记录
      description: 审批历史记录查询
      category: record
      type: ATOMIC
      
    - id: approval-dashboard
      name: 审批看板
      description: 审批统计与监控
      category: dashboard
      type: ATOMIC
      
    - id: approval-notify
      name: 审批通知
      description: 审批状态通知推送
      category: notification
      type: ATOMIC

  capabilityChains:
    - name: create-approval-flow
      description: 创建审批完整流程
      capabilities:
        - approval-template
        - approval-form
        - approval-process
        - approval-record
        
    - name: execute-approval-flow
      description: 执行审批流程
      capabilities:
        - approval-form
        - approval-process
        - approval-record
        - approval-notify

  endpoints:
    - path: /api/approval/forms
      method: GET
      description: 获取审批表单列表
      capability: approval-form
      
    - path: /api/approval/forms
      method: POST
      description: 创建审批表单
      capability: approval-form
      
    - path: /api/approval/forms/{id}
      method: GET
      description: 获取表单详情
      capability: approval-form
      
    - path: /api/approval/forms/{id}
      method: PUT
      description: 更新表单
      capability: approval-form
      
    - path: /api/approval/forms/{id}
      method: DELETE
      description: 删除表单
      capability: approval-form
      
    - path: /api/approval/templates
      method: GET
      description: 获取审批模板列表
      capability: approval-template
      
    - path: /api/approval/templates
      method: POST
      description: 创建审批模板
      capability: approval-template
      
    - path: /api/approval/processes
      method: GET
      description: 获取审批流程列表
      capability: approval-process
      
    - path: /api/approval/processes
      method: POST
      description: 发起审批流程
      capability: approval-process
      
    - path: /api/approval/processes/{id}/approve
      method: PUT
      description: 审批通过
      capability: approval-process
      
    - path: /api/approval/processes/{id}/reject
      method: PUT
      description: 审批拒绝
      capability: approval-process
      
    - path: /api/approval/processes/{id}/transfer
      method: PUT
      description: 转交审批
      capability: approval-process
      
    - path: /api/approval/records
      method: GET
      description: 获取审批记录
      capability: approval-record
      
    - path: /api/approval/statistics
      method: GET
      description: 获取审批统计
      capability: approval-dashboard
      
    - path: /api/approval/pending
      method: GET
      description: 获取待办审批
      capability: approval-dashboard
      
    - path: /api/approval/submitted
      method: GET
      description: 获取已提交审批
      capability: approval-dashboard

  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot
    mainClass: net.ooder.skill.ui.SkillUiTestApplication

  config:
    required: []
    
    optional:
      - name: MAX_APPROVAL_LEVELS
        type: integer
        default: 10
        description: 最大审批层级数
      - name: AUTO_APPROVAL_TIMEOUT
        type: integer
        default: 72
        description: 自动审批超时时间(小时)
      - name: ENABLE_PARALLEL_APPROVAL
        type: boolean
        default: true
        description: 启用并行审批
      - name: NOTIFY_CHANNELS
        type: string
        default: "email,sms"
        description: 通知渠道

  resources:
    cpu: "100m"
    memory: "256Mi"
    storage: "100Mi"

  offline:
    enabled: true
    cacheStrategy: localStorage

  ui:
    nexusUi:
      entry:
        page: index.html
        title: 审批表单
        icon: ri-file-list-3-line
      menu:
        position: sidebar
        category: business
        order: 2
      layout:
        type: default
        sidebar: true
        header: true
