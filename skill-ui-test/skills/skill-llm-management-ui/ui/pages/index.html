<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM配置管理 - Nexus Console</title>
    
    <link rel="stylesheet" href="/console/css/remixicon/remixicon.css">
    <link rel="stylesheet" href="/console/css/nexus.css">
    <link rel="stylesheet" href="/console/skills/skill-llm-management-ui/ui/css/llm-management.css">
</head>
<body>
    <div class="nx-page">
        <aside class="nx-page__sidebar">
            <div class="nx-p-4 nx-mb-4">
                <h1 class="nx-text-lg nx-font-bold" style="display: flex; align-items: center; gap: 8px;">
                    <i class="ri-server-line"></i> Nexus Console
                </h1>
            </div>
            <ul class="nav-menu" id="nav-menu"></ul>
        </aside>
        
        <main class="nx-page__content">
            <header class="nx-page__header">
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-sidebar-toggle>
                        <i class="ri-menu-line"></i>
                    </button>
                    <h2 class="nx-text-lg nx-font-semibold">LLM配置管理</h2>
                </div>
                <div class="nx-flex nx-items-center nx-gap-3">
                    <button class="nx-btn nx-btn--ghost nx-btn--icon" data-nx-theme-toggle>
                        <i class="ri-sun-line"></i>
                    </button>
                    <button class="nx-btn nx-btn--primary" onclick="LLMManagement.openCreateModal()">
                        <i class="ri-add-line"></i> 新建配置
                    </button>
                </div>
            </header>
            
            <div class="nx-page__main">
                <div class="nx-container">
                    <div class="nx-grid nx-grid-cols-4 nx-mb-6">
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--primary">
                                <i class="ri-settings-4-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">总配置数</div>
                                <div class="nx-stat-card__value" id="stat-total">0</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--success">
                                <i class="ri-building-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">企业配置</div>
                                <div class="nx-stat-card__value" id="stat-enterprise">0</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--warning">
                                <i class="ri-user-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">个人配置</div>
                                <div class="nx-stat-card__value" id="stat-personal">0</div>
                            </div>
                        </div>
                        <div class="nx-stat-card">
                            <div class="nx-stat-card__icon nx-stat-card__icon--info">
                                <i class="ri-robot-line"></i>
                            </div>
                            <div class="nx-stat-card__content">
                                <div class="nx-stat-card__label">Provider数</div>
                                <div class="nx-stat-card__value" id="stat-providers">0</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="nx-card nx-mb-6">
                        <div class="nx-card__header">
                            <div class="nx-flex nx-items-center nx-gap-3">
                                <select class="nx-select" id="filter-level" onchange="LLMManagement.filterConfigs()">
                                    <option value="">全部级别</option>
                                    <option value="ENTERPRISE">企业级</option>
                                    <option value="DEPARTMENT">部门级</option>
                                    <option value="PERSONAL">个人级</option>
                                    <option value="SCENE">场景级</option>
                                </select>
                                <select class="nx-select" id="filter-provider" onchange="LLMManagement.filterConfigs()">
                                    <option value="">全部Provider</option>
                                </select>
                            </div>
                            <button class="nx-btn nx-btn--secondary" onclick="LLMManagement.loadConfigs()">
                                <i class="ri-refresh-line"></i> 刷新
                            </button>
                        </div>
                        <div class="nx-card__body nx-p-0">
                            <table class="nx-table">
                                <thead>
                                    <tr>
                                        <th>配置名称</th>
                                        <th>级别</th>
                                        <th>Provider</th>
                                        <th>模型</th>
                                        <th>状态</th>
                                        <th>更新时间</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="config-table-body">
                                    <tr>
                                        <td colspan="7" class="nx-text-center nx-text-secondary nx-py-8">
                                            <i class="ri-loader-4-line ri-spin"></i> 加载中...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <div class="nx-card">
                        <div class="nx-card__header">
                            <h3 class="nx-card__title">可用Provider</h3>
                        </div>
                        <div class="nx-card__body">
                            <div class="nx-grid nx-grid-cols-4 nx-gap-4" id="provider-grid">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="nx-modal" id="config-modal">
        <div class="nx-modal__content">
            <div class="nx-modal__header">
                <h3 class="nx-modal__title" id="modal-title">新建配置</h3>
                <button class="nx-btn nx-btn--ghost nx-btn--icon nx-btn--sm" onclick="LLMManagement.closeModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="nx-modal__body">
                <form id="config-form">
                    <input type="hidden" id="config-id">
                    
                    <div class="nx-form-group">
                        <label class="nx-label">配置名称 <span class="nx-text-danger">*</span></label>
                        <input type="text" class="nx-input" id="config-name" placeholder="输入配置名称" required>
                    </div>
                    
                    <div class="nx-form-group">
                        <label class="nx-label">配置级别 <span class="nx-text-danger">*</span></label>
                        <select class="nx-select" id="config-level" required onchange="LLMManagement.onLevelChange()">
                            <option value="">请选择级别</option>
                            <option value="ENTERPRISE">企业级</option>
                            <option value="DEPARTMENT">部门级</option>
                            <option value="PERSONAL">个人级</option>
                            <option value="SCENE">场景级</option>
                        </select>
                    </div>
                    
                    <div class="nx-form-group" id="owner-id-group" style="display: none;">
                        <label class="nx-label">所有者ID <span class="nx-text-danger">*</span></label>
                        <input type="text" class="nx-input" id="config-owner-id" placeholder="输入用户ID/部门ID/场景ID">
                    </div>
                    
                    <div class="nx-form-group">
                        <label class="nx-label">Provider <span class="nx-text-danger">*</span></label>
                        <select class="nx-select" id="config-provider" required onchange="LLMManagement.onProviderChange()">
                            <option value="">请选择Provider</option>
                        </select>
                    </div>
                    
                    <div class="nx-form-group">
                        <label class="nx-label">模型 <span class="nx-text-danger">*</span></label>
                        <select class="nx-select" id="config-model" required>
                            <option value="">请先选择Provider</option>
                        </select>
                    </div>
                    
                    <div class="nx-form-group">
                        <label class="nx-label">API Key</label>
                        <input type="password" class="nx-input" id="config-api-key" placeholder="输入API Key">
                    </div>
                    
                    <div class="nx-form-group">
                        <label class="nx-label">Base URL</label>
                        <input type="text" class="nx-input" id="config-base-url" placeholder="自定义API地址（可选）">
                    </div>
                    
                    <div class="nx-form-group">
                        <label class="nx-label">温度 (Temperature)</label>
                        <input type="number" class="nx-input" id="config-temperature" value="0.7" min="0" max="2" step="0.1">
                    </div>
                    
                    <div class="nx-form-group">
                        <label class="nx-label">最大Token数</label>
                        <input type="number" class="nx-input" id="config-max-tokens" value="4096" min="100" max="128000">
                    </div>
                </form>
            </div>
            <div class="nx-modal__footer">
                <button class="nx-btn nx-btn--secondary" onclick="LLMManagement.closeModal()">取消</button>
                <button class="nx-btn nx-btn--primary" onclick="LLMManagement.saveConfig()">保存</button>
            </div>
        </div>
    </div>
    
    <div class="nx-modal" id="delete-modal">
        <div class="nx-modal__content nx-modal__content--sm">
            <div class="nx-modal__header">
                <h3 class="nx-modal__title">确认删除</h3>
            </div>
            <div class="nx-modal__body">
                <p>确定要删除配置 "<span id="delete-config-name"></span>" 吗？此操作不可恢复。</p>
            </div>
            <div class="nx-modal__footer">
                <button class="nx-btn nx-btn--secondary" onclick="LLMManagement.closeDeleteModal()">取消</button>
                <button class="nx-btn nx-btn--danger" onclick="LLMManagement.confirmDelete()">删除</button>
            </div>
        </div>
    </div>
    
    <script src="/console/js/nexus.js"></script>
    <script src="/console/js/menu.js"></script>
    <script src="/console/js/page-init.js" data-auto-init></script>
    <script src="/console/js/api.js"></script>
    <script src="/console/skills/skill-llm-management-ui/ui/js/llm-management.js"></script>
    <script src="/console/skills/skill-llm-management-ui/ui/js/pages/llm-management-init.js"></script>
</body>
</html>
