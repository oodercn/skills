apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-nexus-system-status-nexus-ui
  name: 系统状态
  version: 1.0.0
  description: Nexus系统状态监控，显示系统版本、运行时间、资源使用情况、服务状态等
  author: ooder Team
  type: nexus-ui

spec:
  type: nexus-ui
  
  nexusUi:
    entry:
      page: index.html
      title: 系统状态
      icon: ri-computer-line
      
    menu:
      position: sidebar
      category: nexus
      order: 20
      
    layout:
      type: default
      sidebar: true
      header: true
      
  capabilities:
    - id: system-status-view
      name: 查看系统状态
      description: 查看Nexus系统运行状态
      category: ui
      
  apis:
    - path: /api/nexus/system/status
      method: GET
      description: 获取系统状态
    - path: /api/nexus/system/resources
      method: GET
      description: 获取资源使用情况
    - path: /api/nexus/system/services
      method: GET
      description: 获取服务状态
