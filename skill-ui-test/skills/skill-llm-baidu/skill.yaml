apiVersion: skill.ooder.net/v1
kind: Skill

metadata:
  id: skill-llm-baidu
  name: 百度千帆LLM Provider
  version: 1.0.0
  description: 百度千帆大模型Provider，提供ERNIE系列模型对话、嵌入能力
  author: ooder Team
  license: Apache-2.0
  homepage: https://gitee.com/ooderCN
  repository: https://gitee.com/ooderCN/ooder-skills
  keywords:
    - llm
    - baidu
    - qianfan
    - ernie
    - provider

spec:
  skillForm: PROVIDER
  
  provider:
    type: llm
    vendor: baidu
    models:
      - id: ernie-4.0-8k
        name: ERNIE 4.0 8K
        type: chat
        maxTokens: 8192
      - id: ernie-3.5-8k
        name: ERNIE 3.5 8K
        type: chat
        maxTokens: 8192
      - id: embedding-v1
        name: Embedding V1
        type: embedding
        maxTokens: 4096

  capabilities:
    - id: llm-chat
      name: 智能对话
      description: 调用百度千帆ERNIE模型进行对话
      category: ai
      type: ATOMIC
      
    - id: llm-embed
      name: 文本嵌入
      description: 调用百度千帆Embedding模型生成向量
      category: ai
      type: ATOMIC
      
    - id: llm-complete
      name: 文本补全
      description: 调用百度千帆模型进行文本补全
      category: ai
      type: ATOMIC

  config:
    required:
      - name: API_KEY
        type: string
        description: 百度千帆API Key
        secret: true
        
    optional:
      - name: BASE_URL
        type: string
        default: "https://qianfan.baidubce.com/v2"
        description: API基础URL
        
      - name: MODEL
        type: string
        default: "ernie-4.0-8k"
        description: 默认模型
        
      - name: EMBEDDING_MODEL
        type: string
        default: "embedding-v1"
        description: 默认嵌入模型
        
      - name: MAX_TOKENS
        type: integer
        default: 4096
        description: 最大Token数
        
      - name: TEMPERATURE
        type: number
        default: 0.7
        description: 温度参数
        
      - name: TIMEOUT
        type: integer
        default: 60000
        description: 请求超时时间(ms)

  endpoints:
    - path: /api/llm/baidu/chat
      method: POST
      description: 发送对话消息
      capability: llm-chat
      
    - path: /api/llm/baidu/embed
      method: POST
      description: 生成文本嵌入向量
      capability: llm-embed
      
    - path: /api/llm/baidu/complete
      method: POST
      description: 文本补全
      capability: llm-complete
      
    - path: /api/llm/baidu/models
      method: GET
      description: 获取可用模型列表
      capability: llm-chat
      
    - path: /api/llm/baidu/health
      method: GET
      description: 健康检查
      capability: llm-chat

  healthCheck:
    enabled: true
    endpoint: /api/llm/baidu/health
    interval: 30s
    timeout: 10s

  runtime:
    language: java
    javaVersion: "8"
    framework: spring-boot

  resources:
    cpu: "100m"
    memory: "128Mi"

  offline:
    enabled: true
