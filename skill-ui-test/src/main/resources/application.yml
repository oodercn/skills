server:
  port: 8080

spring:
  application:
    name: skill-ui-test
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

ooder:
  agent:
    id: skill-test-agent
    name: Skill Test Agent
    type: mcp
  sdk:
    id: skill-test-sdk
    auto-discover-drivers: true
    auto-start-scenes: true
  skill:
    root-path: ./skills
    kb:
      storage-path: ./kb-storage
      index-path: ./kb-index
  llm:
    provider: ${LLM_PROVIDER:baidu}
    api-key: ${LLM_API_KEY:}
    base-url: ${LLM_BASE_URL:https://qianfan.baidubce.com/v2}
    model: ${LLM_MODEL:ernie-4.0-8k}
    embedding-model: ${LLM_EMBEDDING_MODEL:embedding-v1}

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  model: ${DEEPSEEK_MODEL:deepseek-chat}
  timeout: 60000

nexus:
  skills:
    path: ./skills
  menu:
    config:
      path: ./menu-config.json
  skill-index:
    path: ./skill-index.yaml

logging:
  level:
    net.ooder: DEBUG
    org.springframework: INFO
