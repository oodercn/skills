server:
  port: 8080

spring:
  application:
    name: skill-ui-test
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

ooder:
  agent:
    id: skill-test-agent
    name: Skill Test Agent
    type: mcp
  sdk:
    id: skill-test-sdk
    auto-discover-drivers: true
    auto-start-scenes: true
  skill:
    root-path: ./skills
    kb:
      storage-path: ./kb-storage
      index-path: ./kb-index
  llm:
    provider: baidu
    api-key: bce-v3/ALTAK-y3mXQFRWjd26xOkkewFpB/e67462d98404432921816438d1a9e66528562839
    base-url: https://qianfan.baidubce.com/v2
    model: ernie-4.0-8k
    embedding-model: embedding-v1

nexus:
  skills:
    path: ./skills
  menu:
    config:
      path: ./menu-config.json
  skill-index:
    path: ./skill-index.yaml

logging:
  level:
    net.ooder: DEBUG
    org.springframework: INFO
