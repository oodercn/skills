<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nexus Console - 家庭管理中心">
    <meta name="theme-color" content="#000000">
    <title>Nexus Console - 家庭管理中心</title>
    <link rel="stylesheet" href="../../css/theme.css">
    <link rel="stylesheet" href="../../css/remixicon/remixicon.css">
    <link rel="stylesheet" href="../../css/nexus.css">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <div class="container">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="ri-home-smile-line"></i>
                    <span>家庭管理中心</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="ri-menu-fold-line"></i>
                </button>
            </div>
            
            <div class="sidebar-content">
                <ul id="nav-menu" class="nav-menu"></ul>
            </div>
        </nav>
        
        <main class="main-content">
            <header class="page-header">
                <div class="page-title">
                    <h1><i class="ri-dashboard-line"></i> 仪表盘</h1>
                    <p>家庭设备总览和快捷控制</p>
                </div>
                <div class="page-actions">
                    <button class="btn btn-secondary">
                        <i class="ri-refresh-line"></i> 刷新
                    </button>
                    <button class="btn btn-primary">
                        <i class="ri-add-line"></i> 添加设备
                    </button>
                </div>
            </header>
            
            <div class="dashboard-grid">
                <div class="stat-card">
                    <div class="stat-icon devices">
                        <i class="ri-device-line"></i>
                    </div>
                    <div class="stat-info">
                        <h3>设备总数</h3>
                        <p class="stat-value">12</p>
                        <span class="stat-change positive">+2 本周新增</span>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon online">
                        <i class="ri-checkbox-circle-line"></i>
                    </div>
                    <div class="stat-info">
                        <h3>在线设备</h3>
                        <p class="stat-value">10</p>
                        <span class="stat-change">83% 在线率</span>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon alerts">
                        <i class="ri-alarm-warning-line"></i>
                    </div>
                    <div class="stat-info">
                        <h3>告警数量</h3>
                        <p class="stat-value">0</p>
                        <span class="stat-change positive">系统正常</span>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon energy">
                        <i class="ri-flashlight-line"></i>
                    </div>
                    <div class="stat-info">
                        <h3>今日能耗</h3>
                        <p class="stat-value">3.2 kWh</p>
                        <span class="stat-change negative">+5% 较昨日</span>
                    </div>
                </div>
            </div>
            
            <div class="content-section">
                <div class="section-header">
                    <h2><i class="ri-device-line"></i> 设备列表</h2>
                    <div class="section-actions">
                        <input type="text" class="search-input" placeholder="搜索设备...">
                        <select class="filter-select">
                            <option value="">全部类型</option>
                            <option value="light">照明</option>
                            <option value="sensor">传感器</option>
                            <option value="switch">开关</option>
                            <option value="camera">摄像头</option>
                        </select>
                    </div>
                </div>
                
                <div class="device-grid">
                    <div class="device-card online">
                        <div class="device-header">
                            <i class="ri-lightbulb-line device-icon"></i>
                            <span class="device-status online"></span>
                        </div>
                        <div class="device-info">
                            <h4>客厅主灯</h4>
                            <p>亮度: 80%</p>
                        </div>
                        <div class="device-controls">
                            <label class="switch">
                                <input type="checkbox" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    
                    <div class="device-card online">
                        <div class="device-header">
                            <i class="ri-temp-cold-line device-icon"></i>
                            <span class="device-status online"></span>
                        </div>
                        <div class="device-info">
                            <h4>温湿度传感器</h4>
                            <p>温度: 24°C | 湿度: 65%</p>
                        </div>
                        <div class="device-controls">
                            <span class="badge badge-success">正常</span>
                        </div>
                    </div>
                    
                    <div class="device-card offline">
                        <div class="device-header">
                            <i class="ri-camera-line device-icon"></i>
                            <span class="device-status offline"></span>
                        </div>
                        <div class="device-info">
                            <h4>门口摄像头</h4>
                            <p>离线</p>
                        </div>
                        <div class="device-controls">
                            <span class="badge badge-danger">离线</span>
                        </div>
                    </div>
                    
                    <div class="device-card online">
                        <div class="device-header">
                            <i class="ri-plug-line device-icon"></i>
                            <span class="device-status online"></span>
                        </div>
                        <div class="device-info">
                            <h4>智能插座</h4>
                            <p>功率: 45W</p>
                        </div>
                        <div class="device-controls">
                            <label class="switch">
                                <input type="checkbox" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="../../js/nexus.js"></script>
    <script src="../../js/menu-loader.js"></script>
    <script src="../../js/theme-manager.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const menuLoader = new MenuLoader();
            await menuLoader.init();
            ThemeManager.init();
        });
    </script>
    <script src="home.js"></script>
</body>
</html>
